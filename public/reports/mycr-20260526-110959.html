<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MyCR Review Report</title>
<style>
:root {
  color-scheme: light;
  --bg: #f4f7fb;
  --panel: rgba(255, 255, 255, 0.94);
  --ink: #19202a;
  --muted: #667085;
  --line: #d8dee8;
  --accent: #116466;
  --accent-soft: #e8f7f4;
  --accent-2: #d17a22;
  --ok: #188038;
  --warn: #b45309;
  --bad: #b42318;
  --info: #1d4ed8;
  --soft: #f8fafc;
  --radius-lg: 24px;
  --radius-md: 16px;
  --radius-sm: 12px;
  --shadow: 0 18px 48px rgba(15, 23, 42, 0.08);
  --shadow-soft: 0 8px 24px rgba(15, 23, 42, 0.06);
  --shadow-lg: 0 22px 54px rgba(15, 23, 42, 0.12);
}
* { box-sizing: border-box; }
body {
  margin: 0;
  background:
    radial-gradient(circle at 12% 0%, rgba(17, 100, 102, 0.16), transparent 28rem),
    radial-gradient(circle at 88% 5%, rgba(29, 78, 216, 0.10), transparent 24rem),
    linear-gradient(180deg, #fbfcff 0%, var(--bg) 34rem);
  color: var(--ink);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
    "Segoe UI", sans-serif;
  line-height: 1.5;
}
a { color: var(--accent); text-decoration-thickness: 1px; }
.shell { max-width: 1180px; margin: 0 auto; padding: 28px 18px 56px; }
.topbar {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 18px;
  margin-bottom: 20px;
}
h1 {
  margin: 0 0 8px;
  font-size: clamp(34px, 5vw, 64px);
  line-height: 1.04;
  letter-spacing: -0.055em;
}
.subtitle { color: var(--muted); max-width: 760px; margin: 0; }
.toggle {
  display: inline-flex;
  border: 1px solid var(--line);
  background: var(--panel);
  border-radius: 999px;
  padding: 3px;
  box-shadow: var(--shadow);
  flex: none;
}
.toggle button {
  border: 0;
  background: transparent;
  color: var(--muted);
  border-radius: 999px;
  padding: 8px 13px;
  cursor: pointer;
  font-weight: 700;
}
.toggle button.active { background: var(--accent); color: white; }
.metrics {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 12px;
  margin: 18px 0;
}
.metric {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius-md);
  padding: 16px;
  box-shadow: var(--shadow-soft);
}
.metric .value { font-size: 32px; line-height: 1; font-weight: 800; }
.metric .label { color: var(--muted); margin-top: 7px; font-size: 13px; }
.dashboard {
  display: grid;
  grid-template-columns: 1.15fr 0.85fr;
  gap: 16px;
  align-items: start;
}
.panel {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow);
  padding: 16px;
}
.panel h2 { margin: 0 0 12px; font-size: 18px; }
.bars { display: grid; gap: 12px; }
.bar-row {
  display: grid;
  grid-template-columns: 122px 1fr 36px;
  gap: 10px;
  align-items: center;
}
.bar-label { color: var(--muted); font-size: 13px; }
.bar-track {
  height: 12px;
  background: #eef2f7;
  border-radius: 999px;
  overflow: hidden;
}
.bar-fill { height: 100%; border-radius: 999px; background: var(--accent); }
.bar-fill.approved, .bar-fill.merged { background: var(--ok); }
.bar-fill.commented { background: var(--accent-2); }
.bar-fill.maintained { background: var(--accent); }
.bar-fill.skipped { background: var(--info); }
.bar-fill.blocked { background: var(--bad); }
.timeline { display: grid; gap: 10px; }
.timeline-item {
  display: grid;
  grid-template-columns: 96px 1fr;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid #edf0f5;
}
.timeline-item:last-child { border-bottom: 0; }
.time { color: var(--muted); font-size: 13px; }
.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  margin: 18px 0 12px;
}
.search {
  flex: 1 1 280px;
  min-width: 0;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px 12px;
  font: inherit;
  background: white;
}
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  border: 1px solid var(--line);
  background: white;
  color: var(--ink);
  border-radius: 999px;
  padding: 8px 11px;
  cursor: pointer;
  font-weight: 700;
}
.chip.active { background: var(--ink); color: white; border-color: var(--ink); }
.cards { display: grid; gap: 12px; }
.section-heading {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 14px;
  margin: 22px 0 12px;
}
.section-heading h2 { margin: 0; font-size: 20px; }
.section-heading .hint { color: var(--muted); font-size: 13px; }
.card {
  min-width: 0;
  background: var(--panel);
  border: 1px solid var(--line);
  border-left: 5px solid var(--accent);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.card[data-status="approved"],
.card[data-status="merged"] { border-left-color: var(--ok); }
.card[data-status="commented"] { border-left-color: var(--accent-2); }
.card[data-status="maintained"] { border-left-color: var(--accent); }
.card[data-status="skipped"] { border-left-color: var(--info); }
.card[data-status="blocked"] { border-left-color: var(--bad); }
.card-head {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 16px;
  padding: 18px;
  cursor: pointer;
}
.card-title { margin: 0; font-size: 17px; overflow-wrap: anywhere; }
.card-title a { overflow-wrap: anywhere; }
.meta {
  color: var(--muted);
  display: flex;
  flex-wrap: wrap;
  gap: 8px 12px;
  font-size: 13px;
  margin-top: 5px;
  min-width: 0;
}
.card-summary {
  color: #42526a;
  display: -webkit-box;
  font-size: 13px;
  line-height: 1.5;
  margin-top: 8px;
  overflow: hidden;
  overflow-wrap: anywhere;
  -webkit-box-orient: vertical;
  -webkit-line-clamp: 2;
}
.card-actions {
  align-items: flex-end;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.card-toggle {
  border: 1px solid #d8e1ec;
  background: #fff;
  border-radius: 999px;
  color: var(--muted);
  cursor: pointer;
  font: inherit;
  font-size: 12px;
  font-weight: 800;
  padding: 6px 10px;
  white-space: nowrap;
}
.card-toggle:hover { border-color: #9aa8bb; color: var(--ink); }
.badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 88px;
  border-radius: 999px;
  padding: 6px 10px;
  font-size: 12px;
  font-weight: 800;
  text-transform: uppercase;
  background: #eef2f7;
}
.badge.approved, .badge.merged { color: var(--ok); background: #e7f5ec; }
.badge.commented { color: var(--warn); background: #fff4e5; }
.badge.maintained { color: var(--accent); background: #e6fffb; }
.badge.skipped { color: var(--info); background: #eaf1ff; }
.badge.blocked { color: var(--bad); background: #fff0ee; }
.read-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  border: 1px solid transparent;
  border-radius: 999px;
  padding: 6px 10px;
  font-size: 12px;
  font-weight: 900;
  white-space: nowrap;
}
.read-pill.critical {
  color: #9f1239;
  background: #fff1f2;
  border-color: #fecdd3;
}
.read-pill.focus {
  color: #92400e;
  background: #fffbeb;
  border-color: #fde68a;
}
.read-pill.skim {
  color: #166534;
  background: #ecfdf3;
  border-color: #bbf7d0;
}
.read-pill.follow {
  color: #1d4ed8;
  background: #eff6ff;
  border-color: #bfdbfe;
}
.headline-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.advice-reason {
  color: var(--muted);
  font-size: 12px;
  font-style: italic;
}
.reading-guide {
  margin-top: 16px;
}
.guide-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 14px;
  margin-bottom: 12px;
}
.guide-head h2 { margin: 0; }
.guide-head span {
  color: var(--muted);
  font-size: 13px;
}
.guide-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
}
.guide-card {
  display: grid;
  gap: 8px;
  min-width: 0;
  border: 1px solid #e5edf5;
  border-left: 4px solid var(--accent);
  border-radius: var(--radius-sm);
  padding: 12px;
  background: linear-gradient(180deg, #fff, #fbfcfe);
}
.guide-card.critical { border-left-color: #e11d48; }
.guide-card.focus { border-left-color: #d97706; }
.guide-card.skim { border-left-color: #16a34a; }
.guide-card.follow { border-left-color: #2563eb; }
.guide-card a {
  color: var(--ink);
  font-weight: 900;
  text-decoration: none;
}
.guide-card a:hover { color: var(--accent); }
.guide-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}
.guide-reason {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.45;
}
.card-body {
  display: none;
  border-top: 1px solid #edf0f5;
  padding: 0 18px 18px;
}
.card.open .card-body { display: block; }
.grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
  margin-top: 14px;
}
.field {
  border: 1px solid #edf0f5;
  background: #fbfcfe;
  border-radius: var(--radius-sm);
  padding: 12px;
}
.field strong {
  display: block;
  color: var(--muted);
  font-size: 12px;
  margin-bottom: 5px;
}
.field-body {
  overflow-wrap: anywhere;
  white-space: pre-wrap;
}
.overview-content {
  overflow-wrap: anywhere;
  white-space: pre-wrap;
  color: var(--ink);
}
.comment {
  border-left: 3px solid var(--accent-2);
  padding: 10px 12px;
  background: #fffaf2;
  border-radius: var(--radius-sm);
  margin-top: 10px;
  overflow-wrap: anywhere;
  white-space: pre-wrap;
}
.pr-readout {
  display: grid;
  grid-template-columns: minmax(0, 1fr);
  gap: 18px;
  align-items: start;
  padding-top: 18px;
}
.pr-story {
  display: grid;
  gap: 16px;
  min-width: 0;
}
.story-block {
  border-top: 1px solid #e7edf4;
  padding-top: 14px;
}
.story-block:first-child {
  border-top: 0;
  padding-top: 0;
}
.story-block.hero-block {
  border: 1px solid #dce9e7;
  border-left: 4px solid var(--accent);
  border-radius: var(--radius-md);
  padding: 15px 16px;
  background: linear-gradient(180deg, #fbfffe, #f8fbfd);
}
.story-block h4,
.review-rail h4,
.comments-panel h4 {
  margin: 0 0 9px;
  color: #17202a;
  font-size: 14px;
  letter-spacing: 0;
}
.story-line {
  display: grid;
  grid-template-columns: 108px minmax(0, 1fr);
  gap: 12px;
  margin: 0;
  padding: 9px 0;
  border-top: 1px solid #edf2f7;
  color: #1f2937;
  line-height: 1.68;
}
.story-line:first-of-type {
  border-top: 0;
  padding-top: 0;
}
.story-label {
  color: #536175;
  font-size: 12px;
  font-weight: 850;
}
.story-text {
  min-width: 0;
  overflow-wrap: anywhere;
  white-space: pre-wrap;
}
.review-rail {
  position: static;
  display: grid;
  gap: 14px;
  align-self: start;
}
.reading-callout {
  display: grid;
  gap: 6px;
  border: 1px solid #e5edf5;
  border-left: 4px solid var(--accent);
  border-radius: var(--radius-sm);
  padding: 12px;
  background: #fff;
}
.reading-callout.critical {
  border-left-color: #e11d48;
  background: linear-gradient(180deg, #fff7f8, #fff);
}
.reading-callout.focus {
  border-left-color: #d97706;
  background: linear-gradient(180deg, #fffbeb, #fff);
}
.reading-callout.skim {
  border-left-color: #16a34a;
  background: linear-gradient(180deg, #f0fdf4, #fff);
}
.reading-callout.follow {
  border-left-color: #2563eb;
  background: linear-gradient(180deg, #eff6ff, #fff);
}
.reading-callout strong {
  font-size: 13px;
}
.reading-callout span {
  color: var(--muted);
  font-size: 12px;
  font-style: italic;
  line-height: 1.5;
}
.story-text mark,
.fact dd mark,
.field-body mark,
.card-summary mark,
.overview-content mark,
.comment mark,
.skip-detail mark {
  border-radius: 5px;
  padding: 0 4px;
  font-weight: 850;
}
.mark-good {
  color: #166534;
  background: #dcfce7;
}
.mark-warn {
  color: #92400e;
  background: #fef3c7;
}
.mark-bad {
  color: #9f1239;
  background: #ffe4e6;
}
.mark-info {
  color: #1d4ed8;
  background: #dbeafe;
}
.fact-list {
  display: grid;
  gap: 10px;
  margin: 0;
  padding: 0;
}
.fact {
  border-top: 1px solid #e7edf4;
  padding-top: 10px;
}
.fact:first-child {
  border-top: 0;
  padding-top: 0;
}
.fact dt {
  margin: 0 0 4px;
  color: #536175;
  font-size: 11px;
  font-weight: 850;
  letter-spacing: 0;
  text-transform: uppercase;
}
.fact dd {
  margin: 0;
  color: #1f2937;
  line-height: 1.55;
  overflow-wrap: anywhere;
  white-space: pre-wrap;
}
.comments-panel {
  border-top: 1px solid #e7edf4;
  padding-top: 14px;
}
.comment-list {
  display: grid;
  gap: 10px;
}
.skip-groups { display: grid; gap: 14px; margin-top: 12px; }
.skip-group {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.skip-group-head {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 14px;
  padding: 15px 16px;
  cursor: pointer;
  background: #fbfcfe;
}
.skip-group-title { margin: 0; font-size: 16px; }
.skip-group-count {
  color: var(--info);
  background: #eaf1ff;
  border-radius: 999px;
  padding: 5px 10px;
  font-weight: 800;
  font-size: 12px;
}
.skip-group-body { display: none; border-top: 1px solid #edf0f5; }
.skip-group.open .skip-group-body { display: block; }
.skip-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(170px, 0.7fr);
  gap: 12px;
  padding: 13px 16px;
  border-bottom: 1px solid #edf0f5;
}
.skip-row:last-child { border-bottom: 0; }
.skip-title { font-weight: 750; }
.skip-detail { color: var(--muted); font-size: 13px; margin-top: 4px; }
.blocker-list {
  display: grid;
  gap: 8px;
  margin: 8px 0 0;
  padding: 0;
  list-style: none;
}
.blocker-item {
  border: 1px solid #e5edf5;
  border-left: 3px solid var(--warn);
  border-radius: var(--radius-sm);
  padding: 9px 10px;
  background: #fff;
}
.blocker-item a {
  color: var(--accent);
  font-weight: 800;
}
.blocker-meta {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.45;
  margin-top: 4px;
}
.empty {
  border: 1px dashed var(--line);
  border-radius: 8px;
  padding: 22px;
  color: var(--muted);
  text-align: center;
  background: rgba(255, 255, 255, 0.68);
}
.footer {
  color: var(--muted);
  font-size: 12px;
  margin-top: 22px;
}
body {
  font-size: 14px;
}
a:hover { color: #0a5d57; }
.shell { max-width: 1280px; padding: 24px 20px 64px; }
.topbar {
  align-items: center;
  background:
    linear-gradient(135deg, var(--accent-soft), rgba(37, 99, 235, 0.04)),
    var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 22px 24px;
  box-shadow: var(--shadow-lg);
}
.subtitle { max-width: 860px; font-size: 14px; }
.toggle { box-shadow: none; }
.toggle button { padding: 7px 12px; }
.metrics {
  grid-template-columns: repeat(5, minmax(140px, 1fr));
  gap: 10px;
  margin: 16px 0;
}
.metric {
  position: relative;
  overflow: hidden;
  padding: 14px 16px;
}
.metric::before {
  content: "";
  position: absolute;
  inset: 0 auto 0 0;
  width: 4px;
  background: var(--accent);
}
.metric .value { font-size: 30px; }
.metric .label {
  margin-top: 6px;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
}
.dashboard {
  grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr);
}
.panel {
  box-shadow: var(--shadow);
  padding: 18px;
}
.panel h2 {
  font-size: 15px;
  letter-spacing: 0;
}
.bar-row {
  grid-template-columns: 112px 1fr 32px;
  padding: 4px 0;
}
.bar-label { font-weight: 700; }
.bar-track { height: 9px; background: #edf2f7; }
.timeline-item {
  grid-template-columns: 74px 1fr;
  padding: 9px 0;
}
.time {
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  font-size: 12px;
}
.overview-content {
  background: var(--soft);
  border: 1px solid #e7edf4;
  border-radius: 8px;
  padding: 14px;
}
.controls {
  position: sticky;
  top: 0;
  z-index: 20;
  background: rgba(244, 246, 248, 0.88);
  backdrop-filter: blur(14px);
  border: 1px solid rgba(220, 227, 236, 0.86);
  border-radius: 8px;
  padding: 10px;
  margin: 18px 0 14px;
  box-shadow: var(--shadow);
}
.search {
  min-height: 40px;
  border-color: #cfd8e3;
  box-shadow: inset 0 1px 0 rgba(15, 23, 42, 0.02);
}
.search:focus {
  outline: 2px solid rgba(15, 118, 110, 0.22);
  border-color: var(--accent);
}
.chips { align-items: center; }
.chip, .utility-button {
  min-height: 34px;
  border: 1px solid #cfd8e3;
  background: #fff;
  border-radius: 999px;
  color: var(--ink);
  cursor: pointer;
  font: inherit;
  font-weight: 750;
  padding: 7px 11px;
}
.chip:hover, .utility-button:hover { border-color: #9aa8bb; }
.chip.active {
  background: #15202b;
  border-color: #15202b;
  color: #fff;
}
.utilities {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-left: auto;
}
.utility-button {
  color: var(--muted);
  font-size: 12px;
}
.section-heading {
  margin: 24px 0 12px;
  padding-top: 2px;
}
.section-heading h2 { font-size: 18px; }
.cards { gap: 14px; }
.card {
  border-left: 0;
  box-shadow: var(--shadow);
  transition: box-shadow 160ms ease, transform 160ms ease, border-color 160ms ease;
}
.card:hover {
  border-color: #c8d2df;
  box-shadow: var(--shadow-lg);
}
.card-head {
  align-items: center;
  background: linear-gradient(180deg, #fff, #fbfcfe);
  border-left: 4px solid var(--accent);
}
.card[data-status="approved"] .card-head,
.card[data-status="merged"] .card-head { border-left-color: var(--ok); }
.card[data-status="commented"] .card-head { border-left-color: var(--accent-2); }
.card[data-status="maintained"] .card-head { border-left-color: var(--accent); }
.card[data-status="skipped"] .card-head { border-left-color: var(--info); }
.card[data-status="blocked"] .card-head { border-left-color: var(--bad); }
.card.priority-critical .card-head {
  background: linear-gradient(180deg, #fff7f8, #fff);
}
.card.priority-focus .card-head {
  background: linear-gradient(180deg, #fffbeb, #fff);
}
.card.priority-follow .card-head {
  background: linear-gradient(180deg, #eff6ff, #fff);
}
.card-title {
  font-size: 16px;
  line-height: 1.42;
}
.meta {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 7px;
}
.badge {
  gap: 7px;
  min-width: 0;
  padding: 6px 11px;
  text-transform: none;
  white-space: nowrap;
}
.card-summary {
  color: #526173;
  margin-top: 9px;
}
.badge::before {
  content: "";
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: currentColor;
}
.card-body {
  background: #fff;
  padding: 0 18px 18px;
}
.grid {
  grid-template-columns: 1fr;
  gap: 10px;
}
.field {
  background: #fbfcfe;
  border-color: #e6ecf3;
  padding: 13px 14px;
}
.field strong {
  color: #536175;
  font-size: 11px;
  letter-spacing: 0;
  text-transform: uppercase;
}
.field-body {
  color: #1f2937;
  line-height: 1.62;
}
.comment {
  background: #fff8ed;
  border-left-color: var(--accent-2);
  color: #1f2937;
}
.pr-readout {
  grid-template-columns: minmax(0, 1fr);
  gap: 18px;
}
.story-block {
  border-top-color: #e2e8f0;
}
.story-block.hero-block {
  background: linear-gradient(180deg, #fbfffe, #f7fbfa);
  border-color: #d5e7e4;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
}
.story-block h4,
.review-rail h4,
.comments-panel h4 {
  font-size: 13px;
  font-weight: 900;
}
.story-line {
  grid-template-columns: 116px minmax(0, 1fr);
  border-top-color: #e9eef5;
}
.story-label {
  color: #607086;
}
.review-rail {
  border: 1px solid #e3eaf2;
  border-radius: 8px;
  padding: 14px;
  background: #fbfcfe;
}
.review-rail .fact-list {
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
}
.fact {
  border-top-color: #e8eef5;
}
.comments-panel {
  border-top-color: #e2e8f0;
}
.comment-list {
  gap: 12px;
}
.skip-group {
  box-shadow: var(--shadow);
}
.skip-group-head {
  align-items: center;
  background: linear-gradient(180deg, #fff, #fbfcfe);
}
.skip-row {
  grid-template-columns: minmax(0, 1.15fr) minmax(220px, 0.85fr);
}
.blocker-item {
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.75);
}
.empty {
  background: #fff;
  box-shadow: var(--shadow);
}
@media (max-width: 840px) {
  .topbar, .card-head { grid-template-columns: 1fr; display: grid; }
  .card-actions { align-items: flex-start; flex-direction: row; flex-wrap: wrap; }
  .dashboard, .grid, .metrics { grid-template-columns: 1fr; }
  .guide-grid { grid-template-columns: 1fr; }
  .headline-row { align-items: flex-start; flex-direction: column; }
  .pr-readout { grid-template-columns: 1fr; }
  .review-rail { position: static; }
  .story-line { grid-template-columns: 1fr; gap: 4px; }
  .timeline-item { grid-template-columns: 1fr; }
  .controls { position: static; }
  .utilities { width: 100%; margin-left: 0; }
  .utility-button { flex: 1 1 auto; }
  .skip-row { grid-template-columns: 1fr; }
}
</style>
</head>

  <section class="cards" id="followUpCards"></section>
  <div class="footer" id="footer"></div>
</div>

const reportData = {"approved":[{"alternative_designs":"也可以在 schema 层提前规范化所有参数，或对复杂对象做 JSON 编码。当前选择更局部，兼容已有路径参数语义，并避免把对象塞进 header/cookie。","api_surface":"无新增导出 API。内部 helper `paramValueToString` 为未导出函数。用户可见行为改变：OpenAPI 工具现在会发送非字符串标量 query/header/cookie 参数。","approach":"新增 `paramValueToString`，只把 JSON 标量类型转换为字符串，并在 `makeRequestURL`、`makeRequestHeaders`、`makeRequestCookies` 中复用；map/slice 等非标量继续跳过，避免把复杂结构序列化成不可预期字符串。","attention_points":"注意 OpenAPI style/explode 的复杂序列化仍不是本 PR 目标。","author":"Fromsko","behavior_impact":"模型传 `limit: 200` 后，请求 URL 会包含 `?limit=200`，header/cookie 中的 bool/int 也会保留。","change_inventory":"新增 JSON 标量转字符串 helper；更新 URL query、HTTP header、cookie 构造；补充 int/bool/float64 以及非标量跳过的测试。","ci_state":"最终复核时所有 checks 绿色，review threads 为 0。","cross_module_impact":"不影响 schema 解析、body marshaling 或 path 参数逻辑；与 path 参数行为更一致。","design_assessment":"设计贴近问题本身，是合理的局部最优。它把框架边界从“只收 string”提升到“接受 JSON 标量”，同时保留非标量防护。","module_impact":"直接影响 OpenAPI tool。间接影响所有用模型 JSON 参数驱动 REST API 的 agent。","modules":"`tool/openapi/tool.go` 请求构造；`tool/openapi/tool_test.go` 单元测试。","number":1849,"outcome":"子审查无发现；CI 全绿；已提交 `LGTM` 审批并 squash merge。","problem":"PR 修复 OpenAPI 工具在 query、header、cookie 参数上只接受 string 的问题。旧行为会让 `{limit: 200, page: 1}` 这类模型参数在构造 URL 时消失，分页、过滤、认证相关参数都可能不生效。","problem_framing":"根因是参数层把“HTTP 需要字符串”误实现成“调用方必须已经传字符串”。对 LLM tool-call 来说，调用方自然传 JSON 标量，框架应负责做边界转换。","risk":"剩余风险低，主要是复杂参数序列化仍按旧策略处理。","root_cause":"query/header/cookie 的处理和 path 参数不一致；path 参数已有字符串化逻辑，其他位置仍用 type assertion 过滤。","semantic_changes":"之前非 string 参数被忽略；之后 string、bool、整数、浮点数会按十进制/布尔文本发送。兼容性风险较低，但某些之前依赖“传非 string 即跳过”的调用会改变行为。","status":"merged","technical_background":"OpenAPI tool 会把模型给出的 JSON 参数转成 HTTP 请求。JSON 解码后，数字通常是 float64，布尔值是 bool；如果请求构造只接受 string，query/header/cookie 参数会被悄悄丢掉。","tests_docs":"测试覆盖 query/header/cookie 的标量转换和非标量跳过；未改 docs。","title":"fix(openapi): coerce non-string query/header/cookie params to strings","tradeoffs":"局部转换改动面小、风险低；代价是只覆盖 query/header/cookie，不改变 body 或更复杂 OpenAPI serialization 风格。","url":"https://github.com/trpc-group/trpc-agent-go/pull/1849"},{"alternative_designs":"也可以改 runner 全局拦截 final，或只靠 prompt 提示模型自律。全局拦截会影响所有 agent，prompt-only 不可靠；extension 方案更可组合。","api_surface":"新增导出包 `agent/extension/todoenforcer`、`New`、Options/Option、事件/原因类型、`WithMaxRetries` 等配置；`tool/todo.Tool.StateKeyPrefix()` 新增导出方法。新增工具名 `todo_declare_blocker`。","approach":"新增 Enforcer extension：注册 `todo_write` 和 `todo_declare_blocker`；AfterModel 检查当前 invocation 的 open todo，必要时把 Done 改为 false；BeforeModel 在下一轮注入 nudge；blocker 工具允许模型声明外部阻塞并放行后续 final；提供 retry 上限和 observer。","attention_points":"使用方需要理解这是硬约束，适合任务执行 agent，不一定适合闲聊型 agent。","author":"bytethm","behavior_impact":"用户安装 extension 后，模型必须完成待办或调用 blocker 工具才能结束。","change_inventory":"新增 enforcement 状态管理、nudge 格式化、blocker 工具、测试；示例展示 LLMAgent 安装 extension 后的真实流程。","ci_state":"最终复核时所有 checks 绿色，review threads 为 0。","cross_module_impact":"与 session state、tool registry、BeforeModel/AfterModel callback、examples/docs 协作；不改变普通 todo 工具默认行为。","design_assessment":"设计符合 extension 边界，职责清晰。它没有侵入 runner 全局语义，把强制策略局部化到安装该 extension 的 agent。","module_impact":"直接影响 LLMAgent extension、todo tool、模型回调生命周期；间接影响使用 todoenforcer 的 runner 循环长度和最终回答时机。","modules":"新增 `agent/extension/todoenforcer/*`；更新 `tool/todo/todo.go` 以暴露 state prefix；新增 `examples/todoenforcer`；更新中英文 tool docs。","number":1806,"outcome":"子审查无发现；CI 全绿；已提交 `LGTM` 审批并 squash merge。","problem":"PR 新增 `agent/extension/todoenforcer`，解决模型提前结束任务的问题。旧 `todo_write` 工作流只能记录列表，模型仍可能忽略 pending/in-progress todo 并输出 final。","problem_framing":"根因不是缺少 todo 数据结构，而是缺少把 todo 状态接入模型生命周期的硬约束。真正需要控制的是模型 final response 的 `Done` 语义。","risk":"剩余风险低；主要是模型在复杂 blocker 场景下的提示策略仍需真实流量观察。","root_cause":"待办状态存储在 session state 中，但 final response 通过 runner/flow 正常结束，没有检查 open todo。","semantic_changes":"安装该 extension 后，有 open todo 的 final response 会被改为非 Done 并继续循环；声明 blocker 后同一 invocation 放行；不安装时无行为变化。","status":"merged","technical_background":"Extension 是挂在 LLMAgent 上的扩展点，可以注册工具和 BeforeModel/AfterModel 回调。`tool/todo` 原本只是让模型维护待办列表，不能阻止模型带着未完成任务直接给最终答案。TodoEnforcer 把待办从“提醒”升级成“运行时约束”：模型最终回答前必须完成待办或声明客观 blocker。","tests_docs":"新增 enforcer、format、state、tools 单元测试；新增示例 README/main.go；更新中英文文档。","title":"agent/extension/todoenforcer: add hard TODO compliance extension","tradeoffs":"硬约束提高完成度，但可能增加模型回合数；retry budget 防止死循环，blocker 工具提供退出通道。","url":"https://github.com/trpc-group/trpc-agent-go/pull/1806"}],"blocked":[],"commented":[{"alternative_designs":"也可以只补 README 或 examples；mkdocs 页面更适合成为官方入门入口。","api_surface":"文档层用户可见入口新增 Prompt Template 页面；无代码 API 改动。","approach":"新增 `docs/mkdocs/en/prompt.md`、`docs/mkdocs/zh/prompt.md`，并在 `docs/mkdocs.yml` 的英文/中文导航中加入 Prompt Template。","attention_points":"两个 Langfuse 示例使用 `time.Minute` 但 import block 缺少 `time`；另有 CodeRabbit 指出中文 agent placeholder 链接缺少 anchor。","author":"yu-xin-c","behavior_impact":"用户更容易发现 prompt 包并复制示例。","change_inventory":"新增 2 个文档页面和导航项。","ci_state":"最终复核 CI 绿色；仍有 3 个 unresolved threads，其中 2 个是本轮评论。","cross_module_impact":"文档引用 LLMAgent、Langfuse provider、prompt resolver。","design_assessment":"方向合理；发现的缺陷是 Langfuse 示例 import 不完整。","inline_comments":[{"body":"This snippet uses `time.Minute`, but the import block does not import `time`, so copying the example fails to compile. Add `\"time\"` to the import list or replace the TTL expression with one that does not need an extra import.\n\n<details><summary>中文<\/summary>\n这段示例使用了 `time.Minute`，但上面的 import 块没有导入 `time`，用户复制后会编译失败。请在 import 列表中补充 `\"time\"`，或改成不需要额外导入的 TTL 写法。\n<\/details>","focus":"文档示例可编译性","line":184,"path":"docs/mkdocs/en/prompt.md","severity":"P2"},{"body":"This snippet uses `time.Minute`, but the import block does not import `time`, so copying the example fails to compile. Add `\"time\"` to the import list or replace the TTL expression with one that does not need an extra import.\n\n<details><summary>中文<\/summary>\n这段示例使用了 `time.Minute`，但上面的 import 块没有导入 `time`，用户复制后会编译失败。请在 import 列表中补充 `\"time\"`，或改成不需要额外导入的 TTL 写法。\n<\/details>","focus":"文档示例可编译 re/sqlitevec/go.mod)=IN_PROGRESS, check external consumer (model/gemini/go.mod)=IN_PROGRESS ... 另有 83 项。","cross_module_impact":"与 session.Ingestor、Runner plugins、LLMAgent tools、docs/examples 协作。","design_assessment":"整体架构合理，但首轮实现的并发和 timestamp 游标边界有真实风险；作者已推新 commit 修复本轮指出的问题。","inline_comments":[{"body":"`scanTranscript` reads `sess.Events` without the session event lock, while session services append under `EventMu`, so overlapping runs or manual ingests can race with slice growth. Take `sess.EventMu.RLock()` for the scan or snapshot with `sess.GetEvents()` before iterating.\n\n<details><summary>中文<\/summary>\n`scanTranscript` 没有拿 session 事件锁就读取 `sess.Events`，而 session service 追加事件时会使用 `EventMu`，因此重叠运行或手动并发 ingest 可能和 slice 扩容发生数据竞争。请在扫描时持有 `sess.EventMu.RLock()`，或先用 `sess.GetEvents()` 做快照后再遍历。\n<\/details>","focus":"并发安全","line":33,"path":"memory/tencentdb/session_scan.go","severity":"P1"},{"body":"This still allows multiple capture jobs for the same `sessionKey` to run concurrently when `WithIngestWorkers` is greater than one, so cursor updates can complete out of order. Keep per-session capture FIFO, or only advance `lastCaptureAt` in order after all earlier jobs for that session have succeeded.\n\n<details><summary>中文<\/summary>\n当 `WithIngestWorkers` 大于 1 时，同一个 `sessionKey` 仍然可能有多个 capture job 并发执行，导致游标更新乱序。请按 session 保持 FIFO capture，或只在该 session 更早的 job 都成功后再按顺序推进 `lastCaptureAt`。\n<\/details>","focus":"同 session capture 顺序","line":226,"path":"memory/tencentdb/service.go","severity":"P1"},{"body":"`normalizeGatewayMessageTimestamps` generates each batch from wall-clock time independently, but the gateway filters later captures with a strict timestamp cursor. Keep a per-session synthetic timestamp cursor so every generated message timestamp is greater than the last one sent for that session.\n\n<details><summary>中文<\/summary>\n`normalizeGatewayMessageTimestamps` 每个批次都独立按当前墙钟生成时间戳，但 gateway 后续 capture 会用严格的时间戳游标过滤。请维护每个 session 的合成时间戳游标，确保每条新生成的消息时间戳都大于该 session 上一次发送的时间戳。\n<\/details>","focus":"gateway timestamp cursor","line":69,"path":"memory/tencentdb/session_scan.go","severity":"P1"}],"module_impact":"直接影响 memory 集成和 runner plugin 使用者；间接依赖 session state/event 安全读写。","modules":"memory/tencentdb/*；examples/memory/tencentdb；docs/mkdocs/en/memory.md；docs/mkdocs/zh/memory.md；examples/memory/README.md。","number":1859,"outcome":"提交 3 条行级评论；作者修复后已验证并 resolve 相关 threads；因新 head CI 仍在跑，未审批、未合并。","problem":"PR 新增 TencentDB Agent Memory adapter，让 tRPC-Agent-Go 可以把会话轮次捕获到 TencentDB gateway，并通过插件和原生工具做自动 recall/search。","problem_framing":"这是跨进程记忆引擎接入问题。直接连存储层不够，因为记忆抽取和召回逻辑在 SDK/gateway 里，Go 框架需要提供稳定的生命周期适配层。","risk":"CI 尚未对新 head 完成；仍需等完整 matrix 绿色后再决定是否审批。","root_cause":"现有内置 memory 后端无法复用 TencentDB Agent Memory 的 L0-L3 pipeline；需要一个 session ingest + recall plugin + tool surface 的组合。","semantic_changes":"安装该 memory service 后，Runner 可异步把会话发送给 gateway，并在模型调用前注入 recall；未使用该包时无行为变化。","status":"commented","technical_background":"Memory 集成把会话内容转成长期记忆，再在后续模型请求前召回相关上下文。TencentDB Agent Memory 的记忆提取、存储、召回运行在 gateway sidecar 中，Go 侧通过 session.Ingestor 异步发送 transcript，并通过 Runner plugin 注入 recall 结果。异步 ingest 的难点是游标、session state、worker 并发和外部 gateway 的时间戳过滤必须保持一致。","tests_docs":"新增 service/client/tool/scan/recall 测试；新增真实 gateway 示例；更新 docs。","title":"memory/tencentdb: add TencentDB Agent Memory integration","tradeoffs":"异步 capture 减少模型请求延迟，但需要处理重复发送、乱序完成、失败回退和 gateway timestamp cursor。","url":"https://github.com/trpc-group/trpc-agent-go/pull/1859"},{"alternative_designs":"可以要求所有后端都实现 search，或只给 search 后端提供 on-demand。当前按能力拆分更渐进，迁移成本低。","api_surface":"新增/使用 `WindowService` 能力；`session_load` schema 文案改为可从任意来源获得 event_id；无破坏性导出变更。","approach":"新增 `session.WindowService` 实现和共享窗口语义；LLMAgent 根据 `SupportsSearch`/`SupportsLoad` 分别注入 `session_search`/`session_load`；processor 注入对应能力说明。","attention_points":"作者已修复工具描述不再绑定 session_search。","author":"Rememorio","behavior_impact":"模型可在已知 event_id 时直接加载周边原始历史，即使后端不支持搜索。","change_inventory":"新增窗口查询实现、共享测试、按能力 Agent 交互历史的核心对象。Runner 会把用户消息、模型输出、工具调用和工具结果写成 event，再由后续请求把这些 event 投影成模型上下文。当历史变长时，框架会用 summary、history limit、context compaction 或按需加载工具减少输入 token。理解这些 PR 时，关键是区分“框架保存的完整历史”和“当前模型请求里实际可见的压缩历史”：前者影响恢复能力，后者影响模型能否正确继续任务。 WindowService 是按 anchor event_id 加载附近原始消息的能力，常用于 summary/context compaction 之后精确恢复被隐藏的历史。","tests_docs":"新增多后端 window 测试、processor/agent gating 测试，更新中英文 summary docs。","title":"session: add portable event window loading","tradeoffs":"load-only 模式让模型必须已知 event_id；因此工具描述和 system overview 必须避免继续要求先 search。","url":"https://github.com/trpc-group/trpc-agent-go/pull/1856"},{"alternative_designs":"可以让用户自定义完整 compaction callback，或在工具层声明 policy。当前 option 配置简单，但对 ToolName 推断作用域更敏感。","api_surface":"新增导出 `llmagent.ToolResultCompactionConfig`、`ToolResultCompactionSkipRecentFunc`、`WithToolResultCompactionConfig`；新增 processor content options。","approach":"新增 `ToolResultCompactionConfig`，从 LLMAgent option 接到 processor；compaction pipeline 新增 force-clean、keep 规则、recent skip；补 docs 和真实模型 example。","attention_points":"本轮评论指出 ToolName 推断应在过滤后或按 request/invocation/branch 分组。","author":"Rememorio","behavior_impact":"用户可强制清理 shell/grep 等噪声工具，或保留 session_load/search 等恢复工具输出。","change_inventory":"新增 force-clean/keep/skip recent 配置和测试；新增示例；更新中英文文档。","ci_state":"最终复核 CI 绿色；仍有 1 个本轮 unresolved thread。","cross_module_impact":"与 session event 过滤、branch/request/invocation scope、tool-call/result pairing、docs/examples 相关。","design_assessment":"功能方向合理，但当前在全 session 范围内推断缺失 ToolName，早于 timeline/branch 过滤，可能让策略误作用。","inline_comments":[{"body":"Inferring missing `ToolName` over the whole session before timeline/branch filtering can consume a pending tool call from another request or branch that reused the same `ToolID`, so `KeepToolNames` / `ForceCleanToolNames` can be applied to the wrong result or skipped. Resolve names only on the filtered projection and apply the same scoping in `hasCompactedCurrentInvocationToolResults`, or key the resolver by request/invocation/branch before policy checks.\n\n<details><summary>中文<\/summary>\n在 timeline/branch 过滤之前对整个 session 推断缺失的 `ToolName`，可能会先消费另一个 request/branch 中复用相同 `ToolID` 的 pending tool call，导致 `KeepToolNames` / `ForceCleanToolNames` 作用到错误结果或漏生效。建议只在已过滤的投影上推断名称，`hasCompactedCurrentInvocationToolResults` 也同样按作用域处理，或在策略检查前按 request/invocation/branch 给 resolver 分组。\n<\/details>","focus":"工具名推断作用域","line":905,"path":"internal/flow/processor/content.go","severity":"P1"}],"module_impact":"影响 LLMAgent 请求处理、context compaction、summary retry、工具结果历史投影。","modules":"agent/llmagent options/wiring；internal/flow/processor context compaction；examples/context_compaction；session docs。","number":1843,"outcome":"提交 1 条行级评论；作者尚未修复；未审批、未合并。","problem":"PR 新增按工具名的 force-clean/keep 规则，以及 SkipRecentFunc 控制哪些 tail events 免受历史压缩。","problem_framing":"根本问题是“所有工具结果一刀切压缩”太粗糙：有些工具输出噪声大应强制清理，有些恢复工具输出必须保留。","risk":"在 scoped timeline/branch 下可能 keep/force-clean 错误工具结果，严重时泄露本应 force-clean 的输出。","root_cause":"原 context compaction 主要按 token 阈值和历史/当前位置判断，缺少业务层工具策略。","semantic_changes":"启用配置后，指定工具结果可能被提前替换为 policy placeholder，keep 工具结果可绕过历史压缩；Pass2 仍可截断 oversized recent/current。","status":"commented","technical_background":"Context compaction 会在模型请求前压缩过长的工具结果，避免历史工具输出耗尽上下文窗口。工具结果通常通过 `ToolID` 和 assistant tool-call 配对；某些 provider 只在 result 上保留 ToolID，不保留 ToolName，因此按工具名 keep/force-clean 时需要从配对 call 推断名称。","tests_docs":"新增大量 processor/option tests 和 context_compaction example。","title":"agent: add tool result compaction controls","tradeoffs":"工具名配置易用；缺点是需要可靠的 ToolID/ToolName 关联，尤其在分支和 scoped timeline 下。","url":"https://github.com/trpc-group/trpc-agent-go/pull/1843"},{"alternative_designs":"可以把所有 partial 都写 session，或完全不持久化取消输出。前者污染历史，后者丢上下文；合成 final-like event 是折中。","api_surface":"无明显新增用户配置；新增 runner extension metadata key `trpc_agent.runner.interrupted_assistant` 属于事件扩展可见行为。","approach":"记录可见 assistant delta，取消时用 WithoutCancel + timeout 写入合成 event；用 response ID/signature 去重；runner completion 也改用 bounded detached context。","attention_points":"本轮 2 个问题已被作者修复：accumulator 按 first-seen sequence 持久化；plugin-mutated synthesized event 在 append 前再次去重。","author":"Rememorio","behavior_impact":"用户中断模型输出后，下一轮仍能看到已输出的 assistant 文本。","change_inventory":"新增 interrupted assistant accumulator、取消时持久化、session persistence context、去重逻辑和大量 tests；更新 docs。","ci_state":"最终复核 head=2f4f2e6；最终复核仍有 21 个非绿色/未完成检查：check examples build script (3/4)=QUEUED, check examples (1/4)=QUEUED, discover go modules=QUEUED, e2e test=QUEUED, lint=QUEUED ... 另有 16 项。","cross_module_impact":"与 plugins OnEvent、graph completion、session routing、event identity、docs 相关。","design_assessment":"设计方向正确；本轮发现的多 accumulator 顺序和 plugin 前后签名去重问题，作者已推新 commit 修复。","inline_comments":[{"body":"Persisting interrupted buffers by sorted map key can reorder assistant turns relative to the actual stream, so later session history may not match what was observed. Track a first-seen sequence on each accumulator and persist by that order, with the key only as a deterministic tie-breaker.\n\n<details><summary>中文<\/summary>\n按 map key 排序持久化 interrupted buffer 会把 assistant turn 顺序改成字典序，而不是实际流式事件顺序，后续 session history 可能和用户实际看到的顺序不一致。建议在 accumulator 上记录首次出现的序号，并按该序号持久化，key 只作为确定性的兜底排序。\n<\/details>","focus":"取消持久化顺序","line":1740,"path":"runner/runner.go","severity":"P1"},{"body":"This dedupe check compares pre-plugin interrupted choices against signatures recorded from post-plugin persisted finals, so ID-less responses can duplicate when an `OnEvent` plugin mutates assistant content. Store the pre-plugin final signature too, or dedupe the plugin-mutated synthesized event before `AppendEvent`.\n\n<details><summary>中文<\/summary>\n这里用的是 plugin 前的 interrupted choices 做去重，但已持久化 final 的 signature 是 plugin 后记录的；对于没有 response ID 的响应，只要 `OnEvent` 改写了 assistant 内容，就可能在取消时重复写入同一段 assistant。建议同时记录 plugin 前的 final signature，或在 `AppendEvent` 前对 plugin 后的合成事件再做去重。\n<\/details>","focus":"插件改写后的去重","line":1797,"path":"runner/runner.go","severity":"P1"}],"module_impact":"直接影响 runner streaming/cancellation/session persistence；间接影响下一轮模型上下文和 summary。","modules":"runner/runner.go；runner/runner_test.go；agent invocation message helpers；docs/runner。","number":1820,"outcome":"提交 2 条行级评论；作者修复后已验证并 resolve threads；因新 head CI 仍在跑，未审批、未合并。","problem":"PR 在 streamed run 被取消时，把已经可见的 assistant text 合成为非 partial event 写入 session，同时避免保存工具调用 delta 和 reasoning-only delta。","problem_framing":"这是“可见输出”和“持久化历史”不一致的问题。真正要保证的是用户看到的 assistant 内容能在下一轮被模型看到。","risk":"CI 尚未完成；取消路径复杂，建议等 runner package 和 full matrix 都绿。","root_cause":"旧 runner 只持久化正式 event；取消会让 partial 文本丢失，而取消 context 又会影响 session append。","semantic_changes":"取消后的可见 assistant 文本现在可能进入 session；工具调用/reasoning-only delta 不保存；session append 在取消后有 1s timeout。","status":"commented","technical_background":"Runner 负责消费 agent event stream、写 session、发给调用方。流式模型会先发 partial delta，最后发非 partial assistant message。取消发生在 partial 之后、final 之前时，用户已经看到的文本可能没有进入 session，后续上下文就像这段输出不存在。","tests_docs":"新增 runner 覆盖取消、去重、routing、completion 等场景；更新中英文 runner docs。","title":"runner: preserve interrupted assistant text","tradeoffs":"合成事件提高连续性，但需要处理多响应顺序、插件改写、去重和 cancellation-time append 的边界。","url":"https://github.com/trpc-group/trpc-agent-go/pull/1820"}],"follow_up":[{"author":"Rememorio","next":"等待 full matrix 绿色后可重新评估是否 LGTM；本轮不合并，因为曾收到行级 findings。","number":1859,"reason":"本轮评论已修复并 resolve，但新 head CI 仍在跑。","title":"memory/tencentdb: add TencentDB Agent Memory integration","url":"https://github.com/trpc-group/trpc-agent-go/pull/1859"},{"author":"Rememorio","next":"等待 CI/codecov 重新完成后再决定审批；本轮不合并。","number":1856,"reason":"工具描述问题已修复并 resolve，但新 head CI 仍在跑。","title":"session: add portable event window loading","url":"https://github.com/trpc-group/trpc-agent-go/pull/1856"},{"author":"Rememorio","next":"重点看 runner tests、full matrix 和 cancellation 路径相关回归。","number":1820,"reason":"runner 取消持久化两个问题已修复并 resolve，但新 head CI 仍在跑。","title":"runner: preserve interrupted assistant text","url":"https://github.com/trpc-group/trpc-agent-go/pull/1820"},{"author":"yu-x let lang = "zh";
let filter = "all";
const statusOrder = ["approved", "commented", "maintained", "merged", "skipped", "blocked"];

function text(value, fallback = "") {
  if (value === undefined || value === null || value === "") return fallback;
  if (typeof value === "object" && !Array.isArray(value)) {
    return value[lang] || value.zh || value.en || fallback;
  }
  return String(value);
}

function escapeHtml(value) {
  return text(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatRich(value) {
  let html = escapeHtml(value);
  const replacements = [
    [
      /(P[0-2]|codecov\/patch=FAILURE|go-apidiff=FAILURE|go-apidiff|FAILURE|失败|阻塞|不能合入|不能 merge|未合并|破坏性|breaking|unbounded|无界|绕过|丢失|重复|不稳定|风险)/gi,
      "mark-bad"
    ],
    [
      /(LGTM|已合并|已批准|squash merge|merged|approved|CI 全绿|全绿|修复有效|\bresolved\b|\bresolve\b)/gi,
      "mark-good"
    ],
    [
      /(pending|soft[- ]?CI|软门禁|follow-up|后续|关注|CodeRabbit|reviewability ledger|not_reached)/gi,
      "mark-info"
    ],
    [
      /(导出 API|\bAPI\b|兼容性|\bsession\b|\brunner\b|\bmemory\b|GraphRAG|workspace_exec|OpenAPI|\bpolicy\b|security|安全)/gi,
      "mark-warn"
    ]
  ];
  for (const [pattern, className] of replacements) {
    html = html.replace(pattern, `<mark class="${className}">$1</mark>`);
  }
  return html;
}

function prs() {
  const groups = reportData.skipped_groups || [];
  const skipped = groups.flatMap(group =>
    (group.items || []).map(item => ({
      ...item,
      status: item.status || "skipped",
      skip_reason: item.skip_reason || group.reason
    }))
  );
  return [
    ...(reportData.approved || []),
    ...(reportData.commented || []),
    ...(reportData.maintained || []),
    ...(reportData.blocked || []),
    ...skipped
  ];
}

function skippedGroups() {
  return reportData.skipped_groups || [];
}

function counts(items) {
  const result = Object.fromEntries(statusOrder.map(status => [status, 0]));
  for (const item of items) {
    const status = item.status || "skipped";
    result[status] = (result[status] || 0) + 1;
  }
  return result;
}

function setLanguage(nextLang) {
  lang = nextLang;
  document.documentElement.lang = nextLang === "zh" ? "zh-CN" : "en";
  document.querySelectorAll("[data-lang-button]").forEach(button => {
    button.classList.toggle("active", button.dataset.langButton === nextLang);
  });
  render();
}

function renderStatic() {
  document.querySelectorAll("[data-i18n]").forEach(node => {
    node.textContent = labels[lang][node.dataset.i18n];
  });
  const repo = reportData.repo || "trpc-group/trpc-agent-go";
  const generated = reportData.generated_at || "2026-05-26T11:09:59";
  document.getElementById("subtitle").textContent = labels[lang].subtitle
    .replace("{repo}", repo)
    .replace("{time}", generated);
  document.getElementById("search").placeholder = labels[lang].search;
  document.getElementById("openAll").textContent = labels[lang].expandAll;
  document.getElementById("closeAll").textContent = labels[lang].collapseAll;
  document.getElementById("footer").textContent = labels[lang].footer;
}

function renderMetrics(items) {
  const totalComments = items.reduce((sum, item) =>
    sum + ((item.inline_comments || []).length || item.comment_count || 0), 0);
  const followups = (reportData.follow_up || []).length;
  const reviewed = items.filter(item =>
    ["approved", "commented", "maintained", "merged", "blocked"].includes(item.status)
  ).length;
  const metricRows = [
    [labels[lang].total, items.length],
    [labels[lang].reviewed, reviewed],
    [labels[lang].approved, items.filter(item =>
      ["approved", "merged"].includes(item.status)).length],
    [labels[lang].comments, totalComments],
    [labels[lang].followups, followups]
  ];
  document.getElementById("metrics").innerHTML = metricRows.map(([label, value]) => `
    <div class="metric">
      <div class="value">${value}</div>
      <div class="label">${escapeHtml(label)}</div>
    </div>
  `).join("");
}

function renderBars(items) {
  const byStatus = counts(items);
  const maxCount = Math.max(1, ...Object.values(byStatus));
  document.getElementById("bars").innerHTML = statusOrder.map(status => {
    const value = byStatus[status] || 0;
    const width = Math.max(3, Math.round((value / maxCount) * 100));
    return `
      <div class="bar-row">
        <div class="bar-label">${labels[lang][status]}</div>
        <div class="bar-track"><div class="bar-fill ${status}" style="width:${width}%"></div></div>
        <strong>${value}</strong>
      </div>
    `;
  }).join("");
}

function renderTimeline() {
  const events = reportData.timeline || [];
  const container = document.getElementById("timeline");
  if (!events.length) {
    container.innerHTML = `<div class="empty">${labels[lang].empty}</div>`;
    return;
  }
  container.innerHTML = events.map(event => `
    <div class="timeline-item">
      <div class="time">${escapeHtml(event.time || "")}</div>
      <div>${escapeHtml(text(event.label || event.text || event))}</div>
    </div>
  `).join("");
}

function renderOverview() {
  const panel = document.getElementById("overviewPanel");
  const content = document.getElementById("overviewContent");
  const overview = reportData.overview || reportData.summary;
  const body = text(overview);
  if (!body) {
    panel.style.display = "none";
    content.textContent = "";
    return;
  }
  panel.style.display = "block";
  content.innerHTML = formatRich(body);
}

function renderChips() {
  const chipRows = ["all", ...statusOrder];
  document.getElementById("chips").innerHTML = chipRows.map(status => `
    <button type="button" class="chip ${filter === status ? "active" : ""}"
      data-filter="${status}">${labels[lang][status]}</button>
  `).join("");
  document.querySelectorAll("[data-filter]").forEach(button => {
    button.addEventListener("click", () => {
      filter = button.dataset.filter;
      renderCards();
      renderSkipGroups();
      renderFollowUp();
      renderChips();
    });
  });
}

function matchesSearch(item, query) {
  if (!query) return true;
  const haystack = [
    item.number,
    text(item.title),
    item.author,
    text(item.problem),
    text(item.approach),
    text(item.outcome),
    text(item.skip_reason),
    text(item.group_reason),
    text(item.readiness_audit),
    blockersSearchText(item.blockers),
    text(item.risk),
    text(item.ci_state)
  ].join(" ").toLowerCase();
  return haystack.includes(query.toLowerCase());
}

function blockersSearchText(blockers) {
  if (!Array.isArray(blockers)) return "";
  return blockers.map(blocker => {
    if (typeof blocker !== "object" || blocker === null) return text(blocker);
    return [
      blocker.kind,
      blocker.summary,
      blocker.reviewer,
      blocker.path,
      blocker.line,
      blocker.latest_response,
      blocker.verification,
      blocker.url
    ].map(value => text(value)).join(" ");
  }).join(" ");
}

function field(label, value) {
  const body = text(value);
  if (!body) return "";
  return `<div class="field"><strong>${label}</strong><div class="field-body">${formatRich(body)}</div></div>`;
}

function renderBlockers(item) {
  const blockers = Array.isArray(item.blockers) ? item.blockers : [];
  if (!blockers.length) return "";
  const rendered = blockers.map(blocker => {
    const data = typeof blocker === "object" && blocker !== null
      ? blocker
      : { summary: blocker };
    const location = [data.path, data.line ? `:${data.line}` : ""].filter(Boolean).join("");
    const meta = [
      data.kind ? blockerKindLabel(data.kind) : "",
      data.reviewer ? `reviewer: ${text(data.reviewer)}` : "",
      location,
      data.latest_response ? `latest: ${text(data.latest_response)}` : "",
      data.verification ? text(data.verification) : ""
    ].filter(Boolean).join(" · ");
    const summary = formatRich(data.summary || blocker);
    const link = data.url
      ? ` <a href="${escapeHtml(data.url)}">link</a>`
      : "";
    return `<li class="blocker-item"><div>${summary}${link}</div>${meta ? `<div class="blocker-meta">${escapeHtml(meta)}</div>` : ""}</li>`;
  }).join("");
  return `<div class="skip-detail"><strong>${labels[lang].blockerDetails}:</strong></div><ul class="blocker-list">${rendered}</ul>`;
}

function blockerKindLabel(kind) {
  return (labels[lang].blockerKinds || {})[kind] || text(kind);
}

function allPrText(item) {
  const comments = (item.inline_comments || []).map(comment => [
    comment.severity,
    comment.focus,
    comment.body,
    comment.path
  ].map(value => text(value)).join(" ")).join(" ");
  const blockers = blockersSearchText(item.blockers);
  return [
    item.status,
    item.number,
    item.title,
    item.author,
    item.problem,
    item.approach,
    item.outcome,
    item.risk,
    item.ci_state,
    item.skip_reason,
    item.readiness_audit,
    item.modules,
    item.api_surface,
    comments,
    blockers
  ].map(value => text(value)).join(" ").toLowerCase();
}

function readingAdvice(item) {
  const status = item.status || "skipped";
  const comments = item.inline_comments || [];
  const blockers = item.blockers || [];
  const body = allPrText(item);
  const hasP1 = comments.some(comment =>
    /\bP[01]\b/i.test(text(comment.severity)) ||
    /\bP[01]\b/i.test(text(comment.body))
  );
  const hasCriticalRisk = hasP1 ||
    /(security|安全|bypass|绕过|breaking|破坏性|unbounded|无界|丢失|重复|不稳定|兼容|api|go-apidiff|failure|失败|不能 merge|不能合入|race|并发)/i.test(body);
  const highImpactFeature =
    /(add|new|新增|support|支持|agent|runner|session|memory|graphrag|knowledge|openapi|workspace_exec|policy|extension|tool|graph|api)/i.test(body);

  const copy = {
    critical: {
      icon: "🔥",
      zh: "重点精读",
      en: "Deep Read",
      reasonZh: comments.length
        ? `有 ${comments.length} 条行级评论，且包含 P1/兼容/正确性/安全类风险。`
        : "包含高风险兼容性或正确性信号，需要重点复核。",
      reasonEn: comments.length
        ? `${comments.length} inline comment(s), including P1, compatibility, correctness, or security risk.`
        : "High-risk compatibility or correctness signal; review carefully."
    },
    focus: {
      icon: "🔎",
      zh: "建议细看",
      en: "Read Carefully",
      reasonZh: comments.length
        ? `有 ${comments.length} 条评论或重要设计取舍，建议看完整结论。`
        : "涉及核心模块、导出 API 或较大功能，建议细看。",
      reasonEn: comments.length
        ? `${comments.length} comment(s) or important design tradeoffs; read the full conclusion.`
        : "Core module, exported API, or larger feature; read carefully."
    },
    skim: {
      icon: "✅",
      zh: "快速略看",
      en: "Quick Skim",
      reasonZh: "风险低或改动较直接，扫结论和 CI 状态即可。",
      reasonEn: "Low risk or straightforward change; skim outcome and CI state."
    },
    follow: {
      icon: "⏳",
      zh: "只看阻塞",
      en: "Blocker Only",
      reasonZh: blockers.length
        ? `主要看 ${blockers.length} 个具体阻塞点，暂不需要读完整实现。`
        : "当前不是可合并状态，先看阻塞和后续动作。",
      reasonEn: blockers.length
        ? `Focus on ${blockers.length} concrete blocker(s); no need to read the full implementation yet.`
        : "Not merge-ready; focus on blockers and next action."
    }
  };

  let level = "skim";
  if (status === "blocked") {
    level = "follow";
  } else if (status === "commented") {
    level = hasCriticalRisk ? "critical" : "focus";
  } else if (status === "maintained") {
    level = hasCriticalRisk || highImpactFeature ? "focus" : "skim";
  } else if (status === "approved") {
    level = hasCriticalRisk || highImpactFeature ? "focus" : "skim";
  } else if (status === "merged") {
    level = highImpactFeature || hasCriticalRisk ? "focus" : "skim";
  } else if (status === "skipped") {
    level = blockers.length || /(conflict|ci|failure|失败|未回应|review)/i.test(body)
      ? "follow"
      : "skim";
  }

  const selected = copy[level];
  return {
    level,
    icon: selected.icon,
    label: lang === "zh" ? selected.zh : selected.en,
    reason: lang === "zh" ? selected.reasonZh : selected.reasonEn
  };
}

function priorityRank(level) {
  return { critical: 4, focus: 3, follow: 2, skim: 1 }[level] || 0;
}

function renderReadingGuide(items) {
  const panel = document.getElementById("readingGuidePanel");
  const container = document.getElementById("readingGuide");
  const candidates = [
    ...items.filter(item => (item.status || "skipped") !== "skipped"),
    ...(reportData.follow_up || []).map(item => ({ ...item, status: item.status || "blocked" }))
  ].map(item => ({ item, advice: readingAdvice(item) }))
    .filter(entry => entry.advice.level !== "skim")
    .sort((left, right) => priorityRank(right.advice.level) - priorityRank(left.advice.level));

  if (!candidates.length) {
    panel.style.display = "none";
    container.innerHTML = "";
    return;
  }

  panel.style.display = "block";
  container.innerHTML = candidates.slice(0, 9).map(entry => {
    const item = entry.item;
    const advice = entry.advice;
    const prText = item.number ? `#${item.number}` : "PR";
    const prLink = item.url
      ? `<a href="${escapeHtml(item.url)}">${prText} · ${escapeHtml(text(item.title))}</a>`
      : `<span>${prText} · ${escapeHtml(text(item.title))}</span>`;
    return `
      <article class="guide-card ${advice.level}">
        <div class="guide-meta">
          <span class="read-pill ${advice.level}">${advice.icon} ${escapeHtml(advice.label)}</span>
          <span class="badge ${item.status || "skipped"}">${labels[lang][item.status] || item.status || labels[lang].skipped}</span>
        </div>
        <div>${prLink}</div>
        <div class="guide-reason">${escapeHtml(advice.reason)}</div>
      </article>
    `;
  }).join("");
}

function storyLine(label, value) {
  const body = text(value);
  if (!body) return "";
  return `
    <p class="story-line">
      <span class="story-label">${escapeHtml(label)}</span>
      <span class="story-text">${formatRich(body)}</span>
    </p>
  `;
}

function storyBlock(title, rows, className = "") {
  const body = rows.filter(Boolean).join("");
  if (!body) return "";
  const classes = ["story-block", className].filter(Boolean).join(" ");
  return `<section class="${classes}"><h4>${escapeHtml(title)}</h4>${body}</section>`;
}

function compactSummary(item) {
  const candidates = [
    item.outcome,
    item.skip_reason,
    item.reason,
    item.problem,
    item.design_assessment,
    item.risk
  ].map(value => text(value).trim()).filter(Boolean);
  return candidates[0] || labels[lang].summaryFallback;
}

function updateCardToggle(card) {
  const button = card.querySelector(".card-toggle");
  if (!button) return;
  const open = card.classList.contains("open");
  button.textContent = open ? labels[lang].collapseDetails : labels[lang].expandDetails;
  button.setAttribute("aria-expanded", open ? "true" : "false");
}

function setCardOpen(card, open) {
  card.classList.toggle("open", open);
  updateCardToggle(card);
}

function factItem(label, value) {
  const body = text(value);
  if (!body) return "";
  return `
    <div class="fact">
      <dt>${escapeHtml(label)}</dt>
      <dd>${formatRich(body)}</dd>
    </div>
  `;
}

function directFixesText(fixes) {
  if (!Array.isArray(fixes) || !fixes.length) return "";
  return fixes.map(fix => {
    if (typeof fix !== "object" || fix === null) return text(fix);
    return [
      fix.branch ? `branch: ${text(fix.branch)}` : "",
      fix.commit ? `commit: ${text(fix.commit)}` : "",
      fix.message ? `message: ${text(fix.message)}` : "",
      fix.files ? `files: ${Array.isArray(fix.files) ? fix.files.map(file => text(file)).join(", ") : text(fix.files)}` : "",
      fix.tests ? `tests: ${Array.isArray(fix.tests) ? fix.tests.map(test => text(test)).join(", ") : text(fix.tests)}` : "",
      fix.push_state ? `push: ${text(fix.push_state)}` : "",
      fix.ci_state ? `CI: ${text(fix.ci_state)}` : ""
    ].filter(Boolean).join(" · ");
  }).join("\n");
}

function renderReviewRail(item) {
  const advice = readingAdvice(item);
  const callout = `
    <div class="reading-callout ${advice.level}">
      <strong>${advice.icon} ${escapeHtml(advice.label)}</strong>
      <span>${escapeHtml(advice.reason)}</span>
    </div>
  `;
  const facts = [
    factItem(labels[lang].outcome, item.outcome),
    factItem(labels[lang].risk, item.risk),
    factItem(labels[lang].ci, item.ci_state),
    factItem(labels[lang].attentionPoints, item.attention_points),
    factItem(labels[lang].directFixes, directFixesText(item.direct_fixes)),
    factItem(labels[lang].selfReviewPolicy, item.self_review_policy),
    factItem(labels[lang].testsDocs, item.tests_docs),
    factItem(labels[lang].modules, item.modules),
    factItem(labels[lang].apiSurface, item.api_surface),
    factItem(labels[lang].reason, item.skip_reason)
  ].filter(Boolean).join("");
  if (!facts) return `<aside class="review-rail">${callout}</aside>`;
  return `<aside class="review-rail">${callout}<h4>${labels[lang].reviewSummary}</h4><dl class="fact-list">${facts}</dl></aside>`;
}

function renderComments(item) {
  const comments = item.inline_comments || [];
  if (!comments.length) return "";
  const rendered = comments.map(comment => `
    <div class="comment">
      <strong>${escapeHtml(comment.path || "")}${comment.line ? ":" + escapeHtml(comment.line) : ""}</strong>
      <div>${formatRich(text(comment.body || comment))}</div>
      ${comment.focus ? `<div><strong>${labels[lang].focus}:</strong> ${escapeHtml(text(comment.focus))}</div>` : ""}
      ${comment.severity ? `<div><strong>${labels[lang].severity}:</strong> ${escapeHtml(text(comment.severity))}</div>` : ""}
    </div>
  `).join("");
  return `<section class="comments-panel">
    <h4>${labels[lang].inlineComments}</h4>
    <div class="comment-list">${rendered}</div>
  </section>`;
}

function renderPrReadout(item) {
  const story = [
    storyBlock(labels[lang].backgroundAndProblem, [
      storyLine(labels[lang].technicalBackground, item.technical_background),
      storyLine(labels[lang].problem, item.problem),
      storyLine(labels[lang].problemFraming, item.problem_framing),
      storyLine(labels[lang].rootCause, item.root_cause)
    ], "hero-block"),
    storyBlock(labels[lang].solutionAndTradeoffs, [
      storyLine(labels[lang].approach, item.approach),
      storyLine(labels[lang].alternativeDesigns, item.alternative_designs),
      storyLine(labels[lang].tradeoffs, item.tradeoffs),
      storyLine(labels[lang].designAssessment, item.design_assessment)
    ]),
    storyBlock(labels[lang].impactAndEvidence, [
      storyLine(labels[lang].changeInventory, item.change_inventory),
      storyLine(labels[lang].semanticChanges, item.semantic_changes),
      storyLine(labels[lang].behaviorImpact, item.behavior_impact),
      storyLine(labels[lang].moduleImpact, item.module_impact),
      storyLine(labels[lang].crossModuleImpact, item.cross_module_impact)
    ]),
    renderComments(item)
  ].filter(Boolean).join("");
  return `<div class="pr-readout"><div class="pr-story">${story}</div>${renderReviewRail(item)}</div>`;
}

function renderCards() {
  const query = document.getElementById("search").value.trim();
  const visible = prs().filter(item => (item.status || "skipped") !== "skipped")
    .filter(item => {
    const status = item.status || "skipped";
    return (filter === "all" || status === filter) && matchesSearch(item, query);
  });
  const container = document.getElementById("cards");
  if (!visible.length) {
    container.innerHTML = `<div class="empty">${labels[lang].empty}</div>`;
    return;
  }
  container.innerHTML = visible.map(item => {
    const status = item.status || "skipped";
    const advice = readingAdvice(item);
    const summary = compactSummary(item);
    const prText = item.number ? `#${item.number}` : "PR";
    const prLink = item.url
      ? `<a href="${escapeHtml(item.url)}">${prText}</a>`
      : prText;
    return `
      <article class="card priority-${advice.level}" data-status="${status}">
        <div class="card-head">
          <div>
            <div class="headline-row">
              <h3 class="card-title">${prLink} · ${escapeHtml(text(item.title))}</h3>
              <span class="read-pill ${advice.level}">${advice.icon} ${escapeHtml(advice.label)}</span>
            </div>
            <div class="meta">
              <span>${labels[lang].author}: ${escapeHtml(item.author || "")}</span>
              <span class="advice-reason">${escapeHtml(advice.reason)}</span>
            </div>
            <div class="card-summary">${formatRich(summary)}</div>
          </div>
          <div class="card-actions">
            <span class="badge ${status}">${labels[lang][status] || status}</span>
            <button class="card-toggle" type="button" aria-expanded="false">${labels[lang].expandDetails}</button>
          </div>
        </div>
        <div class="card-body">
          ${renderPrReadout(item)}
        </div>
      </article>
    `;
  }).join("");
  document.querySelectorAll(".card-head").forEach(head => {
    head.addEventListener("click", event => {
      if (event.target.closest("a")) return;
      const card = head.closest(".card");
      setCardOpen(card, !card.classList.contains("open"));
    });
  });
  document.querySelectorAll(".card").forEach(card => updateCardToggle(card));
}

function renderSkipGroups() {
  const heading = document.getElementById("skippedHeading");
  const container = document.getElementById("skipGroups");
  if (!["all", "skipped"].includes(filter)) {
    heading.style.display = "none";
    container.style.display = "none";
    return;
  }
  heading.style.display = "flex";
  container.style.display = "grid";
  const query = document.getElementById("search").value.trim();
  const groups = skippedGroups().map(group => {
    const reason = group.reason || "";
    const items = (group.items || []).map(item => ({
      ...item,
      status: item.status || "skipped",
      group_reason: reason,
      skip_reason: item.skip_reason || reason
    })).filter(item => matchesSearch(item, query));
    return { reason, items };
  }).filter(group => group.items.length > 0);
  if (!groups.length) {
    container.innerHTML = `<div class="empty">${labels[lang].empty}</div>`;
    return;
  }
  container.innerHTML = groups.map((group, index) => `
    <article class="skip-group open">
      <div class="skip-group-head" data-skip-group="${index}">
        <h3 class="skip-group-title">${escapeHtml(text(group.reason))}</h3>
        <span class="skip-group-count">${group.items.length} ${labels[lang].items}</span>
      </div>
      <div class="skip-group-body">
        ${group.items.map(item => {
          const prText = item.number ? `#${item.number}` : "PR";
          const prLink = item.url
            ? `<a href="${escapeHtml(item.url)}">${prText}</a>`
            : prText;
          return `
            <div class="skip-row">
              <div>
                <div class="skip-title">${prLink} · ${escapeHtml(text(item.title))}</div>
                <div class="skip-detail">${labels[lang].author}: ${escapeHtml(item.author || "")}</div>
              </div>
              <div>
                <div><strong>${labels[lang].blocker}:</strong> ${formatRich(text(item.skip_reason))}</div>
                ${item.readiness_audit ? `<div class="skip-detail"><strong>${labels[lang].readinessAudit}:</strong> ${formatRich(text(item.readiness_audit))}</div>` : ""}
                ${renderBlockers(item)}
                ${item.ci_state ? `<div class="skip-detail">${formatRich(text(item.ci_state))}</div>` : ""}
                ${item.risk ? `<div class="skip-detail">${formatRich(text(item.risk))}</div>` : ""}
              </div>
            </div>
          `;
        }).join("")}
      </div>
    </article>
  `).join("");
  document.querySelectorAll("[data-skip-group]").forEach(head => {
    head.addEventListener("click", () => {
      head.closest(".skip-group").classList.toggle("open");
    });
  });
}

function renderFollowUp() {
  const heading = document.getElementById("followUpHeading");
  const container = document.getElementById("followUpCards");
  if (!["all", "skipped", "blocked"].includes(filter)) {
    heading.style.display = "none";
    container.style.display = "none";
    return;
  }
  const query = document.getElementById("search").value.trim().toLowerCase();
  const items = (reportData.follow_up || []).filter(item => {
    if (!query) return true;
    return [
      item.number,
      item.author,
      text(item.title),
      text(item.reason),
      text(item.next)
    ].join(" ").toLowerCase().includes(query);
  });
  if (!items.length) {
    heading.style.display = "none";
    container.style.display = "none";
    return;
  }
  heading.style.display = "flex";
  container.style.display = "grid";
  container.innerHTML = items.map(item => {
    const prText = item.number ? `#${item.number}` : "PR";
    const prLink = item.url
      ? `<a href="${escapeHtml(item.url)}">${prText}</a>`
      : prText;
    return `
      <article class="card open" data-status="blocked">
        <div class="card-head">
          <div>
            <h3 class="card-title">${prLink} · ${escapeHtml(text(item.title))}</h3>
            <div class="meta">${labels[lang].author}: ${escapeHtml(item.author || "")}</div>
          </div>
          <span class="badge blocked">${labels[lang].followups}</span>
        </div>
        <div class="card-body">
          <div class="grid">
            ${field(labels[lang].reason, item.reason)}
            ${field(labels[lang].outcome, item.next)}
          </div>
        </div>
      </article>
    `;
  }).join("");
}

function render() {
  const items = prs();
  renderStatic();
  renderMetrics(items);
  renderBars(items);
  renderTimeline();
  renderOverview();
  renderReadingGuide(items);
  renderChips();
  renderCards();
  renderSkipGroups();
  renderFollowUp();
}

document.querySelectorAll("[data-lang-button]").forEach(button => {
  button.addEventListener("click", () => setLanguage(button.dataset.langButton));
});
document.getElementById("search").addEventListener("input", () => {
  renderCards();
  renderSkipGroups();
  renderFollowUp();
});
document.getElementById("openAll").addEventListener("click", () => {
  document.querySelectorAll(".card").forEach(card => setCardOpen(card, true));
  document.querySelectorAll(".skip-group").forEach(node => node.classList.add("open"));
});
document.getElementById("closeAll").addEventListener("click", () => {
  document.querySelectorAll(".card").forEach(card => setCardOpen(card, false));
  document.querySelectorAll(".skip-group").forEach(node => node.classList.remove("open"));
});
render();
</script>
</body>
</html>
