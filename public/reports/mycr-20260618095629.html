const reportData = {"approved":[],"blocked":[{"alternative_designs":"可选方案包括只支持静态 fixture、不支持 LLM generator；在 runner 构造期注入全局 mock plugin；新增公开 ToolMocker 接口；或把工具 mock 放在 metric 层。当前方案选择 run-level plugin 和 internal runtime，导出面较窄，也能按 invocation 隔离。","api_surface":"新增导出 evalset.Invocation.ToolMock 字段、evaluation/toolmock 包内 ToolMock/Tool/ArgumentsMatch/LLMGenerator 类型、evaluation.WithToolMockRunner、evaluation/service.WithToolMockRunner；内部新增 toolmockruntime plugin 和 inference options。","approach":"新增 evaluation/toolmock schema，包含 ToolMock、Tool、ArgumentsMatch、LLMGenerator；在 evaluation/internal/toolmockruntime 中注册 before-tool plugin，按工具名和 arguments 规则匹配静态 result，或调用 ToolMockRunner 生成 {\"result\": ...}；把 WithToolMockRunner 从 evaluation 顶层、service 层、local inference 层传到具体 invocation；同时在 clone 和 user-input-only 过滤逻辑里保留 ToolMock。","attention_points":"重点看 generator event stream 的 context-aware consumption，以及 ArgumentsMatch.MarshalJSON 对 expectedSet 的保留。","author":"Flash-LHR","behavior_impact":"Before: evaluation 中工具调用只能真实执行。After: invocation 可声明工具 mock，actual/expected 推理可按配置返回固定或生成结果。当前缺陷会导致某些合法 JSON 配置保存后失真，或在 generator runner 不关闭事件流时卡住。","blockers":[{"kind":"human_review","line":42,"path":"evaluation/toolmock/toolmock.go","reviewer":"Flash-LHR","summary":"显式 expected:null 保存后会因 omitempty 丢失 expected，重新加载后变成字段缺失并改变校验/匹配语义。","url":"https://github.com/trpc-group/trpc-agent-go/pull/1978#discussion_r3425967403","verification":"当前 diff 只实现 UnmarshalJSON 和 expectedSet，未实现 MarshalJSON；该 thread 未 resolved 且未 outdated。"},{"kind":"bot_review","line":245,"path":"evaluation/internal/toolmockruntime/runtime.go","reviewer":"coderabbitai","summary":"ToolMockRunner 返回 nil channel 或不关闭事件流时，generate 直接 range events 会让 evaluation 挂死。","url":"https://github.com/trpc-group/trpc-agent-go/pull/1978#discussion_r3425966498","verification":"子任务独立复核确认 runtime 仍缺少 nil check 和 ctx.Done select loop。"},{"kind":"soft_ci","summary":"codecov/patch 失败，patch coverage 约 59.47%，涉及 runtime、clone、inference、toolmock schema 等新增逻辑。","verification":"即使可审，codecov/patch 仍是 merge hard gate。"}],"change_inventory":"新增 docs/design/evaluation-tool-mock.md；新增 evaluation/toolmock schema 与测试；新增 evaluation/internal/toolmockruntime runtime 与测试；修改 evaluation/evalset、clone、evaluation/options、service/options、service/internal/inference、service/local，把 ToolMockRunner 和 actual/expected mock 选择一路传递到 runner.Run。","ci_state":"CI 只有 codecov/patch 非 green：codecov/patch: FAILURE (https://app.codecov.io/gh/trpc-group/trpc-agent-go/pull/1978)。由于存在当前有效 blocker，本轮未按 soft-CI 通过处理。","cross_module_impact":"评测服务、CLI/平台侧 evalset 生产者、使用自定义 runner 的调用方都会看到新增配置能力；如果 JSON round-trip 或事件流处理不稳，会影响所有依赖 tool mock 的评测。","design_assessment":"方向是有价值的，但当前实现还没有达到可合入质量。两个阻塞点都在持久化/执行边界：一个工具 mock 生成器可能挂死整次 evaluation，另一个会让显式 expected:null 保存后变成缺失字段。这些不是样式问题，而是评测系统稳定性和数据语义问题。","head_sha":"41dbe6d16a76b825edb8d778e915872a99b1b18d","inline_comments":[],"module_impact":"直接影响 evaluation、evaluation/service、evaluation/toolmock、evaluation/internal/toolmockruntime。间接影响 evalset JSON 文件、local/MySQL manager 保存加载、agent plugin 回调执行、runner 事件流消费。","modules":"docs/design/evaluation-tool-mock.md, evaluation/evalset/evalcase.go, evaluation/evaluation.go, evaluation/internal/clone/clone_test.go, evaluation/internal/clone/evalset.go, evaluation/internal/toolmockruntime/runtime.go, evaluation/internal/toolmockruntime/runtime_test.go, evaluation/options.go, evaluation/options_test.go, evaluation/service/internal/inference/inference.go, evaluation/service/internal/inference/inference_test.go, evaluation/service/local/inference.go, evaluation/service/local/local.go, evaluation/service/local/local_test.go, evaluation/service/local/options.go, evaluation/service/options.go, evaluation/service/options_test.go, evaluation/toolmock/toolmock.go, evaluation/toolmock/toolmock_test.go","number":1978,"outcome":"未批准、未评论、未合并。已有 Flash-LHR 与 CodeRabbit inline comments 覆盖当前阻塞；本轮没有重复发评论。","planning_reasons":["full_run_heavy_review","candidate_gate_refresh"],"problem":"PR 试图让 evaluation 支持工具返回 mock：模型仍看到真实工具声明并决定是否调用工具，但工具执行点可以按 evalset.Invocation.ToolMock 配置返回静态结果或由单独 runner 生成结果，方便稳定评测依赖外部工具的 agent。","problem_framing":"直接评测带工具 agent 时，真实工具会带来网络、时间、权限和非确定性成本。根因是 evaluation 的输入模型目前只能描述用户消息和期望输出，不能描述“这个 invocation 的工具环境”。PR 把工具环境纳入 evalset schema，是合理方向，但同时把 evaluation 的可靠性边界扩大到了 tool callback 和 evalset 持久化。","risk":"高。该 PR 改的是 evaluation 执行路径和 evalset 持久化语义；挂死和 JSON 语义丢失都会让评测结果不可用或不可信。","root_cause":"现有 evaluation pipeline 没有 per-invocation 的工具替身层，也没有把 actual/expected 两条 runner 路径的工具返回作为可配置数据持久化。","semantic_changes":"evaluation 可以在单次 invocation 内拦截工具调用并返回 mock result；配置了 tool mock 但没有命中静态规则且没有 generator 时会失败而不是落回真实工具；expected runner 也可以使用 expected mock。默认没有 ToolMock 时行为应保持不变。","status":"blocked","technical_background":"evaluation 包负责把 evalset 中的测试用例交给 actual runner 和 expected runner 执行，再把模型输出、工具调用轨迹和 metric 结果汇总成评测结果。tool callback 是 agent runtime 在工具执行前后的扩展点；如果 before-tool callback 返回 CustomResult，真实工具不会执行，框架会把这个结果当作工具返回继续喂给模型。这个 PR 新增的 toolmock 机制正是利用 run-level plugin 在单次 evaluation invocation 内替换工具结果，因此事件流、JSON 序列化和 actual/expected 两条推理路径都属于核心正确性边界。","tests_docs":"PR 增加了 runtime、clone、inference、options 与 schema 测试，但缺少 ToolMock.Expected 端到端覆盖，且 explicit null 的 JSON round-trip 仍有缺口。","title":"evaluation: support tool mock for evaluation","tradeoffs":"run-level plugin 的优点是隔离性强、不会污染 runner 全局状态；代价是需要非常可靠地处理事件流、context 取消和 JSON 持久化。LLM generator 提供灵活性，但把评测可重复性依赖到另一个 runner。ArgumentsMatch 支持 onlyTree/ignoreTree，表达力更强，但校验和序列化复杂度明显上升。","updated_at":"2026-06-17T06:28:12Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/1978"},{"alternative_designs":"方案一是把所有 session backend 统一为 0 禁用异步；方案二是保持 0 回退默认，新增 WithSyncSummary 或 WithAsyncSummaryDisabled 这类显式 option；方案三是用常量表达禁用值。","api_surface":"修改公开 option WithAsyncSummaryNum 在 SQLite backend 中对 0 的语义；没有新增导出符号。","approach":"把 session/sqlite/options.go 中 WithAsyncSummaryNum 的校验从 num < 1 改成 num < 0；更新 summary_test 让 asyncSummaryNum=0 时 asyncWorker 为 nil，并在注释中写明 0 禁用异步、负数回退默认。","attention_points":"需要先决定 0 的全局语义：全 backend 统一禁用，还是新增显式 disable option。","author":"YellowDusk04","behavior_impact":"Before: 传 0 得到默认异步 worker。After: SQLite 传 0 会让摘要同步执行，可能改变延迟、排序和阻塞行为。","blockers":[{"kind":"bot_review","line":162,"path":"session/sqlite/options.go","reviewer":"coderabbitai","summary":"SQLite 把 0 改成禁用异步，但 MySQL/PGVector 仍把 0 回退默认，跨 backend 语义不一致。","url":"https://github.com/trpc-group/trpc-agent-go/pull/1967#discussion_r3411319312","verification":"子任务独立确认 session/mysql 与 session/pgvector 仍保留旧契约；该 thread 未 resolved 且未 outdated。"},{"kind":"soft_ci","summary":"codecov/patch 失败；即使代码问题修复，merge 前仍需 codecov green 或移除该非 green 状态。","verification":"codecov/patch 是 review soft gate 但 merge hard gate。"}],"change_inventory":"session/sqlite/options.go 修改校验和 doc comment；session/sqlite/summary_test.go 调整同步 fallback 断言。","ci_state":"CI 只有 codecov/patch 非 green：codecov/patch: FAILURE (https://app.codecov.io/gh/trpc-group/trpc-agent-go/pull/1967)。","cross_module_impact":"session/mysql 和 session/pgvector 仍把 0 解释为默认值，形成跨 backend API 不一致。","design_assessment":"当前实现局部修复了 SQLite，但没有给整个 session abstraction 一个一致契约，暂不宜合入。","head_sha":"49bac0ed9e90d8583df491bb50c66606d6447d08","inline_comments":[],"module_impact":"直接影响 session/sqlite；间接影响所有希望在不同 session backend 之间切换的调用方以及依赖 summary 执行顺序的测试。","modules":"session/sqlite/options.go, session/sqlite/summary_test.go","number":1967,"outcome":"未批准、未评论、未合并。子任务确认 CodeRabbit 当前 blocker 有效；本轮没有重复发评论。","planning_reasons":["full_run_heavy_review","candidate_gate_refresh"],"problem":"PR 修复 SQLite 里 WithAsyncSummaryNum(0) 不能显式禁用异步 worker 的问题，目标是让 0 表示禁用异步并回退同步处理，负数才回到默认 worker 数。","problem_framing":"直接问题是测试或用户需要一个 deterministic/sync 模式。更深层根因是 async summary 的“worker 数量配置”和“同步/异步模式开关”被压在同一个 int option 上，导致 0 的语义需要跨 backend 明确约定。","risk":"中到高。单 backend 语义分叉会让用户在迁移 backend 时遇到不可见行为差异。","root_cause":"SQLite 原先用 num < 1 回退 defaultAsyncSummaryNum，无法表达“启动 0 个 worker”。但 MySQL/PGVector 仍采用 0 回退默认的旧契约。","semantic_changes":"Before: SQLite WithAsyncSummaryNum(0) 回退默认 worker 数。After: SQLite 0 禁用 async worker 并同步处理；负数回退默认。MySQL/PGVector 仍保持旧语义。","status":"blocked","technical_background":"session/sqlite 负责把对话 session 和摘要状态持久化到 SQLite。async summary worker 用后台 worker 异步压缩或总结历史消息；如果 worker 数量为 0，服务不会启动 worker，EnqueueSummaryJob 会走同步 fallback。WithAsyncSummaryNum 是公开 option，调用方会期待不同 session backend 对同一个数值有一致语义。","tests_docs":"PR 更新了 SQLite 测试和注释，但没有更新 MySQL/PGVector 的相同 option 契约，也没有提供跨 backend 迁移说明。","title":"fix(sqlite): allow WithAsyncSummaryNum(0) to disable async workers","tradeoffs":"直接把 0 改成 disable 最小，但会改变已有 SQLite 调用方语义，并与其他 backend 不一致。新增显式 option 改动稍大，但兼容性更好，也能避免 magic number。全 backend 统一 0 语义需要迁移 MySQL/PGVector 测试与文档。","updated_at":"2026-06-16T02:10:06Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/1967"},{"alternative_designs":"方案一是保持 WithHostConfig 完整覆盖，并文档化必须先 WithHostConfig 后 WithBindMount；方案二是新增 WithHostConfigPatch 或 WithAdditionalBindMounts 这类显式可组合 API；方案三是让 WithHostConfig 对所有可合并字段定义一致的 patch 语义。","api_surface":"涉及公开 option WithHostConfig / WithBindMount 的语义和文档；没有新增导出符号。","approach":"PR 当前围绕 codeexecutor/container/container.go 调整 WithHostConfig / WithBindMount 的注释或 Binds 处理，并试图让 Binds 在组合场景中被保留。","attention_points":"优先要求作者选择 API 契约，而不是继续在 Binds 上做局部特判。","author":"YellowDusk04","behavior_impact":"Before: WithHostConfig 后写入的 HostConfig 会覆盖先前 bind mount。After: PR 试图保留 Binds，但其他 HostConfig 字段仍可能覆盖，导致行为模型不均匀。","blockers":[{"kind":"human_review","path":"codeexecutor/container/container.go","reviewer":"WineChord","summary":"只合并 Binds 会让 WithHostConfig 契约不一致；建议保持 full override，或新增显式 patch/add-bind API。","url":"https://github.com/trpc-group/trpc-agent-go/pull/1964#discussion_r3418183142","verification":"WineChord changes-request review 未解除；相关 thread 虽有 outdated 标记，但当前 CodeRabbit thread 仍指向同一语义矛盾。"},{"kind":"bot_review","line":136,"path":"codeexecutor/container/container.go","reviewer":"coderabbitai","summary":"当前注释/实现/测试对 WithHostConfig 是覆盖还是合并的契约仍不一致。","url":"https://github.com/trpc-group/trpc-agent-go/pull/1964#discussion_r3418272596","verification":"未 resolved 且未 outdated。"}],"change_inventory":"主要修改 codeexecutor/container/container.go 的 HostConfig option 逻辑/注释。","ci_state":"所有已抓取 checks 均为 green。","cross_module_impact":"examples、docs 和所有使用 container executor 的测试都依赖这个 option 契约。","design_assessment":"当前 PR 仍停在契约选择不清的状态，不能因为 CI 绿就合入。需要作者先明确 WithHostConfig 是完整覆盖还是 patch，并让实现、注释和测试一致。","head_sha":"a7fc62fc4c00741aa775ed8eb7b19c3b8f08beca","inline_comments":[],"module_impact":"直接影响 codeexecutor/container；间接影响所有通过容器 executor 配置 bind mount、network mode、cleanup 行为的用户。","modules":"codeexecutor/container/container.go","number":1964,"outcome":"未批准、未评论、未合并。现有 WineChord / CodeRabbit review threads 仍未解决；子任务未发现额外新问题。","planning_reasons":["full_run_heavy_review","candidate_gate_refresh"],"problem":"PR 试图修复 WithHostConfig 覆盖已有 Binds 导致 WithBindMount 与 WithHostConfig 组合时挂载丢失的问题。","problem_framing":"表面问题是 Binds 被覆盖；根因是一个完整 HostConfig override API 和细粒度 bind option 被混用时，没有明确 option ordering 或 patch API。","risk":"中。容器隔离和挂载配置属于运行安全边界，含糊的 option contract 会导致用户误配。","root_cause":"WithHostConfig 之前是整体替换 HostConfig，用户如果先调用 WithBindMount 再调用 WithHostConfig，前者写入的 Binds 会被后者覆盖。","semantic_changes":"潜在变化是 WithHostConfig 不再纯覆盖 Binds，而是保留已有 binds；这会改变 option 顺序的结果。","status":"blocked","technical_background":"codeexecutor/container 用 Docker HostConfig 描述容器运行参数，包括 Binds、NetworkMode、AutoRemove、CapAdd、Mounts 等。WithHostConfig 是一个 option，用来把调用方提供的 HostConfig 应用到 CodeExecutor；WithBindMount 则是更细粒度地追加 bind mount。这里的关键是 option 组合语义：完整覆盖、字段级 patch、还是只对 Binds 特殊合并。","tests_docs":"CI 绿，但现有 thread 指出实现、注释、测试和目标语义仍需对齐。","title":"fix(container): merge Binds in WithHostConfig instead of replacing","tradeoffs":"只对 Binds 特殊合并改动小，但会让 HostConfig 中其他 slice/map 字段仍然替换，契约不一致。完整覆盖语义最简单、兼容性最好，但要求用户注意 option 顺序。新增 patch/add API 更清晰，但多一个公开入口。","updated_at":"2026-06-16T05:29:31Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/1964"},{"alternative_designs":"可以保持默认总超时为 0，只让调用方 opt-in；也可以在 provider 调用层用 context deadline；或实现 streaming-safe 的 idle/read timeout，而不是总生命周期 timeout。","api_surface":"新增 WithHTTPClientTimeout 和 HTTPClientOptions 字段；修改 DefaultNewHTTPClient 默认行为。","approach":"新增 defaultHTTPClientTimeout=5m、HTTPClientOptions.Timeout/DisableTimeout、WithHTTPClientTimeout；DefaultNewHTTPClient 默认设置 http.Client.Timeout，0 可显式禁用。","attention_points":"保持默认 client unbounded，把总超时改成 opt-in，或在调用层使用 context/idle timeout。","author":"123456wda","behavior_impact":"Before: 长 streaming 只要连接存在就可持续读取。After: 超过 5 分钟会被 http.Client.Timeout 取消，即使 SSE chunk 仍在到达。","blockers":[{"kind":"human_review","line":45,"path":"model/http_client.go","reviewer":"WineChord","summary":"默认设置 http.Client.Timeout 会取消超过 5 分钟的健康 SSE streaming，是兼容性回归。","url":"https://github.com/trpc-group/trpc-agent-go/pull/1930#discussion_r3380844076","verification":"thread 未 resolved、未 outdated；子任务独立确认。"}],"change_inventory":"model/http_client.go 新增 timeout 常量、option 与默认设置；model/http_client_test.go 覆盖默认/custom/disable timeout。","ci_state":"所有已抓取 checks 均为 green。","cross_module_impact":"OpenAI、Anthropic、HuggingFace 等 streaming 或长耗时模型调用都可能被改变。","design_assessment":"当前设计不是合理默认：它用一个全局总超时解决资源泄漏，却破坏了长时间但健康的 streaming。应先改成 opt-in 或 streaming-safe 策略。","head_sha":"576b11d6d1f4d19f85c04bbc1c27220251cc4d89","inline_comments":[],"module_impact":"直接影响 model 包和所有复用 DefaultNewHTTPClient 的 provider。","modules":"model/http_client.go, model/http_client_test.go","number":1930,"outcome":"未批准、未评论、未合并。WineChord 现有 changes-request thread 仍有效；子任务确认该兼容性回归。","planning_reasons":["full_run_heavy_review","candidate_gate_refresh"],"problem":"PR 试图为默认 HTTP client 设置 5 分钟总超时，避免远端请求无限挂起造成 goroutine 泄漏，并提供 WithHTTPClientTimeout 配置。","problem_framing":"需求本身是资源保护：不能让无响应 HTTP 调用永久占用 goroutine。根因是共享 client 没有默认 deadline，但把资源保护直接做成总请求超时会伤到 streaming 语义。","risk":"高。默认行为会破坏现有长流式生成和用户会话。","root_cause":"默认共享 HTTP client 缺少明确的超时策略；同时不同调用类型（普通 request、长轮询、SSE streaming）需要不同 timeout 模型。","semantic_changes":"Before: 默认 HTTP client 不设置总 timeout。After: 默认 5 分钟后取消整个请求，除非显式 WithHTTPClientTimeout(0)。","status":"blocked","technical_background":"model/http_client.go 提供各模型 provider 共用的 HTTP client 工厂。Go 的 http.Client.Timeout 不是连接超时，而是覆盖整个请求生命周期，包括等待响应头和读取 Response.Body。OpenAI、Anthropic 等模型 streaming API 可能通过 SSE 长时间持续返回 token，只要总时长超过 Timeout，就算中间一直有数据，也会被 client 取消。","tests_docs":"测试覆盖 timeout option，但没有证明 streaming-safe。","title":"fix: set default HTTP client timeout to prevent goroutine leaks","tradeoffs":"默认总超时能简单防 hang，但兼容性风险最大；context deadline 需要调用方/上层场景明确控制；idle/read timeout 更贴近 streaming，但实现复杂并可能需要自定义 Transport/reader。","updated_at":"2026-06-09T13:09:32Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/1930"},{"alternative_designs":"更稳的方案是保持同一 assistant step 为一个 Gemini content，并只对确认为 cross-provider/client-generated 的 function call 注入 skip token；或在 ToolCall ExtraFields 中记录 provider provenance；或只在 fallback replay 路径显式标记需要 bypass。","api_surface":"没有新增公开 Go API；修改 model/gemini 内部转换语义和常量。","approach":"新增 geminiSkipThoughtSignatureValidator 常量；如果 ToolCall 没有 thought_signature，就给转换出的 genai.Part.ThoughtSignature 写入 skip token；测试覆盖 unsigned cross-provider function calls。","attention_points":"需要按 step/provenance 控制 skip token 注入，而不是所有 unsigned call 一刀切。","author":"sks","behavior_impact":"Before: cross-provider replay 可能失败。After: cross-provider 场景改善，但 Gemini 原生并行 tool call 历史可能被不必要地注入 skip token。","blockers":[{"kind":"human_review","line":813,"path":"model/gemini/gemini.go","reviewer":"WineChord","summary":"当前会给每个未签名 tool call 加 skip token，可能改写正常 Gemini 并行调用历史。","url":"https://github.com/trpc-group/trpc-agent-go/pull/1894#discussion_r3338538122","verification":"thread 未 resolved、未 outdated；子任务独立确认。"}],"change_inventory":"model/gemini/gemini.go 新增 skip token 常量并在 convertToolCallPart 中写入 ThoughtSignature；model/gemini/gemini_test.go 增加 cross-provider unsigned function call 测试。","ci_state":"所有已抓取 checks 均为 green。","cross_module_impact":"使用 resilient fallback、跨 provider replay、并行 tool call 的 agent 都受影响。","design_assessment":"PR 解决了一个真实 400，但当前实现过宽，会把正常 Gemini 并行工具调用也当作 cross-provider unsigned call 处理。需要缩小 bypass 条件。","head_sha":"a928ff171bd312427af7ad098715311d9bb5823f","inline_comments":[],"module_impact":"直接影响 model/gemini adapter。","modules":"model/gemini/gemini.go, model/gemini/gemini_test.go","number":1894,"outcome":"未批准、未评论、未合并。WineChord 当前 thread 未解决；子任务确认风险有效。","planning_reasons":["full_run_heavy_review","candidate_gate_refresh"],"problem":"PR 试图修复跨 provider agent loop 中 Gemini replay 未签名 functionCall 报 HTTP 400 的问题。","problem_framing":"表面是 Gemini 3 校验失败；根因是 agent 历史里混合了不同 provider 生成的 tool call，而当前 Gemini adapter 无法区分“Gemini 原生但部分未签名的并行 function call”和“其他 provider 生成的无签名 function call”。","risk":"高。该变更在 provider 协议边界上处理签名语义，过度 bypass 可能隐藏真实历史来源。","root_cause":"convertToolCallPart 只看 ToolCall.ExtraFields 是否有 thought_signature，缺少 step/content 级别的 provenance 和并行调用语义。","semantic_changes":"Before: 无签名 tool call 不带 ThoughtSignature，可能触发 Gemini 400。After: 所有无签名 tool call 都带 skip token，可能过度改写 Gemini 原生历史。","status":"blocked","technical_background":"Gemini 的 thought signatures 用来验证多步工具调用历史中 functionCall 的来源和连续性。跨 provider fallback 时，来自 OpenAI 等 provider 的 tool call 没有 Gemini thought_signature，Gemini 3 会拒绝某些 replay。Gemini 文档提供 skip_thought_signature_validator 作为绕过 token，但它应只用于确实不是 Gemini 生成的 function call，而不能改写正常 Gemini 历史。","tests_docs":"新增测试覆盖 unsigned calls，但缺少“第一个 call 有真实 signature、第二个 Gemini 原生并行 call 未签名”的回归测试。","title":"fix(model/gemini): inject skip validator for cross-provider function calls","tradeoffs":"无条件给 unsigned call 加 skip token 简单，但会改写 Gemini 原生并行调用历史。按 step/provenance 注入更复杂，却能保持 provider 语义。","updated_at":"2026-06-02T03:40:38Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/1894"},{"alternative_designs":"保持 Service 不变，新增 artifact.HeadService 或 MetadataService 可选接口；提供 helper Head(ctx, svc, req) 在支持 HeadService 时调用，否则返回 ErrUnsupported；对 storage/s3.Client 也采用可选 HeadObjectClient type assertion。","api_surface":"新增 artifact.HeadRequest、HeadResponse、HeadOptions、HeadOption、WithIncludeURL、WithPresignedURL；修改 artifact.Service 增加 Head；修改 storage/s3.Client 增加 HeadObject。后两者是破坏性变更。","approach":"新增 artifact.HeadRequest/HeadResponse/HeadOptions/HeadOption；给 artifact.Service 增加 Head 方法；在 in-memory、COS、S3 backend 中实现；扩展 COS client 和 storage/s3 client 的 HeadObject / URL 能力；更新 docs 和测试 mocks。","attention_points":"改成 optional HeadService/HeadObjectClient 后，再重新评估 codecov 缺口和 COS/S3 latest-version 选择逻辑。","author":"liuzengh","behavior_impact":"Before: 下游只需实现 Load/List/Save 等现有 artifact.Service 方法。After: 升级后必须实现 Head 才能编译，即使业务不需要 metadata-only 查询。","blockers":[{"kind":"human_review","line":53,"path":"artifact/service.go","reviewer":"Flash-LHR","summary":"直接给公开 artifact.Service 增加 Head 会让现有自定义实现全部编译失败，应考虑扩展接口或 helper。","url":"https://github.com/trpc-group/trpc-agent-go/pull/1400#discussion_r2922076748","verification":"thread 未 resolved、未 outdated；go-apidiff 失败与子任务复核均确认。"},{"kind":"soft_ci","summary":"go-apidiff 失败是实际 API 破坏，不是可接受软失败；codecov/patch 也仍失败。","verification":"子任务进一步发现 storage/s3.Client 增加 HeadObject 也是导出接口破坏。"},{"kind":"other","line":32,"path":"storage/s3/client.go","summary":"扩展 storage/s3.Client 会让通过 artifact/s3.WithClient 注入的下游自定义 client 编译失败。","verification":"该风险不一定被根模块 go-apidiff 完整覆盖，但 diff 中存在导出 interface 方法新增。"}],"change_inventory":"新增 artifact/head.go；修改 artifact/service.go、artifact/inmemory、artifact/cos、artifact/s3、storage/s3；更新 codeexecutor、agent、tool 测试 mock；更新中英文 artifact docs。","ci_state":"非 green checks: codecov/patch: FAILURE (https://app.codecov.io/gh/trpc-group/trpc-agent-go/pull/1400); go-apidiff: FAILURE (https://github.com/trpc-group/trpc-agent-go/actions/runs/23012343072/job/66826132480)。go-apidiff 是真实兼容性 blocker，codecov/patch 也是 merge hard gate。","cross_module_impact":"agent.Invocation、runner.WithArtifactService、codeexecutor.WithArtifactService 以及下游测试 mock/wrapper 都会被接口变更波及。","design_assessment":"当前设计不应合入。go-apidiff 失败准确反映了公开接口破坏；新增能力应作为可选扩展接口进入。","head_sha":"2e5bf368ac088be0a8c83a9858a5352e2ab80418","inline_comments":[],"module_impact":"直接影响 artifact、artifac let lang = "zh";
let filter = "all";
const statusOrder = ["approved", "commented", "maintained", "merged", "skipped", "blocked"];

function text(value, fallback = "") {
  if (value === undefined || value === null || value === "") return fallback;
  if (typeof value === "object" && !Array.isArray(value)) {
    return value[lang] || value.zh || value.en || fallback;
  }
  return String(value);
}

function escapeHtml(value) {
  return text(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatRich(value) {
  let html = escapeHtml(value);
  const replacements = [
    [
      /(P[0-2]|codecov\/patch=FAILURE|go-apidiff=FAILURE|go-apidiff|FAILURE|失败|阻塞|不能合入|不能 merge|未合并|破坏性|breaking|unbounded|无界|绕过|丢失|重复|不稳定|风险)/gi,
      "mark-bad"
    ],
    [
      /(LGTM|已合并|已批准|squash merge|merged|approved|CI 全绿|全绿|修复有效|\bresolved\b|\bresolve\b)/gi,
      "mark-good"
    ],
    [
      /(pending|soft[- ]?CI|软门禁|follow-up|后续|关注|CodeRabbit|reviewability ledger|not_reached)/gi,
      "mark-info"
    ],
    [
      /(导出 API|\bAPI\b|兼容性|\bsession\b|\brunner\b|\bmemory\b|GraphRAG|workspace_exec|OpenAPI|\bpolicy\b|security|安全)/gi,
      "mark-warn"
    ]
  ];
  for (const [pattern, className] of replacements) {
    html = html.replace(pattern, `<mark class="${className}">$1</mark>`);
  }
  return html;
}

function prs() {
  const groups = reportData.skipped_groups || [];
  const skipped = groups.flatMap(group =>
    (group.items || []).map(item => ({
      ...item,
      status: item.status || "skipped",
      skip_reason: item.skip_reason || group.reason
    }))
  );
  return [
    ...(reportData.approved || []),
    ...(reportData.commented || []),
    ...(reportData.maintained || []),
    ...(reportData.blocked || []),
    ...skipped
  ];
}

function skippedGroups() {
  return reportData.skipped_groups || [];
}

function counts(items) {
  const result = Object.fromEntries(statusOrder.map(status => [status, 0]));
  for (const item of items) {
    const status = item.status || "skipped";
    result[status] = (result[status] || 0) + 1;
  }
  return result;
}

  lang = nextLang;
  document.documentElement.lang = nextLang === "zh" ? "zh-CN" : "en";

function renderMetrics(items) {
  const totalComments = items.reduce((sum, item) =>
    sum + ((item.inline_comments || []).length || item.comment_count || 0), 0);
  const followups = (reportData.follow_up || []).length;
  const reviewed = items.filter(item =>
    ["approved", "commented", "maintained", "merged", "blocked"].includes(item.status)
  ).length;
  const metricRows = [
    [labels[lang].total, items.length],
    [labels[lang].reviewed, reviewed],
    [labels[lang].approved, items.filter(item =>
      ["approved", "merged"].includes(item.status)).length],
    [labels[lang].comments, totalComments],
    [labels[lang].followups, followups]
  ];
  document.getElementById("metrics").innerHTML = metricRows.map(([label, value]) => `
    <div class="metric">
      <div class="value">${value}</div>
      <div class="label">${escapeHtml(label)}</div>
    </div>
  `).join("");
}

function renderBars(items) {
  const byStatus = counts(items);
  const maxCount = Math.max(1, ...Object.values(byStatus));
  document.getElementById("bars").innerHTML = statusOrder.map(status => {
    const value = byStatus[status] || 0;
    const width = Math.max(3, Math.round((value / maxCount) * 100));
    return `
      <div class="bar-row">
        <div class="bar-label">${labels[lang][status]}</div>
        <div class="bar-track"><div class="bar-fill ${status}" style="width:${width}%"></div></div>
        <strong>${value}</strong>
      </div>
    `;
  }).join("");
}

function renderTimeline() {
  const events = reportData.timeline || [];
  const container = document.getElementById("timeline");
  if (!events.length) {
    container.innerHTML = `<div class="empty">${labels[lang].empty}</div>`;
    return;
  }
  container.innerHTML = events.map(event => `
    <div class="timeline-item">
      <div class="time">${escapeHtml(event.time || "")}</div>
      <div>${escapeHtml(text(event.label || event.text || event))}</div>
    </div>
  `).join("");
}

function renderOverview() {
  const panel = document.getElementById("overviewPanel");
  const content = document.getElementById("overviewContent");
  const overview = reportData.overview || reportData.summary;
  const body = text(overview);
  if (!body) {
    panel.style.display = "none";
    content.textContent = "";

  panel.style.display = "block";
  content.innerHTML = formatRich(body);

function renderChips() {
  const chipRows = ["all", ...statusOrder];
  document.getElementById("chips").innerHTML = chipRows.map(status => `
    <button type="button" class="chip ${filter === status ? "active" : ""}"
      data-filter="${status}">${labels[lang][status]}</button>
  `).join("");
  document.querySelectorAll("[data-filter]").forEach(button => {
    button.addEventListener("click", () => {
      filter = button.dataset.filter;
      renderCards();
      renderSkipGroups();
      renderFollowUp();
      renderChips();
    });
  });
}

function matchesSearch(item, query) {
  if (!query) return true;
  const haystack = [
    item.number,
    text(item.title),
    item.author,
    text(item.problem),
    text(item.approach),
    text(item.outcome),
    text(item.skip_reason),
    text(item.group_reason),
    text(item.readiness_audit),
    blockersSearchText(item.blockers),
    text(item.risk),
    text(item.ci_state)
  ].join(" ").toLowerCase();
  return haystack.includes(query.toLowerCase());
}

function blockersSearchText(blockers) {
  if (!Array.isArray(blockers)) return "";
  return blockers.map(blocker => {
    if (typeof blocker !== "object" || blocker === null) return text(blocker);
    return [
      blocker.kind,
      blocker.summary,
      blocker.reviewer,
      blocker.path,
      blocker.line,
      blocker.latest_response,
      blocker.verification,
      blocker.url
    ].map(value => text(value)).join(" ");
  }).join(" ");
}

function field(label, value) {
  const body = text(value);
  if (!body) return "";
  return `<div class="field"><strong>${label}</strong><div class="field-body">${formatRich(body)}</div></div>`;
}

      ? ` <a href="${escapeHtml(data.url)}">link</a>`
      : "";
    return `<li class="blocker-item"><div>${summary}${link}</div>${meta ? `<div class="blocker-meta">${escapeHtml(meta)}</div>` : ""}</li>`;
  }).join("");
  return `<div class="skip-detail"><strong>${labels[lang].blockerDetails}:</strong></div><ul class="blocker-list">${rendered}</ul>`;
}

function blockerKindLabel(kind) {
  return (labels[lang].blockerKinds || {})[kind] || text(kind);
}

function inlineCommentText(comment) {
  if (comment === undefined || comment === null) return "";
  if (typeof comment !== "object" || Array.isArray(comment)) {
    return text(comment);
  }
  return text(comment.body || comment.summary || comment.message || "");
}

function allPrText(item) {
  const comments = (item.inline_comments || []).map(comment => [
    comment.severity,
    comment.focus,
    comment.body,
    comment.summary,
    comment.path
  ].map(value => text(value)).join(" ")).join(" ");
  const blockers = blockersSearchText(item.blockers);
  return [
    item.status,
    item.number,
    item.title,
    item.author,
    item.problem,
    item.approach,
    item.outcome,
    item.risk,
    item.ci_state,
    item.skip_reason,
    item.readiness_audit,
    item.modules,
    item.api_surface,
    comments,
    blockers
  ].map(value => text(value)).join(" ").toLowerCase();
}

function readingAdvice(item) {
  const status = item.status || "skipped";
  const comments = item.inline_comments || [];
  const blockers = item.blockers || [];
  const body = allPrText(item);
  const hasP1 = comments.some(comment =>
    /\bP[01]\b/i.test(text(comment.severity)) ||
    /\bP[01]\b/i.test(inlineCommentText(comment))
  );
  const hasCriticalRisk = hasP1 ||
    /(security|安全|bypass|绕过|breaking|破坏性|unbounded|无界|丢失|重复|不稳定|兼容|api|go-apidiff|failure|失败|不能 merge|不能合入|race|并发)/i.test(body);
  const highImpactFeature =
    /(add|new|新增|support|支持|agent|runner|session|memory|graphrag|knowledge|openapi|workspace_exec|policy|extension|tool|graph|api)/i.test(body);

  const copy = {
    critical: {
      icon: "🔥",
      zh: "重点精读",
      en: "Deep Read",
      reasonZh: comments.length
        ? `有 ${comments.length} 条行级评论，且包含 P1/兼容/正确性/安全类风险。`
        : "包含高风险兼容性或正确性信号，需要重点复核。",
      reasonEn: comments.length
        ? `${comments.length} inline comment(s), including P1, compatibility, correctness, or security risk.`
        : "High-risk compatibility or correctness signal; review carefully."
    },
    focus: {
      icon: "🔎",
      zh: "建议细看",
      en: "Read Carefully",
      reasonZh: comments.length
        ? `有 ${comments.length} 条评论或重要设计取舍，建议看完整结论。`
        : "涉及核心模块、导出 API 或较大功能，建议细看。",
      reasonEn: comments.length
        ? `${comments.length} comment(s) or important design tradeoffs; read the full conclusion.`
        : "Core module, exported API, or larger feature; read carefully."
    },
    skim: {
      icon: "✅",
      zh: "快速略看",
      en: "Quick Skim",
      reasonZh: "风险低或改动较直接，扫结论和 CI 状态即可。",
      reasonEn: "Low risk or straightforward change; skim outcome and CI state."
    },
    follow: {
      icon: "⏳",
      zh: "只看阻塞",
      en: "Blocker Only",
      reasonZh: blockers.length
        ? `主要看 ${blockers.length} 个具体阻塞点，暂不需要读完整实现。`
        : "当前不是可合并状态，先看阻塞和后续动作。",
      reasonEn: blockers.length
        ? `Focus on ${blockers.length} concrete blocker(s); no need to read the full implementation yet.`
        : "Not merge-ready; focus on blockers and next action."
    }
  };

  let level = "skim";
  if (status === "blocked") {
    level = "follow";
  } else if (status === "commented") {
    level = hasCriticalRisk ? "critical" : "focus";
  } else if (status === "maintained") {
    level = hasCriticalRisk || highImpactFeature ? "focus" : "skim";
  } else if (status === "approved") {
    level = hasCriticalRisk || highImpactFeature ? "focus" : "skim";
  } else if (status === "merged") {
    level = highImpactFeature || hasCriticalRisk ? "focus" : "skim";
  } else if (status === "skipped") {
    level = blockers.length || /(conflict|ci|failure|失败|未回应|review)/i.test(body)
      ? "follow"
      : "skim";
  }

  const selected = copy[level];
  return {
    level,
    icon: selected.icon,
    label: lang === "zh" ? selected.zh : selected.en,
    reason: lang === "zh" ? selected.reasonZh : selected.reasonEn
  };
}

function priorityRank(level) {
  return { critical: 4, focus: 3, follow: 2, skim: 1 }[level] || 0;
}

function renderReadingGuide(items) {
  const panel = document.getElementById("readingGuidePanel");
  const container = document.getElementById("readingGuide");
  const candidates = [
    ...items.filter(item => (item.status || "skipped") !== "skipped"),
    ...(reportData.follow_up || []).map(item => ({ ...item, status: item.status || "blocked" }))
  ].map(item => ({ item, advice: readingAdvice(item) }))
    .filter(entry => entry.advice.level !== "skim")
    .sort((left, right) => priorityRank(right.advice.level) - priorityRank(left.advice.level));

  if (!candidates.length) {
    panel.style.display = "none";
    container.innerHTML = "";
    return;
  }

  panel.style.display = "block";
  container.innerHTML = candidates.slice(0, 9).map(entry => {
    const item = entry.item;
    const advice = entry.advice;
    const prText = item.number ? `#${item.number}` : "PR";
    const prLink = item.url
      ? `<a href="${escapeHtml(item.url)}">${prText} · ${escapeHtml(text(item.title))}</a>`
      : `<span>${prText} · ${escapeHtml(text(item.title))}</span>`;
    return `
      <article class="guide-card ${advice.level}">
        <div class="guide-meta">
          <span class="read-pill ${advice.level}">${advice.icon} ${escapeHtml(advice.label)}</span>
          <span class="badge ${item.status || "skipped"}">${labels[lang][item.status] || item.status || labels[lang].skipped}</span>
        </div>
        <div>${prLink}</div>
        <div class="guide-reason">${escapeHtml(advice.reason)}</div>
      </article>
    `;
  }).join("");
}

function storyLine(label, value) {
  const body = text(value);
  if (!body) return "";
  return `
    <p class="story-line">
      <span class="story-label">${escapeHtml(label)}</span>
      <span class="story-text">${formatRich(body)}</span>
    </p>
  `;
}

function storyBlock(title, rows, className = "") {
  const body = rows.filter(Boolean).join("");
  if (!body) return "";
  const classes = ["story-block", className].filter(Boolean).join(" ");
  return `<section class="${classes}"><h4>${escapeHtml(title)}</h4>${body}</section>`;
}

function compactSummary(item) {
  const candidates = [
    item.outcome,
    item.skip_reason,
    item.reason,
    item.problem,
    item.design_assessment,
    item.risk
  ].map(value => text(value).trim()).filter(Boolean);
  return candidates[0] || labels[lang].summaryFallback;
}

function updateCardToggle(card) {
  const button = card.querySelector(".card-toggle");
  if (!button) return;
  const open = card.classList.contains("open");
  button.textContent = open ? labels[lang].collapseDetails : labels[lang].expandDetails;
  button.setAttribute("aria-expanded", open ? "true" : "false");
}

function setCardOpen(card, open) {
  card.classList.toggle("open", open);
  updateCardToggle(card);
}

function factItem(label, value) {
  const body = text(value);
  if (!body) return "";
  return `
    <div class="fact">
      <dt>${escapeHtml(label)}</dt>
      <dd>${formatRich(body)}</dd>
    </div>
  `;
}

function directFixesText(fixes) {
  if (!Array.isArray(fixes) || !fixes.length) return "";
  return fixes.map(fix => {
    if (typeof fix !== "object" || fix === null) return text(fix);
    return [
      fix.branch ? `branch: ${text(fix.branch)}` : "",
      fix.commit ? `commit: ${text(fix.commit)}` : "",
      fix.message ? `message: ${text(fix.message)}` : "",
      fix.files ? `files: ${Array.isArray(fix.files) ? fix.files.map(file => text(file)).join(", ") : text(fix.files)}` : "",
      fix.tests ? `tests: ${Array.isArray(fix.tests) ? fix.tests.map(test => text(test)).join(", ") : text(fix.tests)}` : "",
      fix.push_state ? `push: ${text(fix.push_state)}` : "",
      fix.ci_state ? `CI: ${text(fix.ci_state)}` : ""
    ].filter(Boolean).join(" · ");
  }).join("\n");
}

function renderReviewRail(item) {
  const advice = readingAdvice(item);
  const callout = `
    <div class="reading-callout ${advice.level}">
      <strong>${advice.icon} ${escapeHtml(advice.label)}</strong>
      <span>${escapeHtml(advice.reason)}</span>
    </div>
  `;
  const facts = [
    factItem(labels[lang].outcome, item.outcome),
    factItem(labels[lang].risk, item.risk),
    factItem(labels[lang].ci, item.ci_state),
    factItem(labels[lang].attentionPoints, item.attention_points),
    factItem(labels[lang].directFixes, directFixesText(item.direct_fixes)),
    factItem(labels[lang].selfReviewPolicy, item.self_review_policy),
    factItem(labels[lang].testsDocs, item.tests_docs),
    factItem(labels[lang].modules, item.modules),
    factItem(labels[lang].apiSurface, item.api_surface),
    factItem(labels[lang].reason, item.skip_reason)
  ].filter(Boolean).join("");
  if (!facts) return `<aside class="review-rail">${callout}</aside>`;
  return `<aside class="review-rail">${callout}<h4>${labels[lang].reviewSummary}</h4><dl class="fact-list">${facts}</dl></aside>`;
}

function renderComments(item) {
  const comments = item.inline_comments || [];
  if (!comments.length) return "";
  const rendered = comments.map(comment => {
    const data = typeof comment === "object" && comment !== null && !Array.isArray(comment)
      ? comment
      : { body: comment };
    const location = `${escapeHtml(data.path || "")}${data.line ? ":" + escapeHtml(data.line) : ""}`;
    const source = data.url
      ? `<a class="comment-link" href="${escapeHtml(data.url)}">GitHub</a>`
      : "";
    return `
      <div class="comment">
        <div class="comment-head">
          <strong>${location}</strong>
          ${source}
        </div>
        <div>${formatRich(inlineCommentText(data))}</div>
        ${data.focus ? `<div><strong>${labels[lang].focus}:</strong> ${escapeHtml(text(data.focus))}</div>` : ""}
        ${data.severity ? `<div><strong>${labels[lang].severity}:</strong> ${escapeHtml(text(data.severity))}</div>` : ""}
      </div>
    `;
  }).join("");
  return `<section class="comments-panel">
    <h4>${labels[lang].inlineComments}</h4>
    <div class="comment-list">${rendered}</div>
  </section>`;
}

function renderPrReadout(item) {
  const story = [
    storyBlock(labels[lang].backgroundAndProblem, [
      storyLine(labels[lang].technicalBackground, item.technical_background),
      storyLine(labels[lang].problem, item.problem),
      storyLine(labels[lang].problemFraming, item.problem_framing),
      storyLine(labels[lang].rootCause, item.root_cause)
    ], "hero-block"),
    storyBlock(labels[lang].solutionAndTradeoffs, [
      storyLine(labels[lang].approach, item.approach),
      storyLine(labels[lang].alternativeDesigns, item.alternative_designs),
      storyLine(labels[lang].tradeoffs, item.tradeoffs),
      storyLine(labels[lang].designAssessment, item.design_assessment)
    ]),
    storyBlock(labels[lang].impactAndEvidence, [
      storyLine(labels[lang].changeInventory, item.change_inventory),
      storyLine(labels[lang].semanticChanges, item.semantic_changes),
      storyLine(labels[lang].behaviorImpact, item.behavior_impact),
      storyLine(labels[lang].moduleImpact, item.module_impact),
      storyLine(labels[lang].crossModuleImpact, item.cross_module_impact)
    ]),
    renderComments(item)
  ].filter(Boolean).join("");
  return `<div class="pr-readout"><div class="pr-story">${story}</div>${renderReviewRail(item)}</div>`;
}

function renderCards() {
  const query = document.getElementById("search").value.trim();
  const visible = prs().filter(item => (item.status || "skipped") !== "skipped")
    .filter(item => {
    const status = item.status || "skipped";
    return (filter === "all" || status === filter) && matchesSearch(item, query);
  });
  const container = document.getElementById("cards");
  if (!visible.length) {
    container.innerHTML = `<div class="empty">${labels[lang].empty}</div>`;
    return;
  }
  container.innerHTML = visible.map(item => {
    const status = item.status || "skipped";
    const advice = readingAdvice(item);
    const summary = compactSummary(item);
    const prText = item.number ? `#${item.number}` : "PR";
    const prLink = item.url
      ? `<a href="${escapeHtml(item.url)}">${prText}</a>`
      : prText;
    return `
      <article class="card priority-${advice.level}" data-status="${status}">
        <div class="card-head">
          <div>
            <div class="headline-row">
              <h3 class="card-title">${prLink} · ${escapeHtml(text(item.title))}</h3>
              <span class="read-pill ${advice.level}">${advice.icon} ${escapeHtml(advice.label)}</span>
            </div>
            <div class="meta">
              <span>${labels[lang].author}: ${escapeHtml(item.author || "")}</span>
              <span class="advice-reason">${escapeHtml(advice.reason)}</span>
            </div>
            <div class="card-summary">${formatRich(summary)}</div>
          </div>
          <div class="card-actions">
            <span class="badge ${status}">${labels[lang][status] || status}</span>
            <button class="card-toggle" type="button" aria-expanded="false">${labels[lang].expandDetails}</button>
          </div>
        </div>
        <div class="card-body">
          ${renderPrReadout(item)}
        </div>
      </article>
    `;
  }).join("");
  document.querySelectorAll(".card-head").forEach(head => {
    head.addEventListener("click", event => {
      if (event.target.closest("a")) return;
      const card = head.closest(".card");
      setCardOpen(card, !card.classList.contains("open"));
    });
  });
  document.querySelectorAll(".card").forEach(card => updateCardToggle(card));
}

function renderSkipGroups() {
  const heading = document.getElementById("skippedHeading");
  const container = document.getElementById("skipGroups");
  if (!["all", "skipped"].includes(filter)) {
    heading.style.display = "none";
    container.style.display = "none";
    return;
  }
  heading.style.display = "flex";
  container.style.display = "grid";
  const query = document.getElementById("search").value.trim();
  const groups = skippedGroups().map(group => {
    const reason = group.reason || "";
    const items = (group.items || []).map(item => ({
      ...item,
      status: item.status || "skipped",
      group_reason: reason,
      skip_reason: item.skip_reason || reason
    })).filter(item => matchesSearch(item, query));
    return { reason, items };
  }).filter(group => group.items.length > 0);
  if (!groups.length) {
    container.innerHTML = `<div class="empty">${labels[lang].empty}</div>`;
    return;
  }
  container.innerHTML = groups.map((group, index) => `
    <article class="skip-group open">
      <div class="skip-group-head" data-skip-group="${index}">
        <h3 class="skip-group-title">${escapeHtml(text(group.reason))}</h3>
        <span class="skip-group-count">${group.items.length} ${labels[lang].items}</span>
      </div>
      <div class="skip-group-body">
        ${group.items.map(item => {
          const prText = item.number ? `#${item.number}` : "PR";
          const prLink = item.url
            ? `<a href="${escapeHtml(item.url)}">${prText}</a>`
            : prText;
          return `
            <div class="skip-row">
              <div>
                <div class="skip-title">${prLink} · ${escapeHtml(text(item.title))}</div>
                <div class="skip-detail">${labels[lang].author}: ${escapeHtml(item.author || "")}</div>
              </div>
              <div>
                <div><strong>${labels[lang].blocker}:</strong> ${formatRich(text(item.skip_reason))}</div>
                ${item.readiness_audit ? `<div class="skip-detail"><strong>${labels[lang].readinessAudit}:</strong> ${formatRich(text(item.readiness_audit))}</div>` : ""}
                ${renderBlockers(item)}
                ${item.ci_state ? `<div class="skip-detail">${formatRich(text(item.ci_state))}</div>` : ""}
                ${item.risk ? `<div class="skip-detail">${formatRich(text(item.risk))}</div>` : ""}
              </div>
            </div>
          `;
        }).join("")}
      </div>
    </article>
  `).join("");
  document.querySelectorAll("[data-skip-group]").forEach(head => {
    head.addEventListener("click", () => {
      head.closest(".skip-group").classList.toggle("open");
    });
  });
}

function renderFollowUp() {
  const heading = document.getElementById("followUpHeading");
  const container = document.getElementById("followUpCards");
  if (!["all", "skipped", "blocked"].includes(filter)) {
    heading.style.display = "none";
    container.style.display = "none";
    return;
  }
  const query = document.getElementById("search").value.trim().toLowerCase();
  const items = (reportData.follow_up || []).filter(item => {
    if (!query) return true;
    return [
      item.number,
      item.author,
      text(item.title),
      text(item.reason),
      text(item.next)
    ].join(" ").toLowerCase().includes(query);
  });
  if (!items.length) {
    heading.style.display = "none";
    container.style.display = "none";
    return;
  }
  heading.style.display = "flex";
  container.style.display = "grid";
  container.innerHTML = items.map(item => {
    const prText = item.number ? `#${item.number}` : "PR";
    const prLink = item.url
      ? `<a href="${escapeHtml(item.url)}">${prText}</a>`
      : prText;
    return `
      <article class="card open" data-status="blocked">
        <div class="card-head">
          <div>
            <h3 class="card-title">${prLink} · ${escapeHtml(text(item.title))}</h3>
            <div class="meta">${labels[lang].author}: ${escapeHtml(item.author || "")}</div>
          </div>
          <span class="badge blocked">${labels[lang].followups}</span>
        </div>
        <div class="card-body">
          <div class="grid">
            ${field(labels[lang].reason, item.reason)}
            ${field(labels[lang].outcome, item.next)}
          </div>
        </div>
      </article>
    `;
  }).join("");
}

function render() {
  const items = prs();
  renderStatic();
  renderMetrics(items);
  renderBars(items);
  renderTimeline();
  renderOverview();
  renderReadingGuide(items);
  renderChips();
  renderCards();
  renderSkipGroups();
  renderFollowUp();
}

document.querySelectorAll("[data-lang-button]").forEach(button => {
  button.addEventListener("click", () => setLanguage(button.dataset.langButton));
});
document.getElementById("search").addEventListener("input", () => {
  renderCards();
  renderSkipGroups();
  renderFollowUp();
});
document.getElementById("openAll").addEventListener("click", () => {
  document.querySelectorAll(".card").forEach(card => setCardOpen(card, true));
  document.querySelectorAll(".skip-group").forEach(node => node.classList.add("open"));
});
document.getElementById("closeAll").addEventListener("click", () => {
  document.querySelectorAll(".card").forEach(card => setCardOpen(card, false));
  document.querySelectorAll(".skip-group").forEach(node => node.classList.remove("open"));
});
render();
</script>
</body>
</html>
