.meta {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 7px;
}
.badge {
  gap: 7px;
  min-width: 0;
  padding: 6px 11px;
  text-transform: none;
  white-space: nowrap;
}
.card-summary {
  color: #526173;
  margin-top: 9px;
}
.badge::before {
  content: "";
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: currentColor;
}
.card-body {
  background: #fff;
  padding: 0 18px 18px;
}
.grid {
  grid-template-columns: 1fr;
  gap: 10px;
}
.field {
  background: #fbfcfe;
  border-color: #e6ecf3;
  padding: 13px 14px;
}
.field strong {
  color: #536175;
  font-size: 11px;
  letter-spacing: 0;
  text-transform: uppercase;
}
.field-body {
  color: #1f2937;
  line-height: 1.62;
}
.comment {
  background: #fff8ed;
  border-left-color: var(--accent-2);
  color: #1f2937;
}
.comment-head {
  color: #1f2937;
}
.pr-readout {
  grid-template-columns: minmax(0, 1fr);
  gap: 18px;
}
.story-block {
  border-top-color: #e2e8f0;
}
.story-block.hero-block {
  background: linear-gradient(180deg, #fbfffe, #f7fbfa);
  border-color: #d5e7e4;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
}
.story-block h4,
.review-rail h4,
.comments-panel h4 {
  font-size: 13px;
  font-weight: 900;
}
.story-line {
  grid-template-columns: 116px minmax(0, 1fr);
  border-top-color: #e9eef5;
}
.story-label {
  color: #607086;
}
.review-rail {
  border: 1px solid #e3eaf2;
  border-radius: 8px;
  padding: 14px;
  background: #fbfcfe;
}
.review-rail .fact-list {
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
}
.fact {
  border-top-color: #e8eef5;
}
.comments-panel {
  border-top-color: #e2e8f0;
}
.comment-list {
  gap: 12px;
}
.skip-group {
  box-shadow: var(--shadow);
}
.skip-group-head {
  align-items: center;
  background: linear-gradient(180deg, #fff, #fbfcfe);
}
.skip-row {
  grid-template-columns: minmax(0, 1.15fr) minmax(220px, 0.85fr);
}
.blocker-item {
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.75);
}
.empty {
  background: #fff;
  box-shadow: var(--shadow);
}
@media (max-width: 840px) {
  .topbar, .card-head { grid-template-columns: 1fr; display: grid; }
  .card-actions { align-items: flex-start; flex-direction: row; flex-wrap: wrap; }
  .dashboard, .grid, .metrics { grid-template-columns: 1fr; }
  .guide-grid { grid-template-columns: 1fr; }
  .headline-row { align-items: flex-start; flex-direction: column; }
  .pr-readout { grid-template-columns: 1fr; }
  .review-rail { position: static; }
  .story-line { grid-template-columns: 1fr; gap: 4px; }
  .timeline-item { grid-template-columns: 1fr; }
  .controls { position: static; }
  .utilities { width: 100%; margin-left: 0; }
  .utility-button { flex: 1 1 auto; }
  .skip-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div>
      <h1 data-i18n="title">MyCR 审核报告</h1>
      <p class="subtitle" id="subtitle"></p>
    </div>
    <div class="toggle" aria-label="Language">
      <button type="button" data-lang-button="zh" class="active">中文</button>
      <button type="button" data-lang-button="en">EN</button>
    </div>
  </div>
  <section class="metrics" id="metrics"></section>
  <section class="dashboard">
    <div class="panel">
      <h2 data-i18n="statusDistribution">状态分布</h2>
      <div class="bars" id="bars"></div>
    </div>
    <div class="panel">
      <h2 data-i18n="timeline">执行时间线</h2>
      <div class="timeline" id="timeline"></div>
    </div>
  </section>
  <section class="panel" id="overviewPanel" style="display: none; margin-top: 16px;">
    <h2 data-i18n="overviewSection">整体摘要</h2>
    <div class="overview-content" id="overviewContent"></div>
  </section>
  <section class="panel reading-guide" id="readingGuidePanel" style="display: none;">
    <div class="guide-head">
      <h2 data-i18n="readingGuide">阅读建议</h2>
      <span data-i18n="readingGuideHint">先看高风险和高影响 PR</span>
    </div>
    <div class="guide-grid" id="readingGuide"></div>
  </section>
  <section class="controls">
    <input class="search" id="search" type="search">
    <div class="chips" id="chips"></div>
    <div class="utilities">
      <button type="button" class="utility-button" id="openAll"></button>
      <button type="button" class="utility-button" id="closeAll"></button>
    </div>
  </section>
  <section class="section-heading">
    <h2 data-i18n="reviewedSection">已处理 PR</h2>
    <div class="hint" data-i18n="reviewedHint">点击卡片查看细节</div>
  </section>
  <main class="cards" id="cards"></main>
  <section class="section-heading" id="skippedHeading">
    <h2 data-i18n="skippedGroups">未审核 PR 分类</h2>
    <div class="hint" data-i18n="skippedHint">按排除原因分组</div>
  </section>
  <section class="skip-groups" id="skipGroups"></section>
  <section class="section-heading" id="followUpHeading">
    <h2 data-i18n="followUpSection">后续关注</h2>
    <div class="hint" data-i18n="followUpHint">接近可处理但仍有阻塞</div>
  </section>
  <section class="cards" id="followUpCards"></section>
  <div class="footer" id="footer"></div>
</div>
<script>
const reportData = {"approved":[{"alternative_designs":"A named return value plus defer could also express the same cleanup contract. A more invasive helper could wrap commit errors too, but that would change existing semantics unnecessarily.","api_surface":"No exported API change. The semantic contract of existing `Client.Transaction` becomes safer on panic.","approach":"The implementation changes the callback assignment from short declaration to the outer `err`, adds a deferred function that rolls back on panic or non-nil callback error, and re-panics after rollback. It keeps the commit path unchanged. Tests cover panic before and after an exec plus returned-error rollback.","approval_body":"LGTM","approval_url":"https://github.com/trpc-group/trpc-agent-go/pull/2030#pullrequestreview-4587293291","attention_points":"Commit failures still behave as before; this PR intentionally does not roll back after commit failure.","author":"shanghai-Jerry","behavior_impact":"Before: panic could leak an open transaction. After: panic triggers rollback and then propagates unchanged.","change_inventory":"Modified `sqlDBClient.Transaction`; added three `TestSQLDBClient_Transaction` subcases for panic rollback and normal error rollback.","ci_state":"Final refresh showed no failing or pending checks before merge.","cross_module_impact":"No cross-module contract changes beyond safer cleanup behavior.","design_assessment":"Good local fix. It reaches the right balance for a storage helper: catch the leak, preserve panic semantics, avoid expanding the transaction API.","head_sha":"5fd16ff5bae4e2ea8229329c62eb589f24975ec7","match_head_commit":"5fd16ff5bae4e2ea8229329c62eb589f24975ec7","merge_commit":"890961c4d61353ee376356fff92070f07cfbb0b5","merged_at":"2026-06-28T08:58:49Z","module_impact":"Directly affects MySQL storage users. Indirectly protects callers that execute multiple statements in callback transactions.","modules":"storage/mysql transaction wrapper and sqlmock transaction tests","number":2030,"outcome":"xhigh 子审无发现；主线程复核 diff 和目标测试后提交 `LGTM`，并按 head `5fd16ff5bae4e2ea8229329c62eb589f24975ec7` squash merge。","problem":"The PR fixes a transaction-leak gap when the callback panics. The old implementation rolled back only when the callback returned an error, so panic paths could leave an open transaction after partially executed statements.","problem_framing":"The immediate symptom is leaked MySQL transactions. The root cause is that callback-style transaction helpers must treat panic as another abnormal exit path and centralize rollback in a defer rather than only around explicit `error` returns.","risk":"Low.","root_cause":"Rollback lived next to `fn(tx)` error handling, not in a deferred cleanup block that observes every exit path.","semantic_changes":"A panic inside the transaction callback now rolls back before propagating. Returned errors still roll back; successful callbacks still commit.","status":"merged","technical_background":"`storage/mysql` exposes a small SQL client abstraction used by storage/session modules. Its `Transaction` helper opens a `database/sql` transaction, passes `*sql.Tx` to caller code, and must either commit exactly once or roll back when user code fails. A panic is different from a returned error: without a defer/recover guard, the panic unwinds past the helper and leaves the transaction open until the driver notices the abandoned connection.","tests_docs":"`go test . -run TestSQLDBClient_Transaction -count=1` passed in an isolated worktree under `storage/mysql`; GitHub checks were green.","title":"fix: add panic recovery to MySQL Transaction to prevent tx leak","tradeoffs":"The chosen design is narrow and low-risk: it adds rollback on panic without changing successful transactions or commit-failure behavior. It intentionally ignores rollback errors, consistent with the existing error path.","updated_at":"2026-06-27T12:39:26Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/2030"},{"alternative_designs":"The file could have been rewritten as an archived rationale, but deletion is simpler when the design is not an active supported contract.","api_surface":"No exported API or user-visible runtime behavior change.","approach":"Deletes `docs/design/debuglog-plugin.md` without changing code or MkDocs navigation.","approval_body":"LGTM","approval_url":"https://github.com/trpc-group/trpc-agent-go/pull/1991#pullrequestreview-4587296150","attention_points":"If the team wants archived design history, use an explicit archive page later.","author":"Flash-LHR","behavior_impact":"Readers no longer see the stale design note in source browsing.","change_inventory":"Removed one design markdown file.","ci_state":"Final refresh showed no failing or pending checks before merge.","cross_module_impact":"None found.","design_assessment":"Appropriate cleanup because no published navigation/reference dependency was found.","head_sha":"7f4c4813b847c840b0ae23ce93f55a3a7e9f53b3","match_head_commit":"7f4c4813b847c840b0ae23ce93f55a3a7e9f53b3","merge_commit":"a2c0a163e604f2e27aad85d47276cf6de40942f1","merged_at":"2026-06-28T09:01:49Z","module_impact":"Documentation repository only.","modules":"docs/design","number":1991,"outcome":"xhigh 子审无发现；主线程确认无 navigation/reference risk 后提交 `LGTM`，并按 head `7f4c4813b847c840b0ae23ce93f55a3a7e9f53b3` squash merge。","problem":"The PR removes an obsolete DebugLog plugin design document that no longer represents the current direction of the repository.","problem_framing":"The underlying issue is stale design documentation: keeping unimplemented or superseded plans can mislead contributors about supported plugin APIs.","risk":"Low.","root_cause":"A historical design note remained in-tree after the corresponding direction was no longer current.","semantic_changes":"No runtime behavior change.","status":"merged","technical_background":"`docs/design` stores design notes that are not necessarily part of the published MkDocs navigation. Removing an obsolete design-only file is mostly a repository hygiene change, but it still needs checking for navigation or inbound references.","tests_docs":"No tests needed for a standalone unreferenced design-doc deletion; GitHub checks were green.","title":"docs/design: remove debuglog plugin design doc","tradeoffs":"Deletion reduces stale guidance, at the cost of losing historical context in the docs tree. Git history still preserves it.","updated_at":"2026-06-23T06:33:50Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/1991"},{"alternative_designs":"The docs could move this into a separate advanced section only, but putting a short warning near setup prevents the common misread earlier.","api_surface":"No exported API change. Documents existing `llmagent.WithSyncSummaryIntraRun(true)` and summary options.","approach":"Adds EN/ZH clarification that `WithAsyncSummaryNum` is not a mode switch, keeps the main example on async defaults, and documents the synchronous intra-run path plus its fallback/serialization caveats.","approval_body":"LGTM","approval_url":"https://github.com/trpc-group/trpc-agent-go/pull/2000#pullrequestreview-4587297175","attention_points":"No residual blocker after review.","author":"Rememorio","behavior_impact":"Users are less likely to set worker concurrency expecting sync behavior or summary disablement.","change_inventory":"Updated English and Chinese session summary docs with mode and trigger timing clarifications.","ci_state":"Final refresh showed no failing or pending checks before merge.","cross_module_impact":"Clarifies interaction between `session/summary`, `runner`, and `llmagent` options.","design_assessment":"Good documentation fix; it teaches the behavior without changing APIs.","head_sha":"f49f80253d2761bdf3f130793510dcb780a48003","match_head_commit":"f49f80253d2761bdf3f130793510dcb780a48003","merge_commit":"999d08fc3fc2691768297d6acee1b09dc3090185","merged_at":"2026-06-28T09:02:54Z","module_impact":"Documentation only; affects users configuring session summary.","modules":"docs/mkdocs/{en,zh}/session/summary.md","number":2000,"outcome":"xhigh 子审无发现；主线程复核 docs 与实现语义一致后提交 `LGTM`，并按 head `f49f80253d2761bdf3f130793510dcb780a48003` squash merge。","problem":"The existing docs could be read as if async worker count selected sync vs async summary mode or disabled summaries, which is not the actual API model.","problem_framing":"The deeper problem is naming ambiguity: concurrency knobs and execution-mode knobs are separate, but both are near the summary setup path.","risk":"Low.","root_cause":"The docs lacked an explicit explanation tying `WithAsyncSummaryNum`, `WithSummarizer`, and `WithSyncSummaryIntraRun` to separate responsibilities.","semantic_changes":"No runtime behavior change.","status":"merged","technical_background":"Session summary has both async background workers and a synchronous intra-run refresh option. `WithAsyncSummaryNum` controls only async worker concurrency, while `llmagent.WithSyncSummaryIntraRun(true)` controls whether a long ReAct/tool loop refreshes summary before the next model call in the same `Run`.","tests_docs":"Docs-only PR with green GitHub checks.","title":"docs: clarify summary sync behavior","tradeoffs":"More text in the quick-start area, but it prevents misconfiguration of summary generation.","updated_at":"2026-06-26T03:28:17Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/2000"},{"alternative_designs":"A looser design could let the optimizer rewrite the whole tool declaration, but that would risk schema/function drift. Another design could keep this as example-only logic, but then server/workflow users would not get reusable support.","api_surface":"User-visible additions include tool-surface behavior in PromptIter docs/examples and structured optimizer output for tool-description patches. Existing schemas/functions are preserved.","approach":"Adds tool-surface extraction and sanitization, optimizer structured output for `Description`/`Reason`, engine tests for targeted tool surface acceptance, server tests, EN/ZH docs, and a runnable travel lookup example that optimizes a misleading tool description.","approval_body":"LGTM","approval_url":"https://github.com/trpc-group/trpc-agent-go/pull/2025#pullrequestreview-4587313269","attention_points":"Future polish could assert printed example summary lines and clarify `-data-dir`; not required before merge.","author":"Flash-LHR","behavior_impact":"Before: tool-description quality had to be edited manually or via broad prompt changes. After: PromptIter can optimize a selected tool description and report accepted patches.","change_inventory":"Adds tool description docs, engine/profile/surface/optimizer changes, sanitizer tests, promptiter server tests, and `examples/evaluation/promptiter/tooldesc` data/code/README.","ci_state":"Final refresh showed no failing or pending checks before merge.","cross_module_impact":"Touches evaluation workflow, server handler, docs, and example modules but does not alter normal tool execution.","design_assessment":"Good fit for the root problem. It is a focused extension rather than an overbroad prompt rewrite path.","head_sha":"9cd9e9d33ead6773f77f3cdb30fbf5438749e154","match_head_commit":"9cd9e9d33ead6773f77f3cdb30fbf5438749e154","merge_commit":"8b9cfb7015114936558d6611b89ad9a22231aa74","merged_at":"2026-06-28T09:15:34Z","module_impact":"Direct impact on PromptIter workflow/server/example modules. Indirect impact on agent/tool users who rely on generated tool descriptions for model routing.","modules":"evaluation/workflow/promptiter, server/promptiter, examples/evaluation/promptiter/tooldesc, docs","number":2025,"outcome":"xhigh 子审无发现；主线程复核 bot suggestions 后提交 `LGTM`，并按 head `9cd9e9d33ead6773f77f3cdb30fbf5438749e154` squash merge。","problem":"The PR adds first-class tool-description optimization so PromptIter can improve static tool declaration descriptions, not only broader prompt text.","problem_framing":"The root product need is prompt quality for tool-using agents. The submitted design treats tool descriptions as a targeted surface, which is narrower and safer than letting the optimizer rewrite full tool schemas.","risk":"Low to medium because the change is broad, but green CI and sanitizer tests cover the high-risk schema-preservation contract.","root_cause":"PromptIter previously lacked a structured surface and sanitizer for changing only tool declaration text.","semantic_changes":"PromptIter can now target tool declaration descriptions and accept/reject those patches by validation score. Tool execution still goes through original Go functions.","status":"merged","technical_background":"PromptIter optimizes prompts by running evaluation rounds, aggregating gradients, proposing patches, validating them, and accepting only improvements. Tool descriptions are part of the model-visible prompt: a weak tool `Description` can cause poor tool selection even when the Go function and schema are correct. A tool-description surface therefore lets the optimizer patch only the declaration text while preserving the actual tool ID, input schema, output schema, and implementation.","tests_docs":"GitHub checks were green. CodeRabbit suggestions were reviewed and judged non-blocking example/docs polish rather than merge blockers.","title":"{evaluation, server/promptiter, examples}: add tool description optimization","tradeoffs":"The chosen surface is conservative: it improves selection text while preserving schemas and execution code. It adds some surface/patch machinery, but tests show schema fields remain unchanged.","updated_at":"2026-06-26T16:35:02Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/2025"},{"alternative_designs":"A smaller PR could update only vulnerable modules, but broad alignment reduces repeated security drift. A workspace-level dependency policy would reduce future churn but is outside this PR.","api_surface":"No exported project API change. The externally visible contract is dependency version selection for consumers of individual modules.","approach":"Updates go.mod/go.sum files across root, examples, model/storage/memory/knowledge/server modules; keeps code unchanged. CI validates build/test/lint across discovered modules.","approval_body":"LGTM","approval_url":"https://github.com/trpc-group/trpc-agent-go/pull/2021#pullrequestreview-4587321752","attention_points":"Continue watching downstream module consumers for dependency incompatibilities after release tagging.","author":"Rememorio","behavior_impact":"Users building affected modules will consume patched dependency versions.","change_inventory":"Updated dependency versions and sums in 119 files, including `golang.org/x/net`, `x/text`, `grpc`, `protobuf`, OpenTelemetry, and module-specific transitive dependencies.","ci_state":"Final refresh showed 162 passing checks, no failing or pending checks before merge.","cross_module_impact":"Aligns security-sensitive transitive dependencies across examples, integrations, storage, model, and server modules.","design_assessment":"Acceptable for a security/dependency maintenance PR. The important gate is green module CI and no obvious incompatible major-version jump in the reviewed stacks.","head_sha":"9fb4203fb29787b2011741bf9c8bf54a300fe472","match_head_commit":"9fb4203fb29787b2011741bf9c8bf54a300fe472","merge_commit":"496f0027612df1e1e671441fcc6de07a40f0c7ad","merged_at":"2026-06-28T09:23:58Z","module_impact":"Broad multi-module build graph impact; no single package implementation changed.","modules":"repository-wide go.mod/go.sum dependency graph","number":2021,"outcome":"xhigh 子审无发现；主线程复核依赖更新范围和最终 checks 后提交 `LGTM`，并按 head `9fb4203fb29787b2011741bf9c8bf54a300fe472` squash merge。","problem":"The PR updates vulnerable Go dependencies across modules to newer patched versions.","problem_framing":"The underlying issue is supply-chain hygiene. Because optional modules pin dependencies independently, vulnerability remediation must be repeated across many module boundaries instead of one root module.","risk":"Medium because of broad dependency surface, but acceptable after full green CI.","root_cause":"Multiple standalone modules hold separate dependency graphs, so vulnerable transitive versions can remain even after root updates.","semantic_changes":"Runtime behavior may change only through upstream dependency fixes. No repository source code behavior was changed directly.","status":"merged","technical_background":"This repository is a multi-module Go workspace. A dependency security update touches many module files because examples, storage drivers, model adapters, servers, and optional integrations pin their own `go.mod`/`go.sum`. The review risk is compatibility across shared stacks such as gRPC, protobuf, OpenTelemetry, `x/net`, `x/text`, and transitive security updates.","tests_docs":"xhigh dependency review reported no findings; final GitHub refresh showed 162 passing checks and no failures/pending checks.","title":"build(deps): update vulnerable go dependencies","tradeoffs":"Broad dependency updates increase review surface and potential version skew, but the lack of code changes and 162 green checks reduce immediate risk.","updated_at":"2026-06-26T03:26:21Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/2021"}],"blocked":[],"commented":[{"alternative_designs":"Use plain insert for hard-delete mode, and for soft-delete mode revive only if the conflicting row is known to be deleted. Another option is a conditional update with `deleted_at IS NOT NULL` followed by insert/error handling.","api_surface":"No exported API change.","approach":"Changes soft-delete removal from DELETE to UPDATE `deleted_at`, then uses `INSERT ... ON DUPLICATE KEY UPDATE ... deleted_at = NULL` for the new row.","attention_points":"Must restrict revive to soft-deleted rows and keep hard-delete plain insert.","author":"shanghai-Jerry","behavior_impact":"Potential active memory row overwrite on ID collision.","change_inventory":"Modified `rotateMemory`; added soft-delete rotation tests.","ci_state":"Checks were green, but review blocker is data correctness.","cross_module_impact":"Could corrupt memory content visible to agent flows and examples relying on mysqlvec storage.","design_assessment":"Needs a fix before merge. The current upsert changes collision semantics for active rows and hard-delete mode.","head_sha":"44a9b4d3fbf428c723d25db05db4385d8e159273","inline_comments":[{"body":"This upsert now overwrites any existing row with the same `memory_id`, not just a previously soft-deleted row. If rotating A produces the active id of B, the old insert would fail and roll back, but this path replaces B's content/metadata; keep hard-delete mode as a plain insert and only revive rows proven to be soft-deleted.\n\n<details><summary>中文<\/summary>\n这里的 upsert 会覆盖任何同 `memory_id` 的现有记录，而不只是复活之前软删除的记录。如果 A 更新后生成的新 id 正好等于仍然 active 的 B，旧逻辑会 duplicate-key 回滚，现在会把 B 的内容和元数据覆盖掉；建议 hard-delete 模式仍保持普通 INSERT，soft-delete 模式也只在确认冲突行已软删除时复活。\n<\/details>","line":432,"path":"memory/mysqlvec/service.go","review_id":4587293987,"url":"https://github.com/trpc-group/trpc-agent-go/pull/2017#discussion_r3487624067"}],"module_impact":"Affects MySQL vector memory updates and any agent memory using soft delete.","modules":"memory/mysqlvec rotateMemory soft-delete path","number":2017,"outcome":"Posted 1 inline comment: https://github.com/trpc-group/trpc-agent-go/pull/2017#discussion_r3487624067.","problem":"The PR tries to avoid duplicate-key failure when a soft-deleted old memory ID is reused during A -> B -> A rotation.","problem_framing":"The real invariant is stronger than “make duplicate key succeed”: active memories must remain immutable unless they are the row being updated, while soft-deleted duplicates can be revived safely.","risk":"High until fixed because it can overwrite stored memory.","root_cause":"A blanket MySQL upsert cannot distinguish an intended revive of a deleted row from an accidental collision with an active row.","semantic_changes":"Would turn active `memory_id` collisions from duplicate-key rollback into overwrite, which is not safe.","status":"commented","technical_background":"`memory/mysqlvec` stores vector memory rows keyed by `memory_id`. `rotateMemory` replaces an entry when updated content hashes to a new ID. In soft-delete mode, the old row is marked deleted instead of removed, and a later insert may need to revive a previously soft-deleted row. That revive path must not overwrite a different still-active memory row.","tests_docs":"Existing tests cover revive-like SQL shape but not active-duplicate preservation.","title":"fix: use UPDATE instead of DELETE for soft delete in rotateMemory","tradeoffs":"The submitted approach is simple but too broad; the safer design is slightly more SQL but preserves data integrity.","updated_at":"2026-06-28T08:59:31Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/2017"},{"alternative_designs":"Docs could recommend disabling fork mode for redaction, or code could allow a sanitized parent request hook. This PR only updates docs.","api_surface":"No API change.","approach":"Expands EN/ZH docs with standalone vs fork request construction and prompt rules.","attention_points":"Add explicit warning that hook text/event edits do not sanitize cloned parent requests.","author":"Rememorio","behavior_impact":"Readers should understand when hook-based redaction is not applied.","change_inventory":"Updated EN/ZH summary docs.","ci_state":"Checks were green; blocker is docs accuracy.","cross_module_impact":"Clarifies interaction between summary hook, model request construction, and cache-safe prompt behavior.","design_assessment":"Useful doc improvement, but needs the explicit caveat before merge.","head_sha":"43faae50762350a00cbd4df98ee7abdac80edc4d","inline_comments":[{"body":"Please make the fork-mode caveat explicit here and mirror it in the Chinese page: `WithPreSummaryHook` text/event edits do not sanitize the cloned parent request. Users who rely on the hook for redaction or filtering can otherwise enable cache-safe forking and still send the original parent messages/tool content to the summary model; they need standalone mode or a sanitized parent request for that use case.\n\n<details><summary>中文<\/summary>\n这里建议把 fork 模式的边界写得更明确，并同步到中文文档：`WithPreSummaryHook` 对 text/events 的修改不会对克隆出来的父请求做脱敏或过滤。否则依赖 hook 做 redaction/filtering 的用户开启 cache-safe forking 后，仍可能把原始 parent messages / tool content 发给摘要模型；这类场景应使用 standalone 模式，或先构造已脱敏的 parent request。\n<\/details>","line":194,"path":"docs/mkdocs/en/session/summary.md","review_id":4587295726,"url":"https://github.com/trpc-group/trpc-agent-go/pull/2027#discussion_r3487625850"}],"module_impact":"Docs for session summary configuration.","modules":"session summary docs cache-safe forking section","number":2027,"outcome":"Posted 1 inline comment: https://github.com/trpc-group/trpc-agent-go/pull/2027#discussion_r3487625850.","problem":"The PR clarifies cache-safe forking prompt rules and fallback behavior.","problem_framing":"The dangerous edge is redaction/filtering. Users may assume a pre-summary hook sanitizes all summary inputs, but fork mode sends the cloned parent request.","risk":"Medium documentation/privacy risk until caveat is added.","root_cause":"Documentation described that hook text is not embedded in fork mode but did not state the security/privacy implication.","semantic_changes":"No runtime change.","status":"commented","technical_background":"Cache-safe summary forking clones the parent `model.Request` so prompt-cache providers can reuse the same prefix. `WithPreSummaryHook` can rewrite extracted `conversationText` for standalone summary requests, but that rewritten text is not inserted when fork mode clones the existing parent request.","tests_docs":"Docs-only change; comment requests mirrored caveat in Chinese page too.","title":"docs(session): clarify cache-safe summary forking","tradeoffs":"Adding the caveat makes docs longer but avoids privacy surprises.","updated_at":"2026-06-28T09:01:20Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/2027"},{"alternative_designs":"Goal state could be a runner-level mode or external orchestration layer. An LLMAgent extension is lighter, but must respect tool callback and session persistence contracts.","api_surface":"Adds exported `goal.New`, options (`WithToolNames`, `WithMaxRetries`, etc.), `Goal`, `Start`, default constants, and tool names.","approach":"Adds goal package, options, state helpers, tools, enforcement callbacks, tests, docs, and example CLI.","attention_points":"Fix guidance rendering for custom names and derive state delta from invocation session instead of rendered tool-result content.","author":"bytethm","behavior_impact":"Could keep a run alive while a goal is active. Current issues could make the model call missing custom tools or lose goal state on persistent backends.","change_inventory":"New `agent/extension/goal` package, docs nav/pages, `examples/goal`, and tests.","ci_state":"Checks were green; blockers are API/persistence correctness.","cross_module_impact":"Interacts with model callbacks, tool callbacks, session state delta, runner completion, docs, and examples.","design_assessment":"Needs fixes before merge. The architecture is acceptable, but custom tool names and persistent backends are broken in realistic configurations.","head_sha":"4d05d0c8c5165ddcf688773938b7542a3ede9feb","inline_comments":[{"body":"This guidance still tells the model to call the default `create_goal`/`get_goal`/`update_goal` names even when `WithToolNames` registered custom names. With custom tool names the default tools are absent, so guidance injection should render the configured names, or custom names should disable/reject this guidance path.\n\n<details><summary>中文<\/summary>\n这里的 guidance 仍然让模型调用默认的 `create_goal` / `get_goal` / `update_goal`，但 `WithToolNames` 可以注册自定义名称，此时默认工具并不存在。建议用配置后的工具名动态渲染 guidance，或在自定义工具名时禁用/拒绝这条默认 guidance 路径。\n<\/details>","line":22,"path":"agent/extension/goal/format.go","review_id":4587298203,"url":"https://github.com/trpc-group/trpc-agent-go/pull/1980#discussion_r3487628486"},{"body":"Please do not derive the persisted state delta from the rendered tool-result message. `ToolResultMessages` callbacks can replace that message after `Call` has already updated `inv.Session`, so a normal formatter can make `create_goal`/`update_goal` appear to work during this run while emitting no durable state delta for persistent session backends. Read the current goal from the invocation session or attach the delta before result-message rewriting.\n\n<details><summary>中文<\/summary>\n这里不要从最终渲染出来的 tool-result message 反解持久化 state delta。`ToolResultMessages` callback 可以在 `Call` 已经更新 `inv.Session` 之后替换这条消息，所以普通格式化回调会让 `create_goal` / `update_goal` 在本次运行看起来成功，但对持久化 session 后端不写入 durable state delta。建议从 invocation session 读取当前 goal，或在 result message 被改写前就挂上 delta。\n<\/details>","line":249,"path":"agent/extension/goal/tools.go","review_id":4587298203,"url":"https://github.com/trpc-group/trpc-agent-go/pull/1980#discussion_r3487628487"}],"module_impact":"Affects LLMAgent extension users and session backends.","modules":"agent/extension/goal, docs, examples/goal","number":1980,"outcome":"Posted 2 inline comments: https://github.com/trpc-group/trpc-agent-go/pull/1980#discussion_r3487628486, https://github.com/trpc-group/trpc-agent-go/pull/1980#discussion_r3487628487.","problem":"The PR introduces a Goal extension so an agent can keep working until a session goal is complete or blocked.","problem_framing":"The root problem is lifecycle ownership: a model final response is not enough when an explicit persistent goal remains active. The extension is a reasonable architecture, but its tool naming and persistence hooks must align with existing extension customization and callback behavior.","risk":"High for custom configurations and persistent sessions until fixed.","root_cause":"Two integration seams were missed: custom tool names are public options, and framework tool-result callbacks can rewrite the message used for state delta extraction.","semantic_changes":"Active goals can cause final responses to be converted into non-final control events until the model updates goal state or retry budget is exhausted.","status":"commented","technical_background":"Agent extensions can register tools and model callbacks around an `LLMAgent`. This PR adds session-scoped goal state plus tools (`get_goal`, `create_goal`, `update_goal`) and an AfterModel hook that blocks premature final responses by returning a non-final control response. Durable goal state must survive persistent session backends through event state deltas, not only in-memory mutation during a single invocation.","tests_docs":"Good baseline tests, but missing custom-tool guidance and tool-result callback state-delta regression tests.","title":"agent/extension: add goal support","tradeoffs":"The extension design is promising and contained, but correctness depends on precise model guidance and durable state delta generation.","updated_at":"2026-06-28T09:03:52Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/1980"},{"alternative_designs":"Report generation could use an explicit trigger object passed through the whole call graph instead of context fallback. That would be more explicit but more invasive.","api_surface":"Adds/extends report-facing summary types and hook-visible report data.","approach":"Adds report structs/tests and records trigger/call/usage data around summary checks and model calls.","attention_points":"Fix cascade trigger key and avoid recording model-call reports for callback-served summaries.","author":"Rememorio","behavior_impact":"Hooks can attribute summary calls, but current cascade and callback cases can misreport.","change_inventory":"Adds summary report fields, trigger report tests, call/usage reporting, and docs.","ci_state":"Checks were green; blockers are report correctness.","cross_module_impact":"Interacts with `session/internal/summary`, `session/summary`, model callbacks, and report hooks.","design_assessment":"Needs fixes before merge. The observability surface is valuable, but inaccurate reports are worse than missing reports for hooks that make decisions from them.","head_sha":"3ec438c2865e40fed6c243c834b9f2f77f54db7d","inline_comments":[{"body":"Forced full-session cascade reports still lose the original branch key here. The cascade call targets the all-contents summary with `filterKey == \"\"`, while the branch that triggered it is only carried in `summaryTriggerFilterKeyFromContext(ctx)`, so hooks still see an empty `Trigger.FilterKey`; prefer that context trigger key for forced all-contents reports and add a cascade regression test.\n\n<details><summary>中文<\/summary>\n这里的 forced full-session cascade report 仍然会丢掉原始分支 key。cascade 调用生成 all-contents summary 时 `filterKey == \"\"`，真正触发它的分支只在 `summaryTriggerFilterKeyFromContext(ctx)` 里，所以 hook 仍会看到空的 `Trigger.FilterKey`；建议 forced all-contents report 优先使用 context 中的 trigger key，并补一个 cascade 回归测试。\n<\/details>","line":357,"path":"session/internal/summary/summary.go","review_id":4587309805,"url":"https://github.com/trpc-group/trpc-agent-go/pull/2029#discussion_r3487638778"},{"body":"This records a model-call report even when `BeforeModel` returned a `CustomResponse` and no summary model request is sent. That overcounts callback-served summaries with a normal `Call.Mode` and prompt-token estimate; either record only before `GenerateContent`, or emit an explicit callback/custom call mode and test the custom-response path.\n\n<details><summary>中文<\/summary>\n这里在 `BeforeModel` 返回 `CustomResponse`、实际不会调用摘要模型时也记录了一次 model-call report。这样 callback 直接返回摘要的场景会被记成普通 `Call.Mode` 和 prompt-token 估算，造成报告过计；建议只在真正调用 `GenerateContent` 前记录，或显式记录 callback/custom 模式，并补上 custom-response 路径测试。\n<\/details>","line":892,"path":"session/summary/summarizer.go","review_id":4587309805,"url":"https://github.com/trpc-group/trpc-agent-go/pull/2029#discussion_r3487638779"}],"module_impact":"Affects summary checker/summarizer observability and hook users.","modules":"session/internal/summary and session/summary trigger report telemetry","number":2029,"outcome":"Posted 2 inline comments: https://github.com/trpc-group/trpc-agent-go/pull/2029#discussion_r3487638778, https://github.com/trpc-group/trpc-agent-go/pull/2029#discussion_r3487638779.","problem":"The PR adds trigger reports and summary-call reporting so hooks can observe why summaries were generated.","problem_framing":"The root need is observability for summary generation. The tricky part is that reporting must distinguish the target summary being written from the trigger that caused the call.","risk":"Medium; observability correctness bug could mislead summary hooks.","root_cause":"The first fix wrote `filterKey` from the target call into reports, but cascade all-contents calls have an empty/all filter and carry the original branch trigger only through context.","semantic_changes":"Summary generation can now expose trigger/call metadata to hooks; no intended change to generated summary text.","status":"commented","technical_background":"Session summaries can be generated for filtered branches and for the all-contents summary. Trigger reports let hooks/observers know why a summary fired and which filter key caused it. In cascade flows, a branch summary can force a full-session summary; attribution has to preserve the original branch key even when the target summary key is all-contents.","tests_docs":"Existing tests cover ordinary forced reports; missing cascade trigger-key and BeforeModel custom-response report tests.","title":"session/summary: add trigger reports","tradeoffs":"The current design is mostly lightweight, but context-carried trigger state needs careful precedence in forced cascade paths.","updated_at":"2026-06-28T09:12:00Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/2029"},{"alternative_designs":"Could always retry missing indexes, but that risks live DDL. The chosen skip-and-verify design is safer if verification is complete.","api_surface":"No exported Go API change; startup behavior changes for drifted MySQL session schemas.","approach":"Groups indexes by table for first-time creation, skips DDL for existing tables, verifies columns/indexes, and makes missing/wrong unique indexes fatal.","attention_points":"Read and validate `information_schema.statistics.NON_UNIQUE`.","author":"hyprh","behavior_impact":"Could still start without true uniqueness if a non-unique index has the expected name/columns.","change_inventory":"Changed `initDB`, added `createTableWithIndexes`, changed `verifyIndexes`, and added tests for existing tables and missing unique indexes.","ci_state":"Checks were green; blocker is schema validation correctness.","cross_module_impact":"Impacts runner/session users backed by MySQL and operators managing session schema manually.","design_assessment":"Direction is good but incomplete. It must read `NON_UNIQUE` to prove same-name same-column indexes enforce uniqueness.","head_sha":"d7785f466ee3e031df7cb6a55c8b69f882e1fb7c","inline_comments":[{"body":"The new fatal UNIQUE-index check still only compares index names and columns; it never reads `information_schema.statistics.NON_UNIQUE`. A pre-existing non-unique index with the expected name and columns will pass here, so the skip-DDL path can still start without the uniqueness constraint; please store `NON_UNIQUE` per index and fail when `expected.unique && NON_UNIQUE != 0`.\n\n<details><summary>中文<\/summary>\n新的 fatal UNIQUE-index 校验仍然只比较索引名和列，没有读取 `information_schema.statistics.NON_UNIQUE`。如果已有索引名字和列都正确但其实不是唯一索引，这里会通过，skip-DDL 路径仍可能在没有唯一约束的情况下启动；建议按索引保存 `NON_UNIQUE`，并在 `expected.unique && NON_UNIQUE != 0` 时失败。\n<\/details>","line":756,"path":"session/mysql/init.go","review_id":4587310760,"url":"https://github.com/trpc-group/trpc-agent-go/pull/2022#discussion_r3487639857"}],"module_impact":"Affects MySQL session service initialization.","modules":"session/mysql schema bootstrap and index verification","number":2022,"outcome":"Posted 1 inline comment: https://github.com/trpc-group/trpc-agent-go/pull/2022#discussion_r3487639857.","problem":"The PR makes MySQL session init skip schema DDL for pre-existing tables and fail startup when required unique indexes are missing or invalid.","problem_framing":"The root problem is balancing operator-managed schemas with correctness-critical uniqueness constraints. Once init stops fixing existing tables, verification must be strong enough to catch every uniqueness drift.","risk":"High for schema drift correctness until fixed.","root_cause":"The new verification checks index name and columns but not whether an index is actually unique.","semantic_changes":"Existing tables no longer receive DDL automatically. Missing/incorrect unique index should fail startup, but non-unique same-name index currently slips through.","status":"commented","technical_background":"MySQL session storage uses active-row uniqueness constraints to make app/user/session/summary state writes safe. This PR stops running DDL against existing tables, which is operationally safer, but it makes verification the only guard that prevents startup with a drifted schema.","tests_docs":"Needs a regression test for same-name/same-columns-but-non-unique.","title":"session/mysql: skip schema DDL for pre-existing tables on init","tradeoffs":"Avoiding live DDL is operationally conservative, but it raises the bar for schema validation.","updated_at":"2026-06-28T09:13:02Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/2022"},{"alternative_designs":"Could re-run DDL, but operator-managed schemas may forbid it. Verification through pg catalog metadata is the safer path.","api_surface":"No exported API change; `NewService` startup error behavior changes from panic/crash to returned error.","approach":"Returns errors from `initDB`, closes client pool on init failure, queries indexes from pg catalogs, and fails on missing or non-unique `unique_active` indexes.","attention_points":"Validate columns and predicate via `pg_attribute`/`pg_get_expr`/`pg_get_indexdef`.","author":"hyprh","behavior_impact":"Could still start with a unique index that does not match `ON CONFLICT ... WHERE deleted_at IS NULL`.","change_inventory":"Modified `initDB`, `verifySchema`, `verifyIndexes`, service constructor cleanup, and schema tests.","ci_state":"Only `codecov/patch` was non-green initially; a correctness comment was posted instead of approval.","cross_module_impact":"Impacts any runner/session user backed by Postgres.","design_assessment":"Needs fix before merge. The resource cleanup direction is good, but the index verifier is still too weak for partial unique indexes.","head_sha":"e583cebff9d096329f9e56bf13cf3321429b6d16","inline_comments":[{"body":"Checking only the index name and `indisunique` is still not enough for the required partial unique index. A same-name unique index on the wrong columns, or without the `deleted_at IS NULL` predicate, passes this map but does not satisfy the `ON CONFLICT ... WHERE deleted_at IS NULL` contract; please verify the indexed columns and predicate via `pg_index`/`pg_attribute`/`pg_get_expr` or `pg_get_indexdef`.\n\n<details><summary>中文<\/summary>\n只检查索引名和 `indisunique` 仍然不足以确认这是需要的 partial unique index。如果已有同名唯一索引列不对，或缺少 `deleted_at IS NULL` predicate，这里仍会通过，但它并不满足 `ON CONFLICT ... WHERE deleted_at IS NULL` 的约束目标；建议通过 `pg_index` / `pg_attribute` / `pg_get_expr` 或 `pg_get_indexdef` 同时校验索引列和 predicate。\n<\/details>","line":528,"path":"session/postgres/init.go","review_id":4587311213,"url":"https://github.com/trpc-group/trpc-agent-go/pull/2026#discussion_r3487640283"}],"module_impact":"Affects Postgres session service initialization and operators with pre-provisioned schemas.","modules":"session/postgres schema bootstrap and index verification","number":2026,"outcome":"Posted 1 inline comment: https://github.com/trpc-group/trpc-agent-go/pull/2026#discussion_r3487640283.","problem":"The PR changes Postgres init failures from panics to returned errors and makes missing/non-unique required indexes fatal.","problem_framing":"The root problem is startup safety: the service should not start when storage invariants are absent, but the verifier must validate the actual invariant, not just index names.","risk":"High for schema drift correctness until fixed. `codecov/patch` was also non-green, so merge would remain blocked even after approval.","root_cause":"The new verifier reads `pg_index.indisunique` but not indexed columns or the partial predicate.","semantic_changes":"Startup can now return schema errors; missing/non-unique indexes are intended to be fatal. Current verifier can still accept wrong columns/predicate.","status":"commented","technical_background":"Postgres session storage uses partial unique indexes such as `WHERE deleted_at IS NULL` to enforce one active row while preserving soft-deleted history. `ON CONFLICT ... WHERE deleted_at IS NULL` depends on a matching unique index; a merely same-name unique index is not enough if columns or predicate differ.","tests_docs":"Needs tests for same-name unique index on wrong columns and missing partial predicate.","title":"session/postgres: surface init failures as errors and fail on missing unique index","tradeoffs":"Catalog verification is more complex but necessary for correctness when DDL is not automatically trusted.","updated_at":"2026-06-28T09:13:29Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/2026"},{"alternative_designs":"A more complete design would centralize every memory-file read through a store method that refreshes managed templates and keeps sensitive-content policy separate from opt-in workflow storage.","api_surface":"No exported Go API change; prompt/memory file behavior changes.","approach":"Adds template refresh helpers, updates default template text, refreshes existing files during `EnsureMemory`/`UpdateMemory`, and changes app-level memory instructions.","attention_points":"Keep secrets/large transcripts absolute no-store rules.","author":"Rememorio","behavior_impact":"Stale template text can still be injected as memory in `ensure=false` secondary context paths; secrets/transcripts policy is weakened by wording.","change_inventory":"Changed `openclaw/app/app.go`, memory store/template helpers and tests, and octool memory wording.","ci_state":"Checks were green; blockers are memory/prompt policy correctness.","cross_module_impact":"Touches memory store, app prompt construction, and octool memory guidance.","design_assessment":"Needs fixes before merge. The intent is good, but two important boundary leaks remain.","head_sha":"42c33bd105eb230eeb6d739e8f66aec72bd3056f","inline_comments":[{"body":"Refreshing only through `EnsureMemory`/`UpdateMemory` misses the secondary-memory context path that resolves `MemoryPath` and calls `ReadFile` with `ensure=false`. Existing files that still contain the immediately previous default template can therefore be read as user memory before `IsDefaultTemplate` is checked; add a refresh-on-read path or a refresh-existing helper used by the context builder.\n\n<details><summary>中文<\/summary>\n只在 `EnsureMemory` / `UpdateMemory` 里刷新旧模板，会漏掉 secondary-memory context 那条通过 `MemoryPath` 后直接 `ReadFile`、且 `ensure=false` 的路径。已有文件如果仍是上一版默认模板，就可能在 `IsDefaultTemplate` 判断前被当成用户记忆读入；建议补一个 read 时刷新，或让 context builder 调用 refresh-existing helper。\n<\/details>","line":96,"path":"openclaw/internal/memoryfile/store.go","review_id":4587312170,"url":"https://github.com/trpc-group/trpc-agent-go/pull/2018#discussion_r3487641436"},{"body":"Please keep the ban on secrets and large transcripts absolute. As written, `secrets` and `large transcripts` are in the same `unless the user explicitly asks` clause as workflows/formats, so the prompt can allow saving them to memory when the user asks; split this into an unconditional `Do not store secrets or large transcripts` sentence, then apply the opt-in exception only to reusable workflows/output formats/tool procedures/post-task feedback.\n\n<details><summary>中文<\/summary>\n建议继续把 secrets 和 large transcripts 的禁令保持为绝对规则。现在它们和 workflows/formats 放在同一个 `unless the user explicitly asks` 从句里，模型会被允许在用户明确要求时把 secrets 或大段 transcript 存进 memory；建议拆成一句无条件的 `Do not store secrets or large transcripts`，再把显式 opt-in 例外只用于 reusable workflows、output formats、tool procedures 和 post-task feedback。\n<\/details>","line":372,"path":"openclaw/app/app.go","review_id":4587312170,"url":"https://github.com/trpc-group/trpc-agent-go/pull/2018#discussion_r3487641439"}],"module_impact":"Affects OpenClaw memory-file context and agent instructions.","modules":"openclaw memory file templates, app prompts, memory context path","number":2018,"outcome":"Posted 2 inline comments: https://github.com/trpc-group/trpc-agent-go/pull/2018#discussion_r3487641436, https://github.com/trpc-group/trpc-agent-go/pull/2018#discussion_r3487641439.","problem":"The PR tries to keep workflow guidance out of memory by refreshing older default templates and tightening instructions around what belongs in memory.","problem_framing":"The deeper issue is separating durable user memory from reusable workflows, prompts, and secrets. Both code paths and prompt wording must preserve that boundary.","risk":"High for prompt safety/memory hygiene until fixed.","root_cause":"Template refresh was added only to ensure/update paths, not read-only context paths; prompt wording also grouped secrets/transcripts under an opt-in exception.","semantic_changes":"Existing managed template text can be refreshed during ensure/update, but direct read paths still bypass it.","status":"commented","technical_background":"OpenClaw exposes visible `MEMORY.md` files. The default template should not be treated as user memory. This PR tries to migrate old visible template wording away from reusable workflow storage and toward user preferences, while preserving real user bullets. Context-building paths must refresh or ignore managed templates before injecting memory text into the agent prompt.","tests_docs":"Needs `ensure=false` read-path regression and prompt-policy split.","title":"openclaw: keep workflow guidance out of memory","tradeoffs":"Refreshing on write is cheap but misses read-only injection paths. Central read refresh is slightly more invasive but protects all prompt construction.","updated_at":"2026-06-28T09:14:27Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/2018"}],"follow_up":["[#2029](https://github.com/trpc-group/trpc-agent-go/pull/2029) 修复 cascade FilterKey 和 BeforeModel CustomResponse 报告后可优先复审。","[#2022](https://github.com/trpc-group/trpc-agent-go/pull/2022) / [#2026](https://github.com/trpc-group/trpc-agent-go/pull/2026) 都是“已有表跳过 DDL”后的唯一索引验证强度问题，建议成对关注。","[#2018](https://github.com/trpc-group/trpc-agent-go/pull/2018) 涉及 OpenClaw memory 安全边界，修复后应补 ensure=false 读取路径测试。","[#1980](https://github.com/trpc-group/trpc-agent-go/pull/1980) 是较大的新 extension，修复 custom tool names 与持久化 state delta 后需要重新跑 xhigh。","[#1996](https://github.com/trpc-group/trpc-agent-go/pull/1996) 需要真正覆盖 streaming `accumulateChunk` 路径后再继续。","[#1400](https://github.com/trpc-group/trpc-agent-go/pull/1400) 仍 locked 且有公开接口破坏性变更 blocker；unlock 后也要先解决接口兼容。"],"generated_at":"2026-06-28T09:30:31.176Z","incremental_plan":{"carry_forward":[],"closed_or_missing":[{"author":"WineChord","number":2015,"previous_bucket":"blocked","previous_last_action":"skipped","title":"openclaw: support late request context prompt","url":"https://github.com/trpc-group/trpc-agent-go/pull/2015"},{"author":"shanghai-Jerry","number":2020,"previous_bucket":"blocked","previous_last_action":"blocked","title":"fix: UpdateMemory keep original memory_id to avoid primary key conflict","url":"https://github.com/trpc-group/trpc-agent-go/pull/2020"},{"author":"Flash-LHR","number":2024,"previous_bucket":"blocked","previous_last_action":"skipped","title":"{agent, let lang = "zh";
let filter = "all";
const statusOrder = ["approved", "commented", "maintained", "merged", "skipped", "blocked"];

function text(value, fallback = "") {
  if (value === undefined || value === null || value === "") return fallback;
  if (typeof value === "object" && !Array.isArray(value)) {
    return value[lang] || value.zh || value.en || fallback;
  }
  return String(value);
}

function escapeHtml(value) {
  return text(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatRich(value) {
  let html = escapeHtml(value);
  const replacements = [
    [
      /(P[0-2]|codecov\/patch=FAILURE|go-apidiff=FAILURE|go-apidiff|FAILURE|失败|阻塞|不能合入|不能 merge|未合并|破坏性|breaking|unbounded|无界|绕过|丢失|重复|不稳定|风险)/gi,
      "mark-bad"
    ],
    [
      /(LGTM|已合并|已批准|squash merge|merged|approved|CI 全绿|全绿|修复有效|\bresolved\b|\bresolve\b)/gi,
      "mark-good"
    ],
    [
      /(pending|soft[- ]?CI|软门禁|follow-up|后续|关注|CodeRabbit|reviewability ledger|not_reached)/gi,
      "mark-info"
    ],
    [
      /(导出 API|\bAPI\b|兼容性|\bsession\b|\brunner\b|\bmemory\b|GraphRAG|workspace_exec|OpenAPI|\bpolicy\b|security|安全)/gi,
      "mark-warn"
    ]
  ];
  for (const [pattern, className] of replacements) {
    html = html.replace(pattern, `<mark class="${className}">$1</mark>`);
  }
  return html;
}

function prs() {
  const groups = reportData.skipped_groups || [];
  const skipped = groups.flatMap(group =>
    (group.items || []).map(item => ({
      ...item,
      status: item.status || "skipped",
      skip_reason: item.skip_reason || group.reason
    }))
  );
  return [
    ...(reportData.approved || []),
    ...(reportData.commented || []),
    ...(reportData.maintained || []),
    ...(reportData.blocked || []),
    ...skipped
  ];
}

function skippedGroups() {
  return reportData.skipped_groups || [];
}

function counts(items) {
  const result = Object.fromEntries(statusOrder.map(status => [status, 0]));
  for (const item of items) {
    const status = item.status || "skipped";
    result[status] = (result[status] || 0) + 1;
  }
  return result;
}

function renderMetrics(items) {
  const totalComments = items.reduce((sum, item) =>
    sum + ((item.inline_comments || []).length || item.comment_count || 0), 0);
  const followups = (reportData.follow_up || []).length;
  const reviewed = items.filter(item =>
    ["approved", "commented", "maintained", "merged", "blocked"].includes(item.status)
  ).length;
  const metricRows = [
    [labels[lang].total, items.length],
    [labels[lang].reviewed, reviewed],
    [labels[lang].approved, items.filter(item =>
      ["approved", "merged"].includes(item.status)).length],
    [labels[lang].comments, totalComments],
    [labels[lang].followups, followups]
  ];
  document.getElementById("metrics").innerHTML = metricRows.map(([label, value]) => `
    <div class="metric">
      <div class="value">${value}</div>
      <div class="label">${escapeHtml(label)}</div>
    </div>
  `).join("");
}

function renderBars(items) {
  const byStatus = counts(items);
  const maxCount = Math.max(1, ...Object.values(byStatus));
  document.getElementById("bars").innerHTML = statusOrder.map(status => {
    const value = byStatus[status] || 0;
    const width = Math.max(3, Math.round((value / maxCount) * 100));
    return `
      <div class="bar-row">
        <div class="bar-label">${labels[lang][status]}</div>
        <div class="bar-track"><div class="bar-fill ${status}" style="width:${width}%"></div></div>
        <strong>${value}</strong>
      </div>
    `;
  }).join("");
}

    container.innerHTML = `<div class="empty">${labels[lang].empty}</div>`;

  container.innerHTML = events.map(event => `

function matchesSearch(item, query) {
  if (!query) return true;
  const haystack = [
    item.number,
    text(item.title),
    item.author,
    text(item.problem),
    text(item.approach),
    text(item.outcome),
    text(item.skip_reason),
    text(item.group_reason),
    text(item.readiness_audit),
    blockersSearchText(item.blockers),
    text(item.risk),
    text(item.ci_state)
  ].join(" ").toLowerCase();
  return haystack.includes(query.toLowerCase());
}

function blockersSearchText(blockers) {
  if (!Array.isArray(blockers)) return "";
  return blockers.map(blocker => {
    if (typeof blocker !== "object" || blocker === null) return text(blocker);
    return [
      blocker.kind,
      blocker.summary,
      blocker.reviewer,
      blocker.path,
      blocker.line,
      blocker.latest_response,
      blocker.verification,
      blocker.url
    ].map(value => text(value)).join(" ");
  }).join(" ");
}

function field(label, value) {
  const body = text(value);
  if (!body) return "";
  return `<div class="field"><strong>${label}</strong><div class="field-body">${formatRich(body)}</div></div>`;
}

function renderBlockers(item) {
  const blockers = Array.isArray(item.blockers) ? item.blockers : [];
  if (!blockers.length) return "";
  const rendered = blockers.map(blocker => {
    const data = typeof blocker === "object" && blocker !== null
      ? blocker
      : { summary: blocker };
    const location = [data.path, data.line ? `:${data.line}` : ""].filter(Boolean).join("");
    const meta = [
      data.kind ? blockerKindLabel(data.kind) : "",
      data.reviewer ? `reviewer: ${text(data.reviewer)}` : "",
      location,
      data.latest_response ? `latest: ${text(data.latest_response)}` : "",
      data.verification ? text(data.verification) : ""
    ].filter(Boolean).join(" · ");
    const summary = formatRich(data.summary || blocker);
    const link = data.url
      ? ` <a href="${escapeHtml(data.url)}">link</a>`
      : "";
    return `<li class="blocker-item"><div>${summary}${link}</div>${meta ? `<div class="blocker-meta">${escapeHtml(meta)}</div>` : ""}</li>`;
  }).join("");
  return `<div class="skip-detail"><strong>${labels[lang].blockerDetails}:</strong></div><ul class="blocker-list">${rendered}</ul>`;
}

function blockerKindLabel(kind) {
  return (labels[lang].blockerKinds || {})[kind] || text(kind);
}

function inlineCommentText(comment) {
  if (comment === undefined || comment === null) return "";
  if (typeof comment !== "object" || Array.isArray(comment)) {
    return text(comment);
  }
  return text(comment.body || comment.summary || comment.message || "");
}

    item.approach,
    item.outcome,
    item.risk,
    item.ci_state,
    item.skip_reason,
    item.readiness_audit,
    item.modules,
    item.api_surface,
    comments,
    blockers
  ].map(value => text(value)).join(" ").toLowerCase();
}

function readingAdvice(item) {
  const status = item.status || "skipped";
  const comments = item.inline_comments || [];
  const blockers = item.blockers || [];
  const body = allPrText(item);
  const hasP1 = comments.some(comment =>
    /\bP[01]\b/i.test(text(comment.severity)) ||
    /\bP[01]\b/i.test(inlineCommentText(comment))
  );
  const hasCriticalRisk = hasP1 ||
    /(security|安全|bypass|绕过|breaking|破坏性|unbounded|无界|丢失|重复|不稳定|兼容|api|go-apidiff|failure|失败|不能 merge|不能合入|race|并发)/i.test(body);
  const highImpactFeature =
    /(add|new|新增|support|支持|agent|runner|session|memory|graphrag|knowledge|openapi|workspace_exec|policy|extension|tool|graph|api)/i.test(body);

  const copy = {
    critical: {
      icon: "🔥",
      zh: "重点精读",
      en: "Deep Read",
      reasonZh: comments.length
        ? `有 ${comments.length} 条行级评论，且包含 P1/兼容/正确性/安全类风险。`
        : "包含高风险兼容性或正确性信号，需要重点复核。",
      reasonEn: comments.length
        ? `${comments.length} inline comment(s), including P1, compatibility, correctness, or security risk.`
        : "High-risk compatibility or correctness signal; review carefully."
    },
    focus: {
      icon: "🔎",
      zh: "建议细看",
      en: "Read Carefully",
      reasonZh: comments.length
        ? `有 ${comments.length} 条评论或重要设计取舍，建议看完整结论。`
        : "涉及核心模块、导出 API 或较大功能，建议细看。",
      reasonEn: comments.length
        ? `${comments.length} comment(s) or important design tradeoffs; read the full conclusion.`
        : "Core module, exported API, or larger feature; read carefully."
    },
    skim: {
      icon: "✅",
      zh: "快速略看",
      en: "Quick Skim",
      reasonZh: "风险低或改动较直接，扫结论和 CI 状态即可。",
      reasonEn: "Low risk or straightforward change; skim outcome and CI state."
    },
    follow: {
      icon: "⏳",
      zh: "只看阻塞",
      en: "Blocker Only",
      reasonZh: blockers.length
        ? `主要看 ${blockers.length} 个具体阻塞点，暂不需要读完整实现。`
        : "当前不是可合并状态，先看阻塞和后续动作。",
      reasonEn: blockers.length
        ? `Focus on ${blockers.length} concrete blocker(s); no need to read the full implementation yet.`
        : "Not merge-ready; focus on blockers and next action."
    }
  };

  let level = "skim";
  if (status === "blocked") {
    level = "follow";
  } else if (status === "commented") {
    level = hasCriticalRisk ? "critical" : "focus";
  } else if (status === "maintained") {
    level = hasCriticalRisk || highImpactFeature ? "focus" : "skim";
  } else if (status === "approved") {
    level = hasCriticalRisk || highImpactFeature ? "focus" : "skim";
  } else if (status === "merged") {
    level = highImpactFeature || hasCriticalRisk ? "focus" : "skim";
  } else if (status === "skipped") {
    level = blockers.length || /(conflict|ci|failure|失败|未回应|review)/i.test(body)
      ? "follow"
      : "skim";
  }

  const selected = copy[level];
  return {
    level,
    icon: selected.icon,
    label: lang === "zh" ? selected.zh : selected.en,
    reason: lang === "zh" ? selected.reasonZh : selected.reasonEn
  };
}

function priorityRank(level) {
  return { critical: 4, focus: 3, follow: 2, skim: 1 }[level] || 0;
}

function renderReadingGuide(items) {
  const panel = document.getElementById("readingGuidePanel");
  const container = document.getElementById("readingGuide");
  const candidates = [
    ...items.filter(item => (item.status || "skipped") !== "skipped"),
    ...(reportData.follow_up || []).map(item => ({ ...item, status: item.status || "blocked" }))
  ].map(item => ({ item, advice: readingAdvice(item) }))
    .filter(entry => entry.advice.level !== "skim")
    .sort((left, right) => priorityRank(right.advice.level) - priorityRank(left.advice.level));

  if (!candidates.length) {
    panel.style.display = "none";
    container.innerHTML = "";
    return;
  }

  panel.style.display = "block";
  container.innerHTML = candidates.slice(0, 9).map(entry => {
    const item = entry.item;
    const advice = entry.advice;
    const prText = item.number ? `#${item.number}` : "PR";
    const prLink = item.url
      ? `<a href="${escapeHtml(item.url)}">${prText} · ${escapeHtml(text(item.title))}</a>`
      : `<span>${prText} · ${escapeHtml(text(item.title))}</span>`;
    return `
      <article class="guide-card ${advice.level}">
        <div class="guide-meta">
          <span class="read-pill ${advice.level}">${advice.icon} ${escapeHtml(advice.label)}</span>
          <span class="badge ${item.status || "skipped"}">${labels[lang][item.status] || item.status || labels[lang].skipped}</span>
        </div>
        <div>${prLink}</div>
        <div class="guide-reason">${escapeHtml(advice.reason)}</div>
      </article>
    `;
  }).join("");
}

function storyLine(label, value) {
  const body = text(value);
  if (!body) return "";
  return `
    <p class="story-line">
      <span class="story-label">${escapeHtml(label)}</span>
      <span class="story-text">${formatRich(body)}</span>
    </p>
  `;
}

function storyBlock(title, rows, className = "") {
  const body = rows.filter(Boolean).join("");
  if (!body) return "";
  const classes = ["story-block", className].filter(Boolean).join(" ");
  return `<section class="${classes}"><h4>${escapeHtml(title)}</h4>${body}</section>`;
}

function compactSummary(item) {
  const candidates = [
    item.outcome,
    item.skip_reason,
    item.reason,
    item.problem,
    item.design_assessment,
    item.risk
  ].map(value => text(value).trim()).filter(Boolean);
  return candidates[0] || labels[lang].summaryFallback;
}

function updateCardToggle(card) {
  const button = card.querySelector(".card-toggle");
  if (!button) return;
  const open = card.classList.contains("open");
  button.textContent = open ? labels[lang].collapseDetails : labels[lang].expandDetails;
  button.setAttribute("aria-expanded", open ? "true" : "false");
}

function setCardOpen(card, open) {
  card.classList.toggle("open", open);
  updateCardToggle(card);
}

function factItem(label, value) {
  const body = text(value);
  if (!body) return "";
  return `
    <div class="fact">
      <dt>${escapeHtml(label)}</dt>
      <dd>${formatRich(body)}</dd>
    </div>
  `;
}

function directFixesText(fixes) {
  if (!Array.isArray(fixes) || !fixes.length) return "";
  return fixes.map(fix => {
    if (typeof fix !== "object" || fix === null) return text(fix);
    return [
      fix.branch ? `branch: ${text(fix.branch)}` : "",
      fix.commit ? `commit: ${text(fix.commit)}` : "",
      fix.message ? `message: ${text(fix.message)}` : "",
      fix.files ? `files: ${Array.isArray(fix.files) ? fix.files.map(file => text(file)).join(", ") : text(fix.files)}` : "",
      fix.tests ? `tests: ${Array.isArray(fix.tests) ? fix.tests.map(test => text(test)).join(", ") : text(fix.tests)}` : "",
      fix.push_state ? `push: ${text(fix.push_state)}` : "",
      fix.ci_state ? `CI: ${text(fix.ci_state)}` : ""
    ].filter(Boolean).join(" · ");
  }).join("\n");
}

function renderReviewRail(item) {
  const advice = readingAdvice(item);
  const callout = `
    <div class="reading-callout ${advice.level}">
      <strong>${advice.icon} ${escapeHtml(advice.label)}</strong>
      <span>${escapeHtml(advice.reason)}</span>
    </div>
  `;
  const facts = [
    factItem(labels[lang].outcome, item.outcome),
    factItem(labels[lang].risk, item.risk),
    factItem(labels[lang].ci, item.ci_state),
    factItem(labels[lang].attentionPoints, item.attention_points),
    factItem(labels[lang].directFixes, directFixesText(item.direct_fixes)),
    factItem(labels[lang].selfReviewPolicy, item.self_review_policy),
    factItem(labels[lang].testsDocs, item.tests_docs),
    factItem(labels[lang].modules, item.modules),
    factItem(labels[lang].apiSurface, item.api_surface),
    factItem(labels[lang].reason, item.skip_reason)
  ].filter(Boolean).join("");
  if (!facts) return `<aside class="review-rail">${callout}</aside>`;
  return `<aside class="review-rail">${callout}<h4>${labels[lang].reviewSummary}</h4><dl class="fact-list">${facts}</dl></aside>`;
}

function renderComments(item) {
  const comments = item.inline_comments || [];
  if (!comments.length) return "";
  const rendered = comments.map(comment => {
    const data = typeof comment === "object" && comment !== null && !Array.isArray(comment)
      ? comment
      : { body: comment };
    const location = `${escapeHtml(data.path || "")}${data.line ? ":" + escapeHtml(data.line) : ""}`;
    const source = data.url
      ? `<a class="comment-link" href="${escapeHtml(data.url)}">GitHub</a>`
      : "";
    return `
      <div class="comment">
        <div class="comment-head">
          <strong>${location}</strong>
          ${source}
        </div>
        <div>${formatRich(inlineCommentText(data))}</div>
        ${data.focus ? `<div><strong>${labels[lang].focus}:</strong> ${escapeHtml(text(data.focus))}</div>` : ""}
        ${data.severity ? `<div><strong>${labels[lang].severity}:</strong> ${escapeHtml(text(data.severity))}</div>` : ""}
      </div>
    `;
  }).join("");
  return `<section class="comments-panel">
    <h4>${labels[lang].inlineComments}</h4>
    <div class="comment-list">${rendered}</div>
  </section>`;
}

function renderPrReadout(item) {
  const story = [
    storyBlock(labels[lang].backgroundAndProblem, [
      storyLine(labels[lang].technicalBackground, item.technical_background),
      storyLine(labels[lang].problem, item.problem),
      storyLine(labels[lang].problemFraming, item.problem_framing),
      storyLine(labels[lang].rootCause, item.root_cause)
    ], "hero-block"),
    storyBlock(labels[lang].solutionAndTradeoffs, [
      storyLine(labels[lang].approach, item.approach),
      storyLine(labels[lang].alternativeDesigns, item.alternative_designs),
      storyLine(labels[lang].tradeoffs, item.tradeoffs),
      storyLine(labels[lang].designAssessment, item.design_assessment)
    ]),
    storyBlock(labels[lang].impactAndEvidence, [
      storyLine(labels[lang].changeInventory, item.change_inventory),
      storyLine(labels[lang].semanticChanges, item.semantic_changes),
      storyLine(labels[lang].behaviorImpact, item.behavior_impact),
      storyLine(labels[lang].moduleImpact, item.module_impact),
      storyLine(labels[lang].crossModuleImpact, item.cross_module_impact)
    ]),
    renderComments(item)
  ].filter(Boolean).join("");
  return `<div class="pr-readout"><div class="pr-story">${story}</div>${renderReviewRail(item)}</div>`;
}

function renderCards() {
  const query = document.getElementById("search").value.trim();
  const visible = prs().filter(item => (item.status || "skipped") !== "skipped")
    .filter(item => {
    const status = item.status || "skipped";
    return (filter === "all" || status === filter) && matchesSearch(item, query);
  });
  const container = document.getElementById("cards");
  if (!visible.length) {
    container.innerHTML = `<div class="empty">${labels[lang].empty}</div>`;
    return;
  }
  container.innerHTML = visible.map(item => {
    const status = item.status || "skipped";
    const advice = readingAdvice(item);
    const summary = compactSummary(item);
    const prText = item.number ? `#${item.number}` : "PR";
    const prLink = item.url
      ? `<a href="${escapeHtml(item.url)}">${prText}</a>`
      : prText;
    return `
      <article class="card priority-${advice.level}" data-status="${status}">
        <div class="card-head">
          <div>
            <div class="headline-row">
              <h3 class="card-title">${prLink} · ${escapeHtml(text(item.title))}</h3>
              <span class="read-pill ${advice.level}">${advice.icon} ${escapeHtml(advice.label)}</span>
            </div>
            <div class="meta">
              <span>${labels[lang].author}: ${escapeHtml(item.author || "")}</span>
              <span class="advice-reason">${escapeHtml(advice.reason)}</span>
            </div>
            <div class="card-summary">${formatRich(summary)}</div>
          </div>
          <div class="card-actions">
            <span class="badge ${status}">${labels[lang][status] || status}</span>
            <button class="card-toggle" type="button" aria-expanded="false">${labels[lang].expandDetails}</button>
          </div>
        </div>
        <div class="card-body">
          ${renderPrReadout(item)}
        </div>
      </article>
    `;
  }).join("");
  document.querySelectorAll(".card-head").forEach(head => {
    head.addEventListener("click", event => {
      if (event.target.closest("a")) return;
      const card = head.closest(".card");
      setCardOpen(card, !card.classList.contains("open"));
    });
  });
  document.querySelectorAll(".card").forEach(card => updateCardToggle(card));
}

function renderSkipGroups() {
  const heading = document.getElementById("skippedHeading");
  const container = document.getElementById("skipGroups");
  if (!["all", "skipped"].includes(filter)) {
    heading.style.display = "none";
    container.style.display = "none";
    return;
  }
  heading.style.display = "flex";
  container.style.display = "grid";
  const query = document.getElementById("search").value.trim();
  const groups = skippedGroups().map(group => {
    const reason = group.reason || "";
    const items = (group.items || []).map(item => ({
      ...item,
      status: item.status || "skipped",
      group_reason: reason,
      skip_reason: item.skip_reason || reason
    })).filter(item => matchesSearch(item, query));
    return { reason, items };
  }).filter(group => group.items.length > 0);
  if (!groups.length) {
    container.innerHTML = `<div class="empty">${labels[lang].empty}</div>`;
    return;
  }
  container.innerHTML = groups.map((group, index) => `
    <article class="skip-group open">
      <div class="skip-group-head" data-skip-group="${index}">
        <h3 class="skip-group-title">${escapeHtml(text(group.reason))}</h3>
        <span class="skip-group-count">${group.items.length} ${labels[lang].items}</span>
      </div>
      <div class="skip-group-body">
        ${group.items.map(item => {
          const prText = item.number ? `#${item.number}` : "PR";
          const prLink = item.url
            ? `<a href="${escapeHtml(item.url)}">${prText}</a>`
            : prText;
          return `
            <div class="skip-row">
              <div>
                <div class="skip-title">${prLink} · ${escapeHtml(text(item.title))}</div>
                <div class="skip-detail">${labels[lang].author}: ${escapeHtml(item.author || "")}</div>
              </div>
              <div>
                <div><strong>${labels[lang].blocker}:</strong> ${formatRich(text(item.skip_reason))}</div>
                ${item.readiness_audit ? `<div class="skip-detail"><strong>${labels[lang].readinessAudit}:</strong> ${formatRich(text(item.readiness_audit))}</div>` : ""}
                ${renderBlockers(item)}
                ${item.ci_state ? `<div class="skip-detail">${formatRich(text(item.ci_state))}</div>` : ""}
                ${item.risk ? `<div class="skip-detail">${formatRich(text(item.risk))}</div>` : ""}
              </div>
            </div>
          `;
        }).join("")}
      </div>
    </article>
  `).join("");
  document.querySelectorAll("[data-skip-group]").forEach(head => {
    head.addEventListener("click", () => {
      head.closest(".skip-group").classList.toggle("open");
    });
  });
}

function renderFollowUp() {
  const heading = document.getElementById("followUpHeading");
  const container = document.getElementById("followUpCards");
  if (!["all", "skipped", "blocked"].includes(filter)) {
    heading.style.display = "none";
    container.style.display = "none";
    return;
  }
  const query = document.getElementById("search").value.trim().toLowerCase();
  const items = (reportData.follow_up || []).filter(item => {
    if (!query) return true;
    return [
      item.number,
      item.author,
      text(item.title),
      text(item.reason),
      text(item.next)
    ].join(" ").toLowerCase().includes(query);
  });
  if (!items.length) {
    heading.style.display = "none";
    container.style.display = "none";
    return;
  }
  heading.style.display = "flex";
  container.style.display = "grid";
  container.innerHTML = items.map(item => {
    const prText = item.number ? `#${item.number}` : "PR";
    const prLink = item.url
      ? `<a href="${escapeHtml(item.url)}">${prText}</a>`
      : prText;
    return `
      <article class="card open" data-status="blocked">
        <div class="card-head">
          <div>
            <h3 class="card-title">${prLink} · ${escapeHtml(text(item.title))}</h3>
            <div class="meta">${labels[lang].author}: ${escapeHtml(item.author || "")}</div>
          </div>
          <span class="badge blocked">${labels[lang].followups}</span>
        </div>
        <div class="card-body">
          <div class="grid">
            ${field(labels[lang].reason, item.reason)}
            ${field(labels[lang].outcome, item.next)}
          </div>
        </div>
      </article>
    `;
  }).join("");
}

function render() {
  const items = prs();
  renderStatic();
  renderMetrics(items);
  renderBars(items);
  renderTimeline();
  renderOverview();
  renderReadingGuide(items);
  renderChips();
  renderCards();
  renderSkipGroups();
  renderFollowUp();
}

document.querySelectorAll("[data-lang-button]").forEach(button => {
  button.addEventListener("click", () => setLanguage(button.dataset.langButton));
});
document.getElementById("search").addEventListener("input", () => {
  renderCards();
  renderSkipGroups();
  renderFollowUp();
});
document.getElementById("openAll").addEventListener("click", () => {
  document.querySelectorAll(".card").forEach(card => setCardOpen(card, true));
  document.querySelectorAll(".skip-group").forEach(node => node.classList.add("open"));
});
document.getElementById("closeAll").addEventListener("click", () => {
  document.querySelectorAll(".card").forEach(card => setCardOpen(card, false));
  document.querySelectorAll(".skip-group").forEach(node => node.classList.remove("open"));
});
render();
</script>
</body>
</html>
