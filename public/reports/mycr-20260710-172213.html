.card[data-status="skipped"] .card-head { border-left-color: var(--info); }
.card[data-status="blocked"] .card-head { border-left-color: var(--bad); }
.card.priority-critical .card-head {
  background: linear-gradient(180deg, #fff7f8, #fff);
}
.card.priority-focus .card-head {
  background: linear-gradient(180deg, #fffbeb, #fff);
}
.card.priority-follow .card-head {
  background: linear-gradient(180deg, #eff6ff, #fff);
}
.card-title {
  font-size: 16px;
  line-height: 1.42;
}
.meta {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 7px;
}
.badge {
  gap: 7px;
  min-width: 0;
  padding: 6px 11px;
  text-transform: none;
  white-space: nowrap;
}
.card-summary {
  color: #526173;
  margin-top: 9px;
}
.badge::before {
  content: "";
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: currentColor;
}
.card-body {
  background: #fff;
  padding: 0 18px 18px;
}
.grid {
  grid-template-columns: 1fr;
  gap: 10px;
}
.field {
  background: #fbfcfe;
  border-color: #e6ecf3;
  padding: 13px 14px;
}
.field strong {
  color: #536175;
  font-size: 11px;
  letter-spacing: 0;
  text-transform: uppercase;
}
.field-body {
  color: #1f2937;
  line-height: 1.62;
}
.comment {
  background: #fff8ed;
  border-left-color: var(--accent-2);
  color: #1f2937;
}
.comment-head {
  color: #1f2937;
}
.pr-readout {
  grid-template-columns: minmax(0, 1fr);
  gap: 18px;
}
.story-block {
  border-top-color: #e2e8f0;
}
.story-block.hero-block {
  background: linear-gradient(180deg, #fbfffe, #f7fbfa);
  border-color: #d5e7e4;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
}
.story-block h4,
.review-rail h4,
.comments-panel h4 {
  font-size: 13px;
  font-weight: 900;
}
.story-line {
  grid-template-columns: 116px minmax(0, 1fr);
  border-top-color: #e9eef5;
}
.story-label {
  color: #607086;
}
.review-rail {
  border: 1px solid #e3eaf2;
  border-radius: 8px;
  padding: 14px;
  background: #fbfcfe;
}
.review-rail .fact-list {
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
}
.fact {
  border-top-color: #e8eef5;
}
.comments-panel {
  border-top-color: #e2e8f0;
}
.comment-list {
  gap: 12px;
}
.skip-group {
  box-shadow: var(--shadow);
}
.skip-group-head {
  align-items: center;
  background: linear-gradient(180deg, #fff, #fbfcfe);
}
.skip-row {
  grid-template-columns: minmax(0, 1.15fr) minmax(220px, 0.85fr);
}
.blocker-item {
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.75);
}
.empty {
  background: #fff;
  box-shadow: var(--shadow);
}
@media (max-width: 840px) {
  .topbar, .card-head { grid-template-columns: 1fr; display: grid; }
  .card-actions { align-items: flex-start; flex-direction: row; flex-wrap: wrap; }
  .dashboard, .grid, .metrics { grid-template-columns: 1fr; }
  .guide-grid { grid-template-columns: 1fr; }
  .headline-row { align-items: flex-start; flex-direction: column; }
  .pr-readout { grid-template-columns: 1fr; }
  .review-rail { position: static; }
  .story-line { grid-template-columns: 1fr; gap: 4px; }
  .timeline-item { grid-template-columns: 1fr; }
  .controls { position: static; }
  .utilities { width: 100%; margin-left: 0; }
  .utility-button { flex: 1 1 auto; }
  .skip-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div>
      <h1 data-i18n="title">MyCR 审核报告</h1>
      <p class="subtitle" id="subtitle"></p>
    </div>
    <div class="toggle" aria-label="Language">
      <button type="button" data-lang-button="zh" class="active">中文</button>
      <button type="button" data-lang-button="en">EN</button>
    </div>
  </div>
  <section class="metrics" id="metrics"></section>
  <section class="dashboard">
    <div class="panel">
      <h2 data-i18n="statusDistribution">状态分布</h2>
      <div class="bars" id="bars"></div>
    </div>
    <div class="panel">
      <h2 data-i18n="timeline">执行时间线</h2>
      <div class="timeline" id="timeline"></div>
    </div>
  </section>
  <section class="panel" id="overviewPanel" style="display: none; margin-top: 16px;">
    <h2 data-i18n="overviewSection">整体摘要</h2>
    <div class="overview-content" id="overviewContent"></div>
  </section>
  <section class="panel reading-guide" id="readingGuidePanel" style="display: none;">
    <div class="guide-head">
      <h2 data-i18n="readingGuide">阅读建议</h2>
      <span data-i18n="readingGuideHint">先看高风险和高影响 PR</span>
    </div>
    <div class="guide-grid" id="readingGuide"></div>
  </section>
  <section class="controls">
    <input class="search" id="search" type="search">
    <div class="chips" id="chips"></div>
    <div class="utilities">
      <button type="button" class="utility-button" id="openAll"></button>
      <button type="button" class="utility-button" id="closeAll"></button>
    </div>
  </section>
  <section class="section-heading">
    <h2 data-i18n="reviewedSection">已处理 PR</h2>
    <div class="hint" data-i18n="reviewedHint">点击卡片查看细节</div>
  </section>
  <main class="cards" id="cards"></main>
  <section class="section-heading" id="skippedHeading">
    <h2 data-i18n="skippedGroups">未审核 PR 分类</h2>
    <div class="hint" data-i18n="skippedHint">按排除原因分组</div>
  </section>
  <section class="skip-groups" id="skipGroups"></section>
  <section class="section-heading" id="followUpHeading">
    <h2 data-i18n="followUpSection">后续关注</h2>
    <div class="hint" data-i18n="followUpHint">接近可处理但仍有阻塞</div>
  </section>
  <section class="cards" id="followUpCards"></section>
  <section class="panel" id="evolutionPanel" style="display: none; margin-top: 18px;">
    <h2 data-i18n="selfEvolutionSection">自进化记录</h2>
    <div class="evolution-list" id="evolutionList"></div>
  </section>
  <div class="footer" id="footer"></div>
</div>
<script>
const reportData = {"approved":[],"blocked":[],"commented":[{"alternative_designs":"Alternatives include a narrower guard only inside hostexec, a separate permission middleware above all tools, or delegating parsing to every tool implementation. A shared scanner reduces duplication, but it must handle JSON argv and report redaction consistently.","api_surface":"Adds exported safety scanner/policy/report/permission APIs, execution-tool safety options, policy YAML/JSON fields such as denied commands/paths/domains and long sleep limits, docs pages, and example artifacts.","approach":"The PR adds a new `tool/safety` package with scanner, policy, permissions, redaction, telemetry, audit output, tests, docs, and example wiring into host/workspace/code execution tools. It keeps the guard opt-in through policy and execution-tool options rather than changing all default behavior at once.","author":"xyxhhhhh","behavior_impact":"Expected before/after: a tool call such as a dangerous delete, long sleep, network egress, or sensitive-path read should be detected before execution and represented in an audit report with sensitive evidence redacted.","change_inventory":"Adds scanner rules, policy normalization, permission decisions, telemetry/audit data structures, redaction helpers, integration tests for host/workspace/code execution tools, and English/Chinese documentation.","ci_state":"green (164 checks)","cross_module_impact":"Execution tools and future wrappers now depend on consistent normalization of command strings, argv arrays, code blocks, and report evidence across package boundaries.","design_assessment":"The design direction is useful and locally scoped, but the current implementation has three correctness holes that can bypass dangerous-command detection, resource-abuse detection, or path redaction.","evidence_checked":"Issue #2002 labels/body, current base after #2112 revert, PR body, new tool/safety package, execution-tool integration, documentation, examples, green checks, and targeted tool safety test result from the reviewer were checked.","head_sha":"d08beb6526be4ae5bc2b02956676c5c4a1bd5dbe","implementation_derivation":"A shared scanner package is the right place to centralize command, argv, code block, path, network, resource, and secret checks. The reviewed gaps are places where structured input and redaction behavior do not yet use the same canonical view that the policy rules assume.","inline_comments":[{"body":"`args`/`argv` arrays from unknown or Model Context Protocol (MCP)-style command wrappers are flattened into individual strings here, so `{\"args\":[\"rm\",\"-rf\",\"/\"]}` scans `\"rm\"`, `\"-rf\"`, and `\"/\"` separately and never triggers the dangerous-delete rule. Please preserve command-like string arrays and pass them through `scanArgv`, with a regression test for an MCP wrapper.\n\n<details><summary>中文<\/summary>\n这里会把未知工具或 Model Context Protocol（MCP，模型上下文协议）风格命令包装器里的 `args`/`argv` 数组拆成单个字符串扫描，所以 `{\"args\":[\"rm\",\"-rf\",\"/\"]}` 会分别扫描 `\"rm\"`、`\"-rf\"` 和 `\"/\"`，不会触发危险删除规则。请保留命令类字符串数组并交给 `scanArgv` 处理，同时补一个 MCP wrapper 的回归测试。\n<\/details>","line":370,"path":"tool/safety/scanner.go","url":"https://github.com/trpc-group/trpc-agent-go/pull/2174#discussion_r3557770939"},{"body":"`longSleep` currently trims only an `s` suffix, so `sleep 2m` or `sleep 1h` bypasses the long-running-command check even though those are valid sleep durations. Please parse common sleep units (`s`, `m`, `h`, `d`) and compare the converted seconds against the policy limit.\n\n<details><summary>中文<\/summary>\n`longSleep` 现在只去掉 `s` 后缀，因此 `sleep 2m` 或 `sleep 1h` 这类合法 sleep 时长会绕过长时间运行检测。请解析常见单位（`s`、`m`、`h`、`d`），换算成秒后再和策略上限比较。\n<\/details>","line":918,"path":"tool/safety/scanner.go","url":"https://github.com/trpc-group/trpc-agent-go/pull/2174#discussion_r3557770941"},{"body":"`RedactSensitivePaths` only replaces the literal denied path, but `sensitivePathMatch` also treats `/home/<user>/.ssh` and `/root/.ssh` as matches for `~/.ssh`. Please make redaction use the same alias-aware matching, otherwise production reports can still leak absolute credential paths.\n\n<details><summary>中文<\/summary>\n`RedactSensitivePaths` 只替换字面量禁止路径，但 `sensitivePathMatch` 会把 `/home/<user>/.ssh` 和 `/root/.ssh` 也视为 `~/.ssh` 命中。请让脱敏逻辑复用同等的别名匹配，否则生产报告仍可能泄露绝对凭据路径。\n<\/details>","line":81,"path":"tool/safety/redact.go","url":"https://github.com/trpc-group/trpc-agent-go/pull/2174#discussion_r3557770945"}],"module_impact":"Direct impact is new safety evaluation before command execution; indirect impact is docs, examples, telemetry, audit consumers, and future MCP-style tool adapters that reuse the scanner.","modules":"`tool/safety`, `tool/hostexec`, `tool/workspaceexec`, `tool/codeexec`, docs under `docs/mkdocs`, and `examples/tool_safety_guard`.","necessity_assessment":"confirmed as a feature need: the maintainer-authored Rhino Bird issue is still open after the earlier merged solution was reverted, and the current base still lacks a shared opt-in execution safety guard.","number":2174,"outcome":"Commented on structured `args`/`argv` scanning, `sleep` duration units, and sensitive-path redaction alias coverage.","problem":"The PR addresses https://github.com/trpc-group/trpc-agent-go/issues/2002, which asks for pre-execution scanning, permission decisions, audit records, telemetry, and documentation for command-like tools. The current base has execution tools but no shared safety scanner that can block dangerous deletes, network egress, long-running commands, sensitive paths, or risky backends before the command runs.","problem_framing":"The root problem is not only command parsing; it is a trust boundary. User- or model-supplied execution requests must be normalized into a canonical command shape before policy is applied, and audit evidence must be useful without exposing secrets or host paths.","review_action":"Submitted COMMENT review only; no approval, no LGTM, no merge. Review URL: https://github.com/trpc-group/trpc-agent-go/pull/2174#pullrequestreview-4670143303","risk":"If unfixed, users may enable the guard and still let structured command wrappers bypass deletes, let valid long sleep units run, or leak absolute credential paths in production reports.","semantic_changes":"When enabled, execution tools can deny, ask, warn, or audit based on command content before running. The PR does not force all callers into the guard by default, but introduces a safety contract that must be reliable for structured tool arguments.","solution_fit_assessment":"The opt-in package and execution-tool hooks are a reasonable control surface for a broad safety feature, but merge readiness depends on the scanner catching structured command wrappers and on the audit report not leaking the same sensitive paths it claims to redact.","status":"commented","technical_background":"Tool execution in trpc-agent-go includes local workspace commands, host commands, code execution, and future tool wrappers. A safety guard has to inspect structured arguments before execution, classify dangerous commands or sensitive paths, and emit audit evidence without leaking credentials. Model Context Protocol (MCP, a protocol for exposing tools to models) matters here because tool calls often arrive as JSON-shaped command wrappers rather than a single shell string.","tests_docs":"CI is green. The PR adds many scanner/policy/redaction/integration tests and docs, but the comments identify missing regression tests for JSON argv wrappers, duration units, and alias-aware redaction.","title":"tool/safety: add tool execution safety guard","tradeoffs":"Broad scanner coverage improves safety and auditability, but it raises correctness requirements for command normalization, duration parsing, and evidence redaction. False negatives are more serious than minor false positives for this guard because users rely on it before execution.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2174"},{"alternative_designs":"Alternatives include per-invocation cookie jars, caller-provided HTTP clients only, explicit anonymous session options, or server-only request-bound principals without client persistence. The right choice depends on whether anonymous continuity should be per local session or per remote client object.","api_surface":"Adds anonymous principal cookie behavior, `WithUserIDHeader` semantics remain, and A2AAgent now implicitly supplies an HTTP client with a cookie jar unless the caller overrides options.","approach":"The PR changes the server to generate anonymous principals independently from `contextID`, adds cookie-based anonymous continuity, and installs a default cookie jar in A2AAgent clients so server-issued anonymous cookies can be sent back.","author":"XnLemon","behavior_impact":"Expected before/after: client-controlled context IDs should no longer define user identity, while anonymous callers can still get continuity when cookie scope is intentionally preserved.","change_inventory":"Adds anonymous user ID generation, cookie middleware, trusted-header precedence tests, server message processor changes, and default cookie persistence in the A2A agent client.","ci_state":"green (164 checks)","cross_module_impact":"The server principal flows into session and memory keys, while the client HTTP jar determines whether different local invocations reuse a remote anonymous principal.","design_assessment":"The server-side design is directionally correct; the current client helper needs a narrower scope to avoid recreating a different identity-sharing bug at the client layer.","evidence_checked":"Issue #2161, current base server/a2a behavior, PR body, server auth provider changes, anonymous cookie middleware, A2AAgent client change, tests, and green checks were inspected.","head_sha":"b02f47d15fab4ab50d074c613ce1e085e01d2f37","implementation_derivation":"Moving principal generation into auth/middleware is the right server-side layer because message processing should receive a principal, not derive one from the message context. The client-side default jar, however, introduces a new scoping question because an `A2AAgent` instance can be reused across local callers.","inline_comments":[{"body":"The default cookie jar is created once per `A2AAgent`, so anonymous calls from unrelated local invocations can share the same remote cookie-backed principal. Please scope the jar to the local session/user, or avoid installing a shared default jar unless the caller explicitly provides the desired scoping.\n\n<details><summary>中文<\/summary>\n默认 cookie jar 是按 `A2AAgent` 实例创建并复用的，因此来自不同本地 invocation 的匿名调用可能共享同一个远端 cookie-backed principal。请把 jar 按本地 session/user 做隔离，或者不要自动安装共享默认 jar，除非调用方显式提供了期望的作用域。\n<\/details>","line":161,"path":"agent/a2aagent/a2a_agent.go","url":"https://github.com/trpc-group/trpc-agent-go/pull/2163#discussion_r3557770711"}],"module_impact":"Direct impact is A2A server identity/session behavior. Indirect impact is memory/session isolation for any A2AAgent embedded in a multi-user process.","modules":"`server/a2a` auth provider and middleware, `agent/a2aagent` client construction, and related A2A tests.","necessity_assessment":"confirmed: current base derives anonymous user identity from A2A context in the message processor path, so the issue is a real identity-boundary problem rather than a speculative refactor.","number":2163,"outcome":"Commented on the default cookie jar being shared per `A2AAgent` instance.","problem":"The PR addresses https://github.com/trpc-group/trpc-agent-go/issues/2161, where anonymous A2A requests could derive a principal from a client-controlled context ID. That can bind different callers to the same user identity and mix session or memory ownership if the context is reused or guessed.","problem_framing":"The root cause is conflating conversation routing with trusted principal identity. A fix should give anonymous callers stable-enough continuity without letting a user-controlled conversation key become the security principal.","review_action":"Submitted COMMENT review only; no approval, no LGTM, no merge. Review URL: https://github.com/trpc-group/trpc-agent-go/pull/2163#pullrequestreview-4670143076","risk":"If unfixed, a long-lived shared A2AAgent can make unrelated anonymous local invocations share the same remote principal, reintroducing session or memory mixing.","semantic_changes":"Anonymous requests no longer use `A2A_USER_<contextID>` as principal; they use generated anonymous IDs and may persist them through cookies.","solution_fit_assessment":"Server-side anonymous cookies fit the identity separation goal, but a shared default client jar is too broad unless it is scoped to the local session/user or explicitly provided by callers that want shared continuity.","status":"commented","technical_background":"Agent-to-Agent (A2A, agent 间通信协议) lets a client agent call a remote agent server while preserving conversation context and user identity. In this server, `contextID` is a conversation/session key, while `userID` is a principal used for session ownership and memory isolation. These two concepts must not be derived from each other when the context ID can come from the client.","tests_docs":"CI is green and tests cover server anonymous ID generation and cookie behavior. The missing coverage is two anonymous invocations through the same shared A2AAgent representing different local sessions.","title":"server/a2a: decouple anonymous principals from A2A context IDs","tradeoffs":"Cookie persistence improves continuity for anonymous A2A clients, but a jar shared at agent construction time can turn continuity into cross-user sharing in long-lived multi-user processes.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2163"},{"alternative_designs":"Alternatives include backend-specific duplicated tests, a golden-event fixture outside Go tests, or a narrower SQLite-only regression. The shared harness is more maintainable, but only if identity keys and normalization rules are strict.","api_surface":"Adds exported replaytest backend/factory/case/snapshot helpers, optional test module dependencies, JSON report fixtures, and SQLite helper behavior for summary loading.","approach":"The PR adds `session/replaytest`, JSON-file and service-backed replay adapters, canonical cases, snapshot normalization, optional SQL/Redis tests under `test`, and a SQLite summary fix that the harness exercises.","author":"xyxhhhhh","behavior_impact":"Expected before/after: replaying the same operations should produce equivalent normalized snapshots, and edge cases such as empty filtered event windows or metadata-only memory differences should remain visible.","change_inventory":"Adds replay cases, backend adapters, snapshot comparison, track normalization, memory query normalization, optional SQL/Redis tests, and a SQLite summary boundary fix.","ci_state":"green (163 checks)","cross_module_impact":"The optional `test` module pulls storage/session/memory submodules together, so replace directives and stable IDs decide whether it validates the local checkout consistently.","design_assessment":"The design is valuable, but four concrete gaps undermine the reliability of the test oracle and should be fixed before relying on the harness.","evidence_checked":"Issue #2001 labels/body, PR body, replaytest package, SQLite helper change, optional test module go.mod, generated diff report, green checks, and the current head files were inspected.","head_sha":"1f88e4d9a27f40e957690983b960491b9a087f9f","implementation_derivation":"A reusable package with backend adapters is the right shape for cross-backend consistency. The reviewed blockers are places where the harness can accidentally test published modules, keep one backend bug unfixed, or normalize away meaningful differences.","inline_comments":[{"body":"These new storage module requirements are not matched by top-level `replace` directives. Since dependency `go.mod` replaces are ignored by the `test` main module, the optional replay tests can resolve published storage modules instead of the local checkout; please add local replaces for `storage/{clickhouse,mysql,postgres}`.\n\n<details><summary>中文<\/summary>\n这些新增的 storage 模块依赖没有配套顶层 `replace`。由于依赖模块自己的 `go.mod` 里的 replace 不会在 `test` 主模块中生效，optional replay 测试可能解析到已发布的 storage 模块，而不是当前仓库代码；请补上 `storage/{clickhouse,mysql,postgres}` 的本地 replace。\n<\/details>","line":98,"path":"test/go.mod","url":"https://github.com/trpc-group/trpc-agent-go/pull/2160#discussion_r3557771146"},{"body":"This fixes summary loading for `GetSession`, but `ListSessions` still drops summaries whenever the event filter returns an empty event slice. Please mirror the same unconditional summary assignment in `listSessions` and cover it with a `ListSessions` empty-window test.\n\n<details><summary>中文<\/summary>\n这里修复了 `GetSession` 的 summary 加载，但 `ListSessions` 在事件过滤结果为空时仍会丢掉 summary。请在 `listSessions` 中也改成无条件赋值 summary，并补一个 `ListSessions` 空事件窗口测试。\n<\/details>","line":98,"path":"session/sqlite/service_helper.go","url":"https://github.com/trpc-group/trpc-agent-go/pull/2160#discussion_r3557771149"},{"body":"`fileMemoryEntry` still keys JSON-file memories without event time, participants, or location, so metadata-only distinct memories collapse in `upsertMemory`. Please use the same metadata-aware stable ID as the normalizer/expected-memory path here and in `updateFileMemory`.\n\n<details><summary>中文<\/summary>\n`fileMemoryEntry` 的 JSON-file memory key 仍然没有包含 event time、participants、location，因此仅 metadata 不同的 memory 会在 `upsertMemory` 中互相覆盖。请这里和 `updateFileMemory` 都使用与 normalizer/expected-memory 路径一致的 metadata-aware stable ID。\n<\/details>","line":1463,"path":"session/replaytest/backend.go","url":"https://github.com/trpc-group/trpc-agent-go/pull/2160#discussion_r3557771155"},{"body":"Track payload normalization still converts every JSON number to `float64` and rounds non-duration values, which can erase real differences such as large IDs or counters. Please decode with `UseNumber` and only scrub fields that are explicitly duration/elapsed/latency noise.\n\n<details><summary>中文<\/summary>\nTrack payload 归一化仍会把所有 JSON 数字转成 `float64`，并对非耗时字段也做四舍五入，这会抹掉大整数 ID 或计数器这类真实差异。请改用 `UseNumber` 解码，并且只清洗明确属于 duration/elapsed/latency 噪声的字段。\n<\/details>","line":538,"path":"session/replaytest/normalize.go","url":"https://github.com/trpc-group/trpc-agent-go/pull/2160#discussion_r3557771159"}],"module_impact":"Direct impact is tests and SQLite summary reads. Indirect impact is confidence in backend compatibility across SQL, Redis, JSON-file, in-memory, and memory services.","modules":"`session/replaytest`, `session/sqlite`, optional tests in `test`, and storage/session/memory backend module wiring.","necessity_assessment":"confirmed as a feature/testing need: the issue is still open and the current base lacks a reusable cross-backend replay framework for Session and Memory behavior.","number":2160,"outcome":"Commented on optional module replaces, `ListSessions` summary loading, JSON-file memory identity, and track payload number normalization.","problem":"The PR addresses https://github.com/trpc-group/trpc-agent-go/issues/2001, which asks for a Session/Memory multi-backend replay consistency test framework. The current base has backend-specific tests, but no shared replay oracle for session events, summaries, state, tracks, memory search, TTL, and optional SQL backends.","problem_framing":"The deeper problem is test trustworthiness. A replay harness must run against the local checkout, cover the same semantic edge cases in every backend, and normalize only volatile data so real backend differences are not hidden.","review_action":"Submitted COMMENT review only; no approval, no LGTM, no merge. Review URL: https://github.com/trpc-group/trpc-agent-go/pull/2160#pullrequestreview-4670143556","risk":"If unfixed, the new harness can pass while testing published storage modules, missing a summary bug, collapsing distinct memories, or hiding real numeric track differences.","semantic_changes":"SQLite `GetSession` now loads summaries even when the filtered event window is empty; the replay harness should compare summary, memory, track, and event behavior across backend implementations.","solution_fit_assessment":"The harness is the right control surface for the problem, but it must be hermetic and precise; otherwise it becomes a green test suite that does not actually validate the current checkout or backend semantics.","status":"commented","technical_background":"Session services store conversations, summaries, state, track events, and memory across multiple backends. A replay consistency harness replays the same logical scenario against different backends and compares normalized snapshots. That normalization must preserve meaningful differences while removing only backend-specific noise; otherwise the harness can claim consistency while hiding real drift.","tests_docs":"CI is green and many replay tests are added. The comments identify missing hermetic module replaces, a remaining `ListSessions` summary gap, metadata-blind JSON-file memory IDs, and numeric over-normalization in track payloads.","title":"test: add session memory replay consistency harness","tradeoffs":"Broad backend coverage improves confidence but increases the risk of dependency drift, over-normalization, and optional-test configuration mistakes.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2160"}],"follow_up":[{"next":"下一轮先刷新这三个 PR 的 head、checks 和 review threads，确认作者是否逐条修复。","reason":"本轮 #2160、#2163、#2174 收到 8 条 inline comments，均是会影响测试可靠性、身份隔离或安全扫描有效性的 blocker。","title":"优先复核已评论 PR 的修复"},{"next":"如果后续允许审批，#2171 可按最新 head 重新判断；#2164 还需要先确认人工选择/maintainer LGTM 这个 gate。","reason":"#2171 已深审且未发现新代码 blocker，但本轮禁止 approval/LGTM；#2164 代码层面未发现新 finding，但关联 Rhino Bird 任务仍需要人工选择和明确 maintainer LGTM。","title":"只评论模式下的 clean/deferred 结果"},{"next":"继续把轻量状态对比需要的字段稳定到 运行状态快照，减少下轮重复深审成本。","reason":"本轮状态对比仍把全部 open PR 归入 heavy queue，说明前后报告状态字段还没有完全稳定复用。","title let lang = "zh";
let filter = "all";
const statusOrder = ["approved", "commented", "maintained", "merged", "skipped", "blocked"];

function text(value, fallback = "") {
  if (value === undefined || value === null || value === "") return fallback;
  if (typeof value === "object" && !Array.isArray(value)) {
    return value[lang] || value.zh || value.en || value.summary || value.body || value.mode || fallback;
  }
  return String(value);
}

function escapeHtml(value) {
  return text(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatRich(value) {
  let html = escapeHtml(value);
  const replacements = [
    [
      /(P[0-2]|codecov\/patch=FAILURE|go-apidiff=FAILURE|go-apidiff|FAILURE|失败|阻塞|不能合入|不能 merge|未合并|破坏性|breaking|unbounded|无界|绕过|丢失|重复|不稳定|风险)/gi,
      "mark-bad"
    ],
    [
      /(LGTM|已合并|已批准|squash merge|merged|approved|CI 全绿|全绿|修复有效|\bresolved\b|\bresolve\b)/gi,
      "mark-good"
    ],
    [
      /(pending|soft[- ]?CI|软门禁|follow-up|后续|关注|CodeRabbit|review readiness|not_reached)/gi,
      "mark-info"
    ],
    [
      /(导出 API|\bAPI\b|兼容性|\bsession\b|\brunner\b|\bmemory\b|GraphRAG|workspace_exec|OpenAPI|\bpolicy\b|security|安全)/gi,
      "mark-warn"
    ]
  ];
  for (const [pattern, className] of replacements) {
    html = html.replace(pattern, `<mark class="${className}">$1</mark>`);
  }
  return html;
}

function prs() {
  const skippedByNumber = new Map();
  for (const group of skippedGroups()) {
    for (const item of (group.items || [])) {
      const key = item.number ? String(item.number) : `${group.reason || "skipped"}:${text(item.title)}`;
      if (skippedByNumber.has(key)) continue;
      skippedByNumber.set(key, {
      ...item,
      status: item.status || "skipped",
      skip_reason: item.skip_reason || group.reason
      });
    }
  }
  const skipped = [...skippedByNumber.values()];
  return [
    ...(reportData.approved || []),
    ...(reportData.commented || []),
    ...(reportData.maintained || []),
    ...(reportData.blocked || []),
    ...skipped
  ];
}

function skippedGroups() {
  const processedNumbers = new Set([
    ...(reportData.approved || []),
    ...(reportData.commented || []),
    ...(reportData.maintained || []),
    ...(reportData.blocked || [])
  ].map(item => Number(item.number)).filter(Boolean));
  return (reportData.skipped_groups || []).map(group => {
    const existingItems = group.items || [];
    if (existingItems.length) {
      return {
        ...group,
        items: existingItems.filter(item => !processedNumbers.has(Number(item.number)))
      };
    }
    const items = (group.prs || []).filter(number => !processedNumbers.has(Number(number))).map(number => {
      const reason = group.reason || "skipped";
      const summary = text(group.title_zh || group.title || reason);
      return {
        number,
        title: `PR #${number}`,
        url: "",
        author: "",
        status: "skipped",
        skip_reason: summary,
        readiness_audit: summary,
        ci_state: "",
        blockers: [{
          kind: reason,
          summary
        }]
      };
    });
    return { ...group, items, count: items.length };
  }).filter(group => group.items.length > 0);
}

function counts(items) {
  const result = Object.fromEntries(statusOrder.map(status => [status, 0]));
  for (const item of items) {
    const status = item.status || "skipped";
    result[status] = (result[status] || 0) + 1;
  }
  return result;
}

function setLanguage(nextLang) {
  lang = nextLang;
  document.documentElement.lang = nextLang === "zh" ? "zh-CN" : "en";
  document.querySelectorAll("[data-lang-button]").forEach(button => {
    button.classList.toggle("active", button.dataset.langButton === nextLang);
  });
  render();
}

function renderStatic() {
  document.querySelectorAll("[data-i18n]").forEach(node => {
    node.textContent = labels[lang][node.dataset.i18n];
  });
  const repo = reportData.repo || "trpc-group/trpc-agent-go";
  const generated = reportData.generated_at || "2026-07-10T09:22:13.839Z";
  document.getElementById("subtitle").textContent = labels[lang].subtitle
    .replace("{repo}", repo)
    .replace("{time}", generated);
  document.getElementById("search").placeholder = labels[lang].search;
  document.getElementById("openAll").textContent = labels[lang].expandAll;
  document.getElementById("closeAll").textContent = labels[lang].collapseAll;
  document.getElementById("footer").textContent = labels[lang].footer;
}

function renderMetrics(items) {
  const totalComments = items.reduce((sum, item) =>
    sum + ((item.inline_comments || []).length || item.comment_count || 0), 0);
  const followups = (reportData.follow_up || []).length;
  const reviewed = items.filter(item =>
    ["approved", "commented", "maintained", "merged", "blocked"].includes(item.status)
  ).length;
  const metricRows = [
    [labels[lang].total, items.length],
    [labels[lang].reviewed, reviewed],
    [labels[lang].approved, items.filter(item =>
      ["approved", "merged"].includes(item.status)).length],
    [labels[lang].comments, totalComments],
    [labels[lang].followups, followups]
  ];
  document.getElementById("metrics").innerHTML = metricRows.map(([label, value]) => `
    <div class="metric">
      <div class="value">${value}</div>
      <div class="label">${escapeHtml(label)}</div>
    </div>
  `).join("");
}

function renderBars(items) {
  const byStatus = counts(items);
  const maxCount = Math.max(1, ...Object.values(byStatus));
  document.getElementById("bars").innerHTML = statusOrder.map(status => {
    const value = byStatus[status] || 0;
    const width = value === 0 ? 0 : Math.max(3, Math.round((value / maxCount) * 100));
    return `
      <div class="bar-row">
        <div class="bar-label">${labels[lang][status]}</div>
        <div class="bar-track"><div class="bar-fill ${status}" style="width:${width}%"></div></div>
        <strong>${value}</strong>
      </div>
    `;
  }).join("");
}

function renderTimeline() {
  const events = reportData.timeline || [];
  const container = document.getElementById("timeline");
  if (!events.length) {
    container.innerHTML = `<div class="empty">${labels[lang].empty}</div>`;
    return;
  }
  container.innerHTML = events.map(event => {
    const data = typeof event === "object" && event !== null && !Array.isArray(event)
      ? event
      : { detail: event };
    const eventName = text(data.event || data.type || data.label || "");
    const detail = text(data.detail || data.text || (!eventName ? data : ""));
    const body = eventName && detail && eventName !== detail
      ? `<strong>${escapeHtml(eventName)}</strong><div>${formatRich(detail)}</div>`
      : formatRich(detail || eventName);
    return `
      <div class="timeline-item">
        <div class="time">${escapeHtml(data.time || "")}</div>
        <div>${body}</div>
      </div>
    `;
  }).join("");
}

function renderOverview() {
  const panel = document.getElementById("overviewPanel");
  const content = document.getElementById("overviewContent");
  const overview = reportData.overview || reportData.summary;
  const body = text(overview);
  if (!body) {
    panel.style.display = "none";
    content.textContent = "";
    return;
  }
  panel.style.display = "block";
  content.innerHTML = formatRich(body);
}

function renderChips() {
  const chipRows = ["all", ...statusOrder];
  document.getElementById("chips").innerHTML = chipRows.map(status => `
    <button type="button" class="chip ${filter === status ? "active" : ""}"
      data-filter="${status}">${labels[lang][status]}</button>
  `).join("");
  document.querySelectorAll("[data-filter]").forEach(button => {
    button.addEventListener("click", () => {
      filter = button.dataset.filter;
      renderCards();
      renderSkipGroups();
      renderFollowUp();
      renderChips();
    });
  });
}

function matchesSearch(item, query) {
  if (!query) return true;
  const haystack = [
    item.number,
    text(item.title),
    item.author,
    text(item.problem),
    text(item.necessity_assessment),
    text(item.evidence_checked),
    text(item.reproduction_on_base),
    text(item.issue_evidence_gaps),
    text(item.approach),
    text(item.implementation_derivation),
    text(item.solution_fit_assessment),
    text(item.outcome),
    text(item.merge_policy),
    text(item.skip_reason),
    text(item.group_reason),
    text(item.readiness_audit),
    blockersSearchText(item.blockers),
    text(item.risk),
    text(item.ci_state)
  ].join(" ").toLowerCase();
  return haystack.includes(query.toLowerCase());
}

function blockersSearchText(blockers) {
  if (!Array.isArray(blockers)) return "";
  return blockers.map(blocker => {
    if (typeof blocker !== "object" || blocker === null) return text(blocker);
    return [
      blocker.kind,
      blocker.summary,
      blocker.reviewer,
      blocker.path,
      blocker.line,
      blocker.latest_response,
      blocker.verification,
      blocker.url
    ].map(value => text(value)).join(" ");
  }).join(" ");
}

function field(label, value) {
  const body = text(value);
  if (!body) return "";
  return `<div class="field"><strong>${label}</strong><div class="field-body">${formatRich(body)}</div></div>`;
}

function renderBlockers(item) {
  const blockers = Array.isArray(item.blockers) ? item.blockers : [];
  if (!blockers.length) return "";
  const isNonBlockerList = blockers.every(blocker => {
    const kind = typeof blocker === "object" && blocker !== null ? String(blocker.kind || "") : "";
    return kind === "not_reached";
  });
  const detailLabel = isNonBlockerList
    ? labels[lang].nonBlockerDetails
    : labels[lang].blockerDetails;
  const rendered = blockers.map(blocker => {
    const data = typeof blocker === "object" && blocker !== null
      ? blocker
      : { summary: blocker };
    const location = [data.path, data.line ? `:${data.line}` : ""].filter(Boolean).join("");
    const meta = [
      data.kind ? blockerKindLabel(data.kind) : "",
      data.reviewer ? `reviewer: ${text(data.reviewer)}` : "",
      location,
      data.latest_response ? `latest: ${text(data.latest_response)}` : "",
      data.verification ? text(data.verification) : ""
    ].filter(Boolean).join(" · ");
    const summary = formatRich(data.summary || blocker);
    const link = data.url
      ? ` <a href="${escapeHtml(data.url)}">link</a>`
      : "";
    return `<li class="blocker-item"><div>${summary}${link}</div>${meta ? `<div class="blocker-meta">${escapeHtml(meta)}</div>` : ""}</li>`;
  }).join("");
  return `<div class="skip-detail"><strong>${detailLabel}:</strong></div><ul class="blocker-list">${rendered}</ul>`;
}

function blockerKindLabel(kind) {
  return (labels[lang].blockerKinds || {})[kind] || text(kind);
}

  function inlineCommentText(comment) {
    if (comment === undefined || comment === null) return "";
    if (typeof comment !== "object" || Array.isArray(comment)) {
      return text(comment);
    }
    if (lang === "zh") {
      return text(comment.summary_zh || comment.summary || comment.body || comment.message || "");
    }
    return text(comment.body || comment.summary_en || comment.summary || comment.message || "");
  }

function allPrText(item) {
  const comments = (item.inline_comments || []).map(comment => [
    comment.severity,
    comment.focus,
    comment.body,
    comment.summary,
    comment.path
  ].map(value => text(value)).join(" ")).join(" ");
  const blockers = blockersSearchText(item.blockers);
  return [
    item.status,
    item.number,
    item.title,
    item.author,
    item.problem,
    item.necessity_assessment,
    item.evidence_checked,
    item.reproduction_on_base,
    item.issue_evidence_gaps,
    item.approach,
    item.implementation_derivation,
    item.solution_fit_assessment,
    item.outcome,
    item.risk,
    item.ci_state,
    item.skip_reason,
    item.readiness_audit,
    item.modules,
    item.api_surface,
    comments,
    blockers
  ].map(value => text(value)).join(" ").toLowerCase();
}

function readingAdvice(item) {
  const status = item.status || "skipped";
  const comments = item.inline_comments || [];
  const blockers = item.blockers || [];
  const body = allPrText(item);
  const hasP1 = comments.some(comment =>
    /\bP[01]\b/i.test(text(comment.severity)) ||
    /\bP[01]\b/i.test(inlineCommentText(comment))
  );
  const hasCriticalRisk = hasP1 ||
    /(security|安全|bypass|绕过|breaking|破坏性|unbounded|无界|丢失|重复|不稳定|兼容|api|go-apidiff|failure|失败|不能 merge|不能合入|race|并发)/i.test(body);
  const highImpactFeature =
    /(add|new|新增|support|支持|agent|runner|session|memory|graphrag|knowledge|openapi|workspace_exec|policy|extension|tool|graph|api)/i.test(body);

  const copy = {
    critical: {
      icon: "🔥",
      zh: "重点精读",
      en: "Deep Read",
      reasonZh: comments.length
        ? `有 ${comments.length} 条行级评论，且包含 P1/兼容/正确性/安全类风险。`
        : "包含高风险兼容性或正确性信号，需要重点复核。",
      reasonEn: comments.length
        ? `${comments.length} inline comment(s), including P1, compatibility, correctness, or security risk.`
        : "High-risk compatibility or correctness signal; review carefully."
    },
    focus: {
      icon: "🔎",
      zh: "建议细看",
      en: "Read Carefully",
      reasonZh: comments.length
        ? `有 ${comments.length} 条评论或重要设计取舍，建议看完整结论。`
        : "涉及核心模块、导出 API 或较大功能，建议细看。",
      reasonEn: comments.length
        ? `${comments.length} comment(s) or important design tradeoffs; read the full conclusion.`
        : "Core module, exported API, or larger feature; read carefully."
    },
    skim: {
      icon: "✅",
      zh: "快速略看",
      en: "Quick Skim",
      reasonZh: "风险低或改动较直接，扫结论和 CI 状态即可。",
      reasonEn: "Low risk or straightforward change; skim outcome and CI state."
    },
    follow: {
      icon: "⏳",
      zh: "只看阻塞",
      en: "Blocker Only",
      reasonZh: blockers.length
        ? `主要看 ${blockers.length} 个具体阻塞点，暂不需要读完整实现。`
        : "当前不是可合并状态，先看阻塞和后续动作。",
      reasonEn: blockers.length
        ? `Focus on ${blockers.length} concrete blocker(s); no need to read the full implementation yet.`
        : "Not merge-ready; focus on blockers and next action."
    }
  };

  let level = "skim";
  if (status === "blocked") {
    level = "follow";
  } else if (status === "commented") {
    level = hasCriticalRisk ? "critical" : "focus";
  } else if (status === "maintained") {
    level = hasCriticalRisk || highImpactFeature ? "focus" : "skim";
  } else if (status === "approved") {
    level = hasCriticalRisk || highImpactFeature ? "focus" : "skim";
  } else if (status === "merged") {
    level = highImpactFeature || hasCriticalRisk ? "focus" : "skim";
  } else if (status === "skipped") {
    level = blockers.length || /(conflict|ci|failure|失败|未回应|review)/i.test(body)
      ? "follow"
      : "skim";
  }

  const selected = copy[level];
  return {
    level,
    icon: selected.icon,
    label: lang === "zh" ? selected.zh : selected.en,
    reason: lang === "zh" ? selected.reasonZh : selected.reasonEn
  };
}

function priorityRank(level) {
  return { critical: 4, focus: 3, follow: 2, skim: 1 }[level] || 0;
}

function renderReadingGuide(items) {
  const panel = document.getElementById("readingGuidePanel");
  const container = document.getElementById("readingGuide");
  const candidates = [
    ...items.filter(item => (item.status || "skipped") !== "skipped"),
    ...(reportData.follow_up || []).map(item => {
      if (typeof item === "object" && item !== null && !Array.isArray(item)) {
        return { ...item, status: item.status || "blocked" };
      }
      const body = text(item);
      return { title: body, next: body, status: "blocked", plain: true };
    })
  ].map(item => ({ item, advice: readingAdvice(item) }))
    .filter(entry => entry.advice.level !== "skim")
    .sort((left, right) => priorityRank(right.advice.level) - priorityRank(left.advice.level));

  if (!candidates.length) {
    panel.style.display = "none";
    container.innerHTML = "";
    return;
  }

  panel.style.display = "block";
  container.innerHTML = candidates.slice(0, 9).map(entry => {
    const item = entry.item;
    const advice = entry.advice;
    const prText = item.number ? `#${item.number}` : "PR";
    const prLink = item.url
      ? `<a href="${escapeHtml(item.url)}">${prText} · ${escapeHtml(text(item.title))}</a>`
      : `<span>${prText} · ${escapeHtml(text(item.title))}</span>`;
    return `
      <article class="guide-card ${advice.level}">
        <div class="guide-meta">
          <span class="read-pill ${advice.level}">${advice.icon} ${escapeHtml(advice.label)}</span>
          <span class="badge ${item.status || "skipped"}">${labels[lang][item.status] || item.status || labels[lang].skipped}</span>
        </div>
        <div>${prLink}</div>
        <div class="guide-reason">${escapeHtml(advice.reason)}</div>
      </article>
    `;
  }).join("");
}

function storyLine(label, value) {
  const body = text(value);
  if (!body) return "";
  return `
    <p class="story-line">
      <span class="story-label">${escapeHtml(label)}</span>
      <span class="story-text">${formatRich(body)}</span>
    </p>
  `;
}

function storyBlock(title, rows, className = "") {
  const body = rows.filter(Boolean).join("");
  if (!body) return "";
  const classes = ["story-block", className].filter(Boolean).join(" ");
  return `<section class="${classes}"><h4>${escapeHtml(title)}</h4>${body}</section>`;
}

function compactSummary(item) {
  const candidates = [
    item.problem,
    item.design_assessment,
    item.solution_fit_assessment,
    item.approach,
    item.skip_reason,
    item.reason,
    item.outcome,
    item.risk
  ].map(value => text(value).trim()).filter(Boolean);
  return candidates[0] || labels[lang].summaryFallback;
}

function updateCardToggle(card) {
  const button = card.querySelector(".card-toggle");
  if (!button) return;
  const open = card.classList.contains("open");
  button.textContent = open ? labels[lang].collapseDetails : labels[lang].expandDetails;
  button.setAttribute("aria-expanded", open ? "true" : "false");
}

function setCardOpen(card, open) {
  card.classList.toggle("open", open);
  updateCardToggle(card);
}

function factItem(label, value) {
  const body = text(value);
  if (!body) return "";
  return `
    <div class="fact">
      <dt>${escapeHtml(label)}</dt>
      <dd>${formatRich(body)}</dd>
    </div>
  `;
}

function directFixesText(fixes) {
  if (!Array.isArray(fixes) || !fixes.length) return "";
  return fixes.map(fix => {
    if (typeof fix !== "object" || fix === null) return text(fix);
    return [
      fix.branch ? `branch: ${text(fix.branch)}` : "",
      fix.commit ? `commit: ${text(fix.commit)}` : "",
      fix.message ? `message: ${text(fix.message)}` : "",
      fix.files ? `files: ${Array.isArray(fix.files) ? fix.files.map(file => text(file)).join(", ") : text(fix.files)}` : "",
      fix.tests ? `tests: ${Array.isArray(fix.tests) ? fix.tests.map(test => text(test)).join(", ") : text(fix.tests)}` : "",
      fix.push_state ? `push: ${text(fix.push_state)}` : "",
      fix.ci_state ? `CI: ${text(fix.ci_state)}` : ""
    ].filter(Boolean).join(" · ");
  }).join("\n");
}

function renderReviewRail(item) {
  const advice = readingAdvice(item);
  const callout = `
    <div class="reading-callout ${advice.level}">
      <strong>${advice.icon} ${escapeHtml(advice.label)}</strong>
      <span>${escapeHtml(advice.reason)}</span>
    </div>
  `;
  const facts = [
    factItem(labels[lang].outcome, item.outcome),
    factItem(labels[lang].reviewAction, item.review_action),
    factItem(labels[lang].mergePolicy, item.merge_policy),
    factItem(labels[lang].headSha, item.head_sha),
    factItem(labels[lang].mergeCommit, item.merge_commit),
    factItem(labels[lang].necessityAssessment, item.necessity_assessment),
    factItem(labels[lang].reproductionOnBase, item.reproduction_on_base),
    factItem(labels[lang].solutionFitAssessment, item.solution_fit_assessment),
    factItem(labels[lang].risk, item.risk),
    factItem(labels[lang].ci, item.ci_state),
    factItem(labels[lang].attentionPoints, item.attention_points),
    factItem(labels[lang].directFixes, directFixesText(item.direct_fixes)),
    factItem(labels[lang].selfReviewPolicy, item.self_review_policy),
    factItem(labels[lang].testsDocs, item.tests_docs),
    factItem(labels[lang].modules, item.modules),
    factItem(labels[lang].apiSurface, item.api_surface),
    factItem(labels[lang].reason, item.skip_reason)
  ].filter(Boolean).join("");
  if (!facts) return `<aside class="review-rail">${callout}</aside>`;
  return `<aside class="review-rail">${callout}<h4>${labels[lang].reviewSummary}</h4><dl class="fact-list">${facts}</dl></aside>`;
}

function renderComments(item) {
  const comments = item.inline_comments || [];
  if (!comments.length) return "";
  const rendered = comments.map(comment => {
    const data = typeof comment === "object" && comment !== null && !Array.isArray(comment)
      ? comment
      : { body: comment };
    const location = `${escapeHtml(data.path || "")}${data.line ? ":" + escapeHtml(data.line) : ""}`;
    const source = data.url
      ? `<a class="comment-link" href="${escapeHtml(data.url)}">GitHub</a>`
      : "";
    return `
      <div class="comment">
        <div class="comment-head">
          <strong>${location}</strong>
          ${source}
        </div>
        <div>${formatRich(inlineCommentText(data))}</div>
        ${data.focus ? `<div><strong>${labels[lang].focus}:</strong> ${escapeHtml(text(data.focus))}</div>` : ""}
        ${data.severity ? `<div><strong>${labels[lang].severity}:</strong> ${escapeHtml(text(data.severity))}</div>` : ""}
      </div>
    `;
  }).join("");
  return `<section class="comments-panel">
    <h4>${labels[lang].inlineComments}</h4>
    <div class="comment-list">${rendered}</div>
  </section>`;
}

function renderPrReadout(item) {
  const story = [
    storyBlock(labels[lang].backgroundAndProblem, [
      storyLine(labels[lang].technicalBackground, item.technical_background),
      storyLine(labels[lang].problem, item.problem),
      storyLine(labels[lang].necessityAssessment, item.necessity_assessment),
      storyLine(labels[lang].evidenceChecked, item.evidence_checked),
      storyLine(labels[lang].reproductionOnBase, item.reproduction_on_base),
      storyLine(labels[lang].issueEvidenceGaps, item.issue_evidence_gaps),
      storyLine(labels[lang].problemFraming, item.problem_framing),
      storyLine(labels[lang].rootCause, item.root_cause)
    ], "hero-block"),
    storyBlock(labels[lang].solutionAndTradeoffs, [
      storyLine(labels[lang].approach, item.approach),
      storyLine(labels[lang].implementationDerivation, item.implementation_derivation),
      storyLine(labels[lang].solutionFitAssessment, item.solution_fit_assessment),
      storyLine(labels[lang].alternativeDesigns, item.alternative_designs),
      storyLine(labels[lang].tradeoffs, item.tradeoffs),
      storyLine(labels[lang].designAssessment, item.design_assessment)
    ]),
    storyBlock(labels[lang].impactAndEvidence, [
      storyLine(labels[lang].changeInventory, item.change_inventory),
      storyLine(labels[lang].semanticChanges, item.semantic_changes),
      storyLine(labels[lang].behaviorImpact, item.behavior_impact),
      storyLine(labels[lang].moduleImpact, item.module_impact),
      storyLine(labels[lang].crossModuleImpact, item.cross_module_impact)
    ]),
    renderComments(item)
  ].filter(Boolean).join("");
  return `<div class="pr-readout"><div class="pr-story">${story}</div>${renderReviewRail(item)}</div>`;
}

function renderCards() {
  const query = document.getElementById("search").value.trim();
  const visible = prs().filter(item => (item.status || "skipped") !== "skipped")
    .filter(item => {
    const status = item.status || "skipped";
    return (filter === "all" || status === filter) && matchesSearch(item, query);
  });
  const container = document.getElementById("cards");
  if (!visible.length) {
    container.innerHTML = `<div class="empty">${labels[lang].empty}</div>`;
    return;
  }
  container.innerHTML = visible.map(item => {
    const status = item.status || "skipped";
    const advice = readingAdvice(item);
    const summary = compactSummary(item);
    const prText = item.number ? `#${item.number}` : "PR";
    const prLink = item.url
      ? `<a href="${escapeHtml(item.url)}">${prText}</a>`
      : prText;
    return `
      <article class="card priority-${advice.level}" data-status="${status}">
        <div class="card-head">
          <div>
            <div class="headline-row">
              <h3 class="card-title">${prLink} · ${escapeHtml(text(item.title))}</h3>
              <span class="read-pill ${advice.level}">${advice.icon} ${escapeHtml(advice.label)}</span>
            </div>
            <div class="meta">
              <span>${labels[lang].author}: ${escapeHtml(item.author || "")}</span>
              <span class="advice-reason">${escapeHtml(advice.reason)}</span>
            </div>
            <div class="card-summary">${formatRich(summary)}</div>
          </div>
          <div class="card-actions">
            <span class="badge ${status}">${labels[lang][status] || status}</span>
            <button class="card-toggle" type="button" aria-expanded="false">${labels[lang].expandDetails}</button>
          </div>
        </div>
        <div class="card-body">
          ${renderPrReadout(item)}
        </div>
      </article>
    `;
  }).join("");
  document.querySelectorAll(".card-head").forEach(head => {
    head.addEventListener("click", event => {
      if (event.target.closest("a")) return;
      const card = head.closest(".card");
      setCardOpen(card, !card.classList.contains("open"));
    });
  });
  document.querySelectorAll(".card").forEach(card => updateCardToggle(card));
}

function renderSkipGroups() {
  const heading = document.getElementById("skippedHeading");
  const container = document.getElementById("skipGroups");
  if (!["all", "skipped"].includes(filter)) {
    heading.style.display = "none";
    container.style.display = "none";
    return;
  }
  heading.style.display = "flex";
  container.style.display = "grid";
  const query = document.getElementById("search").value.trim();
  const groups = skippedGroups().map(group => {
    const reason = group.reason || "";
    const title = lang === "zh"
      ? text(group.title_zh || group.title || group.reason)
      : text(group.title_en || group.title || group.reason);
    const items = (group.items || []).map(item => ({
      ...item,
      status: item.status || "skipped",
      group_reason: reason,
      skip_reason: item.skip_reason || reason
    })).filter(item => matchesSearch(item, query));
    return { reason, title, items };
  }).filter(group => group.items.length > 0);
  if (!groups.length) {
    container.innerHTML = `<div class="empty">${labels[lang].empty}</div>`;
    return;
  }
  container.innerHTML = groups.map((group, index) => `
    <article class="skip-group open">
      <div class="skip-group-head" data-skip-group="${index}">
        <h3 class="skip-group-title">${escapeHtml(text(group.title || group.reason))}</h3>
        <span class="skip-group-count">${group.items.length} ${labels[lang].items}</span>
      </div>
      <div class="skip-group-body">
        ${group.items.map(item => {
          const prText = item.number ? `#${item.number}` : "PR";
          const prLink = item.url
            ? `<a href="${escapeHtml(item.url)}">${prText}</a>`
            : prText;
          return `
            <div class="skip-row">
              <div>
                <div class="skip-title">${prLink} · ${escapeHtml(text(item.title))}</div>
                <div class="skip-detail">${labels[lang].author}: ${escapeHtml(item.author || "")}</div>
              </div>
              <div>
                <div><strong>${labels[lang].reason}:</strong> ${formatRich(text(item.skip_reason))}</div>
                ${item.readiness_audit ? `<div class="skip-detail"><strong>${labels[lang].readinessAudit}:</strong> ${formatRich(text(item.readiness_audit))}</div>` : ""}
                ${item.necessity_assessment ? `<div class="skip-detail"><strong>${labels[lang].necessityAssessment}:</strong> ${formatRich(text(item.necessity_assessment))}</div>` : ""}
                ${item.evidence_checked ? `<div class="skip-detail"><strong>${labels[lang].evidenceChecked}:</strong> ${formatRich(text(item.evidence_checked))}</div>` : ""}
                ${item.reproduction_on_base ? `<div class="skip-detail"><strong>${labels[lang].reproductionOnBase}:</strong> ${formatRich(text(item.reproduction_on_base))}</div>` : ""}
                ${item.issue_evidence_gaps ? `<div class="skip-detail"><strong>${labels[lang].issueEvidenceGaps}:</strong> ${formatRich(text(item.issue_evidence_gaps))}</div>` : ""}
                ${item.implementation_derivation ? `<div class="skip-detail"><strong>${labels[lang].implementationDerivation}:</strong> ${formatRich(text(item.implementation_derivation))}</div>` : ""}
                ${item.solution_fit_assessment ? `<div class="skip-detail"><strong>${labels[lang].solutionFitAssessment}:</strong> ${formatRich(text(item.solution_fit_assessment))}</div>` : ""}
                ${renderBlockers(item)}
                ${item.ci_state ? `<div class="skip-detail">${formatRich(text(item.ci_state))}</div>` : ""}
                ${item.risk ? `<div class="skip-detail">${formatRich(text(item.risk))}</div>` : ""}
              </div>
            </div>
          `;
        }).join("")}
      </div>
    </article>
  `).join("");
  document.querySelectorAll("[data-skip-group]").forEach(head => {
    head.addEventListener("click", () => {
      head.closest(".skip-group").classList.toggle("open");
    });
  });
}

function renderFollowUp() {
  const heading = document.getElementById("followUpHeading");
  const container = document.getElementById("followUpCards");
  if (!["all", "skipped", "blocked"].includes(filter)) {
    heading.style.display = "none";
    container.style.display = "none";
    return;
  }
  const query = document.getElementById("search").value.trim().toLowerCase();
  const items = (reportData.follow_up || []).map(item => {
    if (typeof item === "object" && item !== null && !Array.isArray(item)) return item;
    const body = text(item);
    return {
      title: body,
      next: body,
      plain: true
    };
  }).filter(item => {
    if (!query) return true;
    return [
      item.number,
      item.author,
      text(item.title),
      text(item.reason),
      text(item.next)
    ].join(" ").toLowerCase().includes(query);
  });
  if (!items.length) {
    heading.style.display = "none";
    container.style.display = "none";
    return;
  }
  heading.style.display = "flex";
  container.style.display = "grid";
  container.innerHTML = items.map(item => {
    const hasPrIdentity = Boolean(item.number || item.url);
    const prText = item.number ? `#${item.number}` : "PR";
    const prLink = item.url
      ? `<a href="${escapeHtml(item.url)}">${prText}</a>`
      : prText;
    const title = escapeHtml(text(item.title || item.next || item.reason));
    const cardTitle = hasPrIdentity ? `${prLink} · ${title}` : title;
    const meta = item.author
      ? `<div class="meta">${labels[lang].author}: ${escapeHtml(item.author)}</div>`
      : "";
    const body = item.plain
      ? `<div>${formatRich(text(item.next || item.title))}</div>`
      : `<div class="grid">
          ${field(labels[lang].reason, item.reason)}
          ${field(labels[lang].outcome, item.next)}
        </div>`;
    return `
      <article class="card open" data-status="blocked">
        <div class="card-head">
          <div>
            <h3 class="card-title">${cardTitle}</h3>
            ${meta}
          </div>
          <span class="badge blocked">${labels[lang].followups}</span>
        </div>
        <div class="card-body">
          ${body}
        </div>
      </article>
    `;
  }).join("");
}

function renderEvolution() {
  const panel = document.getElementById("evolutionPanel");
  const container = document.getElementById("evolutionList");
  const items = reportData.skill_evolution || [];
  if (!items.length) {
    panel.style.display = "none";
    container.innerHTML = "";
    return;
  }
  panel.style.display = "block";
  container.innerHTML = items.map(item => {
    const data = typeof item === "object" && item !== null && !Array.isArray(item)
      ? item
      : { area: labels[lang].selfEvolutionSection, note: item };
    return `
      <article class="evolution-item">
        <div class="evolution-area">${escapeHtml(text(data.area || labels[lang].selfEvolutionSection))}</div>
        <div class="evolution-note">${formatRich(text(data.note || data.summary || data.body || ""))}</div>
      </article>
    `;
  }).join("");
}

function render() {
  const items = prs();
  renderStatic();
  renderMetrics(items);
  renderBars(items);
  renderTimeline();
  renderOverview();
  renderReadingGuide(items);
  renderChips();
  renderCards();
  renderSkipGroups();
  renderFollowUp();
  renderEvolution();
}

document.querySelectorAll("[data-lang-button]").forEach(button => {
  button.addEventListener("click", () => setLanguage(button.dataset.langButton));
});
document.getElementById("search").addEventListener("input", () => {
  renderCards();
  renderSkipGroups();
  renderFollowUp();
});
document.getElementById("openAll").addEventListener("click", () => {
  document.querySelectorAll(".card").forEach(card => setCardOpen(card, true));
  document.querySelectorAll(".skip-group").forEach(node => node.classList.add("open"));
});
document.getElementById("closeAll").addEventListener("click", () => {
  document.querySelectorAll(".card").forEach(card => setCardOpen(card, false));
  document.querySelectorAll(".skip-group").forEach(node => node.classList.remove("open"));
});
render();
</script>
</body>
</html>
