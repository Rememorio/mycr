.meta {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 7px;
}
.badge {
  gap: 7px;
  min-width: 0;
  padding: 6px 11px;
  text-transform: none;
  white-space: nowrap;
}
.card-summary {
  color: #526173;
  margin-top: 9px;
}
.badge::before {
  content: "";
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: currentColor;
}
.card-body {
  background: #fff;
  padding: 0 18px 18px;
}
.grid {
  grid-template-columns: 1fr;
  gap: 10px;
}
.field {
  background: #fbfcfe;
  border-color: #e6ecf3;
  padding: 13px 14px;
}
.field strong {
  color: #536175;
  font-size: 11px;
  letter-spacing: 0;
  text-transform: uppercase;
}
.field-body {
  color: #1f2937;
  line-height: 1.62;
}
.comment {
  background: #fff8ed;
  border-left-color: var(--accent-2);
  color: #1f2937;
}
.comment-head {
  color: #1f2937;
}
.pr-readout {
  grid-template-columns: minmax(0, 1fr);
  gap: 18px;
}
.story-block {
  border-top-color: #e2e8f0;
}
.story-block.hero-block {
  background: linear-gradient(180deg, #fbfffe, #f7fbfa);
  border-color: #d5e7e4;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
}
.story-block h4,
.review-rail h4,
.comments-panel h4 {
  font-size: 13px;
  font-weight: 900;
}
.story-line {
  grid-template-columns: 116px minmax(0, 1fr);
  border-top-color: #e9eef5;
}
.story-label {
  color: #607086;
}
.review-rail {
  border: 1px solid #e3eaf2;
  border-radius: 8px;
  padding: 14px;
  background: #fbfcfe;
}
.review-rail .fact-list {
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
}
.fact {
  border-top-color: #e8eef5;
}
.comments-panel {
  border-top-color: #e2e8f0;
}
.comment-list {
  gap: 12px;
}
.skip-group {
  box-shadow: var(--shadow);
}
.skip-group-head {
  align-items: center;
  background: linear-gradient(180deg, #fff, #fbfcfe);
}
.skip-row {
  grid-template-columns: minmax(0, 1.15fr) minmax(220px, 0.85fr);
}
.blocker-item {
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.75);
}
.empty {
  background: #fff;
  box-shadow: var(--shadow);
}
@media (max-width: 840px) {
  .topbar, .card-head { grid-template-columns: 1fr; display: grid; }
  .card-actions { align-items: flex-start; flex-direction: row; flex-wrap: wrap; }
  .dashboard, .grid, .metrics { grid-template-columns: 1fr; }
  .guide-grid { grid-template-columns: 1fr; }
  .headline-row { align-items: flex-start; flex-direction: column; }
  .pr-readout { grid-template-columns: 1fr; }
  .review-rail { position: static; }
  .story-line { grid-template-columns: 1fr; gap: 4px; }
  .timeline-item { grid-template-columns: 1fr; }
  .controls { position: static; }
  .utilities { width: 100%; margin-left: 0; }
  .utility-button { flex: 1 1 auto; }
  .skip-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div>
      <h1 data-i18n="title">MyCR 审核报告</h1>
      <p class="subtitle" id="subtitle"></p>
    </div>
    <div class="toggle" aria-label="Language">
      <button type="button" data-lang-button="zh" class="active">中文</button>
      <button type="button" data-lang-button="en">EN</button>
    </div>
  </div>
  <section class="metrics" id="metrics"></section>
  <section class="dashboard">
    <div class="panel">
      <h2 data-i18n="statusDistribution">状态分布</h2>
      <div class="bars" id="bars"></div>
    </div>
    <div class="panel">
      <h2 data-i18n="timeline">执行时间线</h2>
      <div class="timeline" id="timeline"></div>
    </div>
  </section>
  <section class="panel" id="overviewPanel" style="display: none; margin-top: 16px;">
    <h2 data-i18n="overviewSection">整体摘要</h2>
    <div class="overview-content" id="overviewContent"></div>
  </section>
  <section class="panel reading-guide" id="readingGuidePanel" style="display: none;">
    <div class="guide-head">
      <h2 data-i18n="readingGuide">阅读建议</h2>
      <span data-i18n="readingGuideHint">先看高风险和高影响 PR</span>
    </div>
    <div class="guide-grid" id="readingGuide"></div>
  </section>
  <section class="controls">
    <input class="search" id="search" type="search">
    <div class="chips" id="chips"></div>
    <div class="utilities">
      <button type="button" class="utility-button" id="openAll"></button>
      <button type="button" class="utility-button" id="closeAll"></button>
    </div>
  </section>
  <section class="section-heading">
    <h2 data-i18n="reviewedSection">已处理 PR</h2>
    <div class="hint" data-i18n="reviewedHint">点击卡片查看细节</div>
  </section>
  <main class="cards" id="cards"></main>
  <section class="section-heading" id="skippedHeading">
    <h2 data-i18n="skippedGroups">未审核 PR 分类</h2>
    <div class="hint" data-i18n="skippedHint">按排除原因分组</div>
  </section>
  <section class="skip-groups" id="skipGroups"></section>
  <section class="section-heading" id="followUpHeading">
    <h2 data-i18n="followUpSection">后续关注</h2>
    <div class="hint" data-i18n="followUpHint">接近可处理但仍有阻塞</div>
  </section>
  <section class="cards" id="followUpCards"></section>
  <div class="footer" id="footer"></div>
</div>
<script>
const reportData = {"approved":[{"approach":"Current head adds the same TotalTokens-based presence check to streaming and non-streaming response creation, with focused regression tests for both helpers.","author":"shanghai-Jerry","behavior_impact":"Langfuse now receives token usage for total-only OpenAI-compatible responses instead of missing usage in one path.","change_inventory":"Updated response usage extraction and added conditional usage tests for final streaming response and completion conversion.","ci_state":"162 checks pass; no unresolved review thread at merge time.","design_assessment":"The fix is narrow and preserves existing behavior for complete usage payloads while accepting provider payloads that only expose total token count.","head_sha":"26260123416cb88fb373e5c01ba25bb54144ae67","merge_commit":"ed74563bb10b220fd234b00f53be9c3a0e907a68","merged_at":"2026-06-26T01:44:47Z","modules":"model/openai -> Langfuse usage conversion and tests","number":1998,"outcome":"xhigh 子审无发现；主线程复核 diff、threads、checks 后以 `LGTM` approve，并用 `--match-head-commit 26260123416cb88fb373e5c01ba25bb54144ae67` squash merge。","problem":"Earlier review asked for consistent streaming and non-streaming handling of total-only usage.","risk":"Low after green CI and no live review threads.","status":"merged","technical_background":"Langfuse integration relies on model usage being carried into response metadata. Some OpenAI-compatible providers report only total_tokens, and previous code paths could drop usage when prompt/completion fields were absent.","title":"fix: Langfuse missing token usage data for streaming responses","updated_at":"2026-06-26T01:44:47Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/1998"},{"approach":"`ensureValidToolInput` now normalizes empty, partial, invalid, and literal `null` tool_use input to `{}` before refreshing raw JSON, and tests cover the null case.","author":"shanghai-Jerry","behavior_impact":"Streaming Anthropic-compatible tool calls no longer fail or return null arguments when proxy input is incomplete.","change_inventory":"Added tool_use input guard and boundary tests for nil/empty/partial/null valid JSON inputs.","ci_state":"162 checks pass; prior null thread was verified fixed and resolved before merge.","design_assessment":"The repair is scoped to `tool_use`, so it avoids masking malformed text blocks while protecting tool-call argument serialization.","head_sha":"c17231f12d13a489118f83fb4bb7f5d5f36b74f4","merge_commit":"a20241a258b91f81d4d19cfee24807f8dc13ec5b","merged_at":"2026-06-26T01:53:54Z","modules":"model/anthropic streaming accumulator","number":1997,"outcome":"旧 thread 已确认修复并 resolve；随后 `LGTM` approve，按 head `c17231f12d13a489118f83fb4bb7f5d5f36b74f4` squash merge。","problem":"Prior WineChord thread noted that `json.Valid(\"null\")` is true, so a stream that starts with `input:null` and never sends `input_json_delta` could leave tool arguments as JSON null.","risk":"Low; subagent also ran local isolated `go test ./... -count=1` in `model/anthropic` successfully.","status":"merged","technical_background":"Anthropic-compatible streaming proxies can emit malformed, partial, or literal null tool-use input while the accumulator later serializes content blocks.","title":"fix: Anthropic streaming JSON parse error on tool-use blocks with non…","updated_at":"2026-06-26T01:53:54Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/1997"},{"approach":"Removed `GenerationConfig.Stream=false` override, updated tests to assert streaming is preserved, and documented that unfinished attempt text may reach clients while final acceptance is still blocked.","author":"bytethm","behavior_impact":"Callers keep their streaming preference; todo enforcement continues by turning premature final response into a continuation signal.","change_inventory":"Updated beforeModel behavior, renamed streaming test, and mirrored docs in English/Chinese.","ci_state":"162 checks pass; no unresolved threads.","design_assessment":"The behavior is explicit in code, tests, and docs. The remaining risk is UX-level rather than correctness: clients may see interim text, but it is not terminal assistant history.","head_sha":"053fe7bc057db9def821212c8abc013f97f70abf","merge_commit":"02462f3cc34c703730aea7a61c5bfdbc02086b2f","merged_at":"2026-06-26T01:55:00Z","modules":"agent/extension/todoenforcer, docs/mkdocs/{en,zh}/tool.md","number":2008,"outcome":"主线程与 xhigh 子审均无阻断发现；`LGTM` approve 后按 head `053fe7bc057db9def821212c8abc013f97f70abf` squash merge。","problem":"This PR intentionally changes the product contract: enforcement should preserve caller streaming mode while still preventing premature final responses from being accepted or persisted.","risk":"Low to medium; semantics are deliberate and documented.","status":"merged","technical_background":"todoenforcer previously disabled streaming while open todo items existed so final compliance decisions happened before clients saw partial text.","title":"agent/extension/todoenforcer: preserve caller streaming mode","updated_at":"2026-06-26T01:55:00Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/2008"},{"approach":"New Gateway only registers explicit `tool.CallableTool`s, validates input/output JSON schema, rejects external schema refs, and routes guest calls through a stdio protocol. LocalRunner is documented as development-only unless already sandboxed.","author":"bytethm","behavior_impact":"Applications can expose an `execute_tool_code` tool for controlled Python glue code over a separate managed tool registry.","change_inventory":"Added codeact runtime/protocol/gateway tests, toolcode wrapper, docs, and runnable example.","ci_state":"162 checks pass; no unresolved review threads. GitHub mergeability was briefly UNKNOWN, then refreshed to MERGEABLE before merge.","design_assessment":"The host-side boundary is clear: guest code receives `call_tool` only, host tools stay allowlisted, and Go-side schema validation happens on both directions. Local execution still depends on caller-provided sandboxing, which is documented.","head_sha":"5ef868ac3519ed12910eab51d1af61c734909ba1","merge_commit":"e154ec86373d8b02aba2c5298e8f634456f578ab","merged_at":"2026-06-26T01:55:26Z","modules":"codeexecutor/codeact, tool/toolcode, docs and examples/codeact","number":2007,"outcome":"主线程用临时 detached worktree 阅读最终代码；xhigh 子审无发现；`LGTM` approve 后按 head `5ef868ac3519ed12910eab51d1af61c734909ba1` squash merge。","problem":"The PR adds a new orchestration surface; the main review risk is whether guest code can bypass host tool allowlists or leak host capabilities.","risk":"Medium by feature nature, but no concrete correctness/security blocker found in this diff.","status":"merged","technical_background":"CodeAct lets generated Python orchestrate a narrow set of host tools, which is useful for loops and data transformation across dependent tools but requires a strict capability boundary.","title":"codeexecutor: add tool code orchestration","updated_at":"2026-06-26T01:55:26Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/2007"}],"blocked":[{"author":"shanghai-Jerry","blockers":[{"kind":"changes_requested","summary":"只让 mysql/postgres/pgvector/sqlite 保留旧 memory_id，但 UpdateResult 契约和 redis/inmemory/mysqlvec/sqlitevec 仍按更新内容 rotate 到 newID。","url":"https://github.com/trpc-group/trpc-agent-go/pull/2020#pullrequestreview-4570243241"}],"ci_state":"162 checks pass; reviewDecision=CHANGES_REQUESTED.","head_sha":"a2aff0ab5055b13b2d0bb8d35a3b91a471ac7f09","modules":"memory UpdateMemory across SQL and vector backends","number":2020,"outcome":"未重复发评论；现有 Rememorio CHANGES_REQUESTED 仍有效。","risk":"High portable API contract risk.","status":"blocked","title":"fix: UpdateMemory keep original memory_id to avoid primary key conflict","updated_at":"2026-06-25T10:53:38Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/2020"},{"author":"Rememorio","blockers":[{"kind":"human_review","line":31,"path":"openclaw/internal/memoryfile/templates.go","summary":"Untouched prior default MEMORY.md may miss IsDefaultTemplate and inject template text as memory.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2018#discussion_r3471509724"}],"head_sha":"42c33bd105eb230eeb6d739e8f66aec72bd3056f","modules":"openclaw memory file template boundary","number":2018,"outcome":"checks 绿，但仍有 Flash-LHR live thread。","risk":"Medium.","status":"blocked","title":"openclaw: keep workflow guidance out of memory","updated_at":"2026-06-25T03:13:23Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/2018"},{"author":"shanghai-Jerry","blockers":[{"kind":"human_review","line":432,"path":"memory/mysqlvec/service.go","summary":"Need regression test for upsert/revive path; current sqlmock expectation would miss missing ON DUPLICATE KEY behavior.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2017#discussion_r3473749682"}],"head_sha":"b92dcb90b5110e7549385196353e002be7937cb9","modules":"memory/mysqlvec rotateMemory soft delete path","number":2017,"outcome":"checks 绿，但仍有 live thread 要求回归测试。","risk":"Medium.","status":"blocked","title":"fix: use UPDATE instead of DELETE for soft delete in rotateMemory","updated_at":"2026-06-25T10:42:06Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/2017"},{"author":"Flash-LHR","blockers":[{"kind":"human_review","line":20,"path":"docs/design/debuglog-plugin.md","summary":"Deletion removes the only warning that DebugLog does not redact/truncate/allow-list sensitive payloads.","url":"https://github.com/trpc-group/trpc-agent-go/pull/1991#discussion_r3457534571"}],"head_sha":"7f4c4813b847c840b0ae23ce93f55a3a7e9f53b3","modules":"docs/design/debuglog-plugin.md deletion","number":1991,"outcome":"checks 绿，但 existing WineChord warning-removal blocker remains live。","risk":"Medium.","status":"blocked","title":"docs/design: remove debuglog plugin design doc","updated_at":"2026-06-23T06:33:50Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/1991"},{"author":"liuzengh","blockers":[{"kind":"human_review","line":850,"path":"internal/flow/processor/functioncall.go","summary":"Prefixed agentic-filter tool such as docs_knowledge_search_with_agentic_filter still stays unmarked.","url":"https://github.com/trpc-group/trpc-agent-go/pull/1988#discussion_r3457535185"}],"head_sha":"1ca4625fb71d6564f391bc18b7c2140e1308ef7d","modules":"memory pollution guard after knowledge search","number":1988,"outcome":"reviewDecision=APPROVED 但 thread audit 有 5 个未解决 thread，不能合。","risk":"High for prefixed agentic-filter tools.","status":"blocked","title":"memory: guard auto extraction after external context","updated_at":"2026-06-23T06:33:55Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/1988"},{"author":"liuzengh","blockers":[{"kind":"human_review","line":449,"path":"openclaw/internal/octool/tools.go","summary":"Sandbox exec_command path bypasses host command safety policy/output redactor.","url":"https://github.com/trpc-group/trpc-agent-go/pull/1977#discussion_r3459659639"},{"kind":"human_review","line":2315,"path":"openclaw/app/run_options.go","summary":"Rejects existing type none/local configs instead of keeping legacy aliases.","url":"https://github.com/trpc-group/trpc-agent-go/pull/1977#discussion_r3459659646"}],"head_sha":"479b2653ac72fa469b598778289fde0870771e4f","modules":"openclaw admin code executor config","number":1977,"outcome":"checks 绿，但仍有多条 live blocker，包括 sandbox output policy/redaction 和 legacy config parsing。","risk":"High security/config compatibility risk.","status":"blocked","title":"openclaw: expose code executor admin config","updated_at":"2026-06-23T12:22:46Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/1977"},{"author":"123456wda","blockers":[{"kind":"human_review","line":45,"path":"model/http_client.go","summary":"http.Client.Timeout applies to entire streaming response body and can break long-running SSE streams.","url":"https://github.com/trpc-group/trpc-agent-go/pull/1930#discussion_r3380844076"}],"head_sha":"576b11d6d1f4d19f85c04bbc1c27220251cc4d89","modules":"model/http_client.go default timeout","number":1930,"outcome":"checks 绿，但 CHANGES_REQUESTED/live thread remains。","risk":"High for streaming clients.","status":"blocked","title":"fix: set default HTTP client timeout to prevent goroutine leaks","updated_at":"2026-06-09T13:09:32Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/1930"},{"author":"sks","blockers":[{"kind":"human_review","line":813,"path":"model/gemini/gemini.go","summary":"skip_thought_signature_validator is stamped onto every unsigned tool call, including normal Gemini parallel calls where only first call needs signature.","url":"https://github.com/trpc-group/trpc-agent-go/pull/1894#discussion_r3338538122"}],"head_sha":"a928ff171bd312427af7ad098715311d9bb5823f","modules":"model/gemini tool-call signature handling","number":1894,"outcome":"checks 绿，但 existing WineChord blocker remains。","risk":"High provider semantics risk.","status":"blocked","title":"fix(model/gemini): inject skip validator for cross-provider function calls","updated_at":"2026-06-02T03:40:38Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/1894"}],"commented":[{"approach":"本轮发 inline comment，要求区分 operator-provisioned 完整表和 init 半成品表，或者对 init 创建过的表缺失 UNIQUE index 直接失败。","author":"hyprh","behavior_impact":"当前实现可能让服务在缺少唯一索引时启动，导致重复 active session/state rows。","ci_state":"160 checks pass; blocked by new review finding.","design_assessment":"跳过 live-table DDL 的方向合理，但不能让缺失唯一约束的 session/state 表继续服务。","head_sha":"22fba425d7e631be52bfb7c20c4e8083fb2f3c07","inline_comments":[{"body":"Please do not treat every existing table as operator-provisioned. If a previous bootstrap created the table and then failed while creating a UNIQUE index, the next startup takes this skip path, `verifySchema` only logs the missing index, and the service can run without the uniqueness constraints that session/state writes rely on. Please track/retry incomplete bootstrap tables or make missing UNIQUE indexes fatal for tables created by init.\n\n<details><summary>中文<\/summary>\n这里把“运维预置的完整表”和“上次 init 建表成功但建唯一索引失败留下的半成品表”混在一起了。后者下次启动会跳过索引 DDL，而唯一索引缺失只打 ERROR 日志不阻止启动，可能让 session/app/user state 在缺少唯一约束时继续写入。请让 init 能识别并重试/阻断这种未完成的 bootstrap 状态，或者对 init 创建过的表缺少 UNIQUE index 直接失败。\n<\/details>","focus":"incomplete MySQL bootstrap state","line":559,"path":"session/mysql/init.go","severity":"P1","url":"https://github.com/trpc-group/trpc-agent-go/pull/2022#discussion_r3478740281"}],"modules":"session/mysql init schema bootstrap","number":2022,"outcome":"xhigh 子审发现半成品表问题；主线程核对注释和 line 559 后发 inline comment，未 approve。","problem":"The skip path also covers a table left behind by a previous failed first-time bootstrap, where CREATE TABLE succeeded but UNIQUE index creation failed.","review":{"url":"https://github.com/trpc-group/trpc-agent-go/pull/2022#pullrequestreview-4576241266"},"risk":"High for correctness when bootstrap partially fails.","status":"commented","technical_background":"MySQL session init now skips all DDL when a table already exists, so runtime accounts without INDEX privilege can start against operator-provisioned schemas.","title":"session/mysql: skip schema DDL for pre-existing tables on init","updated_at":"2026-06-26T02:01:55Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/2022"},{"approach":"本轮发总括 inline comment，要求复用 runner/bestofn 已采用的对齐方式，把 SDK 模块同步到相同 release train。","author":"Rememorio","behavior_impact":"构建虽然通过，但遥测 API/SDK 可能因为版本族不一致产生运行时或未来升级风险。","ci_state":"162 checks pass; blocked by dependency consistency finding.","design_assessment":"安全依赖更新本身方向正确，但混用 OTel release train 会留下兼容性漂移风险。","head_sha":"4ee834fae53c53efaf371ca7fdb5f079a84aa1a9","inline_comments":[{"body":"Please bump the OTel SDK modules to `v1.41.0` wherever this PR moves the surrounding `go.opentelemetry.io/otel`, `otel/metric`, or `otel/trace` modules to `v1.41.0`. This file still leaves `otel/sdk` on `v1.40.0`, and the same mismatch remains in `examples/go.mod`, `examples/google/go.mod`, `examples/knowledge/go.mod`, `examples/provider/go.mod`, `examples/tailor/go.mod`, `model/provider/go.mod`, `openclaw/go.mod`, `server/evaluation/go.mod`, and `server/promptiter/go.mod`. `runner/bestofn` already fixed the same drift by moving SDK to `v1.41.0`; please apply that consistently. Also align `session/clickhouse/go.mod` by moving `otel/sdk` from `v1.34.0` to the `v1.35.0` release train used by its OTel API modules.\n\n<details><summary>中文<\/summary>\n这些模块本次把 OTel API/metric/trace 升到了 `v1.41.0`，但 SDK 仍停在 `v1.40.0`；`runner/bestofn` 已经按同类问题修到 `v1.41.0`，这里也需要同步，否则依赖更新后仍残留 OpenTelemetry 版本族不一致。另一个同类点是 `session/clickhouse/go.mod`：API/metric/trace 是 `v1.35.0`，SDK 仍是 `v1.34.0`，也需要对齐。\n<\/details>","focus":"OpenTelemetry SDK release train alignment","line":65,"path":"evaluation/go.mod","severity":"P2","url":"https://github.com/trpc-group/trpc-agent-go/pull/2021#discussion_r3478747986"}],"modules":"Go module dependency updates / OpenTelemetry stack","number":2021,"outcome":"xhigh 子审发现版本族漂移；主线程抽查 12 个 go.mod，确认 runner/bestofn 已修而其他模块未修后发 inline comment。","problem":"Several modules moved `otel`, `otel/metric`, or `otel/trace` to v1.41.0 while leaving `otel/sdk` or `otel/sdk/metric` at v1.40.0; session/clickhouse has the same pattern at v1.35.0 vs v1.34.0.","review":{"url":"https://github.com/trpc-group/trpc-agent-go/pull/2021#pullrequestreview-4576249545"},"risk":"Medium.","status":"commented","technical_background":"The PR updates many vulnerable/transitive dependencies across the multi-module tree. OpenTelemetry packages are versioned as a release train and should stay aligned within a module.","title":"build(deps): update vulnerable go dependencies","updated_at":"2026-06-26T02:05:16Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/2021"},{"approach":"本轮发 inline comment，要求把 async summary 的“不阻塞”和“避免重复昂贵摘要”改成带条件的说明，并同步中文文档。","author":"Rememorio","behavior_impact":"误导用户对 summary worker 的延迟和多实例/多进程去重能力产生错误预期。","ci_state":"162 checks pas let lang = "zh";

const statusOrder = ["approved", "commented", "maintained", "merged", "skipped", "blocked"];

function text(value, fallback = "") {
  if (value === undefined || value === null || value === "") return fallback;
  if (typeof value === "object" && !Array.isArray(value)) {
    return value[lang] || value.zh || value.en || fallback;
  }
  return String(value);
}

function escapeHtml(value) {
  return text(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatRich(value) {
  let html = escapeHtml(value);
  const replacements = [
    [
      /(P[0-2]|codecov\/patch=FAILURE|go-apidiff=FAILURE|go-apidiff|FAILURE|失败|阻塞|不能合入|不能 merge|未合并|破坏性|breaking|unbounded|无界|绕过|丢失|重复|不稳定|风险)/gi,
      "mark-bad"
    ],
    [
      /(LGTM|已合并|已批准|squash merge|merged|approved|CI 全绿|全绿|修复有效|\bresolved\b|\bresolve\b)/gi,
      "mark-good"
    ],
    [
      /(pending|soft[- ]?CI|软门禁|follow-up|后续|关注|CodeRabbit|reviewability ledger|not_reached)/gi,
      "mark-info"
    ],
    [
      /(导出 API|\bAPI\b|兼容性|\bsession\b|\brunner\b|\bmemory\b|GraphRAG|workspace_exec|OpenAPI|\bpolicy\b|security|安全)/gi,
      "mark-warn"
    ]
  ];
  for (const [pattern, className] of replacements) {
    html = html.replace(pattern, `<mark class="${className}">$1</mark>`);
  }
  return html;
}

function prs() {
  const groups = reportData.skipped_groups || [];
  const skipped = groups.flatMap(group =>
    (group.items || []).map(item => ({
      ...item,
      status: item.status || "skipped",
      skip_reason: item.skip_reason || group.reason
    }))
  );
  return [
    ...(reportData.approved || []),
    ...(reportData.commented || []),
    ...(reportData.maintained || []),
    ...(reportData.blocked || []),
    ...skipped
  ];
}

function skippedGroups() {
  return reportData.skipped_groups || [];
}

function counts(items) {
  const result = Object.fromEntries(statusOrder.map(status => [status, 0]));
  for (const item of items) {
    const status = item.status || "skipped";
    result[status] = (result[status] || 0) + 1;
  }
  return result;
}

  document.getElementById("search").placeholder = labels[lang].search;
  document.getElementById("openAll").textContent = labels[lang].expandAll;
  document.getElementById("closeAll").textContent = labels[lang].collapseAll;
  document.getElementById("footer").textContent = labels[lang].footer;
}

function renderMetrics(items) {
  const totalComments = items.reduce((sum, item) =>
    sum + ((item.inline_comments || []).length || item.comment_count || 0), 0);
  const followups = (reportData.follow_up || []).length;
  const reviewed = items.filter(item =>
    ["approved", "commented", "maintained", "merged", "blocked"].includes(item.status)
  ).length;
  const metricRows = [
    [labels[lang].total, items.length],
    [labels[lang].reviewed, reviewed],
    [labels[lang].approved, items.filter(item =>
      ["approved", "merged"].includes(item.status)).length],
    [labels[lang].comments, totalComments],
    [labels[lang].followups, followups]
  ];
  document.getElementById("metrics").innerHTML = metricRows.map(([label, value]) => `
    <div class="metric">
      <div class="value">${value}</div>
      <div class="label">${escapeHtml(label)}</div>
    </div>
  `).join("");
}

function renderBars(items) {
  const byStatus = counts(items);
  const maxCount = Math.max(1, ...Object.values(byStatus));
  document.getElementById("bars").innerHTML = statusOrder.map(status => {
    const value = byStatus[status] || 0;
    const width = Math.max(3, Math.round((value / maxCount) * 100));
    return `
      <div class="bar-row">
        <div class="bar-label">${labels[lang][status]}</div>
        <div class="bar-track"><div class="bar-fill ${status}" style="width:${width}%"></div></div>
        <strong>${value}</strong>
      </div>
    `;
  }).join("");
}

function renderTimeline() {
  const events = reportData.timeline || [];
  const container = document.getElementById("timeline");
  if (!events.length) {
    container.innerHTML = `<div class="empty">${labels[lang].empty}</div>`;
    return;
  }
  container.innerHTML = events.map(event => `
    <div class="timeline-item">
      <div class="time">${escapeHtml(event.time || "")}</div>
      <div>${escapeHtml(text(event.label || event.text || event))}</div>
    </div>
  `).join("");
}

function renderOverview() {
  const panel = document.getElementById("overviewPanel");
  const content = document.getElementById("overviewContent");
  const overview = reportData.overview || reportData.summary;
  const body = text(overview);
  if (!body) {
    panel.style.display = "none";
    content.textContent = "";
    return;
  }
  panel.style.display = "block";
  content.innerHTML = formatRich(body);
}

function renderChips() {
  const chipRows = ["all", ...statusOrder];
  document.getElementById("chips").innerHTML = chipRows.map(status => `
    <button type="button" class="chip ${filter === status ? "active" : ""}"
      data-filter="${status}">${labels[lang][status]}</button>
  `).join("");
  document.querySelectorAll("[data-filter]").forEach(button => {
    button.addEventListener("click", () => {
      filter = button.dataset.filter;
      renderCards();
      renderSkipGroups();
      renderFollowUp();
      renderChips();
    });
  });
}

function matchesSearch(item, query) {
  if (!query) return true;
  const haystack = [
    item.number,
    text(item.title),
    item.author,
    text(item.problem),
    text(item.approach),
    text(item.outcome),
    text(item.skip_reason),
    text(item.group_reason),
    text(item.readiness_audit),
    blockersSearchText(item.blockers),
    text(item.risk),
    text(item.ci_state)
  ].join(" ").toLowerCase();
  return haystack.includes(query.toLowerCase());
}

function blockersSearchText(blockers) {
  if (!Array.isArray(blockers)) return "";
  return blockers.map(blocker => {
    if (typeof blocker !== "object" || blocker === null) return text(blocker);
    return [
      blocker.kind,
      blocker.summary,
      blocker.reviewer,
      blocker.path,
      blocker.line,
      blocker.latest_response,
      blocker.verification,
      blocker.url
    ].map(value => text(value)).join(" ");
  }).join(" ");
}

function field(label, value) {
  const body = text(value);
  if (!body) return "";
  return `<div class="field"><strong>${label}</strong><div class="field-body">${formatRich(body)}</div></div>`;
}

function renderBlockers(item) {
  const blockers = Array.isArray(item.blockers) ? item.blockers : [];
  if (!blockers.length) return "";
  const rendered = blockers.map(blocker => {
    const data = typeof blocker === "object" && blocker !== null
      ? blocker
      : { summary: blocker };
    const location = [data.path, data.line ? `:${data.line}` : ""].filter(Boolean).join("");
    const meta = [
      data.kind ? blockerKindLabel(data.kind) : "",
      data.reviewer ? `reviewer: ${text(data.reviewer)}` : "",
      location,
      data.latest_response ? `latest: ${text(data.latest_response)}` : "",
      data.verification ? text(data.verification) : ""
    ].filter(Boolean).join(" · ");
    const summary = formatRich(data.summary || blocker);
    const link = data.url
      ? ` <a href="${escapeHtml(data.url)}">link</a>`
      : "";
    return `<li class="blocker-item"><div>${summary}${link}</div>${meta ? `<div class="blocker-meta">${escapeHtml(meta)}</div>` : ""}</li>`;
  }).join("");
  return `<div class="skip-detail"><strong>${labels[lang].blockerDetails}:</strong></div><ul class="blocker-list">${rendered}</ul>`;
}

function blockerKindLabel(kind) {
  return (labels[lang].blockerKinds || {})[kind] || text(kind);
}

function inlineCommentText(comment) {
  if (comment === undefined || comment === null) return "";
  if (typeof comment !== "object" || Array.isArray(comment)) {
    return text(comment);
  }
  return text(comment.body || comment.summary || comment.message || "");
}

function allPrText(item) {
  const comments = (item.inline_comments || []).map(comment => [
    comment.severity,
    comment.focus,
    comment.body,
    comment.summary,
    comment.path
  ].map(value => text(value)).join(" ")).join(" ");
  const blockers = blockersSearchText(item.blockers);
  return [
    item.status,
    item.number,
    item.title,
    item.author,
    item.problem,
    item.approach,
    item.outcome,
    item.risk,
    item.ci_state,
    item.skip_reason,
    item.readiness_audit,
    item.modules,
    item.api_surface,
    comments,
    blockers
  ].map(value => text(value)).join(" ").toLowerCase();
}

function readingAdvice(item) {
  const status = item.status || "skipped";
  const comments = item.inline_comments || [];
  const blockers = item.blockers || [];
  const body = allPrText(item);
  const hasP1 = comments.some(comment =>
    /\bP[01]\b/i.test(text(comment.severity)) ||
    /\bP[01]\b/i.test(inlineCommentText(comment))
  );
  const hasCriticalRisk = hasP1 ||
    /(security|安全|bypass|绕过|breaking|破坏性|unbounded|无界|丢失|重复|不稳定|兼容|api|go-apidiff|failure|失败|不能 merge|不能合入|race|并发)/i.test(body);
  const highImpactFeature =
    /(add|new|新增|support|支持|agent|runner|session|memory|graphrag|knowledge|openapi|workspace_exec|policy|extension|tool|graph|api)/i.test(body);

  const copy = {
    critical: {
      icon: "🔥",
      zh: "重点精读",
      en: "Deep Read",
      reasonZh: comments.length
        ? `有 ${comments.length} 条行级评论，且包含 P1/兼容/正确性/安全类风险。`
        : "包含高风险兼容性或正确性信号，需要重点复核。",
      reasonEn: comments.length
        ? `${comments.length} inline comment(s), including P1, compatibility, correctness, or security risk.`
        : "High-risk compatibility or correctness signal; review carefully."
    },
    focus: {
      icon: "🔎",
      zh: "建议细看",
      en: "Read Carefully",
      reasonZh: comments.length
        ? `有 ${comments.length} 条评论或重要设计取舍，建议看完整结论。`
        : "涉及核心模块、导出 API 或较大功能，建议细看。",
      reasonEn: comments.length
        ? `${comments.length} comment(s) or important design tradeoffs; read the full conclusion.`
        : "Core module, exported API, or larger feature; read carefully."
    },
    skim: {
      icon: "✅",
      zh: "快速略看",
      en: "Quick Skim",
      reasonZh: "风险低或改动较直接，扫结论和 CI 状态即可。",
      reasonEn: "Low risk or straightforward change; skim outcome and CI state."
    },
    follow: {
      icon: "⏳",
      zh: "只看阻塞",
      en: "Blocker Only",
      reasonZh: blockers.length
        ? `主要看 ${blockers.length} 个具体阻塞点，暂不需要读完整实现。`
        : "当前不是可合并状态，先看阻塞和后续动作。",
      reasonEn: blockers.length
        ? `Focus on ${blockers.length} concrete blocker(s); no need to read the full implementation yet.`
        : "Not merge-ready; focus on blockers and next action."
    }
  };

  let level = "skim";
  if (status === "blocked") {
    level = "follow";
  } else if (status === "commented") {
    level = hasCriticalRisk ? "critical" : "focus";
  } else if (status === "maintained") {
    level = hasCriticalRisk || highImpactFeature ? "focus" : "skim";
  } else if (status === "approved") {
    level = hasCriticalRisk || highImpactFeature ? "focus" : "skim";
  } else if (status === "merged") {
    level = highImpactFeature || hasCriticalRisk ? "focus" : "skim";
  } else if (status === "skipped") {
    level = blockers.length || /(conflict|ci|failure|失败|未回应|review)/i.test(body)
      ? "follow"
      : "skim";
  }

  const selected = copy[level];
  return {
    level,
    icon: selected.icon,
    label: lang === "zh" ? selected.zh : selected.en,
    reason: lang === "zh" ? selected.reasonZh : selected.reasonEn
  };
}

function priorityRank(level) {
  return { critical: 4, focus: 3, follow: 2, skim: 1 }[level] || 0;
}

function renderReadingGuide(items) {
  const panel = document.getElementById("readingGuidePanel");
  const container = document.getElementById("readingGuide");
  const candidates = [
    ...items.filter(item => (item.status || "skipped") !== "skipped"),
    ...(reportData.follow_up || []).map(item => ({ ...item, status: item.status || "blocked" }))
  ].map(item => ({ item, advice: readingAdvice(item) }))
    .filter(entry => entry.advice.level !== "skim")
    .sort((left, right) => priorityRank(right.advice.level) - priorityRank(left.advice.level));

  if (!candidates.length) {
    panel.style.display = "none";
    container.innerHTML = "";
    return;
  }

  panel.style.display = "block";
  container.innerHTML = candidates.slice(0, 9).map(entry => {
    const item = entry.item;
    const advice = entry.advice;
    const prText = item.number ? `#${item.number}` : "PR";
    const prLink = item.url
      ? `<a href="${escapeHtml(item.url)}">${prText} · ${escapeHtml(text(item.title))}</a>`
      : `<span>${prText} · ${escapeHtml(text(item.title))}</span>`;
    return `
      <article class="guide-card ${advice.level}">
        <div class="guide-meta">
          <span class="read-pill ${advice.level}">${advice.icon} ${escapeHtml(advice.label)}</span>
          <span class="badge ${item.status || "skipped"}">${labels[lang][item.status] || item.status || labels[lang].skipped}</span>
        </div>
        <div>${prLink}</div>
        <div class="guide-reason">${escapeHtml(advice.reason)}</div>
      </article>
    `;
  }).join("");
}

function storyLine(label, value) {
  const body = text(value);
  if (!body) return "";
  return `
    <p class="story-line">
      <span class="story-label">${escapeHtml(label)}</span>
      <span class="story-text">${formatRich(body)}</span>
    </p>
  `;
}

function storyBlock(title, rows, className = "") {
  const body = rows.filter(Boolean).join("");
  if (!body) return "";
  const classes = ["story-block", className].filter(Boolean).join(" ");
  return `<section class="${classes}"><h4>${escapeHtml(title)}</h4>${body}</section>`;
}

function compactSummary(item) {
  const candidates = [
    item.outcome,
    item.skip_reason,
    item.reason,
    item.problem,
    item.design_assessment,
    item.risk
  ].map(value => text(value).trim()).filter(Boolean);
  return candidates[0] || labels[lang].summaryFallback;
}

function updateCardToggle(card) {
  const button = card.querySelector(".card-toggle");
  if (!button) return;
  const open = card.classList.contains("open");
  button.textContent = open ? labels[lang].collapseDetails : labels[lang].expandDetails;
  button.setAttribute("aria-expanded", open ? "true" : "false");
}

function setCardOpen(card, open) {
  card.classList.toggle("open", open);
  updateCardToggle(card);
}

function factItem(label, value) {
  const body = text(value);
  if (!body) return "";
  return `
    <div class="fact">
      <dt>${escapeHtml(label)}</dt>
      <dd>${formatRich(body)}</dd>
    </div>
  `;
}

function directFixesText(fixes) {
  if (!Array.isArray(fixes) || !fixes.length) return "";
  return fixes.map(fix => {
    if (typeof fix !== "object" || fix === null) return text(fix);
    return [
      fix.branch ? `branch: ${text(fix.branch)}` : "",
      fix.commit ? `commit: ${text(fix.commit)}` : "",
      fix.message ? `message: ${text(fix.message)}` : "",
      fix.files ? `files: ${Array.isArray(fix.files) ? fix.files.map(file => text(file)).join(", ") : text(fix.files)}` : "",
      fix.tests ? `tests: ${Array.isArray(fix.tests) ? fix.tests.map(test => text(test)).join(", ") : text(fix.tests)}` : "",
      fix.push_state ? `push: ${text(fix.push_state)}` : "",
      fix.ci_state ? `CI: ${text(fix.ci_state)}` : ""
    ].filter(Boolean).join(" · ");
  }).join("\n");
}

function renderReviewRail(item) {
  const advice = readingAdvice(item);
  const callout = `
    <div class="reading-callout ${advice.level}">
      <strong>${advice.icon} ${escapeHtml(advice.label)}</strong>
      <span>${escapeHtml(advice.reason)}</span>
    </div>
  `;
  const facts = [
    factItem(labels[lang].outcome, item.outcome),
    factItem(labels[lang].risk, item.risk),
    factItem(labels[lang].ci, item.ci_state),
    factItem(labels[lang].attentionPoints, item.attention_points),
    factItem(labels[lang].directFixes, directFixesText(item.direct_fixes)),
    factItem(labels[lang].selfReviewPolicy, item.self_review_policy),
    factItem(labels[lang].testsDocs, item.tests_docs),
    factItem(labels[lang].modules, item.modules),
    factItem(labels[lang].apiSurface, item.api_surface),
    factItem(labels[lang].reason, item.skip_reason)
  ].filter(Boolean).join("");
  if (!facts) return `<aside class="review-rail">${callout}</aside>`;
  return `<aside class="review-rail">${callout}<h4>${labels[lang].reviewSummary}</h4><dl class="fact-list">${facts}</dl></aside>`;
}

function renderComments(item) {
  const comments = item.inline_comments || [];
  if (!comments.length) return "";
  const rendered = comments.map(comment => {
    const data = typeof comment === "object" && comment !== null && !Array.isArray(comment)
      ? comment
      : { body: comment };
    const location = `${escapeHtml(data.path || "")}${data.line ? ":" + escapeHtml(data.line) : ""}`;
    const source = data.url
      ? `<a class="comment-link" href="${escapeHtml(data.url)}">GitHub</a>`
      : "";
    return `
      <div class="comment">
        <div class="comment-head">
          <strong>${location}</strong>
          ${source}
        </div>
        <div>${formatRich(inlineCommentText(data))}</div>
        ${data.focus ? `<div><strong>${labels[lang].focus}:</strong> ${escapeHtml(text(data.focus))}</div>` : ""}
        ${data.severity ? `<div><strong>${labels[lang].severity}:</strong> ${escapeHtml(text(data.severity))}</div>` : ""}
      </div>
    `;
  }).join("");
  return `<section class="comments-panel">
    <h4>${labels[lang].inlineComments}</h4>
    <div class="comment-list">${rendered}</div>
  </section>`;
}

function renderPrReadout(item) {
  const story = [
    storyBlock(labels[lang].backgroundAndProblem, [
      storyLine(labels[lang].technicalBackground, item.technical_background),
      storyLine(labels[lang].problem, item.problem),
      storyLine(labels[lang].problemFraming, item.problem_framing),
      storyLine(labels[lang].rootCause, item.root_cause)
    ], "hero-block"),
    storyBlock(labels[lang].solutionAndTradeoffs, [
      storyLine(labels[lang].approach, item.approach),
      storyLine(labels[lang].alternativeDesigns, item.alternative_designs),
      storyLine(labels[lang].tradeoffs, item.tradeoffs),
      storyLine(labels[lang].designAssessment, item.design_assessment)
    ]),
    storyBlock(labels[lang].impactAndEvidence, [
      storyLine(labels[lang].changeInventory, item.change_inventory),
      storyLine(labels[lang].semanticChanges, item.semantic_changes),
      storyLine(labels[lang].behaviorImpact, item.behavior_impact),
      storyLine(labels[lang].moduleImpact, item.module_impact),
      storyLine(labels[lang].crossModuleImpact, item.cross_module_impact)
    ]),
    renderComments(item)
  ].filter(Boolean).join("");
  return `<div class="pr-readout"><div class="pr-story">${story}</div>${renderReviewRail(item)}</div>`;
}

function renderCards() {
  const query = document.getElementById("search").value.trim();
  const visible = prs().filter(item => (item.status || "skipped") !== "skipped")
    .filter(item => {
    const status = item.status || "skipped";
    return (filter === "all" || status === filter) && matchesSearch(item, query);
  });
  const container = document.getElementById("cards");
  if (!visible.length) {
    container.innerHTML = `<div class="empty">${labels[lang].empty}</div>`;
    return;
  }
  container.innerHTML = visible.map(item => {
    const status = item.status || "skipped";
    const advice = readingAdvice(item);
    const summary = compactSummary(item);
    const prText = item.number ? `#${item.number}` : "PR";
    const prLink = item.url
      ? `<a href="${escapeHtml(item.url)}">${prText}</a>`
      : prText;
    return `
      <article class="card priority-${advice.level}" data-status="${status}">
        <div class="card-head">
          <div>
            <div class="headline-row">
              <h3 class="card-title">${prLink} · ${escapeHtml(text(item.title))}</h3>
              <span class="read-pill ${advice.level}">${advice.icon} ${escapeHtml(advice.label)}</span>
            </div>
            <div class="meta">
              <span>${labels[lang].author}: ${escapeHtml(item.author || "")}</span>
              <span class="advice-reason">${escapeHtml(advice.reason)}</span>
            </div>
            <div class="card-summary">${formatRich(summary)}</div>
          </div>
          <div class="card-actions">
            <span class="badge ${status}">${labels[lang][status] || status}</span>
            <button class="card-toggle" type="button" aria-expanded="false">${labels[lang].expandDetails}</button>
          </div>
        </div>
        <div class="card-body">
          ${renderPrReadout(item)}
        </div>
      </article>
    `;
  }).join("");
  document.querySelectorAll(".card-head").forEach(head => {
    head.addEventListener("click", event => {
      if (event.target.closest("a")) return;
      const card = head.closest(".card");
      setCardOpen(card, !card.classList.contains("open"));
    });
  });
  document.querySelectorAll(".card").forEach(card => updateCardToggle(card));
}

function renderSkipGroups() {
  const heading = document.getElementById("skippedHeading");
  const container = document.getElementById("skipGroups");
  if (!["all", "skipped"].includes(filter)) {
    heading.style.display = "none";
    container.style.display = "none";
    return;
  }
  heading.style.display = "flex";
  container.style.display = "grid";
  const query = document.getElementById("search").value.trim();
  const groups = skippedGroups().map(group => {
    const reason = group.reason || "";
    const items = (group.items || []).map(item => ({
      ...item,
      status: item.status || "skipped",
      group_reason: reason,
      skip_reason: item.skip_reason || reason
    })).filter(item => matchesSearch(item, query));
    return { reason, items };
  }).filter(group => group.items.length > 0);
  if (!groups.length) {
    container.innerHTML = `<div class="empty">${labels[lang].empty}</div>`;
    return;
  }
  container.innerHTML = groups.map((group, index) => `
    <article class="skip-group open">
      <div class="skip-group-head" data-skip-group="${index}">
        <h3 class="skip-group-title">${escapeHtml(text(group.reason))}</h3>
        <span class="skip-group-count">${group.items.length} ${labels[lang].items}</span>
      </div>
      <div class="skip-group-body">
        ${group.items.map(item => {
          const prText = item.number ? `#${item.number}` : "PR";
          const prLink = item.url
            ? `<a href="${escapeHtml(item.url)}">${prText}</a>`
            : prText;
          return `
            <div class="skip-row">
              <div>
                <div class="skip-title">${prLink} · ${escapeHtml(text(item.title))}</div>
                <div class="skip-detail">${labels[lang].author}: ${escapeHtml(item.author || "")}</div>
              </div>
              <div>
                <div><strong>${labels[lang].blocker}:</strong> ${formatRich(text(item.skip_reason))}</div>
                ${item.readiness_audit ? `<div class="skip-detail"><strong>${labels[lang].readinessAudit}:</strong> ${formatRich(text(item.readiness_audit))}</div>` : ""}
                ${renderBlockers(item)}
                ${item.ci_state ? `<div class="skip-detail">${formatRich(text(item.ci_state))}</div>` : ""}
                ${item.risk ? `<div class="skip-detail">${formatRich(text(item.risk))}</div>` : ""}
              </div>
            </div>
          `;
        }).join("")}
      </div>
    </article>
  `).join("");
  document.querySelectorAll("[data-skip-group]").forEach(head => {
    head.addEventListener("click", () => {
      head.closest(".skip-group").classList.toggle("open");
    });
  });
}

function renderFollowUp() {
  const heading = document.getElementById("followUpHeading");
  const container = document.getElementById("followUpCards");
  if (!["all", "skipped", "blocked"].includes(filter)) {
    heading.style.display = "none";
    container.style.display = "none";
    return;
  }
  const query = document.getElementById("search").value.trim().toLowerCase();
  const items = (reportData.follow_up || []).filter(item => {
    if (!query) return true;
    return [
      item.number,
      item.author,
      text(item.title),
      text(item.reason),
      text(item.next)
    ].join(" ").toLowerCase().includes(query);
  });
  if (!items.length) {
    heading.style.display = "none";
    container.style.display = "none";
    return;
  }
  heading.style.display = "flex";
  container.style.display = "grid";
  container.innerHTML = items.map(item => {
    const prText = item.number ? `#${item.number}` : "PR";
    const prLink = item.url
      ? `<a href="${escapeHtml(item.url)}">${prText}</a>`
      : prText;
    return `
      <article class="card open" data-status="blocked">
        <div class="card-head">
          <div>
            <h3 class="card-title">${prLink} · ${escapeHtml(text(item.title))}</h3>
            <div class="meta">${labels[lang].author}: ${escapeHtml(item.author || "")}</div>
          </div>
          <span class="badge blocked">${labels[lang].followups}</span>
        </div>
        <div class="card-body">
          <div class="grid">
            ${field(labels[lang].reason, item.reason)}
            ${field(labels[lang].outcome, item.next)}
          </div>
        </div>
      </article>
    `;
  }).join("");
}

function render() {
  const items = prs();
  renderStatic();
  renderMetrics(items);
  renderBars(items);
  renderTimeline();
  renderOverview();
  renderReadingGuide(items);
  renderChips();
  renderCards();
  renderSkipGroups();
  renderFollowUp();
}

document.querySelectorAll("[data-lang-button]").forEach(button => {
  button.addEventListener("click", () => setLanguage(button.dataset.langButton));
});
document.getElementById("search").addEventListener("input", () => {
  renderCards();
  renderSkipGroups();
  renderFollowUp();
});
document.getElementById("openAll").addEventListener("click", () => {
  document.querySelectorAll(".card").forEach(card => setCardOpen(card, true));
  document.querySelectorAll(".skip-group").forEach(node => node.classList.add("open"));
});
document.getElementById("closeAll").addEventListener("click", () => {
  document.querySelectorAll(".card").forEach(card => setCardOpen(card, false));
  document.querySelectorAll(".skip-group").forEach(node => node.classList.remove("open"));
});
render();
</script>
</body>
</html>
