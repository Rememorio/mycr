<body>
<div class="shell">
  <div class="topbar">

      <h1 data-i18n="title">MyCR 审核报告</h1>

    <div class="toggle" aria-label="Language">

      <button type="button" data-lang-button="en">EN</button>

  <section class="dashboard">
    <div class="panel">
      <h2 data-i18n="statusDistribution">状态分布</h2>

    </div>
    <div class="panel">

    <div class="utilities">
      <button type="button" class="utility-button" id="openAll"></button>
      <button type="button" class="utility-button" id="closeAll"></button>
    </div>
  </section>
  <section class="section-heading">
    <h2 data-i18n="reviewedSection">已处理 PR</h2>

  </section>
  <main class="cards" id="cards"></main>
  <section class="section-heading" id="skippedHeading">
    <h2 data-i18n="skippedGroups">未审核 PR 分类</h2>
    <div class="hint" data-i18n="skippedHint">按排除原因分组</div>
  </section>
  <section class="skip-groups" id="skipGroups"></section>
  <section class="section-heading" id="followUpHeading">
    <h2 data-i18n="followUpSection">后续关注</h2>
    <div class="hint" data-i18n="followUpHint">接近可处理但仍有阻塞</div>

  <section class="cards" id="followUpCards"></section>
  <div class="footer" id="footer"></div>
</div>
<script>
const reportData = {"approved":[{"alternative_designs":"也可以在 session 写入时压缩，或只依赖 summary。当前方案把压缩限制在 prompt 投影层，保留原始事件，便于审计和后续重放。","api_surface":"新增/扩展 LLMAgent context compaction options，用户可配置工具结果 token 阈值、最近请求保留数量、oversized tool result 处理等；文档新增对应使用说明。","approach":"在 LLMAgent options 中接入工具结果 compaction 控制，processor 在构造模型消息时识别工具调用/工具结果关系，按规则压缩历史或 oversized 工具结果；示例展示真实模型请求前后的消息形态。","attention_points":"后续仍需观察不同 provider 对压缩占位消息的容忍度。","author":"Rememorio","behavior_impact":"启用后，大型历史工具输出不会继续完整挤占上下文；模型仍能看到必要的工具调用结构和最近结果。","change_inventory":"新增 tool result compaction 规则、processor 测试、LLMAgent option 测试、context_compaction 示例和中英文文档。","ci_state":"最终复核所有 checks 绿色；head f4a380d9；mergedAt 2026-05-26T05:09:22Z。","cross_module_impact":"与 tool call/result pairing、session timeline filter、LLMAgent option wiring、示例和文档协同。","design_assessment":"本轮复核认为设计合理。作者已修掉此前工具名推断复用 ToolID 的风险，最终 head 不再依赖不可靠的反推名称。","module_impact":"直接影响模型请求构造；间接影响所有使用长工具结果、session summary、context compaction 的 agent。","modules":"agent/llmagent；internal/flow/processor；examples/context_compaction；docs/mkdocs/en|zh/session/summary.md。","number":1843,"outcome":"xhigh 子审查无 findings；最终复核 CI 全绿、无 unresolved threads；已提交 LGTM，并由 WineChord squash merge。","problem":"PR 为 prompt-side tool result compaction 增加按工具名和最近事件数量控制的能力，并补充示例与文档，解决大工具结果占用上下文、但用户又需要保留最近交互细节的问题。","problem_framing":"根因不是 session 存储太大，而是模型请求投影缺少足够细的压缩策略：有些工具结果必须完整保留，有些历史结果只需要占位或截断。","risk":"剩余风险低，主要在复杂多工具并发场景下继续观察。","root_cause":"旧的 compaction 控制粒度不足，无法按工具名和最近请求边界表达“哪些工具可压缩、哪些最近事件保留”。","semantic_changes":"历史工具结果在发送给模型前可能被占位或截断；session 原始事件不变。最近请求和当前请求可按配置保留完整内容。","status":"merged","technical_background":"LLMAgent 会把历史事件转换成发给模型的消息。工具结果经常很长，如果完整保留在 prompt 中，会快速耗尽上下文窗口。context compaction 的目标是在不改变 session 原始事件的前提下，只在请求投影阶段压缩历史工具结果。","tests_docs":"子审查关注 compaction 顺序、recent-event 保护、tool ID/name 传播、provider-facing message shape；相关测试和 docs 覆盖充分。","title":"agent: add tool result compaction controls","tradeoffs":"投影层压缩兼容性更好，但实现必须准确维护 tool call ID、tool name 和 timeline filter，否则会压错工具结果或破坏模型可解释上下文。","url":"https://github.com/trpc-group/trpc-agent-go/pull/1843"},{"alternative_designs":"也可以持久化所有 partial delta，或完全不保存取消输出。当前方案只保存用户可见的最终合成文本，噪音更少，也更贴近 session 语义。","api_surface":"新增/调整 runner run option 行为：可 opt-in 持久化 interrupted assistant。文档说明取消后可保留可见 assistant 文本。","approach":"新增 interrupted assistant accumulator，按 request/invocation/lineage 缓冲 assistant content；取消后用 bounded persist context 合成 event；作者后续修复为按 lineage 去重并通过 handleEventPersistence 写入，以保留 summary enqueue 等副作用。","attention_points":"codecov/patch 仍失败，说明 patch 覆盖率门禁未满足；按规则可 approve 但不能 merge。","author":"Rememorio","behavior_impact":"用户取消长回答后，下一轮仍能看到已经输出的 assistant 内容，而不是像回答从未发生。","change_inventory":"新增 interrupted assistant buffer、lineage key、去重 helper、取消后持久化路径和大量 runner 测试。","ci_state":"最终复核除 codecov/patch=FAILURE 外均绿色；mergeable=MERGEABLE；reviewDecision=APPROVED。","cross_module_impact":"与 agent invocation lineage、session service AppendEvent、summary enqueue、stream filter 和文档协同。","design_assessment":"本轮初审发现 lineage 去重和 summary enqueue 两个问题，作者推新 head 后已修复。当前设计可接受，但 codecov/patch 仍未绿。","inline_comments":[{"body":"These prior-response maps are collected for the whole session, while the interrupted buffers are now keyed by lineage. If a sibling branch has already persisted the same provider response ID or same request/invocation/content signature, this branch can be skipped even though its accumulator key is different; please scope the prior-event dedupe to the same lineage fields used by `interruptedAssistantLineageKey`.\n<details><summary>中文<\/summary>\n这里的已持久化 response map 是按整个 session 收集的，但 interrupted buffer 已经按 lineage 分桶。如果兄弟分支已经持久化过相同 provider response ID 或相同 request/invocation/content signature，这个分支会被跳过，即使它的 accumulator key 实际不同；建议把 prior-event 去重也限定到 `interruptedAssistantLineageKey` 使用的同一组 lineage 字段。\n<\/details>","focus":"lineage-scoped dedupe","line":1450,"path":"runner/runner.go","severity":"P1"},{"body":"Interrupted assistant events are appended directly, so they bypass the normal `handleEventPersistence` side effects. In particular, a long cancelled assistant response can be persisted without `EnqueueSummaryJob`, leaving session summaries stale compared with normal final assistant messages; please persist through the same helper or duplicate the summarization enqueue after a successful append.\n<details><summary>中文<\/summary>\n中断合成的 assistant event 现在直接 append，绕过了普通 `handleEventPersistence` 的副作用。尤其是较长的取消回复会被写入 session，但不会触发 `EnqueueSummaryJob`，导致 session summary 相比普通最终 assistant 消息保持陈旧；建议走同一个持久化 helper，或在 append 成功后补齐 summary enqueue。\n<\/details>","focus":"summary side effects","line":1785,"path":"runner/runner.go","severity":"P1"}],"module_impact":"直接影响 runner 事件生命周期和 session persistence；间接影响 session summary、graph/routed child invocation、后续对话上下文。","modules":"runner/runner.go；runner/runner_test.go；agent/invocation.go；docs/mkdocs/en|zh/runner.md。","number":1820,"outcome":"本轮先发 2 条行级评论；作者推新 head c1d61e8d 修复后，threads 不再是当前 unresolved；已提交 LGTM，但因 codecov/patch 非绿未合并。","problem":"PR 让 interrupted streamed run 在取消后仍能把已可见的 assistant 文本合成为非 partial 事件写入 session，同时避免把 raw partial chunks、tool-call-only 或 reasoning-only delta 直接写入历史。","problem_framing":"根因是用户可见输出和 session 持久化边界不一致：流式 UI 已展示文本，但 session 只认 final assistant response。取消时没有 final event，就会造成下一轮上下文缺口。","risk":"主要残留风险是 patch coverage 未达门禁，需作者补测试或等待 Codecov 状态恢复后再合并。","root_cause":"旧 runner 没有专门的 interrupted assistant accumulator，也没有在取消后的独立 persist context 中收尾写入。","semantic_changes":"启用后，取消的流式 assistant 文本可能作为非 partial assistant event 进入 session；不启用时保留旧行为。","status":"approved","technical_background":"Runner 会把模型流式输出转换成事件并写入 session。取消或超时发生在 final assistant event 前时，用户已经看到的文本可能只存在于流式 delta 中；如果不合成最终 assistant message，下一轮上下文会丢失这段可见回答。","tests_docs":"作者补充 runner 覆盖；本轮复核新 head 确认 lineage prior maps 和 handleEventPersistence 修复已落地。","title":"runner: preserve interrupted assistant text","tradeoffs":"合成事件需要谨慎去重和处理 lineage；好处是下轮上下文与用户实际看到的内容一致。","url":"https://github.com/trpc-group/trpc-agent-go/pull/1820"}],"blocked":[],"commented":[{"alternative_designs":"也可以先做独立 examples，不引入导出 graph API；或保持 golang reader 旧 API 兼容并在下一版迁移。当前方案一次性建立完整 graph stack，能力强但 API/发布风险更高。","api_surface":"新增 GraphKnowledge、BuiltinGraphKnowledge、GraphSource、graph.Node/Edge/Path、graphstore.Store、图遍历/路径工具等；go-apidiff 报告 `knowledge/document/reader/golang.New` 与 `Reader` 被删除，属于破坏性变更。","approach":"新增 `knowledge/graph` 数据模型、`knowledge/source.GraphSource`、`knowledge.GraphKnowledge`、AGE store、RepoSource.ReadGraph 和 graph tools；go-apidiff 显示大量新增 API，同时删除了 golang reader 子模块的导出 `New` 和 `Reader`。","attention_points":"go-apidiff 仍失败；这不是 stale Changes Requested blocker，而是真实软门禁/兼容性风险。","author":"hyprh","behavior_impact":"agent 可以从代码搜索进入图遍历，回答调用链和路径关系；但未排序 LIMIT 会导致结果不稳定。","change_inventory":"新增 graph data model、AGE store、RepoSource.ReadGraph、code graph search/traverse/find_paths tools、测试和文档；拆分或调整 codeast/golang reader 子模块。","ci_state":"最终复核只有 go-apidiff=FAILURE；open human blockers 无，unresolved CodeRabbit threads 被记录为 bot advisory；本轮新增 WineChord threads 未解决。","cross_module_impact":"与 vectorstore/embedder、repo source、tool schema、docs、examples、AGE/PostgreSQL 连接均有关。","design_assessment":"方向有价值，但本轮发现两个必须修复的兼容性/正确性问题：nested module 依赖 root v0.2.0 会让外部消费者编译失败；AGE 变长路径 LIMIT 未排序会让图遍历和 path 结果不稳定。","inline_comments":[{"body":"These nested modules require the root module at `v0.2.0`, but external consumers do not see the local `replace` directives. The AGE store imports new packages such as `knowledge/graph` and `knowledge/graphstore`, and the Go reader imports the new codeast APIs, so `go get` of either submodule will resolve a root version that does not contain the symbols this PR depends on; please require a root version that contains these APIs or avoid publishing the split submodules until the release versions are consistent.","focus":"nested module version compatibility","line":12,"path":"knowledge/graphstore/age/go.mod","severity":"P1"},{"body":"These nested modules require the root module at `v0.2.0`, but external consumers do not see the local `replace` directives. The AGE store imports new packages such as `knowledge/graph` and `knowledge/graphstore`, and the Go reader imports the new codeast APIs, so `go get` of either submodule will resolve a root version that does not contain the symbols this PR depends on; please require a root version that contains these APIs or avoid publishing the split submodules until the release versions are consistent.","focus":"nested module version compatibility","line":9,"path":"knowledge/document/reader/golang/go.mod","severity":"P1"},{"body":"This `LIMIT` is applied to unordered variable-length path matches. AGE/Postgres can return any matching paths first, so `MaxNodes` may omit nearer nodes and the same query can produce unstable traversal context; please order by path distance before limiting, for example aggregate/min `length(p)` per node and apply the limit after that ordering.","focus":"graph traversal stability","line":294,"path":"knowledge/graphstore/age/age.go","severity":"P1"},{"body":"Path search also limits unordered variable-length matches, so `MaxPaths` can return a longer path while omitting a shorter/direct one. For GraphRAG callers this makes “find paths” semantics unstable; please order paths by `length(p)` before applying the `LIMIT`, e.g. `WITH p ORDER BY length(p) LIMIT ... RETURN ...`.","focus":"path search stability","line":428,"path":"knowledge/graphstore/age/age.go","severity":"P1"}],"module_impact":"直接影响 knowledge、source、tool、graphstore 和 Go reader 子模块；外部消费者受 nested module 版本影响。","modules":"knowledge/graph；knowledge/graphstore/age；knowledge/source/repo；knowledge/tool；knowledge/document/reader/golang；docs/mkdocs knowledge docs。","number":1731,"outcome":"本轮没有因 aggregate CHANGES_REQUESTED 跳过，已完成 xhigh review 并提交 4 条行级评论；未 approve、未合并。","problem":"PR 新增 graph-native knowledge 接口、RepoSource 的 Go AST 图读取、AGE graphstore、代码图搜索/遍历/路径工具，并把代码搜索从纯文档检索扩展为图结构检索。","problem_framing":"传统 RAG 只能按文本相似度召回片段，难以回答“这个函数被谁调用、两个符号怎么关联”这类结构化问题。根因是代码关系没有被建模为可查询图。","risk":"外部 `go get` nested module 可能失败；GraphRAG path/traverse 结果可能不稳定或漏掉更短路径。","root_cause":"现有 Knowledge/Source 以文档为中心，缺少 GraphSource、GraphKnowledge、graphstore.Store 这样的图抽象。","semantic_changes":"搜索结果可返回 graph node ID 并支持后续 traversal；路径查询和遍历会通过 AGE Cypher 执行。","status":"commented","technical_background":"GraphRAG 把代码符号、文件、调用关系等建成图，再结合向量检索让 agent 先找到相关代码节点，再沿调用/依赖边扩展上下文。AGE graphstore 是 PostgreSQL + Apache AGE 的图查询后端。","tests_docs":"PR 添加大量单测、AGE sqlmock 测试和文档；仍需补外部 nested module 消费者场景和路径排序回归。","title":"knowledge: add GraphRAG code search (reasonable breaking change)","tradeoffs":"完整 graph API 便于工具组合，但 nested module 版本和 go-apidiff 破坏性变更需要严格处理；AGE 查询还要保证路径排序稳定。","url":"https://github.com/trpc-group/trpc-agent-go/pull/1731"},{"alternative_designs":"更彻底的方案是不经 shell 直接 exec argv；也可以只在容器/网络层做隔离。当前方案保留 shell 可用性，但必须非常谨慎地封堵绕过形态。","api_surface":"新增 workspace exec allowed/denied commands 相关 options 和文档化行为；skill_run/LLMAgent 可配置命令策略。","approach":"新增 internal/shellsafe parser/policy，workspace_exec policy mode 改用更保守的 shell 启动方式并清理环境；LLMAgent option 和 skill_run 透传 allow/deny 配置。","attention_points":"CI 全绿但 review threads 未解决，不可 merge。","author":"bytethm","behavior_impact":"合法 allowlisted 命令可继续执行；wrapper/assignment/env 绕过应被拒绝。","change_inventory":"新增 shellsafe parser、policy tests、workspace_exec policy enforcement、env scrub、agent option wiring、docs。","ci_state":"最终复核 CI 绿色；mergeable=MERGEABLE；本轮 3 个 WineChord threads unresolved。","cross_module_impact":"与 codeexecutor/local CleanEnv、shellsafe parser、LLMAgent options、skill_run 工具声明协同。","design_assessment":"方向合理，但本轮仍发现 3 个边界绕过/过宽问题，不能 approve。","inline_comments":[{"body":"The policy scrub checks the raw JSON key, but the local runtime later serializes entries as `key=value`; a caller can send a key like `PATH=.` so the final env string is parsed as a real `PATH` entry. Please reject env keys containing `=` before copying them, otherwise policy mode can still inherit caller-controlled PATH/LD_* behavior through `CleanEnv`.","focus":"environment hardening bypass","line":739,"path":"tool/workspaceexec/workspace_exec.go","severity":"P1"},{"body":"`NAME+=value` is also treated as a leading assignment by the shells this path executes through, but `isLeadingAssignment` returns false as soon as it sees `+`. That lets `X+=1 curl http://x` pass policy as a command named `X+=1` while the shell still runs `curl`, so please reject the `NAME+=VALUE` form too.","focus":"shell assignment parsing","line":575,"path":"internal/shellsafe/parser_simple.go","severity":"P1"},{"body":"Allow matching is case-folded for every Darwin workspace based only on `GOOS`, but APFS can be case-sensitive. On those workspaces `WithAllowedCommands(\"./safe\")` also admits `./SAFE`, which may be a different file; keep pathful allow entries exact-case unless the workspace filesystem has been positively detected as case-insensitive.","focus":"allowlist case sensitivity","line":348,"path":"internal/shellsafe/parser.go","severity":"P2"}],"module_impact":"影响所有启用 workspace_exec/skill_run policy 的 agent 和示例。","modules":"internal/shellsafe；tool/workspaceexec；tool/skill；agent/llmagent；codeexecutor/local；docs/mkdocs/en|zh/codeexecutor.md。","number":1800,"outcome":"提交 3 条行级评论；未 approve、未合并。","problem":"PR 为 workspace_exec、skill_run 和 LLMAgent 增加命令 allow/deny policy，降低 sandboxed exec 被 prompt injection 或 wrapper 命令绕过的风险。","problem_framing":"问题不是简单的命令名单过滤，而是 shell 会解释 assignment、PATH、builtin、wrapper 和环境变量；安全边界必须覆盖“最终 shell 实际执行什么”。","risk":"当前 policy 仍可能被环境变量 key、assignment 语法或 case-sensitive Darwin workspace 绕过。","root_cause":"旧 workspace_exec 基本依赖 shell 执行，没有一层可配置且保守的 command policy。","semantic_changes":"policy active 时，部分 shell wrapper、危险语法、startup env 和 PATH 行为会被拒绝或清理。","status":"commented","technical_background":"workspace_exec 会把模型请求转成 shell 命令执行。allow/deny policy 是安全边界：它必须识别 shell 语法、环境变量、PATH 和 wrapper，避免模型或输入通过 shell 特性绕过命令限制。","tests_docs":"已有大量测试；本轮要求补 `=` env key、`NAME+=VALUE`、Darwin case-sensitive allow 的回归。","title":"{tool/workspaceexec, tool/skill, agent/llmagent}: add command allow/deny policy for sandboxed exec","tradeoffs":"兼容 shell 字符串调用较易落地，但安全边界复杂；相比直接 argv 执行更容易漏掉 shell 语义。","url":"https://github.com/trpc-group/trpc-agent-go/pull/1800"},{"alternative_designs":"可以只支持有索引的 MySQL/pgvector；当前方案覆盖面广，但每个 backend 都必须真正 bounded，否则能力看似统一、性能却不统一。","api_surface":"新增/实现 session.WindowService 和 EventWindowRequest/Entry 相关能力；session_load 工具提示按 backend capability 暴露。","approach":"新增 session/internal/window 共享裁剪逻辑，各 backend 实现 GetEventWindow，LLMAgent/processor 根据能力提供 on-demand session tools。","attention_points":"CI 全绿但本轮窗口性能/可靠性 comments 未解决。","author":"Rememorio","behavior_impact":"用户可要求按事件 ID 精确拉取局部上下文；但部分 backend 当前会因全量扫描导致大 session 仍慢或失败。","change_inventory":"新增多个 backend window.go 和测试；更新 recall load tool 类型和 prompt guidance。","ci_state":"最终复核 CI 绿色；mergeable=MERGEABLE；4 个 WineChord threads unresolved。","cross_module_impact":"LLMAgent prompt、processor on-demand overview、recall tools、session stores 和 docs 共同变化。","design_assessment":"抽象方向合理；但 Redis、SQLite、Postgres、ClickHouse 当前仍全量读取后裁剪，违背小窗口工具的性能和可靠性目标。","inline_comments":[{"body":"This still loads the Redis session through `getSessionInternal` before trimming the requested window, and the Redis event paths load the full history before `EventNum` is applied. A small `session_load` can therefore transfer and unmarshal an unbounded Redis session; please add a Redis-specific bounded lookup around the anchor instead of relying on `EventNum` after the full read.","focus":"unbounded Redis window load","line":50,"path":"session/redis/window.go","severity":"P1"},{"body":"These SQL-backed window loaders fetch and unmarshal every event after `sessionCreatedAt`, then apply the tiny `Before`/`After` window in memory. That makes a small `session_load` behave like a full-session scan and can fail on an unrelated malformed row outside the requested window; please locate the anchor first and fetch bounded before/after neighbor batches with the backend ordering key.","focus":"unbounded SQL window load","line":84,"path":"session/sqlite/window.go","severity":"P1"},{"body":"These SQL-backed window loaders fetch and unmarshal every event after `sessionCreatedAt`, then apply the tiny `Before`/`After` window in memory. That makes a small `session_load` behave like a full-session scan and can fail on an unrelated malformed row outside the requested window; please locate the anchor first and fetch bounded before/after neighbor batches with the backend ordering key.","focus":"unbounded SQL window load","line":91,"path":"session/postgres/window.go","severity":"P1"},{"body":"These SQL-backed window loaders fetch and unmarshal every event after `sessionCreatedAt`, then apply the tiny `Before`/`After` window in memory. That makes a small `session_load` behave like a full-session scan and can fail on an unrelated malformed row outside the requested window; please locate the anchor first and fetch bounded before/after neighbor batches with the backend ordering key.","focus":"unbounded SQL window load","line":87,"path":"session/clickhouse/window.go","severity":"P1"}],"module_impact":"直接影响 session backend 和 on-demand session tool 注入；间接影响长上下文恢复体验。","modules":"session/internal/window；session/inmemory/sqlite/mysql/postgres/redis/clickhouse；internal/session/tool/recall；agent/llmagent；processor docs。","number":1856,"outcome":"提交 4 条行级评论；未 approve、未合并。","problem":"PR 为 inmemory、sqlite、mysql、postgres、redis、clickhouse 等 session backend 增加共享 event window 语义，并按 backend capability 注入 session_load 工具。","problem_framing":"用户需要从长 session 中精确恢复局部上下文；根因是原 session recall/search 能力和 exact window loading 没有统一抽象。","risk":"Redis 和部分 SQL backend 的 session_load 仍可能扫描无界历史，甚至因窗口外坏行失败。","root_cause":"各 backend 缺少 portable WindowService；tool injection 对 load-only/search-only 能力区分不足。","semantic_changes":"支持通过 anchor event ID 加载 before/after 窗口；backend 无搜索能力时也能提供 load-only session recovery。","status":"commented","technical_back ion, so the adapter can re-scan and resend already captured messages with freshly synthesized timestamps; please persist the cursor through the session store or keep a successful service-level checkpoint keyed by session.","focus":"capture cursor persistence","line":233,"path":"memory/tencentdb/service.go","severity":"P1"}],"module_impact":"直接影响使用 TencentDB Agent Memory 的 runner；间接影响 session ingestion lifecycle 和 memory recall 上下文。","modules":"memory/tencentdb；examples/memory/tencentdb；docs/mkdocs/en|zh/memory.md。","number":1859,"outcome":"提交 2 条行级评论；未 approve、未合并。","problem":"PR 新增 TencentDB Agent Memory adapter：通过 session.Ingestor 捕获对话，通过 Runner plugin 注入 recall context，并暴露 TencentDB 原生搜索工具。","problem_framing":"用户需要把跨 session 的记忆接入外部网关；根因是现有 memory backend 没有 TencentDB gateway 的 capture/search/end-session 适配层。","risk":"最新 turn 可能在 gateway flush 前未 capture；cursor 不持久化可能导致重复记忆。","root_cause":"缺少封装 gateway API、异步捕获队列、session 扫描 cursor 和 toolset 的 memory/tencentdb 包。","semantic_changes":"运行结束后对话可异步 capture 到 TencentDB；后续 run 可注入召回记忆或通过工具查询。","status":"commented","technical_background":"Agent Memory 会从 session 对话中抽取长期记忆，并在后续 run 前召回。TencentDB adapter 同时涉及异步 capture、session end flush、cursor/checkpoint 和工具搜索，因此顺序和幂等非常关键。","tests_docs":"已有 adapter 单元测试和示例；需要补 EndSession 等待 capture、clone/reload session cursor 的测试。","title":"memory/tencentdb: add TencentDB Agent Memory integration","tradeoffs":"异步 capture 提升吞吐和响应速度，但带来 flush-before-capture、重复 capture、失败重试和状态持久化复杂度。","url":"https://github.com/trpc-group/trpc-agent-go/pull/1859"}],"follow_up":[{"author":"Rememorio","ci_state":"PR 1817 已于 2026-05-26T04:50:30 由 Rememorio 合并。建议后续补 follow-up PR 或 issue。","number":1817,"reason":"本轮审查过程中作者自行 merge，GitHub 返回 Issue is locked，无法提交新发现的行级评论。","risk":"显式 WithEventTime 已回退到 full-list，但 sessionTTL 也会隐式触发 event.Timestamp 过滤；当前 limited path 在 TTL 场景仍可能先按 DB created_at LIMIT，再按 event.Timestamp 过滤，延迟旧事件可能占掉窗口。","status":"blocked","title":"session/mysql: limit GetSession event loading","url":"h let lang = "zh";
let filter = "all";
const statusOrder = ["approved", "commented", "merged", "skipped", "blocked"];

function text(value, fallback = "") {
  if (value === undefined || value === null || value === "") return fallback;
  if (typeof value === "object" && !Array.isArray(value)) {
    return value[lang] || value.zh || value.en || fallback;
  }
  return String(value);
}

function escapeHtml(value) {
  return text(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatRich(value) {
  let html = escapeHtml(value);
  const replacements = [
    [
      /(P[0-2]|codecov\/patch=FAILURE|go-apidiff=FAILURE|go-apidiff|FAILURE|失败|阻塞|不能合入|不能 merge|未合并|破坏性|breaking|unbounded|无界|绕过|丢失|重复|不稳定|风险)/gi,
      "mark-bad"
    ],
    [
      /(LGTM|已合并|已批准|squash merge|merged|approved|CI 全绿|全绿|修复有效|\bresolved\b|\bresolve\b)/gi,
      "mark-good"
    ],
    [
      /(pending|soft[- ]?CI|软门禁|follow-up|后续|关注|CodeRabbit|reviewability ledger|not_reached)/gi,
      "mark-info"
    ],
    [
      /(导出 API|\bAPI\b|兼容性|\bsession\b|\brunner\b|\bmemory\b|GraphRAG|workspace_exec|OpenAPI|\bpolicy\b|security|安全)/gi,
      "mark-warn"
    ]
  ];
  for (const [pattern, className] of replacements) {
    html = html.replace(pattern, `<mark class="${className}">$1</mark>`);
  }
  return html;
}

function prs() {
  const groups = reportData.skipped_groups || [];
  const skipped = groups.flatMap(group =>
    (group.items || []).map(item => ({
      ...item,
      status: item.status || "skipped",
      skip_reason: item.skip_reason || group.reason
    }))
  );
  return [
    ...(reportData.approved || []),
    ...(reportData.commented || []),
    ...(reportData.blocked || []),
    ...skipped
  ];
}

function skippedGroups() {
  return reportData.skipped_groups || [];
}

function counts(items) {
  const result = Object.fromEntries(statusOrder.map(status => [status, 0]));
  for (const item of items) {
    const status = item.status || "skipped";
    result[status] = (result[status] || 0) + 1;
  }
  return result;
}

function setLanguage(nextLang) {
  lang = nextLang;
  document.documentElement.lang = nextLang === "zh" ? "zh-CN" : "en";
  document.querySelectorAll("[data-lang-button]").forEach(button => {
    button.classList.toggle("active", button.dataset.langButton === nextLang);
  });
  render();
}

function renderStatic() {
  document.querySelectorAll("[data-i18n]").forEach(node => {
    node.textContent = labels[lang][node.dataset.i18n];
  });
  const repo = reportData.repo || "trpc-group/trpc-agent-go";
  const generated = reportData.generated_at || "2026-05-26T13:31:56";
  document.getElementById("subtitle").textContent = labels[lang].subtitle
    .replace("{repo}", repo)
    .replace("{time}", generated);
  document.getElementById("search").placeholder = labels[lang].search;
  document.getElementById("openAll").textContent = labels[lang].expandAll;
  document.getElementById("closeAll").textContent = labels[lang].collapseAll;
  document.getElementById("footer").textContent = labels[lang].footer;
}

function renderMetrics(items) {
  const totalComments = items.reduce((sum, item) =>
    sum + ((item.inline_comments || []).length || item.comment_count || 0), 0);
  const followups = (reportData.follow_up || []).length;
  const reviewed = items.filter(item =>
    ["approved", "commented", "merged", "blocked"].includes(item.status)
  ).length;
  const metricRows = [
    [labels[lang].total, items.length],
    [labels[lang].reviewed, reviewed],
    [labels[lang].approved, items.filter(item =>
      ["approved", "merged"].includes(item.status)).length],
    [labels[lang].comments, totalComments],
    [labels[lang].followups, followups]
  ];
  document.getElementById("metrics").innerHTML = metricRows.map(([label, value]) => `
    <div class="metric">
      <div class="value">${value}</div>
      <div class="label">${escapeHtml(label)}</div>
    </div>
  `).join("");
}

function renderBars(items) {
  const byStatus = counts(items);
  const maxCount = Math.max(1, ...Object.values(byStatus));
  document.getElementById("bars").innerHTML = statusOrder.map(status => {
    const value = byStatus[status] || 0;
    const width = Math.max(3, Math.round((value / maxCount) * 100));
    return `
      <div class="bar-row">
        <div class="bar-label">${labels[lang][status]}</div>
        <div class="bar-track"><div class="bar-fill ${status}" style="width:${width}%"></div></div>
        <strong>${value}</strong>
      </div>
    `;
  }).join("");
}

function renderTimeline() {
  const events = reportData.timeline || [];
  const container = document.getElementById("timeline");
  if (!events.length) {
    container.innerHTML = `<div class="empty">${labels[lang].empty}</div>`;
    return;
  }
  container.innerHTML = events.map(event => `
    <div class="timeline-item">
      <div class="time">${escapeHtml(event.time || "")}</div>
      <div>${escapeHtml(text(event.label || event))}</div>
    </div>
  `).join("");
}

function renderOverview() {
  const panel = document.getElementById("overviewPanel");
  const content = document.getElementById("overviewContent");
  const overview = reportData.overview || reportData.summary;
  const body = text(overview);
  if (!body) {
    panel.style.display = "none";
    content.textContent = "";
    return;
  }
  panel.style.display = "block";
  content.innerHTML = formatRich(body);
}

function renderChips() {
  const chipRows = ["all", ...statusOrder];
  document.getElementById("chips").innerHTML = chipRows.map(status => `
    <button type="button" class="chip ${filter === status ? "active" : ""}"
      data-filter="${status}">${labels[lang][status]}</button>
  `).join("");
  document.querySelectorAll("[data-filter]").forEach(button => {
    button.addEventListener("click", () => {
      filter = button.dataset.filter;
      renderCards();
      renderSkipGroups();
      renderFollowUp();
      renderChips();
    });
  });
}

  const haystack = [

    text(item.risk),
    text(item.ci_state)
  ].join(" ").toLowerCase();
  return haystack.includes(query.toLowerCase());
}

function blockersSearchText(blockers) {
  if (!Array.isArray(blockers)) return "";
  return blockers.map(blocker => {
    if (typeof blocker !== "object" || blocker === null) return text(blocker);
    return [
      blocker.kind,
      blocker.summary,
      blocker.reviewer,
      blocker.path,
      blocker.line,
      blocker.latest_response,
      blocker.verification,
      blocker.url
    ].map(value => text(value)).join(" ");
  }).join(" ");
}

function field(label, value) {
  const body = text(value);
  if (!body) return "";
  return `<div class="field"><strong>${label}</strong><div class="field-body">${formatRich(body)}</div></div>`;
}

function renderBlockers(item) {
  const blockers = Array.isArray(item.blockers) ? item.blockers : [];
  if (!blockers.length) return "";
  const rendered = blockers.map(blocker => {
    const data = typeof blocker === "object" && blocker !== null
      ? blocker
      : { summary: blocker };
    const location = [data.path, data.line ? `:${data.line}` : ""].filter(Boolean).join("");
    const meta = [
      data.kind ? blockerKindLabel(data.kind) : "",
      data.reviewer ? `reviewer: ${text(data.reviewer)}` : "",
      location,
      data.latest_response ? `latest: ${text(data.latest_response)}` : "",
      data.verification ? text(data.verification) : ""
    ].filter(Boolean).join(" · ");
    const summary = formatRich(data.summary || blocker);
    const link = data.url
      ? ` <a href="${escapeHtml(data.url)}">link</a>`
      : "";
    return `<li class="blocker-item"><div>${summary}${link}</div>${meta ? `<div class="blocker-meta">${escapeHtml(meta)}</div>` : ""}</li>`;
  }).join("");
  return `<div class="skip-detail"><strong>${labels[lang].blockerDetails}:</strong></div><ul class="blocker-list">${rendered}</ul>`;
}

function blockerKindLabel(kind) {
  return (labels[lang].blockerKinds || {})[kind] || text(kind);
}

function allPrText(item) {
  const comments = (item.inline_comments || []).map(comment => [
    comment.severity,
    comment.focus,
    comment.body,
    comment.path
  ].map(value => text(value)).join(" ")).join(" ");
  const blockers = blockersSearchText(item.blockers);
  return [
    item.status,
    item.number,
    item.title,
    item.author,
    item.problem,
    item.approach,
    item.outcome,
    item.risk,
    item.ci_state,
    item.skip_reason,
    item.readiness_audit,
    item.modules,
    item.api_surface,
    comments,
    blockers
  ].map(value => text(value)).join(" ").toLowerCase();
}

function readingAdvice(item) {
  const status = item.status || "skipped";
  const comments = item.inline_comments || [];
  const blockers = item.blockers || [];
  const body = allPrText(item);
  const hasP1 = comments.some(comment =>
    /\bP[01]\b/i.test(text(comment.severity)) ||
    /\bP[01]\b/i.test(text(comment.body))
  );
  const hasCriticalRisk = hasP1 ||
    /(security|安全|bypass|绕过|breaking|破坏性|unbounded|无界|丢失|重复|不稳定|兼容|api|go-apidiff|failure|失败|不能 merge|不能合入|race|并发)/i.test(body);
  const highImpactFeature =
    /(add|new|新增|support|支持|agent|runner|session|memory|graphrag|knowledge|openapi|workspace_exec|policy|extension|tool|graph|api)/i.test(body);

  const copy = {
    critical: {
      icon: "🔥",
      zh: "重点精读",
      en: "Deep Read",
      reasonZh: comments.length
        ? `有 ${comments.length} 条行级评论，且包含 P1/兼容/正确性/安全类风险。`
        : "包含高风险兼容性或正确性信号，需要重点复核。",
      reasonEn: comments.length
        ? `${comments.length} inline comment(s), including P1, compatibility, correctness, or security risk.`
        : "High-risk compatibility or correctness signal; review carefully."
    },
    focus: {
      icon: "🔎",
      zh: "建议细看",
      en: "Read Carefully",
      reasonZh: comments.length
        ? `有 ${comments.length} 条评论或重要设计取舍，建议看完整结论。`
        : "涉及核心模块、导出 API 或较大功能，建议细看。",
      reasonEn: comments.length
        ? `${comments.length} comment(s) or important design tradeoffs; read the full conclusion.`
        : "Core module, exported API, or larger feature; read carefully."
    },
    skim: {
      icon: "✅",
      zh: "快速略看",
      en: "Quick Skim",
      reasonZh: "风险低或改动较直接，扫结论和 CI 状态即可。",
      reasonEn: "Low risk or straightforward change; skim outcome and CI state."
    },
    follow: {
      icon: "⏳",
      zh: "只看阻塞",
      en: "Blocker Only",
      reasonZh: blockers.length
        ? `主要看 ${blockers.length} 个具体阻塞点，暂不需要读完整实现。`
        : "当前不是可合并状态，先看阻塞和后续动作。",
      reasonEn: blockers.length
        ? `Focus on ${blockers.length} concrete blocker(s); no need to read the full implementation yet.`
        : "Not merge-ready; focus on blockers and next action."
    }
  };

  let level = "skim";
  if (status === "blocked") {
    level = "follow";
  } else if (status === "commented") {
    level = hasCriticalRisk ? "critical" : "focus";
  } else if (status === "approved") {
    level = hasCriticalRisk || highImpactFeature ? "focus" : "skim";
  } else if (status === "merged") {
    level = highImpactFeature || hasCriticalRisk ? "focus" : "skim";
  } else if (status === "skipped") {
    level = blockers.length || /(conflict|ci|failure|失败|未回应|review)/i.test(body)
      ? "follow"
      : "skim";
  }

  const selected = copy[level];
  return {
    level,
    icon: selected.icon,
    label: lang === "zh" ? selected.zh : selected.en,
    reason: lang === "zh" ? selected.reasonZh : selected.reasonEn
  };
}

function priorityRank(level) {
  return { critical: 4, focus: 3, follow: 2, skim: 1 }[level] || 0;
}

function renderReadingGuide(items) {
  const panel = document.getElementById("readingGuidePanel");
  const container = document.getElementById("readingGuide");
  const candidates = [
    ...items.filter(item => (item.status || "skipped") !== "skipped"),
    ...(reportData.follow_up || []).map(item => ({ ...item, status: item.status || "blocked" }))
  ].map(item => ({ item, advice: readingAdvice(item) }))
    .filter(entry => entry.advice.level !== "skim")
    .sort((left, right) => priorityRank(right.advice.level) - priorityRank(left.advice.level));

  if (!candidates.length) {
    panel.style.display = "none";
    container.innerHTML = "";
    return;
  }

  panel.style.display = "block";
  container.innerHTML = candidates.slice(0, 9).map(entry => {
    const item = entry.item;
    const advice = entry.advice;
    const prText = item.number ? `#${item.number}` : "PR";
    const prLink = item.url
      ? `<a href="${escapeHtml(item.url)}">${prText} · ${escapeHtml(text(item.title))}</a>`
      : `<span>${prText} · ${escapeHtml(text(item.title))}</span>`;
    return `
      <article class="guide-card ${advice.level}">
        <div class="guide-meta">
          <span class="read-pill ${advice.level}">${advice.icon} ${escapeHtml(advice.label)}</span>
          <span class="badge ${item.status || "skipped"}">${labels[lang][item.status] || item.status || labels[lang].skipped}</span>
        </div>
        <div>${prLink}</div>
        <div class="guide-reason">${escapeHtml(advice.reason)}</div>
      </article>
    `;
  }).join("");
}

function storyLine(label, value) {
  const body = text(value);
  if (!body) return "";
  return `
    <p class="story-line">
      <span class="story-label">${escapeHtml(label)}</span>
      <span class="story-text">${formatRich(body)}</span>
    </p>
  `;
}

function storyBlock(title, rows, className = "") {
  const body = rows.filter(Boolean).join("");
  if (!body) return "";
  const classes = ["story-block", className].filter(Boolean).join(" ");
  return `<section class="${classes}"><h4>${escapeHtml(title)}</h4>${body}</section>`;
}

function factItem(label, value) {
  const body = text(value);
  if (!body) return "";
  return `
    <div class="fact">
      <dt>${escapeHtml(label)}</dt>
      <dd>${formatRich(body)}</dd>
    </div>
  `;
}

function renderReviewRail(item) {
  const advice = readingAdvice(item);
  const callout = `
    <div class="reading-callout ${advice.level}">
      <strong>${advice.icon} ${escapeHtml(advice.label)}</strong>
      <span>${escapeHtml(advice.reason)}</span>
    </div>
  `;
  const facts = [
    factItem(labels[lang].outcome, item.outcome),
    factItem(labels[lang].risk, item.risk),
    factItem(labels[lang].ci, item.ci_state),
    factItem(labels[lang].attentionPoints, item.attention_points),
    factItem(labels[lang].testsDocs, item.tests_docs),
    factItem(labels[lang].modules, item.modules),
    factItem(labels[lang].apiSurface, item.api_surface),
    factItem(labels[lang].reason, item.skip_reason)
  ].filter(Boolean).join("");
  if (!facts) return `<aside class="review-rail">${callout}</aside>`;
  return `<aside class="review-rail">${callout}<h4>${labels[lang].reviewSummary}</h4><dl class="fact-list">${facts}</dl></aside>`;
}

function renderComments(item) {
  const comments = item.inline_comments || [];
  if (!comments.length) return "";
  const rendered = comments.map(comment => `
    <div class="comment">
      <strong>${escapeHtml(comment.path || "")}${comment.line ? ":" + escapeHtml(comment.line) : ""}</strong>
      <div>${formatRich(text(comment.body || comment))}</div>
      ${comment.focus ? `<div><strong>${labels[lang].focus}:</strong> ${escapeHtml(text(comment.focus))}</div>` : ""}
      ${comment.severity ? `<div><strong>${labels[lang].severity}:</strong> ${escapeHtml(text(comment.severity))}</div>` : ""}
    </div>
  `).join("");
  return `<section class="comments-panel">
    <h4>${labels[lang].inlineComments}</h4>
    <div class="comment-list">${rendered}</div>
  </section>`;
}

function renderPrReadout(item) {
  const story = [
    storyBlock(labels[lang].backgroundAndProblem, [
      storyLine(labels[lang].technicalBackground, item.technical_background),
      storyLine(labels[lang].problem, item.problem),
      storyLine(labels[lang].problemFraming, item.problem_framing),
      storyLine(labels[lang].rootCause, item.root_cause)
    ], "hero-block"),
    storyBlock(labels[lang].solutionAndTradeoffs, [
      storyLine(labels[lang].approach, item.approach),
      storyLine(labels[lang].alternativeDesigns, item.alternative_designs),
      storyLine(labels[lang].tradeoffs, item.tradeoffs),
      storyLine(labels[lang].designAssessment, item.design_assessment)
    ]),
    storyBlock(labels[lang].impactAndEvidence, [
      storyLine(labels[lang].changeInventory, item.change_inventory),
      storyLine(labels[lang].semanticChanges, item.semantic_changes),
      storyLine(labels[lang].behaviorImpact, item.behavior_impact),
      storyLine(labels[lang].moduleImpact, item.module_impact),
      storyLine(labels[lang].crossModuleImpact, item.cross_module_impact)
    ]),
    renderComments(item)
  ].filter(Boolean).join("");
  return `<div class="pr-readout"><div class="pr-story">${story}</div>${renderReviewRail(item)}</div>`;
}

function renderCards() {
  const query = document.getElementById("search").value.trim();
  const visible = prs().filter(item => (item.status || "skipped") !== "skipped")
    .filter(item => {
    const status = item.status || "skipped";
    return (filter === "all" || status === filter) && matchesSearch(item, query);
  });
  const container = document.getElementById("cards");
  if (!visible.length) {
    container.innerHTML = `<div class="empty">${labels[lang].empty}</div>`;
    return;
  }
  container.innerHTML = visible.map(item => {
    const status = item.status || "skipped";
    const advice = readingAdvice(item);
    const prText = item.number ? `#${item.number}` : "PR";
    const prLink = item.url
      ? `<a href="${escapeHtml(item.url)}">${prText}</a>`
      : prText;
    return `
      <article class="card priority-${advice.level}" data-status="${status}">
        <div class="card-head">
          <div>
            <div class="headline-row">
              <h3 class="card-title">${prLink} · ${escapeHtml(text(item.title))}</h3>
              <span class="read-pill ${advice.level}">${advice.icon} ${escapeHtml(advice.label)}</span>
            </div>
            <div class="meta">
              <span>${labels[lang].author}: ${escapeHtml(item.author || "")}</span>
              <span class="advice-reason">${escapeHtml(advice.reason)}</span>
            </div>
          </div>
          <span class="badge ${status}">${labels[lang][status] || status}</span>
        </div>
        <div class="card-body">
          ${renderPrReadout(item)}
        </div>
      </article>
    `;
  }).join("");
  document.querySelectorAll(".card-head").forEach(head => {
    head.addEventListener("click", event => {
      if (event.target.closest("a")) return;
      head.closest(".card").classList.toggle("open");
    });
  });
}

function renderSkipGroups() {
  const heading = document.getElementById("skippedHeading");
  const container = document.getElementById("skipGroups");
  if (!["all", "skipped"].includes(filter)) {
    heading.style.display = "none";
    container.style.display = "none";
    return;
  }
  heading.style.display = "flex";
  container.style.display = "grid";
  const query = document.getElementById("search").value.trim();
  const groups = skippedGroups().map(group => {
    const reason = group.reason || "";
    const items = (group.items || []).map(item => ({
      ...item,
      status: item.status || "skipped",
      group_reason: reason,
      skip_reason: item.skip_reason || reason
    })).filter(item => matchesSearch(item, query));
    return { reason, items };
  }).filter(group => group.items.length > 0);
  if (!groups.length) {
    container.innerHTML = `<div class="empty">${labels[lang].empty}</div>`;
    return;
  }
  container.innerHTML = groups.map((group, index) => `
    <article class="skip-group open">
      <div class="skip-group-head" data-skip-group="${index}">
        <h3 class="skip-group-title">${escapeHtml(text(group.reason))}</h3>
        <span class="skip-group-count">${group.items.length} ${labels[lang].items}</span>
      </div>
      <div class="skip-group-body">
        ${group.items.map(item => {
          const prText = item.number ? `#${item.number}` : "PR";
          const prLink = item.url
            ? `<a href="${escapeHtml(item.url)}">${prText}</a>`
            : prText;
          return `
            <div class="skip-row">
              <div>
                <div class="skip-title">${prLink} · ${escapeHtml(text(item.title))}</div>
                <div class="skip-detail">${labels[lang].author}: ${escapeHtml(item.author || "")}</div>
              </div>
              <div>
                <div><strong>${labels[lang].blocker}:</strong> ${formatRich(text(item.skip_reason))}</div>
                ${item.readiness_audit ? `<div class="skip-detail"><strong>${labels[lang].readinessAudit}:</strong> ${formatRich(text(item.readiness_audit))}</div>` : ""}
                ${renderBlockers(item)}
                ${item.ci_state ? `<div class="skip-detail">${formatRich(text(item.ci_state))}</div>` : ""}
                ${item.risk ? `<div class="skip-detail">${formatRich(text(item.risk))}</div>` : ""}
              </div>
            </div>
          `;
        }).join("")}
      </div>
    </article>
  `).join("");
  document.querySelectorAll("[data-skip-group]").forEach(head => {
    head.addEventListener("click", () => {
      head.closest(".skip-group").classList.toggle("open");
    });
  });
}

function renderFollowUp() {
  const heading = document.getElementById("followUpHeading");
  const container = document.getElementById("followUpCards");
  if (!["all", "skipped", "blocked"].includes(filter)) {
    heading.style.display = "none";
    container.style.display = "none";
    return;
  }
  const query = document.getElementById("search").value.trim().toLowerCase();
  const items = (reportData.follow_up || []).filter(item => {
    if (!query) return true;
    return [
      item.number,
      item.author,
      text(item.title),
      text(item.reason),
      text(item.next)
    ].join(" ").toLowerCase().includes(query);
  });
  if (!items.length) {
    heading.style.display = "none";
    container.style.display = "none";
    return;
  }
  heading.style.display = "flex";
  container.style.display = "grid";
  container.innerHTML = items.map(item => {
    const prText = item.number ? `#${item.number}` : "PR";
    const prLink = item.url
      ? `<a href="${escapeHtml(item.url)}">${prText}</a>`
      : prText;
    return `
      <article class="card open" data-status="blocked">
        <div class="card-head">
          <div>
            <h3 class="card-title">${prLink} · ${escapeHtml(text(item.title))}</h3>
            <div class="meta">${labels[lang].author}: ${escapeHtml(item.author || "")}</div>
          </div>
          <span class="badge blocked">${labels[lang].followups}</span>
        </div>
        <div class="card-body">
          <div class="grid">
            ${field(labels[lang].reason, item.reason)}
            ${field(labels[lang].outcome, item.next)}
          </div>
        </div>
      </article>
    `;
  }).join("");
}

function render() {
  const items = prs();
  renderStatic();
  renderMetrics(items);
  renderBars(items);
  renderTimeline();
  renderOverview();
  renderReadingGuide(items);
  renderChips();
  renderCards();
  renderSkipGroups();
  renderFollowUp();
}

document.querySelectorAll("[data-lang-button]").forEach(button => {
  button.addEventListener("click", () => setLanguage(button.dataset.langButton));
});
document.getElementById("search").addEventListener("input", () => {
  renderCards();
  renderSkipGroups();
  renderFollowUp();
});
document.getElementById("openAll").addEventListener("click", () => {
  document.querySelectorAll(".card, .skip-group").forEach(node => {
    node.classList.add("open");
  });
});
document.getElementById("closeAll").addEventListener("click", () => {
  document.querySelectorAll(".card, .skip-group").forEach(node => {
    node.classList.remove("open");
  });
});
render();
</script>
</body>
</html>
