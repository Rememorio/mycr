.meta {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 7px;
}
.badge {
  gap: 7px;
  min-width: 0;
  padding: 6px 11px;
  text-transform: none;
  white-space: nowrap;
}
.card-summary {
  color: #526173;
  margin-top: 9px;
}
.badge::before {
  content: "";
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: currentColor;
}
.card-body {
  background: #fff;
  padding: 0 18px 18px;
}
.grid {
  grid-template-columns: 1fr;
  gap: 10px;
}
.field {
  background: #fbfcfe;
  border-color: #e6ecf3;
  padding: 13px 14px;
}
.field strong {
  color: #536175;
  font-size: 11px;
  letter-spacing: 0;
  text-transform: uppercase;
}
.field-body {
  color: #1f2937;
  line-height: 1.62;
}
.comment {
  background: #fff8ed;
  border-left-color: var(--accent-2);
  color: #1f2937;
}
.comment-head {
  color: #1f2937;
}
.pr-readout {
  grid-template-columns: minmax(0, 1fr);
  gap: 18px;
}
.story-block {
  border-top-color: #e2e8f0;
}
.story-block.hero-block {
  background: linear-gradient(180deg, #fbfffe, #f7fbfa);
  border-color: #d5e7e4;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
}
.story-block h4,
.review-rail h4,
.comments-panel h4 {
  font-size: 13px;
  font-weight: 900;
}
.story-line {
  grid-template-columns: 116px minmax(0, 1fr);
  border-top-color: #e9eef5;
}
.story-label {
  color: #607086;
}
.review-rail {
  border: 1px solid #e3eaf2;
  border-radius: 8px;
  padding: 14px;
  background: #fbfcfe;
}
.review-rail .fact-list {
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
}
.fact {
  border-top-color: #e8eef5;
}
.comments-panel {
  border-top-color: #e2e8f0;
}
.comment-list {
  gap: 12px;
}
.skip-group {
  box-shadow: var(--shadow);
}
.skip-group-head {
  align-items: center;
  background: linear-gradient(180deg, #fff, #fbfcfe);
}
.skip-row {
  grid-template-columns: minmax(0, 1.15fr) minmax(220px, 0.85fr);
}
.blocker-item {
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.75);
}
.empty {
  background: #fff;
  box-shadow: var(--shadow);
}
@media (max-width: 840px) {
  .topbar, .card-head { grid-template-columns: 1fr; display: grid; }
  .card-actions { align-items: flex-start; flex-direction: row; flex-wrap: wrap; }
  .dashboard, .grid, .metrics { grid-template-columns: 1fr; }
  .guide-grid { grid-template-columns: 1fr; }
  .headline-row { align-items: flex-start; flex-direction: column; }
  .pr-readout { grid-template-columns: 1fr; }
  .review-rail { position: static; }
  .story-line { grid-template-columns: 1fr; gap: 4px; }
  .timeline-item { grid-template-columns: 1fr; }
  .controls { position: static; }
  .utilities { width: 100%; margin-left: 0; }
  .utility-button { flex: 1 1 auto; }
  .skip-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div>
      <h1 data-i18n="title">MyCR 审核报告</h1>
      <p class="subtitle" id="subtitle"></p>
    </div>
    <div class="toggle" aria-label="Language">
      <button type="button" data-lang-button="zh" class="active">中文</button>
      <button type="button" data-lang-button="en">EN</button>
    </div>
  </div>
  <section class="metrics" id="metrics"></section>
  <section class="dashboard">
    <div class="panel">
      <h2 data-i18n="statusDistribution">状态分布</h2>
      <div class="bars" id="bars"></div>
    </div>
    <div class="panel">
      <h2 data-i18n="timeline">执行时间线</h2>
      <div class="timeline" id="timeline"></div>
    </div>
  </section>
  <section class="panel" id="overviewPanel" style="display: none; margin-top: 16px;">
    <h2 data-i18n="overviewSection">整体摘要</h2>
    <div class="overview-content" id="overviewContent"></div>
  </section>
  <section class="panel reading-guide" id="readingGuidePanel" style="display: none;">
    <div class="guide-head">
      <h2 data-i18n="readingGuide">阅读建议</h2>
      <span data-i18n="readingGuideHint">先看高风险和高影响 PR</span>
    </div>
    <div class="guide-grid" id="readingGuide"></div>
  </section>
  <section class="controls">
    <input class="search" id="search" type="search">
    <div class="chips" id="chips"></div>
    <div class="utilities">
      <button type="button" class="utility-button" id="openAll"></button>
      <button type="button" class="utility-button" id="closeAll"></button>
    </div>
  </section>
  <section class="section-heading">
    <h2 data-i18n="reviewedSection">已处理 PR</h2>
    <div class="hint" data-i18n="reviewedHint">点击卡片查看细节</div>
  </section>
  <main class="cards" id="cards"></main>
  <section class="section-heading" id="skippedHeading">
    <h2 data-i18n="skippedGroups">未审核 PR 分类</h2>
    <div class="hint" data-i18n="skippedHint">按排除原因分组</div>
  </section>
  <section class="skip-groups" id="skipGroups"></section>
  <section class="section-heading" id="followUpHeading">
    <h2 data-i18n="followUpSection">后续关注</h2>
    <div class="hint" data-i18n="followUpHint">接近可处理但仍有阻塞</div>
  </section>
  <section class="cards" id="followUpCards"></section>
  <div class="footer" id="footer"></div>
</div>
<script>
const reportData = {"approved":[{"alternative_designs":"可选方案是只在 README 加短段落，或把内容拆成 API reference。短段落无法覆盖跨模块行为；API reference 更适合参数枚举，不适合解释缓存命中和可观测性排障的因果链。博客形式更适合这类工程约束。","api_surface":"无 Go 导出 API 变化；用户可见变化是文档导航新增两篇博客。","approach":"新增 English 和 Chinese docs/blog 页面，并在 docs/mkdocs.yml 注册导航。内容围绕当前代码能力写：可观测性部分解释 telemetry spans/metrics/attributes、SpanAttributePolicy、tool ordering/snapshot、post-tool guidance、skills tool-result placement；prompt-cache 部分解释 prompt_cache_key、cache-token usage、summary 与 tool schema 稳定性的关系。","approval_body":"LGTM","attention_points":"已合并；后续只需在 observability/cache 相关 API 变化时同步文档。","author":"liuzengh","behavior_impact":"用户访问文档站点时可以直接看到可观测性和缓存工程指南；程序行为不变。","change_inventory":"新增/更新 Agent observability 与 prompt cache 博客文档；更新 mkdocs 导航，使英文和中文站点都能访问这些页面。没有修改 Go 源码、运行时默认值或配置 schema。","ci_state":"批准前当前 head checks 全绿。","cross_module_impact":"无代码层跨模块影响。文档内容涉及多个模块，但不改变模块交互。","design_assessment":"设计合适，属于低风险 docs-only 增量。文档没有引入新的导出 API，也没有给出与当前代码冲突的配置建议。","head_sha":"2da3e36e06c7a13aef64c5513d4d443bc27c6342","match_head_commit":"2da3e36e06c7a13aef64c5513d4d443bc27c6342","merge_commit":"6e0e9b37ae0a5cde83bb632f69f446759ccfcfc9","merged_at":"2026-06-29T07:35:07Z","module_impact":"直接影响文档站；间接帮助使用 runner/model/session/tool 的调用方理解配置边界。","modules":"docs/mkdocs.yml；docs/mkdocs/en 与 docs/mkdocs/zh 下的博客页面。","number":2033,"outcome":"提交 GitHub approving review，body 精确为 `LGTM`；随后按仓库策略 squash merge，使用 `--match-head-commit 2da3e36e06c7a13aef64c5513d4d443bc27c6342`，GitHub 生成 merge commit `6e0e9b37ae0a5cde83bb632f69f446759ccfcfc9`。","problem":"PR 试图补齐两篇英文/中文工程博客：一篇解释 Agent observability 如何从 trace、metrics、span attributes、tool snapshots 和 callback policy 观察 agent 运行；另一篇解释 prompt cache 工程实践，尤其是工具顺序、summary fork、post-tool guidance、structured output 和供应商 usage 字段对缓存命中的影响。旧文档缺少这类从代码约束出发的长文，用户很难判断怎么设置可观测性和缓存策略。","problem_framing":"表面问题是缺文档；根因是 agent runtime 的行为跨越 runner、model、session、tool 和 observability 多个模块，单个 API 注释无法解释“为什么这么配”。文档采用博客形式是合适的，因为它能把使用场景、错误配置和代码路径放在同一条叙事里。","risk":"低风险。主要剩余风险是未来代码演进后文档需要同步维护。","root_cause":"维护者需要把一些已经在代码中存在的约束显性化：例如 span attribute policy 不是单纯开关，工具 schema 顺序会影响 prompt cache，summary fork 是否 cache-safe 取决于事件边界和上下文重建。","semantic_changes":"无运行时语义变化。文档描述当前 observability、prompt cache、session summary、tool schema 和 model usage 行为。","status":"merged","technical_background":"这个 PR 只改文档，但覆盖的是 agent 运行时可观测性和 prompt cache 两条核心维护线。trpc-agent-go 的 agent 运行路径会经过 runner、model、tool call、session summary、callback/telemetry 等层：runner 负责把模型响应、工具调用和事件流串起来；model adapter 负责把框架请求转成具体供应商 API；session/summary 负责控制上下文体积；observability 文档需要把 span、metric、trace attribute 与这些路径对应起来。prompt cache 则依赖模型供应商对稳定前缀、工具定义顺序、系统提示、cache key 和 token usage 的处理，文档如果写错会直接误导调用方的成本优化。","tests_docs":"本地执行 `uvx --with-requirements docs/mkdocs/assets/requirements.txt mkdocs build --strict -f docs/mkdocs.yml` 通过，仅有既有 info 级文档提示。","title":"docs: add sanitized Agent observability and prompt cache blogs","tradeoffs":"长文档增加维护成本，但换来更强的可解释性。因为 PR 没有改代码，兼容性风险低；真正风险在于文档是否与当前代码一致，本轮已用当前源码交叉核对关键术语和路径。","updated_at":"2026-06-29T04:12:23Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/2033"}],"blocked":[],"commented":[{"alternative_designs":"一种方案是在 best-of-N runner 中暴露全量 candidate/judge usage；另一种方案是在 GAIA 层额外记录 judge/candidate 统计；最保守方案是把 README 表格列名改成 selected-answer tokens。","api_surface":"父仓库无导出 API 变化；子模块 benchmark CLI/README 表格出现新的 LLM-verifier 运行配置和结果口径。","approach":"父仓库把 `benchmark` 从 `02ff732321f7d454eb33869543f3d5637d8797de` 更新到 `1edee87bc8b4efa539329e6766fd0fcd4b03fd7b`。子模块变化中，`gaia/trpc-agent-go-impl/llmverifier.go` 增加 LLM verifier runner option、attempts、parallelism 和 pairwise selection；`gaia.go` 继续按 event response usage 聚合 tokens；README 新增/更新 LLM verifier 结果表。","attention_points":"作者需要补全端到端 token usage 或修改指标标签；修复前不要把该表格当作真实成本比较。","author":"Rememorio","behavior_impact":"用户阅读 GAIA 表格时可能认为 LLM-verifier 的 Avg tokens 明显低于真实成本，因为失败候选和 judge 调用没有计入。","change_inventory":"父仓库只改 `benchmark` gitlink。子模块新增 GAIA LLM verifier 实现、更新 GAIA 结果汇总/README，并包含 SkillCraft benchmark/evolution evaluation 相关文件。","ci_state":"当前 head 的 160 个 checks 全绿。","cross_module_impact":"父仓库代码不变，但 benchmark 子模块依赖 runner/bestofn 的事件转发模型，指标缺口来自跨模块 usage 归集。","design_assessment":"子模块更新本身可理解，但当前 token 指标口径和新增执行模型不匹配，因此不能直接批准。最小修复是明确 metric 口径或补全端到端 usage。","head_sha":"52d17d88faa327b9cf1e6a853c99e6c8cf9f40cc","inline_comments":[{"body":"This submodule bump brings in `gaia/trpc-agent-go-impl/llmverifier.go`, where the new LLM-verifier run uses multiple candidate attempts plus judge comparisons, but the GAIA report still computes `Avg tokens` from the events emitted by the selected winner only. `runner` forwards only `winner.Events`, so losing attempts and judge-runner calls are omitted from `TokensUsed`; please either account for end-to-end candidate + judge tokens or label the table as selected-answer tokens so the benchmark cost comparison is not misleading.\n\n<details><summary>中文<\/summary>\n这个子模块更新引入了 `gaia/trpc-agent-go-impl/llmverifier.go`，新的 LLM-verifier 会跑多次 candidate attempts 并调用 judge 做比较，但 GAIA 报告里的 `Avg tokens` 仍只从最终 winner 被转发出来的 events 统计。`runner` 只会向外转发 `winner.Events`，所以失败候选和 judge runner 的 token 都没有计入 `TokensUsed`；建议统计端到端的 candidate + judge tokens，或者把表格明确标成 selected-answer tokens，避免 benchmark 成本对比误导。\n<\/details>","focus":"benchmark cost accounting","line":1,"path":"benchmark","severity":"P1","url":"https://github.com/trpc-group/trpc-agent-go/pull/2035#discussion_r3489999312"}],"module_impact":"直接影响 benchmark/GAIA；间接影响维护者对 trpc-agent-go agent benchmark 成本/质量折中的判断。","modules":"benchmark 子模块；重点是 `gaia/trpc-agent-go-impl/llmverifier.go`、`gaia/trpc-agent-go-impl/gaia.go`、`gaia/README.md` 和 runner/bestofn 事件转发语义。","number":2035,"outcome":"提交 inline review comment，未批准、未合并。","problem":"PR 想把 benchmark 子模块更新到最新 main，引入 GAIA LLM-verifier best-of-N 运行结果、SkillCraft 评测和结果文档。它的目标是让 benchmark 结果反映最新实验能力。","problem_framing":"根本问题不是父仓库 gitlink 本身，而是 benchmark 子模块新增了“多候选 + judge”的执行模型，旧的 token 汇总口径没有随执行模型升级。","risk":"P1/P2 之间的 benchmark correctness 风险：不破坏生产代码，但会误导成本对比和后续优化判断。","root_cause":"GAIA result aggregation 仍从最终被转发的 response event 写 `TokensUsed`；bestofn runner 只转发 winner.Events，所以输掉的 candidate attempts 和 judge runner 的 token 被天然隐藏。","semantic_changes":"benchmark 语义从单次 answer 评估扩展到多候选加 judge 的评估；但 token 成本仍按 winner events 统计，语义上不再等同端到端 cost。","status":"commented","technical_background":"该 PR 在父仓库中只表现为 `benchmark` 子模块 gitlink 更新。子模块里的 GAIA benchmark 会跑模型回答、可选 verifier/judge、结果汇总和 README 表格。best-of-N/LLM verifier 的基本语义是：同一问题生成多个候选答案，再用 judge 或 pairwise selector 选出 winner。成本指标如果只统计 winner 事件，而不统计失败候选和 judge 调用，就不再代表端到端运行成本。","tests_docs":"本轮用 GitHub API 拉取子模块 compare 与文件内容，并核对 bestofn runner 只 forward winner.Events；未在 benchmark 子模块跑完整 GAIA，因为该问题由静态路径和 README 指标即可确认。","title":"benchmark: update submodule to latest main","tradeoffs":"端到端统计更准确，但需要 runner 或 benchmark 层传递额外 usage；只改表格标签成本最低，但不能支持真实成本比较。因为 benchmark 的价值在于横向比较，成本口径不清会直接误导读者。","updated_at":"2026-06-29T07:33:27Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/2035"},{"alternative_designs":"可以在 processor 层识别 goal tools 后强制串行；也可以让 extension 注册时声明 mutually exclusive/serial tool set；保守方案是在启用 parallel tools 时拒绝 goal extension 或文档化不兼容并加测试。","api_surface":"新增用户可见 extension、options、tool names、goal state schema 和 example；工具名可通过 `WithToolNames` 自定义。","approach":"PR 新增 `agent/extension/goal` 包：包括 goal state 结构、工具注册/自定义名称、prompt guidance 注入、premature final response 检测、retry/nudge 控制、docs 和 example。作者已经修复了本轮早些时候的 session error/custom tool name/tool result delta 等问题，但 parallel tools 兼容性仍未处理。","attention_points":"作者需要给 goal tools 增加串行语义、拒绝 parallel tools，或至少文档化不兼容并补回归测试。","author":"bytethm","behavior_impact":"应用开启 parallel tools 后，模型同一轮 create_goal 再 update_goal 可能失败为 “no active goal exists”，或者两个 update_goal 的终态由 delta merge 顺序决定。","change_inventory":"新增 goal extension state、format、tools、option、tests、example 和 docs；工具包括创建、读取、更新目标；扩展会注入 guidance 并在 final response 前检查目标状态。","ci_state":"当前 head 的 162 个 checks 全绿。","cross_module_impact":"如果不修，任何默认启用 parallel tools 的 agent 都可能把 goal extension 用成非确定状态机。","design_assessment":"功能方向合理，但状态机工具缺少并发边界，当前还不应批准。最小可接受修复是让包含 goal state mutation 的 tool batch 串行，或显式 fail closed。","head_sha":"a95da43d2aed6b21a1a09528b973fda8861008a8","inline_comments":[{"body":"Goal state changes need serial semantics, but this tool can still run in the same parallel-tool batch as `update_goal` when the application enables `WithEnableParallelTools(true)`. Parallel execution clones the invocation session for each tool call, so a model response that creates and immediately completes/blocks a goal can make `update_goal` read a sibling clone with no active goal, or leave the persisted terminal state dependent on delta merging; please force goal-tool batches to run serially or reject/document the parallel-tools combination with a regression test.\n\n<details><summary>中文<\/summary>\nGoal 状态变更需要串行语义，但应用开启 `WithEnableParallelTools(true)` 后，这个工具仍可能和 `update_goal` 在同一批 parallel tool calls 中并发执行。parallel 路径会给每个 tool call 克隆一份 invocation session，所以模型同一轮里先 create 再 complete/block goal 时，`update_goal` 可能读到另一个没有 active goal 的克隆，或者最终持久化状态取决于 state delta 合并顺序。建议让包含 goal tool 的批次强制串行，或明确拒绝/文档化与 parallel tools 的不兼容并加回归测试。\n<\/details>","focus":"parallel tool state semantics","line":199,"path":"agent/extension/goal/tools.go","severity":"P1","url":"https://github.com/trpc-group/trpc-agent-go/pull/1980#discussion_r3489959203"}],"module_impact":"直接影响 goal extension；间接依赖 processor 对并行 tool call 的 session clone/delta merge 语义。","modules":"agent/extension/goal；internal/flow/processor parallel function-call 路径；examples/goal。","number":1980,"outcome":"提交 inline review comment，未批准、未合并。","problem":"PR 要解决 agent 长任务目标跟踪问题：让模型显式创建目标、读取状态、完成或阻塞目标，并在模型过早终止时通过 guidance/nudge 继续推进。","problem_framing":"表面是新增 goal 工具；更深层是把“目标生命周期”放进 session state 后，它就成为强顺序状态机。任何并发工具执行都会挑战“create 后 update”这种顺序假设。","risk":"P1 正确性风险：目标状态是用户可见流程控制，不能让同一轮工具调用顺序依赖并发实现细节。","root_cause":"工具实现直接写 `inv.Session.State`，但没有在 `WithEnableParallelTools(true)` 下强制串行或拒绝并发。parallel tool path 会对 invocation/session 做并发视图，最后再合并 state delta，导致同一轮多个 goal tool 的可见状态和最终状态依赖并发/合并顺序。","semantic_changes":"agent 可以把目标状态持久化到 session，并通过工具调用推进生命周期；但在 parallel tools 下，状态可见性和终态存在竞态语义。","status":"commented","technical_background":"goal extension 给 agent 增加会话级目标状态和 `create_goal` / `get_goal` / `update_goal` 工具。它的状态存在 invocation session 里，runner 执行工具调用后再通过 session state delta 合并回主会话。trpc-agent-go 同时支持 parallel tools：同一模型响应里的多个 tool call 可以并发执行，每个工具拿到的是各自的 session view/clone。只读工具适合并发，但会修改共享目标状态的工具需要串行语义。","tests_docs":"本地验证 `go test ./agent/extension/goal` 和 `go test ./examples/goal` 通过；并检查 internal/flow/processor parallel path 的 cloned session/delta merge 逻辑。","title":"agent/extension: add goal support","tradeoffs":"强制串行最符合用户心智，但需要 runner/processor 支持工具级调度约束；拒绝并发实现成本低，但牺牲与全局 parallel tools 的组合能力。当前完全不处理会把状态正确性暴露给并发细节。","updated_at":"2026-06-29T07:27:11Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/1980"}],"follow_up":[{"author":"WineChord","blockers":[{"kind":"ci","summary":"非绿 checks: check go mod tidy:IN_PROGRESS, CLAAssistant:IN_PROGRESS, test@PULL_REQUEST:IN_PROGRESS, check examples build script (1/4):QUEUED, check examples build script (3/4):QUEUED, e2e test:QUEUED, check examples (1/4):QUEUED, check examples (2/4):QUEUED, check examples (3/4):QUEUED, check examples (4/4):QUEUED, build:QUEUED, check examples build script (2/4):QUEUED, lint:QUEUED, check examples build script (4/4):QUEUED, check git lfs excluded:QUEUED, check file size:QUEUED, check sum.golang.org checksums:QUEUED, typos:QUEUED, go-apidiff:QUEUED, docs-build:QUEUED, check go.mod version:QUEUED, discover go modules:QUEUED"}],"head_sha":"16b3d78f18e488b450f5bbf9de0ae5ea55942c55","number":2032,"outcome":"own PR 已推送修复，等待 GitHub Actions 完成。","risk":"不要 self-approve/self-merge；等 CI 全绿后交给外部 review。","status":"blocked","title":"tool: improve web search and browser eval compatibility","updated_at":"2026-06-29T03:05:25Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/2032"},{"auth own PR 维护：直接提交并推送 `576da9fa7 tool/file: allow symlinked runtime read roots` 到 `WineChord:wg_ddg_tls_compat_0628`；没有提交 self-review、没有 LGTM、没有 merge。","problem":"PR 要改善 web search 和 browser eval 在真实桌面/代理/TLS/临时文件场景下的兼容性，并让 OpenClaw 对运行时临时文件的只读访问更实用。","problem_framing":"这类问题的根因是工具层面对“外部环境”的假设过强：搜索后端可能被网络策略影响，浏览器 eval 可能被 sandbox/页面状态影响，文件路径可能经过平台 symlink。只修业务逻辑不够，工具边界需要更稳定的 fallback 和路径规范化。","risk":"当前主要剩余风险是 GitHub Actions 对新 head 尚未完成。代码层风险较低，修复点由本地失败用例覆盖。","root_cause":"本轮本地 broad test 暴露 `RuntimeReadDirsDefault` 在 macOS `/var -> /private/var` 下失败：extra read roots 初始化时解析成真实路径，但读取请求保留 `/var/...`，匹配逻辑先比较未解析 path 与 resolved root，导致合法临时文件被拒绝。","self_review_policy":"未 self-approve，未 self-merge，未对自己的 PR 发 review comment。","semantic_changes":"绝对路径读取仍只能在 configured read-only roots 下发生；变化是 symlink alias 路径会按真实路径判断，运行时临时文件读取在 macOS 上不再误拒。写入、替换、列表、搜索权限不随 read-only roots 扩大。","status":"maintained","technical_background":"这个 own PR 横跨 OpenClaw 的 web search/browser eval/file-tool 兼容性。OpenClaw 把外部工具暴露给 agent：DuckDuckGo search 需要在不同网络/TLS 环境下选择 api/html/lite 后端；browser eval 需要稳定处理 sandbox、snapshot 和 JS 执行返回；file tool 的 read-only roots 允许 agent 读取运行时生成的临时文件，但不能扩大写权限或允许目录逃逸。macOS 上 `/var` 通常是指向 `/private/var` 的 symlink，路径权限判断如果只看字符串前缀，很容易误杀合法临时文件或放过 symlink escape。","tests_docs":"本轮维护后通过：`go test ./tool/file -count=1`；`go test ./openclaw/app -run RuntimeReadDirs... -count=1`；`go test ./openclaw/app -count=1`；`go test ./session/summary ./internal/flow/processor -count=1`；`go test ./openclaw/internal/browser -count=1`；`TMPDIR=/tmp go test ./tool/duckduckgo -count=1`；`go test ./tool/webfetch/httpfetch/... -count=1`；`TMPDIR=/tmp go test ./tool/claudecode -run ... -count=1`。","title":"tool: improve web search and browser eval compatibility","tradeoffs":"解析最近存在父目录略增加一次路径处理成本，但只发生在绝对路径读取的权限判断上，成本可以忽略。收益是 macOS alias 路径和不存在目标文件的父目录场景都能正确处理，同时继续阻止 root 内 symlink 指向 root 外。","updated_at":"2026-06-29T03:05:25Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/2032"}],"overview":"本轮从 35 个 let lang = "zh";
let filter = "all";
const statusOrder = ["approved", "commented", "maintained", "merged", "skipped", "blocked"];

function text(value, fallback = "") {
  if (value === undefined || value === null || value === "") return fallback;
  if (typeof value === "object" && !Array.isArray(value)) {
    return value[lang] || value.zh || value.en || fallback;
  }
  return String(value);
}

function escapeHtml(value) {
  return text(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatRich(value) {
  let html = escapeHtml(value);
  const replacements = [
    [
      /(P[0-2]|codecov\/patch=FAILURE|go-apidiff=FAILURE|go-apidiff|FAILURE|失败|阻塞|不能合入|不能 merge|未合并|破坏性|breaking|unbounded|无界|绕过|丢失|重复|不稳定|风险)/gi,
      "mark-bad"
    ],
    [
      /(LGTM|已合并|已批准|squash merge|merged|approved|CI 全绿|全绿|修复有效|\bresolved\b|\bresolve\b)/gi,
      "mark-good"
    ],
    [
      /(pending|soft[- ]?CI|软门禁|follow-up|后续|关注|CodeRabbit|reviewability ledger|not_reached)/gi,
      "mark-info"
    ],
    [
      /(导出 API|\bAPI\b|兼容性|\bsession\b|\brunner\b|\bmemory\b|GraphRAG|workspace_exec|OpenAPI|\bpolicy\b|security|安全)/gi,
      "mark-warn"
    ]
  ];
  for (const [pattern, className] of replacements) {
    html = html.replace(pattern, `<mark class="${className}">$1</mark>`);
  }
  return html;
}

function prs() {
  const groups = reportData.skipped_groups || [];
  const skipped = groups.flatMap(group =>
    (group.items || []).map(item => ({
      ...item,
      status: item.status || "skipped",
      skip_reason: item.skip_reason || group.reason
    }))
  );
  return [
    ...(reportData.approved || []),
    ...(reportData.commented || []),
    ...(reportData.maintained || []),
    ...(reportData.blocked || []),
    ...skipped
  ];
}

function skippedGroups() {
  return reportData.skipped_groups || [];
}

function counts(items) {
  const result = Object.fromEntries(statusOrder.map(status => [status, 0]));
  for (const item of items) {
    const status = item.status || "skipped";
    result[status] = (result[status] || 0) + 1;
  }
  return result;
}

function setLanguage(nextLang) {
  lang = nextLang;
  document.documentElement.lang = nextLang === "zh" ? "zh-CN" : "en";
  document.querySelectorAll("[data-lang-button]").forEach(button => {
    button.classList.toggle("active", button.dataset.langButton === nextLang);
  });
  render();
}

function renderStatic() {
  document.querySelectorAll("[data-i18n]").forEach(node => {
    node.textContent = labels[lang][node.dataset.i18n];
  });
  const repo = reportData.repo || "trpc-group/trpc-agent-go";
  const generated = reportData.generated_at || "2026-06-29T07:54:15.444Z";
  document.getElementById("subtitle").textContent = labels[lang].subtitle
    .replace("{repo}", repo)
    .replace("{time}", generated);
  document.getElementById("search").placeholder = labels[lang].search;
  document.getElementById("openAll").textContent = labels[lang].expandAll;
  document.getElementById("closeAll").textContent = labels[lang].collapseAll;
  document.getElementById("footer").textContent = labels[lang].footer;
}

function renderMetrics(items) {
  const totalComments = items.reduce((sum, item) =>
    sum + ((item.inline_comments || []).length || item.comment_count || 0), 0);
  const followups = (reportData.follow_up || []).length;
  const reviewed = items.filter(item =>
    ["approved", "commented", "maintained", "merged", "blocked"].includes(item.status)
  ).length;
  const metricRows = [
    [labels[lang].total, items.length],
    [labels[lang].reviewed, reviewed],
    [labels[lang].approved, items.filter(item =>
      ["approved", "merged"].includes(item.status)).length],
    [labels[lang].comments, totalComments],
    [labels[lang].followups, followups]
  ];
  document.getElementById("metrics").innerHTML = metricRows.map(([label, value]) => `
    <div class="metric">
      <div class="value">${value}</div>
      <div class="label">${escapeHtml(label)}</div>
    </div>
  `).join("");
}

function renderBars(items) {
  const byStatus = counts(items);
  const maxCount = Math.max(1, ...Object.values(byStatus));
  document.getElementById("bars").innerHTML = statusOrder.map(status => {
    const value = byStatus[status] || 0;
    const width = Math.max(3, Math.round((value / maxCount) * 100));
    return `
      <div class="bar-row">
        <div class="bar-label">${labels[lang][status]}</div>
        <div class="bar-track"><div class="bar-fill ${status}" style="width:${width}%"></div></div>
        <strong>${value}</strong>
      </div>
    `;
  }).join("");
}

function renderTimeline() {
  const events = reportData.timeline || [];
  const container = document.getElementById("timeline");
  if (!events.length) {
    container.innerHTML = `<div class="empty">${labels[lang].empty}</div>`;
    return;
  }
  container.innerHTML = events.map(event => `
    <div class="timeline-item">
      <div class="time">${escapeHtml(event.time || "")}</div>

}

function renderChips() {
  const chipRows = ["all", ...statusOrder];
  document.getElementById("chips").innerHTML = chipRows.map(status => `
    <button type="button" class="chip ${filter === status ? "active" : ""}"
      data-filter="${status}">${labels[lang][status]}</button>

    button.addEventListener("click", () => {
      filter = button.dataset.filter;
      renderCards();
      renderSkipGroups();
      renderFollowUp();
      renderChips();
    });

function matchesSearch(item, query) {
  if (!query) return true;
  const haystack = [
    item.number,
    text(item.title),
    item.author,
    text(item.problem),
    text(item.approach),
    text(item.outcome),
    text(item.skip_reason),
    text(item.group_reason),
    text(item.readiness_audit),
    blockersSearchText(item.blockers),
    text(item.risk),
    text(item.ci_state)
  ].join(" ").toLowerCase();
  return haystack.includes(query.toLowerCase());
}

function blockersSearchText(blockers) {
  if (!Array.isArray(blockers)) return "";
  return blockers.map(blocker => {
    if (typeof blocker !== "object" || blocker === null) return text(blocker);
    return [
      blocker.kind,
      blocker.summary,
      blocker.reviewer,
      blocker.path,
      blocker.line,
      blocker.latest_response,
      blocker.verification,
      blocker.url
    ].map(value => text(value)).join(" ");
  }).join(" ");
}

function field(label, value) {
  const body = text(value);
  if (!body) return "";
  return `<div class="field"><strong>${label}</strong><div class="field-body">${formatRich(body)}</div></div>`;
}

function renderBlockers(item) {
  const blockers = Array.isArray(item.blockers) ? item.blockers : [];
  if (!blockers.length) return "";
  const rendered = blockers.map(blocker => {
    const data = typeof blocker === "object" && blocker !== null
      ? blocker
      : { summary: blocker };
    const location = [data.path, data.line ? `:${data.line}` : ""].filter(Boolean).join("");
    const meta = [
      data.kind ? blockerKindLabel(data.kind) : "",
      data.reviewer ? `reviewer: ${text(data.reviewer)}` : "",
      location,
      data.latest_response ? `latest: ${text(data.latest_response)}` : "",
      data.verification ? text(data.verification) : ""
    ].filter(Boolean).join(" · ");
    const summary = formatRich(data.summary || blocker);
    const link = data.url
      ? ` <a href="${escapeHtml(data.url)}">link</a>`
      : "";
    return `<li class="blocker-item"><div>${summary}${link}</div>${meta ? `<div class="blocker-meta">${escapeHtml(meta)}</div>` : ""}</li>`;
  }).join("");
  return `<div class="skip-detail"><strong>${labels[lang].blockerDetails}:</strong></div><ul class="blocker-list">${rendered}</ul>`;
}

function blockerKindLabel(kind) {
  return (labels[lang].blockerKinds || {})[kind] || text(kind);
}

function inlineCommentText(comment) {
  if (comment === undefined || comment === null) return "";
  if (typeof comment !== "object" || Array.isArray(comment)) {
    return text(comment);
  }
  return text(comment.body || comment.summary || comment.message || "");
}

function allPrText(item) {
  const comments = (item.inline_comments || []).map(comment => [
    comment.severity,
    comment.focus,
    comment.body,
    comment.summary,
    comment.path
  ].map(value => text(value)).join(" ")).join(" ");
  const blockers = blockersSearchText(item.blockers);
  return [
    item.status,
    item.number,
    item.title,
    item.author,
    item.problem,
    item.approach,
    item.outcome,
    item.risk,
    item.ci_state,
    item.skip_reason,
    item.readiness_audit,
    item.modules,
    item.api_surface,
    comments,
    blockers
  ].map(value => text(value)).join(" ").toLowerCase();
}

function readingAdvice(item) {
  const status = item.status || "skipped";
  const comments = item.inline_comments || [];
  const blockers = item.blockers || [];
  const body = allPrText(item);
  const hasP1 = comments.some(comment =>
    /\bP[01]\b/i.test(text(comment.severity)) ||
    /\bP[01]\b/i.test(inlineCommentText(comment))
  );
  const hasCriticalRisk = hasP1 ||
    /(security|安全|bypass|绕过|breaking|破坏性|unbounded|无界|丢失|重复|不稳定|兼容|api|go-apidiff|failure|失败|不能 merge|不能合入|race|并发)/i.test(body);
  const highImpactFeature =
    /(add|new|新增|support|支持|agent|runner|session|memory|graphrag|knowledge|openapi|workspace_exec|policy|extension|tool|graph|api)/i.test(body);

  const copy = {
    critical: {
      icon: "🔥",
      zh: "重点精读",
      en: "Deep Read",
      reasonZh: comments.length
        ? `有 ${comments.length} 条行级评论，且包含 P1/兼容/正确性/安全类风险。`
        : "包含高风险兼容性或正确性信号，需要重点复核。",
      reasonEn: comments.length
        ? `${comments.length} inline comment(s), including P1, compatibility, correctness, or security risk.`
        : "High-risk compatibility or correctness signal; review carefully."
    },
    focus: {
      icon: "🔎",
      zh: "建议细看",
      en: "Read Carefully",
      reasonZh: comments.length
        ? `有 ${comments.length} 条评论或重要设计取舍，建议看完整结论。`
        : "涉及核心模块、导出 API 或较大功能，建议细看。",
      reasonEn: comments.length
        ? `${comments.length} comment(s) or important design tradeoffs; read the full conclusion.`
        : "Core module, exported API, or larger feature; read carefully."
    },
    skim: {
      icon: "✅",
      zh: "快速略看",
      en: "Quick Skim",
      reasonZh: "风险低或改动较直接，扫结论和 CI 状态即可。",
      reasonEn: "Low risk or straightforward change; skim outcome and CI state."
    },
    follow: {
      icon: "⏳",
      zh: "只看阻塞",
      en: "Blocker Only",
      reasonZh: blockers.length
        ? `主要看 ${blockers.length} 个具体阻塞点，暂不需要读完整实现。`
        : "当前不是可合并状态，先看阻塞和后续动作。",
      reasonEn: blockers.length
        ? `Focus on ${blockers.length} concrete blocker(s); no need to read the full implementation yet.`
        : "Not merge-ready; focus on blockers and next action."
    }
  };

  let level = "skim";
  if (status === "blocked") {
    level = "follow";
  } else if (status === "commented") {
    level = hasCriticalRisk ? "critical" : "focus";
  } else if (status === "maintained") {
    level = hasCriticalRisk || highImpactFeature ? "focus" : "skim";
  } else if (status === "approved") {
    level = hasCriticalRisk || highImpactFeature ? "focus" : "skim";
  } else if (status === "merged") {
    level = highImpactFeature || hasCriticalRisk ? "focus" : "skim";
  } else if (status === "skipped") {
    level = blockers.length || /(conflict|ci|failure|失败|未回应|review)/i.test(body)
      ? "follow"
      : "skim";
  }

  const selected = copy[level];
  return {
    level,
    icon: selected.icon,
    label: lang === "zh" ? selected.zh : selected.en,
    reason: lang === "zh" ? selected.reasonZh : selected.reasonEn
  };
}

function priorityRank(level) {
  return { critical: 4, focus: 3, follow: 2, skim: 1 }[level] || 0;
}

function renderReadingGuide(items) {
  const panel = document.getElementById("readingGuidePanel");
  const container = document.getElementById("readingGuide");
  const candidates = [
    ...items.filter(item => (item.status || "skipped") !== "skipped"),
    ...(reportData.follow_up || []).map(item => ({ ...item, status: item.status || "blocked" }))
  ].map(item => ({ item, advice: readingAdvice(item) }))
    .filter(entry => entry.advice.level !== "skim")
    .sort((left, right) => priorityRank(right.advice.level) - priorityRank(left.advice.level));

  if (!candidates.length) {
    panel.style.display = "none";
    container.innerHTML = "";
    return;
  }

  panel.style.display = "block";
  container.innerHTML = candidates.slice(0, 9).map(entry => {
    const item = entry.item;
    const advice = entry.advice;
    const prText = item.number ? `#${item.number}` : "PR";
    const prLink = item.url
      ? `<a href="${escapeHtml(item.url)}">${prText} · ${escapeHtml(text(item.title))}</a>`
      : `<span>${prText} · ${escapeHtml(text(item.title))}</span>`;
    return `
      <article class="guide-card ${advice.level}">
        <div class="guide-meta">
          <span class="read-pill ${advice.level}">${advice.icon} ${escapeHtml(advice.label)}</span>
          <span class="badge ${item.status || "skipped"}">${labels[lang][item.status] || item.status || labels[lang].skipped}</span>
        </div>
        <div>${prLink}</div>
        <div class="guide-reason">${escapeHtml(advice.reason)}</div>
      </article>
    `;
  }).join("");
}

function storyLine(label, value) {
  const body = text(value);
  if (!body) return "";
  return `
    <p class="story-line">
      <span class="story-label">${escapeHtml(label)}</span>
      <span class="story-text">${formatRich(body)}</span>
    </p>
  `;
}

function storyBlock(title, rows, className = "") {
  const body = rows.filter(Boolean).join("");
  if (!body) return "";
  const classes = ["story-block", className].filter(Boolean).join(" ");
  return `<section class="${classes}"><h4>${escapeHtml(title)}</h4>${body}</section>`;
}

function compactSummary(item) {
  const candidates = [
    item.outcome,
    item.skip_reason,
    item.reason,
    item.problem,
    item.design_assessment,
    item.risk
  ].map(value => text(value).trim()).filter(Boolean);
  return candidates[0] || labels[lang].summaryFallback;
}

  const open = card.classList.contains("open");
  button.textContent = open ? labels[lang].collapseDetails : labels[lang].expandDetails;
  button.setAttribute("aria-expanded", open ? "true" : "false");
}

function setCardOpen(card, open) {

}

  const body = text(value);
  if (!body) return "";

    <div class="fact">
      <dt>${escapeHtml(label)}</dt>
      <dd>${formatRich(body)}</dd>
    </div>
  `;
}

function directFixesText(fixes) {
  if (!Array.isArray(fixes) || !fixes.length) return "";
  return fixes.map(fix => {
    if (typeof fix !== "object" || fix === null) return text(fix);
    return [
      fix.branch ? `branch: ${text(fix.branch)}` : "",
      fix.commit ? `commit: ${text(fix.commit)}` : "",
      fix.message ? `message: ${text(fix.message)}` : "",
      fix.files ? `files: ${Array.isArray(fix.files) ? fix.files.map(file => text(file)).join(", ") : text(fix.files)}` : "",
      fix.tests ? `tests: ${Array.isArray(fix.tests) ? fix.tests.map(test => text(test)).join(", ") : text(fix.tests)}` : "",
      fix.push_state ? `push: ${text(fix.push_state)}` : "",
      fix.ci_state ? `CI: ${text(fix.ci_state)}` : ""
    ].filter(Boolean).join(" · ");
  }).join("\n");
}

function renderReviewRail(item) {
  const advice = readingAdvice(item);
  const callout = `
    <div class="reading-callout ${advice.level}">
      <strong>${advice.icon} ${escapeHtml(advice.label)}</strong>
      <span>${escapeHtml(advice.reason)}</span>
    </div>
  `;
  const facts = [
    factItem(labels[lang].outcome, item.outcome),
    factItem(labels[lang].risk, item.risk),
    factItem(labels[lang].ci, item.ci_state),
    factItem(labels[lang].attentionPoints, item.attention_points),
    factItem(labels[lang].directFixes, directFixesText(item.direct_fixes)),
    factItem(labels[lang].selfReviewPolicy, item.self_review_policy),
    factItem(labels[lang].testsDocs, item.tests_docs),
    factItem(labels[lang].modules, item.modules),
    factItem(labels[lang].apiSurface, item.api_surface),
    factItem(labels[lang].reason, item.skip_reason)
  ].filter(Boolean).join("");
  if (!facts) return `<aside class="review-rail">${callout}</aside>`;
  return `<aside class="review-rail">${callout}<h4>${labels[lang].reviewSummary}</h4><dl class="fact-list">${facts}</dl></aside>`;
}

function renderComments(item) {
  const comments = item.inline_comments || [];
  if (!comments.length) return "";
  const rendered = comments.map(comment => {
    const data = typeof comment === "object" && comment !== null && !Array.isArray(comment)
      ? comment
      : { body: comment };
    const location = `${escapeHtml(data.path || "")}${data.line ? ":" + escapeHtml(data.line) : ""}`;
    const source = data.url
      ? `<a class="comment-link" href="${escapeHtml(data.url)}">GitHub</a>`
      : "";
    return `
      <div class="comment">
        <div class="comment-head">
          <strong>${location}</strong>
          ${source}
        </div>
        <div>${formatRich(inlineCommentText(data))}</div>
        ${data.focus ? `<div><strong>${labels[lang].focus}:</strong> ${escapeHtml(text(data.focus))}</div>` : ""}
        ${data.severity ? `<div><strong>${labels[lang].severity}:</strong> ${escapeHtml(text(data.severity))}</div>` : ""}
      </div>
    `;
  }).join("");
  return `<section class="comments-panel">
    <h4>${labels[lang].inlineComments}</h4>
    <div class="comment-list">${rendered}</div>
  </section>`;
}

function renderPrReadout(item) {
  const story = [
    storyBlock(labels[lang].backgroundAndProblem, [
      storyLine(labels[lang].technicalBackground, item.technical_background),
      storyLine(labels[lang].problem, item.problem),
      storyLine(labels[lang].problemFraming, item.problem_framing),
      storyLine(labels[lang].rootCause, item.root_cause)
    ], "hero-block"),
    storyBlock(labels[lang].solutionAndTradeoffs, [
      storyLine(labels[lang].approach, item.approach),
      storyLine(labels[lang].alternativeDesigns, item.alternative_designs),
      storyLine(labels[lang].tradeoffs, item.tradeoffs),
      storyLine(labels[lang].designAssessment, item.design_assessment)
    ]),
    storyBlock(labels[lang].impactAndEvidence, [
      storyLine(labels[lang].changeInventory, item.change_inventory),
      storyLine(labels[lang].semanticChanges, item.semantic_changes),
      storyLine(labels[lang].behaviorImpact, item.behavior_impact),
      storyLine(labels[lang].moduleImpact, item.module_impact),
      storyLine(labels[lang].crossModuleImpact, item.cross_module_impact)
    ]),
    renderComments(item)
  ].filter(Boolean).join("");
  return `<div class="pr-readout"><div class="pr-story">${story}</div>${renderReviewRail(item)}</div>`;
}

function renderCards() {
  const query = document.getElementById("search").value.trim();
  const visible = prs().filter(item => (item.status || "skipped") !== "skipped")
    .filter(item => {
    const status = item.status || "skipped";
    return (filter === "all" || status === filter) && matchesSearch(item, query);
  });
  const container = document.getElementById("cards");
  if (!visible.length) {
    container.innerHTML = `<div class="empty">${labels[lang].empty}</div>`;
    return;
  }
  container.innerHTML = visible.map(item => {
    const status = item.status || "skipped";
    const advice = readingAdvice(item);
    const summary = compactSummary(item);
    const prText = item.number ? `#${item.number}` : "PR";
    const prLink = item.url
      ? `<a href="${escapeHtml(item.url)}">${prText}</a>`
      : prText;
    return `
      <article class="card priority-${advice.level}" data-status="${status}">
        <div class="card-head">
          <div>
            <div class="headline-row">
              <h3 class="card-title">${prLink} · ${escapeHtml(text(item.title))}</h3>
              <span class="read-pill ${advice.level}">${advice.icon} ${escapeHtml(advice.label)}</span>
            </div>
            <div class="meta">
              <span>${labels[lang].author}: ${escapeHtml(item.author || "")}</span>
              <span class="advice-reason">${escapeHtml(advice.reason)}</span>
            </div>
            <div class="card-summary">${formatRich(summary)}</div>
          </div>
          <div class="card-actions">
            <span class="badge ${status}">${labels[lang][status] || status}</span>
            <button class="card-toggle" type="button" aria-expanded="false">${labels[lang].expandDetails}</button>
          </div>
        </div>
        <div class="card-body">
          ${renderPrReadout(item)}
        </div>
      </article>
    `;
  }).join("");
  document.querySelectorAll(".card-head").forEach(head => {
    head.addEventListener("click", event => {
      if (event.target.closest("a")) return;
      const card = head.closest(".card");
      setCardOpen(card, !card.classList.contains("open"));
    });
  });
  document.querySelectorAll(".card").forEach(card => updateCardToggle(card));
}

function renderSkipGroups() {
  const heading = document.getElementById("skippedHeading");
  const container = document.getElementById("skipGroups");
  if (!["all", "skipped"].includes(filter)) {
    heading.style.display = "none";
    container.style.display = "none";
    return;
  }
  heading.style.display = "flex";
  container.style.display = "grid";
  const query = document.getElementById("search").value.trim();
  const groups = skippedGroups().map(group => {
    const reason = group.reason || "";
    const items = (group.items || []).map(item => ({
      ...item,
      status: item.status || "skipped",
      group_reason: reason,
      skip_reason: item.skip_reason || reason
    })).filter(item => matchesSearch(item, query));
    return { reason, items };
  }).filter(group => group.items.length > 0);
  if (!groups.length) {
    container.innerHTML = `<div class="empty">${labels[lang].empty}</div>`;
    return;
  }
  container.innerHTML = groups.map((group, index) => `
    <article class="skip-group open">
      <div class="skip-group-head" data-skip-group="${index}">
        <h3 class="skip-group-title">${escapeHtml(text(group.reason))}</h3>
        <span class="skip-group-count">${group.items.length} ${labels[lang].items}</span>
      </div>
      <div class="skip-group-body">
        ${group.items.map(item => {
          const prText = item.number ? `#${item.number}` : "PR";
          const prLink = item.url
            ? `<a href="${escapeHtml(item.url)}">${prText}</a>`
            : prText;
          return `
            <div class="skip-row">
              <div>
                <div class="skip-title">${prLink} · ${escapeHtml(text(item.title))}</div>
                <div class="skip-detail">${labels[lang].author}: ${escapeHtml(item.author || "")}</div>
              </div>
              <div>
                <div><strong>${labels[lang].blocker}:</strong> ${formatRich(text(item.skip_reason))}</div>
                ${item.readiness_audit ? `<div class="skip-detail"><strong>${labels[lang].readinessAudit}:</strong> ${formatRich(text(item.readiness_audit))}</div>` : ""}
                ${renderBlockers(item)}
                ${item.ci_state ? `<div class="skip-detail">${formatRich(text(item.ci_state))}</div>` : ""}
                ${item.risk ? `<div class="skip-detail">${formatRich(text(item.risk))}</div>` : ""}
              </div>
            </div>
          `;
        }).join("")}
      </div>
    </article>
  `).join("");
  document.querySelectorAll("[data-skip-group]").forEach(head => {
    head.addEventListener("click", () => {
      head.closest(".skip-group").classList.toggle("open");
    });
  });
}

function renderFollowUp() {
  const heading = document.getElementById("followUpHeading");
  const container = document.getElementById("followUpCards");
  if (!["all", "skipped", "blocked"].includes(filter)) {
    heading.style.display = "none";
    container.style.display = "none";
    return;
  }
  const query = document.getElementById("search").value.trim().toLowerCase();
  const items = (reportData.follow_up || []).filter(item => {
    if (!query) return true;
    return [
      item.number,
      item.author,
      text(item.title),
      text(item.reason),
      text(item.next)
    ].join(" ").toLowerCase().includes(query);
  });
  if (!items.length) {
    heading.style.display = "none";
    container.style.display = "none";
    return;
  }
  heading.style.display = "flex";
  container.style.display = "grid";
  container.innerHTML = items.map(item => {
    const prText = item.number ? `#${item.number}` : "PR";
    const prLink = item.url
      ? `<a href="${escapeHtml(item.url)}">${prText}</a>`
      : prText;
    return `
      <article class="card open" data-status="blocked">
        <div class="card-head">
          <div>
            <h3 class="card-title">${prLink} · ${escapeHtml(text(item.title))}</h3>
            <div class="meta">${labels[lang].author}: ${escapeHtml(item.author || "")}</div>
          </div>
          <span class="badge blocked">${labels[lang].followups}</span>
        </div>
        <div class="card-body">
          <div class="grid">
            ${field(labels[lang].reason, item.reason)}
            ${field(labels[lang].outcome, item.next)}
          </div>
        </div>
      </article>
    `;
  }).join("");
}

function render() {
  const items = prs();
  renderStatic();
  renderMetrics(items);
  renderBars(items);
  renderTimeline();
  renderOverview();
  renderReadingGuide(items);
  renderChips();
  renderCards();
  renderSkipGroups();
  renderFollowUp();
}

document.querySelectorAll("[data-lang-button]").forEach(button => {
  button.addEventListener("click", () => setLanguage(button.dataset.langButton));
});
document.getElementById("search").addEventListener("input", () => {
  renderCards();
  renderSkipGroups();
  renderFollowUp();
});
document.getElementById("openAll").addEventListener("click", () => {
  document.querySelectorAll(".card").forEach(card => setCardOpen(card, true));
  document.querySelectorAll(".skip-group").forEach(node => node.classList.add("open"));
});
document.getElementById("closeAll").addEventListener("click", () => {
  document.querySelectorAll(".card").forEach(card => setCardOpen(card, false));
  document.querySelectorAll(".skip-group").forEach(node => node.classList.remove("open"));
});
render();
</script>
</body>
</html>
