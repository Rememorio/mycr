.card[data-status="skipped"] .card-head { border-left-color: var(--info); }
.card[data-status="blocked"] .card-head { border-left-color: var(--bad); }
.card.priority-critical .card-head {
  background: linear-gradient(180deg, #fff7f8, #fff);
}
.card.priority-focus .card-head {
  background: linear-gradient(180deg, #fffbeb, #fff);
}
.card.priority-follow .card-head {
  background: linear-gradient(180deg, #eff6ff, #fff);
}
.card-title {
  font-size: 16px;
  line-height: 1.42;
}
.meta {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 7px;
}
.badge {
  gap: 7px;
  min-width: 0;
  padding: 6px 11px;
  text-transform: none;
  white-space: nowrap;
}
.card-summary {
  color: #526173;
  margin-top: 9px;
}
.badge::before {
  content: "";
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: currentColor;
}
.card-body {
  background: #fff;
  padding: 0 18px 18px;
}
.grid {
  grid-template-columns: 1fr;
  gap: 10px;
}
.field {
  background: #fbfcfe;
  border-color: #e6ecf3;
  padding: 13px 14px;
}
.field strong {
  color: #536175;
  font-size: 11px;
  letter-spacing: 0;
  text-transform: uppercase;
}
.field-body {
  color: #1f2937;
  line-height: 1.62;
}
.comment {
  background: #fff8ed;
  border-left-color: var(--accent-2);
  color: #1f2937;
}
.comment-head {
  color: #1f2937;
}
.pr-readout {
  grid-template-columns: minmax(0, 1fr);
  gap: 18px;
}
.story-block {
  border-top-color: #e2e8f0;
}
.story-block.hero-block {
  background: linear-gradient(180deg, #fbfffe, #f7fbfa);
  border-color: #d5e7e4;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
}
.story-block h4,
.review-rail h4,
.comments-panel h4 {
  font-size: 13px;
  font-weight: 900;
}
.story-line {
  grid-template-columns: 116px minmax(0, 1fr);
  border-top-color: #e9eef5;
}
.story-label {
  color: #607086;
}
.review-rail {
  border: 1px solid #e3eaf2;
  border-radius: 8px;
  padding: 14px;
  background: #fbfcfe;
}
.review-rail .fact-list {
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
}
.fact {
  border-top-color: #e8eef5;
}
.comments-panel {
  border-top-color: #e2e8f0;
}
.comment-list {
  gap: 12px;
}
.skip-group {
  box-shadow: var(--shadow);
}
.skip-group-head {
  align-items: center;
  background: linear-gradient(180deg, #fff, #fbfcfe);
}
.skip-row {
  grid-template-columns: minmax(0, 1.15fr) minmax(220px, 0.85fr);
}
.blocker-item {
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.75);
}
.empty {
  background: #fff;
  box-shadow: var(--shadow);
}
@media (max-width: 840px) {
  .topbar, .card-head { grid-template-columns: 1fr; display: grid; }
  .card-actions { align-items: flex-start; flex-direction: row; flex-wrap: wrap; }
  .dashboard, .grid, .metrics { grid-template-columns: 1fr; }
  .guide-grid { grid-template-columns: 1fr; }
  .headline-row { align-items: flex-start; flex-direction: column; }
  .pr-readout { grid-template-columns: 1fr; }
  .review-rail { position: static; }
  .story-line { grid-template-columns: 1fr; gap: 4px; }
  .timeline-item { grid-template-columns: 1fr; }
  .controls { position: static; }
  .utilities { width: 100%; margin-left: 0; }
  .utility-button { flex: 1 1 auto; }
  .skip-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div>
      <h1 data-i18n="title">MyCR 审核报告</h1>
      <p class="subtitle" id="subtitle"></p>
    </div>
    <div class="toggle" aria-label="Language">
      <button type="button" data-lang-button="zh" class="active">中文</button>
      <button type="button" data-lang-button="en">EN</button>
    </div>
  </div>
  <section class="metrics" id="metrics"></section>
  <section class="dashboard">
    <div class="panel">
      <h2 data-i18n="statusDistribution">状态分布</h2>
      <div class="bars" id="bars"></div>
    </div>
    <div class="panel">
      <h2 data-i18n="timeline">执行时间线</h2>
      <div class="timeline" id="timeline"></div>
    </div>
  </section>
  <section class="panel" id="overviewPanel" style="display: none; margin-top: 16px;">
    <h2 data-i18n="overviewSection">整体摘要</h2>
    <div class="overview-content" id="overviewContent"></div>
  </section>
  <section class="panel reading-guide" id="readingGuidePanel" style="display: none;">
    <div class="guide-head">
      <h2 data-i18n="readingGuide">阅读建议</h2>
      <span data-i18n="readingGuideHint">先看高风险和高影响 PR</span>
    </div>
    <div class="guide-grid" id="readingGuide"></div>
  </section>
  <section class="controls">
    <input class="search" id="search" type="search">
    <div class="chips" id="chips"></div>
    <div class="utilities">
      <button type="button" class="utility-button" id="openAll"></button>
      <button type="button" class="utility-button" id="closeAll"></button>
    </div>
  </section>
  <section class="section-heading">
    <h2 data-i18n="reviewedSection">已处理 PR</h2>
    <div class="hint" data-i18n="reviewedHint">点击卡片查看细节</div>
  </section>
  <main class="cards" id="cards"></main>
  <section class="section-heading" id="skippedHeading">
    <h2 data-i18n="skippedGroups">未审核 PR 分类</h2>
    <div class="hint" data-i18n="skippedHint">按排除原因分组</div>
  </section>
  <section class="skip-groups" id="skipGroups"></section>
  <section class="section-heading" id="followUpHeading">
    <h2 data-i18n="followUpSection">后续关注</h2>
    <div class="hint" data-i18n="followUpHint">接近可处理但仍有阻塞</div>
  </section>
  <section class="cards" id="followUpCards"></section>
  <section class="panel" id="evolutionPanel" style="display: none; margin-top: 18px;">
    <h2 data-i18n="selfEvolutionSection">自进化记录</h2>
    <div class="evolution-list" id="evolutionList"></div>
  </section>
  <div class="footer" id="footer"></div>
</div>
<script>
const reportData = {"approved":[],"blocked":[],"commented":[{"alternative_designs":"可以把 file-list 模式限定为 repo-root 相对路径；也可以取消 file-list 的任意文件能力，只接受 Git diff。脚本输出方面，可以让脚本直接输出到 stdout/stderr，也可以把 workspace out 目录作为显式 artifact 收集进报告和数据库。","api_surface":"新增示例模块，不修改主框架导出的 Go API；新增 CLI flags、Skill 文件结构、报告 JSON/Markdown、SQLite schema 和示例脚本契约。","approach":"PR 在 examples/code_review_agent 下新增独立 Go module，提供 Skill 目录、规则文档、脚本、diff parser、input source、permission policy、sandbox executor、redaction、store、report 和主程序。新 head 已接入 Skill 脚本、默认分支解析、workspace-local Go cache 和输出脱敏。","author":"Violet2314","behavior_impact":"新 head 仍会把 go vet 结果写入 workspace 文件而不进入报告；file-list 仍可读取仓库外路径并合成 diff。","change_inventory":"新增 code review Skill 包、规则引擎、diff parser、输入源、permission policy、沙箱执行、脱敏、报告、存储、telemetry 和测试 fixtures；新 head 修复部分上一轮问题但仍保留新增评论中的两个边界缺口。","ci_state":"GitHub 当前 head 有效检查全绿；本地 examples/code_review_agent 模块测试通过。","cross_module_impact":"依赖 codeexecutor、Skill repository、tool permission、telemetry、SQLite 和 redaction 相关库；安全依赖问题会传导到示例的沙箱故事。","design_assessment":"整体结构接近可接受的示例架构，但当前两个新增 blocker 都在安全审计边界上，属于合入前应修的问题。依赖安全问题已有当前线程继续阻塞。","evidence_checked":"读取 PR 描述、当前 head diff、上一轮 review threads、当前 discussion、GitHub checks、官方安全公告，并在独立 worktree 运行 `go test ./...` 于 examples/code_review_agent 模块。","head_sha":"e70441f070cc593a15c60c2a6ae7933ad8953ebd","implementation_derivation":"使用独立 example module 可以避免修改框架公共 API；把规则、脚本、报告和存储拆成内部包也符合示例可读性。但输入源和脚本产物仍必须进入同一审计链路，否则示例不能可靠证明它发现并记录了问题。","inline_comments":[{"body":"The vet output is written only to `$WORKSPACE_DIR/out/vet.txt`, but the pipeline never collects those workspace artifacts before cleanup, and exit code 1 is normalized to success. Real vet findings can therefore disappear from the report; please emit the captured output through `RunResult` or collect and persist `out/*.txt` before closing the workspace.\n\n<details><summary>中文<\/summary>\n\n`go vet` 的结果只写到 `$WORKSPACE_DIR/out/vet.txt`，但 pipeline 在清理 workspace 前没有收集这些产物，而且 exit code 1 会被当成成功。真实 vet 问题可能从报告里消失；请把捕获输出写回 `RunResult`，或在关闭 workspace 前收集并持久化 `out/*.txt`。\n\n<\/details>","line":21,"path":"examples/code_review_agent/skills/code-review/scripts/run_go_vet.sh","severity":"blocking","summary":"Skill 脚本把 go vet 输出写入 workspace 文件，但 pipeline 未收集该文件，真实 vet finding 会从报告消失。","url":"https://github.com/trpc-group/trpc-agent-go/pull/2177#discussion_r3563816548"},{"body":"File-list entries are read as arbitrary host paths here, so an absolute path or `../` entry can make the agent synthesize a diff from files outside the reviewed repository. Please require a repo root for file-list mode, resolve entries under that root, and reject absolute, traversing, symlink, or non-regular paths before `os.ReadFile`.\n\n<details><summary>中文<\/summary>\n\n这里把 file-list 条目当作任意宿主机路径读取，因此绝对路径或 `../` 条目会让 agent 从被审查仓库之外的文件合成 diff。请为 file-list 模式要求 repo root，把条目解析到该 root 下，并在 `os.ReadFile` 前拒绝绝对路径、目录穿越、符号链接和非普通文件。\n\n<\/details>","line":163,"path":"examples/code_review_agent/internal/inputsource/inputsource.go","severity":"blocking","summary":"file-list 模式直接读取任意宿主机路径，绝对路径或目录穿越会把仓库外文件合成 diff。","url":"https://github.com/trpc-group/trpc-agent-go/pull/2177#discussion_r3563816553"}],"issue_evidence_gaps":"仍缺少 scanner-clean 的依赖证明；同时脚本输出和 file-list 边界需要修复后才能证明报告链路完整、安全。","merge_policy":"human_required: PR 作者不是 OWNER/MEMBER/COLLABORATOR，且本轮未执行审批或合入；即使修完也需要人工明确选择后再处理审批或合入。","module_impact":"影响 examples/code_review_agent 独立模块及其依赖解析；如果被用户复制为模板，会影响其代码评审 agent 的输入边界和报告可信度。","modules":"examples/code_review_agent 主程序、internal/inputsource、internal/sandbox、skills/code-review/scripts、internal/report、internal/store、go.mod/go.sum。","necessity_assessment":"需求成立。仓库已有 Skills、codeexecutor、tool permission、telemetry 等基础能力，但缺少一个能演示自动代码评审闭环的综合示例；linked issue #2004 要求的方向与 PR 范围一致。","number":2177,"outcome":"提交 COMMENT review，新增 2 条 inline comments；未提交 LGTM、approval、request changes 或 merge。","problem":"PR 新增一个完整的 code review agent 示例，目标是把 Skills、Permission、沙箱执行、规则引擎、报告、存储、脱敏和 telemetry 串成可运行的样例，让使用者看到如何把框架能力组合成自动评审工作流。","problem_framing":"作者把问题定义为“缺少完整 code review agent 示例”。更深层的根因是框架能力分散在 Skills、沙箱、permission、storage 和 telemetry 多个模块，用户难以判断如何安全组合。","reproduction_on_base":"base 分支没有该示例目录，因此问题本身属于新增示例能力缺口；本轮验证集中在 PR head 的实现行为和新 head 对上一轮评论的修复情况。","review_action":"只提交 COMMENT review：https://github.com/trpc-group/trpc-agent-go/pull/2177#pullrequestreview-4677329216；没有 LGTM、approval 或 merge。","risk":"脚本输出丢失会导致真实 vet finding 无法审计；file-list 任意路径读取会破坏 repo-boundary 安全契约；依赖漏洞已有当前 review thread 仍未解决。","root_cause":"示例需要同时处理输入边界、执行边界、报告审计和依赖安全；如果任何一个边界被绕过，示例会给下游用户传递错误的安全模型。","semantic_changes":"对主框架无运行时语义变化；对示例用户新增从 diff/repo/file-list 读取、执行 vet/test/staticcheck、生成报告和存储审计记录的行为。","solution_fit_assessment":"方向正确，但当前实现还没有完全满足“安全、可审计代码评审 agent”的核心契约。file-list 读取任意宿主机路径和沙箱脚本输出丢失都会削弱示例的可信度。","status":"commented","technical_background":"`examples/code_review_agent` 是一个面向代码评审场景的端到端示例工程，展示如何从 diff 或文件列表读取待审内容、加载本地 Skill 包、执行静态规则、在沙箱里运行辅助检查、把发现写入报告和 SQLite，并对敏感信息做脱敏。这里的安全边界很重要：输入源必须只来自被审查仓库，沙箱输出必须可审计且不能泄露秘密，依赖图也会影响示例本身的安全可信度。","tests_docs":"本轮在 PR head 独立 worktree 执行 `go test ./...` 于 examples/code_review_agent，全部通过；文档和设计说明随 PR 新增。","title":"Feat/code review agent","tradeoffs":"直接读取文件和把工具输出写文件实现简单，但安全边界和审计链路变弱；要求 repo root 和 artifact 收集会增加少量代码，却能让示例的输入与输出都可追踪。","url":"https://github.com/trpc-group/trpc-agent-go/pull/2177"},{"alternative_designs":"可以使用专门的 shell/SSH 参数 parser；也可以将 SSH/SCP/SFTP 判定收窄为更保守策略，在解析不完整时默认要求人工确认。当前轻量解析方案可接受，但必须补齐常见 host-bearing options。","api_surface":"新增 tool/safety 包、policy YAML/JSON 字段、WithSafetyScanner hooks、示例命令和文档入口；对已有工具增加可选安全扫描集成。","approach":"PR 新增 policy loader、scanner、permission integration、redaction、audit、telemetry、内置工具 hooks、示例和文档；新 head 增加 sshLikeHosts、option operand 解析和相关回归测试。","author":"xyxhhhhh","behavior_impact":"当前 head 对 `ssh -i`、`ssh -p`、SCP/SFTP 目标和 ProxyJump 有改进，但 `HostName`、`-W`、端口转发等选项内 host 仍可能绕过 allowed_domains。","change_inventory":"新增 scanner 规则、policy loader、redaction、audit JSONL、telemetry attributes、内置工具 safety hooks、示例报告和中英文文档；新 head 增加 SSH option parsing tests。","ci_state":"GitHub 当前 head 有效检查全绿；本地目标包和示例测试通过。","cross_module_impact":"安全扫描结果会影响 PermissionPolicy 决策、工具执行路径、audit 输出、docs 示例和 telemetry 记录。","design_assessment":"整体设计方向正确，上一轮指出的基础 option-value case 已修；本轮发现的是同类安全边界的扩展覆盖缺口，应在合入前补齐。","evidence_checked":"读取 PR 描述、当前 head diff、上一轮 review thread、作者回复、当前 checks，并在独立 worktree 运行 tool/safety、hostexec、codeexec、workspaceexec 和 examples/tool_safety_guard 的目标测试。","head_sha":"8b5c3e0497bd410cb1f936ae656b5a273b5d0f48","implementation_derivation":"在 scanner 层解析命令参数是正确位置，因为 PermissionPolicy 和工具 hook 都依赖 scanner 的 verdict。要满足 allowed_domains 语义，所有能产生远端连接的 SSH 参数都需要在跳过前提取 host。","inline_comments":[{"body":"This only scans `-J` / `-o ProxyJump` operands, but the parser also consumes other host-bearing SSH operands such as `-o HostName=evil.example`, `-W evil.example:22`, and `-L 8080:evil.example:80`. When SSH is allowed and `allowed_domains` contains only the final target, those option hosts are discarded and the request can pass without a `TSG-NET-001` finding; please extract hosts from these operands before skipping them and add allowlist regression coverage.\n\n<details><summary>中文<\/summary>\n\n这里目前只扫描 `-J` / `-o ProxyJump` 的参数，但解析器同时会消费其他带主机名的 SSH 选项参数，例如 `-o HostName=evil.example`、`-W evil.example:22`、`-L 8080:evil.example:80`。当策略允许 SSH 且 `allowed_domains` 只包含最终登录目标时，这些选项里的主机会被丢弃，请在跳过参数前提取这些主机，并补充 allowlist 回归测试。\n\n<\/details>","line":1095,"path":"tool/safety/scanner.go","severity":"blocking","summary":"SSH 解析只提取 ProxyJump，HostName、-W、端口转发等 host-bearing 选项会被消费后绕过 allowed_domains。","url":"https://github.com/trpc-group/trpc-agent-go/pull/2174#discussion_r3563836762"}],"issue_evidence_gaps":"当前没有 linked issue；功能动机来自 PR 描述和安全边界需求。对 SSH HostName、-W、-L/-R 等选项还缺少 allowlist 回归测试。","merge_policy":"human_required: PR 作者不是 OWNER/MEMBER/COLLABORATOR，且本轮未执行审批或合入；修复后仍需人工明确选择审批或合入。","module_impact":"直接影响 tool/safety 与接入的内置工具；间接影响所有通过这些工具执行 shell/code/network 的 agent workflow。","modules":"tool/safety scanner/policy/ let lang = "zh";
let filter = "all";
const statusOrder = ["approved", "commented", "maintained", "merged", "skipped", "blocked"];

function text(value, fallback = "") {
  if (value === undefined || value === null || value === "") return fallback;
  if (typeof value === "object" && !Array.isArray(value)) {
    return value[lang] || value.zh || value.en || value.summary || value.body || value.mode || fallback;
  }
  return String(value);
}

function escapeHtml(value) {
  return text(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatRich(value) {
  let html = escapeHtml(value);
  const replacements = [
    [
      /(P[0-2]|codecov\/patch=FAILURE|go-apidiff=FAILURE|go-apidiff|FAILURE|失败|阻塞|不能合入|不能 merge|未合并|破坏性|breaking|unbounded|无界|绕过|丢失|重复|不稳定|风险)/gi,
      "mark-bad"
    ],
    [
      /(LGTM|已合并|已批准|squash merge|merged|approved|CI 全绿|全绿|修复有效|\bresolved\b|\bresolve\b)/gi,
      "mark-good"
    ],
    [
      /(pending|soft[- ]?CI|软门禁|follow-up|后续|关注|CodeRabbit|review readiness|not_reached)/gi,
      "mark-info"
    ],
    [
      /(导出 API|\bAPI\b|兼容性|\bsession\b|\brunner\b|\bmemory\b|GraphRAG|workspace_exec|OpenAPI|\bpolicy\b|security|安全)/gi,
      "mark-warn"
    ]
  ];
  for (const [pattern, className] of replacements) {
    html = html.replace(pattern, `<mark class="${className}">$1</mark>`);
  }
  return html;
}

function prs() {
  const skippedByNumber = new Map();
  for (const group of skippedGroups()) {
    for (const item of (group.items || [])) {
      const key = item.number ? String(item.number) : `${group.reason || "skipped"}:${text(item.title)}`;
      if (skippedByNumber.has(key)) continue;
      skippedByNumber.set(key, {
      ...item,
      status: item.status || "skipped",
      skip_reason: item.skip_reason || group.reason
      });
    }
  }
  const skipped = [...skippedByNumber.values()];
  return [
    ...(reportData.approved || []),
    ...(reportData.commented || []),
    ...(reportData.maintained || []),
    ...(reportData.blocked || []),
    ...skipped
  ];
}

function skippedGroups() {
  const processedNumbers = new Set([
    ...(reportData.approved || []),
    ...(reportData.commented || []),
    ...(reportData.maintained || []),
    ...(reportData.blocked || [])
  ].map(item => Number(item.number)).filter(Boolean));
  return (reportData.skipped_groups || []).map(group => {
    const existingItems = group.items || [];
    if (existingItems.length) {
      return {
        ...group,
        items: existingItems.filter(item => !processedNumbers.has(Number(item.number)))
      };
    }
    const items = (group.prs || []).filter(number => !processedNumbers.has(Number(number))).map(number => {
      const reason = group.reason || "skipped";
      const summary = text(group.title_zh || group.title || reason);
      return {
        number,
        title: `PR #${number}`,
        url: "",
        author: "",
        status: "skipped",
        skip_reason: summary,
        readiness_audit: summary,
        ci_state: "",
        blockers: [{
          kind: reason,
          summary
        }]
      };
    });
    return { ...group, items, count: items.length };
  }).filter(group => group.items.length > 0);
}

function counts(items) {
  const result = Object.fromEntries(statusOrder.map(status => [status, 0]));
  for (const item of items) {
    const status = item.status || "skipped";
    result[status] = (result[status] || 0) + 1;
  }
  return result;
}

function renderBars(items) {
  const byStatus = counts(items);
  const maxCount = Math.max(1, ...Object.values(byStatus));
  document.getElementById("bars").innerHTML = statusOrder.map(status => {
    const value = byStatus[status] || 0;
    const width = value === 0 ? 0 : Math.max(3, Math.round((value / maxCount) * 100));
    return `
      <div class="bar-row">
        <div class="bar-label">${labels[lang][status]}</div>
        <div class="bar-track"><div class="bar-fill ${status}" style="width:${width}%"></div></div>
        <strong>${value}</strong>

    `;
  }).join("");
}

function renderTimeline() {

  container.innerHTML = events.map(event => {

      ? event
      : { detail: event };
    const eventName = text(data.event || data.type || data.label || "");
    const detail = text(data.detail || data.text || (!eventName ? data : ""));
    const body = eventName && detail && eventName !== detail
      ? `<strong>${escapeHtml(eventName)}</strong><div>${formatRich(detail)}</div>`
      : formatRich(detail || eventName);
    return `
      <div class="timeline-item">
        <div class="time">${escapeHtml(data.time || "")}</div>
        <div>${body}</div>

  }).join("");

function matchesSearch(item, query) {
  if (!query) return true;
  const haystack = [
    item.number,
    text(item.title),
    item.author,
    text(item.problem),
    text(item.necessity_assessment),
    text(item.evidence_checked),
    text(item.reproduction_on_base),
    text(item.issue_evidence_gaps),
    text(item.approach),
    text(item.implementation_derivation),
    text(item.solution_fit_assessment),
    text(item.outcome),
    text(item.merge_policy),
    text(item.skip_reason),
    text(item.group_reason),
    text(item.readiness_audit),
    blockersSearchText(item.blockers),
    text(item.risk),
    text(item.ci_state)
  ].join(" ").toLowerCase();
  return haystack.includes(query.toLowerCase());
}

function blockersSearchText(blockers) {
  if (!Array.isArray(blockers)) return "";
  return blockers.map(blocker => {
    if (typeof blocker !== "object" || blocker === null) return text(blocker);
    return [
      blocker.kind,
      blocker.summary,
      blocker.reviewer,
      blocker.path,
      blocker.line,
      blocker.latest_response,
      blocker.verification,
      blocker.url
    ].map(value => text(value)).join(" ");
  }).join(" ");
}

function field(label, value) {
  const body = text(value);
  if (!body) return "";
  return `<div class="field"><strong>${label}</strong><div class="field-body">${formatRich(body)}</div></div>`;
}

function renderBlockers(item) {
  const blockers = Array.isArray(item.blockers) ? item.blockers : [];
  if (!blockers.length) return "";
  const isNonBlockerList = blockers.every(blocker => {
    const kind = typeof blocker === "object" && blocker !== null ? String(blocker.kind || "") : "";
    return kind === "not_reached";
  });
  const detailLabel = isNonBlockerList
    ? labels[lang].nonBlockerDetails
    : labels[lang].blockerDetails;
  const rendered = blockers.map(blocker => {
    const data = typeof blocker === "object" && blocker !== null
      ? blocker
      : { summary: blocker };
    const location = [data.path, data.line ? `:${data.line}` : ""].filter(Boolean).join("");
    const meta = [
      data.kind ? blockerKindLabel(data.kind) : "",
      data.reviewer ? `reviewer: ${text(data.reviewer)}` : "",
      location,
      data.latest_response ? `latest: ${text(data.latest_response)}` : "",
      data.verification ? text(data.verification) : ""
    ].filter(Boolean).join(" · ");
    const summary = formatRich(data.summary || blocker);
    const link = data.url
      ? ` <a href="${escapeHtml(data.url)}">link</a>`
      : "";
    return `<li class="blocker-item"><div>${summary}${link}</div>${meta ? `<div class="blocker-meta">${escapeHtml(meta)}</div>` : ""}</li>`;
  }).join("");
  return `<div class="skip-detail"><strong>${detailLabel}:</strong></div><ul class="blocker-list">${rendered}</ul>`;
}

function blockerKindLabel(kind) {
  return (labels[lang].blockerKinds || {})[kind] || text(kind);
}

  function inlineCommentText(comment) {
    if (comment === undefined || comment === null) return "";
    if (typeof comment !== "object" || Array.isArray(comment)) {
      return text(comment);
    }
    if (lang === "zh") {
      return text(comment.summary_zh || comment.summary || comment.body || comment.message || "");
    }
    return text(comment.body || comment.summary_en || comment.summary || comment.message || "");
  }

function allPrText(item) {
  const comments = (item.inline_comments || []).map(comment => [
    comment.severity,
    comment.focus,
    comment.body,
    comment.summary,
    comment.path
  ].map(value => text(value)).join(" ")).join(" ");
  const blockers = blockersSearchText(item.blockers);
  return [
    item.status,
    item.number,
    item.title,
    item.author,
    item.problem,
    item.necessity_assessment,
    item.evidence_checked,
    item.reproduction_on_base,
    item.issue_evidence_gaps,
    item.approach,
    item.implementation_derivation,
    item.solution_fit_assessment,
    item.outcome,
    item.risk,
    item.ci_state,
    item.skip_reason,
    item.readiness_audit,
    item.modules,
    item.api_surface,
    comments,
    blockers
  ].map(value => text(value)).join(" ").toLowerCase();
}

function readingAdvice(item) {
  const status = item.status || "skipped";
  const comments = item.inline_comments || [];
  const blockers = item.blockers || [];
  const body = allPrText(item);
  const hasP1 = comments.some(comment =>
    /\bP[01]\b/i.test(text(comment.severity)) ||
    /\bP[01]\b/i.test(inlineCommentText(comment))
  );
  const hasCriticalRisk = hasP1 ||
    /(security|安全|bypass|绕过|breaking|破坏性|unbounded|无界|丢失|重复|不稳定|兼容|api|go-apidiff|failure|失败|不能 merge|不能合入|race|并发)/i.test(body);
  const highImpactFeature =
    /(add|new|新增|support|支持|agent|runner|session|memory|graphrag|knowledge|openapi|workspace_exec|policy|extension|tool|graph|api)/i.test(body);

  const copy = {
    critical: {
      icon: "🔥",
      zh: "重点精读",
      en: "Deep Read",
      reasonZh: comments.length
        ? `有 ${comments.length} 条行级评论，且包含 P1/兼容/正确性/安全类风险。`
        : "包含高风险兼容性或正确性信号，需要重点复核。",
      reasonEn: comments.length
        ? `${comments.length} inline comment(s), including P1, compatibility, correctness, or security risk.`
        : "High-risk compatibility or correctness signal; review carefully."
    },
    focus: {
      icon: "🔎",
      zh: "建议细看",
      en: "Read Carefully",
      reasonZh: comments.length
        ? `有 ${comments.length} 条评论或重要设计取舍，建议看完整结论。`
        : "涉及核心模块、导出 API 或较大功能，建议细看。",
      reasonEn: comments.length
        ? `${comments.length} comment(s) or important design tradeoffs; read the full conclusion.`
        : "Core module, exported API, or larger feature; read carefully."
    },
    skim: {
      icon: "✅",
      zh: "快速略看",
      en: "Quick Skim",
      reasonZh: "风险低或改动较直接，扫结论和 CI 状态即可。",
      reasonEn: "Low risk or straightforward change; skim outcome and CI state."
    },
    follow: {
      icon: "⏳",
      zh: "只看阻塞",
      en: "Blocker Only",
      reasonZh: blockers.length
        ? `主要看 ${blockers.length} 个具体阻塞点，暂不需要读完整实现。`
        : "当前不是可合并状态，先看阻塞和后续动作。",
      reasonEn: blockers.length
        ? `Focus on ${blockers.length} concrete blocker(s); no need to read the full implementation yet.`
        : "Not merge-ready; focus on blockers and next action."
    }
  };

  let level = "skim";
  if (status === "blocked") {
    level = "follow";
  } else if (status === "commented") {
    level = hasCriticalRisk ? "critical" : "focus";
  } else if (status === "maintained") {
    level = hasCriticalRisk || highImpactFeature ? "focus" : "skim";
  } else if (status === "approved") {
    level = hasCriticalRisk || highImpactFeature ? "focus" : "skim";
  } else if (status === "merged") {
    level = highImpactFeature || hasCriticalRisk ? "focus" : "skim";
  } else if (status === "skipped") {
    level = blockers.length || /(conflict|ci|failure|失败|未回应|review)/i.test(body)
      ? "follow"
      : "skim";
  }

  const selected = copy[level];
  return {
    level,
    icon: selected.icon,
    label: lang === "zh" ? selected.zh : selected.en,
    reason: lang === "zh" ? selected.reasonZh : selected.reasonEn
  };
}

function priorityRank(level) {
  return { critical: 4, focus: 3, follow: 2, skim: 1 }[level] || 0;
}

function renderReadingGuide(items) {
  const panel = document.getElementById("readingGuidePanel");
  const container = document.getElementById("readingGuide");
  const candidates = [
    ...items.filter(item => (item.status || "skipped") !== "skipped"),
    ...(reportData.follow_up || []).map(item => {
      if (typeof item === "object" && item !== null && !Array.isArray(item)) {
        return { ...item, status: item.status || "blocked" };
      }
      const body = text(item);
      return { title: body, next: body, status: "blocked", plain: true };
    })
  ].map(item => ({ item, advice: readingAdvice(item) }))
    .filter(entry => entry.advice.level !== "skim")
    .sort((left, right) => priorityRank(right.advice.level) - priorityRank(left.advice.level));

  if (!candidates.length) {
    panel.style.display = "none";
    container.innerHTML = "";
    return;
  }

  panel.style.display = "block";
  container.innerHTML = candidates.slice(0, 9).map(entry => {
    const item = entry.item;
    const advice = entry.advice;
    const prText = item.number ? `#${item.number}` : "PR";
    const prLink = item.url
      ? `<a href="${escapeHtml(item.url)}">${prText} · ${escapeHtml(text(item.title))}</a>`
      : `<span>${prText} · ${escapeHtml(text(item.title))}</span>`;
    return `
      <article class="guide-card ${advice.level}">
        <div class="guide-meta">
          <span class="read-pill ${advice.level}">${advice.icon} ${escapeHtml(advice.label)}</span>
          <span class="badge ${item.status || "skipped"}">${labels[lang][item.status] || item.status || labels[lang].skipped}</span>
        </div>
        <div>${prLink}</div>
        <div class="guide-reason">${escapeHtml(advice.reason)}</div>
      </article>
    `;
  }).join("");
}

function compactSummary(item) {
  const candidates = [
    item.problem,
    item.design_assessment,
    item.solution_fit_assessment,
    item.approach,
    item.skip_reason,
    item.reason,
    item.outcome,
    item.risk
  ].map(value => text(value).trim()).filter(Boolean);
  return candidates[0] || labels[lang].summaryFallback;
}

function updateCardToggle(card) {
  const button = card.querySelector(".card-toggle");
  if (!button) return;
  const open = card.classList.contains("open");
  button.textContent = open ? labels[lang].collapseDetails : labels[lang].expandDetails;
  button.setAttribute("aria-expanded", open ? "true" : "false");
}

function setCardOpen(card, open) {
  card.classList.toggle("open", open);
  updateCardToggle(card);
}

function factItem(label, value) {
  const body = text(value);
  if (!body) return "";
  return `
    <div class="fact">
      <dt>${escapeHtml(label)}</dt>
      <dd>${formatRich(body)}</dd>
    </div>
  `;
}

function directFixesText(fixes) {
  if (!Array.isArray(fixes) || !fixes.length) return "";
  return fixes.map(fix => {
    if (typeof fix !== "object" || fix === null) return text(fix);
    return [
      fix.branch ? `branch: ${text(fix.branch)}` : "",
      fix.commit ? `commit: ${text(fix.commit)}` : "",
      fix.message ? `message: ${text(fix.message)}` : "",
      fix.files ? `files: ${Array.isArray(fix.files) ? fix.files.map(file => text(file)).join(", ") : text(fix.files)}` : "",
      fix.tests ? `tests: ${Array.isArray(fix.tests) ? fix.tests.map(test => text(test)).join(", ") : text(fix.tests)}` : "",
      fix.push_state ? `push: ${text(fix.push_state)}` : "",
      fix.ci_state ? `CI: ${text(fix.ci_state)}` : ""
    ].filter(Boolean).join(" · ");
  }).join("\n");
}

function renderReviewRail(item) {
  const advice = readingAdvice(item);
  const callout = `
    <div class="reading-callout ${advice.level}">
      <strong>${advice.icon} ${escapeHtml(advice.label)}</strong>
      <span>${escapeHtml(advice.reason)}</span>
    </div>
  `;
  const facts = [
    factItem(labels[lang].outcome, item.outcome),
    factItem(labels[lang].reviewAction, item.review_action),
    factItem(labels[lang].mergePolicy, item.merge_policy),
    factItem(labels[lang].headSha, item.head_sha),
    factItem(labels[lang].mergeCommit, item.merge_commit),
    factItem(labels[lang].necessityAssessment, item.necessity_assessment),
    factItem(labels[lang].reproductionOnBase, item.reproduction_on_base),
    factItem(labels[lang].solutionFitAssessment, item.solution_fit_assessment),
    factItem(labels[lang].risk, item.risk),
    factItem(labels[lang].ci, item.ci_state),
    factItem(labels[lang].attentionPoints, item.attention_points),
    factItem(labels[lang].directFixes, directFixesText(item.direct_fixes)),
    factItem(labels[lang].selfReviewPolicy, item.self_review_policy),
    factItem(labels[lang].testsDocs, item.tests_docs),
    factItem(labels[lang].modules, item.modules),
    factItem(labels[lang].apiSurface, item.api_surface),
    factItem(labels[lang].reason, item.skip_reason)
  ].filter(Boolean).join("");
  if (!facts) return `<aside class="review-rail">${callout}</aside>`;
  return `<aside class="review-rail">${callout}<h4>${labels[lang].reviewSummary}</h4><dl class="fact-list">${facts}</dl></aside>`;
}

function renderComments(item) {
  const comments = item.inline_comments || [];
  if (!comments.length) return "";
  const rendered = comments.map(comment => {
    const data = typeof comment === "object" && comment !== null && !Array.isArray(comment)
      ? comment
      : { body: comment };
    const location = `${escapeHtml(data.path || "")}${data.line ? ":" + escapeHtml(data.line) : ""}`;
    const source = data.url
      ? `<a class="comment-link" href="${escapeHtml(data.url)}">GitHub</a>`
      : "";
    return `
      <div class="comment">
        <div class="comment-head">
          <strong>${location}</strong>
          ${source}
        </div>
        <div>${formatRich(inlineCommentText(data))}</div>
        ${data.focus ? `<div><strong>${labels[lang].focus}:</strong> ${escapeHtml(text(data.focus))}</div>` : ""}
        ${data.severity ? `<div><strong>${labels[lang].severity}:</strong> ${escapeHtml(text(data.severity))}</div>` : ""}
      </div>
    `;
  }).join("");
  return `<section class="comments-panel">
    <h4>${labels[lang].inlineComments}</h4>
    <div class="comment-list">${rendered}</div>
  </section>`;
}

function renderPrReadout(item) {
  const story = [
    storyBlock(labels[lang].backgroundAndProblem, [
      storyLine(labels[lang].technicalBackground, item.technical_background),
      storyLine(labels[lang].problem, item.problem),
      storyLine(labels[lang].necessityAssessment, item.necessity_assessment),
      storyLine(labels[lang].evidenceChecked, item.evidence_checked),
      storyLine(labels[lang].reproductionOnBase, item.reproduction_on_base),
      storyLine(labels[lang].issueEvidenceGaps, item.issue_evidence_gaps),
      storyLine(labels[lang].problemFraming, item.problem_framing),
      storyLine(labels[lang].rootCause, item.root_cause)
    ], "hero-block"),
    storyBlock(labels[lang].solutionAndTradeoffs, [
      storyLine(labels[lang].approach, item.approach),
      storyLine(labels[lang].implementationDerivation, item.implementation_derivation),
      storyLine(labels[lang].solutionFitAssessment, item.solution_fit_assessment),
      storyLine(labels[lang].alternativeDesigns, item.alternative_designs),
      storyLine(labels[lang].tradeoffs, item.tradeoffs),
      storyLine(labels[lang].designAssessment, item.design_assessment)
    ]),
    storyBlock(labels[lang].impactAndEvidence, [
      storyLine(labels[lang].changeInventory, item.change_inventory),
      storyLine(labels[lang].semanticChanges, item.semantic_changes),
      storyLine(labels[lang].behaviorImpact, item.behavior_impact),
      storyLine(labels[lang].moduleImpact, item.module_impact),
      storyLine(labels[lang].crossModuleImpact, item.cross_module_impact)
    ]),
    renderComments(item)
  ].filter(Boolean).join("");
  return `<div class="pr-readout"><div class="pr-story">${story}</div>${renderReviewRail(item)}</div>`;
}

function renderCards() {
  const query = document.getElementById("search").value.trim();
  const visible = prs().filter(item => (item.status || "skipped") !== "skipped")
    .filter(item => {
    const status = item.status || "skipped";
    return (filter === "all" || status === filter) && matchesSearch(item, query);
  });
  const container = document.getElementById("cards");
  if (!visible.length) {
    container.innerHTML = `<div class="empty">${labels[lang].empty}</div>`;
    return;
  }
  container.innerHTML = visible.map(item => {
    const status = item.status || "skipped";
    const advice = readingAdvice(item);
    const summary = compactSummary(item);
    const prText = item.number ? `#${item.number}` : "PR";
    const prLink = item.url
      ? `<a href="${escapeHtml(item.url)}">${prText}</a>`
      : prText;
    return `
      <article class="card priority-${advice.level}" data-status="${status}">
        <div class="card-head">
          <div>
            <div class="headline-row">
              <h3 class="card-title">${prLink} · ${escapeHtml(text(item.title))}</h3>
              <span class="read-pill ${advice.level}">${advice.icon} ${escapeHtml(advice.label)}</span>
            </div>
            <div class="meta">
              <span>${labels[lang].author}: ${escapeHtml(item.author || "")}</span>
              <span class="advice-reason">${escapeHtml(advice.reason)}</span>
            </div>
            <div class="card-summary">${formatRich(summary)}</div>
          </div>
          <div class="card-actions">
            <span class="badge ${status}">${labels[lang][status] || status}</span>
            <button class="card-toggle" type="button" aria-expanded="false">${labels[lang].expandDetails}</button>
          </div>
        </div>
        <div class="card-body">
          ${renderPrReadout(item)}
        </div>
      </article>
    `;
  }).join("");
  document.querySelectorAll(".card-head").forEach(head => {
    head.addEventListener("click", event => {
      if (event.target.closest("a")) return;
      const card = head.closest(".card");
      setCardOpen(card, !card.classList.contains("open"));
    });
  });
  document.querySelectorAll(".card").forEach(card => updateCardToggle(card));
}

function renderSkipGroups() {
  const heading = document.getElementById("skippedHeading");
  const container = document.getElementById("skipGroups");
  if (!["all", "skipped"].includes(filter)) {
    heading.style.display = "none";
    container.style.display = "none";
    return;
  }
  heading.style.display = "flex";
  container.style.display = "grid";
  const query = document.getElementById("search").value.trim();
  const groups = skippedGroups().map(group => {
    const reason = group.reason || "";
    const title = lang === "zh"
      ? text(group.title_zh || group.title || group.reason)
      : text(group.title_en || group.title || group.reason);
    const items = (group.items || []).map(item => ({
      ...item,
      status: item.status || "skipped",
      group_reason: reason,
      skip_reason: item.skip_reason || reason
    })).filter(item => matchesSearch(item, query));
    return { reason, title, items };
  }).filter(group => group.items.length > 0);
  if (!groups.length) {
    container.innerHTML = `<div class="empty">${labels[lang].empty}</div>`;
    return;
  }
  container.innerHTML = groups.map((group, index) => `
    <article class="skip-group open">
      <div class="skip-group-head" data-skip-group="${index}">
        <h3 class="skip-group-title">${escapeHtml(text(group.title || group.reason))}</h3>
        <span class="skip-group-count">${group.items.length} ${labels[lang].items}</span>
      </div>
      <div class="skip-group-body">
        ${group.items.map(item => {
          const prText = item.number ? `#${item.number}` : "PR";
          const prLink = item.url
            ? `<a href="${escapeHtml(item.url)}">${prText}</a>`
            : prText;
          return `
            <div class="skip-row">
              <div>
                <div class="skip-title">${prLink} · ${escapeHtml(text(item.title))}</div>
                <div class="skip-detail">${labels[lang].author}: ${escapeHtml(item.author || "")}</div>
              </div>
              <div>
                <div><strong>${labels[lang].reason}:</strong> ${formatRich(text(item.skip_reason))}</div>
                ${item.readiness_audit ? `<div class="skip-detail"><strong>${labels[lang].readinessAudit}:</strong> ${formatRich(text(item.readiness_audit))}</div>` : ""}
                ${item.necessity_assessment ? `<div class="skip-detail"><strong>${labels[lang].necessityAssessment}:</strong> ${formatRich(text(item.necessity_assessment))}</div>` : ""}
                ${item.evidence_checked ? `<div class="skip-detail"><strong>${labels[lang].evidenceChecked}:</strong> ${formatRich(text(item.evidence_checked))}</div>` : ""}
                ${item.reproduction_on_base ? `<div class="skip-detail"><strong>${labels[lang].reproductionOnBase}:</strong> ${formatRich(text(item.reproduction_on_base))}</div>` : ""}
                ${item.issue_evidence_gaps ? `<div class="skip-detail"><strong>${labels[lang].issueEvidenceGaps}:</strong> ${formatRich(text(item.issue_evidence_gaps))}</div>` : ""}
                ${item.implementation_derivation ? `<div class="skip-detail"><strong>${labels[lang].implementationDerivation}:</strong> ${formatRich(text(item.implementation_derivation))}</div>` : ""}
                ${item.solution_fit_assessment ? `<div class="skip-detail"><strong>${labels[lang].solutionFitAssessment}:</strong> ${formatRich(text(item.solution_fit_assessment))}</div>` : ""}
                ${renderBlockers(item)}
                ${item.ci_state ? `<div class="skip-detail">${formatRich(text(item.ci_state))}</div>` : ""}
                ${item.risk ? `<div class="skip-detail">${formatRich(text(item.risk))}</div>` : ""}
              </div>
            </div>
          `;
        }).join("")}
      </div>
    </article>
  `).join("");
  document.querySelectorAll("[data-skip-group]").forEach(head => {
    head.addEventListener("click", () => {
      head.closest(".skip-group").classList.toggle("open");
    });
  });
}

function renderFollowUp() {
  const heading = document.getElementById("followUpHeading");
  const container = document.getElementById("followUpCards");
  if (!["all", "skipped", "blocked"].includes(filter)) {
    heading.style.display = "none";
    container.style.display = "none";
    return;
  }
  const query = document.getElementById("search").value.trim().toLowerCase();
  const items = (reportData.follow_up || []).map(item => {
    if (typeof item === "object" && item !== null && !Array.isArray(item)) return item;
    const body = text(item);
    return {
      title: body,
      next: body,
      plain: true
    };
  }).filter(item => {
    if (!query) return true;
    return [
      item.number,
      item.author,
      text(item.title),
      text(item.reason),
      text(item.next)
    ].join(" ").toLowerCase().includes(query);
  });
  if (!items.length) {
    heading.style.display = "none";
    container.style.display = "none";
    return;
  }
  heading.style.display = "flex";
  container.style.display = "grid";
  container.innerHTML = items.map(item => {
    const hasPrIdentity = Boolean(item.number || item.url);
    const prText = item.number ? `#${item.number}` : "PR";
    const prLink = item.url
      ? `<a href="${escapeHtml(item.url)}">${prText}</a>`
      : prText;
    const title = escapeHtml(text(item.title || item.next || item.reason));
    const cardTitle = hasPrIdentity ? `${prLink} · ${title}` : title;
    const meta = item.author
      ? `<div class="meta">${labels[lang].author}: ${escapeHtml(item.author)}</div>`
      : "";
    const body = item.plain
      ? `<div>${formatRich(text(item.next || item.title))}</div>`
      : `<div class="grid">
          ${field(labels[lang].reason, item.reason)}
          ${field(labels[lang].outcome, item.next)}
        </div>`;
    return `
      <article class="card open" data-status="blocked">
        <div class="card-head">
          <div>
            <h3 class="card-title">${cardTitle}</h3>
            ${meta}
          </div>
          <span class="badge blocked">${labels[lang].followups}</span>
        </div>
        <div class="card-body">
          ${body}
        </div>
      </article>
    `;
  }).join("");
}

function renderEvolution() {
  const panel = document.getElementById("evolutionPanel");
  const container = document.getElementById("evolutionList");
  const items = reportData.skill_evolution || [];
  if (!items.length) {
    panel.style.display = "none";
    container.innerHTML = "";
    return;
  }
  panel.style.display = "block";
  container.innerHTML = items.map(item => {
    const data = typeof item === "object" && item !== null && !Array.isArray(item)
      ? item
      : { area: labels[lang].selfEvolutionSection, note: item };
    return `
      <article class="evolution-item">
        <div class="evolution-area">${escapeHtml(text(data.area || labels[lang].selfEvolutionSection))}</div>
        <div class="evolution-note">${formatRich(text(data.note || data.summary || data.body || ""))}</div>
      </article>
    `;
  }).join("");
}

function render() {
  const items = prs();
  renderStatic();
  renderMetrics(items);
  renderBars(items);
  renderTimeline();
  renderOverview();
  renderReadingGuide(items);
  renderChips();
  renderCards();
  renderSkipGroups();
  renderFollowUp();
  renderEvolution();
}

document.querySelectorAll("[data-lang-button]").forEach(button => {
  button.addEventListener("click", () => setLanguage(button.dataset.langButton));
});
document.getElementById("search").addEventListener("input", () => {
  renderCards();
  renderSkipGroups();
  renderFollowUp();
});
document.getElementById("openAll").addEventListener("click", () => {
  document.querySelectorAll(".card").forEach(card => setCardOpen(card, true));
  document.querySelectorAll(".skip-group").forEach(node => node.classList.add("open"));
});
document.getElementById("closeAll").addEventListener("click", () => {
  document.querySelectorAll(".card").forEach(card => setCardOpen(card, false));
  document.querySelectorAll(".skip-group").forEach(node => node.classList.remove("open"));
});
render();
</script>
</body>
</html>
