.card[data-status="skipped"] .card-head { border-left-color: var(--info); }
.card[data-status="blocked"] .card-head { border-left-color: var(--bad); }
.card.priority-critical .card-head {
  background: linear-gradient(180deg, #fff7f8, #fff);
}
.card.priority-focus .card-head {
  background: linear-gradient(180deg, #fffbeb, #fff);
}
.card.priority-follow .card-head {
  background: linear-gradient(180deg, #eff6ff, #fff);
}
.card-title {
  font-size: 16px;
  line-height: 1.42;
}
.meta {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 7px;
}
.badge {
  gap: 7px;
  min-width: 0;
  padding: 6px 11px;
  text-transform: none;
  white-space: nowrap;
}
.card-summary {
  color: #526173;
  margin-top: 9px;
}
.badge::before {
  content: "";
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: currentColor;
}
.card-body {
  background: #fff;
  padding: 0 18px 18px;
}
.grid {
  grid-template-columns: 1fr;
  gap: 10px;
}
.field {
  background: #fbfcfe;
  border-color: #e6ecf3;
  padding: 13px 14px;
}
.field strong {
  color: #536175;
  font-size: 11px;
  letter-spacing: 0;
  text-transform: uppercase;
}
.field-body {
  color: #1f2937;
  line-height: 1.62;
}
.comment {
  background: #fff8ed;
  border-left-color: var(--accent-2);
  color: #1f2937;
}
.comment-head {
  color: #1f2937;
}
.pr-readout {
  grid-template-columns: minmax(0, 1fr);
  gap: 18px;
}
.story-block {
  border-top-color: #e2e8f0;
}
.story-block.hero-block {
  background: linear-gradient(180deg, #fbfffe, #f7fbfa);
  border-color: #d5e7e4;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
}
.story-block h4,
.review-rail h4,
.comments-panel h4 {
  font-size: 13px;
  font-weight: 900;
}
.story-line {
  grid-template-columns: 116px minmax(0, 1fr);
  border-top-color: #e9eef5;
}
.story-label {
  color: #607086;
}
.review-rail {
  border: 1px solid #e3eaf2;
  border-radius: 8px;
  padding: 14px;
  background: #fbfcfe;
}
.review-rail .fact-list {
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
}
.fact {
  border-top-color: #e8eef5;
}
.comments-panel {
  border-top-color: #e2e8f0;
}
.comment-list {
  gap: 12px;
}
.skip-group {
  box-shadow: var(--shadow);
}
.skip-group-head {
  align-items: center;
  background: linear-gradient(180deg, #fff, #fbfcfe);
}
.skip-row {
  grid-template-columns: minmax(0, 1.15fr) minmax(220px, 0.85fr);
}
.blocker-item {
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.75);
}
.empty {
  background: #fff;
  box-shadow: var(--shadow);
}
@media (max-width: 840px) {
  .topbar, .card-head { grid-template-columns: 1fr; display: grid; }
  .card-actions { align-items: flex-start; flex-direction: row; flex-wrap: wrap; }
  .dashboard, .grid, .metrics { grid-template-columns: 1fr; }
  .guide-grid { grid-template-columns: 1fr; }
  .headline-row { align-items: flex-start; flex-direction: column; }
  .pr-readout { grid-template-columns: 1fr; }
  .review-rail { position: static; }
  .story-line { grid-template-columns: 1fr; gap: 4px; }
  .timeline-item { grid-template-columns: 1fr; }
  .controls { position: static; }
  .utilities { width: 100%; margin-left: 0; }
  .utility-button { flex: 1 1 auto; }
  .skip-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div>
      <h1 data-i18n="title">MyCR 审核报告</h1>
      <p class="subtitle" id="subtitle"></p>
    </div>
    <div class="toggle" aria-label="Language">
      <button type="button" data-lang-button="zh" class="active">中文</button>
      <button type="button" data-lang-button="en">EN</button>
    </div>
  </div>
  <section class="metrics" id="metrics"></section>
  <section class="dashboard">
    <div class="panel">
      <h2 data-i18n="statusDistribution">状态分布</h2>
      <div class="bars" id="bars"></div>
    </div>
    <div class="panel">
      <h2 data-i18n="timeline">执行时间线</h2>
      <div class="timeline" id="timeline"></div>
    </div>
  </section>
  <section class="panel" id="overviewPanel" style="display: none; margin-top: 16px;">
    <h2 data-i18n="overviewSection">整体摘要</h2>
    <div class="overview-content" id="overviewContent"></div>
  </section>
  <section class="panel reading-guide" id="readingGuidePanel" style="display: none;">
    <div class="guide-head">
      <h2 data-i18n="readingGuide">阅读建议</h2>
      <span data-i18n="readingGuideHint">先看高风险和高影响 PR</span>
    </div>
    <div class="guide-grid" id="readingGuide"></div>
  </section>
  <section class="controls">
    <input class="search" id="search" type="search">
    <div class="chips" id="chips"></div>
    <div class="utilities">
      <button type="button" class="utility-button" id="openAll"></button>
      <button type="button" class="utility-button" id="closeAll"></button>
    </div>
  </section>
  <section class="section-heading">
    <h2 data-i18n="reviewedSection">已处理 PR</h2>
    <div class="hint" data-i18n="reviewedHint">点击卡片查看细节</div>
  </section>
  <main class="cards" id="cards"></main>
  <section class="section-heading" id="skippedHeading">
    <h2 data-i18n="skippedGroups">未审核 PR 分类</h2>
    <div class="hint" data-i18n="skippedHint">按排除原因分组</div>
  </section>
  <section class="skip-groups" id="skipGroups"></section>
  <section class="section-heading" id="followUpHeading">
    <h2 data-i18n="followUpSection">后续关注</h2>
    <div class="hint" data-i18n="followUpHint">接近可处理但仍有阻塞</div>
  </section>
  <section class="cards" id="followUpCards"></section>
  <section class="panel" id="evolutionPanel" style="display: none; margin-top: 18px;">
    <h2 data-i18n="selfEvolutionSection">自进化记录</h2>
    <div class="evolution-list" id="evolutionList"></div>
  </section>
  <div class="footer" id="footer"></div>
</div>
<script>
const reportData = {"approved":[],"blocked":[],"commented":[{"alternative_designs":"可以把 gate facts 和 gate decision 拆成两个结构，也可以保留当前结构但将 reason 生成分为 facts-reason 与 reject-reason 两段；更强的做法是用 table-driven tests 覆盖每个配置开关组合。","api_surface":"没有新增框架公共 API；用户可见面是示例 CLI 参数、配置文件字段、README/DESIGN 文档和 sample 报告格式。","approach":"PR 新增 `examples/evaluation/promptiter_regression_loop`，包含 fake 与 trace-smoke 两种模式、训练/验证/trace evalset、metrics、PromptIter 配置、delta/gate/attribution 逻辑、可复现 sample report、README 和 DESIGN.md。","author":"Spock12138","behavior_impact":"修复后，即使 `RejectOnCriticalRegression=false`，报告也应继续列出 critical regression cases，只是不把 gate decision 置为 reject。","blockers":[{"kind":"implementation_scope","line":306,"path":"examples/evaluation/promptiter_regression_loop/analysis.go","summary":"Final gate reason generation can report that critical regressions do not exist when only rejection is disabled.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2186#discussion_r3572764777","verification":"Verified on head=3516f70831a10d4299876f415f484bde897e70b2; local promptiter_regression_loop tests passed."}],"change_inventory":"新增示例目录、配置、evalset、fake model pipeline、trace-smoke 模式、final gate、sample report、README/DESIGN 和测试。","ci_state":"All effective checks are green at the time of review.","cross_module_impact":"不影响框架运行时 API，但示例会作为 Evaluation/PromptIter 推荐用法被用户复制，因此报告语义错误会扩散到下游。","design_assessment":"整体示例设计可接受，当前发现是报告可信度问题，属于合入前应修复的行为 bug。","evidence_checked":"核对了 PR body、linked issue #2003、README 对 `rejectOnCriticalRegression=false` 的合同说明、`analysis.go` 的 final gate 逻辑、当前 head=3516f70831a10d4299876f415f484bde897e70b2，并运行 `go test ./promptiter_regression_loop -count=1` 通过。","head_sha":"3516f70831a10d4299876f415f484bde897e70b2","implementation_derivation":"示例目录内实现是合适的局部范围，因为它不改变公共 API，只演示现有 Evaluation/PromptIter 能力组合。评论要求的修复也应局部落在 gate reason 构造逻辑和测试上。","inline_comments":[{"body":"When `RejectOnCriticalRegression` is false, this branch still reports `no critical regression` even when `report.CriticalRegressions` is non-empty; the `NewHardFails` branch above has the same issue. Please separate “the cases exist” from “the gate rejects on them”: always record the actual cases when present, and only toggle `reject` based on the config flag.\n\n<details><summary>中文<\/summary>\n\n当 `RejectOnCriticalRegression=false` 时，即使 `report.CriticalRegressions` 非空，这里仍会输出 `no critical regression`；上面的 `NewHardFails` 分支也有同样问题。建议把“这些 case 是否存在”和“gate 是否因此 reject”拆开：有 case 就如实记录 case，只由配置决定是否把 `reject` 置为 true。\n\n<\/details>","focus":"release gate reporting","line":306,"path":"examples/evaluation/promptiter_regression_loop/analysis.go","severity":"medium","url":"https://github.com/trpc-group/trpc-agent-go/pull/2186#discussion_r3572764777"}],"issue_evidence_gaps":"缺少覆盖“关闭 reject 但仍保留 new hard fail / critical regression 统计”的单元测试。","merge_policy":{"current_evidence_checked":"author_association=CONTRIBUTOR; linked issue #2003; one new inline comment posted.","mode":"human_required","reason":"contributor-program example PR requires explicit maintainer/program confirmation before final acceptance.","required_evidence":"Maintainer confirms the fixed example is the accepted task solution."},"module_impact":"直接影响示例报告可信度；间接影响维护者和贡献者理解 PromptIter release gate 的方式。","modules":"主要改动在 `examples/evaluation/promptiter_regression_loop`，其中 `analysis.go` 负责 delta、failure attribution 和 final gate；`pipeline.go` 负责跑 fake/trace 流程；`report.go` 负责 JSON/Markdown 输出。","necessity_assessment":"需求成立，但属于 Rhino Bird 任务类示例，最终是否作为该任务接受仍需要人工项目维护者确认。本轮发现的是 gate report 文案会在关闭拒绝开关时误报统计不存在。","number":2186,"outcome":"提交 1 条 inline comment，要求拆分 gate facts 与 reject decision；未提交审批或合入。","problem":"PR 解决的是 issue #2003 要求的可复现 PromptIter 回归闭环示例：现有仓库有 Evaluation 和 PromptIter 原语，但缺少一个不依赖真实 API key、可以展示 baseline、优化、验证、失败归因、发布 gate 和 JSON/Markdown 报告的完整示例。","problem_framing":"PR 把 PromptIter 接受策略和最终发布 gate 分开是正确方向：优化器可以接受一个分数提升的候选，但发布 gate 仍需要拒绝关键回归。当前 bug 的根因是代码把“是否存在回归”和“配置是否因此 reject”写成了同一个 if/else。","reproduction_on_base":"这是新增示例内的行为，base 分支没有该目录；复核方式是在当前 head 上阅读 gate 逻辑并对照 README 合同。","review_action":"Posted one inline GitHub review comment; no approval, LGTM, request-changes review, or merge was submitted.","risk":"如果不修复，示例可能在报告中同时保留 regression 数组又写出 no critical regression，削弱审计报告可信度。","root_cause":"`analysis.go` 先收集 `NewHardFails` 和 `CriticalRegressions`，但生成 reasons 时只有 `RejectOn... && len(...) > 0` 才输出 case 列表；配置关闭 reject 时会走 else，写出 `no new hard fail` / `no critical regression`。","semantic_changes":"示例展示了 baseline 评测、候选优化、验证集回归检查和发布 gate；本轮评论指出关闭 reject 开关时报告语义会错误声称没有回归。","solution_fit_assessment":"用显式 release gate 表达“平均分提升但关键用例回归不能发布”是正确控制面；需要保证报告文案忠实反映统计事实，配置只决定是否 reject，不应抹掉事实。","status":"commented","technical_background":"Evaluation 是框架用来把 agent 输出和期望行为做可重复对比的模块；PromptIter 是在评测结果基础上迭代提示词或工具描述的优化流程。这个示例把 llmagent、runner、AgentEvaluator、PromptIter engine、fake model、trace replay 和最终 release gate 串成一个闭环，让维护者可以看到提示词优化不仅要看平均分，还要看 held-out case、关键用例回归和审计报告。","tests_docs":"本轮局部测试 `go test ./promptiter_regression_loop -count=1` 通过；建议补充配置开关为 false 且仍存在回归的单元测试。","title":"examples/evaluation: add PromptIter regression loop","tradeoffs":"拆结构更清晰但改动略大；局部调整 reason 分支改动最小。无论哪种方案，都要避免报告中出现与 JSON 统计相反的文字。","url":"https://github.com/trpc-group/trpc-agent-go/pull/2186"},{"alternative_designs":"一种设计是 preset tools 只做直接可调用工具，不纳入 tool_search；另一种是 preset tools 同时进入搜索索引但不需要延迟加载；也可以保留旧 API wrapper，把 always-include 显式映射到新语义。","api_surface":"公共面大幅变化：`New(model.Model, ...Option) (*ToolSearch, error)` 变为 `New([]tool.Tool, ...Option) *Plugin`，并新增 toolbox、MCP、knowledge、permission filter、dispatch invocation mode 等选项；旧 `ToolSearch` / `Config` / `WithAlwaysInclude` 等 API 被移除或替换。","approach":"PR 新增 `Toolbox`、`MCPToolbox`、`ToolKnowledge`、`ToolPermissionFilter`、`NativeToolCalls` / `DispatchToolCalls`，重写 catalog 注入、session loaded-tools、keyword/embedding search、MCP materialization 和迁移文档。","author":"qiefengying","behavior_impact":"当前 query/embedding 搜索不会覆盖 preset tools，但文档承诺会覆盖；修复后需要二选一：行为跟文档一致，或文档跟行为一致。","blockers":[{"kind":"solution_fit","line":544,"path":"plugin/toolsearch/search.go","summary":"Preset tools are documented as searchable through tool_search, but query and embedding candidates only include deferred tools.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2137#discussion_r3572791049","verification":"Verified on head=8aee7103bc4e8451850008523a0e2d2e482b60b2."},{"kind":"非阻断检查","summary":"go-apidiff reports public API removals/changes and requires maintainer design acceptance before merge.","verification":"Current effective check go-apidiff=FAILURE."}],"change_inventory":"重写 toolsearch 插件、补充大量单元测试和集成准确率 benchmark，新增 MCP 工具箱、embedding search、permission filter、dispatch `call_tool`，并更新中英文文档。","ci_state":"non_green=1; go-apidiff=FAILURE. This is a soft review gate but a hard merge/design signal for this public API change.","cross_module_impact":"调用方的 llmagent tool 注册、runner plugin 挂载、docs 示例、go-apidiff 兼容性和外部 consumer 编译都会受影响。","design_assessment":"当前实现需要人工确认破坏性 API 迁移策略，并修正 preset searchable 合同；本轮新增一条 changed-line comment，避免只停留在 broad compatibility discussion。","evidence_checked":"核对了当前 head=8aee7103bc4e8451850008523a0e2d2e482b60b2、`plugin/toolsearch/search.go`、`knowledge.go`、英文/中文 tool 文档、已有 liuzengh 兼容性评论、以及当前 `go-apidiff` 失败状态。","head_sha":"8aee7103bc4e8451850008523a0e2d2e482b60b2","implementation_derivation":"用 namespace 和 dispatch 模式承载大工具集是合理方向；但 preset tools 是一直暴露的普通工具还是也参与搜索索引，是必须在 `New(presetTools, ...)` 和文档里一致定义的合同。","inline_comments":[{"body":"`tool_search` query mode only searches `p.deferredNames`, and the embedding path uses the same deferred-only candidate source. That conflicts with the new docs saying preset tools passed to `New(presetTools, ...)` stay searchable through `tool_search`; a migrated `WithAlwaysInclude` tool becomes undiscoverable by natural-language queries unless the model already knows the exact name. Please either include preset tools in the keyword/embedding candidates with tests, or change the migration docs to state that preset tools are only directly advertised / exact-name resolvable.\n\n<details><summary>中文<\/summary>\n\n这里的 `tool_search` query 路径只搜索 `p.deferredNames`，embedding 路径也使用同样的“仅延迟工具”候选集；但新文档写的是传给 `New(presetTools, ...)` 的 preset 工具仍可以通过 `tool_search` 搜索。这样从 `WithAlwaysInclude` 迁移过来的工具，除非模型已经知道精确工具名，否则无法通过自然语言 query 发现。建议要么把 preset 工具纳入 keyword / embedding 候选并补测试，要么把迁移文档改清楚：preset 工具只会直接暴露 / 只能精确名解析。\n\n<\/details>","focus":"preset tool search contract","line":544,"path":"plugin/toolsearch/search.go","severity":"medium","url":"https://github.com/trpc-group/trpc-agent-go/pull/2137#discussion_r3572791049"}],"issue_evidence_gaps":"需要维护者明确决定这个 PR 是保持源码兼容、提供 deprecated wrapper，还是接受破坏性迁移并同步 release/migration 文档。","merge_policy":{"current_evidence_checked":"go-apidiff still failing; existing maintainer compatibility discussion is active.","mode":"human_required","reason":"broad public API migration and first-time contributor PR require explicit maintainer design acceptance.","required_evidence":"Maintainer confirms the breaking API/migration strategy or asks for compatibility wrappers."},"module_impact":"直接影响使用 `plugin/toolsearch` 的下游代码；间接影响工具 prompt、session state、MCP 动态工具、embedding token usage 和迁移成本。","modules":"核心改动在 `plugin/toolsearch` 的 plugin/search/knowledge/mcp/options/doc 以及 `docs/mkdocs/*/tool.md`。","necessity_assessment":"方向有工程价值，但这是公共 API 和行为模型的大改，当前 `go-apidiff` 仍失败，需要人工设计接受。新增评论针对的是文档迁移合同和代码搜索候选集不一致。","number":2137,"outcome":"提交 1 条 inline comment；由于仍有 `go-apidiff` 和公共设计 gate，未提交审批或合入。","problem":"PR 试图解决旧 toolsearch 缺少 namespace 隔离、语义搜索、MCP 动态工具和固定 deferred-tool footprint 的问题。目标是让大工具集按业务域组织，并让后端敏感场景可以只暴露 `tool_search` / `call_tool` 两个延迟工具入口。","problem_framing":"PR 同时在解决“工具数量过多”和“工具发现语义”两个问题。根本风险不是某个函数实现细节，而是新的 preset/deferred/tool_search 合同必须自洽，否则迁移用户会按照文档期待搜索到 preset 工具，运行时却只能精确名解析或直接调用。","reproduction_on_base":"base 分支是旧 toolsearch API；当前问题通过 PR head 代码和文档合同对照确认：自然语言 query 候选只来自 `p.deferredNames`，但文档说 preset tools 也可被 `tool_search` 检索。","review_action":"Posted one inline GitHub review comment; no approval, LGTM, request-changes review, or merge was submitted.","risk":"如果按当前状态合入，用户会按文档迁移 `WithAlwaysInclude` 到 preset tools，却发现自然语言搜索找不到这些工具。","root_cause":"代码把 query/embedding 搜索候选限定为 deferred tools；而 docs/doc.go/New 注释把 preset tools 描述为 searchable。迁移 `WithAlwaysInclude` 的工具放进 preset 后，不会进入自然语言检索候选。","semantic_changes":"模型发现工具的流程从“插件预选 TopK 后直接暴露工具”变成“模型调用 `tool_search` 发现并加载 deferred tools”；dispatch 模式下 deferred tools 通过 `call_tool` 间接调用。","solution_fit_assessment":"如果 preset tools 只是直接暴露，文档应强调它们不参与 query 搜索；如果要作为 `WithAlwaysInclude` 的替代，则必须纳入 keyword/embedding 候选并补测试。当前两边不一致，会误导迁移。","status":"commented","technical_background":"`plugin/toolsearch` 是把大量工具从模型请求中延迟出去的 Runner 插件：模型先看到 `tool_search` 和目录，按需加载工具后再调用。这个 PR 把旧的模型驱动 TopK 预选重构成 namespace toolbox、embedding semantic search、MCP 动态工具箱和 dispatch 调用模式，因此同时触碰搜索语义、session 中已加载工具状态、公共 API 和迁移文档。","tests_docs":"PR 有大量 toolsearch 单元测试；当前缺少 preset tools 通过 natural-language `queries` 命中的测试，或缺少明确说明 preset 不参与 query 搜索的文档。","title":"feat(toolsearch): refactor into namespaced toolbox with embedding search, MCP support and two-tool mode","tradeoffs":"把 preset 纳入搜索会增加候选集合和权限/命名处理复杂度；只改文档成本低但弱化 `WithAlwaysInclude` 迁移体验。公共 API 破坏性越强，迁移文档越不能含糊。","url":"https://github.com/trpc-group/trpc-agent-go/pull/2137"},{"alternative_designs":"可以先实现纯 deterministic analyzer backend，不执行宿主机命令；也可以接入现有 codeexecutor/e2b 或 container backend；规则检测可以从 regexp 升级为 diff context aware parser；脱敏可以用命名捕获组或最后非空 value capture。","api_surface":"新增示例 CLI 参数 `--diff-file`、`--repo-path`、`--fixture`、`--dry-run`、`--unsafe-local`，新增示例 Skill 和报告文件格式；框架公共 API 改动主要是 event/invocation 行为相关。","approach":"PR 新增 `examples/code_review_agent`，包括 parser、policy、redaction、sandbox、storage、telemetry、output、fixtures、Skill 文件和脚本，同时调整 event/invocation 相关测试与行为。","author":"xiaoyulox","behavior_impact":"修复后，默认 dry-run fixture 应不需要 unsafe local 也能完成，报告/数据库不应包含原始 secret，defer-in-loop fixture 应产生相应 finding。","blockers":[{"kind":"implementation_scope","line":291,"path":"examples/code_review_agent/sandbox/sandbox.go","summary":"Default fixture/dry-run path has no safe sandbox backend and requires unsafe host execution.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2151#discussion_r3572804822","verification":"Verified by running `go run . --fixture clean --dry-run` on head=459dbfdce00524de0fbdaa2e50271d46392ad3ec; it exits with sandbox requires --unsafe-local."},{"kind":"implementation_scope","line":64,"path":"examples/code_review_agent/redaction/redaction.go","summary":"Key/value redaction masks the key name and leaves the secret value in output.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2151#discussion_r3572807105","verification":"Verified `api_key = \"my-secret-key\"` becomes `****** = \"my-secret-key\"`."},{"kind":"implementation_scope","line":62,"path":"examples/code_review_agent/policy/rule_detector.go","summary":"DEFER_IN_LOOP detector misses multi-line added loop/defer hunks.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2151#discussion_r3572810686","verification":"Verified a diff adding for/defer produced no findings."}],"change_inventory":"新增 code review agent 示例工程、fixtures、解析/规则/脱敏/沙箱/存储/telemetry/report 包、Skill 脚本和测试，并多次响应历史 review comments。","ci_state":"All effective checks are green at the time of review.","cross_module_impact":"示例调用 parser/policy/redaction/sandbox/storage/output 多模块；报告与数据库会消费脱敏后的 findings；event 改动可能影响 graph/agent 事件通道调用者。","design_assessment":"当前示例还未达到安全和可审计的合入线；本轮补充 3 条当前有效的 inline comments，历史已覆盖的问题不重复评论。","evidence_checked":"核对了 PR body、issue #2004 范围、当前 head=459dbfdce00524de0fbdaa2e50271d46392ad3ec、`sandbox.go`、`redaction.go`、`rule_detector.go`、历史 comments，并运行 `go test ./examples/code_review_agent/... -count=1` 通过；另外复现了 `go run . --fixture clean --dry-run` 默认失败、`RedactSecrets` 保留 secret value、defer-in-loop diff 无 finding。","head_sha":"459dbfdce00524de0fbdaa2e50271d46392ad3ec","implementation_derivation":"示例目录承载 parser/policy/storage/report 是合理的；但 event 包改动属于框架运行时，风险高于普通示例。新增 comments 聚焦当前 head 中仍会破坏任务核心合同的代码点。","inline_comments":[{"body":"`NewSandboxWithConfig` has no safe default backend, so the documented default fixture/dry-run path now fails unless callers opt into host execution with `--unsafe-local` or `UNSAFE_LOCAL_SANDBOX=true`. That leaves the example without the production-safe sandbox path promised by the issue; please wire the container/E2B backend as the default, or add a deterministic non-host dry-run backend while keeping local execution explicitly opt-in.\n\n<details><summary>中文<\/summary>\n\n`NewSandboxWithConfig` 现在没有安全的默认后端，导致文档里的默认 fixture / dry-run 路径必须通过 `--unsafe-local` 或 `UNSAFE_LOCAL_SANDBOX=true` 才能跑，也就是只能选择宿主机执行。这和 issue 要求的生产安全沙箱路径不一致；请把 container/E2B 后端作为默认沙箱接上，或为 dry-run 增加明确的非宿主机确定性后端，同时保持本地执行只能显式开启。\n\n<\/details>","focus":"safe default sandbox","line":291,"path":"examples/code_review_agent/sandbox/sandbox.go","severity":"high","url":"https://github.com/trpc-group/trpc-agent-go/pull/2151#discussion_r3572804822"},{"body":"The fallback uses capture group 1 as the secret value, but the key/value patterns put the key name in group 1 and the actual secret in group 2. For example, `api_key = \"my-secret-key\"` is redacted to `****** = \"my-secret-key\"`, so the credential still persists in reports/storage. Please select the value group explicitly and test that the original secret string is absent from the output.\n\n<details><summary>中文<\/summary>\n\n这里的 fallback 把第 1 个捕获组当作密钥值，但 key/value 模式里第 1 组是字段名，真正的密钥在第 2 组。例如 `api_key = \"my-secret-key\"` 会被脱敏成 `****** = \"my-secret-key\"`，凭据值仍会进入报告或存储。请显式选择 value 捕获组，并增加测试断言输出中不再包含原始 secret 字符串。\n\n<\/details>","focus":"secret redaction","line":64,"path":"examples/code_review_agent/redaction/redaction.go","severity":"high","url":"https://github.com/trpc-group/trpc-agent-go/pull/2151#discussion_r3572807105"},{"body":"`DEFER_IN_LOOP` cannot match multi-line added hunks because the regexp uses `^` without multiline mode after `Detect` joins added lines into one string. A diff that adds a `for` block with `defer close(...)` produces no finding, so one of the advertised core rule classes is silently missed. Please make this rule multiline/context-aware and add a fixture-level assertion for the defer-in-loop case.\n\n<details><summary>中文<\/summary>\n\n`DEFER_IN_LOOP` 现在无法匹配多行新增 hunk，因为 `Detect` 会把新增行拼成一个字符串，而这个 regexp 里的 `^` 没有开启 multiline 模式。我用新增 `for` 块并在其中 `defer close(...)` 的 diff 验证时没有产生 finding，这会让一个核心规则类别被静默漏检。请把该规则改成支持 multiline / 上下文感知，并为 defer-in-loop fixture 增加断言。\n\n<\/details>","focus":"rule detection","line":62,"path":"examples/code_review_agent/policy/rule_detector.go","severity":"medium","url":"https://github.com/trpc-group/trpc-agent-go/pull/2151#discussion_r3572810686"}],"issue_evidence_gaps":"还需要默认安全 sandbox 或 deterministic dry-run backend 的端到端测试、secret value 不出现在输出中的测试、以及 defer-in-loop fixture 级断言。","merge_policy":{"current_evidence_checked":"author_association=FIRST_TIME_CONTRIBUTOR; CI green; three new inline comments posted.","mode":"human_required","reason":"first-time contributor and Rhino Bird task PR require maintainer/program acceptance after blockers are fixed.","required_evidence":"Maintainer confirms sandbox/redaction/rule-detection issues are fixed and the PR is the accepted task solution."},"module_impact":"直接影响示例可运行性和安全性；间接影响用户对框架 Skill + sandbox + storage 组合能力的信任。event 包问题还可能影响 agent/runtime 事件投递成功判断。","modules":"`examples/code_review_agent/sandbox` 负责执行隔离；`redaction` 负责凭据脱敏；`policy/rule_detector` 负责规则匹配；`main.go` 串联任务状态、执行、报告和持久化；`event` 包改动影响更广的运行时事件发送。","necessity_assessment":"任务需求本身明确，但当前实现仍有安全和正确性缺口：默认 dry-run fixture 无法运行、secret value 仍可能持久化、defer-in-loop 规则漏检。","number":2151,"outcome":"提交 3 条新的 inline comments；历史已有同等反馈的关闭 channel、脚本明文写出、完成状态顺序等问题未重复评论；未提交审批或合入。","problem":"PR 对应 issue #2004 的 Rhino Bird 任务，目标是提供一个可落地的 Go code review agent 示例，覆盖隔离执行、权限策略、静态规则、报告、存储和 telemetry。","problem_framing":"自动代码评审示例的根本难点是可信执行和可信报告。若默认路径跑不通、安全扫描产物泄漏凭据、核心规则漏检，即使单元测试绿色，也不能说明示例 let lang = "zh";
let filter = "all";
const statusOrder = ["approved", "commented", "maintained", "merged", "skipped", "blocked"];

function text(value, fallback = "") {
  if (value === undefined || value === null || value === "") return fallback;
  if (typeof value === "object" && !Array.isArray(value)) {
    return value[lang] || value.zh || value.en || value.summary || value.body || value.mode || fallback;
  }
  return String(value);
}

function escapeHtml(value) {
  return text(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function linkifyPrReferences(html) {
  const repo = text(reportData.repo || "trpc-group/trpc-agent-go");
  if (!repo) return html;
  return html.replace(
    /(^|[^\w/])#(\d{3,6})\b/g,
    (match, prefix, number) =>
      `${prefix}<a href="https://github.com/${repo}/pull/${number}">#${number}</a>`
  );
}

function linkifyUrls(html) {
  return html.replace(
    /(https?:\/\/[^\s<>"']+)/g,
    (match) => {
      const trailing = (match.match(/[.,;)]+$/u) || [""])[0];
      const href = trailing ? match.slice(0, -trailing.length) : match;
      return `<a href="${href}">${href}</a>${trailing}`;
    }
  );
}

function formatRich(value) {
  let html = linkifyPrReferences(linkifyUrls(escapeHtml(value)));
  const replacements = [
    [
      /(P[0-2]|codecov\/patch=FAILURE|go-apidiff=FAILURE|go-apidiff|FAILURE|失败|阻塞|不能合入|不能 merge|未合并|破坏性|breaking|unbounded|无界|绕过|丢失|重复|不稳定|风险)/gi,
      "mark-bad"
    ],
    [
      /(LGTM|已合并|已批准|squash merge|merged|approved|CI 全绿|全绿|修复有效|\bresolved\b|\bresolve\b)/gi,
      "mark-good"
    ],
    [
      /(pending|soft[- ]?CI|软门禁|follow-up|后续|关注|CodeRabbit|review readiness|not[_ -]?reached)/gi,
      "mark-info"
    ],
    [
      /(导出 API|\bAPI\b|兼容性|\bsession\b|\brunner\b|\bmemory\b|GraphRAG|workspace_exec|OpenAPI|\bpolicy\b|security|安全)/gi,
      "mark-warn"
    ]
  ];
  for (const [pattern, className] of replacements) {
    html = html.replace(pattern, `<mark class="${className}">$1</mark>`);
  }
  return html;
}

function prs() {
  const skippedByNumber = new Map();
  for (const group of skippedGroups()) {
    for (const item of (group.items || [])) {
      const key = item.number ? String(item.number) : `${group.reason || "skipped"}:${text(item.title)}`;
      if (skippedByNumber.has(key)) continue;
      skippedByNumber.set(key, {
      ...item,
      status: item.status || "skipped",
      skip_reason: item.skip_reason || group.reason
      });
    }
  }
  const skipped = [...skippedByNumber.values()];
  return [
    ...(reportData.approved || []),
    ...(reportData.commented || []),
    ...(reportData.maintained || []),
    ...(reportData.blocked || []),
    ...skipped
  ];
}

function skippedGroups() {
  const processedNumbers = new Set([
    ...(reportData.approved || []),
    ...(reportData.commented || []),
    ...(reportData.maintained || []),
    ...(reportData.blocked || [])
  ].map(item => Number(item.number)).filter(Boolean));
  return (reportData.skipped_groups || []).map(group => {
    const existingItems = group.items || [];
    if (existingItems.length) {
      return {
        ...group,
        items: existingItems.filter(item => !processedNumbers.has(Number(item.number)))
      };
    }
    const items = (group.prs || []).filter(number => !processedNumbers.has(Number(number))).map(number => {
      const reason = group.reason || "skipped";
      const summary = text(group.title_zh || group.title || reason);
      return {
        number,
        title: `PR #${number}`,
        url: "",
        author: "",
        status: "skipped",
        skip_reason: summary,
        readiness_audit: summary,
        ci_state: "",
        blockers: [{
          kind: reason,
          summary
        }]
      };
    });
    return { ...group, items, count: items.length };
  }).filter(group => group.items.length > 0);
}

function counts(items) {
  const result = Object.fromEntries(statusOrder.map(status => [status, 0]));
  for (const item of items) {
    const status = item.status || "skipped";
    result[status] = (result[status] || 0) + 1;
  }
  return result;
}

function setLanguage(nextLang) {
  lang = nextLang;
  document.documentElement.lang = nextLang === "zh" ? "zh-CN" : "en";
  document.querySelectorAll("[data-lang-button]").forEach(button => {
    button.classList.toggle("active", button.dataset.langButton === nextLang);
  });
  render();
}

function renderStatic() {
  document.querySelectorAll("[data-i18n]").forEach(node => {
    node.textContent = labels[lang][node.dataset.i18n];
  });
  const repo = reportData.repo || "trpc-group/trpc-agent-go";
  const generated = reportData.generated_at || "2026-07-14T01:12:14+08:00";
  document.getElementById("subtitle").textContent = labels[lang].subtitle
    .replace("{repo}", repo)
    .replace("{time}", generated);
  document.getElementById("search").placeholder = labels[lang].search;
  document.getElementById("openAll").textContent = labels[lang].expandAll;
  document.getElementById("closeAll").textContent = labels[lang].collapseAll;

function renderTimeline() {

function renderOverview() {

function renderChips() {

function matchesSearch(item, query) {
  if (!query) return true;
  const haystack = [
    item.number,
    text(item.title),
    item.author,
    text(item.problem),
    text(item.necessity_assessment),
    text(item.evidence_checked),
    text(item.reproduction_on_base),
    text(item.issue_evidence_gaps),
    text(item.approach),
    text(item.implementation_derivation),
    text(item.solution_fit_assessment),
    text(item.outcome),
    text(item.merge_policy),
    text(item.skip_reason),
    text(item.group_reason),
    text(item.readiness_audit),
    blockersSearchText(item.blockers),
    text(item.risk),
    text(item.ci_state)
  ].join(" ").toLowerCase();
  return haystack.includes(query.toLowerCase());
}

function blockersSearchText(blockers) {
  if (!Array.isArray(blockers)) return "";
  return blockers.map(blocker => {
    if (typeof blocker !== "object" || blocker === null) return text(blocker);
    return [
      blocker.kind,
      blocker.summary,
      blocker.reviewer,
      blocker.path,
      blocker.line,
      blocker.latest_response,
      blocker.verification,
      blocker.url
    ].map(value => text(value)).join(" ");
  }).join(" ");
}

function field(label, value) {
  const body = text(value);
  if (!body) return "";
  return `<div class="field"><strong>${label}</strong><div class="field-body">${formatRich(body)}</div></div>`;
}

function renderBlockers(item) {
  const blockers = Array.isArray(item.blockers) ? item.blockers : [];
  if (!blockers.length) return "";
  const isNonBlockerList = blockers.every(blocker => {
    const kind = typeof blocker === "object" && blocker !== null ? String(blocker.kind || "") : "";
    return kind === ("not" + "_reached") || kind === "状态刷新";
  });
  const detailLabel = isNonBlockerList
    ? labels[lang].nonBlockerDetails
    : labels[lang].blockerDetails;
  const rendered = blockers.map(blocker => {
    const data = typeof blocker === "object" && blocker !== null
      ? blocker
      : { summary: blocker };
    const location = [data.path, data.line ? `:${data.line}` : ""].filter(Boolean).join("");
    const meta = [
      data.kind ? blockerKindLabel(data.kind) : "",
      data.reviewer ? `reviewer: ${text(data.reviewer)}` : "",
      location,
      data.latest_response ? `latest: ${text(data.latest_response)}` : "",
      data.verification ? text(data.verification) : ""
    ].filter(Boolean).join(" · ");
    const summary = formatRich(data.summary || blocker);
    const link = data.url
      ? ` <a href="${escapeHtml(data.url)}">link</a>`
      : "";
    return `<li class="blocker-item"><div>${summary}${link}</div>${meta ? `<div class="blocker-meta">${escapeHtml(meta)}</div>` : ""}</li>`;
  }).join("");
  return `<div class="skip-detail"><strong>${detailLabel}:</strong></div><ul class="blocker-list">${rendered}</ul>`;
}

function blockerKindLabel(kind) {
  return (labels[lang].blockerKinds || {})[kind] || text(kind);
}

  function inlineCommentText(comment) {
    if (comment === undefined || comment === null) return "";
    if (typeof comment !== "object" || Array.isArray(comment)) {
      return text(comment);
    }
    if (lang === "zh") {
      return text(comment.summary_zh || comment.summary || comment.body || comment.message || "");
    }
    return text(comment.body || comment.summary_en || comment.summary || comment.message || "");
  }

function allPrText(item) {
  const comments = (item.inline_comments || []).map(comment => [
    comment.severity,
    comment.focus,
    comment.body,
    comment.summary,
    comment.path
  ].map(value => text(value)).join(" ")).join(" ");
  const blockers = blockersSearchText(item.blockers);
  return [
    item.status,
    item.number,
    item.title,
    item.author,
    item.problem,
    item.necessity_assessment,
    item.evidence_checked,
    item.reproduction_on_base,
    item.issue_evidence_gaps,
    item.approach,
    item.implementation_derivation,
    item.solution_fit_assessment,
    item.outcome,
    item.risk,
    item.ci_state,
    item.skip_reason,
    item.readiness_audit,
    item.modules,
    item.api_surface,
    comments,
    blockers
  ].map(value => text(value)).join(" ").toLowerCase();
}

function readingAdvice(item) {
  const status = item.status || "skipped";
  const comments = item.inline_comments || [];
  const blockers = item.blockers || [];
  const body = allPrText(item);
  const hasP1 = comments.some(comment =>
    /\bP[01]\b/i.test(text(comment.severity)) ||
    /\bP[01]\b/i.test(inlineCommentText(comment))
  );
  const hasCriticalRisk = hasP1 ||
    /(security|安全|bypass|绕过|breaking|破坏性|unbounded|无界|丢失|重复|不稳定|兼容|api|go-apidiff|failure|失败|不能 merge|不能合入|race|并发)/i.test(body);
  const highImpactFeature =
    /(add|new|新增|support|支持|agent|runner|session|memory|graphrag|knowledge|openapi|workspace_exec|policy|extension|tool|graph|api)/i.test(body);

  const copy = {
    critical: {
      icon: "🔥",
      zh: "重点精读",
      en: "Deep Read",
      reasonZh: comments.length
        ? `有 ${comments.length} 条行级评论，且包含 P1/兼容/正确性/安全类风险。`
        : "包含高风险兼容性或正确性信号，需要重点复核。",
      reasonEn: comments.length
        ? `${comments.length} inline comment(s), including P1, compatibility, correctness, or security risk.`
        : "High-risk compatibility or correctness signal; review carefully."
    },
    focus: {
      icon: "🔎",
      zh: "建议细看",
      en: "Read Carefully",
      reasonZh: comments.length
        ? `有 ${comments.length} 条评论或重要设计取舍，建议看完整结论。`
        : "涉及核心模块、导出 API 或较大功能，建议细看。",
      reasonEn: comments.length
        ? `${comments.length} comment(s) or important design tradeoffs; read the full conclusion.`
        : "Core module, exported API, or larger feature; read carefully."
    },
    skim: {
      icon: "✅",
      zh: "快速略看",
      en: "Quick Skim",
      reasonZh: "风险低或改动较直接，扫结论和 CI 状态即可。",
      reasonEn: "Low risk or straightforward change; skim outcome and CI state."
    },
    follow: {
      icon: "⏳",
      zh: "只看阻塞",
      en: "Blocker Only",
      reasonZh: blockers.length
        ? `主要看 ${blockers.length} 个具体阻塞点，暂不需要读完整实现。`
        : "当前不是可合并状态，先看阻塞和后续动作。",
      reasonEn: blockers.length
        ? `Focus on ${blockers.length} concrete blocker(s); no need to read the full implementation yet.`
        : "Not merge-ready; focus on blockers and next action."
    }
  };

  let level = "skim";
  if (status === "blocked") {
    level = "follow";
  } else if (status === "commented") {
    level = hasCriticalRisk ? "critical" : "focus";
  } else if (status === "maintained") {
    level = hasCriticalRisk || highImpactFeature ? "focus" : "skim";
  } else if (status === "approved") {
    level = hasCriticalRisk || highImpactFeature ? "focus" : "skim";
  } else if (status === "merged") {
    level = highImpactFeature || hasCriticalRisk ? "focus" : "skim";
  } else if (status === "skipped") {
    level = blockers.length || /(conflict|ci|failure|失败|未回应|review)/i.test(body)
      ? "follow"
      : "skim";
  }

  const selected = copy[level];
  return {
    level,
    icon: selected.icon,
    label: lang === "zh" ? selected.zh : selected.en,
    reason: lang === "zh" ? selected.reasonZh : selected.reasonEn
  };
}

function priorityRank(level) {
  return { critical: 4, focus: 3, follow: 2, skim: 1 }[level] || 0;
}

function renderReadingGuide(items) {
  const panel = document.getElementById("readingGuidePanel");
  const container = document.getElementById("readingGuide");
  const candidates = [
    ...items.filter(item => (item.status || "skipped") !== "skipped"),
    ...(reportData.follow_up || []).map(item => {
      if (typeof item === "object" && item !== null && !Array.isArray(item)) {
        return { ...item, status: item.status || "blocked" };
      }
      const body = text(item);
      return { title: body, next: body, status: "blocked", plain: true };
    })
  ].map(item => ({ item, advice: readingAdvice(item) }))
    .filter(entry => entry.advice.level !== "skim")
    .sort((left, right) => priorityRank(right.advice.level) - priorityRank(left.advice.level));

  if (!candidates.length) {
    panel.style.display = "none";
    container.innerHTML = "";
    return;
  }

  panel.style.display = "block";
  container.innerHTML = candidates.slice(0, 9).map(entry => {
    const item = entry.item;
    const advice = entry.advice;
    const prText = item.number ? `#${item.number}` : "PR";
    const prLink = item.url
      ? `<a href="${escapeHtml(item.url)}">${prText} · ${escapeHtml(text(item.title))}</a>`
      : `<span>${prText} · ${escapeHtml(text(item.title))}</span>`;
    return `
      <article class="guide-card ${advice.level}">
        <div class="guide-meta">
          <span class="read-pill ${advice.level}">${advice.icon} ${escapeHtml(advice.label)}</span>
          <span class="badge ${item.status || "skipped"}">${labels[lang][item.status] || item.status || labels[lang].skipped}</span>
        </div>
        <div>${prLink}</div>
        <div class="guide-reason">${escapeHtml(advice.reason)}</div>
      </article>
    `;
  }).join("");
}

function storyLine(label, value) {
  const body = text(value);
  if (!body) return "";
  return `
    <p class="story-line">
      <span class="story-label">${escapeHtml(label)}</span>
      <span class="story-text">${formatRich(body)}</span>
    </p>
  `;
}

function storyBlock(title, rows, className = "") {
  const body = rows.filter(Boolean).join("");
  if (!body) return "";
  const classes = ["story-block", className].filter(Boolean).join(" ");
  return `<section class="${classes}"><h4>${escapeHtml(title)}</h4>${body}</section>`;
}

function compactSummary(item) {
  const candidates = [
    item.problem,
    item.design_assessment,
    item.solution_fit_assessment,
    item.approach,
    item.skip_reason,
    item.reason,
    item.outcome,
    item.risk
  ].map(value => text(value).trim()).filter(Boolean);
  return candidates[0] || labels[lang].summaryFallback;
}

function updateCardToggle(card) {
  const button = card.querySelector(".card-toggle");
  if (!button) return;
  const open = card.classList.contains("open");
  button.textContent = open ? labels[lang].collapseDetails : labels[lang].expandDetails;
  button.setAttribute("aria-expanded", open ? "true" : "false");
}

function setCardOpen(card, open) {
  card.classList.toggle("open", open);
  updateCardToggle(card);
}

function factItem(label, value) {
  const body = text(value);
  if (!body) return "";
  return `
    <div class="fact">
      <dt>${escapeHtml(label)}</dt>
      <dd>${formatRich(body)}</dd>
    </div>
  `;
}

function directFixesText(fixes) {
  if (!Array.isArray(fixes) || !fixes.length) return "";
  return fixes.map(fix => {
    if (typeof fix !== "object" || fix === null) return text(fix);
    return [
      fix.branch ? `branch: ${text(fix.branch)}` : "",
      fix.commit ? `commit: ${text(fix.commit)}` : "",
      fix.message ? `message: ${text(fix.message)}` : "",
      fix.files ? `files: ${Array.isArray(fix.files) ? fix.files.map(file => text(file)).join(", ") : text(fix.files)}` : "",
      fix.tests ? `tests: ${Array.isArray(fix.tests) ? fix.tests.map(test => text(test)).join(", ") : text(fix.tests)}` : "",
      fix.push_state ? `push: ${text(fix.push_state)}` : "",
      fix.ci_state ? `CI: ${text(fix.ci_state)}` : ""
    ].filter(Boolean).join(" · ");
  }).join("\n");
}

function renderReviewRail(item) {
  const advice = readingAdvice(item);
  const callout = `
    <div class="reading-callout ${advice.level}">
      <strong>${advice.icon} ${escapeHtml(advice.label)}</strong>
      <span>${escapeHtml(advice.reason)}</span>
    </div>
  `;
  const facts = [
    factItem(labels[lang].outcome, item.outcome),
    factItem(labels[lang].reviewAction, item.review_action),
    factItem(labels[lang].mergePolicy, item.merge_policy),
    factItem(labels[lang].headSha, item.head_sha),
    factItem(labels[lang].mergeCommit, item.merge_commit),
    factItem(labels[lang].necessityAssessment, item.necessity_assessment),
    factItem(labels[lang].reproductionOnBase, item.reproduction_on_base),
    factItem(labels[lang].solutionFitAssessment, item.solution_fit_assessment),
    factItem(labels[lang].risk, item.risk),
    factItem(labels[lang].ci, item.ci_state),
    factItem(labels[lang].attentionPoints, item.attention_points),
    factItem(labels[lang].directFixes, directFixesText(item.direct_fixes)),
    factItem(labels[lang].selfReviewPolicy, item.self_review_policy),
    factItem(labels[lang].testsDocs, item.tests_docs),
    factItem(labels[lang].modules, item.modules),
    factItem(labels[lang].apiSurface, item.api_surface),
    factItem(labels[lang].reason, item.skip_reason)
  ].filter(Boolean).join("");
  if (!facts) return `<aside class="review-rail">${callout}</aside>`;
  return `<aside class="review-rail">${callout}<h4>${labels[lang].reviewSummary}</h4><dl class="fact-list">${facts}</dl></aside>`;

function renderComments(item) {
  const comments = item.inline_comments || [];
  if (!comments.length) return "";
  const rendered = comments.map(comment => {
    const data = typeof comment === "object" && comment !== null && !Array.isArray(comment)
      ? comment
      : { body: comment };
    const location = `${escapeHtml(data.path || "")}${data.line ? ":" + escapeHtml(data.line) : ""}`;
    const source = data.url
      ? `<a class="comment-link" href="${escapeHtml(data.url)}">GitHub</a>`
      : "";
    return `
      <div class="comment">
        <div class="comment-head">
          <strong>${location}</strong>
          ${source}
        </div>
        <div>${formatRich(inlineCommentText(data))}</div>
        ${data.focus ? `<div><strong>${labels[lang].focus}:</strong> ${escapeHtml(text(data.focus))}</div>` : ""}
        ${data.severity ? `<div><strong>${labels[lang].severity}:</strong> ${escapeHtml(text(data.severity))}</div>` : ""}
      </div>
    `;
  }).join("");
  return `<section class="comments-panel">
    <h4>${labels[lang].inlineComments}</h4>
    <div class="comment-list">${rendered}</div>
  </section>`;
}

function renderCards() {
  const query = document.getElementById("search").value.trim();
  const visible = prs().filter(item => (item.status || "skipped") !== "skipped")
    .filter(item => {
    const status = item.status || "skipped";
    return (filter === "all" || status === filter) && matchesSearch(item, query);
  });
  const container = document.getElementById("cards");
  if (!visible.length) {
    container.innerHTML = `<div class="empty">${labels[lang].empty}</div>`;
    return;
  }
  container.innerHTML = visible.map(item => {
    const status = item.status || "skipped";
    const advice = readingAdvice(item);
    const summary = compactSummary(item);
    const prText = item.number ? `#${item.number}` : "PR";
    const prLink = item.url
      ? `<a href="${escapeHtml(item.url)}">${prText}</a>`
      : prText;
    return `
      <article class="card priority-${advice.level}" data-status="${status}">
        <div class="card-head">
          <div>
            <div class="headline-row">
              <h3 class="card-title">${prLink} · ${escapeHtml(text(item.title))}</h3>
              <span class="read-pill ${advice.level}">${advice.icon} ${escapeHtml(advice.label)}</span>
            </div>
            <div class="meta">
              <span>${labels[lang].author}: ${escapeHtml(item.author || "")}</span>
              <span class="advice-reason">${escapeHtml(advice.reason)}</span>
            </div>
            <div class="card-summary">${formatRich(summary)}</div>
          </div>
          <div class="card-actions">
            <span class="badge ${status}">${labels[lang][status] || status}</span>
            <button class="card-toggle" type="button" aria-expanded="false">${labels[lang].expandDetails}</button>
          </div>
        </div>
        <div class="card-body">
          ${renderPrReadout(item)}
        </div>
      </article>
    `;
  }).join("");
  document.querySelectorAll(".card-head").forEach(head => {
    head.addEventListener("click", event => {
      if (event.target.closest("a")) return;
      const card = head.closest(".card");
      setCardOpen(card, !card.classList.contains("open"));
    });
  });
  document.querySelectorAll(".card").forEach(card => updateCardToggle(card));
}

function renderSkipGroups() {

    const reason = group.reason || "";
    const title = lang === "zh"
      ? text(group.title_zh || group.label || group.title || group.reason)
      : text(group.title_en || group.label_en || group.label || group.title || group.reason);

      ...item,
      status: item.status || "skipped",

    return { reason, title, items };
  }).filter(group => group.items.length > 0);
  if (!groups.length) {
    container.innerHTML = `<div class="empty">${labels[lang].empty}</div>`;

  container.innerHTML = groups.map((group, index) => `
    <article class="skip-group open">

        <h3 class="skip-group-title">${escapeHtml(text(group.title || group.reason))}</h3>

      </div>
      <div class="skip-group-body">
        ${group.items.map(item => {
          const prText = item.number ? `#${item.number}` : "PR";
          const prLink = item.url
            ? `<a href="${escapeHtml(item.url)}">${prText}</a>`
            : prText;
          return `
            <div class="skip-row">
              <div>
                <div class="skip-title">${prLink} · ${escapeHtml(text(item.title))}</div>
                <div class="skip-detail">${labels[lang].author}: ${escapeHtml(item.author || "")}</div>
              </div>
              <div>
                <div><strong>${labels[lang].reason}:</strong> ${formatRich(text(item.skip_reason))}</div>
                ${item.readiness_audit ? `<div class="skip-detail"><strong>${labels[lang].readinessAudit}:</strong> ${formatRich(text(item.readiness_audit))}</div>` : ""}
                ${item.necessity_assessment ? `<div class="skip-detail"><strong>${labels[lang].necessityAssessment}:</strong> ${formatRich(text(item.necessity_assessment))}</div>` : ""}
                ${item.evidence_checked ? `<div class="skip-detail"><strong>${labels[lang].evidenceChecked}:</strong> ${formatRich(text(item.evidence_checked))}</div>` : ""}
                ${item.reproduction_on_base ? `<div class="skip-detail"><strong>${labels[lang].reproductionOnBase}:</strong> ${formatRich(text(item.reproduction_on_base))}</div>` : ""}
                ${item.issue_evidence_gaps ? `<div class="skip-detail"><strong>${labels[lang].issueEvidenceGaps}:</strong> ${formatRich(text(item.issue_evidence_gaps))}</div>` : ""}
                ${item.implementation_derivation ? `<div class="skip-detail"><strong>${labels[lang].implementationDerivation}:</strong> ${formatRich(text(item.implementation_derivation))}</div>` : ""}
                ${item.solution_fit_assessment ? `<div class="skip-detail"><strong>${labels[lang].solutionFitAssessment}:</strong> ${formatRich(text(item.solution_fit_assessment))}</div>` : ""}
                ${renderBlockers(item)}
                ${item.ci_state ? `<div class="skip-detail">${formatRich(text(item.ci_state))}</div>` : ""}
                ${item.risk ? `<div class="skip-detail">${formatRich(text(item.risk))}</div>` : ""}
              </div>
            </div>
          `;
        }).join("")}
      </div>
    </article>
  `).join("");
  document.querySelectorAll("[data-skip-group]").forEach(head => {
    head.addEventListener("click", () => {
      head.closest(".skip-group").classList.toggle("open");
    });
  });
}

function renderFollowUp() {
  const heading = document.getElementById("followUpHeading");
  const container = document.getElementById("followUpCards");
  if (!["all", "skipped", "blocked"].includes(filter)) {
    heading.style.display = "none";
    container.style.display = "none";
    return;
  }
  const query = document.getElementById("search").value.trim().toLowerCase();
  const items = (reportData.follow_up || []).map(item => {
    if (typeof item === "object" && item !== null && !Array.isArray(item)) return item;
    const body = text(item);
    return {
      title: body,
      next: body,
      plain: true
    };
  }).filter(item => {
    if (!query) return true;
    return [
      item.number,
      item.author,
      text(item.title),
      text(item.reason),
      text(item.next)
    ].join(" ").toLowerCase().includes(query);
  });
  if (!items.length) {
    heading.style.display = "none";
    container.style.display = "none";
    return;
  }
  heading.style.display = "flex";
  container.style.display = "grid";
  container.innerHTML = items.map(item => {
    const hasPrIdentity = Boolean(item.number || item.url);
    const prText = item.number ? `#${item.number}` : "PR";
    const prLink = item.url
      ? `<a href="${escapeHtml(item.url)}">${prText}</a>`
      : prText;
    const title = formatRich(text(item.title || item.next || item.reason));
    const cardTitle = hasPrIdentity ? `${prLink} · ${title}` : title;
    const meta = item.author
      ? `<div class="meta">${labels[lang].author}: ${escapeHtml(item.author)}</div>`
      : "";
    const body = item.plain
      ? `<div>${formatRich(text(item.next || item.title))}</div>`
      : `<div class="grid">
          ${field(labels[lang].reason, item.reason)}
          ${field(labels[lang].outcome, item.next)}
        </div>`;
    return `
      <article class="card open" data-status="blocked">
        <div class="card-head">
          <div>
            <h3 class="card-title">${cardTitle}</h3>
            ${meta}
          </div>
          <span class="badge blocked">${labels[lang].followups}</span>
        </div>
        <div class="card-body">
          ${body}
        </div>
      </article>
    `;
  }).join("");
}

function renderEvolution() {
  const panel = document.getElementById("evolutionPanel");
  const container = document.getElementById("evolutionList");
  const items = reportData.skill_evolution || [];
  if (!items.length) {
    panel.style.display = "none";
    container.innerHTML = "";
    return;
  }
  panel.style.display = "block";
  container.innerHTML = items.map(item => {
    const data = typeof item === "object" && item !== null && !Array.isArray(item)
      ? item
      : { area: labels[lang].selfEvolutionSection, note: item };
    return `
      <article class="evolution-item">
        <div class="evolution-area">${escapeHtml(text(data.area || labels[lang].selfEvolutionSection))}</div>
        <div class="evolution-note">${formatRich(text(data.note || data.summary || data.body || ""))}</div>
      </article>
    `;
  }).join("");
}

function render() {
  const items = prs();
  renderStatic();
  renderMetrics(items);
  renderBars(items);
  renderTimeline();
  renderOverview();
  renderReadingGuide(items);
  renderChips();
  renderCards();
  renderSkipGroups();
  renderFollowUp();
  renderEvolution();
}

document.querySelectorAll("[data-lang-button]").forEach(button => {
  button.addEventListener("click", () => setLanguage(button.dataset.langButton));
});
document.getElementById("search").addEventListener("input", () => {
  renderCards();
  renderSkipGroups();
  renderFollowUp();
});
document.getElementById("openAll").addEventListener("click", () => {
  document.querySelectorAll(".card").forEach(card => setCardOpen(card, true));
  document.querySelectorAll(".skip-group").forEach(node => node.classList.add("open"));
});
document.getElementById("closeAll").addEventListener("click", () => {
  document.querySelectorAll(".card").forEach(card => setCardOpen(card, false));
  document.querySelectorAll(".skip-group").forEach(node => node.classList.remove("open"));
});
render();
</script>
</body>
</html>
