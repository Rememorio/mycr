<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MyCR Review Report 2026-07-02</title>
<style>
:root {
  color-scheme: light;
  --bg: #f4f7fb;
  --panel: rgba(255, 255, 255, 0.94);
  --ink: #19202a;
  --muted: #667085;
  --line: #d8dee8;
  --accent: #116466;
  --accent-soft: #e8f7f4;
  --accent-2: #d17a22;
  --ok: #188038;
  --warn: #b45309;
  --bad: #b42318;
  --info: #1d4ed8;
  --soft: #f8fafc;
  --radius-lg: 24px;
  --radius-md: 16px;
  --radius-sm: 12px;
  --shadow: 0 18px 48px rgba(15, 23, 42, 0.08);
  --shadow-soft: 0 8px 24px rgba(15, 23, 42, 0.06);
  --shadow-lg: 0 22px 54px rgba(15, 23, 42, 0.12);
}
* { box-sizing: border-box; }
body {
  margin: 0;
  background:
    radial-gradient(circle at 12% 0%, rgba(17, 100, 102, 0.16), transparent 28rem),
    radial-gradient(circle at 88% 5%, rgba(29, 78, 216, 0.10), transparent 24rem),
    linear-gradient(180deg, #fbfcff 0%, var(--bg) 34rem);
  color: var(--ink);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
    "Segoe UI", sans-serif;
  line-height: 1.5;
}
a { color: var(--accent); text-decoration-thickness: 1px; }
.shell { max-width: 1180px; margin: 0 auto; padding: 28px 18px 56px; }
.topbar {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 18px;
  margin-bottom: 20px;
}
h1 {
  margin: 0 0 8px;
  font-size: clamp(34px, 5vw, 64px);
  line-height: 1.04;
  letter-spacing: -0.055em;
}
.subtitle { color: var(--muted); max-width: 760px; margin: 0; }
.toggle {
  display: inline-flex;
  border: 1px solid var(--line);
  background: var(--panel);
  border-radius: 999px;
  padding: 3px;
  box-shadow: var(--shadow);
  flex: none;
}
.toggle button {
  border: 0;
  background: transparent;
  color: var(--muted);
  border-radius: 999px;
  padding: 8px 13px;
  cursor: pointer;
  font-weight: 700;
}
.toggle button.active { background: var(--accent); color: white; }
.metrics {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 12px;
  margin: 18px 0;
}
.metric {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius-md);
  padding: 16px;
  box-shadow: var(--shadow-soft);
}
.metric .value { font-size: 32px; line-height: 1; font-weight: 800; }
.metric .label { color: var(--muted); margin-top: 7px; font-size: 13px; }
.dashboard {
  display: grid;
  grid-template-columns: 1.15fr 0.85fr;
  gap: 16px;
  align-items: start;
}
.panel {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow);
  padding: 16px;
}
.panel h2 { margin: 0 0 12px; font-size: 18px; }
.bars { display: grid; gap: 12px; }
.bar-row {
  display: grid;
  grid-template-columns: 122px 1fr 36px;
  gap: 10px;
  align-items: center;
}
.bar-label { color: var(--muted); font-size: 13px; }
.bar-track {
  height: 12px;
  background: #eef2f7;
  border-radius: 999px;
  overflow: hidden;
}
.bar-fill { height: 100%; border-radius: 999px; background: var(--accent); }
.bar-fill.approved, .bar-fill.merged { background: var(--ok); }
.bar-fill.commented { background: var(--accent-2); }
.bar-fill.maintained { background: var(--accent); }
.bar-fill.skipped { background: var(--info); }
.bar-fill.blocked { background: var(--bad); }
.timeline { display: grid; gap: 10px; }
.timeline-item {
  display: grid;
  grid-template-columns: 96px 1fr;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid #edf0f5;
}
.timeline-item:last-child { border-bottom: 0; }
.time { color: var(--muted); font-size: 13px; }
.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  margin: 18px 0 12px;
}
.search {
  flex: 1 1 280px;
  min-width: 0;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px 12px;
  font: inherit;
  background: white;
}
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  border: 1px solid var(--line);
  background: white;
  color: var(--ink);
  border-radius: 999px;
  padding: 8px 11px;
  cursor: pointer;
  font-weight: 700;
}
.chip.active { background: var(--ink); color: white; border-color: var(--ink); }
.cards { display: grid; gap: 12px; }
.section-heading {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 14px;
  margin: 22px 0 12px;
}
.section-heading h2 { margin: 0; font-size: 20px; }
.section-heading .hint { color: var(--muted); font-size: 13px; }
.card {
  min-width: 0;
  background: var(--panel);
  border: 1px solid var(--line);
  border-left: 5px solid var(--accent);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.card[data-status="approved"],
.card[data-status="merged"] { border-left-color: var(--ok); }
.card[data-status="commented"] { border-left-color: var(--accent-2); }
.card[data-status="maintained"] { border-left-color: var(--accent); }
.card[data-status="skipped"] { border-left-color: var(--info); }
.card[data-status="blocked"] { border-left-color: var(--bad); }
.card-head {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 16px;
  padding: 18px;
  cursor: pointer;
}
.card-title { margin: 0; font-size: 17px; overflow-wrap: anywhere; }
.card-title a { overflow-wrap: anywhere; }
.meta {
  color: var(--muted);
  display: flex;
  flex-wrap: wrap;
  gap: 8px 12px;
  font-size: 13px;
  margin-top: 5px;
  min-width: 0;
}
.card-summary {
  color: #42526a;
  display: -webkit-box;
  font-size: 13px;
  line-height: 1.5;
  margin-top: 8px;
  overflow: hidden;
  overflow-wrap: anywhere;
  -webkit-box-orient: vertical;
  -webkit-line-clamp: 2;
}
.card-actions {
  align-items: flex-end;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.card-toggle {
  border: 1px solid #d8e1ec;
  background: #fff;
  border-radius: 999px;
  color: var(--muted);
  cursor: pointer;
  font: inherit;
  font-size: 12px;
  font-weight: 800;
  padding: 6px 10px;
  white-space: nowrap;
}
.card-toggle:hover { border-color: #9aa8bb; color: var(--ink); }
.badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 88px;
  border-radius: 999px;
  padding: 6px 10px;
  font-size: 12px;
  font-weight: 800;
  text-transform: uppercase;
  background: #eef2f7;
}
.badge.approved, .badge.merged { color: var(--ok); background: #e7f5ec; }
.badge.commented { color: var(--warn); background: #fff4e5; }
.badge.maintained { color: var(--accent); background: #e6fffb; }
.badge.skipped { color: var(--info); background: #eaf1ff; }
.badge.blocked { color: var(--bad); background: #fff0ee; }
.read-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  border: 1px solid transparent;
  border-radius: 999px;
  padding: 6px 10px;
  font-size: 12px;
  font-weight: 900;
  white-space: nowrap;
}
.read-pill.critical {
  color: #9f1239;
  background: #fff1f2;
  border-color: #fecdd3;
}
.read-pill.focus {
  color: #92400e;
  background: #fffbeb;
  border-color: #fde68a;
}
.read-pill.skim {
  color: #166534;
  background: #ecfdf3;
  border-color: #bbf7d0;
}
.read-pill.follow {
  color: #1d4ed8;
  background: #eff6ff;
  border-color: #bfdbfe;
}
.headline-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.advice-reason {
  color: var(--muted);
  font-size: 12px;
  font-style: italic;
}
.reading-guide {
  margin-top: 16px;
}
.guide-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 14px;
  margin-bottom: 12px;
}
.guide-head h2 { margin: 0; }
.guide-head span {
  color: var(--muted);
  font-size: 13px;
}
.guide-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
}
.guide-card {
  display: grid;
  gap: 8px;
  min-width: 0;
  border: 1px solid #e5edf5;
  border-left: 4px solid var(--accent);
  border-radius: var(--radius-sm);
  padding: 12px;
  background: linear-gradient(180deg, #fff, #fbfcfe);
}
.guide-card.critical { border-left-color: #e11d48; }
.guide-card.focus { border-left-color: #d97706; }
.guide-card.skim { border-left-color: #16a34a; }
.guide-card.follow { border-left-color: #2563eb; }
.guide-card a {
  color: var(--ink);
  font-weight: 900;
  text-decoration: none;
}
.guide-card a:hover { color: var(--accent); }
.guide-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}
.guide-reason {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.45;
}
.card-body {
  display: none;
  border-top: 1px solid #edf0f5;
  padding: 0 18px 18px;
}
.card.open .card-body { display: block; }
.grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
  margin-top: 14px;
}
.field {
  border: 1px solid #edf0f5;
  background: #fbfcfe;
  border-radius: var(--radius-sm);
  padding: 12px;
}
.field strong {
  display: block;
  color: var(--muted);
  font-size: 12px;
  margin-bottom: 5px;
}
.field-body {
  overflow-wrap: anywhere;
  white-space: pre-wrap;
}
.overview-content {
  overflow-wrap: anywhere;
  white-space: pre-wrap;
  color: var(--ink);
}
.comment {
  border-left: 3px solid var(--accent-2);
  padding: 10px 12px;
  background: #fffaf2;
  border-radius: var(--radius-sm);
  margin-top: 10px;
  overflow-wrap: anywhere;
  white-space: pre-wrap;
}
.comment-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 6px;
}
.comment-link {
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
  white-space: nowrap;
}
.pr-readout {
  display: grid;
  grid-template-columns: minmax(0, 1fr);
  gap: 18px;
  align-items: start;
  padding-top: 18px;
}
.pr-story {
  display: grid;
  gap: 16px;
  min-width: 0;
}
.story-block {
  border-top: 1px solid #e7edf4;
  padding-top: 14px;
}
.story-block:first-child {
  border-top: 0;
  padding-top: 0;
}
.story-block.hero-block {
  border: 1px solid #dce9e7;
  border-left: 4px solid var(--accent);
  border-radius: var(--radius-md);
  padding: 15px 16px;
  background: linear-gradient(180deg, #fbfffe, #f8fbfd);
}
.story-block h4,
.review-rail h4,
.comments-panel h4 {
  margin: 0 0 9px;
  color: #17202a;
  font-size: 14px;
  letter-spacing: 0;
}
.story-line {
  display: grid;
  grid-template-columns: 108px minmax(0, 1fr);
  gap: 12px;
  margin: 0;
  padding: 9px 0;
  border-top: 1px solid #edf2f7;
  color: #1f2937;
  line-height: 1.68;
}
.story-line:first-of-type {
  border-top: 0;
  padding-top: 0;
}
.story-label {
  color: #536175;
  font-size: 12px;
  font-weight: 850;
}
.story-text {
  min-width: 0;
  overflow-wrap: anywhere;
  white-space: pre-wrap;
}
.review-rail {
  position: static;
  display: grid;
  gap: 14px;
  align-self: start;
}
.reading-callout {
  display: grid;
  gap: 6px;
  border: 1px solid #e5edf5;
  border-left: 4px solid var(--accent);
  border-radius: var(--radius-sm);
  padding: 12px;
  background: #fff;
}
.reading-callout.critical {
  border-left-color: #e11d48;
  background: linear-gradient(180deg, #fff7f8, #fff);
}
.reading-callout.focus {
  border-left-color: #d97706;
  background: linear-gradient(180deg, #fffbeb, #fff);
}
.reading-callout.skim {
  border-left-color: #16a34a;
  background: linear-gradient(180deg, #f0fdf4, #fff);
}
.reading-callout.follow {
  border-left-color: #2563eb;
  background: linear-gradient(180deg, #eff6ff, #fff);
}
.reading-callout strong {
  font-size: 13px;
}
.reading-callout span {
  color: var(--muted);
  font-size: 12px;
  font-style: italic;
  line-height: 1.5;
}
.story-text mark,
.fact dd mark,
.field-body mark,
.card-summary mark,
.overview-content mark,
.comment mark,
.skip-detail mark {
  border-radius: 5px;
  padding: 0 4px;
  font-weight: 850;
}
.mark-good {
  color: #166534;
  background: #dcfce7;
}
.mark-warn {
  color: #92400e;
  background: #fef3c7;
}
.mark-bad {
  color: #9f1239;
  background: #ffe4e6;
}
.mark-info {
  color: #1d4ed8;
  background: #dbeafe;
}
.fact-list {
  display: grid;
  gap: 10px;
  margin: 0;
  padding: 0;
}
.fact {
  border-top: 1px solid #e7edf4;
  padding-top: 10px;
}
.fact:first-child {
  border-top: 0;
  padding-top: 0;
}
.fact dt {
  margin: 0 0 4px;
  color: #536175;
  font-size: 11px;
  font-weight: 850;
  letter-spacing: 0;
  text-transform: uppercase;
}
.fact dd {
  margin: 0;
  color: #1f2937;
  line-height: 1.55;
  overflow-wrap: anywhere;
  white-space: pre-wrap;
}
.comments-panel {
  border-top: 1px solid #e7edf4;
  padding-top: 14px;
}
.comment-list {
  display: grid;
  gap: 10px;
}
.skip-groups { display: grid; gap: 14px; margin-top: 12px; }
.skip-group {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.skip-group-head {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 14px;
  padding: 15px 16px;
  cursor: pointer;
  background: #fbfcfe;
}
.skip-group-title { margin: 0; font-size: 16px; }
.skip-group-count {
  color: var(--info);
  background: #eaf1ff;
  border-radius: 999px;
  padding: 5px 10px;
  font-weight: 800;
  font-size: 12px;
}
.skip-group-body { display: none; border-top: 1px solid #edf0f5; }
.skip-group.open .skip-group-body { display: block; }
.skip-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(170px, 0.7fr);
  gap: 12px;
  padding: 13px 16px;
  border-bottom: 1px solid #edf0f5;
}
.skip-row:last-child { border-bottom: 0; }
.skip-title { font-weight: 750; }
.skip-detail { color: var(--muted); font-size: 13px; margin-top: 4px; }
.blocker-list {
  display: grid;
  gap: 8px;
  margin: 8px 0 0;
  padding: 0;
  list-style: none;
}
.blocker-item {
  border: 1px solid #e5edf5;
  border-left: 3px solid var(--warn);
  border-radius: var(--radius-sm);
  padding: 9px 10px;
  background: #fff;
}
.blocker-item a {
  color: var(--accent);
  font-weight: 800;
}
.blocker-meta {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.45;
  margin-top: 4px;
}
.empty {
  border: 1px dashed var(--line);
  border-radius: 8px;
  padding: 22px;
  color: var(--muted);
  text-align: center;
  background: rgba(255, 255, 255, 0.68);
}
.footer {
  color: var(--muted);
  font-size: 12px;
  margin-top: 22px;
}
body {
  font-size: 14px;
}
a:hover { color: #0a5d57; }
.shell { max-width: 1280px; padding: 24px 20px 64px; }
.topbar {
  align-items: center;
  background:
    linear-gradient(135deg, var(--accent-soft), rgba(37, 99, 235, 0.04)),
    var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 22px 24px;
  box-shadow: var(--shadow-lg);
}
.subtitle { max-width: 860px; font-size: 14px; }
.toggle { box-shadow: none; }
.toggle button { padding: 7px 12px; }
.metrics {
  grid-template-columns: repeat(5, minmax(140px, 1fr));
  gap: 10px;
  margin: 16px 0;
}
.metric {
  position: relative;
  overflow: hidden;
  padding: 14px 16px;
}
.metric::before {
  content: "";
  position: absolute;
  inset: 0 auto 0 0;
  width: 4px;
  background: var(--accent);
}
.metric .value { font-size: 30px; }
.metric .label {
  margin-top: 6px;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
}
.dashboard {
  grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr);
}
.panel {
  box-shadow: var(--shadow);
  padding: 18px;
}
.panel h2 {
  font-size: 15px;
  letter-spacing: 0;
}
.bar-row {
  grid-template-columns: 112px 1fr 32px;
  padding: 4px 0;
}
.bar-label { font-weight: 700; }
.bar-track { height: 9px; background: #edf2f7; }
.timeline-item {
  grid-template-columns: 74px 1fr;
  padding: 9px 0;
}

  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  font-size: 12px;
}
.overview-content {

  border-radius: 8px;
  padding: 14px;
}
.controls {
  position: sticky;
  top: 0;
  z-index: 20;
  background: rgba(244, 246, 248, 0.88);

  border: 1px solid rgba(220, 227, 236, 0.86);
  border-radius: 8px;
  padding: 10px;
  margin: 18px 0 14px;
  box-shadow: var(--shadow);
}
.search {
  min-height: 40px;
  border-color: #cfd8e3;
  box-shadow: inset 0 1px 0 rgba(15, 23, 42, 0.02);
}
.search:focus {
  outline: 2px solid rgba(15, 118, 110, 0.22);
  border-color: var(--accent);
}
.chips { align-items: center; }
.chip, .utility-button {
  min-height: 34px;
  border: 1px solid #cfd8e3;
  background: #fff;
  border-radius: 999px;
  color: var(--ink);
  cursor: pointer;
  font: inherit;
  font-weight: 750;
  padding: 7px 11px;
}
.chip:hover, .utility-button:hover { border-color: #9aa8bb; }
.chip.active {
  background: #15202b;
  border-color: #15202b;
  color: #fff;
}
.utilities {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-left: auto;
}
.utility-button {
  color: var(--muted);
  font-size: 12px;
}
.section-heading {
  margin: 24px 0 12px;
  padding-top: 2px;
}
.section-heading h2 { font-size: 18px; }
.cards { gap: 14px; }
.card {
  border-left: 0;
  box-shadow: var(--shadow);
  transition: box-shadow 160ms ease, transform 160ms ease, border-color 160ms ease;
}
.card:hover {
  border-color: #c8d2df;
  box-shadow: var(--shadow-lg);
}
.card-head {
  align-items: center;
  background: linear-gradient(180deg, #fff, #fbfcfe);
  border-left: 4px solid var(--accent);
}
.card[data-status="approved"] .card-head,
.card[data-status="merged"] .card-head { border-left-color: var(--ok); }
.card[data-status="commented"] .card-head { border-left-color: var(--accent-2); }
.card[data-status="maintained"] .card-head { border-left-color: var(--accent); }

.card[data-status="blocked"] .card-head { border-left-color: var(--bad); }
.card.priority-critical .card-head {
  background: linear-gradient(180deg, #fff7f8, #fff);
}
.card.priority-focus .card-head {
  background: linear-gradient(180deg, #fffbeb, #fff);
}
.card.priority-follow .card-head {
  background: linear-gradient(180deg, #eff6ff, #fff);
}
.card-title {
  font-size: 16px;
  line-height: 1.42;
}
.meta {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 7px;
}
.badge {
  gap: 7px;
  min-width: 0;
  padding: 6px 11px;
  text-transform: none;
  white-space: nowrap;
}
.card-summary {
  color: #526173;
  margin-top: 9px;
}
.badge::before {
  content: "";
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: currentColor;
}
.card-body {
  background: #fff;
  padding: 0 18px 18px;
}
.grid {
  grid-template-columns: 1fr;
  gap: 10px;
}
.field {
  background: #fbfcfe;
  border-color: #e6ecf3;
  padding: 13px 14px;
}
.field strong {
  color: #536175;
  font-size: 11px;
  letter-spacing: 0;
  text-transform: uppercase;
}
.field-body {
  color: #1f2937;
  line-height: 1.62;
}
.comment {
  background: #fff8ed;
  border-left-color: var(--accent-2);
  color: #1f2937;
}
.comment-head {
  color: #1f2937;
}
.pr-readout {
  grid-template-columns: minmax(0, 1fr);
  gap: 18px;
}
.story-block {
  border-top-color: #e2e8f0;
}
.story-block.hero-block {
  background: linear-gradient(180deg, #fbfffe, #f7fbfa);
  border-color: #d5e7e4;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
}
.story-block h4,
.review-rail h4,
.comments-panel h4 {
  font-size: 13px;
  font-weight: 900;
}
.story-line {
  grid-template-columns: 116px minmax(0, 1fr);
  border-top-color: #e9eef5;
}
.story-label {
  color: #607086;
}
.review-rail {
  border: 1px solid #e3eaf2;
  border-radius: 8px;
  padding: 14px;
  background: #fbfcfe;
}
.review-rail .fact-list {
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
}
.fact {
  border-top-color: #e8eef5;
}
.comments-panel {
  border-top-color: #e2e8f0;
}
.comment-list {
  gap: 12px;
}
.skip-group {
  box-shadow: var(--shadow);
}
.skip-group-head {
  align-items: center;
  background: linear-gradient(180deg, #fff, #fbfcfe);
}
.skip-row {
  grid-template-columns: minmax(0, 1.15fr) minmax(220px, 0.85fr);
}
.blocker-item {
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.75);
}
.empty {
  background: #fff;
  box-shadow: var(--shadow);
}
@media (max-width: 840px) {
  .topbar, .card-head { grid-template-columns: 1fr; display: grid; }
  .card-actions { align-items: flex-start; flex-direction: row; flex-wrap: wrap; }
  .dashboard, .grid, .metrics { grid-template-columns: 1fr; }
  .guide-grid { grid-template-columns: 1fr; }
  .headline-row { align-items: flex-start; flex-direction: column; }
  .pr-readout { grid-template-columns: 1fr; }
  .review-rail { position: static; }
  .story-line { grid-template-columns: 1fr; gap: 4px; }
  .timeline-item { grid-template-columns: 1fr; }
  .controls { position: static; }
  .utilities { width: 100%; margin-left: 0; }
  .utility-button { flex: 1 1 auto; }
  .skip-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div>
      <h1 data-i18n="title">MyCR 审核报告</h1>
      <p class="subtitle" id="subtitle"></p>
    </div>
    <div class="toggle" aria-label="Language">
      <button type="button" data-lang-button="zh" class="active">中文</button>
      <button type="button" data-lang-button="en">EN</button>
    </div>
  </div>
  <section class="metrics" id="metrics"></section>
  <section class="dashboard">
    <div class="panel">
      <h2 data-i18n="statusDistribution">状态分布</h2>
      <div class="bars" id="bars"></div>
    </div>
    <div class="panel">
      <h2 data-i18n="timeline">执行时间线</h2>
      <div class="timeline" id="timeline"></div>
    </div>
  </section>
  <section class="panel" id="overviewPanel" style="display: none; margin-top: 16px;">
    <h2 data-i18n="overviewSection">整体摘要</h2>
    <div class="overview-content" id="overviewContent"></div>
  </section>
  <section class="panel reading-guide" id="readingGuidePanel" style="display: none;">
    <div class="guide-head">
      <h2 data-i18n="readingGuide">阅读建议</h2>
      <span data-i18n="readingGuideHint">先看高风险和高影响 PR</span>
    </div>
    <div class="guide-grid" id="readingGuide"></div>
  </section>
  <section class="controls">
    <input class="search" id="search" type="search">
    <div class="chips" id="chips"></div>
    <div class="utilities">
      <button type="button" class="utility-button" id="openAll"></button>
      <button type="button" class="utility-button" id="closeAll"></button>
    </div>
  </section>
  <section class="section-heading">
    <h2 data-i18n="reviewedSection">已处理 PR</h2>
    <div class="hint" data-i18n="reviewedHint">点击卡片查看细节</div>
  </section>
  <main class="cards" id="cards"></main>
  <section class="section-heading" id="skippedHeading">
    <h2 data-i18n="skippedGroups">未审核 PR 分类</h2>
    <div class="hint" data-i18n="skippedHint">按排除原因分组</div>
  </section>
  <section class="skip-groups" id="skipGroups"></section>
  <section class="section-heading" id="followUpHeading">
    <h2 data-i18n="followUpSection">后续关注</h2>
    <div class="hint" data-i18n="followUpHint">接近可处理但仍有阻塞</div>
  </section>
  <section class="cards" id="followUpCards"></section>
  <div class="footer" id="footer"></div>
</div>

const reportData = {"approved":[{"approach":"Verified service.go and tests at current head, confirmed all effective checks including codecov/patch were green, then approved/merged with --match-head-commit.","approval_body":"LGTM","attention_points":"Merged after stale blocker audit confirmed the old thread was fixed.","author":"hyprh","ci_state":"checks: pass:all; codecov/patch:success; merge:CLEAN; review:APPROVED","design_assessment":"The fix is local to the init error path and preserves the intended schema verification behavior.","head_sha":"64a0bde27ba61980ce67789a483ff628c17d1a9f","match_head_commit":"64a0bde27ba61980ce67789a483ff628c17d1a9f","merge_commit":"fa78309912ac27d3513ce4599cd864c51dedd2d3","merged_at":"2026-07-02T04:15:40Z","modules":"session/postgres/service.go; session/postgres/service_test.go","number":2026,"outcome":"Submitted LGTM earlier and squash merged this run. merge commit: fa78309912ac27d3513ce4599cd864c51dedd2d3","problem":"Previous review asked to close pgClient when initDB fails; the current head added that close path and matching sqlmock ExpectClose coverage.","risk":"Low after CI and blocker verification.","status":"merged","technical_background":"PostgreSQL session init must fail visibly when schema/index verification is unsafe, and it must close the opened client on initDB failure so callers do not inherit a leaked connection.","tests_docs":"GitHub effective checks were green; no local test rerun was needed after CI and targeted diff verification.","title":"session/postgres: surface init failures as errors and fail on missing unique index","url":"https://github.com/trpc-group/trpc-agent-go/pull/2026"},{"approach":"Verified current head routes workspace-looking absolute grants through resolveWorkspacePath, limits macOS temp/cache defaults to ancestor metadata, and has green effective checks including codecov/patch.","approval_body":"LGTM","attention_points":"CodeRabbit left only trivial/nitpick suggestions; not a merge blocker.","author":"cuboya","ci_state":"checks: pass:all; codecov/patch:success; merge:CLEAN; review:APPROVED","design_assessment":"The current design keeps Linux behavior separate via build tags while tightening macOS path containment and default read policy.","head_sha":"e72eccaf5f2b449c8626bd98f79f0035329b55a0","match_head_commit":"e72eccaf5f2b449c8626bd98f79f0035329b55a0","merge_commit":"dcd08c5c4dbf41ef19d28d72058db8aa9e23b270","merged_at":"2026-07-02T04:29:58Z","modules":"codeexecutor/sandbox/*; openclaw/app/*; sandbox docs and examples","number":2039,"outcome":"Submitted LGTM and squash merged. merge commit: dcd08c5c4dbf41ef19d28d72058db8aa9e23b270","problem":"Previous blockers covered workspace symlink escape and overly broad host temp/cache reads.","risk":"Low to medium; OS sandbox behavior is sensitive, but the reviewed blockers are fixed and CI is green.","status":"merged","technical_background":"The macOS Seatbelt backend maps the repository sandbox permission profile into SBPL rules; the key safety question was whether workspace roots and host temp/cache defaults preserved the same containment boundary as the existing sandbox code.","tests_docs":"GitHub effective checks were all green; subagent read-only review found no blocker at e72eccaf5f2b449c8626bd98f79f0035329b55a0.","title":"feat(sandbox): add macOS sandbox backend","url":"https://github.com/trpc-group/trpc-agent-go/pull/2039"}],"blocked":[],"commented":[{"approach":"Verified service.go distinguishes no target from targetActive=false, and anchored the blocker on the test setup line that currently returns sql.ErrNoRows.","attention_points":"Submitted REQUEST_CHANGES review with inline comments; comment URLs were validated by the GitHub API response.","author":"shanghai-Jerry","ci_state":"checks: pass:162, pending:0, fail:0; merge: BLOCKED; review: CHANGES_REQUESTED","design_assessment":"Verified service.go distinguishes no target from targetActive=false, and anchored the blocker on the test setup line that currently returns sql.ErrNoRows.","head_sha":"ec1309c616331a5976eea603343b9a3df527757f","inline_comments":[{"body":"`TestService_UpdateMemory_SoftDelete_RotateMemory_ReviveDeletedRow` still returns `sql.ErrNoRows`, so it exercises the no-target path instead of reviving an existing soft-deleted target. Return `active=false` from this pre-check and keep the no-target case separate so the A -> B -> A regression is actually covered.\n\n<details><summary>中文<\/summary>\n这个测试名声称覆盖 revive 已软删除目标，但这里返回的是 `sql.ErrNoRows`，实际只跑了目标不存在路径。建议让这个 pre-check 返回 `active=false`，另保留独立的 no-target 用例，这样 A -> B -> A 回归才真正被覆盖。\n<\/details>","line":763,"path":"memory/mysqlvec/service_test.go","summary":"`TestService_UpdateMemory_SoftDelete_RotateMemory_ReviveDeletedRow` still returns `sql.ErrNoRows`, so it exercises the no-target path instead of reviving an existing soft-deleted target. Return `active=false` from this pre-check and keep the no-target case separate so the A -> B -> A regression is actually covered.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2017#discussion_r3510477107"}],"number":2017,"outcome":"Posted blocking inline review comments and submitted request changes.","problem":"The revive regression test still returns sql.ErrNoRows in the target pre-check, so it does not cover a soft-deleted target row.","problem_framing":"The revive regression test still returns sql.ErrNoRows in the target pre-check, so it does not cover a soft-deleted target row.","risk":"A regression in revive semantics can pass because the test never proves the deleted target path.","root_cause":"The revive regression test still returns sql.ErrNoRows in the target pre-check, so it does not cover a soft-deleted target row.","status":"commented","technical_background":"mysqlvec rotateMemory uses soft-delete semantics and should be able to rotate A -> B -> A by reviving an existing soft-deleted row instead of exercising only the target-missing path.","tests_docs":"No local test mutation; finding was verified by source/diff inspection and GitHub effective state.","title":"fix: use UPDATE instead of DELETE for soft delete in rotateMemory","url":"https://github.com/trpc-group/trpc-agent-go/pull/2017"},{"approach":"Verified the earlier custom store/pointer blocker is fixed, then posted a new blocker on the current Decide call site.","attention_points":"Submitted REQUEST_CHANGES review with inline comments; comment URLs were validated by the GitHub API response.","author":"Rememorio","ci_state":"checks: pass:162, pending:0, fail:0; merge: BLOCKED; review: CHANGES_REQUESTED","design_assessment":"Verified the earlier custom store/pointer blocker is fixed, then posted a new blocker on the current Decide call site.","head_sha":"9f48a84e649f565175ba7153f63f0810aa422476","inline_comments":[{"body":"`autoPromote` calls `ApprovalService.Decide`, but that approve path is still read-then-publish/write rather than conditional. If a human approve/reject races after the sweeper reads `pending_approval` but before it publishes and writes `active`, the timeout path can overwrite the human decision; serialize or CAS `Decide` per revision and return `ErrAlreadyDecided` without publishing when status changed.\n\n<details><summary>中文<\/summary>\n`autoPromote` 虽然复用了 `ApprovalService.Decide`，但 approve 路径本身仍是先读状态再 publish/write，而不是条件更新。如果人工 approve/reject 在 sweeper 读到 `pending_approval` 之后、发布并写入 `active` 之前发生，超时路径仍可能覆盖人工决定。建议按 revision 串行化或对 `Decide` 做 CAS；状态已变化时直接返回 `ErrAlreadyDecided`，不要再发布。\n<\/details>","line":381,"path":"evolution/auto_expire.go","summary":"`autoPromote` calls `ApprovalService.Decide`, but that approve path is still read-then-publish/write rather than conditional. If a human approve/reject races after the sweeper reads `pending_approval` but before it publishes and writes `active`, the timeout path can overwrite the human decision; serialize or CAS `Decide` per revision and return `ErrAlreadyDecided` without publishing when status changed.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2041#discussion_r3510477192"}],"number":2041,"outcome":"Posted blocking inline review comments and submitted request changes.","problem":"autoPromote calls Decide, but the approve path is still read-then-publish/write rather than conditional, so timeout auto-approve can overwrite a concurrent human decision.","problem_framing":"autoPromote calls Decide, but the approve path is still read-then-publish/write rather than conditional, so timeout auto-approve can overwrite a concurrent human decision.","risk":"Audit state and live skill state can diverge if a human reject races with auto-expire.","root_cause":"autoPromote calls Decide, but the approve path is still read-then-publish/write rather than conditional, so timeout auto-approve can overwrite a concurrent human decision.","status":"commented","technical_background":"pending_approval auto-expire reuses ApprovalService.Decide, so the same state-transition path must be safe when a background sweeper and a human decision race at the timeout boundary.","tests_docs":"No local test mutation; finding was verified by source/diff inspection and GitHub effective state.","title":"{evolution, openclaw, docs}: add rollback API and pending_approval auto-expire","url":"https://github.com/trpc-group/trpc-agent-go/pull/2041"},{"approach":"Verified rules.go still skips -K/--config as a value option and still applies generic colon stripping to host-bearing curl option operands.","attention_points":"Submitted REQUEST_CHANGES review with inline comments; comment URLs were validated by the GitHub API response.","author":"everfid-ever","ci_state":"checks: pass:162, pending:0, fail:0; merge: BLOCKED; review: CHANGES_REQUESTED","design_assessment":"Verified rules.go still skips -K/--config as a value option and still applies generic colon stripping to host-bearing curl option operands.","head_sha":"02b9d70f397990f794ad76edd59078e0fd6a7231","inline_comments":[{"body":"`curl -K/--config` is skipped as an ordinary value option, but that file can contain `url`, `proxy`, `resolve`, and other egress controls. Deny or require review for opaque curl config files unless the guard safely parses them, and add coverage for the bypass.\n\n<details><summary>中文<\/summary>\n`curl -K/--config` 现在被当作普通取值参数跳过，但配置文件里可以包含 `url`、`proxy`、`resolve` 等真实外连控制。除非 guard 能安全解析该文件，否则应直接 deny/ask，并补上绕过测试。\n<\/details>","line":554,"path":"tool/safety/rules.go","summary":"`curl -K/--config` is skipped as an ordinary value option, but that file can contain `url`, `proxy`, `resolve`, and other egress controls. Deny or require review for opaque curl config files unless the guard safely parses them, and add coverage for the bypass.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2045#discussion_r3510477290"},{"body":"`extractHosts` still treats curl endpoint-rewrite operands as generic `host:port` text, so `--connect-to github.com:443:evil.io:443` and `--resolve github.com:443:1.2.3.4` can pass when only `github.com` is allowed. Parse or fail closed on curl host-bearing options before this generic colon stripping, including `--flag=value` forms.\n\n<details><summary>中文<\/summary>\n`extractHosts` 仍把 curl 的 endpoint rewrite 参数当作普通 `host:port` 处理，所以 `--connect-to github.com:443:evil.io:443` 和 `--resolve github.com:443:1.2.3.4` 会在只允许 `github.com` 时通过。建议在这里做通用冒号截断前，先解析或 fail closed 这些带 host 的 curl 选项，包括 `--flag=value` 形式。\n<\/details>","line":606,"path":"tool/safety/rules.go","summary":"`extractHosts` still treats curl endpoint-rewrite operands as generic `host:port` text, so `--connect-to github.com:443:evil.io:443` and `--resolve github.com:443:1.2.3.4` can pass when only `github.com` is allowed. Parse or fail closed on curl host-bearing options before this generic colon stripping, including `--flag=value` forms.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2045#discussion_r3510477406"}],"number":2045,"outcome":"Posted blocking inline review comments and submitted request changes.","problem":"Previous bare-host and policy-copy blockers were fixed, but curl -K/--config and endpoint rewrite options such as --connect-to/--resolve still bypass or hide effective egress hosts.","problem_framing":"Previous bare-host and policy-copy blockers were fixed, but curl -K/--config and endpoint rewrite options such as --connect-to/--resolve still bypass or hide effective egress hosts.","risk":"A command can appear allowed for github.com while routing to an attacker-controlled host or config-defined endpoint.","root_cause":"Previous bare-host and policy-copy blockers were fixed, but curl -K/--config and endpoint rewrite options such as --connect-to/--resolve still bypass or hide effective egress hosts.","status":"commented","technical_background":"The tool safety guard is a runtime permission policy for exec-like tools; host extraction must fail closed for curl options that can redirect endpoints or load opaque config.","tests_docs":"No local test mutation; finding was verified by source/diff inspection and GitHub effective state.","title":"feat: add tool execution safety guard for secure command scanning and…","url":"https://github.com/trpc-group/trpc-agent-go/pull/2045"},{"approach":"Posted an English-doc inline blocker and called out the Chinese doc needs the same sync.","attention_points":"Submitted REQUEST_CHANGES review with inline comments; comment URLs were validated by the GitHub API response.","author":"Spock12138","ci_state":"checks: pass:162, pending:0, fail:0; merge: BLOCKED; review: CHANGES_REQUESTED","design_assessment":"Posted an English-doc inline blocker and called out the Chinese doc needs the same sync.","head_sha":"ff1824dad6659bf1def6b7e7811ec81144fd3733","inline_comments":[{"body":"The docs promise `SummaryBoundary` last-event-ID comparison, but the implementation normalizes summaries by ignoring `LastEventID` and has a test for that behavior. Remove the last-event-ID claim here and in the Chinese doc, or change the implementation to compare a stable semantic boundary ID.\n\n<details><summary>中文<\/summary>\n文档承诺会比较 `SummaryBoundary` 的 last event ID，但实现会在归一化时忽略 `LastEventID`，并且有测试明确覆盖这个行为。请同步删除英文和中文文档里的 last event ID 承诺，或者改实现去比较稳定的语义边界 ID。\n<\/details>","line":87,"path":"docs/mkdocs/en/session/replay_consistency.md","summary":"The docs promise `SummaryBoundary` last-event-ID comparison, but the implementation normalizes summaries by ignoring `LastEventID` and has a test for that behavior. Remove the last-event-ID claim here and in the Chinese doc, or change the implementation to compare a stable semantic boundary ID.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2049#discussion_r3510477501"}],"number":2049,"outcome":"Posted blocking inline review comments and submitted request changes.","problem":"The docs claim SummaryBoundary last event ID is compared, but implementation tests show LastEventID is intentionally ignored during summary normalization.","problem_framing":"The docs claim SummaryBoundary last event ID is compared, but implementation tests show LastEventID is intentionally ignored during summary normalization.","risk":"The documented replay contract overstates comparison strength and can mislead future backend implementations.","root_cause":"The docs claim SummaryBoundary last event ID is compared, but implementation tests show LastEventID is intentionally ignored during summary normalization.","status":"commented","technical_background":"Replay consistency docs must describe exactly what the normalizer/comparator actually checks, otherwise backend authors may chase a guarantee that tests deliberately ignore.","tests_docs":"No local test mutation; finding was verified by source/diff inspection and GitHub effective state.","title":"test: add replay consistency harness","url":"https://github.com/trpc-group/trpc-agent-go/pull/2049"},{"approach":"Verified each finding against current head and posted five inline blockers across comparator, cases, and harness code.","attention_points":"Submitted REQUEST_CHANGES review with inline comments; comment URLs were validated by the GitHub API response.","author":"xiaosansh","ci_state":"checks: pass:166, pending:0, fail:0; merge: BLOCKED; review: CHANGES_REQUESTED","design_assessment":"Verified each finding against current head and posted five inline blockers across comparator, cases, and harness code.","head_sha":"55eaa9665bea4c5f9e41acbea384356ce293bba9","inline_comments":[{"body":"`filterAllowedDiffs` removes matched allowed diffs entirely, so the JSON report cannot show `allowed_diffs` or explain why an accepted backend difference was ignored. Keep matched records with `SeverityAllowed`, `AllowedDiff`, and `Explanation`, then fail only when non-allowed diffs remain.\n\n<details><summary>中文<\/summary>\n`filterAllowedDiffs` 会把命中的 allowed diff 直接删掉，导致 JSON 报告无法展示 `allowed_diffs`，也无法解释某个后端差异为什么被接受。建议保留这些记录并标成 `SeverityAllowed`，填上 `AllowedDiff` / `Explanation`，最终只在存在非 allowed diff 时失败。\n<\/details>","line":87,"path":"session/replaytest/comparator.go","summary":"`filterAllowedDiffs` removes matched allowed diffs entirely, so the JSON report cannot show `allowed_diffs` or explain why an accepted backend difference was ignored. Keep matched records with `SeverityAllowed`, `AllowedDiff`, and `Explanation`, then fail only when non-allowed diffs remain.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2051#discussion_r3510477612"},{"body":"Event comparison ignores `StateDelta` and `Extensions`, so a backend can drop event state changes or extension payloads while replay still passes. Compare canonicalized state deltas and non-private extensions, with negative tests for both.\n\n<details><summary>中文<\/summary>\n事件比较没有检查 `StateDelta` 和 `Extensions`，因此后端丢掉事件状态变更或扩展 payload 时 replay 仍可能通过。建议比较规范化后的 state delta 和非私有 extensions，并为两类缺失补负向测试。\n<\/details>","line":182,"path":"session/replaytest/comparator.go","summary":"Event comparison ignores `StateDelta` and `Extensions`, so a backend can drop event state changes or extension payloads while replay still passes. Compare canonicalized state deltas and non-private extensions, with negative tests for both.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2051#discussion_r3510477685"},{"body":"All built-in summary replay cases use an empty `FilterKey`, so the harness never proves that backends persist and retrieve keyed summaries correctly. Add a built-in non-empty filter-key summary case instead of only testing filter-key diffs with synthetic comparator maps.\n\n<details><summary>中文<\/summary>\n当前内建 summary replay case 全部使用空 `FilterKey`，所以 harness 从未证明后端能正确持久化和读取带 key 的 summary。建议增加一个非空 filter-key 的内建 summary case，而不是只在 synthetic comparator map 里测试 filter-key 差异。\n<\/details>","line":108,"path":"session/replaytest/cases.go","summary":"All built-in summary replay cases use an empty `FilterKey`, so the harness never proves that backends persist and retrieve keyed summaries correctly. Add a built-in non-empty filter-key summary case instead of only testing filter-key diffs with synthetic comparator maps.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2051#discussion_r3510477778"},{"body":"`UpdateStateStep.DeleteKey` is ignored for session-scoped state because the default branch always calls `UpdateSessionState`. Implement session delete/clear semantics, or return an execution error for `ScopeSession` deletes until the service contract supports them.\n\n<details><summary>中文<\/summary>\n`UpdateStateStep.DeleteKey` 对 session scope 会被忽略，因为 default 分支总是调用 `UpdateSessionState`。请实现 session 状态删除/清理语义，或者在服务契约支持前对 `ScopeSession` delete 返回执行错误。\n<\/details>","line":247,"path":"session/replaytest/harness.go","summary":"`UpdateStateStep.DeleteKey` is ignored for session-scoped state because the default branch always calls `UpdateSessionState`. Implement session delete/clear semantics, or return an execution error for `ScopeSession` deletes until the service contract supports them.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2051#discussion_r3510477884"},{"body":"`AppendTrackStep` silently succeeds when the backend does not implement `session.TrackService`, which lets track replay pass without persisting anything. Return an execution error here; unsupported track backends should be skipped by profile before the step runs.\n\n<details><summary>中文<\/summary>\n当后端没有实现 `session.TrackService` 时，`AppendTrackStep` 现在会静默成功，这会让 track replay 在没有任何持久化的情况下通过。这里应返回执行错误；不支持 track 的后端应该在 profile 阶段被 skip，而不是运行时静默放过。\n<\/details>","line":349,"path":"session/replaytest/harness.go","summary":"`AppendTrackStep` silently succeeds when the backend does not implement `session.TrackService`, which lets track replay pass without persisting anything. Return an execution error here; unsupported track backends should be skipped by profile before the step runs.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2051#discussion_r3510477980"}],"number":2051,"outcome":"Posted blocking inline review comments and submitted request changes.","problem":"The framework currently drops allowed diffs from reports, misses event StateDelta/Extensions, lacks real filter-key summary cases, ignores session-scope DeleteKey, and silently passes track steps on non-track backends.","problem_framing":"The framework currently drops allowed diffs from reports, misses event StateDelta/Extensions, lacks real filter-key summary cases, ignores session-scope DeleteKey, and silently passes track steps on non-track backends.","risk":"Backends can pass replay while losing event payloads, keyed summaries, session deletes, or entire track writes.","root_cause":"The framework currently drops allowed diffs from reports, misses event StateDelta/Extensions, lacks real filter-key summary cases, ignores session-scope DeleteKey, and silently passes track steps on non-track backends.","status":"commented","technical_background":"session/replaytest is intended as a multi-backend consistency framework, so comparator coverage and harness failure modes become part of the storage/session contract.","tests_docs":"No local test mutation; finding was verified by source/diff inspection and GitHub effective state.","title":"session/replaytest: add multi-backend replay consistency test framework","url":"https://github.com/trpc-group/trpc-agent-go/pull/2051"}],"follow_up":[{"author":"bytethm","ci_state":"checks: pass:162, pending:0, fail:0; merge: UNKNOWN; review: CHANGES_REQUESTED","head_sha":"a44030920e4c43191c2c82436c6699f56216cbd8","number":2028,"reason":"修复 runner event ack deadlock、dynamicworkflow stdio unbounded goroutine/finish wait、stderr/token-limit 等阻塞项。","status":"needs_fix","title":"dynamicworkflow: add dynamic workflow orchestration","url":"https://github.com/trpc-group/trpc-agent-go/pull/2028"},{"author":"Nerdlet369","ci_state":"checks: pass:162, pending:0, fail:0; merge: UNKNOWN; review: CHANGES_REQUESTED","head_sha":"130385b130a0c46d99b4280728adf8a8200fe823","number":2044,"reason":"把 policy file 真正接入 scanner rules，并同步 README/规则数量契约。","status":"needs_fix","title":"feat: Tool Safety Scanner with 8 rules and structured audit","url":"https://github.com/trpc-group/trpc-agent-go/pull/2044"},{"author":"xiaosansh","ci_state":"checks: pass:166, pending:0, fail:0; merge: BLOCKED; review: CHANGES_REQUESTED","head_sha":"55eaa9665bea4c5f9e41acbea384356ce293bba9","number":2051,"reason":"修复 replaytest comparator/harness 覆盖缺口后重跑多后端一致性测试。","status":"needs_fix","title":"session/replaytest: add multi-backend replay consistency test framework","url":"https://github.com/trpc-group/trpc-agent-go/pull/2051"},{"author":"everfid-ever","ci_state":"checks: pass:162, pending:0, fail:0; merge: BLOCKED; review: CHANGES_REQUESTED","head_sha":"02b9d70f397990f794ad76edd59078e0fd6a7231","number":2045,"reason":"安全 guard 需要 fail closed/解析 curl config、--connect-to、--resolve 等 endpoint rewrite 选项。","status":"needs_fix","title":"feat: add tool execution safety guard for secure command scanning and…","url":"https://github.com/trpc-gr function text(value, fallback = "") {
  if (value === undefined || value === null || value === "") return fallback;
  if (typeof value === "object" && !Array.isArray(value)) {
    return value[lang] || value.zh || value.en || fallback;
  }
  return String(value);
}

function escapeHtml(value) {
  return text(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatRich(value) {
  let html = escapeHtml(value);
  const replacements = [
    [
      /(P[0-2]|codecov\/patch=FAILURE|go-apidiff=FAILURE|go-apidiff|FAILURE|失败|阻塞|不能合入|不能 merge|未合并|破坏性|breaking|unbounded|无界|绕过|丢失|重复|不稳定|风险)/gi,

    ],
    [
      /(LGTM|已合并|已批准|squash merge|merged|approved|CI 全绿|全绿|修复有效|\bresolved\b|\bresolve\b)/gi,
      "mark-good"
    ],
    [
      /(pending|soft[- ]?CI|软门禁|follow-up|后续|关注|CodeRabbit|reviewability ledger|not_reached)/gi,
      "mark-info"
    ],
    [
      /(导出 API|\bAPI\b|兼容性|\bsession\b|\brunner\b|\bmemory\b|GraphRAG|workspace_exec|OpenAPI|\bpolicy\b|security|安全)/gi,
      "mark-warn"
    ]
  ];
  for (const [pattern, className] of replacements) {
    html = html.replace(pattern, `<mark class="${className}">$1</mark>`);
  }
  return html;
}

  document.getElementById("metrics").innerHTML = metricRows.map(([label, value]) => `
    <div class="metric">
      <div class="value">${value}</div>
      <div class="label">${escapeHtml(label)}</div>
    </div>
  `).join("");
}

function renderBars(items) {
  const byStatus = counts(items);
  const maxCount = Math.max(1, ...Object.values(byStatus));
  document.getElementById("bars").innerHTML = statusOrder.map(status => {
    const value = byStatus[status] || 0;

    return `
      <div class="bar-row">
        <div class="bar-label">${labels[lang][status]}</div>
        <div class="bar-track"><div class="bar-fill ${status}" style="width:${width}%"></div></div>

function renderTimeline() {

  if (!events.length) {
    container.innerHTML = `<div class="empty">${labels[lang].empty}</div>`;

    <div class="timeline-item">

    </div>

function renderOverview() {
  const panel = document.getElementById("overviewPanel");
  const content = document.getElementById("overviewContent");
  const overview = reportData.overview || reportData.summary;
  const body = text(overview);
  if (!body) {
    panel.style.display = "none";
    content.textContent = "";
    return;
  }
  panel.style.display = "block";

}

function renderChips() {

  document.getElementById("chips").innerHTML = chipRows.map(status => `

function matchesSearch(item, query) {
  if (!query) return true;
  const haystack = [
    item.number,
    text(item.title),
    item.author,
    text(item.problem),
    text(item.necessity_assessment),
    text(item.evidence_checked),
    text(item.reproduction_on_base),
    text(item.issue_evidence_gaps),
    text(item.approach),
    text(item.implementation_derivation),
    text(item.solution_fit_assessment),
    text(item.outcome),
    text(item.skip_reason),
    text(item.group_reason),
    text(item.readiness_audit),
    blockersSearchText(item.blockers),
    text(item.risk),
    text(item.ci_state)
  ].join(" ").toLowerCase();
  return haystack.includes(query.toLowerCase());
}

function blockersSearchText(blockers) {
  if (!Array.isArray(blockers)) return "";
  return blockers.map(blocker => {
    if (typeof blocker !== "object" || blocker === null) return text(blocker);
    return [
      blocker.kind,
      blocker.summary,
      blocker.reviewer,
      blocker.path,
      blocker.line,
      blocker.latest_response,
      blocker.verification,
      blocker.url
    ].map(value => text(value)).join(" ");
  }).join(" ");
}

function field(label, value) {
  const body = text(value);
  if (!body) return "";
  return `<div class="field"><strong>${label}</strong><div class="field-body">${formatRich(body)}</div></div>`;
}

function renderBlockers(item) {
  const blockers = Array.isArray(item.blockers) ? item.blockers : [];
  if (!blockers.length) return "";
  const rendered = blockers.map(blocker => {
    const data = typeof blocker === "object" && blocker !== null
      ? blocker
      : { summary: blocker };
    const location = [data.path, data.line ? `:${data.line}` : ""].filter(Boolean).join("");
    const meta = [
      data.kind ? blockerKindLabel(data.kind) : "",
      data.reviewer ? `reviewer: ${text(data.reviewer)}` : "",
      location,
      data.latest_response ? `latest: ${text(data.latest_response)}` : "",
      data.verification ? text(data.verification) : ""
    ].filter(Boolean).join(" · ");
    const summary = formatRich(data.summary || blocker);
    const link = data.url
      ? ` <a href="${escapeHtml(data.url)}">link</a>`
      : "";
    return `<li class="blocker-item"><div>${summary}${link}</div>${meta ? `<div class="blocker-meta">${escapeHtml(meta)}</div>` : ""}</li>`;
  }).join("");
  return `<div class="skip-detail"><strong>${labels[lang].blockerDetails}:</strong></div><ul class="blocker-list">${rendered}</ul>`;
}

function blockerKindLabel(kind) {
  return (labels[lang].blockerKinds || {})[kind] || text(kind);
}

function inlineCommentText(comment) {
  if (comment === undefined || comment === null) return "";
  if (typeof comment !== "object" || Array.isArray(comment)) {
    return text(comment);
  }
  return text(comment.body || comment.summary || comment.message || "");
}

function allPrText(item) {
  const comments = (item.inline_comments || []).map(comment => [
    comment.severity,
    comment.focus,
    comment.body,
    comment.summary,
    comment.path
  ].map(value => text(value)).join(" ")).join(" ");
  const blockers = blockersSearchText(item.blockers);
  return [
    item.status,
    item.number,
    item.title,
    item.author,
    item.problem,
    item.necessity_assessment,
    item.evidence_checked,
    item.reproduction_on_base,
    item.issue_evidence_gaps,
    item.approach,
    item.implementation_derivation,
    item.solution_fit_assessment,
    item.outcome,
    item.risk,
    item.ci_state,
    item.skip_reason,
    item.readiness_audit,
    item.modules,
    item.api_surface,
    comments,
    blockers
  ].map(value => text(value)).join(" ").toLowerCase();
}

function readingAdvice(item) {
  const status = item.status || "skipped";
  const comments = item.inline_comments || [];
  const blockers = item.blockers || [];
  const body = allPrText(item);
  const hasP1 = comments.some(comment =>
    /\bP[01]\b/i.test(text(comment.severity)) ||
    /\bP[01]\b/i.test(inlineCommentText(comment))
  );
  const hasCriticalRisk = hasP1 ||
    /(security|安全|bypass|绕过|breaking|破坏性|unbounded|无界|丢失|重复|不稳定|兼容|api|go-apidiff|failure|失败|不能 merge|不能合入|race|并发)/i.test(body);
  const highImpactFeature =
    /(add|new|新增|support|支持|agent|runner|session|memory|graphrag|knowledge|openapi|workspace_exec|policy|extension|tool|graph|api)/i.test(body);

  const copy = {
    critical: {
      icon: "🔥",
      zh: "重点精读",
      en: "Deep Read",
      reasonZh: comments.length
        ? `有 ${comments.length} 条行级评论，且包含 P1/兼容/正确性/安全类风险。`
        : "包含高风险兼容性或正确性信号，需要重点复核。",
      reasonEn: comments.length
        ? `${comments.length} inline comment(s), including P1, compatibility, correctness, or security risk.`
        : "High-risk compatibility or correctness signal; review carefully."
    },
    focus: {
      icon: "🔎",
      zh: "建议细看",
      en: "Read Carefully",
      reasonZh: comments.length
        ? `有 ${comments.length} 条评论或重要设计取舍，建议看完整结论。`
        : "涉及核心模块、导出 API 或较大功能，建议细看。",
      reasonEn: comments.length
        ? `${comments.length} comment(s) or important design tradeoffs; read the full conclusion.`
        : "Core module, exported API, or larger feature; read carefully."
    },
    skim: {
      icon: "✅",
      zh: "快速略看",
      en: "Quick Skim",
      reasonZh: "风险低或改动较直接，扫结论和 CI 状态即可。",
      reasonEn: "Low risk or straightforward change; skim outcome and CI state."
    },
    follow: {
      icon: "⏳",
      zh: "只看阻塞",
      en: "Blocker Only",
      reasonZh: blockers.length
        ? `主要看 ${blockers.length} 个具体阻塞点，暂不需要读完整实现。`
        : "当前不是可合并状态，先看阻塞和后续动作。",
      reasonEn: blockers.length
        ? `Focus on ${blockers.length} concrete blocker(s); no need to read the full implementation yet.`
        : "Not merge-ready; focus on blockers and next action."
    }
  };

  let level = "skim";
  if (status === "blocked") {
    level = "follow";
  } else if (status === "commented") {
    level = hasCriticalRisk ? "critical" : "focus";
  } else if (status === "maintained") {
    level = hasCriticalRisk || highImpactFeature ? "focus" : "skim";
  } else if (status === "approved") {
    level = hasCriticalRisk || highImpactFeature ? "focus" : "skim";
  } else if (status === "merged") {
    level = highImpactFeature || hasCriticalRisk ? "focus" : "skim";
  } else if (status === "skipped") {
    level = blockers.length || /(conflict|ci|failure|失败|未回应|review)/i.test(body)
      ? "follow"
      : "skim";
  }

  const selected = copy[level];
  return {
    level,
    icon: selected.icon,
    label: lang === "zh" ? selected.zh : selected.en,
    reason: lang === "zh" ? selected.reasonZh : selected.reasonEn
  };
}

function priorityRank(level) {
  return { critical: 4, focus: 3, follow: 2, skim: 1 }[level] || 0;
}

function renderReadingGuide(items) {
  const panel = document.getElementById("readingGuidePanel");
  const container = document.getElementById("readingGuide");
  const candidates = [
    ...items.filter(item => (item.status || "skipped") !== "skipped"),
    ...(reportData.follow_up || []).map(item => ({ ...item, status: item.status || "blocked" }))
  ].map(item => ({ item, advice: readingAdvice(item) }))
    .filter(entry => entry.advice.level !== "skim")
    .sort((left, right) => priorityRank(right.advice.level) - priorityRank(left.advice.level));

  if (!candidates.length) {
    panel.style.display = "none";
    container.innerHTML = "";
    return;
  }

  panel.style.display = "block";
  container.innerHTML = candidates.slice(0, 9).map(entry => {
    const item = entry.item;
    const advice = entry.advice;
    const prText = item.number ? `#${item.number}` : "PR";
    const prLink = item.url
      ? `<a href="${escapeHtml(item.url)}">${prText} · ${escapeHtml(text(item.title))}</a>`
      : `<span>${prText} · ${escapeHtml(text(item.title))}</span>`;
    return `
      <article class="guide-card ${advice.level}">
        <div class="guide-meta">
          <span class="read-pill ${advice.level}">${advice.icon} ${escapeHtml(advice.label)}</span>
          <span class="badge ${item.status || "skipped"}">${labels[lang][item.status] || item.status || labels[lang].skipped}</span>
        </div>
        <div>${prLink}</div>
        <div class="guide-reason">${escapeHtml(advice.reason)}</div>
      </article>
    `;
  }).join("");
}

function storyLine(label, value) {
  const body = text(value);
  if (!body) return "";
  return `
    <p class="story-line">
      <span class="story-label">${escapeHtml(label)}</span>
      <span class="story-text">${formatRich(body)}</span>
    </p>
  `;
}

function storyBlock(title, rows, className = "") {
  const body = rows.filter(Boolean).join("");
  if (!body) return "";
  const classes = ["story-block", className].filter(Boolean).join(" ");
  return `<section class="${classes}"><h4>${escapeHtml(title)}</h4>${body}</section>`;
}

function compactSummary(item) {
  const candidates = [
    item.outcome,
    item.skip_reason,
    item.reason,
    item.problem,
    item.design_assessment,
    item.risk
  ].map(value => text(value).trim()).filter(Boolean);
  return candidates[0] || labels[lang].summaryFallback;
}

function updateCardToggle(card) {
  const button = card.querySelector(".card-toggle");
  if (!button) return;
  const open = card.classList.contains("open");
  button.textContent = open ? labels[lang].collapseDetails : labels[lang].expandDetails;
  button.setAttribute("aria-expanded", open ? "true" : "false");
}

function setCardOpen(card, open) {
  card.classList.toggle("open", open);
  updateCardToggle(card);
}

function factItem(label, value) {
  const body = text(value);
  if (!body) return "";
  return `
    <div class="fact">
      <dt>${escapeHtml(label)}</dt>
      <dd>${formatRich(body)}</dd>
    </div>
  `;
}

function directFixesText(fixes) {
  if (!Array.isArray(fixes) || !fixes.length) return "";
  return fixes.map(fix => {
    if (typeof fix !== "object" || fix === null) return text(fix);
    return [
      fix.branch ? `branch: ${text(fix.branch)}` : "",
      fix.commit ? `commit: ${text(fix.commit)}` : "",
      fix.message ? `message: ${text(fix.message)}` : "",
      fix.files ? `files: ${Array.isArray(fix.files) ? fix.files.map(file => text(file)).join(", ") : text(fix.files)}` : "",
      fix.tests ? `tests: ${Array.isArray(fix.tests) ? fix.tests.map(test => text(test)).join(", ") : text(fix.tests)}` : "",
      fix.push_state ? `push: ${text(fix.push_state)}` : "",
      fix.ci_state ? `CI: ${text(fix.ci_state)}` : ""
    ].filter(Boolean).join(" · ");
  }).join("\n");
}

function renderReviewRail(item) {
  const advice = readingAdvice(item);
  const callout = `
    <div class="reading-callout ${advice.level}">
      <strong>${advice.icon} ${escapeHtml(advice.label)}</strong>
      <span>${escapeHtml(advice.reason)}</span>
    </div>
  `;
  const facts = [
    factItem(labels[lang].outcome, item.outcome),
    factItem(labels[lang].necessityAssessment, item.necessity_assessment),
    factItem(labels[lang].reproductionOnBase, item.reproduction_on_base),
    factItem(labels[lang].solutionFitAssessment, item.solution_fit_assessment),
    factItem(labels[lang].risk, item.risk),
    factItem(labels[lang].ci, item.ci_state),
    factItem(labels[lang].attentionPoints, item.attention_points),
    factItem(labels[lang].directFixes, directFixesText(item.direct_fixes)),
    factItem(labels[lang].selfReviewPolicy, item.self_review_policy),
    factItem(labels[lang].testsDocs, item.tests_docs),
    factItem(labels[lang].modules, item.modules),
    factItem(labels[lang].apiSurface, item.api_surface),
    factItem(labels[lang].reason, item.skip_reason)
  ].filter(Boolean).join("");
  if (!facts) return `<aside class="review-rail">${callout}</aside>`;
  return `<aside class="review-rail">${callout}<h4>${labels[lang].reviewSummary}</h4><dl class="fact-list">${facts}</dl></aside>`;
}

function renderComments(item) {
  const comments = item.inline_comments || [];
  if (!comments.length) return "";
  const rendered = comments.map(comment => {
    const data = typeof comment === "object" && comment !== null && !Array.isArray(comment)
      ? comment
      : { body: comment };
    const location = `${escapeHtml(data.path || "")}${data.line ? ":" + escapeHtml(data.line) : ""}`;
    const source = data.url
      ? `<a class="comment-link" href="${escapeHtml(data.url)}">GitHub</a>`
      : "";
    return `
      <div class="comment">
        <div class="comment-head">
          <strong>${location}</strong>
          ${source}
        </div>
        <div>${formatRich(inlineCommentText(data))}</div>
        ${data.focus ? `<div><strong>${labels[lang].focus}:</strong> ${escapeHtml(text(data.focus))}</div>` : ""}
        ${data.severity ? `<div><strong>${labels[lang].severity}:</strong> ${escapeHtml(text(data.severity))}</div>` : ""}
      </div>
    `;
  }).join("");
  return `<section class="comments-panel">
    <h4>${labels[lang].inlineComments}</h4>
    <div class="comment-list">${rendered}</div>
  </section>`;
}

function renderPrReadout(item) {
  const story = [
    storyBlock(labels[lang].backgroundAndProblem, [
      storyLine(labels[lang].technicalBackground, item.technical_background),
      storyLine(labels[lang].problem, item.problem),
      storyLine(labels[lang].necessityAssessment, item.necessity_assessment),
      storyLine(labels[lang].evidenceChecked, item.evidence_checked),
      storyLine(labels[lang].reproductionOnBase, item.reproduction_on_base),
      storyLine(labels[lang].issueEvidenceGaps, item.issue_evidence_gaps),
      storyLine(labels[lang].problemFraming, item.problem_framing),
      storyLine(labels[lang].rootCause, item.root_cause)
    ], "hero-block"),
    storyBlock(labels[lang].solutionAndTradeoffs, [
      storyLine(labels[lang].approach, item.approach),
      storyLine(labels[lang].implementationDerivation, item.implementation_derivation),
      storyLine(labels[lang].solutionFitAssessment, item.solution_fit_assessment),
      storyLine(labels[lang].alternativeDesigns, item.alternative_designs),
      storyLine(labels[lang].tradeoffs, item.tradeoffs),
      storyLine(labels[lang].designAssessment, item.design_assessment)
    ]),
    storyBlock(labels[lang].impactAndEvidence, [
      storyLine(labels[lang].changeInventory, item.change_inventory),
      storyLine(labels[lang].semanticChanges, item.semantic_changes),
      storyLine(labels[lang].behaviorImpact, item.behavior_impact),
      storyLine(labels[lang].moduleImpact, item.module_impact),
      storyLine(labels[lang].crossModuleImpact, item.cross_module_impact)
    ]),
    renderComments(item)
  ].filter(Boolean).join("");
  return `<div class="pr-readout"><div class="pr-story">${story}</div>${renderReviewRail(item)}</div>`;
}

function renderCards() {
  const query = document.getElementById("search").value.trim();
  const visible = prs().filter(item => (item.status || "skipped") !== "skipped")
    .filter(item => {
    const status = item.status || "skipped";
    return (filter === "all" || status === filter) && matchesSearch(item, query);
  });
  const container = document.getElementById("cards");
  if (!visible.length) {
    container.innerHTML = `<div class="empty">${labels[lang].empty}</div>`;
    return;
  }
  container.innerHTML = visible.map(item => {
    const status = item.status || "skipped";
    const advice = readingAdvice(item);
    const summary = compactSummary(item);
    const prText = item.number ? `#${item.number}` : "PR";
    const prLink = item.url
      ? `<a href="${escapeHtml(item.url)}">${prText}</a>`
      : prText;
    return `
      <article class="card priority-${advice.level}" data-status="${status}">
        <div class="card-head">
          <div>
            <div class="headline-row">
              <h3 class="card-title">${prLink} · ${escapeHtml(text(item.title))}</h3>
              <span class="read-pill ${advice.level}">${advice.icon} ${escapeHtml(advice.label)}</span>
            </div>
            <div class="meta">
              <span>${labels[lang].author}: ${escapeHtml(item.author || "")}</span>
              <span class="advice-reason">${escapeHtml(advice.reason)}</span>
            </div>
            <div class="card-summary">${formatRich(summary)}</div>
          </div>
          <div class="card-actions">
            <span class="badge ${status}">${labels[lang][status] || status}</span>
            <button class="card-toggle" type="button" aria-expanded="false">${labels[lang].expandDetails}</button>
          </div>
        </div>
        <div class="card-body">
          ${renderPrReadout(item)}
        </div>
      </article>
    `;
  }).join("");
  document.querySelectorAll(".card-head").forEach(head => {
    head.addEventListener("click", event => {
      if (event.target.closest("a")) return;
      const card = head.closest(".card");
      setCardOpen(card, !card.classList.contains("open"));
    });
  });
  document.querySelectorAll(".card").forEach(card => updateCardToggle(card));
}

function renderSkipGroups() {
  const heading = document.getElementById("skippedHeading");
  const container = document.getElementById("skipGroups");
  if (!["all", "skipped"].includes(filter)) {
    heading.style.display = "none";
    container.style.display = "none";
    return;
  }
  heading.style.display = "flex";
  container.style.display = "grid";
  const query = document.getElementById("search").value.trim();
  const groups = skippedGroups().map(group => {
    const reason = group.reason || "";
    const items = (group.items || []).map(item => ({
      ...item,
      status: item.status || "skipped",
      group_reason: reason,
      skip_reason: item.skip_reason || reason
    })).filter(item => matchesSearch(item, query));
    return { reason, items };
  }).filter(group => group.items.length > 0);
  if (!groups.length) {
    container.innerHTML = `<div class="empty">${labels[lang].empty}</div>`;
    return;
  }
  container.innerHTML = groups.map((group, index) => `
    <article class="skip-group open">
      <div class="skip-group-head" data-skip-group="${index}">
        <h3 class="skip-group-title">${escapeHtml(text(group.reason))}</h3>
        <span class="skip-group-count">${group.items.length} ${labels[lang].items}</span>
      </div>
      <div class="skip-group-body">
        ${group.items.map(item => {
          const prText = item.number ? `#${item.number}` : "PR";
          const prLink = item.url
            ? `<a href="${escapeHtml(item.url)}">${prText}</a>`
            : prText;
          return `
            <div class="skip-row">
              <div>
                <div class="skip-title">${prLink} · ${escapeHtml(text(item.title))}</div>
                <div class="skip-detail">${labels[lang].author}: ${escapeHtml(item.author || "")}</div>
              </div>
              <div>
                <div><strong>${labels[lang].blocker}:</strong> ${formatRich(text(item.skip_reason))}</div>
                ${item.readiness_audit ? `<div class="skip-detail"><strong>${labels[lang].readinessAudit}:</strong> ${formatRich(text(item.readiness_audit))}</div>` : ""}
                ${item.necessity_assessment ? `<div class="skip-detail"><strong>${labels[lang].necessityAssessment}:</strong> ${formatRich(text(item.necessity_assessment))}</div>` : ""}
                ${item.evidence_checked ? `<div class="skip-detail"><strong>${labels[lang].evidenceChecked}:</strong> ${formatRich(text(item.evidence_checked))}</div>` : ""}
                ${item.reproduction_on_base ? `<div class="skip-detail"><strong>${labels[lang].reproductionOnBase}:</strong> ${formatRich(text(item.reproduction_on_base))}</div>` : ""}
                ${item.issue_evidence_gaps ? `<div class="skip-detail"><strong>${labels[lang].issueEvidenceGaps}:</strong> ${formatRich(text(item.issue_evidence_gaps))}</div>` : ""}
                ${item.implementation_derivation ? `<div class="skip-detail"><strong>${labels[lang].implementationDerivation}:</strong> ${formatRich(text(item.implementation_derivation))}</div>` : ""}
                ${item.solution_fit_assessment ? `<div class="skip-detail"><strong>${labels[lang].solutionFitAssessment}:</strong> ${formatRich(text(item.solution_fit_assessment))}</div>` : ""}
                ${renderBlockers(item)}
                ${item.ci_state ? `<div class="skip-detail">${formatRich(text(item.ci_state))}</div>` : ""}
                ${item.risk ? `<div class="skip-detail">${formatRich(text(item.risk))}</div>` : ""}
              </div>
            </div>
          `;
        }).join("")}
      </div>
    </article>
  `).join("");
  document.querySelectorAll("[data-skip-group]").forEach(head => {
    head.addEventListener("click", () => {
      head.closest(".skip-group").classList.toggle("open");
    });
  });
}

function renderFollowUp() {
  const heading = document.getElementById("followUpHeading");
  const container = document.getElementById("followUpCards");
  if (!["all", "skipped", "blocked"].includes(filter)) {
    heading.style.display = "none";
    container.style.display = "none";
    return;
  }
  const query = document.getElementById("search").value.trim().toLowerCase();
  const items = (reportData.follow_up || []).filter(item => {
    if (!query) return true;
    return [
      item.number,
      item.author,
      text(item.title),
      text(item.reason),
      text(item.next)
    ].join(" ").toLowerCase().includes(query);
  });
  if (!items.length) {
    heading.style.display = "none";
    container.style.display = "none";
    return;
  }
  heading.style.display = "flex";
  container.style.display = "grid";
  container.innerHTML = items.map(item => {
    const prText = item.number ? `#${item.number}` : "PR";
    const prLink = item.url
      ? `<a href="${escapeHtml(item.url)}">${prText}</a>`
      : prText;
    return `
      <article class="card open" data-status="blocked">
        <div class="card-head">
          <div>
            <h3 class="card-title">${prLink} · ${escapeHtml(text(item.title))}</h3>
            <div class="meta">${labels[lang].author}: ${escapeHtml(item.author || "")}</div>
          </div>
          <span class="badge blocked">${labels[lang].followups}</span>
        </div>
        <div class="card-body">
          <div class="grid">
            ${field(labels[lang].reason, item.reason)}
            ${field(labels[lang].outcome, item.next)}
          </div>
        </div>
      </article>
    `;
  }).join("");
}

function render() {
  const items = prs();
  renderStatic();
  renderMetrics(items);
  renderBars(items);
  renderTimeline();
  renderOverview();
  renderReadingGuide(items);
  renderChips();
  renderCards();
  renderSkipGroups();
  renderFollowUp();
}

document.querySelectorAll("[data-lang-button]").forEach(button => {
  button.addEventListener("click", () => setLanguage(button.dataset.langButton));
});
document.getElementById("search").addEventListener("input", () => {
  renderCards();
  renderSkipGroups();
  renderFollowUp();
});
document.getElementById("openAll").addEventListener("click", () => {
  document.querySelectorAll(".card").forEach(card => setCardOpen(card, true));
  document.querySelectorAll(".skip-group").forEach(node => node.classList.add("open"));
});
document.getElementById("closeAll").addEventListener("click", () => {
  document.querySelectorAll(".card").forEach(card => setCardOpen(card, false));
  document.querySelectorAll(".skip-group").forEach(node => node.classList.remove("open"));
});
render();
</script>
</body>
</html>
