.card[data-status="skipped"] .card-head { border-left-color: var(--info); }
.card[data-status="blocked"] .card-head { border-left-color: var(--bad); }
.card.priority-critical .card-head {
  background: linear-gradient(180deg, #fff7f8, #fff);
}
.card.priority-focus .card-head {
  background: linear-gradient(180deg, #fffbeb, #fff);
}
.card.priority-follow .card-head {
  background: linear-gradient(180deg, #eff6ff, #fff);
}
.card-title {
  font-size: 16px;
  line-height: 1.42;
}
.meta {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 7px;
}
.badge {
  gap: 7px;
  min-width: 0;
  padding: 6px 11px;
  text-transform: none;
  white-space: nowrap;
}
.card-summary {
  color: #526173;
  margin-top: 9px;
}
.badge::before {
  content: "";
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: currentColor;
}
.card-body {
  background: #fff;
  padding: 0 18px 18px;
}
.grid {
  grid-template-columns: 1fr;
  gap: 10px;
}
.field {
  background: #fbfcfe;
  border-color: #e6ecf3;
  padding: 13px 14px;
}
.field strong {
  color: #536175;
  font-size: 11px;
  letter-spacing: 0;
  text-transform: uppercase;
}
.field-body {
  color: #1f2937;
  line-height: 1.62;
}
.comment {
  background: #fff8ed;
  border-left-color: var(--accent-2);
  color: #1f2937;
}
.comment-head {
  color: #1f2937;
}
.pr-readout {
  grid-template-columns: minmax(0, 1fr);
  gap: 18px;
}
.story-block {
  border-top-color: #e2e8f0;
}
.story-block.hero-block {
  background: linear-gradient(180deg, #fbfffe, #f7fbfa);
  border-color: #d5e7e4;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
}
.story-block h4,
.review-rail h4,
.comments-panel h4 {
  font-size: 13px;
  font-weight: 900;
}
.story-line {
  grid-template-columns: 116px minmax(0, 1fr);
  border-top-color: #e9eef5;
}
.story-label {
  color: #607086;
}
.review-rail {
  border: 1px solid #e3eaf2;
  border-radius: 8px;
  padding: 14px;
  background: #fbfcfe;
}
.review-rail .fact-list {
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
}
.fact {
  border-top-color: #e8eef5;
}
.comments-panel {
  border-top-color: #e2e8f0;
}
.comment-list {
  gap: 12px;
}
.skip-group {
  box-shadow: var(--shadow);
}
.skip-group-head {
  align-items: center;
  background: linear-gradient(180deg, #fff, #fbfcfe);
}
.skip-row {
  grid-template-columns: minmax(0, 1.15fr) minmax(220px, 0.85fr);
}
.blocker-item {
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.75);
}
.empty {
  background: #fff;
  box-shadow: var(--shadow);
}
@media (max-width: 840px) {
  .topbar, .card-head { grid-template-columns: 1fr; display: grid; }
  .card-actions { align-items: flex-start; flex-direction: row; flex-wrap: wrap; }
  .dashboard, .grid, .metrics { grid-template-columns: 1fr; }
  .guide-grid { grid-template-columns: 1fr; }
  .headline-row { align-items: flex-start; flex-direction: column; }
  .pr-readout { grid-template-columns: 1fr; }
  .review-rail { position: static; }
  .story-line { grid-template-columns: 1fr; gap: 4px; }
  .timeline-item { grid-template-columns: 1fr; }
  .controls { position: static; }
  .utilities { width: 100%; margin-left: 0; }
  .utility-button { flex: 1 1 auto; }
  .skip-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div>
      <h1 data-i18n="title">MyCR 审核报告</h1>
      <p class="subtitle" id="subtitle"></p>
    </div>
    <div class="toggle" aria-label="Language">
      <button type="button" data-lang-button="zh" class="active">中文</button>
      <button type="button" data-lang-button="en">EN</button>
    </div>
  </div>
  <section class="metrics" id="metrics"></section>
  <section class="dashboard">
    <div class="panel">
      <h2 data-i18n="statusDistribution">状态分布</h2>
      <div class="bars" id="bars"></div>
    </div>
    <div class="panel">
      <h2 data-i18n="timeline">执行时间线</h2>
      <div class="timeline" id="timeline"></div>
    </div>
  </section>
  <section class="panel" id="overviewPanel" style="display: none; margin-top: 16px;">
    <h2 data-i18n="overviewSection">整体摘要</h2>
    <div class="overview-content" id="overviewContent"></div>
  </section>
  <section class="panel reading-guide" id="readingGuidePanel" style="display: none;">
    <div class="guide-head">
      <h2 data-i18n="readingGuide">阅读建议</h2>
      <span data-i18n="readingGuideHint">先看高风险和高影响 PR</span>
    </div>
    <div class="guide-grid" id="readingGuide"></div>
  </section>
  <section class="controls">
    <input class="search" id="search" type="search">
    <div class="chips" id="chips"></div>
    <div class="utilities">
      <button type="button" class="utility-button" id="openAll"></button>
      <button type="button" class="utility-button" id="closeAll"></button>
    </div>
  </section>
  <section class="section-heading">
    <h2 data-i18n="reviewedSection">已处理 PR</h2>
    <div class="hint" data-i18n="reviewedHint">点击卡片查看细节</div>
  </section>
  <main class="cards" id="cards"></main>
  <section class="section-heading" id="skippedHeading">
    <h2 data-i18n="skippedGroups">未审核 PR 分类</h2>
    <div class="hint" data-i18n="skippedHint">按排除原因分组</div>
  </section>
  <section class="skip-groups" id="skipGroups"></section>
  <section class="section-heading" id="followUpHeading">
    <h2 data-i18n="followUpSection">后续关注</h2>
    <div class="hint" data-i18n="followUpHint">接近可处理但仍有阻塞</div>
  </section>
  <section class="cards" id="followUpCards"></section>
  <section class="panel" id="evolutionPanel" style="display: none; margin-top: 18px;">
    <h2 data-i18n="selfEvolutionSection">自进化记录</h2>
    <div class="evolution-list" id="evolutionList"></div>
  </section>
  <div class="footer" id="footer"></div>
</div>
<script>
const reportData = {"approved":[],"blocked":[],"commented":[{"alternative_designs":"Alternatives include keeping the old stateless builder for all callers, caching only serialized message bytes, or making the processor own a precomputed request attribute slice.","api_surface":"Adds `ChatTraceState` as a reusable tracing helper; existing `TraceChat` remains the stateless public helper.","approach":"The PR adds `ChatTraceState`, moves reusable request fields into `chatRequestAttributes`, and lets streaming processors call the stateful tracing path so repeated request attributes can be reused across chunks.","author":"cuboya","behavior_impact":"Expected before/after: streaming spans carry the same request attributes, but repeated chunks allocate less when a persistent trace state is used.","change_inventory":"Introduces reusable request attribute slots, message identity checks, stateful trace calls from llmflow, and benchmark/test coverage for cache behavior.","ci_state":"green (162 checks)","cross_module_impact":"llmflow benefits from lower repeated attribute work; OpenTelemetry export content should stay compatible.","design_assessment":"The design is directionally sound for streaming trace spans, with one localized regression in the nil-state path that should be fixed before the allocation claim is fully true.","evidence_checked":"PR body, changed telemetry code, checks, benchmark notes from the reviewer, and targeted telemetry/llmflow tests were inspected.","head_sha":"f844a0748ceeab1f2b89df9d576bdd3e12721090","implementation_derivation":"Putting reusable request attribute state next to the streaming chat span is the right locality for chunked responses; the issue is that the nil-state fallback also uses the cache-filling path.","inline_comments":[{"body":"The stateless path now builds a throwaway `chatRequestAttributes` when `requestAttrs` is nil, so ordinary `TraceChat` / `buildRequestAttributes` calls still populate `slot.attrs` and allocate cloned message attributes that are immediately discarded. Please keep the uncached request-attribute builder for the nil-state path, and reserve cache-slot population for a persistent `ChatTraceState`.\n\n<details><summary>中文<\/summary>\n无状态路径现在会在 `requestAttrs` 为 nil 时创建一个一次性的 `chatRequestAttributes`，导致普通 `TraceChat` / `buildRequestAttributes` 调用也会填充 `slot.attrs`，并分配马上被丢弃的 message 属性副本。建议 nil-state 路径保留未缓存的 request attribute 构造逻辑，只在持久的 `ChatTraceState` 中写入缓存槽。\n<\/details>","line":185,"path":"internal/telemetry/trace.go","url":"https://github.com/trpc-group/trpc-agent-go/pull/2141#discussion_r3550332243"}],"module_impact":"Direct impact is telemetry allocation behavior; indirect impact is any caller relying on `TraceChat` as a cheap one-shot helper.","modules":"internal/telemetry trace builders and internal/flow/llmflow streaming instrumentation.","necessity_assessment":"confirmed: the touched path rebuilds request attributes repeatedly during streaming, and the PR adds reusable per-span request attribute state to reduce that cost.","number":2141,"outcome":"Commented on the nil-state fallback because it still populates cache slots and clones attributes that are immediately discarded.","problem":"The PR tries to reduce allocation churn while tracing streaming chat requests, especially in `llmflow`, where the request portion stays stable while response chunks change over time.","problem_framing":"The immediate problem is allocation pressure, but the underlying contract is whether `TraceChat` remains a cheap stateless helper while `ChatTraceState` owns reusable per-span cache state.","review_action":"Submitted COMMENT review only; no approval, no LGTM, no merge. Review URL: https://github.com/trpc-group/trpc-agent-go/pull/2141#pullrequestreview-4661543244","risk":"If unfixed, the non-stateful path can regress allocation behavior even while the streaming stateful path improves.","semantic_changes":"Streaming trace emission can reuse request attributes across chunks; stateless `TraceChat` behavior should remain equivalent but currently takes the cache population path.","solution_fit_assessment":"The stateful API fits streaming reuse, but the stateless fallback should stay uncached so ordinary one-shot calls do not pay cache bookkeeping or clone allocation costs.","status":"commented","technical_background":"Telemetry trace code turns chat requests and responses into OpenTelemetry span attributes. Streaming model calls may emit many chunks for the same request, so request-side attributes are a hot path where repeated JSON marshaling and attribute allocation can add avoidable latency and heap pressure.","tests_docs":"`go test ./internal/telemetry ./internal/flow/llmflow` and targeted telemetry tests were reported passing by the reviewer; benchmark inspection showed the cache reduces streaming allocations.","title":"internal/telemetry:Reduce streaming TraceChat request attribute allocations","tradeoffs":"A reusable trace state reduces repeated work in streaming paths, but it adds cache invalidation and message-identity comparison complexity that should be limited to callers with persistent state.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2141"},{"alternative_designs":"The example could be smaller with one scenario, or could rely on live models, but that would reduce audit coverage or reproducibility.","api_surface":"Adds example CLI flags such as `--mode`, `--scenario`, `--data-dir`, and `--output-dir`; no core runtime API is changed.","approach":"The PR builds a fake-mode example under `examples/evaluation/promptiter/regressionloop`, adds attribution data, scenario selection, reports, and reusable regression-loop helpers.","author":"d2bz","behavior_impact":"Expected before/after: users can run `--scenario=all` or individual scenarios; `--help` should expose every individual scenario.","change_inventory":"Adds attribution datasets, scenario definitions, fake runner wiring, sample optimization reports, and tests for the regression loop.","ci_state":"green (164 checks)","cross_module_impact":"PromptIter evaluation artifacts and example docs now depend on the scenario list being complete and consistent.","design_assessment":"The example structure is useful; the missing `attribution` help text is a small but real usability gap because it hides one supported scenario.","evidence_checked":"Issue #2003, PR body, scenario code, README, generated sample reports, checks, and reviewer-run tests were inspected.","head_sha":"b15379b1e3d165de6a4d9f4c2e1bfed15eabcd99","implementation_derivation":"A deterministic fake runner is appropriate because it lets CI and reviewers reproduce accepted, ineffective, overfit, and attribution scenarios without model credentials.","inline_comments":[{"body":"The CLI help still omits `attribution`, even though it is a supported scenario and part of the sample reports. Please add it to the `--scenario` flag text so `--help` matches the README and users can discover the attribution run.\n\n<details><summary>中文<\/summary>\nCLI 帮助文本仍然漏掉了 `attribution`，但它已经是受支持场景，也是示例报告的一部分。请把它加入 `--scenario` 的说明里，让 `--help` 与 README 保持一致，并方便用户发现 attribution 运行模式。\n<\/details>","line":27,"path":"examples/evaluation/promptiter/regressionloop/main.go","url":"https://github.com/trpc-group/trpc-agent-go/pull/2157#discussion_r3550332251"}],"module_impact":"Direct impact is example and evaluation workflow code; indirect impact is documentation expectations for PromptIter regression checks.","modules":"examples/evaluation/promptiter/regressionloop, evaluation/workflow/promptiter/regloop, sample eval sets and reports.","necessity_assessment":"confirmed as a feature need: the linked maintainer task asks for auditability, failure attribution, validation regression, and release gating around prompt optimization.","number":2157,"outcome":"Commented that `--scenario` help omits the supported `attribution` scenario.","problem":"The PR adds a reproducible evaluation to failure-attribution to PromptIter optimization loop, including multiple deterministic scenarios and committed sample reports.","problem_framing":"The immediate goal is a runnable example, but the deeper goal is a regression contract that keeps prompt optimization from accepting hidden validation failures.","review_action":"Submitted COMMENT review only; no approval, no LGTM, no merge. Review URL: https://github.com/trpc-group/trpc-agent-go/pull/2157#pullrequestreview-4661543248","risk":"If unfixed, the attribution demo exists but is less discoverable from the command-line entry point.","semantic_changes":"Users can run deterministic scenario-specific PromptIter regression demos and inspect JSON/Markdown output.","solution_fit_assessment":"The CLI scenario surface is the right user control, but its help text must match the implemented scenario list so users can discover all modes.","status":"commented","technical_background":"PromptIter examples demonstrate evaluation and optimization flows with deterministic fake runners, sample eval sets, metrics, and generated reports. The command-line flags are part of the example contract because users discover scenarios through `--help` before reading all fixtures.","tests_docs":"Reviewer reported package tests, coverage checks, fake-mode runs, and committed report diff checks passing.","title":"evaluation/promptiter: add eval+optimization regression loop with aud…","tradeoffs":"More committed fixtures and reports increase maintenance cost, but make the optimization behavior easy to verify in CI and review.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2157"},{"alternative_designs":"Alternatives include only documenting host-owned `WithDB`, only supporting `WithDialector`, or adding a small wrapper type in examples that owns the opened DB.","api_surface":"Adds exported GORM memory service constructors/options such as `NewService`, `WithDB`, `WithDialector`, `WithSkipDBInit`, `WithSoftDelete`, tool options, and the `gorm` memory type in examples.","approach":"The PR introduces `memory/gorm`, service options for `WithDB`, `WithDialector`, table/init/soft-delete configuration, tests, and shared example selection via `-memory=gorm`.","author":"sks","behavior_impact":"Expected before/after: users can run simple/auto memory examples with a GORM backend and get matching startup info, configuration docs, and closed resources.","change_inventory":"Adds a GORM memory submodule, tests, shared example factory support, GORM reference docs, and example dependency updates.","ci_state":"green (166 checks)","cross_module_impact":"Example runners, memory tools, GORM storage configuration, docs, and tests all need consistent lifecycle and option semantics.","design_assessment":"The package design is broadly useful; the lifecycle and documentation gaps need fixing before the examples are safe and discoverable.","evidence_checked":"PR body, related #2109 discussion, GORM service options, service close behavior, example util code, README files, checks, and review comments were inspected.","head_sha":"55897e8f2a0714c945ea92673b2dddfc2da83c29","implementation_derivation":"A new backend package is the right abstraction because it keeps storage-specific code behind the existing memory interface while preserving the public contract.","inline_comments":[{"body":"`newGormMemoryService` opens the GORM handle here, but passes it as `WithDB`, so `memory/gorm.Close()` intentionally will not close it. Use a dialector so the service owns the client, or wrap the returned service to close the opened `sql.DB`.\n\n<details><summary>中文<\/summary>\n`newGormMemoryService` 在这里打开 GORM 连接后通过 `WithDB` 传入，因此 `memory/gorm.Close()` 按设计不会关闭它。请改用 dialector 让 service 持有连接，或包装返回的 service 来关闭这里打开的 `sql.DB`。\n<\/details>","line":213,"path":"examples/memory/util.go","url":"https://github.com/trpc-group/trpc-agent-go/pull/2128#discussion_r3550332240"},{"body":"`-memory=gorm` now creates a GORM service, but `PrintMemoryInfo` still falls through to `In-memory`. Add a `MemoryGORM` case that prints GORM-specific, non-secret settings so the startup output matches the selected backend.\n\n<details><summary>中文<\/summary>\n`-memory=gorm` 现在会创建 GORM service，但 `PrintMemoryInfo` 仍会落到 `In-memory`。请增加 `MemoryGORM` 分支，输出 GORM 相关且不含敏感信息的配置，让启动信息和实际后端一致。\n<\/details>","line":135,"path":"examples/memory/util.go","url":"https://github.com/trpc-group/trpc-agent-go/pull/2128#discussion_r3550332248"},{"body":"This README points users to `simple` / `auto` with `-memory=gorm`, but those actual discovery surfaces still omit GORM and its environment variables. Please update the flag help and the `simple` / `auto` READMEs so users can discover and configure the new backend from the real entrypoints.\n\n<details><summary>中文<\/summary>\n这里引导用户通过 `simple` / `auto` 使用 `-memory=gorm`，但真实入口的帮助信息和 README 仍缺少 GORM 及其环境变量。请同步更新 flag help 以及 `simple` / `auto` README，让用户能从真实入口发现并配置新后端。\n<\/details>","line":79,"path":"examples/memory/README.md","url":"https://github.com/trpc-group/trpc-agent-go/pull/2128#discussion_r3550332258"},{"body":"After the standalone GORM app was removed, this README still describes removed flags, stale default tool behavior, and a `go test ./...` command for a README-only directory. Please merge the remaining reference material into the real example docs, or rewrite this file so it no longer reads like a runnable example.\n\n<details><summary>中文<\/summary>\n独立 GORM app 删除后，这个 README 仍在描述已移除的 flag、过期的默认工具行为，以及 README-only 目录下的 `go test ./...`。请把剩余参考内容合并到真实示例文档，或重写此文件，避免它继续表现成可运行示例。\n<\/details>","line":89,"path":"examples/memory/gorm/README.md","url":"https://github.com/trpc-group/trpc-agent-go/pull/2128#discussion_r3550332262"}],"module_impact":"Direct impact is memory backend storage and example setup; indirect impact is memory tool behavior and shutdown semantics in examples.","modules":"memory/gorm backend, examples/memory shared util, examples/memory README files, simple and auto memory examples.","necessity_assessment":"confirmed as a design need: prior maintainer discussion asked for a contributed backend rather than exporting framework-internal memory helpers.","number":2128,"outcome":"Commented on DB lifecycle leakage, wrong startup backend label, missing simple/auto discovery docs, and stale GORM reference README content.","problem":"The PR adds a first-party `memory/gorm` backend and wires it into shared memory examples so users can use GORM-managed databases instead of exporting internal helper logic.","problem_framing":"The user pain is integration with existing GORM-backed applications; the root contract is clear ownership of database lifecycle and clear discovery from the actual example entry points.","review_action":"Submitted COMMENT review only; no approval, no LGTM, no merge. Review URL: https://github.com/trpc-group/trpc-agent-go/pull/2128#pullrequestreview-4661543241","risk":"If unfixed, examples can leak database pools and users can receive misleading backend information or stale commands.","semantic_changes":"Users can select `-memory=gorm`; GORM service may auto-migrate unless skip init is configured; injected DB handles are intentionally caller-owned.","solution_fit_assessment":"The backend direction fits, but the examples currently open a DB and pass it as caller-owned, and the docs/help surfaces do not fully describe the new backend.","status":"commented","technical_background":"The memory service abstraction stores long-term user memories behind a common `memory.Service` interface. GORM-backed services can either own a database connection they open themselves or receive a caller-owned `*gorm.DB`; that ownership choice determines whether `Close()` should release the underlying pool.","tests_docs":"CI checks were green. Review focused on service option semantics and docs because the issues are not caught by existing tests.","title":"memory/gorm: GORM-backed memory.Service with shared DB injection","tradeoffs":"Supporting shared `*gorm.DB` is important for applications, but examples that open their own connection should either use owned dialectors or close the injected pool explicitly.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2128"},{"alternative_designs":"Alternatives include using an existing diff parser library, parsing hunk lines before headers only when inside a hunk, or keeping a stricter state machine.","api_surface":"Adds example CLI and internal example packages; no exported core framework API changes.","approach":"The PR introduces an isolated example with internal packages for diff parsing, rules, redaction, sandbox execution, report generation, and durable storage.","author":"XnLemon","behavior_impact":"Expected before/after: legal hunk content starting with `--- ` or `+++ ` should remain a changed line, not become a new file header.","change_inventory":"Adds README/design docs, fixtures, parser/rules/redaction/report/sandbox/store packages, fake runtime, and tests.","ci_state":"green (164 checks)","cross_module_impact":"Rules, redaction, sandbox, and report packages depend on the parser preserving correct file/hunk identity.","design_assessment":"The example is useful, with a concrete parser correctness bug that can misplace later findings.","evidence_checked":"Issue #2004, PR body, diff parser, fixtures, generated reports, checks, and reviewer-run example commands/tests were inspected.","head_sha":"a49fa7ff05a80fe92c90967c20a755c245f1af10","implementation_derivation":"Keeping this as an example package is reasonable because it demonstrates composition of existing framework tools without changing core runtime APIs.","inline_comments":[{"body":"Inside an active hunk, a real changed line can start with `--- ` or `+++ `, but these cases run before hunk-line parsing and reclassify that content as a file header/path. Handle hunk lines before file headers, or only accept headers outside active hunks, so valid diff content does not create phantom files or shift later findings.\n\n<details><summary>中文<\/summary>\n在已经进入 hunk 后，真实变更内容也可能以 `--- ` 或 `+++ ` 开头，但这里会先按文件头处理，导致这些内容被误判成文件路径。建议先处理 active hunk 内的 diff 行，或只在 hunk 外接受文件头，避免合法 diff 内容制造假文件或影响后续 finding 的行号归属。\n<\/details>","line":52,"path":"examples/code_review_agent/internal/diffparse/parser.go","url":"https://github.com/trpc-group/trpc-agent-go/pull/2121#discussion_r3550375352"}],"module_impact":"Direct impact is the example parser; indirect impact is any rule or report that relies on parsed hunk line numbers.","modules":"examples/code_review_agent/internal/diffparse plus downstream rules/reporting that consume parsed file and line metadata.","necessity_assessment":"confirmed as a feature need: issue #2004 asks for a sandboxed code-review agent example and the base tree has no such example.","number":2121,"outcome":"Commented on the active-hunk parser ordering bug.","problem":"The PR adds a sandboxed code review agent example with skill files, diff parsing, fake runtime, persistence, reports, and safety controls.","problem_framing":"The core product need is an auditable example; the parser must preserve exact changed file and line mapping or later review findings become unreliable.","review_action":"Submitted COMMENT review only; no approval, no LGTM, no merge. Review URL: https://github.com/trpc-group/trpc-agent-go/pull/2121#pullrequestreview-4661593247","risk":"If unfixed, valid diffs can create phantom files or shift finding locations.","semantic_changes":"Users can run a local code-review example on fixtures, diff files, file lists, or repositories and receive findings/reports.","solution_fit_assessment":"The architecture fits an example, but the diff parser needs a format-correct hunk/file-header boundary to avoid wrong file attribution.","status":"commented","technical_background":"A code-review example that parses unified diffs depends on precise file and hunk parsing. In unified diff format, `---` and `+++` mark file headers only outside hunks; inside a hunk, changed content can also begin with those characters.","tests_docs":"R ould not break Markdown reports.","change_inventory":"Adds gate policy evaluation, attribution, delta computation, pipeline orchestration, JSON/Markdown report generation, tests, and example fixtures.","ci_state":"green (164 checks)","cross_module_impact":"PromptIter engine adapters, examples, report consumers, and release gating all depend on complete validation case coverage.","design_assessment":"The package is directionally useful, with two correctness/reporting gaps that should be fixed before relying on its acceptance result.","evidence_checked":"Issue #2003, latest diff, gate logic, report renderer, checks, and reviewer-run package/example tests were inspected.","head_sha":"ccbe5800be5e19a0e8e4097006e2a8a2f1ae4da6","implementation_derivation":"A package-level regression loop is a reasonable implementation point because it can be reused by examples and future prompt surfaces.","inline_comments":[{"body":"Missing validation cases never fail the gate: `ComputeDeltas` emits `TransitionMissing`, but `EvaluateGate` only checks score, hard fails, critical regressions, and budgets, so a candidate can be accepted after skipping baseline validation cases. Add a gate rule that rejects missing validation cases before `Accepted` is set, and cover baseline-only/candidate-only deltas in tests.\n\n<details><summary>中文<\/summary>\n缺失的验证用例不会让 gate 失败：`ComputeDeltas` 会产生 `TransitionMissing`，但 `EvaluateGate` 只检查分数、hard fail、关键回归和预算，所以候选 prompt 即使跳过了 baseline 验证用例也可能被接受。请在设置 `Accepted` 前增加缺失验证用例的拒绝规则，并补充 baseline-only / candidate-only delta 测试。\n<\/details>","line":69,"path":"evaluation/workflow/promptiter/regressionloop/gate.go","url":"https://github.com/trpc-group/trpc-agent-go/pull/2152#discussion_r3550375342"},{"body":"`MarkdownReport` inserts candidate prompts into a single inline code span without escaping, so prompts containing backticks, pipes, or newlines can corrupt `optimization_report.md` and make the required audit report hard to read. Render prompts and other dynamic report text through Markdown escaping or fenced blocks, and add a report test with those characters.\n\n<details><summary>中文<\/summary>\n`MarkdownReport` 会把候选 prompt 原样写进单行内联代码块，包含反引号、管道符或换行的真实 prompt 会破坏 `optimization_report.md`，导致必须交付的人类可读审计报告难以阅读。请对 prompt 和其他动态报告文本做 Markdown 转义，或改用代码块渲染，并补充覆盖这些字符的报告测试。\n<\/details>","line":93,"path":"evaluation/workflow/promptiter/regressionloop/report.go","url":"https://github.com/trpc-group/trpc-agent-go/pull/2152#discussion_r3550375348"}],"module_impact":"Direct impact is evaluation/promptiter workflow code; indirect impact is any future automation that trusts the gate decision.","modules":"evaluation/workflow/promptiter/regressionloop gate, delta, report, pipeline, and examples/evaluation promptiter regression loop.","necessity_assessment":"confirmed as a feature need from issue #2003; the base tree lacks this regression-loop package and example.","number":2152,"outcome":"Commented on missing-case acceptance and unescaped Markdown prompt rendering.","problem":"The PR builds an evaluation and optimization regression loop with failure attribution, baseline/candidate deltas, release gates, and audit reports.","problem_framing":"The immediate need is a reproducible loop; the root correctness issue is making the gate reject hidden regressions and making reports robust for arbitrary prompt text.","review_action":"Submitted COMMENT review only; no approval, no LGTM, no merge. Review URL: https://github.com/trpc-group/trpc-agent-go/pull/2152#pullrequestreview-4661593240","risk":"If unfixed, the regression loop can accept incomplete validation results or produce broken audit reports.","semantic_changes":"Users can run a deterministic optimization loop and inspect accepted/rejected candidates, deltas, and reports.","solution_fit_assessment":"The structure fits the need, but the gate omits missing-case failure handling and the Markdown report does not escape dynamic prompt text.","status":"commented","technical_background":"Evaluatio function text(value, fallback = "") {
  if (value === undefined || value === null || value === "") return fallback;
  if (typeof value === "object" && !Array.isArray(value)) {
    return value[lang] || value.zh || value.en || value.summary || value.body || value.mode || fallback;
  }
  return String(value);
}

function escapeHtml(value) {
  return text(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

      /(导出 API|\bAPI\b|兼容性|\bsession\b|\brunner\b|\bmemory\b|GraphRAG|workspace_exec|OpenAPI|\bpolicy\b|security|安全)/gi,
      "mark-warn"
    ]
  ];
  for (const [pattern, className] of replacements) {
    html = html.replace(pattern, `<mark class="${className}">$1</mark>`);
  }
  return html;
}

function prs() {
  const skippedByNumber = new Map();
  for (const group of skippedGroups()) {
    for (const item of (group.items || [])) {
      const key = item.number ? String(item.number) : `${group.reason || "skipped"}:${text(item.title)}`;
      if (skippedByNumber.has(key)) continue;
      skippedByNumber.set(key, {
      ...item,
      status: item.status || "skipped",
      skip_reason: item.skip_reason || group.reason
      });
    }
  }
  const skipped = [...skippedByNumber.values()];
  return [
    ...(reportData.approved || []),
    ...(reportData.commented || []),
    ...(reportData.maintained || []),
    ...(reportData.blocked || []),
    ...skipped
  ];
}

function skippedGroups() {
  const processedNumbers = new Set([
    ...(reportData.approved || []),
    ...(reportData.commented || []),
    ...(reportData.maintained || []),
    ...(reportData.blocked || [])
  ].map(item => Number(item.number)).filter(Boolean));
  return (reportData.skipped_groups || []).map(group => {
    const existingItems = group.items || [];
    if (existingItems.length) {
      return {
        ...group,
        items: existingItems.filter(item => !processedNumbers.has(Number(item.number)))
      };
    }
    const items = (group.prs || []).filter(number => !processedNumbers.has(Number(number))).map(number => {
      const reason = group.reason || "skipped";
      const summary = text(group.title_zh || group.title || reason);
      return {
        number,
        title: `PR #${number}`,
        url: "",
        author: "",
        status: "skipped",
        skip_reason: summary,
        readiness_audit: summary,
        ci_state: "",
        blockers: [{
          kind: reason,
          summary
        }]
      };
    });
    return { ...group, items, count: items.length };
  }).filter(group => group.items.length > 0);
}

function counts(items) {
  const result = Object.fromEntries(statusOrder.map(status => [status, 0]));
  for (const item of items) {
    const status = item.status || "skipped";
    result[status] = (result[status] || 0) + 1;
  }
  return result;
}

function matchesSearch(item, query) {
  if (!query) return true;
  const haystack = [
    item.number,
    text(item.title),
    item.author,
    text(item.problem),
    text(item.necessity_assessment),
    text(item.evidence_checked),
    text(item.reproduction_on_base),
    text(item.issue_evidence_gaps),
    text(item.approach),
    text(item.implementation_derivation),
    text(item.solution_fit_assessment),
    text(item.outcome),
    text(item.merge_policy),
    text(item.skip_reason),
    text(item.group_reason),
    text(item.readiness_audit),
    blockersSearchText(item.blockers),
    text(item.risk),
    text(item.ci_state)
  ].join(" ").toLowerCase();
  return haystack.includes(query.toLowerCase());
}

function blockersSearchText(blockers) {
  if (!Array.isArray(blockers)) return "";
  return blockers.map(blocker => {
    if (typeof blocker !== "object" || blocker === null) return text(blocker);
    return [
      blocker.kind,
      blocker.summary,
      blocker.reviewer,
      blocker.path,
      blocker.line,
      blocker.latest_response,
      blocker.verification,
      blocker.url
    ].map(value => text(value)).join(" ");
  }).join(" ");
}

function field(label, value) {

function renderBlockers(item) {
  const blockers = Array.isArray(item.blockers) ? item.blockers : [];
  if (!blockers.length) return "";
  const isNonBlockerList = blockers.every(blocker => {
    const kind = typeof blocker === "object" && blocker !== null ? String(blocker.kind || "") : "";
    return kind === "not_reached";
  });
  const detailLabel = isNonBlockerList
    ? labels[lang].nonBlockerDetails
    : labels[lang].blockerDetails;
  const rendered = blockers.map(blocker => {
    const data = typeof blocker === "object" && blocker !== null
      ? blocker
      : { summary: blocker };
    const location = [data.path, data.line ? `:${data.line}` : ""].filter(Boolean).join("");
    const meta = [
      data.kind ? blockerKindLabel(data.kind) : "",
      data.reviewer ? `reviewer: ${text(data.reviewer)}` : "",
      location,
      data.latest_response ? `latest: ${text(data.latest_response)}` : "",
      data.verification ? text(data.verification) : ""
    ].filter(Boolean).join(" · ");
    const summary = formatRich(data.summary || blocker);
    const link = data.url
      ? ` <a href="${escapeHtml(data.url)}">link</a>`
      : "";
    return `<li class="blocker-item"><div>${summary}${link}</div>${meta ? `<div class="blocker-meta">${escapeHtml(meta)}</div>` : ""}</li>`;
  }).join("");
  return `<div class="skip-detail"><strong>${detailLabel}:</strong></div><ul class="blocker-list">${rendered}</ul>`;
}

function blockerKindLabel(kind) {
  return (labels[lang].blockerKinds || {})[kind] || text(kind);
}

  function inlineCommentText(comment) {
    if (comment === undefined || comment === null) return "";
    if (typeof comment !== "object" || Array.isArray(comment)) {
      return text(comment);
    }
    if (lang === "zh") {
      return text(comment.summary_zh || comment.summary || comment.body || comment.message || "");
    }
    return text(comment.body || comment.summary_en || comment.summary || comment.message || "");
  }

function allPrText(item) {
  const comments = (item.inline_comments || []).map(comment => [
    comment.severity,
    comment.focus,
    comment.body,
    comment.summary,
    comment.path
  ].map(value => text(value)).join(" ")).join(" ");
  const blockers = blockersSearchText(item.blockers);
  return [
    item.status,
    item.number,
    item.title,
    item.author,
    item.problem,
    item.necessity_assessment,
    item.evidence_checked,
    item.reproduction_on_base,
    item.issue_evidence_gaps,
    item.approach,
    item.implementation_derivation,
    item.solution_fit_assessment,
    item.outcome,
    item.risk,
    item.ci_state,
    item.skip_reason,
    item.readiness_audit,
    item.modules,
    item.api_surface,
    comments,
    blockers
  ].map(value => text(value)).join(" ").toLowerCase();
}

function readingAdvice(item) {
  const status = item.status || "skipped";
  const comments = item.inline_comments || [];
  const blockers = item.blockers || [];
  const body = allPrText(item);
  const hasP1 = comments.some(comment =>
    /\bP[01]\b/i.test(text(comment.severity)) ||
    /\bP[01]\b/i.test(inlineCommentText(comment))
  );
  const hasCriticalRisk = hasP1 ||
    /(security|安全|bypass|绕过|breaking|破坏性|unbounded|无界|丢失|重复|不稳定|兼容|api|go-apidiff|failure|失败|不能 merge|不能合入|race|并发)/i.test(body);
  const highImpactFeature =
    /(add|new|新增|support|支持|agent|runner|session|memory|graphrag|knowledge|openapi|workspace_exec|policy|extension|tool|graph|api)/i.test(body);

  const copy = {
    critical: {
      icon: "🔥",
      zh: "重点精读",
      en: "Deep Read",
      reasonZh: comments.length
        ? `有 ${comments.length} 条行级评论，且包含 P1/兼容/正确性/安全类风险。`
        : "包含高风险兼容性或正确性信号，需要重点复核。",
      reasonEn: comments.length
        ? `${comments.length} inline comment(s), including P1, compatibility, correctness, or security risk.`
        : "High-risk compatibility or correctness signal; review carefully."
    },
    focus: {
      icon: "🔎",
      zh: "建议细看",
      en: "Read Carefully",
      reasonZh: comments.length
        ? `有 ${comments.length} 条评论或重要设计取舍，建议看完整结论。`
        : "涉及核心模块、导出 API 或较大功能，建议细看。",
      reasonEn: comments.length
        ? `${comments.length} comment(s) or important design tradeoffs; read the full conclusion.`
        : "Core module, exported API, or larger feature; read carefully."
    },
    skim: {
      icon: "✅",
      zh: "快速略看",
      en: "Quick Skim",
      reasonZh: "风险低或改动较直接，扫结论和 CI 状态即可。",
      reasonEn: "Low risk or straightforward change; skim outcome and CI state."
    },
    follow: {
      icon: "⏳",
      zh: "只看阻塞",
      en: "Blocker Only",
      reasonZh: blockers.length
        ? `主要看 ${blockers.length} 个具体阻塞点，暂不需要读完整实现。`
        : "当前不是可合并状态，先看阻塞和后续动作。",
      reasonEn: blockers.length
        ? `Focus on ${blockers.length} concrete blocker(s); no need to read the full implementation yet.`
        : "Not merge-ready; focus on blockers and next action."
    }
  };

  let level = "skim";
  if (status === "blocked") {
    level = "follow";
  } else if (status === "commented") {
    level = hasCriticalRisk ? "critical" : "focus";
  } else if (status === "maintained") {
    level = hasCriticalRisk || highImpactFeature ? "focus" : "skim";
  } else if (status === "approved") {
    level = hasCriticalRisk || highImpactFeature ? "focus" : "skim";
  } else if (status === "merged") {
    level = highImpactFeature || hasCriticalRisk ? "focus" : "skim";
  } else if (status === "skipped") {
    level = blockers.length || /(conflict|ci|failure|失败|未回应|review)/i.test(body)
      ? "follow"
      : "skim";
  }

  const selected = copy[level];
  return {
    level,
    icon: selected.icon,
    label: lang === "zh" ? selected.zh : selected.en,
    reason: lang === "zh" ? selected.reasonZh : selected.reasonEn
  };
}

function priorityRank(level) {
  return { critical: 4, focus: 3, follow: 2, skim: 1 }[level] || 0;
}

function renderReadingGuide(items) {
  const panel = document.getElementById("readingGuidePanel");
  const container = document.getElementById("readingGuide");
  const candidates = [
    ...items.filter(item => (item.status || "skipped") !== "skipped"),
    ...(reportData.follow_up || []).map(item => {
      if (typeof item === "object" && item !== null && !Array.isArray(item)) {
        return { ...item, status: item.status || "blocked" };
      }
      const body = text(item);
      return { title: body, next: body, status: "blocked", plain: true };
    })
  ].map(item => ({ item, advice: readingAdvice(item) }))
    .filter(entry => entry.advice.level !== "skim")
    .sort((left, right) => priorityRank(right.advice.level) - priorityRank(left.advice.level));

  if (!candidates.length) {
    panel.style.display = "none";
    container.innerHTML = "";
    return;
  }

  panel.style.display = "block";
  container.innerHTML = candidates.slice(0, 9).map(entry => {
    const item = entry.item;
    const advice = entry.advice;
    const prText = item.number ? `#${item.number}` : "PR";
    const prLink = item.url
      ? `<a href="${escapeHtml(item.url)}">${prText} · ${escapeHtml(text(item.title))}</a>`
      : `<span>${prText} · ${escapeHtml(text(item.title))}</span>`;
    return `
      <article class="guide-card ${advice.level}">
        <div class="guide-meta">
          <span class="read-pill ${advice.level}">${advice.icon} ${escapeHtml(advice.label)}</span>
          <span class="badge ${item.status || "skipped"}">${labels[lang][item.status] || item.status || labels[lang].skipped}</span>
        </div>
        <div>${prLink}</div>
        <div class="guide-reason">${escapeHtml(advice.reason)}</div>
      </article>
    `;
  }).join("");
}

      : prText;
    return `
      <article class="card priority-${advice.level}" data-status="${status}">
        <div class="card-head">
          <div>
            <div class="headline-row">
              <h3 class="card-title">${prLink} · ${escapeHtml(text(item.title))}</h3>
              <span class="read-pill ${advice.level}">${advice.icon} ${escapeHtml(advice.label)}</span>
            </div>
            <div class="meta">
              <span>${labels[lang].author}: ${escapeHtml(item.author || "")}</span>
              <span class="advice-reason">${escapeHtml(advice.reason)}</span>
            </div>
            <div class="card-summary">${formatRich(summary)}</div>
          </div>
          <div class="card-actions">
            <span class="badge ${status}">${labels[lang][status] || status}</span>
            <button class="card-toggle" type="button" aria-expanded="false">${labels[lang].expandDetails}</button>
          </div>
        </div>
        <div class="card-body">
          ${renderPrReadout(item)}
        </div>
      </article>
    `;
  }).join("");
  document.querySelectorAll(".card-head").forEach(head => {
    head.addEventListener("click", event => {
      if (event.target.closest("a")) return;
      const card = head.closest(".card");
      setCardOpen(card, !card.classList.contains("open"));
    });
  });
  document.querySelectorAll(".card").forEach(card => updateCardToggle(card));
}

function renderSkipGroups() {
  const heading = document.getElementById("skippedHeading");
  const container = document.getElementById("skipGroups");
  if (!["all", "skipped"].includes(filter)) {
    heading.style.display = "none";
    container.style.display = "none";
    return;
  }
  heading.style.display = "flex";
  container.style.display = "grid";
  const query = document.getElementById("search").value.trim();
  const groups = skippedGroups().map(group => {
    const reason = group.reason || "";
    const title = lang === "zh"
      ? text(group.title_zh || group.title || group.reason)
      : text(group.title_en || group.title || group.reason);
    const items = (group.items || []).map(item => ({
      ...item,
      status: item.status || "skipped",
      group_reason: reason,
      skip_reason: item.skip_reason || reason
    })).filter(item => matchesSearch(item, query));
    return { reason, title, items };
  }).filter(group => group.items.length > 0);
  if (!groups.length) {
    container.innerHTML = `<div class="empty">${labels[lang].empty}</div>`;
    return;
  }
  container.innerHTML = groups.map((group, index) => `
    <article class="skip-group open">
      <div class="skip-group-head" data-skip-group="${index}">
        <h3 class="skip-group-title">${escapeHtml(text(group.title || group.reason))}</h3>
        <span class="skip-group-count">${group.items.length} ${labels[lang].items}</span>
      </div>
      <div class="skip-group-body">
        ${group.items.map(item => {
          const prText = item.number ? `#${item.number}` : "PR";
          const prLink = item.url
            ? `<a href="${escapeHtml(item.url)}">${prText}</a>`
            : prText;
          return `
            <div class="skip-row">
              <div>
                <div class="skip-title">${prLink} · ${escapeHtml(text(item.title))}</div>
                <div class="skip-detail">${labels[lang].author}: ${escapeHtml(item.author || "")}</div>
              </div>
              <div>
                <div><strong>${labels[lang].reason}:</strong> ${formatRich(text(item.skip_reason))}</div>
                ${item.readiness_audit ? `<div class="skip-detail"><strong>${labels[lang].readinessAudit}:</strong> ${formatRich(text(item.readiness_audit))}</div>` : ""}
                ${item.necessity_assessment ? `<div class="skip-detail"><strong>${labels[lang].necessityAssessment}:</strong> ${formatRich(text(item.necessity_assessment))}</div>` : ""}
                ${item.evidence_checked ? `<div class="skip-detail"><strong>${labels[lang].evidenceChecked}:</strong> ${formatRich(text(item.evidence_checked))}</div>` : ""}
                ${item.reproduction_on_base ? `<div class="skip-detail"><strong>${labels[lang].reproductionOnBase}:</strong> ${formatRich(text(item.reproduction_on_base))}</div>` : ""}
                ${item.issue_evidence_gaps ? `<div class="skip-detail"><strong>${labels[lang].issueEvidenceGaps}:</strong> ${formatRich(text(item.issue_evidence_gaps))}</div>` : ""}
                ${item.implementation_derivation ? `<div class="skip-detail"><strong>${labels[lang].implementationDerivation}:</strong> ${formatRich(text(item.implementation_derivation))}</div>` : ""}
                ${item.solution_fit_assessment ? `<div class="skip-detail"><strong>${labels[lang].solutionFitAssessment}:</strong> ${formatRich(text(item.solution_fit_assessment))}</div>` : ""}
                ${renderBlockers(item)}
                ${item.ci_state ? `<div class="skip-detail">${formatRich(text(item.ci_state))}</div>` : ""}
                ${item.risk ? `<div class="skip-detail">${formatRich(text(item.risk))}</div>` : ""}
              </div>
            </div>
          `;
        }).join("")}
      </div>
    </article>
  `).join("");
  document.querySelectorAll("[data-skip-group]").forEach(head => {
    head.addEventListener("click", () => {
      head.closest(".skip-group").classList.toggle("open");
    });
  });
}

function renderFollowUp() {
  const heading = document.getElementById("followUpHeading");
  const container = document.getElementById("followUpCards");
  if (!["all", "skipped", "blocked"].includes(filter)) {
    heading.style.display = "none";
    container.style.display = "none";
    return;
  }
  const query = document.getElementById("search").value.trim().toLowerCase();
  const items = (reportData.follow_up || []).map(item => {
    if (typeof item === "object" && item !== null && !Array.isArray(item)) return item;
    const body = text(item);
    return {
      title: body,
      next: body,
      plain: true
    };
  }).filter(item => {
    if (!query) return true;
    return [
      item.number,
      item.author,
      text(item.title),
      text(item.reason),
      text(item.next)
    ].join(" ").toLowerCase().includes(query);
  });
  if (!items.length) {
    heading.style.display = "none";
    container.style.display = "none";
    return;
  }
  heading.style.display = "flex";
  container.style.display = "grid";
  container.innerHTML = items.map(item => {
    const hasPrIdentity = Boolean(item.number || item.url);
    const prText = item.number ? `#${item.number}` : "PR";
    const prLink = item.url
      ? `<a href="${escapeHtml(item.url)}">${prText}</a>`
      : prText;
    const title = escapeHtml(text(item.title || item.next || item.reason));
    const cardTitle = hasPrIdentity ? `${prLink} · ${title}` : title;
    const meta = item.author
      ? `<div class="meta">${labels[lang].author}: ${escapeHtml(item.author)}</div>`
      : "";
    const body = item.plain
      ? `<div>${formatRich(text(item.next || item.title))}</div>`
      : `<div class="grid">
          ${field(labels[lang].reason, item.reason)}
          ${field(labels[lang].outcome, item.next)}
        </div>`;
    return `
      <article class="card open" data-status="blocked">
        <div class="card-head">
          <div>
            <h3 class="card-title">${cardTitle}</h3>
            ${meta}
          </div>
          <span class="badge blocked">${labels[lang].followups}</span>
        </div>
        <div class="card-body">
          ${body}
        </div>
      </article>
    `;
  }).join("");
}

function renderEvolution() {
  const panel = document.getElementById("evolutionPanel");
  const container = document.getElementById("evolutionList");
  const items = reportData.skill_evolution || [];
  if (!items.length) {
    panel.style.display = "none";
    container.innerHTML = "";
    return;
  }
  panel.style.display = "block";
  container.innerHTML = items.map(item => {
    const data = typeof item === "object" && item !== null && !Array.isArray(item)
      ? item
      : { area: labels[lang].selfEvolutionSection, note: item };
    return `
      <article class="evolution-item">
        <div class="evolution-area">${escapeHtml(text(data.area || labels[lang].selfEvolutionSection))}</div>
        <div class="evolution-note">${formatRich(text(data.note || data.summary || data.body || ""))}</div>
      </article>
    `;
  }).join("");
}

function render() {
  const items = prs();
  renderStatic();
  renderMetrics(items);
  renderBars(items);
  renderTimeline();
  renderOverview();
  renderReadingGuide(items);
  renderChips();
  renderCards();
  renderSkipGroups();
  renderFollowUp();
  renderEvolution();
}

document.querySelectorAll("[data-lang-button]").forEach(button => {
  button.addEventListener("click", () => setLanguage(button.dataset.langButton));
});
document.getElementById("search").addEventListener("input", () => {
  renderCards();
  renderSkipGroups();
  renderFollowUp();
});
document.getElementById("openAll").addEventListener("click", () => {
  document.querySelectorAll(".card").forEach(card => setCardOpen(card, true));
  document.querySelectorAll(".skip-group").forEach(node => node.classList.add("open"));
});
document.getElementById("closeAll").addEventListener("click", () => {
  document.querySelectorAll(".card").forEach(card => setCardOpen(card, false));
  document.querySelectorAll(".skip-group").forEach(node => node.classList.remove("open"));
});
render();
</script>
</body>
</html>
